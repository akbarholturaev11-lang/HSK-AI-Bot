.rv-opt.no{border-color:var(--cin);background:var(--cinbg)}.rv-opt.no .rk{background:var(--cin);border-color:var(--cin);color:#fff}

.lim .sh{position:relative;background:var(--card);width:100%;max-width:480px;border-radius:22px 22px 0 0;padding:26px 20px calc(22px + var(--safe-b));text-align:center}
.lim .sh .ic{width:64px;height:64px;border-radius:18px;background:var(--cinbg);color:var(--cin);display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 14px}
.lim .sh h3{font-size:19px;font-weight:600;margin-bottom:7px}

  if(!window.CourseAds){alert(L.err);return}
  CourseAds.play("start",accessRef).then(function(){
    AD_SESSION=true;AD_MID_SHOWN=false;AD_END_SHOWN=false;startReview(true);
  }).catch(function(){AD_SESSION=false;alert(L.err)});
}
function startReview(adSupported){
  if(busy())return;RV={loading:true};
  var accessRef=reviewAccessRef(true);
  fetch("/api/miniapp/mistakes/review/start",{method:"POST",headers:{"X-Telegram-Init-Data":INIT_DATA,"Content-Type":"application/json"},body:JSON.stringify({ad_supported:!!adSupported,access_ref:accessRef})})
  .then(function(r){return r.json().then(function(d){return{status:r.status,d:d}})})
  .then(function(res){
    var d=res.d||{};
    if(res.status===403||d.error==="free_feature_limit_reached"||d.error==="ad_authorization_required"){RV=null;AD_SESSION=false;showLimit(d.error==="ad_authorization_required"||!!(d.ad&&d.ad.available));return}
    if(!d.ok||!d.session||!d.session.questions||!d.session.questions.length){RV=null;
      if(d.error==="mistake_review_empty"){location.reload()}else{alert(L.err)}return}
    RV={loading:false,session:d.session.id,questions:d.session.questions,idx:0,answers:[]};
    openReview();renderQuestion();
  }).catch(function(){RV=null;alert(L.err)});
}
function openReview(){$("review").hidden=false;document.body.style.overflow="hidden"}
function closeReview(){$("review").hidden=true;document.body.style.overflow="";RV=null}
function renderQuestion(){
  /* Reklama bilan kirilgan sessiya: o'rtasida majburiy reklama pauzasi. */
  if(AD_SESSION&&!AD_MID_SHOWN&&RV.questions.length>=4&&RV.idx===Math.floor(RV.questions.length/2)){AD_MID_SHOWN=true;if(window.CourseAds){CourseAds.play("middle").then(renderQuestion).catch(renderQuestion);return}}
  var q=RV.questions[RV.idx],n=RV.questions.length;
  $("rv-fill").style.width=Math.round((RV.idx/n)*100)+"%";
  var opts=q.options.map(function(o,i){return '<button class="rv-opt" data-i="'+i+'" onclick="pickOption('+i+')"><span class="rk">'+LETTERS(i)+'</span><span>'+esc(o)+'</span></button>'}).join("");
  var qcat=q.category?catLabel(q.category):L.q;
  var audio=q.audio_text?'<button class="rv-audio" onclick="speakMistake(\''+jsq(q.audio_text)+'\')"><i class="ti ti-volume"></i></button>':'';
  var sentence=q.sentence?'<div class="han">'+esc(q.sentence)+'</div>':'';
  var pinyin=q.pinyin?'<div class="py">'+esc(q.pinyin)+'</div>':'';
  var material=(audio||sentence||pinyin)?'<div class="rv-material">'+audio+sentence+pinyin+'</div>':'';
  $("rv-body").innerHTML='<div class="rv-cat">'+esc(qcat)+' · '+L.q+' '+(RV.idx+1)+' '+L.of+' '+n+'</div><div class="rv-prompt">'+esc(q.prompt)+'</div>'+material+'<div class="rv-opts" id="rv-opts">'+opts+'</div><div id="rv-fb"></div>';
  $("rv-foot").innerHTML="";
}
function jsq(s){return String(s==null?"":s).replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/[\r\n]/g," ").replace(/</g,"\\u003c")}
function speakMistake(text){try{speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(text);u.lang="zh-CN";u.rate=.82;speechSynthesis.speak(u)}catch(e){}}
function pickOption(i){
  var q=RV.questions[RV.idx];if(RV.locked)return;RV.locked=true;
  var btns=$("rv-opts").querySelectorAll(".rv-opt");
  for(var k=0;k<btns.length;k++)btns[k].disabled=true;
  fetch("/api/miniapp/mistakes/review/answer",{method:"POST",headers:{"X-Telegram-Init-Data":INIT_DATA,"Content-Type":"application/json"},
    body:JSON.stringify({session_id:RV.session,question_id:q.id,selected_index:i})})
  .then(function(r){return r.json()}).then(function(d){
    if(!d||!d.ok)throw new Error("answer_failed");
    var chosen=Number(d.selected_index),correctIndex=Number(d.correct_index),correct=!!d.correct;
    if(!Number.isInteger(chosen)||!Number.isInteger(correctIndex)||correctIndex<0||correctIndex>=q.options.length)throw new Error("answer_invalid");
    RV.answers.push({question_id:q.id,selected_index:chosen});
    haptic(correct?"success":"error");
    for(var j=0;j<btns.length;j++){var bi=+btns[j].getAttribute("data-i");
      if(bi===correctIndex)btns[j].classList.add("ok");else if(bi===chosen)btns[j].classList.add("no");}
    var explanation=String(d.explanation||"");
    var ex=explanation&&explanation!==String(d.correct_answer||"")?'<div class="ex">'+esc(explanation)+'</div>':"";
    $("rv-fb").innerHTML='<div class="rv-fb '+(correct?"ok":"no")+'"><b><i class="ti ti-'+(correct?"circle-check":"alert-circle")+'"></i> '+(correct?L.correct:L.wrong)+'</b>'+(correct?"":'<div>'+L.exp+': '+esc(d.correct_answer||q.options[correctIndex])+'</div>')+ex+'</div>';
    var last=RV.idx>=RV.questions.length-1;
    $("rv-foot").innerHTML='<button onclick="nextQuestion()">'+(last?'<i class="ti ti-check"></i> '+L.finish:L.next+' <i class="ti ti-arrow-right"></i>')+'</button>';
  }).catch(function(){RV.locked=false;for(var j=0;j<btns.length;j++)btns[j].disabled=false;alert(L.err)});
}
function nextQuestion(){
  RV.locked=false;
  if(RV.idx>=RV.questions.length-1){finishReview();return}
  RV.idx++;renderQuestion();
}
function finishReview(){
  if(RV.loading)return;
  /* Reklama bilan kirilgan sessiya: yakunlashdan oldin yakuniy reklama. */
  if(AD_SESSION&&!AD_END_SHOWN){AD_END_SHOWN=true;if(window.CourseAds){CourseAds.play("end").then(finishReview).catch(finishReview);return}}
  RV.loading=true;
  $("rv-fill").style.width="100%";
  $("rv-foot").innerHTML='<button disabled>'+L.loading+'</button>';
  fetch("/api/miniapp/mistakes/review/complete",{method:"POST",headers:{"X-Telegram-Init-Data":INIT_DATA,"Content-Type":"application/json"},
    body:JSON.stringify({session_id:RV.session,answers:RV.answers})})
  .then(function(r){return r.json()}).then(function(d){
    if(!d||!d.ok){alert(L.err);closeReview();location.reload();return}
    clearReviewAccessRef();
    renderResult(d);
  }).catch(function(){alert(L.err);closeReview();location.reload()});
}
function renderResult(d){
  var xp=(d.reward&&d.reward.awarded_xp)||0;
  var rm=d.remaining>0?'<div class="rm">'+L.resRemaining+': '+d.remaining+'</div>':'<div class="rm">'+L.resAll+'</div>';
  $("rv-body").innerHTML='<div class="rv-res"><div class="ic"><i class="ti ti-trophy"></i></div><h3>'+L.resTitle+'</h3><div class="sc">'+d.score+' / '+d.total+'</div><div style="font-size:13px;color:var(--ink2)">'+L.resScore+'</div>'+(xp>0?'<div class="xp">+'+xp+' XP</div>':'')+rm+'</div>';
  $("rv-foot").innerHTML='<button onclick="closeReview();location.reload()"><i class="ti ti-check"></i> '+L.done+'</button>';
  haptic("success");
}
function showLimit(adAvailable){
  if(window.CourseAds&&CourseAds.showLimitPromo){CourseAds.showLimitPromo({adAvailable:adAvailable,reason:L.limitWhy,onSubscribe:goPay,onContinueAd:startAdSupported,onBack:function(){}});return}
  var ab=document.getElementById("lim-ad");
  if(ab){
    if(adAvailable){document.getElementById("lim-ad-t").textContent=L.adCont;ab.hidden=false;$("lim-text").textContent=L.adLimitText;}
    else{ab.hidden=true;$("lim-text").textContent=L.limitText;}
  }
  $("limit").hidden=false;
}
function closeLimit(){$("limit").hidden=true}
function goPay(){location.href="/subscription.html?lang="+LANG+"&mode=subscription&source=v3_mistake_review"}

function loadMoreMistakes(){loadMistakes(true)}
function loadMistakes(append){
  if(MISTAKE_LOADING)return;MISTAKE_LOADING=true;
  var offset=append?MISTAKE_ITEMS.length:0;
  if(!append)$("content").innerHTML='<div class="state"><i class="ti ti-loader-2"></i><div>'+esc(L.loading)+'</div></div>';
  var url="/api/miniapp/mistakes?limit=30&offset="+offset+(ACTIVE_CAT!=="all"?"&category="+encodeURIComponent(ACTIVE_CAT):"");
  fetch(url,{headers:{"X-Telegram-Init-Data":INIT_DATA}}).then(function(r){if(!r.ok)throw new Error("load");return r.json()}).then(function(d){
    var incoming=(d&&d.items)||[];MISTAKE_ITEMS=append?MISTAKE_ITEMS.concat(incoming):incoming;
    MISTAKE_SUMMARY=(d&&d.summary)||{total:MISTAKE_ITEMS.length,categories:{}};
    MISTAKE_PAGE=(d&&d.pagination)||{offset:offset,limit:30,returned:incoming.length,has_more:false};MISTAKE_LOADING=false;
    if(Number(MISTAKE_SUMMARY.total||0)>0)renderList();else renderEmpty();
  }).catch(function(){MISTAKE_LOADING=false;if(append){alert(L.err)}else{renderLoadError()}});
}
loadMistakes(false);
</script>
</body>
</html>
