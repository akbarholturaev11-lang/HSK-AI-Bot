<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>AI Voice</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.30.0/tabler-icons.min.css" rel="stylesheet">
<style>
:root{--ink:#211D17;--ink2:#6E665B;--ink3:#A89E8E;--paper:#FBF7EF;--card:#FFFFFF;--line:#EAE2D4;--cin:#C2403A;--cin2:#9A2F2B;--cinbg:#FBEDEA;--gold:#C2962F;--jade:#2F7D5E;--safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#CDB792;font-family:-apple-system,"SF Pro Text","Segoe UI",Roboto,sans-serif;color:var(--ink)}
.han{font-family:"Songti SC","STSong","Noto Serif SC",serif;font-weight:600;letter-spacing:1px}
.wrap{max-width:480px;margin:0 auto;height:100vh;position:relative;overflow:hidden;display:flex;flex-direction:column;padding-top:var(--safe-t)}
.bg{position:absolute;inset:0;z-index:0}
.bg svg{width:100%;height:100%}
.top{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;padding:14px 16px 4px}
.ic{width:36px;height:36px;border-radius:50%;background:rgba(251,247,239,.82);border:1px solid rgba(120,95,60,.3);color:#5b4a33;display:flex;align-items:center;justify-content:center;font-size:18px}
.cnt{font-size:13px;color:#4a3c28;font-weight:500;background:rgba(251,247,239,.74);padding:5px 12px;border-radius:14px}
.stage{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:2px;padding:0 24px 4px}
.charwrap{width:214px;height:214px;display:flex;align-items:center;justify-content:center}
.charwrap svg{width:100%;height:100%;filter:drop-shadow(0 6px 10px rgba(60,44,20,.25))}
.mouth{transform-box:fill-box;transform-origin:center}
.speaking .mouth{animation:talk .34s ease-in-out infinite}
@keyframes talk{0%,100%{transform:scaleY(.45)}50%{transform:scaleY(1.05)}}
.nm{font-size:16px;font-weight:500;color:#3c2f1d;text-shadow:0 1px 0 rgba(255,250,240,.5)}
.st{font-size:13px;color:#5b4a33;height:18px}
.sub{position:relative;z-index:2;margin:8px 16px 0;background:rgba(251,247,239,.88);backdrop-filter:blur(8px);border:1px solid rgba(120,95,60,.22);border-radius:18px;padding:14px 16px;text-align:center;min-height:104px}
.sub .zh{font-size:23px;line-height:1.35;color:var(--ink)}
.sub .py{font-size:15px;color:var(--cin2);font-weight:500;margin:6px 0 5px}
.sub .tr{font-size:14px;color:var(--ink2)}
.dots{display:flex;justify-content:center;gap:5px;height:13px;margin-top:6px}
.dots i{width:7px;height:7px;border-radius:50%;background:#b3a382;opacity:.4}
.dots.rec i{background:var(--cin);animation:bl .9s ease-in-out infinite}
.dots.rec i:nth-child(2){animation-delay:.15s}.dots.rec i:nth-child(3){animation-delay:.3s}
@keyframes bl{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}
.ctrl{position:relative;z-index:2;display:flex;justify-content:center;align-items:center;padding:14px 0 calc(28px + var(--safe-b))}
.ctrlw{position:relative;width:100%;display:flex;justify-content:center}
.mic{width:80px;height:80px;border-radius:50%;background:var(--cin);color:#fff;border:3px solid rgba(251,247,239,.7);font-size:32px;display:flex;align-items:center;justify-content:center}
.mic.rec{background:var(--cin2)}
.mic.rec:after{content:"";position:absolute;width:80px;height:80px;border-radius:50%;border:3px solid var(--cin);animation:pr 1.2s ease-out infinite}
@keyframes pr{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.5);opacity:0}}
.end{position:absolute;right:40px;top:14px;width:52px;height:52px;border-radius:50%;background:rgba(251,247,239,.85);border:1px solid rgba(120,95,60,.3);color:var(--cin);font-size:23px}
.done{position:absolute;inset:0;background:rgba(33,25,15,.55);backdrop-filter:blur(3px);display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px;z-index:10}
.done.on{display:flex}
.dcard{background:var(--paper);border-radius:22px;padding:26px 22px;width:100%}
.done .b{width:100%;background:var(--cin);color:#fff;border:none;border-radius:14px;padding:15px;font-family:inherit;font-size:16px;font-weight:500;margin-top:18px}
.done .b2{width:100%;background:none;border:none;color:var(--ink2);font-family:inherit;font-size:14px;padding:12px 0 2px}
.done p{font-size:14px;color:var(--ink2);margin:6px 0 0}
.done h3{font-size:21px;font-weight:500;margin:6px 0 0}
.dchar{width:130px;height:130px;margin:0 auto}
.corr{text-align:left;margin-top:14px;max-height:148px;overflow-y:auto}
.corr .ct{font-size:12px;font-weight:600;color:var(--cin2);margin-bottom:6px}
.corr .ci{font-size:13px;color:var(--ink);background:var(--cinbg);border:1px solid rgba(194,64,58,.18);border-radius:10px;padding:8px 10px;margin-bottom:6px;line-height:1.4}
</style>
</head>
<body>
<div class="wrap">
  <div class="bg" id="bg"></div>
  <div class="top">
    <button class="ic" onclick="swap()" aria-label="personaj"><i class="ti ti-refresh"></i></button>
    <span class="cnt" id="cnt">对话 1 / 7</span>
    <button class="ic" onclick="goBack()" aria-label="yopish"><i class="ti ti-chevron-down"></i></button>
  </div>
  <div class="stage">
    <div class="charwrap speaking" id="char"></div>
    <div class="nm" id="nm">阿宝 · Aobao</div>
    <div class="st" id="status"></div>
  </div>
  <div class="sub">
    <div class="zh han" id="zh"></div>
    <div class="py" id="py"></div>
    <div class="tr" id="tr"></div>
    <div class="dots" id="dots"><i></i><i></i><i></i></div>
  </div>
  <div class="ctrl"><div class="ctrlw">
    <button class="mic" id="mic" onclick="talk()" aria-label="gapirish"><i class="ti ti-microphone"></i></button>
    <button class="end" onclick="endCall()" aria-label="tugatish"><i class="ti ti-phone-off"></i></button>
  </div></div>
  <div class="done" id="done"><div class="dcard">
    <div class="dchar" id="dchar"></div>
    <h3 id="dh"></h3><p id="dp"></p>
    <div class="corr" id="dcorr"></div>
    <button class="b" onclick="reset()"><i class="ti ti-refresh"></i> <span id="db"></span></button>
    <button class="b2" onclick="goBack()" id="db2"></button>
  </div></div>
  <div class="done" id="paywall"><div class="dcard">
    <div class="dchar" id="pwchar"></div>
    <h3 id="pwh"></h3><p id="pwp"></p>
    <button class="b" onclick="goPremium()"><i class="ti ti-crown"></i> <span id="pwb"></span></button>
    <button class="b2" onclick="goBack()" id="pwb2"></button>
  </div></div>
</div>
<script>

var L={ru:{speaking:"Говорит…",listening:"Слушаю вас…",analyzing:"Анализирую…",connecting:"Соединение…",tapStart:"Нажмите микрофон и говорите",baoName:"阿宝 · Aobao",liName:"李老师 · Li Laoshi",doneTitle:"Хороший разговор!",replWord:"реплик",corrTitle:"Что подправить",again:"Ещё разговор",exit:"Выйти",micDeny:"Разрешите доступ к микрофону в настройках Telegram.",sendErr:"Ошибка. Попробуйте ещё раз.",tooShort:"Слишком коротко. Скажите ещё раз.",noSupport:"Запись голоса недоступна на этом устройстве.",startBot:"Сначала откройте бота и нажмите /start.",limitTitle:"Лимит достигнут",limitSub:"Бесплатный разговор использован. Откройте Premium для безлимита.",premiumBtn:"Открыть Premium"},

var tg=window.Telegram&&window.Telegram.WebApp;if(tg){try{tg.ready();tg.expand()}catch(e){}}
function goBack(){location.href="/course-v3.html?lang="+LANG+"&tab=voice"}
function tr(m){return !m?"":(typeof m==="string"?m:(m[LANG]||m.ru||m.uz||""))}
function speak(t){try{window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);u.lang="zh-CN";u.rate=.85;window.speechSynthesis.speak(u)}catch(e){}}
var ac;function ring(s){try{ac=ac||new(window.AudioContext||window.webkitAudioContext)();var t=ac.currentTime;s.forEach(function(f,k){var o=ac.createOscillator(),g=ac.createGain();o.type="sine";o.frequency.value=f;o.connect(g);g.connect(ac.destination);var st=t+k*0.08;g.gain.setValueAtTime(0.0001,st);g.gain.exponentialRampToValueAtTime(0.1,st+0.02);g.gain.exponentialRampToValueAtTime(0.0001,st+0.15);o.start(st);o.stop(st+0.17)})}catch(e){}}

/* ---- sepia bamboo forest background ---- */
function forest(){
  var W=200,H=440,s='<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid slice">';
  s+='<rect width="'+W+'" height="'+H+'" fill="#CDB792"/><rect width="'+W+'" height="170" fill="#D8C8A8" opacity="0.55"/>';
  var st=[{x:24,w:11,t:"#B3A684",o:.5},{x:158,w:10,t:"#B3A684",o:.5},{x:44,w:9,t:"#B3A684",o:.4},{x:70,w:15,t:"#8E7A55",o:.7},{x:124,w:16,t:"#8E7A55",o:.7},{x:-10,w:26,t:"#5E4A30",o:.92},{x:188,w:28,t:"#5E4A30",o:.92},{x:172,w:13,t:"#6E5A3C",o:.8}];
  st.forEach(function(b){s+='<g opacity="'+b.o+'"><rect x="'+b.x+'" y="-10" width="'+b.w+'" height="'+(H+10)+'" rx="'+(b.w/2)+'" fill="'+b.t+'"/>';for(var y=20;y<H;y+=54){s+='<rect x="'+(b.x-2)+'" y="'+y+'" width="'+(b.w+4)+'" height="4" rx="2" fill="rgba(40,28,12,0.22)"/><rect x="'+(b.x-2)+'" y="'+(y+3)+'" width="'+(b.w+4)+'" height="2" rx="1" fill="rgba(255,245,225,0.18)"/>'}s+='</g>'});
  [[30,40,-35],[170,54,30],[150,30,20],[56,26,-25],[110,20,15]].forEach(function(l){s+='<g transform="translate('+l[0]+','+l[1]+') rotate('+l[2]+')" opacity="0.55"><path d="M0 0 q22 -7 40 4 q-20 9 -40 -4 z" fill="#6f6536"/></g>'});
  s+='<rect width="'+W+'" height="150" y="'+(H-150)+'" fill="#CDB792" opacity="0.45"/><rect width="'+W+'" height="'+H+'" fill="#E9DcC0" opacity="0.12"/></svg>';
  return s;
}
document.getElementById("bg").innerHTML=forest();

/* ---- panda persona ---- */
function chr(mood,p){
  var scarf=p==="li"?"#2C3A4A":"#C2403A",scarf2=p==="li"?"#1f2b38":"#9A2F2B",eyes,mouth,glass="";
  if(mood==="happy"){eyes='<path d="M70 96 q9 -9 18 0" fill="none" stroke="#211D17" stroke-width="3.4" stroke-linecap="round"/><path d="M112 96 q9 -9 18 0" fill="none" stroke="#211D17" stroke-width="3.4" stroke-linecap="round"/>';mouth='<path d="M86 118 q14 14 28 0 z" fill="#9A2F2B"/>';}
  else if(mood==="listen"){eyes='<circle cx="79" cy="95" r="9" fill="#fff"/><circle cx="121" cy="95" r="9" fill="#fff"/><circle cx="79" cy="91" r="5" fill="#211D17"/><circle cx="121" cy="91" r="5" fill="#211D17"/><path d="M68 80 q11 -6 22 0" fill="none" stroke="#211D17" stroke-width="2.6" stroke-linecap="round"/><path d="M110 80 q11 -6 22 0" fill="none" stroke="#211D17" stroke-width="2.6" stroke-linecap="round"/>';mouth='<circle class="mouth" cx="100" cy="120" r="4" fill="#9A2F2B"/>';}
  else{eyes='<circle cx="79" cy="95" r="9" fill="#fff"/><circle cx="121" cy="95" r="9" fill="#fff"/><circle cx="79" cy="95" r="5" fill="#211D17"/><circle cx="121" cy="95" r="5" fill="#211D17"/>';mouth='<ellipse class="mouth" cx="100" cy="121" rx="9" ry="8" fill="#9A2F2B"/>';}
  if(p==="li"){glass='<circle cx="79" cy="95" r="15" fill="none" stroke="#2C3A4A" stroke-width="2.6"/><circle cx="121" cy="95" r="15" fill="none" stroke="#2C3A4A" stroke-width="2.6"/><path d="M94 95 h12" stroke="#2C3A4A" stroke-width="2.6"/>';}
  return '<svg viewBox="0 0 200 210"><path d="M52 205 q-6 -60 18 -84 h60 q24 24 18 84 z" fill="#fff" stroke="#211D17" stroke-width="2.5"/><path d="M60 132 q40 20 80 0 l-6 20 q-34 16 -68 0 z" fill="'+scarf+'"/><path d="M128 150 l14 26 -16 -4 -4 -16 z" fill="'+scarf2+'"/><circle cx="64" cy="58" r="22" fill="#211D17"/><circle cx="136" cy="58" r="22" fill="#211D17"/><circle cx="64" cy="58" r="10" fill="#3a352f"/><circle cx="136" cy="58" r="10" fill="#3a352f"/><circle cx="100" cy="86" r="54" fill="#fff" stroke="#211D17" stroke-width="2.5"/><ellipse cx="79" cy="92" rx="15" ry="20" fill="#211D17" transform="rotate(-12 79 92)"/><ellipse cx="121" cy="92" rx="15" ry="20" fill="#211D17" transform="rotate(12 121 92)"/>'+eyes+glass+'<ellipse cx="100" cy="110" rx="8" ry="5.5" fill="#211D17"/>'+mouth+'</svg>';
}
/* ---- real backend wiring (STT + AI reply via /api/voice-practice) ---- */
var $=function(id){return document.getElementById(id)};
function initData(){return (tg&&tg.initData)?tg.initData:""}
var PERS={bao:{role:"friend",voice:"female",name:L.baoName},li:{role:"teacher_li",voice:"male",name:L.liName}};
var persona="bao";
var ME={level:"hsk1",language:LANG,is_paid:false};
var sess=null,turn=0,maxDialogs=7,corrections=[],busy=false,started=false;
var mediaStream=null,mediaRecorder=null,chunks=[],autoStop=null;
var MAX_REC_MS=20000,MIN_BYTES=1200;

function setChar(m){$("char").innerHTML=chr(m,persona);$("char").className="charwrap"+(m==="talk"?" speaking":"")}
function setStatus(t){$("status").textContent=t||""}
function setDots(c){$("dots").className=c}
function setMicRec(on){if(on)$("mic").classList.add("rec");else $("mic").classList.remove("rec")}
function setCnt(){$("cnt").textContent="对话 "+Math.min(turn+1,maxDialogs)+" / "+maxDialogs}
function showLine(zh,py,trx){$("zh").textContent=zh||"";$("py").textContent=py||"";$("tr").textContent=trx||""}
function setName(){$("nm").textContent=PERS[persona].name}
function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]})}
function jr(r){return r.json().then(function(j){return {ok:r.ok,status:r.status,j:j}})}

function init(){
  setName();setChar("talk");setStatus(L.connecting);setCnt();showLine("","",L.tapStart);
  fetch("/api/voice-practice/me?initData="+encodeURIComponent(initData())).then(jr)
    .then(function(o){if(o.ok&&o.j){ME.level=o.j.level||"hsk1";ME.language=o.j.language||LANG;ME.is_paid=!!o.j.is_paid}
      setChar("happy");setStatus(L.tapStart);})
    .catch(function(){setChar("happy");setStatus(L.tapStart)});
}

function talk(){
  if(busy)return;
  if(!started){startSession();return;}
  if(mediaRecorder&&mediaRecorder.state!=="inactive"){stopRecording();return;}
  startRecording();
}

function startSession(){
  busy=true;setStatus(L.connecting);setChar("talk");setDots("dots");
  fetch("/api/voice-practice/session/start",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({initData:initData(),role:PERS[persona].role,level:ME.level,language:ME.language,voice:PERS[persona].voice})}).then(jr)
   .then(function(o){busy=false;
      if(!o.ok){onStartError(o);return;}
      sess=o.j.session_id;maxDialogs=Number(o.j.max_dialogs)||7;turn=0;corrections=[];started=true;setCnt();
      var op=o.j.opening_message||{};
      showLine(op.chinese_reply||"",op.pinyin||"",op.translation||"");
      setChar("talk");setStatus(L.speaking);speak(op.chinese_reply||"");ring([587,740]);
      setTimeout(function(){if(started){setChar("happy");setStatus(L.tapStart);setDots("dots")}},1100);
   }).catch(function(){busy=false;setChar("happy");setStatus(L.sendErr)});
}
function onStartError(o){
  setChar("happy");setDots("dots");
  var code=o.j&&o.j.code;
  if(code==="LIMIT_EXCEEDED"||o.status===403){showPaywall();return;}
  if(code==="USER_NOT_FOUND"){setStatus(L.startBot);return;}
  setStatus(L.sendErr);
}

function pickMime(){var c=["audio/webm;codecs=opus","audio/webm","audio/mp4","audio/aac","audio/ogg;codecs=opus"];
  if(!window.MediaRecorder||!MediaRecorder.isTypeSupported)return"";
  for(var i=0;i<c.length;i++){if(MediaRecorder.isTypeSupported(c[i]))return c[i]}return""}
function startRecording(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){setStatus(L.noSupport);return;}
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    mediaStream=stream;var mime=pickMime();chunks=[];
    var opts={audioBitsPerSecond:32000};if(mime)opts.mimeType=mime;
    try{mediaRecorder=new MediaRecorder(stream,opts)}catch(_){mediaRecorder=mime?new MediaRecorder(stream,{mimeType:mime}):new MediaRecorder(stream)}
    mediaRecorder.ondataavailable=function(e){if(e.data&&e.data.size>0)chunks.push(e.data)};
    mediaRecorder.onstop=onStopped;mediaRecorder.start(250);
    try{navigator.vibrate&&navigator.vibrate(20)}catch(e){}
    setChar("listen");setStatus(L.listening);setMicRec(true);setDots("dots rec");
    clearTimeout(autoStop);autoStop=setTimeout(stopRecording,MAX_REC_MS);
  }).catch(function(){setStatus(L.micDeny)});
}
function stopRecording(){clearTimeout(autoStop);if(mediaRecorder&&mediaRecorder.state!=="inactive"){setMicRec(false);setDots("dots");setChar("talk");setStatus(L.analyzing);mediaRecorder.stop();}}
function stopHard(){clearTimeout(autoStop);try{if(mediaRecorder&&mediaRecorder.state!=="inactive")mediaRecorder.stop()}catch(e){}try{if(mediaStream)mediaStream.getTracks().forEach(function(t){t.stop()})}catch(e){}mediaStream=null;}
function onStopped(){
  var blob=new Blob(chunks,{type:(mediaRecorder&&mediaRecorder.mimeType)||"audio/webm"});
  try{if(mediaStream)mediaStream.getTracks().forEach(function(t){t.stop()})}catch(e){}mediaStream=null;
  if(blob.size<MIN_BYTES){setChar("happy");setStatus(L.tooShort);setDots("dots");return;}
  busy=true;setChar("talk");setStatus(L.analyzing);setDots("dots");
  var fd=new FormData();fd.append("initData",initData());fd.append("session_id",sess);fd.append("audio",blob,"voice.webm");
  fetch("/api/voice-practice/message",{method:"POST",body:fd}).then(jr)
    .then(function(o){busy=false;if(!o.ok){onMsgError(o);return;}renderReply(o.j)})
    .catch(function(){busy=false;setChar("happy");setStatus(L.sendErr)});
}
function onMsgError(o){
  setChar("happy");setDots("dots");
  var code=o.j&&o.j.code;
  if(code==="LIMIT_EXCEEDED"){showPaywall();return;}
  if(code==="SESSION_NOT_FOUND"){started=false;sess=null;setStatus(L.sendErr);return;}
  setStatus(L.sendErr);
}
function renderReply(res){
  if(!res){setStatus("");return;}
  if(res.correction)corrections.push(res.correction);
  turn=Number(res.turn_count)||turn+1;if(res.max_dialogs)maxDialogs=Number(res.max_dialogs);setCnt();
  showLine(res.chinese_reply||"",res.pinyin||"",res.translation||"");
  setChar("talk");setStatus(L.speaking);speak(res.chinese_reply||"");ring(persona==="li"?[523,659]:[587,740]);
  if(res.session_should_end){setTimeout(endCall,1300);return;}
  setTimeout(function(){if(started){setChar("happy");setStatus(L.tapStart);setDots("dots")}},1100);
}
function endCall(){
  if(!started||!sess){showDone(turn,0,corrections);return;}
  stopHard();var sid=sess;started=false;sess=null;
  fetch("/api/voice-practice/session/end",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({initData:initData(),session_id:sid})}).then(function(r){return r.json()})
   .then(function(j){var rw=j&&j.reward||{};var xp=rw.xp_awarded||rw.xp||0;showDone((j&&j.message_count)||turn,xp,(j&&j.corrections)||corrections)})
   .catch(function(){showDone(turn,0,corrections)});
}
function showDone(count,xp,corrs){
  $("dchar").innerHTML=chr("happy",persona);
  $("dh").textContent=L.doneTitle;
  $("dp").textContent=count+" "+L.replWord+(xp?(" · +"+xp+" XP"):"");
  var html="";if(corrs&&corrs.length){html='<div class="ct">'+L.corrTitle+'</div>';corrs.forEach(function(c){if(String(c||"").trim())html+='<div class="ci">'+esc(c)+'</div>'})}
  $("dcorr").innerHTML=html;
  $("db").textContent=L.again;$("db2").textContent=L.exit;
  $("done").classList.add("on");ring([659,784,988]);
}
function showPaywall(){
  $("pwchar").innerHTML=chr("happy",persona);
  $("pwh").textContent=L.limitTitle;$("pwp").textContent=L.limitSub;
  $("pwb").textContent=L.premiumBtn;$("pwb2").textContent=L.exit;
  $("paywall").classList.add("on");
}
function goPremium(){location.href="/subscription.html?lang="+LANG}
function reset(){
  $("done").classList.remove("on");started=false;sess=null;turn=0;corrections=[];
  setName();setChar("happy");setStatus(L.tapStart);setDots("dots");showLine("","",L.tapStart);setCnt();
}
function swap(){
  if(busy)return;
  stopHard();
  if(sess){fetch("/api/voice-practice/session/end",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({initData:initData(),session_id:sess})}).catch(function(){})}
  persona=(persona==="bao"?"li":"bao");started=false;sess=null;turn=0;corrections=[];
  setName();setChar("happy");setStatus(L.tapStart);setDots("dots");showLine("","",L.tapStart);setCnt();
}
init();
</script>
