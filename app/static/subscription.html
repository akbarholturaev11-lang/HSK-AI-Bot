<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>HSK AI Subscription</title>
<style>
:root{
  color-scheme:dark;
  --bg:#05110d;
  --line:rgba(180,240,214,.13);
  --line2:rgba(180,240,214,.32);
  --text:#eafff6;
  --muted:#93b7ab;
  --emerald:#34e3a4;
  --emerald2:#16c98a;
  --mint:#8ff5cf;
  --gold:#ffd27d;
  --radius:18px;
  --radius-sm:13px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
html,body{width:100%;min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font)}
body{overflow-x:hidden;position:relative;background:radial-gradient(125% 80% at 50% -8%,#0d3127 0%,#08201a 44%,#05110d 100%)}
body.mode-referral_discount{--gold:#ffe08f}
body.mode-admin_discount{--gold:#ffd36d;--emerald:#62e6b2;--mint:#a8f7d8}
body.mode-feedback_discount{--gold:#ffd08a;--emerald:#74e7ff;--mint:#c2f7ff}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(58% 40% at 82% 6%,rgba(52,227,164,.16),transparent 70%),
    radial-gradient(52% 34% at 10% 16%,rgba(255,210,125,.10),transparent 70%)}
button,input{font:inherit}
button{border:0;color:inherit;background:none;touch-action:manipulation;cursor:pointer}
button:active{transform:scale(.98)}
.app{position:relative;z-index:1;min-height:100dvh;max-width:520px;margin:0 auto;padding:calc(16px + env(safe-area-inset-top,0px)) 15px calc(110px + env(safe-area-inset-bottom,0px))}
.top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:14px}
.brand{display:flex;flex-direction:column;gap:4px}
.kicker{font-size:11px;color:var(--emerald);font-weight:800;text-transform:uppercase;letter-spacing:.14em}
h1{font-size:27px;line-height:1.06;font-weight:900;letter-spacing:-.01em}
.top-actions{display:flex;align-items:center;gap:8px;flex:0 0 auto}
.lang{display:grid;grid-template-columns:repeat(3,34px);gap:4px;padding:4px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.04);backdrop-filter:blur(8px)}
.lang button{height:28px;border-radius:999px;color:var(--muted);font-size:12px;font-weight:850;transition:.16s}
.lang button.active{background:linear-gradient(135deg,var(--emerald),var(--emerald2));color:#04130d;box-shadow:0 4px 14px rgba(52,227,164,.4)}
.help-btn{width:38px;height:38px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--mint);font-size:17px;font-weight:950;box-shadow:0 8px 22px rgba(0,0,0,.18)}
.status{display:none;margin:0 0 12px;border:1px solid rgba(255,210,125,.3);border-radius:var(--radius-sm);background:rgba(255,210,125,.1);padding:11px 13px;color:#ffe3ad;font-size:12px;line-height:1.4;font-weight:750}
.status.show{display:block}
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:16px}
.steps i{height:5px;border-radius:999px;background:rgba(255,255,255,.09);transition:.3s}
.steps i.active{background:linear-gradient(90deg,var(--emerald),var(--mint));box-shadow:0 0 12px rgba(52,227,164,.5)}
.screen{display:none;animation:fade .36s cubic-bezier(.22,.61,.36,1)}
.screen.active{display:block}
.hero{position:relative;border:1px solid var(--line);border-radius:var(--radius);background:linear-gradient(160deg,rgba(52,227,164,.08),rgba(255,255,255,.02));padding:17px;overflow:hidden}
.hero::before{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(135% 100% at 88% -12%,rgba(52,227,164,.16),transparent 55%)}
.hero h2{position:relative;font-size:22px;line-height:1.12;letter-spacing:-.01em;font-weight:900}
.hero p{position:relative;margin-top:9px;color:var(--muted);font-size:13px;line-height:1.5}
.tv{position:relative;margin-bottom:14px;border:1px solid var(--line);border-radius:var(--radius);background:linear-gradient(165deg,rgba(52,227,164,.12),rgba(5,17,13,.55));overflow:hidden;box-shadow:0 0 0 1px rgba(52,227,164,.08),0 16px 40px rgba(0,0,0,.32)}
.tv::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:3;background:radial-gradient(75% 120% at 50% -20%,rgba(52,227,164,.16),transparent 58%)}
.tv-head{position:relative;z-index:2;display:flex;align-items:center;gap:8px;padding:11px 14px 0}
.tv-dot{width:8px;height:8px;border-radius:50%;background:var(--emerald);box-shadow:0 0 11px var(--emerald);animation:pulse 1.9s ease-in-out infinite}
.tv-title{font-size:11px;font-weight:850;letter-spacing:.13em;text-transform:uppercase;color:var(--mint)}
.tv-screen{position:relative;z-index:2;overflow:hidden;-webkit-mask-image:linear-gradient(90deg,transparent,#000 9%,#000 91%,transparent);mask-image:linear-gradient(90deg,transparent,#000 9%,#000 91%,transparent)}
.tv-track{display:flex;gap:9px;width:max-content;padding:12px 14px;animation:marquee 28s linear infinite;will-change:transform}
.tv-screen:active .tv-track{animation-play-state:paused}
.perk{flex:0 0 auto;display:inline-flex;align-items:center;height:38px;padding:0 15px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.05);font-size:13px;font-weight:800;white-space:nowrap;color:var(--text)}
.discount{position:relative;display:flex;flex-direction:column;gap:11px;margin-top:14px;border:1px solid rgba(255,210,125,.34);border-radius:var(--radius);background:linear-gradient(135deg,rgba(255,210,125,.13),rgba(52,227,164,.05));padding:14px;overflow:hidden;animation:fade .4s ease}
.discount::before{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(115% 130% at 6% -25%,rgba(255,210,125,.2),transparent 55%)}
.discount.used{border-color:var(--line);background:rgba(255,255,255,.04)}
.discount-row{position:relative;display:flex;align-items:center;gap:13px}
.discount-badge{flex:0 0 auto;min-width:58px;height:58px;border-radius:15px;display:grid;place-items:center;background:linear-gradient(135deg,var(--gold),#ffba4d);color:#2a1c00;font-size:18px;font-weight:950;box-shadow:0 10px 24px rgba(255,186,77,.3)}
.discount.used .discount-badge{background:rgba(255,255,255,.08);color:var(--muted);box-shadow:none}
.discount-body{flex:1;min-width:0}
.discount-body strong{display:block;font-size:14px;font-weight:900;line-height:1.25}
.discount-body span{display:block;margin-top:4px;color:var(--muted);font-size:12px;line-height:1.38}
.discount-bar{position:relative;height:6px;border-radius:999px;background:rgba(255,255,255,.1);overflow:hidden}
.discount-bar i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--gold),var(--emerald));transition:width .6s cubic-bezier(.22,.61,.36,1)}
.discount-btn{position:relative;height:46px;border-radius:13px;border:1px solid var(--emerald);background:rgba(52,227,164,.13);color:var(--mint);font-weight:850;font-size:13px;transition:.18s}
.discount-btn:active{background:rgba(52,227,164,.2)}
.benefits{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:14px}
.benefit{position:relative;border:1px solid var(--line);border-radius:var(--radius-sm);background:rgba(255,255,255,.04);padding:12px;min-height:78px}
.benefit strong{display:block;font-size:13px;line-height:1.28;font-weight:850}
.benefit span{display:block;margin-top:6px;color:var(--muted);font-size:12px;line-height:1.35}
.section{margin-top:16px}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-bottom:9px}
.section h3{font-size:15px;font-weight:900}
.section small{color:var(--emerald);font-size:12px;font-weight:850;text-align:right}
.plans{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.plan{position:relative;min-height:130px;text-align:left;border:1px solid var(--line);border-radius:var(--radius);background:rgba(255,255,255,.04);padding:14px;display:flex;flex-direction:column;justify-content:space-between;transition:.18s}
.plan.selected,.choice.selected{border-color:var(--emerald);box-shadow:0 0 0 1px var(--emerald),0 10px 30px rgba(52,227,164,.22);background:linear-gradient(160deg,rgba(52,227,164,.14),rgba(52,227,164,.05))}
.plan-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.plan-name{font-size:13px;color:var(--muted);font-weight:850}
.badge{display:inline-flex;align-items:center;justify-content:center;min-height:22px;border-radius:999px;padding:3px 9px;background:linear-gradient(135deg,rgba(255,210,125,.22),rgba(255,186,77,.16));color:var(--gold);font-size:11px;font-weight:900;border:1px solid rgba(255,210,125,.3)}
.price{display:inline-block;font-size:30px;line-height:1;font-weight:950;letter-spacing:-.02em;margin-top:12px;background:linear-gradient(135deg,#ffffff,var(--mint));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.price small{font-size:12px;color:var(--muted);font-weight:850;margin-left:4px;-webkit-text-fill-color:var(--muted)}
.old-price{display:none;margin-top:9px;color:var(--muted);font-size:12px;text-decoration:line-through}
.discounted .old-price{display:block}
.list{display:grid;gap:9px}
.choice{min-height:66px;display:flex;align-items:center;justify-content:space-between;gap:12px;border:1px solid var(--line);border-radius:var(--radius);background:rgba(255,255,255,.04);padding:0 14px;text-align:left;transition:.18s}
.choice strong{display:block;font-size:14px;line-height:1.25;font-weight:850;color:var(--text)}
.choice span{display:block;margin-top:4px;color:var(--muted);font-size:12px;line-height:1.35}
.choice .choice-tx{flex:1;min-width:0;margin-top:0;color:inherit}
.choice-ic{flex:0 0 auto;width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:19px;font-weight:900;color:#fff;box-shadow:0 6px 16px rgba(0,0,0,.28)}
.ic-visa{background:linear-gradient(135deg,#3a6ff7,#1f4fd6)}
.ic-alipay{background:linear-gradient(135deg,#1aa3ff,#1677ff)}
.ic-wechat{background:linear-gradient(135deg,#2dd36f,#07c160)}
.dot{flex:0 0 auto;width:20px;height:20px;border-radius:50%;border:2px solid var(--line2);transition:.18s}
.selected .dot{border-color:var(--emerald);box-shadow:inset 0 0 0 5px var(--bg);background:var(--emerald)}
.quote-card{position:relative;border:1px solid rgba(52,227,164,.4);border-radius:var(--radius);background:linear-gradient(160deg,rgba(52,227,164,.16),rgba(52,227,164,.05));padding:16px;margin-top:14px;overflow:hidden}
.quote-card::before{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(125% 120% at 90% -20%,rgba(52,227,164,.22),transparent 55%)}
.quote-label{position:relative;color:var(--mint);font-size:12px;font-weight:850}
.quote-amount{position:relative;margin-top:8px;font-size:36px;line-height:1;font-weight:950;letter-spacing:-.02em}
.quote-amount small{font-size:15px;color:#cdeee0;font-weight:850;margin-left:6px}
.quote-old{display:none;position:relative;margin-top:8px;color:var(--muted);font-size:12px;line-height:1.25;font-weight:850;text-decoration:line-through}
.quote-old.show{display:block}
.meta{display:grid;gap:8px;margin-top:14px}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px;border:1px solid var(--line);border-radius:var(--radius-sm);background:rgba(255,255,255,.04);padding:11px 13px}
.row span{color:var(--muted);font-size:12px;font-weight:800}
.row strong{font-size:13px;text-align:right;line-height:1.28;font-weight:850}
.paybox{margin-top:14px;border:1px solid var(--line);border-radius:var(--radius);background:rgba(255,255,255,.04);padding:16px}
.paybox h4{font-size:15px;margin-bottom:8px;font-weight:900}
.paybox p,.paybox pre{color:var(--muted);font-size:12px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.detail-hint{display:block;width:100%;margin-bottom:11px;color:#b9dccf;font-size:12px;line-height:1.45;text-align:left}
.detail-hint-text{display:block}
.detail-hint.collapsed .detail-hint-text{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.detail-hint-more{display:block;margin-top:4px;color:var(--mint);font-size:11px;font-weight:900}
.detail-list{display:grid;gap:9px}
.detail-row{display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px;border:1px solid var(--line);border-radius:var(--radius-sm);background:rgba(255,255,255,.045);padding:11px 12px;min-height:48px}
.detail-row span{min-width:0;color:var(--text);font-size:13px;line-height:1.38;font-weight:750;word-break:break-word}
.detail-row.copyable{border-color:rgba(52,227,164,.34);background:linear-gradient(160deg,rgba(52,227,164,.1),rgba(255,255,255,.035))}
.copy-detail{height:34px;min-width:66px;border-radius:10px;background:linear-gradient(135deg,var(--mint),var(--emerald));color:#04130d;font-size:12px;font-weight:950;padding:0 10px}
.detail-empty{border:1px dashed var(--line2);border-radius:var(--radius-sm);padding:16px;color:var(--muted);font-size:13px;line-height:1.45;text-align:center;background:rgba(255,255,255,.035)}
.qr{display:flex;align-items:center;justify-content:center;width:100%;min-height:220px;border:1px dashed var(--line2);border-radius:var(--radius-sm);background:#fff;margin-top:11px;overflow:hidden;transition:border-color .18s ease,box-shadow .18s ease,transform .18s ease}
.qr-tappable{cursor:pointer}
.qr-tappable:active{transform:scale(.99)}
.qr img{display:block;max-width:100%;max-height:280px}
.qr.empty{background:rgba(255,255,255,.04);color:var(--muted);font-size:13px;text-align:center;padding:20px}
.qr-hint{margin-top:9px;text-align:center;color:var(--muted);font-size:12px;line-height:1.35}
.qr-actions{display:grid;grid-template-rows:0fr;opacity:0;transform:translateY(-4px);transition:grid-template-rows .2s ease,opacity .2s ease,transform .2s ease}
.qr-actions.show{grid-template-rows:1fr;opacity:1;transform:translateY(0)}
.qr-actions-inner{overflow:hidden}
.qr-download{width:100%;height:46px;margin-top:10px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--mint),var(--emerald));color:#04130d;font-size:14px;font-weight:950}
.upload{display:block;margin-top:14px;border:1.5px dashed var(--line2);border-radius:var(--radius);background:rgba(255,255,255,.04);padding:14px;cursor:pointer;transition:.18s}
.upload input{display:none}
.upload strong{display:block;font-size:14px;font-weight:850}
.upload span{display:block;margin-top:6px;color:var(--muted);font-size:12px;line-height:1.4}
.upload.ready{border-style:solid;border-color:var(--emerald);background:linear-gradient(160deg,rgba(52,227,164,.14),rgba(52,227,164,.05))}
.done{display:grid;gap:14px;text-align:center;padding-top:54px;animation:fade .3s ease}
.done-mark{position:relative;width:84px;height:84px;border-radius:50%;display:grid;place-items:center;margin:0 auto;background:linear-gradient(135deg,var(--emerald),var(--emerald2));color:#04130d;font-size:42px;font-weight:950;box-shadow:0 0 0 10px rgba(52,227,164,.12),0 18px 50px rgba(52,227,164,.4);animation:pop .45s cubic-bezier(.2,1.3,.4,1)}
.done h2{font-size:25px;font-weight:900}
.done p{color:var(--muted);font-size:13px;line-height:1.5;max-width:320px;margin:0 auto}
.done-return{height:54px;border-radius:var(--radius);background:linear-gradient(135deg,var(--mint),var(--emerald));color:#04130d;font-size:15px;font-weight:950;margin:8px auto 0;padding:0 24px;min-width:190px}
.bottom{position:fixed;left:0;right:0;bottom:0;z-index:5;padding:11px 15px calc(11px + env(safe-area-inset-bottom,0px));background:linear-gradient(180deg,rgba(5,17,13,.35),rgba(5,17,13,.94));backdrop-filter:blur(18px);border-top:1px solid var(--line)}
.bottom-inner{max-width:520px;margin:0 auto;display:grid;grid-template-columns:96px 1fr;gap:9px}
.back,.cta{height:54px;border-radius:var(--radius);font-weight:950;font-size:15px;transition:.18s}
.back{background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--text)}
.back.hide{display:none}
.back.hide+.cta{grid-column:1/3}
.cta{background:linear-gradient(135deg,var(--mint),var(--emerald) 45%,var(--emerald2));color:#04130d;box-shadow:0 10px 30px rgba(52,227,164,.36);letter-spacing:.01em}
.cta:disabled{opacity:.5;box-shadow:none}
.toast{position:fixed;left:50%;bottom:calc(88px + env(safe-area-inset-bottom,0px));transform:translateX(-50%) translateY(12px);max-width:calc(100% - 28px);border-radius:999px;background:linear-gradient(135deg,var(--mint),var(--emerald));color:#04130d;padding:11px 15px;font-size:13px;font-weight:850;opacity:0;pointer-events:none;transition:.2s ease;box-shadow:0 18px 45px rgba(0,0,0,.42);z-index:20}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.sheet{position:fixed;inset:0;z-index:25;display:none;align-items:flex-end;justify-content:center}
.sheet.show{display:flex}
.sheet-backdrop{position:absolute;inset:0;background:rgba(2,8,6,.62);backdrop-filter:blur(8px);transform:none}
.sheet-panel{position:relative;width:100%;max-width:520px;border:1px solid var(--line);border-radius:var(--radius) var(--radius) 0 0;background:#071a14;padding:17px 15px calc(17px + env(safe-area-inset-bottom,0px));box-shadow:0 -18px 60px rgba(0,0,0,.45);animation:sheetUp .22s ease}
.sheet-panel h3{font-size:17px;line-height:1.25;font-weight:900}
.sheet-panel p{margin-top:7px;color:var(--muted);font-size:12px;line-height:1.45}
.invite-link{display:block;margin-top:10px;border:1px solid var(--line2);border-radius:var(--radius-sm);background:rgba(255,255,255,.05);padding:10px 11px;color:var(--mint);font-size:12px;line-height:1.4;word-break:break-all;user-select:all}
.sheet-actions{display:grid;gap:9px;margin-top:14px}
.sheet-actions button{min-height:50px;border-radius:var(--radius-sm);font-weight:900;font-size:14px}
.sheet-primary{background:linear-gradient(135deg,var(--mint),var(--emerald));color:#04130d}
.sheet-secondary{border:1px solid var(--line2);background:rgba(255,255,255,.06);color:var(--text)}
.sheet-close{color:var(--muted)}
.loading{position:fixed;inset:0;display:none;place-items:center;background:rgba(5,17,13,.66);backdrop-filter:blur(8px);z-index:30}
.loading.show{display:grid}
.spinner{width:38px;height:38px;border-radius:50%;border:3px solid rgba(143,245,207,.2);border-top-color:var(--emerald);animation:spin .8s linear infinite}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(.4);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.65)}}
@keyframes sheetUp{from{transform:translateY(18px);opacity:.7}to{transform:translateY(0);opacity:1}}
@media (prefers-reduced-motion:reduce){.tv-track{animation-duration:60s}}
@media (min-width:620px){
  .app{padding-top:26px}
  .bottom{left:50%;right:auto;transform:translateX(-50%);width:520px;border-left:1px solid var(--line);border-right:1px solid var(--line);border-radius:var(--radius) var(--radius) 0 0}
}
@media (max-width:374px){
  .app{padding-left:11px;padding-right:11px}
  .plans,.benefits{grid-template-columns:1fr}
  h1{font-size:24px}
  .quote-amount{font-size:31px}
}
</style>
</head>
<body>
<main class="app">
  <header class="top">
    <div class="brand">
      <div class="kicker">HSK AI</div>
      <h1 id="title">Obuna</h1>
    </div>
    <div class="top-actions">
      <div class="lang" id="langTabs">
        <button type="button" data-lang="uz">UZ</button>
        <button type="button" data-lang="ru">RU</button>
        <button type="button" data-lang="tj">TJ</button>
      </div>
      <button class="help-btn" type="button" id="helpBtn" aria-label="Help">?</button>
    </div>
  </header>

  <div class="status" id="status"></div>
  <div class="steps" id="steps"><i></i><i></i><i></i></div>

  <section class="screen active" data-screen="start">
    <div class="tv">
      <div class="tv-head"><span class="tv-dot"></span><span class="tv-title" id="tvTitle"></span></div>
      <div class="tv-screen"><div class="tv-track" id="tvTrack"></div></div>
    </div>

    <section class="section">
      <div class="section-head">
        <h3 id="plansTitle"></h3>
      </div>
      <div class="plans" id="plans"></div>
    </section>

    <div class="discount" id="discountBox" style="display:none">
      <div class="discount-row">

const state={
  lang:normalizeLang(PARAMS.get("lang")||tg?.initDataUnsafe?.user?.language_code||"uz"),
  mode:normalizeMode(PARAMS.get("mode")),
  campaignId:positiveParam(PARAMS.get("campaign_id")),
  feedbackId:positiveParam(PARAMS.get("feedback_id")),
  preview:!INIT_DATA,
  overview:null,
  plan:PLAN_ORDER.includes(PARAMS.get("plan"))?PARAMS.get("plan"):"10_days",
  method:METHOD_ORDER.includes(PARAMS.get("method"))?PARAMS.get("method"):"visa",
  country:"tj",
  step:0,
  quote:null,
  screenshotDataUrl:"",
  screenshotName:"",
  quoteError:"",
  inviteOpen:false,
  inviteLink:"",
  inviteCopied:false,
  supportOpen:false,
  supportUrl:DEFAULT_SUPPORT_URL,
  busy:false,
  busyOverlay:false,
  done:false,
  pending:false,
  pendingPayment:null,
  qrActionsOpen:false,
  detailHintOpen:false,
  loadError:false
};

function $(selector){return document.querySelector(selector)}
function $$(selector){return Array.from(document.querySelectorAll(selector))}
function tr(){return I18N[state.lang]||I18N.uz}
function normalizeMode(value){
  const mode=String(value||"subscription").toLowerCase();
  return MODE_ORDER.includes(mode)?mode:"subscription";
}
function positiveParam(value){
  const number=Number.parseInt(value||"",10);
  return Number.isFinite(number)&&number>0?number:null;
}
function normalizeLang(value){
  const lang=String(value||"").toLowerCase();
  if(lang==="tg"||lang==="tg-cyrl")return "tj";
  if(["uz","ru","tj"].includes(lang))return lang;
  return "uz";
}
function money(amount){
  const raw=String(amount??"").trim();
  const numeric=Number(raw.replace(/\s/g,""));
  if(Number.isFinite(numeric))return numeric.toLocaleString("ru-RU");
  return raw||"...";
}
function priceInfo(method=state.method,plan=state.plan){
  const real=state.overview?.prices?.[method]?.[plan];
  if(real)return real;
  return state.preview?mockOverview().prices?.[method]?.[plan]||null:null;
}
function availableMethods(){
  const prices=state.overview?.prices||mockOverview().prices;
  return METHOD_ORDER.filter(method=>Object.keys(prices?.[method]||{}).length>0);
}
function availablePlans(method=state.method){
  const prices=state.overview?.prices||mockOverview().prices;
  return PLAN_ORDER.filter(plan=>prices?.[method]?.[plan]);
}
function ensureSelection(){
  const methods=availableMethods();
  if(!methods.includes(state.method))state.method=methods[0]||"visa";
  const plans=availablePlans(state.method);
  if(!plans.includes(state.plan))state.plan=plans[0]||"10_days";
}
function contextPayload(){
  return {
    mode:state.mode,
    campaign_id:state.campaignId,
    feedback_id:state.feedbackId
  };
}
function hasCurrentPrice(){return Boolean(priceInfo(state.method,state.plan))}
function flow(){return state.done||state.pending?["done"]:(state.method==="visa"?["start","country","pay"]:["start","pay"])}
function currentScreen(){return flow()[state.step]||"start"}
function api(path,body){
  return fetch(path,{
    method:"POST",
    headers:{"Content-Type":"application/json","X-Telegram-Init-Data":INIT_DATA},
    body:JSON.stringify(body||{})
  }).then(async response=>{
    const data=await response.json().catch(()=>({ok:false,error:"bad_json"}));
    if(!response.ok||!data.ok)throw new Error(errorText(data.error||"api_error"));
    return data;
  });
}
function errorText(code){
  const text=tr();
  const errors={
    invalid_telegram_init_data:text.invalidTelegram,
    payment_details_missing:text.paymentDetailsMissing,
    admin_notification_failed:text.adminNotificationFailed,
    qr_not_ready:text.qrMissing,
    payment_invalid_plan:text.offerExpired,
    access_start_first:text.invalidTelegram,
    bad_json:text.error,
    api_error:text.error
  };
  return errors[code]||text.error;
}
function mockOverview(){
  const special=state.mode==="admin_discount"||state.mode==="feedback_discount";
  const percent=state.mode==="admin_discount"?30:(state.mode==="feedback_discount"?20:0);
  const apply=item=>special?{
    ...item,
    final_amount:Math.round(item.base_amount*(100-percent)/100),
    discount_applied:true,
    discount_percent:percent,
    discount_source:state.mode==="admin_discount"?"admin_campaign":"feedback_price_offer",
    discount_title:state.mode==="admin_discount"?"Preview admin discount":"Preview feedback discount"
  }:item;
  return {
    ok:true,
    language:state.lang,
    mode:state.mode,
    pending_payment:null,
    offer:special?{type:state.mode,available:true,percent,title:"Preview discount"}:null,
    discount:{referral_20_available:false,referral_count:0,referral_required:3,discount_used:false,offer_started:false,referral_link:""},
    payment_details:"Preview karta rekviziti\nNAME: HSK AI\nCARD: 0000 0000 0000 0000",
    prices:{
      visa:{
        "10_days":apply({base_amount:29,final_amount:29,currency:"TJS",discount_applied:false,discount_percent:0}),
        "1_month":apply({base_amount:89,final_amount:89,currency:"TJS",discount_applied:false,discount_percent:0})
      },
      alipay:{
        "10_days":apply({base_amount:29,final_amount:29,currency:"¥",discount_applied:false,discount_percent:0}),
        "1_month":apply({base_amount:66,final_amount:66,currency:"¥",discount_applied:false,discount_percent:0})
      },
      wechat:{
        "10_days":apply({base_amount:29,final_amount:29,currency:"¥",discount_applied:false,discount_percent:0}),
        "1_month":apply({base_amount:66,final_amount:66,currency:"¥",discount_applied:false,discount_percent:0})
      }
    }
  };
}
function mockQuote(){
  const info=priceInfo();
  if(!info)return null;
  const cardAmount=tjsAmount=>({
    tj:{amount:tjsAmount,currency:"TJS",rate:"1 TJS = 1 TJS"},
    uz:{amount:Math.round(tjsAmount*1300/1000)*1000,currency:"UZS",rate:"1 TJS = 1 298.13 UZS"},
    ru:{amount:(tjsAmount*7.68).toFixed(2),currency:"RUB",rate:"1 TJS = 7.68 RUB"},
    other:{amount:(tjsAmount/9.2464).toFixed(2),currency:"USD",rate:"1 TJS = 0.1082 USD"}
  }[state.country]||{amount:tjsAmount,currency:"TJS",rate:"1 TJS = 1 TJS"});
  const card=cardAmount(info.final_amount);
  const baseCard=cardAmount(info.base_amount);
  return {
    plan_type:state.plan,
    payment_method:state.method,
    card_country:state.method==="visa"?state.country:null,
    base_amount:info.base_amount,
    base_currency:info.currency,
    final_amount:info.final_amount,
    final_currency:info.currency,
    pay_amount:state.method==="visa"?card.amount:info.final_amount,
    pay_currency:state.method==="visa"?card.currency:info.currency,
    pay_base_amount:state.method==="visa"?baseCard.amount:info.base_amount,
    pay_base_currency:state.method==="visa"?baseCard.currency:info.currency,
    exchange_rate:state.method==="visa"?card.rate:"",
    discount_applied:info.discount_applied,
    discount_percent:info.discount_percent,
    payment_details:state.method==="visa"?(state.overview?.payment_details||mockOverview().payment_details):"",
    qr:state.method==="visa"?null:{available:false}
  };
}
function fallbackOverview(){
  const mock=mockOverview();
  return {
    ok:true,
    language:state.lang,
    mode:state.mode,
    pending_payment:null,
    offer:null,
    discount:null,
    payment_details:"",
    prices:mock.prices
  };
}
function applyOverview(data){
  state.overview=data;
  state.mode=normalizeMode(data?.mode||state.mode);
  state.supportUrl=data?.support_url||DEFAULT_SUPPORT_URL;
  state.pending=Boolean(data?.pending_payment);
  state.pendingPayment=data?.pending_payment||null;
  ensureSelection();
  if(state.pending){
    state.done=false;
    state.step=0;
    state.quote=null;
    state.qrActionsOpen=false;
    state.screenshotDataUrl="";
    state.screenshotName="";
  }
}
async function loadOverview(){
  setBusy(true,false);
  try{
    if(state.preview){
      applyOverview(mockOverview());
    }else{
      const data=await api(API.overview,contextPayload());
      applyOverview(data);
      state.lang=normalizeLang(PARAMS.get("lang")||data.language||state.lang);
      state.loadError=false;
    }
  }catch(error){
    if(!INIT_DATA){
      state.preview=true;
      applyOverview(mockOverview());
    }else{
      state.loadError=true;
      applyOverview(state.overview||fallbackOverview());
    }
    toast(state.preview?tr().preview:tr().loadError);
  }finally{
    setBusy(false);
    render();
  }
}
async function loadQuote(){
  setBusy(true);
  state.quoteError="";
  state.qrActionsOpen=false;
  state.detailHintOpen=false;
  try{
    if(!hasCurrentPrice())throw new Error(tr().offerExpired);
    if(state.preview){
      state.quote=mockQuote();
    }else{
      const data=await api(API.quote,{
        ...contextPayload(),
        plan_type:state.plan,
        payment_method:state.method,
        card_country:state.method==="visa"?state.country:null
      });
      state.quote=data.quote;
    }
  }catch(error){
    state.quote=null;
    state.quoteError=error.message||tr().quoteError;
    toast(state.quoteError);
  }finally{
    setBusy(false);
    render();
  }
}
function setBusy(value,overlay=true){
  state.busy=Boolean(value);
  state.busyOverlay=Boolean(value&&overlay);
  $("#loading").classList.toggle("show",state.busyOverlay);
  $("#nextBtn").disabled=state.busy;
}
function setStep(step){
  const items=flow();
  state.step=Math.max(0,Math.min(step,items.length-1));
  if(currentScreen()==="pay")loadQuote();
  render();
}
function setLang(lang){
  state.lang=normalizeLang(lang);
  document.documentElement.lang=state.lang;
  render();
}
function modeText(text,key){
  return text[key]?.[state.mode]||text[key]?.subscription||text.title;
}
function localizedOfferField(offer,field){
  if(!offer)return "";
  return offer[`${field}_${state.lang}`]||offer[field]||"";
}
function render(){
  const text=tr();
  document.body.classList.remove("mode-subscription","mode-referral_discount","mode-admin_discount","mode-feedback_discount");
  document.body.classList.add(`mode-${state.mode}`);
  document.documentElement.lang=state.lang;
  $("#title").textContent=modeText(text,"modeTitles");
  $$("#langTabs button").forEach(btn=>btn.classList.toggle("active",btn.dataset.lang===state.lang));
  const statusText=state.preview?text.preview:(state.loadError?text.loadError:"");
  $("#status").textContent=statusText;
  $("#status").classList.toggle("show",Boolean(statusText));
  const items=flow();
  const screen=currentScreen();
  const finalScreen=state.done||state.pending;
  $$(".screen").forEach(node=>node.classList.toggle("active",node.dataset.screen===screen));
  $$("#steps i").forEach((node,index)=>{
    node.style.display=finalScreen||index>=items.length?"none":"block";
    node.classList.toggle("active",index<=state.step);
  });
  $("#bottom").style.display=finalScreen?"none":"block";
  renderStart(text);
  renderCountry(text);
  renderPay(text);
  renderDone(text);
  renderSupportSheet(text);
  $("#backBtn").textContent=text.back;
  $("#nextBtn").textContent=screen==="pay"?text.submit:text.next;
  $("#backBtn").classList.toggle("hide",state.step===0);
  $("#nextBtn").disabled=state.busy||!hasCurrentPrice()||(!state.preview&&state.loadError)||(screen==="pay"&&!state.preview&&!state.quote);
}
function renderStart(text){
  $("#tvTitle").textContent=modeText(text,"modeTv");
  const perks=text.perks||[];
  $("#tvTrack").innerHTML=perks.concat(perks).map(item=>`<span class="perk">${item}</span>`).join("");
  $("#plansTitle").textContent=modeText(text,"modePlans");
  renderDiscount(text);
  renderInviteSheet(text);
  const plans=availablePlans(state.method);
  $("#plans").innerHTML=(plans.length?plans:[]).map(plan=>{
    const info=priceInfo(state.method,plan);
    if(!info)return "";
    const selected=state.plan===plan?"selected":"";
    const discounted=info.discount_applied?"discounted":"";
    const name=plan==="10_days"?text.planLabels.ten:text.planLabels.month;
    const badge=plan==="10_days"?text.planLabels.fast:text.planLabels.best;
    return `<button class="plan ${selected} ${discounted}" type="button" data-plan="${plan}">
      <span class="plan-top"><span class="plan-name">${name}</span><span class="badge">${badge}</span></span>
      <span>
        <span class="price">${money(info.final_amount)}<small>${info.currency}</small></span>
        <span class="old-price">${money(info.base_amount)} ${info.currency}</span>
      </span>
    </button>`;
  }).join("") || `<div class="detail-empty">${text.offerExpired}</div>`;
  $("#methodsTitle").textContent=text.methodsTitle;
  $("#methodHint").textContent=text.methodHint;
  $("#methodHint").style.display=text.methodHint?"block":"none";
  const methodIcons={visa:"💳",alipay:"支",wechat:"微"};
  $("#methods").innerHTML=availableMethods().map(method=>{
    const item=text.methods[method];
    const selected=state.method===method?"selected":"";
    return `<button class="choice ${selected}" type="button" data-method="${method}">
      <i class="choice-ic ic-${method}">${methodIcons[method]||""}</i>
      <span class="choice-tx"><strong>${item[0]}</strong><span>${item[1]}</span></span>
      <i class="dot"></i>
    </button>`;
  }).join("");
}
function renderDiscount(text){
  const discount=state.overview?.discount;
  const offer=state.overview?.offer;
  const box=$("#discountBox");
  const bar=$("#discountBar");
  const btn=$("#discountBtn");
  if(state.mode==="admin_discount"||state.mode==="feedback_discount"){
    box.style.display="flex";
    box.classList.toggle("used",!offer?.available);
    $("#discountBadge").textContent=offer?.available?`${offer.percent||0}%`:"!";
    if(!offer?.available){
      $("#discountTitle").textContent=text.offerExpired;
      $("#discountText").textContent="";
    }else if(state.mode==="admin_discount"){
      $("#discountTitle").textContent=localizedOfferField(offer,"title")||text.adminDiscountTitle.replace("{percent}",offer.percent||0);
      $("#discountText").textContent=localizedOfferField(offer,"reason")||text.adminDiscountText;
    }else{
      $("#discountTitle").textContent=text.feedbackDiscountTitle;
      $("#discountText").textContent=text.feedbackDiscountText;
    }
    bar.style.display="none";
    btn.style.display="none";
    return;
  }
  if(!discount||discount.discount_used){
    box.style.display="none";
    return;
  }
  const required=discount.referral_required||3;
  const count=Math.max(0,Math.min(discount.referral_count||0,required));
  box.style.display="flex";
  box.classList.remove("used");
  $("#discountBadge").textContent="20%";
  if(discount.referral_20_available){
    $("#discountTitle").textContent=text.discountReady;
    $("#discountText").textContent=text.discountActiveText;
    bar.style.display="none";
    btn.style.display="none";
  }else{
    $("#discountTitle").textContent=text.discountLockTitle;
    $("#discountText").textContent=discount.offer_started
      ? text.discountProgress.replace("{count}",count).replace("{required}",required)
      : text.discountInviteText;
    bar.style.display="block";
    bar.firstElementChild.style.width=Math.round(count/required*100)+"%";
    btn.style.display="block";
    btn.textContent=text.discountBtn;
  }
}
function renderDone(text){
  const pending=Boolean(state.pending&&!state.done);
  $("#doneMark").textContent=pending?"…":"✓";
  $("#doneTitle").textContent=pending?text.pendingTitle:text.doneTitle;
  $("#doneText").textContent=pending?text.pendingText:text.doneText;
  $("#botReturnBtn").textContent=text.returnToBot;
}
function renderCountry(text){
  $("#countryTitle").textContent=text.countryTitle;
  $("#countryText").textContent=text.countryText;
  $("#countries").innerHTML=COUNTRY_ORDER.map(country=>{
    const item=text.countries[country];
    const selected=state.country===country?"selected":"";
    return `<button class="choice ${selected}" type="button" data-country="${country}">
      <span><strong>${item[0]}</strong><span>${item[1]}</span></span><i class="dot"></i>
    </button>`;
  }).join("");
}
function renderPay(text){
  const quote=state.quote||(state.preview?mockQuote():null);
  $("#payTitle").textContent=text.payTitle;
  $("#payText").textContent=text.payText;
  $("#amountLabel").textContent=text.amountLabel;
  if(!quote){
    $("#amountValue").textContent="...";
    $("#amountCurrency").textContent="";
    $("#amountOld").textContent="";
    $("#amountOld").classList.remove("show");
    $("#summaryRows").innerHTML="";
    $("#paymentBox").innerHTML=`<h4>${text.detailsTitle}</h4><div class="qr empty">${state.quoteError||text.quoteError}</div>`;
    $("#uploadTitle").textContent=state.screenshotName?text.uploaded.replace("{name}",state.screenshotName):text.uploadTitle;
    $("#uploadText").textContent=text.uploadText;
    $("#uploadBox").classList.toggle("ready",Boolean(state.screenshotDataUrl));
    return;
  }
  $("#amountValue").textContent=money(quote.pay_amount);
  $("#amountCurrency").textContent=quote.pay_currency||"";
  const oldAmount=quote.pay_base_amount??quote.base_amount;
  const oldCurrency=quote.pay_base_currency||quote.base_currency||quote.pay_currency||"";
  const hasOldAmount=Boolean(quote.discount_applied&&oldAmount&&(`${oldAmount}`!==`${quote.pay_amount}`||oldCurrency!==quote.pay_currency));
  $("#amountOld").textContent=hasOldAmount?`${money(oldAmount)} ${oldCurrency}`:"";
  $("#amountOld").classList.toggle("show",hasOldAmount);
  const planText=state.plan==="10_days"?text.planLabels.ten:text.planLabels.month;
  const methodText=text.methods[state.method][0];
  const rows=[
    [text.rows.plan,planText],
    [text.rows.method,methodText]
  ];
  if(state.method==="visa"){
    rows.push([text.rows.bank,CARD_BANK_NAME]);
    if(state.country!=="tj"&&quote.exchange_rate)rows.push([text.rows.rate,quote.exchange_rate]);
  }
  $("#summaryRows").innerHTML=rows.map(row=>`<div class="row"><span>${row[0]}</span><strong>${row[1]}</strong></div>`).join("");
  if(state.method==="visa"){
    $("#paymentBox").innerHTML=renderPaymentDetails(quote.payment_details||state.overview?.payment_details||"",text);
  }else if(quote.qr?.available&&quote.qr?.image_data_url){
    $("#paymentBox").innerHTML=`<h4>${text.qrTitle}</h4>
      <button class="qr qr-tappable" type="button" data-qr-toggle aria-label="${escapeAttr(text.downloadQr)}">
        <img src="${quote.qr.image_data_url}" alt="QR">
      </button>
      <p class="qr-hint">${text.qrTapHint}</p>
      <div class="qr-actions ${state.qrActionsOpen?"show":""}">
        <div class="qr-actions-inner">
          <button class="qr-download" type="button" data-download-qr>${text.downloadQr}</button>
        </div>
      </div>`;
  }else{
    $("#paymentBox").innerHTML=`<h4>${text.qrTitle}</h4><div class="qr empty">${text.qrMissing}</div>`;
  }
  $("#uploadTitle").textContent=state.screenshotName?text.uploaded.replace("{name}",state.screenshotName):text.uploadTitle;
  $("#uploadText").textContent=state.screenshotName?text.uploadText:text.uploadText;
  $("#uploadBox").classList.toggle("ready",Boolean(state.screenshotDataUrl));
}
function escapeHtml(value){
  return String(value||"").replace(/[&<>"']/g,char=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[char]));
}
function escapeAttr(value){
  return escapeHtml(value).replace(/`/g,"&#96;");
}
function paymentDetailRows(details){
  return String(details||"")
    .split(/\n+/)
    .map(line=>line.trim())
    .filter(Boolean)
    .map(line=>{
      const match=line.match(/\+?\d[\d\s\-()]{7,}\d/);
      const copyValue=match?match[0].replace(/\D/g,""):"";
      return {line,copyValue:copyValue.length>=8?copyValue:""};
    });
}
function cardInstructionText(text){
  const hints=text.cardHints||{};
  if(state.country==="tj")return hints.tj||text.detailsHint;
  return hints.foreign||text.detailsHint;
}
function renderPaymentDetails(details,text){
  const rows=paymentDetailRows(details);
  if(!rows.length){
    return `<h4>${text.detailsTitle}</h4><div class="detail-empty">${text.noDetails}</div>`;
  }
  const instruction=cardInstructionText(text);
  const hintClass=state.detailHintOpen?"":"collapsed";
  const hintToggleText=state.detailHintOpen?(text.showLess||"Less"):(text.showMore||"More");
  return `<h4>${text.detailsTitle}</h4>
    <button class="detail-hint ${hintClass}" type="button" data-detail-hint-toggle>
      <span class="detail-hint-text">${escapeHtml(instruction)}</span>
      <span class="detail-hint-more">${escapeHtml(hintToggleText)}</span>
    </button>
    <div class="detail-list">
      ${rows.map(row=>`<div class="detail-row ${row.copyValue?"copyable":""}">
        <span>${escapeHtml(row.line)}</span>
        ${row.copyValue?`<button class="copy-detail" type="button" data-copy-detail data-copy-value="${escapeAttr(row.copyValue)}">${text.copyValue}</button>`:""}
      </div>`).join("")}
    </div>`;
}
function toast(message){
  const node=$("#toast");
  node.textContent=message;
  node.classList.add("show");
  clearTimeout(window.toastTimer);
  window.toastTimer=setTimeout(()=>node.classList.remove("show"),2200);
}
function renderInviteSheet(text){
  const sheet=$("#inviteSheet");
  const visible=Boolean(state.inviteOpen&&state.inviteLink);
  sheet.classList.toggle("show",visible);
  sheet.setAttribute("aria-hidden",visible?"false":"true");
  $("#inviteTitle").textContent=text.inviteTitle;
  $("#inviteText").textContent=text.inviteText;
  $("#inviteLinkText").textContent=state.inviteLink||"";
  $("#shareInviteBtn").textContent=text.shareLocalized;
  $("#copyInviteBtn").textContent=state.inviteCopied?(text.copiedButton||text.copied):text.copyLink;
  $("#closeInviteBtn").textContent=text.close;
}
function renderSupportSheet(text){
  const sheet=$("#supportSheet");
  const visible=Boolean(state.supportOpen);
  sheet.classList.toggle("show",visible);
  sheet.setAttribute("aria-hidden",visible?"false":"true");
  $("#supportTitle").textContent=text.supportTitle;
  $("#supportText").textContent=text.supportText;
  $("#openSupportBtn").textContent=text.supportButton;
  $("#closeSupportBtn").textContent=text.close;
}
function showInviteSheet(link){
  if(!link){toast(tr().error);return}
  state.inviteLink=link;
  state.inviteCopied=false;
  state.inviteOpen=true;
  render();
}
function hideInviteSheet(){
  state.inviteOpen=false;
  render();
}
function showSupportSheet(){
  state.supportOpen=true;
  render();
}
function hideSupportSheet(){
  state.supportOpen=false;
  render();
}
async function copyText(value,successMessage,failedMessage){
  if(!value){toast(tr().error);return false}
  try{
    if(navigator.clipboard?.writeText){
      await navigator.clipboard.writeText(value);
    }else{
      const input=document.createElement("textarea");
      input.value=value;
      input.setAttribute("readonly","");
      input.style.position="fixed";
      input.style.left="-9999px";
      document.body.appendChild(input);
      input.select();
      const copied=document.execCommand("copy");
      input.remove();
      if(!copied)throw new Error("copy_failed");
    }
    toast(successMessage);
    return true;
  }catch(error){
    toast(failedMessage);
    return false;
  }
}
async function copyReferralLink(link){
  const copied=await copyText(link,tr().copied,tr().copyFailed);
  if(copied){
    state.inviteCopied=true;
    render();
  }
}
function closeMiniApp(){
  if(tg&&typeof tg.close==="function"){
    tg.close();
    return;
  }
  window.close();
}
function openSupportChat(){
  const url=state.supportUrl||DEFAULT_SUPPORT_URL;
  if(tg&&typeof tg.openTelegramLink==="function"&&(url.includes("t.me/")||url.startsWith("tg://"))){
    tg.openTelegramLink(url);
    return;
  }
  if(tg&&typeof tg.openLink==="function"){
    tg.openLink(url);
    return;
  }
  window.open(url,"_blank");
}
function qrFileName(){
  const plan=String(state.plan||"plan").replace(/[^a-z0-9_-]/gi,"");
  const method=String(state.method||"qr").replace(/[^a-z0-9_-]/gi,"");
  return `hsk-ai-${method}-${plan}-qr.jpg`;
}
function downloadQrImage(){
  const image=state.quote?.qr?.image_data_url;
  if(!image){
    toast(tr().qrMissing);
    return;
  }
  try{
    fetch(image)
      .then(response=>response.blob())
      .then(blob=>{
        const objectUrl=URL.createObjectURL(blob);
        const link=document.createElement("a");
        link.href=objectUrl;
        link.download=qrFileName();
        document.body.appendChild(link);
        link.click();
        link.remove();
        window.setTimeout(()=>URL.revokeObjectURL(objectUrl),30000);
        toast(tr().qrDownloaded);
      })
      .catch(()=>{window.open(image,"_blank");toast(tr().qrDownloaded)});
  }catch(error){
    window.open(image,"_blank");
    toast(tr().qrDownloaded);
  }
}
async function submitPayment(){
  if(!state.screenshotDataUrl){
    toast(tr().needScreenshot);
    return;
  }
  if(!state.preview&&!state.quote){
    toast(state.quoteError||tr().quoteError);
    return;
  }
  if(state.preview){
    toast(tr().previewSubmit);
    return;
  }
  setBusy(true);
  try{
    const data=await api(API.submit,{
      ...contextPayload(),
      plan_type:state.plan,
      payment_method:state.method,
      card_country:state.method==="visa"?state.country:null,
      screenshot_data_url:state.screenshotDataUrl
    });
    state.pending=Boolean(data.already_pending);
    state.pendingPayment=data.already_pending?data:null;
    state.done=!state.pending;
    state.step=0;
  }catch(error){
    toast(error.message||tr().error);
  }finally{
    setBusy(false);
    render();
  }
}
document.addEventListener("click",event=>{
  const qrToggle=event.target.closest("[data-qr-toggle]");
  if(qrToggle){state.qrActionsOpen=!state.qrActionsOpen;render();return}
  const qrDownload=event.target.closest("[data-download-qr]");
  if(qrDownload){downloadQrImage();return}
  const detailHint=event.target.closest("[data-detail-hint-toggle]");
  if(detailHint){state.detailHintOpen=!state.detailHintOpen;render();return}
  const copyBtn=event.target.closest("[data-copy-detail]");
  if(copyBtn){copyText(copyBtn.dataset.copyValue,tr().copiedValue,tr().copyFailed);return}
  const langBtn=event.target.closest("[data-lang]");
  if(langBtn){setLang(langBtn.dataset.lang);return}
  const planBtn=event.target.closest("[data-plan]");
  if(planBtn){state.plan=planBtn.dataset.plan;state.quote=null;state.qrActionsOpen=false;state.detailHintOpen=false;render();return}
  const methodBtn=event.target.closest("[data-method]");
  if(methodBtn){
    state.method=methodBtn.dataset.method;
    ensureSelection();
    state.quote=null;
    state.qrActionsOpen=false;
    state.detailHintOpen=false;
    state.step=0;
    render();
    return;
  }
  const countryBtn=event.target.closest("[data-country]");
  if(countryBtn){state.country=countryBtn.dataset.country;state.quote=null;state.qrActionsOpen=false;state.detailHintOpen=false;render();return}
});
$("#nextBtn").addEventListener("click",()=>{
  const screen=currentScreen();
  if(!hasCurrentPrice()){toast(tr().offerExpired);return}
  if(screen==="pay"){submitPayment();return}
  setStep(state.step+1);
});
$("#backBtn").addEventListener("click",()=>setStep(state.step-1));
$("#botReturnBtn").addEventListener("click",closeMiniApp);
function shareReferral(link){
  if(!link){toast(tr().error);return}
  const url="https://t.me/share/url?url="+encodeURIComponent(link)+"&text="+encodeURIComponent(tr().shareText);
  if(tg&&tg.openTelegramLink){tg.openTelegramLink(url)}
  else{window.open(url,"_blank")}
}
async function inviteForDiscount(){
  let link=state.overview?.discount?.referral_link||"";
  if(state.preview){
    toast(tr().preview);
    return;
  }
  setBusy(true);
  try{
    const data=await api(API.discountStart,contextPayload());
    state.overview.discount=data.discount;
    link=data.discount.referral_link||link;
  }catch(error){
    setBusy(false);
    toast(error.message||tr().error);
    return;
  }
  setBusy(false);
  render();
  showInviteSheet(link);
}
$("#discountBtn").addEventListener("click",inviteForDiscount);
$("#shareInviteBtn").addEventListener("click",()=>shareReferral(state.inviteLink));
$("#copyInviteBtn").addEventListener("click",()=>copyReferralLink(state.inviteLink));
$("#closeInviteBtn").addEventListener("click",hideInviteSheet);
$("#inviteBackdrop").addEventListener("click",hideInviteSheet);
$("#helpBtn").addEventListener("click",showSupportSheet);
$("#openSupportBtn").addEventListener("click",openSupportChat);
$("#closeSupportBtn").addEventListener("click",hideSupportSheet);
$("#supportBackdrop").addEventListener("click",hideSupportSheet);
$("#receiptInput").addEventListener("change",event=>{
  const file=event.target.files?.[0];
  if(!file)return;
  if(!file.type.startsWith("image/")){
    toast(tr().needScreenshot);
    return;
  }
  const reader=new FileReader();
  reader.onload=()=>{
    state.screenshotDataUrl=String(reader.result||"");
    state.screenshotName=file.name;
    render();
  };
  reader.readAsDataURL(file);
});
render();
loadOverview();
</script>
</body>
</html>
