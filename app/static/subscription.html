<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>HSK AI — Obuna</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --ink:#211D17;--ink2:#6E665B;--ink3:#A89E8E;--paper:#FBF7EF;--card:#FFFFFF;--line:#EAE2D4;
  --cin:#C2403A;--cin2:#9A2F2B;--cinbg:#FBEDEA;--gold:#C2962F;--goldbg:#F8F0DA;--jade:#2F7D5E;--jadebg:#E7F1EA;
  --safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{background:var(--paper);color:var(--ink);font-family:-apple-system,"SF Pro Text","Segoe UI",Roboto,sans-serif;min-height:100vh}
.han{font-family:"Songti SC","STSong","Noto Serif SC",serif;font-weight:600}
.wrap{max-width:480px;margin:0 auto;padding:calc(16px + var(--safe-t)) 16px calc(24px + var(--safe-b));min-height:100vh}

/* header */
.top{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.top .back{background:none;border:none;color:var(--ink2);font-size:22px;cursor:pointer;padding:0;line-height:1}
.top h1{font-size:17px;font-weight:600;flex:1}
.badge-prem{display:inline-flex;align-items:center;gap:4px;background:var(--goldbg);color:var(--gold);font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;border:1px solid #e8d08a}

/* hero */
.hero{text-align:center;padding:24px 0 20px;border-bottom:1px solid var(--line);margin-bottom:20px}
.hero .ic{width:68px;height:68px;background:var(--cin);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;color:#fff;margin:0 auto 14px;border:2px solid var(--gold)}
.hero h2{font-size:20px;font-weight:600;margin-bottom:6px}
.hero p{font-size:14px;color:var(--ink2);line-height:1.5}
.benefits{display:flex;flex-direction:column;gap:8px;margin-top:14px;text-align:left}
.brow{display:flex;align-items:center;gap:10px;font-size:14px}
.brow .bic{width:28px;height:28px;border-radius:8px;background:var(--jadebg);color:var(--jade);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}

/* plan cards */
.sec-title{font-size:12px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--ink3);margin-bottom:10px}
.plans{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.plan{background:var(--card);border:2px solid var(--line);border-radius:16px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:border-color .15s}
.plan.on{border-color:var(--cin);background:var(--cinbg)}
.plan .pcir{width:20px;height:20px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.plan.on .pcir{border-color:var(--cin);background:var(--cin)}
.plan.on .pcir::after{content:"";width:8px;height:8px;border-radius:50%;background:#fff}
.plan .pt{flex:1}
.plan .pt b{font-size:15px;font-weight:600;display:block}
.plan .pt small{font-size:12px;color:var(--ink2)}
.plan .pp{font-size:18px;font-weight:700;color:var(--cin)}
.plan.pop{position:relative}
.plan.pop .badge{position:absolute;top:-8px;right:12px;background:var(--cin);color:#fff;font-size:11px;font-weight:600;padding:2px 10px;border-radius:10px}

/* methods */
.methods{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.mth{background:var(--card);border:2px solid var(--line);border-radius:14px;padding:12px 8px;text-align:center;cursor:pointer;transition:border-color .15s}
.mth.on{border-color:var(--cin);background:var(--cinbg)}
.mth .mic{font-size:22px;display:block;margin-bottom:4px}
.mth .mlbl{font-size:12px;font-weight:500;color:var(--ink2)}
.mth.on .mlbl{color:var(--cin2)}

/* checkout */
.checkout{background:var(--card);border-radius:16px;padding:16px;margin-bottom:14px;border:1px solid var(--line)}
.checkout h4{font-size:13px;font-weight:600;color:var(--ink2);margin-bottom:10px}
.price-big{font-size:32px;font-weight:700;color:var(--cin);margin-bottom:4px}
.price-note{font-size:13px;color:var(--ink2)}
.pay-details{background:var(--paper);border-radius:12px;padding:12px;margin-top:12px;font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:break-all}
.qr-img{width:100%;max-width:200px;border-radius:12px;display:block;margin:12px auto 0}

/* upload */
.upload-area{border:2px dashed var(--line);border-radius:14px;padding:24px;text-align:center;cursor:pointer;margin-bottom:14px;transition:border-color .15s}
.upload-area.has-file{border-color:var(--jade);background:var(--jadebg)}
.upload-area .uic{font-size:28px;margin-bottom:8px}
.upload-area p{font-size:14px;color:var(--ink2)}
.upload-area.has-file p{color:var(--jade);font-weight:500}
#file-input{display:none}

/* pending */
.pending-box{background:var(--goldbg);border:1px solid #e8d08a;border-radius:16px;padding:18px;text-align:center;margin-bottom:18px}
.pending-box .pic{font-size:32px;margin-bottom:10px}
.pending-box h3{font-size:16px;font-weight:600;margin-bottom:6px}
.pending-box p{font-size:13px;color:var(--ink2);line-height:1.5}

/* done */
.done-box{text-align:center;padding:40px 16px}
.done-box .dic{font-size:56px;margin-bottom:16px}
.done-box h2{font-size:22px;font-weight:700;margin-bottom:8px}
.done-box p{font-size:14px;color:var(--ink2);line-height:1.6}

/* discount banner */
.disc-banner{background:var(--cinbg);border:1px solid var(--cin);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:16px;font-size:13px}
.disc-banner .dic{font-size:20px;flex-shrink:0}
.disc-banner b{color:var(--cin2)}

/* country picker */
.country-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.ctry{background:var(--card);border:2px solid var(--line);border-radius:12px;padding:10px 12px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;transition:border-color .15s}
.ctry.on{border-color:var(--cin);background:var(--cinbg);color:var(--cin2)}

/* steps indicator */
.steps{display:flex;align-items:center;gap:6px;margin-bottom:22px}
.steps .s{width:28px;height:4px;border-radius:2px;background:var(--line);transition:background .2s}
.steps .s.on{background:var(--cin)}
.steps .s.done{background:var(--jade)}

/* buttons */
.btn{width:100%;background:var(--cin);color:#fff;border:none;border-radius:14px;padding:15px;font-family:inherit;font-size:16px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
.btn:disabled{opacity:.5;cursor:default}
.btn.ghost{background:var(--card);border:1px solid var(--line);color:var(--ink)}
.btn.jade{background:var(--jade)}

/* loading */
.loading{text-align:center;padding:60px 20px;color:var(--ink3);font-size:15px}
</style>
</head>
<body>
<div class="wrap" id="app"><div class="loading">…</div></div>
<input type="file" id="file-input" accept="image/*">

<script>
var tg=window.Telegram&&window.Telegram.WebApp;
if(tg){try{tg.ready();tg.expand()}catch(e){}}
var INIT_DATA=(tg&&tg.initData)||"";
var p=new URLSearchParams(location.search);
var LANG=p.get("lang")||"uz";if(!{uz:1,ru:1,tj:1}[LANG])LANG="uz";
var SOURCE=p.get("source")||"subscription_miniapp";
var MODE=p.get("mode")||"subscription";

var STATE={step:1,plan:null,method:null,country:"uz",screenshot:null,overview:null,quote:null};

function T(){return({
  uz:{title:"Obuna",hero:"HSK AI Premium",heroChin:"汉语学习",heroSub:"Barcha darslar, AI voice va testlar cheksiz",
    b1:"Barcha HSK 1–4 darslari cheksiz",b2:"AI Voice — panda 阿宝 bilan suhbat",b3:"Xato tahlili va smart takrorlar",
    plan10:"10 kunlik",plan1m:"1 oylik",perDay10:"kuniga",popular:"Mashhur",
    step1:"Rejani tanlang",step2:"To'lov usulini tanlang",step3:"To'lov",
    visa:"Plastik karta",alipay:"Alipay",wechat:"WeChat",
    country:"Karta mamlakati",ctryTj:"Tojikiston",ctryUz:"O'zbekiston",ctryRu:"Rossiya",ctryOth:"Boshqa",
    payDetails:"To'lov rekvizitlari:",qrSub:"QR kodni skanerlang:",
    uploadHint:"Screenshot yuklang",uploadDone:"Rasm tanlandi ✓",
    submit:"To'lovni yuborish",next:"Keyingi",back:"Orqaga",
    pendingTitle:"To'lov tekshiruvda",pendingSub:"Adminlar tasdiqlashini kuting. 1–24 soat ichida javob beradi.",
    doneTitle:"Yuborildi!",doneSub:"To'lov tasdiqlanishi bilan Premium yoqiladi. Kuting.",
    support:"Yordam",discount:"Chegirma mavjud!",discSub:"Sizga maxsus taklif"},
  ru:{title:"Подписка",hero:"HSK AI Premium",heroChin:"汉语学习",heroSub:"Все уроки, AI voice и тесты без ограничений",
    b1:"Все уроки HSK 1–4 без ограничений",b2:"AI Voice — диалог с пандой 阿宝",b3:"Анализ ошибок и умные повторения",
    plan10:"10 дней",plan1m:"1 месяц",perDay10:"в день",popular:"Хит",
    step1:"Выберите план",step2:"Способ оплаты",step3:"Оплата",
    visa:"Банковская карта",alipay:"Alipay",wechat:"WeChat",
    country:"Страна карты",ctryTj:"Таджикистан",ctryUz:"Узбекистан",ctryRu:"Россия",ctryOth:"Другое",
    payDetails:"Реквизиты для оплаты:",qrSub:"Отсканируйте QR-код:",
    uploadHint:"Загрузите скриншот",uploadDone:"Фото выбрано ✓",
    submit:"Отправить оплату",next:"Далее",back:"Назад",
    pendingTitle:"Оплата проверяется",pendingSub:"Ожидайте подтверждения администратора. Ответ в течение 1–24 ч.",
    doneTitle:"Отправлено!",doneSub:"После подтверждения оплаты Premium будет активирован.",
    support:"Поддержка",discount:"Скидка доступна!",discSub:"У вас есть специальное предложение"},
  tj:{title:"Обуна",hero:"HSK AI Premium",heroChin:"汉语学习",heroSub:"Ҳамаи дарсҳо, AI voice ва тестҳо бидуни маҳдудият",
    b1:"Ҳамаи дарсҳои HSK 1–4 бидуни маҳдудият",b2:"AI Voice — сӯҳбат бо панда 阿宝",b3:"Таҳлили хатоҳо ва такрорҳои ҳушманд",
    plan10:"10 рӯз",plan1m:"1 моҳ",perDay10:"дар як рӯз",popular:"Машҳур",
    step1:"Нақшаро интихоб кунед",step2:"Усули пардохтро интихоб кунед",step3:"Пардохт",
    visa:"Корти бонкӣ",alipay:"Alipay",wechat:"WeChat",
    country:"Кишвари корт",ctryTj:"Тоҷикистон",ctryUz:"Ӯзбекистон",ctryRu:"Россия",ctryOth:"Дигар",
    payDetails:"Реквизитҳо барои пардохт:",qrSub:"QR-кодро сканер кунед:",
    uploadHint:"Скриншот бор кунед",uploadDone:"Акс интихоб шуд ✓",
    submit:"Пардохтро фиристед",next:"Минбаъд",back:"Бозгашт",
    pendingTitle:"Пардохт тафтиш мешавад",pendingSub:"Тасдиқи маъмурро интизор шавед. Дар давоми 1–24 соат ҷавоб дода мешавад.",
    doneTitle:"Фиристода шуд!",doneSub:"Пас аз тасдиқи пардохт Premium фаъол мегардад.",
    support:"Ёрдам",discount:"Тахфиф мавҷуд аст!",discSub:"Барои шумо пешниҳоди махсус мавҷуд аст"}
})[LANG]}

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function apiPost(url,body){return fetch(url,{method:"POST",headers:{"Content-Type":"application/json","X-Telegram-Init-Data":INIT_DATA},body:JSON.stringify(body)})}
function render(html){document.getElementById("app").innerHTML=html}

function stepsHtml(active){
  var steps=[1,2,3];
  return '<div class="steps">'+steps.map(function(s){return '<div class="s'+(s<active?" done":s===active?" on":"")+'"></div>'}).join("")+'</div>';
}

// ── Step 1: Plan picker ──────────────────────────────────────────────
function renderStep1(){
  var t=T(),ov=STATE.overview;
  var prices=ov&&ov.prices||{};
  var disc=ov&&ov.discount;
  var discHtml=disc&&disc.active?'<div class="disc-banner"><span class="dic">🎁</span><div><b>'+t.discount+'</b><div>'+esc(t.discSub)+'</div></div></div>':'';

  function planPrice(plan_type){
    var vis=prices.visa;
    if(vis&&vis[plan_type])return vis[plan_type].amount+" "+vis[plan_type].currency;
    var ali=prices.alipay;
    if(ali&&ali[plan_type])return ali[plan_type].amount+" "+ali[plan_type].currency;
    return "";
  }

  render(stepsHtml(1)
    +'<div class="hero"><div class="ic han">会</div>'
    +'<h2>'+t.hero+'</h2><p>'+t.heroSub+'</p>'
    +'<div class="benefits">'
    +'<div class="brow"><div class="bic">✓</div>'+t.b1+'</div>'
    +'<div class="brow"><div class="bic">🎙</div>'+t.b2+'</div>'
    +'<div class="brow"><div class="bic">📊</div>'+t.b3+'</div>'
    +'</div></div>'
    +discHtml
    +'<div class="sec-title">'+t.step1+'</div>'
    +'<div class="plans">'
    +'<div class="plan'+(STATE.plan==="1_month"?" on":"")+" pop"+'" onclick="pickPlan(\'1_month\')">'
    +'<span class="badge">'+t.popular+'</span>'
    +'<div class="pcir"></div><div class="pt"><b>'+t.plan1m+'</b><small>'+planPrice("1_month")+'</small></div>'
    +'<div class="pp">'+planPrice("1_month")+'</div></div>'
    +'<div class="plan'+(STATE.plan==="10_days"?" on":"")+'\" onclick="pickPlan(\'10_days\')">'
    +'<div class="pcir"></div><div class="pt"><b>'+t.plan10+'</b><small>'+planPrice("10_days")+'</small></div>'
    +'<div class="pp">'+planPrice("10_days")+'</div></div>'
    +'</div>'
    +'<button class="btn" onclick="goStep2()" '+(STATE.plan?"":"disabled")+'>'+t.next+' →</button>'
  );
}

function pickPlan(pl){STATE.plan=pl;renderStep1()}
function goStep2(){if(STATE.plan)renderStep2()}

// ── Step 2: Method picker ────────────────────────────────────────────
function renderStep2(){
  var t=T();
  render(stepsHtml(2)
    +'<div class="sec-title" style="margin-bottom:16px">'+t.step2+'</div>'
    +'<div class="methods">'
    +'<div class="mth'+(STATE.method==="visa"?" on":"")+'\" onclick="pickMethod(\'visa\')">'
    +'<span class="mic">💳</span><span class="mlbl">'+t.visa+'</span></div>'
    +'<div class="mth'+(STATE.method==="alipay"?" on":"")+'\" onclick="pickMethod(\'alipay\')">'
    +'<span class="mic">🟦</span><span class="mlbl">'+t.alipay+'</span></div>'
    +'<div class="mth'+(STATE.method==="wechat"?" on":"")+'\" onclick="pickMethod(\'wechat\')">'
    +'<span class="mic">🟩</span><span class="mlbl">'+t.wechat+'</span></div>'
    +'</div>'
    +(STATE.method==="visa"?renderCountryPicker():'')
    +'<button class="btn" onclick="goStep3()" '+(STATE.method?"":"disabled")+'>'+t.next+' →</button>'
    +'<button class="btn ghost" onclick="renderStep1()">← '+t.back+'</button>'
  );
}

function renderCountryPicker(){
  var t=T();
  var countries=[["tj",t.ctryTj],["uz",t.ctryUz],["ru",t.ctryRu],["other",t.ctryOth]];
  return '<div class="sec-title">'+t.country+'</div>'
    +'<div class="country-grid">'
    +countries.map(function(c){return '<div class="ctry'+(STATE.country===c[0]?" on":"")+'\" onclick="pickCountry(\''+c[0]+'\')">'+c[1]+'</div>'}).join("")
    +'</div>';
}

function pickMethod(m){STATE.method=m;renderStep2()}
function pickCountry(c){STATE.country=c;renderStep2()}

function goStep3(){
  if(!STATE.method)return;
  render('<div class="loading">…</div>');
  apiPost("/api/subscription-miniapp/quote",{
    plan_type:STATE.plan,payment_method:STATE.method,
    card_country:STATE.method==="visa"?STATE.country:null,
    mode:MODE,source:SOURCE
  }).then(function(r){return r.json()}).then(function(d){
    if(d.ok){STATE.quote=d.quote;renderStep3()}
    else{render('<div class="loading">'+esc(d.error||"Xatolik")+'</div>')}
  }).catch(function(){render('<div class="loading">Xatolik</div>')});
}

// ── Step 3: Checkout ─────────────────────────────────────────────────
function renderStep3(){
  var t=T(),q=STATE.quote||{};
  var isQr=STATE.method==="alipay"||STATE.method==="wechat";
  var amt=q.pay_amount||q.final_amount||"";
  var cur=q.pay_currency||q.currency||"";
  var qrHtml=q.qr&&q.qr.available&&q.qr.image_url?'<div style="margin-top:12px"><div style="font-size:12px;color:var(--ink2);margin-bottom:6px">'+t.qrSub+'</div><img class="qr-img" src="'+esc(q.qr.image_url)+'"></div>':'';
  var detHtml=STATE.method==="visa"&&q.payment_details?'<div style="margin-top:10px;font-size:12px;color:var(--ink2)">'+t.payDetails+'</div><div class="pay-details">'+esc(q.payment_details)+'</div>':'';

  render(stepsHtml(3)
    +'<div class="checkout">'
    +'<h4>'+t.step3+'</h4>'
    +'<div class="price-big">'+esc(amt)+' '+esc(cur)+'</div>'
    +'<div class="price-note">'+(STATE.plan==="1_month"?t.plan1m:t.plan10)+'</div>'
    +detHtml+qrHtml
    +'</div>'
    +'<div class="upload-area'+(STATE.screenshot?" has-file":"")+'\" onclick="document.getElementById(\'file-input\').click()">'
    +'<div class="uic">📸</div>'
    +'<p>'+(STATE.screenshot?t.uploadDone:t.uploadHint)+'</p>'
    +'</div>'
    +'<button class="btn jade" onclick="submitPayment()" '+(STATE.screenshot?"":"disabled")+'>'+t.submit+'</button>'
    +'<button class="btn ghost" onclick="renderStep2()">← '+t.back+'</button>'
  );
}

document.getElementById("file-input").addEventListener("change",function(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){STATE.screenshot=ev.target.result;renderStep3()};
  reader.readAsDataURL(file);
});

function submitPayment(){
  if(!STATE.screenshot)return;
  var btn=document.querySelector(".btn.jade");if(btn)btn.disabled=true;
  apiPost("/api/subscription-miniapp/submit",{
    plan_type:STATE.plan,payment_method:STATE.method,
    card_country:STATE.method==="visa"?STATE.country:null,
    screenshot_data_url:STATE.screenshot,
    mode:MODE,source:SOURCE
  }).then(function(r){return r.json()}).then(function(d){
    if(d.ok){renderDone()}
    else{if(btn)btn.disabled=false;alert(d.error||"Xatolik")}
  }).catch(function(){if(btn)btn.disabled=false});
}

// ── Done ─────────────────────────────────────────────────────────────
function renderDone(){
  var t=T();
  render('<div class="done-box">'
    +'<div class="dic">✅</div>'
    +'<h2>'+t.doneTitle+'</h2>'
    +'<p>'+t.doneSub+'</p>'
    +'</div>'
    +'<button class="btn ghost" onclick="if(tg&&tg.close)tg.close()">✕ '+t.back+'</button>'
  );
}

// ── Pending ───────────────────────────────────────────────────────────
function renderPending(pending,supportUrl){
  var t=T();
  render('<div class="pending-box">'
    +'<div class="pic">⏳</div>'
    +'<h3>'+t.pendingTitle+'</h3>'
    +'<p>'+t.pendingSub+'</p>'
    +'</div>'
    +(supportUrl?'<button class="btn ghost" onclick="if(tg&&tg.openTelegramLink)tg.openTelegramLink(\''+esc(supportUrl)+'\');else window.open(\''+esc(supportUrl)+'\',\'_blank\')">'+t.support+'</button>':'')
  );
}

// ── Boot ──────────────────────────────────────────────────────────────
apiPost("/api/subscription-miniapp/overview",{mode:MODE,source:SOURCE,lang:LANG})
  .then(function(r){return r.json()})
  .then(function(d){
    if(!d.ok){render('<div class="loading">'+esc(d.error||"Xatolik")+'</div>');return}
    STATE.overview=d;
    if(d.pending_payment){renderPending(d.pending_payment,d.support_url);return}
    STATE.plan="1_month";
    renderStep1();
  }).catch(function(){render('<div class="loading">Ulanishda xatolik</div>')});
</script>
</body>
</html>
