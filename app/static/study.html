<style>
:root{color-scheme:dark;--bg:#090b10;--bg2:#111722;--bg3:#182131;--border:rgba(148,163,184,.16);--border2:rgba(148,163,184,.28);--text:#f4f7fb;--text2:#aab4c5;--accent:#5b8cff;--accent-dim:rgba(91,140,255,.16);--bar:0px;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;min-height:100dvh;background:radial-gradient(circle at 12% -8%,rgba(91,140,255,.18),transparent 34%),linear-gradient(180deg,#0b0e15 0%,var(--bg) 48%,#07090d 100%);color:var(--text);font-family:var(--font);overflow:hidden}
button{font:inherit;touch-action:manipulation;transition:all .18s ease}
button:active{transform:scale(.96)}
.top{display:none}
.title{font-size:13px;font-weight:800;letter-spacing:.2px}
.settings{width:36px;height:36px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);font-size:16px}
.settings:active{transform:scale(.97)}
.frame{position:fixed;top:0;left:0;right:0;bottom:0;background:transparent;transition:opacity .18s ease}
.frame.loading{opacity:.28}
iframe{display:block;width:100%;height:100%;border:0;background:var(--bg)}
.loader{position:fixed;inset:calc(var(--bar) + env(safe-area-inset-top,0px)) 0 0;display:grid;place-items:center;background:var(--bg);z-index:4;transition:opacity .18s ease}
.loader.hide{display:none}
.skeleton{width:min(88%,360px)}
.skeleton b{display:block;width:48%;height:18px;border-radius:8px;background:linear-gradient(90deg,#111722,#1d283a,#111722);background-size:200% 100%;animation:shimmer 1.1s linear infinite}
.skeleton i{display:block;height:70px;margin-top:12px;border-radius:16px;background:linear-gradient(90deg,#111722,#1d283a,#111722);background-size:200% 100%;animation:shimmer 1.1s linear infinite}
.sheet-backdrop{position:fixed;inset:0;display:none;background:rgba(0,0,0,.58);backdrop-filter:blur(12px);z-index:20;animation:fadeIn .18s ease}
.sheet-backdrop.show{display:block}
.sheet{position:absolute;left:10px;right:10px;bottom:10px;padding:16px;border:1px solid var(--border);border-radius:20px;background:linear-gradient(180deg,#172031,#111722);box-shadow:0 22px 70px rgba(0,0,0,.48);animation:slideUp .22s ease}
.sheet-head{display:flex;align-items:center;justify-content:space-between}
.sheet-title{font-size:18px;font-weight:800}
.close{width:34px;height:34px;border:1px solid var(--border);border-radius:12px;background:rgba(255,255,255,.03);color:var(--text2);font-size:18px}
.label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.85px;margin:15px 0 8px}
.row{display:flex;flex-wrap:wrap;gap:7px}
.pill{min-height:38px;border:1px solid var(--border);border-radius:999px;background:rgba(255,255,255,.03);color:var(--text2);padding:9px 12px;font-size:12px;font-weight:800}
.pill.active{border-color:rgba(91,140,255,.74);background:var(--accent-dim);color:var(--accent)}
@keyframes shimmer{to{background-position:-200% 0}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
</style>

,"m":{"uz":"universitet, oliy ta'lim muassasasi","ru":"университет, вуз","tj":"донишгоҳ"}},{"l":15,"h":"饭店","p":"fàndiàn","m":{"uz":"restoran, mehmonxona","ru":"ресторан, гостиница","tj":"тарабхона, меҳмонхона"}},{"l":15,"h":"出租车","p":"chūzūchē","m":{"uz":"taksi","ru":"такси","tj":"таксӣ"}},{"l":15,"h":"一起","p":"yīqǐ","m":{"uz":"birga","ru":"вместе","tj":"якҷоя"}},{"l":15,"h":"高兴","p":"gāoxìng","m":{"uz":"xursand, shod","ru":"рад, доволен","tj":"хурсанд, шод"}},{"l":15,"h":"听","p":"tīng","m":{"uz":"eshitmoq, tinglаmoq","ru":"слушать, слышать","tj":"шунидан, гӯш кардан"}},{"l":15,"h":"飞机","p":"fēijī","m":{"uz":"samolyot","ru":"самолёт","tj":"ҳавопаймо"}}],"GRAMMAR":[{"l":1,"t":{"uz":"To'rt ton","ru":"Четыре тона","tj":"Чор садо"},"f":{"uz":"Xitoy tilida har bir bo'g'in 4 xil tonda aytiladi:\n1-ton (—): baland va tekis — mā (ona)\n2-ton (ˊ): ko'tariluvchi — má (kanop o'simligi)\n3-ton (ˇ): tushib ko'tariluvchi — mǎ (ot)\n4-ton (ˋ): tushuvchi — mà (so'kishmoq)\n\nTon ma'noni o'zgartiradi!","ru":"В китайском языке каждый слог произносится в одном из 4 тонов:\nТон 1 (—): ровный и высокий — mā (мама)\nТон 2 (ˊ): восходящий — má (конопля)\nТон 3 (ˇ): нисходяще-восходящий — mǎ (лошадь)\nТон 4 (ˋ): нисходящий — mà (ругать)\n\nТон меняет смысл слова!","tj":"Дар забони чинӣ ҳар як ҳиҷо бо яке аз 4 садо гуфта мешавад:\nСадои 1 (—): баланд ва ҳамвор — mā (модар)\nСадои 2 (ˊ): боравандаи — má (канабис)\nСадои 3 (ˇ): поинравандаю боравандаи — mǎ (асп)\nСадои 4 (ˋ): поинравандаи — mà (дашном додан)\n\nСадо маъноро тағйир медиҳад!"},"e":{"zh":"妈","p":"mā","uz":"ona (1-ton)","ru":"мама (1-й тон)","tj":"модар (садои 1)"},"pattern":"四声"},{"l":1,"t":{"uz":"Ton o'zgarishi (3+3)","ru":"Изменение тона (3+3)","tj":"Тағйири садо (3+3)"},"f":{"uz":"Ketma-ket ikkita 3-ton kelganda, birinchisi 2-tonga o'zgaradi.\n3+3 → 2+3\nMisol: 你(nǐ) + 好(hǎo) → nī hǎo (lekin yoziladi: nǐ hǎo)","ru":"Когда два слога 3-го тона идут подряд, первый меняется на 2-й тон.\n3+3 → 2+3\nПример: 你(nǐ) + 好(hǎo) → nī hǎo (но пишется: nǐ hǎo)","tj":"Вақте ки ду ҳиҷои садои 3 паи ҳам меоянд, аввалӣ ба садои 2 табдил меёбад.\n3+3 → 2+3\nМисол: 你(nǐ) + 好(hǎo) → nī hǎo (аммо навишта мешавад: nǐ hǎo)"},"e":{"zh":"你好","p":"nī hǎo → nǐ hǎo","uz":"salom (nǐ hǎo deb yoziladi)","ru":"привет (пишется nǐ hǎo)","tj":"салом (навишта мешавад nǐ hǎo)"},"pattern":"变调 (3+3)"},{"l":2,"t":{"uz":"不 — inkor yuklamasi","ru":"不 — отрицательная частица","tj":"不 — ҳарфи инкорӣ"},"f":{"uz":"不(bù) — inkor yuklamasi (yo'q, emas).\nDiqqat: 不 4-ton, lekin keyingi bo'g'in ham 4-ton bo'lsa, 2-tonga o'zgaradi.\nbù + 4-ton → bú + 4-ton\nMisol: 不客气 → bú kèqi\n不谢 → bú xiè","ru":"不(bù) — отрицательная частица (нет, не).\nПримечание: 不 имеет 4-й тон, но меняется на 2-й перед другим слогом 4-го тона.\nbù + 4-й тон → bú + 4-й тон\nПример: 不客气 → bú kèqi\n不谢 → bú xiè","tj":"不(bù) — ҳарфи инкорӣ (не, нест).\nДиққат: 不 садои 4-ум дорад, аммо агар ҳиҷои баъдӣ ҳам садои 4-ум бошад, ба садои 2-юм иваз мешавад.\nbù + садои 4 → bú + садои 4\nМисол: 不客气 → bú kèqi\n不谢 → bú xiè"},"e":{"zh":"不谢","p":"bú xiè","uz":"iltimos (so'zma-so'z: rahmat yo'q)","ru":"пожалуйста (дословно: не благодари)","tj":"хоҳиш мекунам"},"pattern":"不 — inkor yuklamasi"},{"l":2,"t":{"uz":"轻声 — neytral ton","ru":"轻声 — нейтральный тон","tj":"轻声 — садои бетараф"},"f":{"uz":"Xitoy tilida 5-ton ham bor — neytral ton (轻声).\nU qisqa va engil, ton belgisi yo'q.\nKo'pincha qarindoshlik atamalarida uchraydi.\nMisol: 妈妈(māma), 爸爸(bàba), 爷爷(yéye), 奶奶(nǎinai)","ru":"В китайском также есть 5-й тон — нейтральный (轻声).\nОн короткий и лёгкий, без знака тона.\nЧасто встречается в терминах родства.\nПример: 妈妈(māma), 爸爸(bàba), 爷爷(yéye), 奶奶(nǎinai)","tj":"Дар забони чинӣ садои 5-ум ҳам вуҷуд дорад — садои бетараф (轻声).\nОн кӯтоҳ ва сабук аст, бе нишонаи садо.\nБештар дар истилоҳоти хешутаборӣ истифода мешавад.\nМисол: 妈妈(māma), 爸爸(bàba), 爷爷(yéye), 奶奶(nǎinai)"},"e":{"zh":"妈妈","p":"māma","uz":"ona","ru":"мама","tj":"модар"},"pattern":"轻声 — neytral ton"},{"l":3,"t":{"uz":"是 bilan tuzilgan gap","ru":"Предложения с 是","tj":"Ҷумлаҳо бо 是"},"f":{"uz":"是(shì) — tenglikni ifodalaydi (= bo'lmoq).\nTuzilma: Ega + 是 + Ot/Ot birikmasi\nInkor: Ega + 不是 + Ot/Ot birikmasi\n\nMisol:\n我是老师。— Men o'qituvchiman.\n我不是老师。— Men o'qituvchi emasman.\n李月是中国人。— Li Yue xitoylik.","ru":"是(shì) — выражает равенство (= являться).\nСтруктура: Подлежащее + 是 + Существительное/Именная группа\nОтрицание: Подлежащее + 不是 + Существительное/Именная группа\n\nПример:\n我是老师。— Я учитель.\n我不是老师。— Я не учитель.\n李月是中国人。— Ли Юэ китаянка.","tj":"是(shì) — баробариро ифода мекунад (= будан).\nСохтор: Мубтадо + 是 + Исм/Гурӯҳи исмӣ\nИнкор: Мубтадо + 不是 + Исм/Гурӯҳи исмӣ\n\nМисол:\n我是老师。— Ман муаллим ҳастам.\n我不是老师。— Ман муаллим нестам.\n李月是中国人。— Ли Юэ хитоӣ аст."},"e":{"zh":"我是学生。","p":"Wǒ shì xuésheng.","uz":"Men talabaman.","ru":"Я студент.","tj":"Ман донишҷӯ ҳастам."},"pattern":"是字句"},{"l":3,"t":{"uz":"吗 — so'roq yuklamasi","ru":"吗 — вопросительная частица","tj":"吗 — ҳарфи саволӣ"},"f":{"uz":"吗(ma) — gap oxiriga qo'yilsa, uni ha/yo'q savoliga aylantiradi.\nTuzilma: Gap + 吗？\n\nMisol:\n你是老师。→ 你是老师吗？\nSiz o'qituvchisiz. → Siz o'qituvchimisiz?\n\nJavob: 是 (ha) yoki 不是 (yo'q)","ru":"吗(ma) — ставится в конце предложения, превращая его в вопрос «да/нет».\nСтруктура: Утверждение + 吗？\n\nПример:\n你是老师。→ 你是老师吗？\nТы учитель. → Ты учитель?\n\nОтвет: 是 (да) или 不是 (нет)","tj":"吗(ma) — дар охири ҷумла гузошта, онро ба савол «бале/не» табдил медиҳад.\nСохтор: Изҳор + 吗？\n\nМисол:\n你是老师。→ 你是老师吗？\nШумо муаллим ҳастед. → Оё шумо муаллим ҳастед?\n\nҶавоб: 是 (бале) ё 不是 (не)"},"e":{"zh":"你是学生吗？","p":"Nǐ shì xuésheng ma?","uz":"Siz talabamisisz?","ru":"Вы студент?","tj":"Оё шумо донишҷӯ ҳастед?"},"pattern":"吗 — so'roq gapi"},{"l":3,"t":{"uz":"什么 — so'roq olmoshi","ru":"什么 — вопросительное местоимение","tj":"什么 — ҷонишини саволӣ"},"f":{"uz":"什么(shénme) — 'nima', 'qaysi' ma'nosini bildiradi.\nOxiriga 吗 qo'shmang — 什么 o'zi savolni ifodalaydi.\n\nMisol:\n你叫什么名字？— Ismingiz nima?\n这是什么？— Bu nima?\n你是什么人？— Siz kimsiz?","ru":"什么(shénme) — означает «что», «какой».\nНе добавляйте 吗 в конце — 什么 само делает предложение вопросительным.\n\nПример:\n你叫什么名字？— Как вас зовут?\n这是什么？— Что это?\n你是什么人？— Кто вы?","tj":"什么(shénme) — маънои «чӣ», «кадом» дорад.\n吗 -ро дар охир илова накунед — 什么 худ ҷумларо саволӣ мекунад.\n\nМисол:\n你叫什么名字？— Номи шумо чист?\n这是什么？— Ин чист?\n你是什么人？— Шумо кӣ ҳастед?"},"e":{"zh":"你叫什么名字？","p":"Nǐ jiào shénme míngzi?","uz":"Ismingiz nima?","ru":"Как вас зовут?","tj":"Номи шумо чист?"},"pattern":"什么 — so'roq olmoshi"},{"l":4,"t":{"uz":"的 — egalik yuklamasi","ru":"的 — показатель принадлежности","tj":"的 — ҳарфи моликият"},"f":{"uz":"的(de) — egalikni yoki bog'liqlikni ifodalaydi.\nTuzilma: Ot/Olmosh + 的 + Ot\n\nMisol:\n我的老师 — mening o'qituvchim\n她的朋友 — uning do'sti\n\nEslatma: Qarindoshlik va shaxsiy otlar oldida 的 tushirilishi mumkin:\n我(的)老师 ✓ — mening o'qituvchim\n我(的)朋友 ✓ — mening do'stim","ru":"的(de) — выражает принадлежность или ассоциацию.\nСтруктура: Существительное/Местоимение + 的 + Существительное\n\nПример:\n我的老师 — мой учитель\n她的朋友 — её подруга\n\nПримечание: 的 может опускаться перед терминами родства и личными существительными:\n我(的)老师 ✓ — мой учитель\n我(的)朋友 ✓ — мой друг","tj":"的(de) — моликият ё алоқаро ифода мекунад.\nСохтор: Исм/Ҷонишин + 的 + Исм\n\nМисол:\n我的老师 — муаллими ман\n她的朋友 — дӯсти вай\n\nЭзоҳ: 的 пеш аз истилоҳоти хешутаборӣ ва исмҳои шахсӣ метавонад ҳазф шавад:\n我(的)老师 ✓ — муаллими ман\n我(的)朋友 ✓ — дӯсти ман"},"e":{"zh":"我的汉语老师","p":"wǒ de Hànyǔ lǎoshī","uz":"mening xitoy tili o'qituvchim","ru":"мой преподаватель китайского","tj":"муаллими забони чинии ман"},"pattern":"结构助词 的"},{"l":4,"t":{"uz":"谁 — 'kim' so'roq olmoshi","ru":"谁 — вопросительное местоимение «кто»","tj":"谁 — ҷонишини саволии «кӣ»"},"f":{"uz":"谁(shéi) — 'kim?' ma'nosini bildiradi.\nGap ega yoki to'ldiruvchi bo'lib kelishi mumkin.\n\nMisol:\n她是谁？— U kim?\n谁是老师？— Kim o'qituvchi?\n他是谁的朋友？— U kimning do'sti?","ru":"谁(shéi) — означает «кто?».\nМожет выступать подлежащим или дополнением.\n\nПример:\n她是谁？— Кто она?\n谁是老师？— Кто учитель?\n他是谁的朋友？— Чей он друг?","tj":"谁(shéi) — маънои «кӣ?» дорад.\nМетавонад мубтадо ё пуркунанда бошад.\n\nМисол:\n她是谁？— Вай кӣ аст?\n谁是老师？— Кӣ муаллим аст?\n他是谁的朋友？— Дӯсти кӣ аст вай?"},"e":{"zh":"她是谁？","p":"Tā shì shéi?","uz":"U kim?","ru":"Кто она?","tj":"Вай кӣ аст?"},"pattern":"谁 — kim so'roq olmoshi"},{"l":4,"t":{"uz":"呢 — qaytarma savol yuklamasi","ru":"呢 — уточняющая частица","tj":"呢 — ҳарфи савол бозгашт"},"f":{"uz":"呢(ne) — oldingi gapda tilga olingan mavzu bo'yicha so'rashda ishlatiladi.\nTuzilma: ...A... B呢？ (B-chi?)\n\nMisol:\n我是美国人。你呢？\nMen amerikalikman. Siz-chi?\n\n她叫李月。他呢？\nUning ismi Li Yue. U-chi?","ru":"呢(ne) — используется для вопроса о той же теме, упомянутой в предыдущем предложении.\nСтруктура: ...A... B呢？ (А как насчёт B?)\n\nПример:\n我是美国人。你呢？\nЯ американец. А вы?\n\n她叫李月。他呢？\nЕё зовут Ли Юэ. А его?","tj":"呢(ne) — барои пурсидан дар бораи мавзӯи қаблан зикршуда истифода мешавад.\nСохтор: ...A... B呢？ (Чӣ дар бораи B?)\n\nМисол:\n我是美国人。你呢？\nМан амрикоӣ ҳастам. Шумо чӣ?\n\n她叫李月。他呢？\nНомаш Ли Юэ аст. Вай чӣ?"},"e":{"zh":"我是学生。你呢？","p":"Wǒ shì xuésheng. Nǐ ne?","uz":"Men talabaman. Siz-chi?","ru":"Я студент. А вы?","tj":"Ман донишҷӯ ҳастам. Шумо чӣ?"},"pattern":"呢 — qaytarma savol yuklamasi"},{"l":5,"t":{"uz":"几 — Necha? (10 gacha)","ru":"几 — Сколько? (до 10)","tj":"几 — Чанд? (то 10)"},"f":{"uz":"几(jǐ) — 10 dan kichik sonlar uchun so'roq so'zi.\nTuzilma: Ega + 有 + 几 + O'lchov so'zi + Ot?\n\nMisol:\n你家有几口人？— Sizning oilangizda necha kishi bor?\n你有几个汉语老师？— Nechta xitoy tili o'qituvchingiz bor?\n你女儿几岁了？— Qizingiz necha yoshda?","ru":"几(jǐ) — вопросительное слово для чисел менее 10.\nСтруктура: Подлежащее + 有 + 几 + Счётное слово + Существительное?\n\nПример:\n你家有几口人？— Сколько человек в вашей семье?\n你有几个汉语老师？— Сколько у вас преподавателей китайского?\n你女儿几岁了？— Сколько лет вашей дочери?","tj":"几(jǐ) — калимаи саволӣ барои рақамҳои камтар аз 10.\nСохтор: Мубтадо + 有 + 几 + Калимаи шуморавӣ + Исм?\n\nМисол:\n你家有几口人？— Дар оилаи шумо чанд нафар аст?\n你有几个汉语老师？— Шумо чанд муаллими забони чинӣ доред?\n你女儿几岁了？— Духтаратон чанд сол дорад?"},"e":{"zh":"你家有几口人？","p":"Nǐ jiā yǒu jǐ kǒu rén?","uz":"Sizning oilangizda necha kishi bor?","ru":"Сколько человек в вашей семье?","tj":"Дар оилаи шумо чанд нафар аст?"},"pattern":"几 — Necha? (10 gacha)"},{"l":5,"t":{"uz":"100 gacha raqamlar","ru":"Числа до 100","tj":"Рақамҳо то 100"},"f":{"uz":"1-10: 一yī 二èr 三sān 四sì 五wǔ 六liù 七qī 八bā 九jiǔ 十shí\n\nO'nliklar:\n20 = 二十 (èrshí)\n30 = 三十 (sānshí)\n50 = 五十 (wǔshí)\n99 = 九十九 (jiǔshíjiǔ)\n\nAralash:\n23 = 二十三 (èrshísān)\n56 = 五十六 (wǔshíliù)\n88 = 八十八 (bāshíbā)","ru":"1-10: 一yī 二èr 三sān 四sì 五wǔ 六liù 七qī 八bā 九jiǔ 十shí\n\nДесятки:\n20 = 二十 (èrshí)\n30 = 三十 (sānshí)\n50 = 五十 (wǔshí)\n99 = 九十九 (jiǔshíjiǔ)\n\nСоставные:\n23 = 二十三 (èrshísān)\n56 = 五十六 (wǔshíliù)\n88 = 八十八 (bāshíbā)","tj":"1-10: 一yī 二èr 三sān 四sì 五wǔ 六liù 七qī 八bā 九jiǔ 十shí\n\nДаҳгонаҳо:\n20 = 二十 (èrshí)\n30 = 三十 (sānshí)\n50 = 五十 (wǔshí)\n99 = 九十九 (jiǔshíjiǔ)\n\nОмехта:\n23 = 二十三 (èrshísān)\n56 = 五十六 (wǔshíliù)\n88 = 八十八 (bāshíbā)"},"e":{"zh":"二十","p":"èrshí","uz":"yigirma","ru":"двадцать","tj":"бист"},"pattern":"100 gacha raqamlar"},{"l":5,"t":{"uz":"了 — holat o'zgarishi yuklamasi","ru":"了 — частица изменения состояния","tj":"了 — ҳарфи тағйири ҳолат"},"f":{"uz":"了(le) — gap oxiriga qo'yilsa, yangi holat yoki o'zgarishni bildiradi.\n\nMisol:\n她今年五十岁了。— U bu yil ellik yoshga kirdi (yangi holat).\n我女儿四岁了。— Qizim to'rt yoshga to'ldi.\n\n多大了？— Necha yoshga kirdingiz? (yosh so'rash)","ru":"了(le) — ставится в конце предложения, указывая на новое состояние или изменение.\n\nПример:\n她今年五十岁了。— В этом году ей исполнилось пятьдесят (новое состояние).\n我女儿四岁了。— Моей дочери исполнилось четыре.\n\n多大了？— Сколько вам лет? (спрашиваем возраст)","tj":"了(le) — дар охири ҷумла ҳолати нав ё тағйирро нишон медиҳад.\n\nМисол:\n她今年五十岁了。— Вай имсол панҷоҳ сол шуд (ҳолати нав).\n我女儿四岁了。— Духтарам чор сол шуд.\n\n多大了？— Шумо чанд сол шудед? (пурсидани синну сол)"},"e":{"zh":"她今年二十岁了。","p":"Tā jīnnián èrshí suì le.","uz":"U bu yil yigirma yoshga kirdi.","ru":"В этом году ей исполнилось двадцать.","tj":"Вай имсол бист сол шуд."},"pattern":"了 — holat o'zgarishi yuklamasi"},{"l":5,"t":{"uz":"多大 vs 几岁 — yosh so'rash","ru":"多大 vs 几岁 — спрашиваем возраст","tj":"多大 vs 几岁 — пурсидани синну сол"},"f":{"uz":"多大(duō dà) — kattalar yoshini so'rash uchun.\n几岁(jǐ suì) — bolalar yoshini so'rash uchun (10 gacha).\n\nKattalar: 你多大了？— Siz necha yoshdasiz?\nBolalar: 你女儿几岁了？— Qizingiz necha yoshda?","ru":"多大(duō dà) — спрашиваем возраст взрослых.\n几岁(jǐ suì) — спрашиваем возраст детей (до 10).\n\nВзрослые: 你多大了？— Сколько вам лет?\nДети: 你女儿几岁了？— Сколько лет вашей дочери?","tj":"多大(duō dà) — пурсидани синну соли калонсолон.\n几岁(jǐ suì) — пурсидани синну соли кӯдакон (то 10).\n\nКалонсолон: 你多大了？— Шумо чанд сол доред?\nКӯдакон: 你女儿几岁了？— Духтаратон чанд сол дорад?"},"e":{"zh":"你多大了？","p":"Nǐ duō dà le?","uz":"Siz necha yoshdasiz? (kattalar)","ru":"Сколько вам лет? (взрослые)","tj":"Шумо чанд сол доред? (калонсолон)"},"pattern":"多大 vs 几岁 — yosh so'rash"},{"l":6,"t":{"uz":"Modal fe'l 会","ru":"Модальный глагол 会","tj":"Феъли модалии 会"},"f":{"uz":"会(huì) — o'rganish orqali erishilgan qobiliyatni ifodalaydi.\nTuzilma: Ega + (不)会 + Fe'l\n\nTasdiq: 我会说汉语。— Men xitoycha gapira olaman.\nInkor: 我不会做中国菜。— Men xitoy taomini tayyorlay olmayman.\nSavol: 你会写汉字吗？— Siz xitoy ierogliflarini yoza olasizmi?\n\nEslatma: Inkorda 不会, ha/yo'q savolda 吗 ishlatiladi.","ru":"会(huì) — выражает способность, приобретённую через обучение.\nСтруктура: Подлежащее + (不)会 + Глагол\n\nУтверждение: 我会说汉语。— Я умею говорить по-китайски.\nОтрицание: 我不会做中国菜。— Я не умею готовить китайскую еду.\nВопрос: 你会写汉字吗？— Вы умеете писать иероглифы?\n\nПримечание: для отрицания 不会, для вопроса — 吗.","tj":"会(huì) — қобилияти аз тариқи омӯзиш ба даст овардашударо ифода мекунад.\nСохтор: Мубтадо + (不)会 + Феъл\n\nТасдиқ: 我会说汉语。— Ман метавонам ба забони чинӣ гап бизанам.\nИнкор: 我不会做中国菜。— Ман наметавонам хӯроки чинӣ тайёр кунам.\nСавол: 你会写汉字吗？— Оё шумо метавонед иероглифҳо нависед?\n\nЭзоҳ: Барои инкор 不会, барои савол — 吗 истифода мешавад."},"e":{"zh":"我会说汉语。","p":"Wǒ huì shuō Hànyǔ.","uz":"Men xitoycha gapira olaman.","ru":"Я умею говорить по-китайски.","tj":"Ман метавонам ба забони чинӣ гап бизанам."},"pattern":"能愿动词 会"},{"l":6,"t":{"uz":"Sifat kesimli gap","ru":"Предложение с прилагательным-сказуемым","tj":"Ҷумла бо сифати хабарӣ"},"f":{"uz":"Sifat kesimli gap: Ega + 很/不 + Sifat\n\nXitoy tilida sifat gap kesimi bo'la oladi.\nTasdiq gaplarda odatda 很(hěn) ishlatiladi:\n中国菜很好吃。— Xitoy taomlari juda mazali.\n\nInkor gaplarda 不 ishlatiladi (很 shart emas):\n我妈妈的汉语不好。— Onamning xitoy tili yaxshi emas.\n\nEslatma: 很 ko'pincha grammatik talab sifatida ishlatiladi.","ru":"Предложение с прилагательным: Подлежащее + 很/不 + Прилагательное\n\nВ китайском языке прилагательное может быть сказуемым.\nВ утвердительных предложениях обычно используется 很(hěn):\n中国菜很好吃。— Китайская еда очень вкусная.\n\nВ отрицательных предложениях используется 不 (很 не нужен):\n我妈妈的汉语不好。— Китайский мамы нехороший.\n\nПримечание: 很 часто семантически слабый, нужен по грамматике.","tj":"Ҷумла бо сифати хабарӣ: Мубтадо + 很/不 + Сифат\n\nДар забони чинӣ сифат метавонад хабар бошад.\nДар ҷумлаҳои тасдиқӣ одатан 很(hěn) истифода мешавад:\n中国菜很好吃。— Хӯроки чинӣ хеле болаззат аст.\n\nДар ҷумлаҳои инкорӣ 不 истифода мешавад (很 лозим нест):\n我妈妈的汉语不好。— Забони чинии модарам хуб нест.\n\nЭзоҳ: 很 аксар аз рӯи талаботи грамматикӣ истифода мешавад."},"e":{"zh":"中国菜很好吃。","p":"Zhōngguó cài hěn hǎochī.","uz":"Xitoy taomlari juda mazali.","ru":"Китайская еда очень вкусная.","tj":"Хӯроки чинӣ хеле болаззат аст."},"pattern":"形容词谓语句"},{"l":6,"t":{"uz":"怎么 — qanday so'roq olmoshi","ru":"怎么 — вопросительное наречие","tj":"怎么 — ҷонишини саволии тарзӣ"},"f":{"uz":"怎么(zěnme) — fe'l oldiga qo'yilib, harakat usulini so'raydi.\nTuzilma: Ega + 怎么 + Fe'l?\n\nMisol:\n这个字怎么写？— Bu ieroglif qanday yoziladi?\n这个字怎么读？— Bu ieroglif qanday o'qiladi?\n中国菜怎么做？— Xitoy taomini qanday tayyorlash kerak?","ru":"怎么(zěnme) — ставится перед глаголом, спрашивает о способе действия.\nСтруктура: Подлежащее + 怎么 + Глагол?\n\nПример:\n这个字怎么写？— Как пишется этот иероглиф?\n这个字怎么读？— Как читается этот иероглиф?\n中国菜怎么做？— Как готовить китайскую еду?","tj":"怎么(zěnme) — пеш аз феъл гузошта, тарзи амалро мепурсад.\nСохтор: Мубтадо + 怎么 + Феъл?\n\nМисол:\n这个字怎么写？— Ин иероглиф чӣ тавр навишта мешавад?\n这个字怎么读？— Ин иероглиф чӣ тавр хонда мешавад?\n中国菜怎么做？— Хӯроки чинӣ чӣ тавр тайёр карда мешавад?"},"e":{"zh":"这个字怎么写？","p":"Zhège zì zěnme xiě?","uz":"Bu ieroglif qanday yoziladi?","ru":"Как пишется этот иероглиф?","tj":"Ин иероглиф чӣ тавр навишта мешавад?"},"pattern":"怎么 — qanday so'roq olmoshi"},{"l":7,"t":{"uz":"Sanani ifodalash","ru":"Выражение даты","tj":"Ифодаи сана"},"f":{"uz":"Xitoy tilida sanalar eng kattadan eng kichigiga qadar ifodalanadi:\nYil → Oy → Kun → Haftaning kuni\n\nOy: 一月 (yanvar) ~ 十二月 (dekabr)\nKun: 1号 (1-chi) ~ 31号 (31-chi)\n\nHaftaning kunlari:\n星期一 Dushanba\n星期二 Seshanba\n星期三 Chorshanba\n星期四 Payshanba\n星期五 Juma\n星期六 Shanba\n星期日/星期天 Yakshanba\n\nMisol: 9月1号，星期三 — 1-sentabr, chorshanba","ru":"В китайском языке даты выражаются от большего к меньшему:\nГод → Месяц → День → День недели\n\nМесяц: 一月 (январь) ~ 十二月 (декабрь)\nДень: 1号 (1-е) ~ 31号 (31-е)\n\nДни недели:\n星期一 Понедельник\n星期二 Вторник\n星期三 Среда\n星期四 Четверг\n星期五 Пятница\n星期六 Суббота\n星期日/星期天 Воскресенье\n\nПример: 9月1号，星期三 — 1 сентября, среда","tj":"Дар забони чинӣ санаҳо аз калон ба хурд ифода мешаванд:\nСол → Моҳ → Рӯз → Рӯзи ҳафта\n\nМоҳ: 一月 (январ) ~ 十二月 (декабр)\nРӯз: 1号 (1-ум) ~ 31号 (31-ум)\n\nРӯзҳои ҳафта:\n星期一 Душанбе\n星期二 Сешанбе\n星期三 Чоршанбе\n星期四 Панҷшанбе\n星期五 Ҷумъа\n星期六 Шанбе\n星期日/星期天 Якшанбе\n\nМисол: 9月1号，星期三 — 1-уми сентябр, чоршанбе"},"e":{"zh":"今天9月1号，星期三。","p":"Jīntiān jiǔ yuè yī hào, xīngqī sān.","uz":"Bugun 1-sentabr, chorshanba.","ru":"Сегодня 1 сентября, среда.","tj":"Имрӯз 1-уми сентябр, чоршанбе."},"pattern":"日期的表达 — Sana ifodalash"},{"l":7,"t":{"uz":"Ot kesimli gap","ru":"Предложение с именным сказуемым","tj":"Ҷумлаи бо исми хабар"},"f":{"uz":"Ot yoki raqam kesim bo'lib kela oladi (是 talab etilmaydi).\nKo'pincha yosh, sana va vaqtni ifodalashda ishlatiladi.\n\nMisol:\n今天9月1号。— Bugun 1-sentabr. (9月1号 — ot kesim)\n明天星期三。— Ertaga chorshanba.\n我的汉语老师33岁。— Mening xitoy tili o'qituvchim 33 yoshda.","ru":"Существительное или числительное может выступать сказуемым (是 не требуется).\nЧасто используется для выражения возраста, дат и времени.\n\nПример:\n今天9月1号。— Сегодня 1 сентября. (9月1号 — именное сказуемое)\n明天星期三。— Завтра среда.\n我的汉语老师33岁。— Моему учителю китайского 33 года.","tj":"Исм ё рақам метавонад хабар бошад (是 лозим нест).\nАксар вақт барои ифодаи синну сол, сана ва вақт истифода мешавад.\n\nМисол:\n今天9月1号。— Имрӯз 1-уми сентябр аст. (9月1号 — хабари исмӣ)\n明天星期三。— Фардо чоршанбе аст.\n我的汉语老师33岁。— Устоди забони чинии ман 33 сола аст."},"e":{"zh":"今天9月1号。","p":"Jīntiān jiǔ yuè yī hào.","uz":"Bugun 1-sentabr.","ru":"Сегодня 1 сентября.","tj":"Имрӯз 1-уми сентябр аст."},"pattern":"名词谓语句 — Ot kesimli gap"},{"l":7,"t":{"uz":"Ketma-ket fe'l gapi: 去+joy+harakat","ru":"Последовательный глагольный оборот: 去+место+действие","tj":"Ҷумлаи пайдарпайи феълӣ: 去+ҷой+амал"},"f":{"uz":"Ketma-ket fe'l gap: birinchi harakat ikkinchisining maqsadini bildiradi.\nTuzilishi: Ega + 去 + Joy + Fe'l + To'ldiruvchi\n\nMisol:\n我去学校看书。— Men maktabga kitob o'qigani boraman.\n我去中国学习汉语。— Men Xitoyga xitoy tili o'rganishga boraman.\n\nSavol: 你去哪儿做什么？— Qayerga va nima qilgani borasan?","ru":"Последовательный глагольный оборот: первое действие выражает цель второго.\nСтруктура: Подлежащее + 去 + Место + Глагол + Дополнение\n\nПример:\n我去学校看书。— Я иду в школу читать.\n我去中国学习汉语。— Я еду в Китай учить китайский.\n\nВопрос: 你去哪儿做什么？— Куда ты идёшь и что будешь делать?","tj":"Ҷумлаи пайдарпайи феълӣ: амали аввал мақсади дуввумро ифода мекунад.\nСохтор: Мубтадо + 去 + Ҷой + Феъл + Пуркунанда\n\nМисол:\n我去学校看书。— Ман ба мактаб рафта китоб мехонам.\n我去中国学习汉语。— Ман ба Чин рафта забони чинӣ меомӯзам.\n\nСавол: 你去哪儿做什么？— Ту ба куҷо рафта чӣ мекунӣ?"},"e":{"zh":"我去学校看书。","p":"Wǒ qù xuéxiào kàn shū.","uz":"Men maktabga kitob o'qigani boraman.","ru":"Я иду в школу читать.","tj":"Ман ба мактаб рафта китоб мехонам."},"pattern":"连动句 — 去+joy+nima qilish"},{"l":8,"t":{"uz":"Modal fe'l 想 (xohlamoq)","ru":"Модальный глагол 想 (хотеть)","tj":"Феъли модалии 想 (хостан)"},"f":{"uz":"想 (xiǎng) — istak yoki niyatni bildiradi.\nTuzilishi: Ega + 想 + Fe'l + To'ldiruvchi\n\nTasdiq: 我想喝茶。— Men choy ichmoqchiman.\nSavol: 你想做什么？— Nima qilmoqchisiz?\n\n想 va 会:\n我想说汉语。— Men xitoycha gapirmoqchiman (istak).\n我会说汉语。— Men xitoycha gapira olaman (qobiliyat).","ru":"想 (xiǎng) — выражает желание или намерение.\nСтруктура: Подлежащее + 想 + Глагол + Дополнение\n\nУтверждение: 我想喝茶。— Я хочу выпить чай.\nВопрос: 你想做什么？— Что вы хотите делать?\n\n想 и 会:\n我想说汉语。— Я хочу говорить по-китайски (желание).\n我会说汉语。— Я умею говорить по-китайски (способность).","tj":"想 (xiǎng) — орзу ё ниятро ифода мекунад.\nСохтор: Мубтадо + 想 + Феъл + Пуркунанда\n\nТасдиқ: 我想喝茶。— Ман чой нӯшидан мехоҳам.\nСавол: 你想做什么？— Шумо чӣ кардан мехоҳед?\n\n想 ва 会:\n我想说汉语。— Ман забони чинӣ гап задан мехоҳам (орзу).\n我会说汉语。— Ман забони чинӣ гап зада метавонам (тавоноӣ)."},"e":{"zh":"我想喝茶。","p":"Wǒ xiǎng hē chá.","uz":"Men choy ichmoqchiman.","ru":"Я хочу выпить чай.","tj":"Ман чой нӯшидан мехоҳам."},"pattern":"能愿动词 想 — Modal fe'l 想"},{"l":8,"t":{"uz":"多少 — Miqdor savoli (10 dan ortiq)","ru":"多少 — Вопрос о количестве (больше 10)","tj":"多少 — Савол дар бораи миқдор (аз 10 зиёд)"},"f":{"uz":"多少 (duōshao) — 10 dan ortiq sonlar uchun savol so'zi.\nEslatma: 几 (jǐ) 10 gacha, 多少 (duōshao) 10 dan ortiq.\n\nNarx so'rash: ……多少钱？\n这个杯子多少钱？— Bu piyola qancha turadi?\n\nMiqdor so'rash:\n你们学校有多少学生？— Maktabingizda nechta o'quvchi bor?\n你有多少钱？— Sizda qancha pul bor?","ru":"多少 (duōshao) — вопросительное слово для чисел больше 10.\nПримечание: 几 (jǐ) для чисел до 10; 多少 (duōshao) для чисел больше 10.\n\nСпросить цену: ……多少钱？\n这个杯子多少钱？— Сколько стоит этот стакан?\n\nСпросить количество:\n你们学校有多少学生？— Сколько учеников в вашей школе?\n你有多少钱？— Сколько у вас денег?","tj":"多少 (duōshao) — калимаи саволии барои ададҳои аз 10 зиёд.\nҚайд: 几 (jǐ) барои ададҳо то 10; 多少 (duōshao) барои аз 10 зиёд.\n\nПурсидани нарх: ……多少钱？\n这个杯子多少钱？— Ин пиёла чанд пул аст?\n\nПурсидани миқдор:\n你们学校有多少学生？— Дар мактаби шумо чанд нафар шогирд аст?\n你有多少钱？— Шумо чанд пул доред?"},"e":{"zh":"这个杯子多少钱？","p":"Zhège bēizi duōshao qián?","uz":"Bu piyola qancha turadi?","ru":"Сколько стоит этот стакан?","tj":"Ин пиёла чанд пул аст?"},"pattern":"多少 — Qancha so'rog'i (10+)"},{"l":8,"t":{"uz":"O'lchov so'zlar 个/口","ru":"Счётные слова 个/口","tj":"Калимаҳои шуморавӣ 个/口"},"f":{"uz":"Xitoy tilida son va otning orasida o'lchov so'z kerak.\n\n个 (gè) — eng umumiy o'lchov so'z:\n一个杯子 — bir piyola\n三个学生 — uch o'quvchi\n两个老师 — ikki o'qituvchi\n\n口 (kǒu) — oila a'zolari uchun:\n三口人 — uch kishilik oila\n六口人 — olti kishilik oila","ru":"В китайском языке между числом и существительным необходимо счётное слово.\n\n个 (gè) — наиболее общее счётное слово:\n一个杯子 — один стакан\n三个学生 — три ученика\n两个老师 — два учителя\n\n口 (kǒu) — для членов семьи:\n三口人 — семья из трёх человек\n六口人 — семья из шести человек","tj":"Дар забони чинӣ байни адад ва исм калимаи шуморавӣ лозим аст.\n\n个 (gè) — умумитарин калимаи шуморавӣ:\n一个杯子 — як дона пиёла\n三个学生 — се нафар шогирд\n两个老师 — ду нафар устод\n\n口 (kǒu) — барои аъзоёни оила:\n三口人 — оилаи се нафара\n六口人 — оилаи шаш нафара"},"e":{"zh":"一个杯子","p":"yī gè bēizi","uz":"bir piyola","ru":"один стакан","tj":"як дона пиёла"},"pattern":"量词 个/口 — O'lchov so'zlar"},{"l":8,"t":{"uz":"Pul miqdorini ifodalash","ru":"Выражение денежных сумм","tj":"Ифодаи маблағи пул"},"f":{"uz":"Xitoy valyutasi: 人民币 (Renminbi, RMB)\nRasmiy: 元 (yuán)\nSo'zlashuv: 块 (kuài)\n\nMisol:\n28块 = 28元 — 28 yuan\n18块钱 — 18 yuan (so'zlashuv shakli)\n\n这个杯子多少钱？— Bu piyola qancha turadi?\n28块。— 28 yuan.","ru":"Китайская валюта: 人民币 (Жэньминьби, RMB)\nОфициально: 元 (yuán)\nРазговорно: 块 (kuài)\n\nПример:\n28块 = 28元 — 28 юаней\n18块钱 — 18 юаней (разговорная форма)\n\n这个杯子多少钱？— Сколько стоит этот стакан?\n28块。— 28 юаней.","tj":"Асъори чинӣ: 人民币 (Жэньминьби, RMB)\nРасмӣ: 元 (yuán)\nГуфтугӯӣ: 块 (kuài)\n\nМисол:\n28块 = 28元 — 28 юан\n18块钱 — 18 юан (шакли гуфтугӯӣ)\n\n这个杯子多少钱？— Ин пиёла чанд пул аст?\n28块。— 28 юан."},"e":{"zh":"这个多少钱？","p":"Zhège duōshao qián?","uz":"Bu qancha turadi?","ru":"Сколько это стоит?","tj":"Ин чанд пул аст?"},"pattern":"钱数的表达 — Pul miqdori"},{"l":9,"t":{"uz":"Fe'l 在 (joylashuv)","ru":"Глагол 在 (местонахождение)","tj":"Феъли 在 (ҷойгиршавӣ)"},"f":{"uz":"在(zài) — fe'l sifatida biror narsa yoki kishining qayerda ekanligini bildiradi.\nTuzilish: Ega + 在 + Joy\n\nInkor: Ega + 不在 + Joy\n爸爸不在家。— Ota uyda emas.","ru":"在(zài) — как глагол указывает, где находится кто-то или что-то.\nСтруктура: Подлежащее + 在 + Место\n\nОтрицание: Подлежащее + 不在 + Место\n爸爸不在家。— Папа не дома.","tj":"在(zài) — ҳамчун феъл нишон медиҳад, ки чизе ё касе дар куҷо аст.\nСохтор: Муб. + 在 + Ҷой\n\nИнкор: Муб. + 不在 + Ҷой\n爸爸不在家。— Падар дар хона нест."},"e":{"zh":"小猫在那儿。","p":"Xiǎo māo zài nàr.","uz":"Mushuk u yerda.","ru":"Кошка вон там.","tj":"Гурба он ҷост."},"pattern":"动词 在"},{"l":9,"t":{"uz":"哪儿 — joylashuv so'roq olmoshi","ru":"哪儿 — вопросительное местоимение места","tj":"哪儿 — зарфи истифсори ҷой"},"f":{"uz":"哪儿(nǎr) — joylashuvni so'rash uchun ishlatiladigan so'roq so'zi.\nTuzilish: Ega + 在 + 哪儿?\n\nMisol:\n小猫在哪儿？— Mushuk qayerda?\n你在哪儿工作？— Siz qaerda ishlaysiz?\n他在哪儿呢？— Xo'sh, u qayerda?","ru":"哪儿(nǎr) — вопросительное слово для уточнения места.\nСтруктура: Подлежащее + 在 + 哪儿?\n\nПример:\n小猫在哪儿？— Где кошка?\n你在哪儿工作？— Где вы работаете?\n他在哪儿呢？— Где же он?","tj":"哪儿(nǎr) — калимаи суол барои пурсидани ҷой.\nСохтор: Муб. + 在 + 哪儿?\n\nНамуна:\n小猫在哪儿？— Гурба куҷост?\n你在哪儿工作？— Шумо дар куҷо кор мекунед?\n他在哪儿呢？— Пас ӯ куҷост?"},"e":{"zh":"你在哪儿工作？","p":"Nǐ zài nǎr gōngzuò?","uz":"Siz qaerda ishlaysiz?","ru":"Где вы работаете?","tj":"Шумо дар куҷо кор мекунед?"},"pattern":"哪儿 — jo'ylashuv so'roq olmoshi"},{"l":9,"t":{"uz":"Predlog 在 (joy bildiradi)","ru":"Предлог 在 (указывает место действия)","tj":"Пешоянди 在 (ҷойи амал)"},"f":{"uz":"在(zài) — predlog sifatida fe'ldan oldin kelib, harakatning qayerda sodir bo'lishini bildiradi.\nTuzilish: Ega + 在 + Joy + Fe'l\n\nFarq:\n她在医院。(Fe'l 在) — U kasalxonada.\n她在医院工作。(Predlog 在) — U kasalxonada ishlaydi.","ru":"在(zài) — как предлог стоит перед глаголом и указывает место действия.\nСтруктура: Подлежащее + 在 + Место + Глагол\n\nРазница:\n她在医院。(Глагол 在) — Она в больнице.\n她在医院工作。(Предлог 在) — Она работает в больнице.","tj":"在(zài) — ҳамчун пешоянд пеш аз феъл меояд ва ҷойи амалро нишон медиҳад.\nСохтор: Муб. + 在 + Ҷой + Феъл\n\nФарқ:\n她在医院。(Феъли 在) — Ӯ дар беморхона аст.\n她在医院工作。(Пешоянди 在) — Ӯ дар беморхона кор мекунад."},"e":{"zh":"我儿子在医院工作。","p":"Wǒ érzi zài yīyuàn gōngzuò.","uz":"O'g'lim kasalxonada ishlaydi.","ru":"Мой сын работает в больнице.","tj":"Писарам дар беморхона кор мекунад."},"pattern":"介词 在"},{"l":10,"t":{"uz":"有 gapi (mavjudlik)","ru":"Предложения с 有 (существование)","tj":"Ҷумлаи 有 (мавҷудият)"},"f":{"uz":"有(yǒu) — biror joyda narsa yoki kishining borligini bildiradi.\nTuzilish: Joy + 有 + Narsa/Kishi\n\nInkor: 没有 (méiyǒu)\n椅子下面没有小狗。— Stul ostida it yo'q.\n这儿有人吗？ — 没有。— Bu yerda kimdir bormi? — Yo'q.","ru":"有(yǒu) — указывает на существование чего-то/кого-то в определённом месте.\nСтруктура: Место + 有 + Предмет/Человек\n\nОтрицание: 没有 (méiyǒu)\n椅子下面没有小狗。— Под стулом нет собаки.\n这儿有人吗？ — 没有。— Здесь кто-то есть? — Нет.","tj":"有(yǒu) — мавҷудияти чизе ё касеро дар ҷои муайян нишон медиҳад.\nСохтор: Ҷой + 有 + Чиз/Кас\n\nИнкор: 没有 (méiyǒu)\n椅子下面没有小狗。— Зери курсӣ саг нест.\n这儿有人吗？ — 没有。— Ин ҷо кас ҳаст? — Не."},"e":{"zh":"桌子上有一个电脑。","p":"Zhuōzi shàng yǒu yī gè diànnǎo.","uz":"Stol ustida bitta kompyuter bor.","ru":"На столе стоит компьютер.","tj":"Болои мӣз як компютер аст."},"pattern":"有字句"},{"l":10,"t":{"uz":"Bog'lovchi 和","ru":"Союз 和","tj":"Пайвандаки 和"},"f":{"uz":"和(hé) — ikki ot yoki olmoshni birlashtiradi ('va', 'bilan').\nTuzilish: Ot1 + 和 + Ot2\n\nEslatma: 和 faqat ot va olmoshlarni bog'laydi —\nfe'l va gaplarni bog'lay olmaydi.","ru":"和(hé) — соединяет два существительных или местоимения ('и', 'с').\nСтруктура: Сущ1 + 和 + Сущ2\n\nПримечание: 和 соединяет только существительные и местоимения —\nглаголы и предложения оно не соединяет.","tj":"和(hé) — ду исм ё ҷонишинро мепайвандад ('ва', 'бо').\nСохтор: Исм1 + 和 + Исм2\n\nЭзоҳ: 和 танҳо исмҳо ва ҷонишинҳоро мепайвандад —\nфеълҳо ва ҷумлаҳоро пайвандакӣ карда наметавонад."},"e":{"zh":"电脑和书","p":"diànnǎo hé shū","uz":"kompyuter va kitob","ru":"компьютер и книга","tj":"компютер ва китоб"},"pattern":"连词 和"},{"l":10,"t":{"uz":"Modal fe'l 能","ru":"Модальный глагол 能","tj":"Феъли модалии 能"},"f":{"uz":"能(néng) — imkoniyat yoki ruxsatni bildiradi.\nTuzilish: Ega + 能 + Fe'l\n\n能 va 会 farqi:\n会 — o'rganib orttirgan mahorat (biladi)\n能 — sharoitga asoslangan imkoniyat/ruxsat (qila oladi/mumkin)","ru":"能(néng) — выражает способность или разрешение.\nСтруктура: Подлежащее + 能 + Глагол\n\nРазница 能 и 会:\n会 — умение, приобретённое в результате обучения\n能 — возможность/разрешение в зависимости от обстоятельств","tj":"能(néng) — қобилият ё иҷозатро баён мекунад.\nСохтор: Муб. + 能 + Феъл\n\nФарқи 能 ва 会:\n会 — маҳорати аз омӯзиш ба даст омада\n能 — имконият/иҷозат вобаста ба шароит"},"e":{"zh":"我能坐这儿吗？","p":"Wǒ néng zuò zhèr ma?","uz":"Men bu yerga o'tirsam bo'ladimi?","ru":"Можно мне здесь сесть?","tj":"Ман метавонам ин ҷо нишинам?"},"pattern":"能愿动词 能"},{"l":11,"t":{"uz":"Vaqtni ifodalash","ru":"Выражение времени","tj":"Баёни вақт"},"f":{"uz":"Soat: 点(diǎn)\nDaqiqa: 分(fēn)\nTuzilish: N点 yoki N点M分\n\n9:00 → 九点\n10:10 → 十点十分\n5:30 → 五点三十分\n2:05 → 两点零五分\n\nKun qismlari:\n上午 shàngwǔ — ertalab (AM)\n中午 zhōngwǔ — tush\n下午 xiàwǔ — tushdan keyin (PM)\n\nEslatma: 2:00 → 两点 (liǎng diǎn), 二点 emas!","ru":"Час: 点(diǎn)\nМинута: 分(fēn)\nСтруктура: N点 или N点M分\n\n9:00 → 九点\n10:10 → 十点十分\n5:30 → 五点三十分\n2:05 → 两点零五分\n\nЧасти суток:\n上午 shàngwǔ — утро (AM)\n中午 zhōngwǔ — полдень\n下午 xiàwǔ — послеполудень (PM)\n\nВнимание: 2:00 → 两点 (liǎng diǎn), не 二点!","tj":"Соат: 点(diǎn)\nДақиқа: 分(fēn)\nСохтор: N点 ё N点M分\n\n9:00 → 九点\n10:10 → 十点十分\n5:30 → 五点三十分\n2:05 → 两点零五分\n\nҚисмҳои шабонарӯз:\n上午 shàngwǔ — субҳ (AM)\n中午 zhōngwǔ — нисфирӯзӣ\n下午 xiàwǔ — баъдазнисфирӯзӣ (PM)\n\nЭзоҳ: 2:00 → 两点 (liǎng diǎn), на 二点!"},"e":{"zh":"现在九点。","p":"Xiànzài jiǔ diǎn.","uz":"Hozir soat to'qqiz.","ru":"Сейчас девять часов.","tj":"Ҳоло соат нӯҳ аст."},"pattern":"时间的表达"},{"l":11,"t":{"uz":"Vaqt ravishi","ru":"Временное наречие","tj":"Зарфи вақт"},"f":{"uz":"Vaqt so'zi gapda ravish vazifasini bajarishi mumkin.\nU odatda egadan keyin yoki egadan oldin keladi.\n\n1-tuzilish: Ega + Vaqt + Fe'l\n妈妈六点做饭。— Onam soat oltida ovqat pishiradi.\n\n2-tuzilish: Vaqt + Ega + Fe'l\n中午十二点我们吃饭。— Biz tushda soat o'n ikkida ovqatlanamiz.\n\nSavol: 什么时候 — qachon?","ru":"Слово времени может служить наречием в предложении.\nОбычно стоит после подлежащего или перед ним.\n\nСтруктура 1: Подлежащее + Время + Глагол\n妈妈六点做饭。— Мама готовит в шесть.\n\nСтруктура 2: Время + Подлежащее + Глагол\n中午十二点我们吃饭。— В полдень в двенадцать мы обедаем.\n\nВопрос: 什么时候 — когда?","tj":"Калимаи вақт дар ҷумла метавонад зарф бошад.\nОдатан баъд аз мубтадо ё пеш аз он меояд.\n\nСохтори 1: Муб. + Вақт + Феъл\n妈妈六点做饭。— Модар соати шаш хӯрок мепазад.\n\nСохтори 2: Вақт + Муб. + Феъл\n中午十二点我们吃饭。— Мо нисфирӯзӣ соати дувоздаҳ хӯрок мехӯрем.\n\nСавол: 什么时候 — кай?"},"e":{"zh":"他们六点吃饭。","p":"Tāmen liù diǎn chī fàn.","uz":"Ular soat oltida ovqatlanadi.","ru":"Они едят в шесть часов.","tj":"Онҳо соати шаш хӯрок мехӯранд."},"pattern":"时间词做状语"},{"l":11,"t":{"uz":"前 vaqt belgisi","ru":"前 — временной маркер","tj":"前 — нишонаи вақт"},"f":{"uz":"前(qián) — muayyan voqeadan oldingi vaqtni bildiradi.\n\n三天前 — uch kun oldin\n一个星期前 — bir hafta oldin\n四点前 — soat to'rtdan oldin\n星期五前 — juma kunidan oldin\n\nMisol:\n星期五前能回家吗？— Juma kunidan oldin uyga qayta olasizmi?\n八点前去学校。— Soat sakkizdan oldin maktabga boring.","ru":"前(qián) — указывает на момент времени до определённого события.\n\n三天前 — три дня назад\n一个星期前 — одну неделю назад\n四点前 — до четырёх часов\n星期五前 — до пятницы\n\nПример:\n星期五前能回家吗？— Вы сможете вернуться домой до пятницы?\n八点前去学校。— Идите в школу до восьми.","tj":"前(qián) — лаҳзаи вақтро пеш аз рӯйдоди муайян нишон медиҳад.\n\n三天前 — се рӯз пеш\n一个星期前 — як ҳафта пеш\n四点前 — пеш аз соати чор\n星期五前 — пеш аз ҷумъа\n\nНамуна:\n星期五前能回家吗？— Шумо метавонед пеш аз ҷумъа ба хона баргардед?\n八点前去学校。— Пеш аз соати ҳашт ба мактаб равед."},"e":{"zh":"星期五前能回家吗？","p":"Xīngqī wǔ qián néng huí jiā ma?","uz":"Juma kunidan oldin uyga qayta olasizmi?","ru":"Сможете вернуться домой до пятницы?","tj":"Метавонед пеш аз ҷумъа ба хона баргардед?"},"pattern":"名词 前"},{"l":12,"t":{"uz":"Holat so'roq olmoshi 怎么样","ru":"Вопросительное слово состояния 怎么样","tj":"Калимаи суолии ҳол 怎么样"},"f":{"uz":"怎么样(zěnmeyàng) — holat, sifat yoki fikrni so'rash uchun ishlatiladi.\nTuzilish: Ega + 怎么样?\n\n天气怎么样？— Ob-havo qanday?\n你身体怎么样？— Sog'ligingiz qanday?\n你的汉语怎么样？— Xitoy tilingiz qanday?","ru":"怎么样(zěnmeyàng) — используется для спроса о состоянии, качестве или мнении.\nСтруктура: Подлежащее + 怎么样?\n\n天气怎么样？— Какая погода?\n你身体怎么样？— Как ваше здоровье?\n你的汉语怎么样？— Как ваш китайский?","tj":"怎么样(zěnmeyàng) — барои пурсидани ҳол, сифат ё андеша истифода мешавад.\nСохтор: Муб. + 怎么样?\n\n天气怎么样？— Обу ҳаво чӣ хел аст?\n你身体怎么样？— Саломатии шумо чӣ хел аст?\n你的汉语怎么样？— Забони чинии шумо чӣ хел аст?"},"e":{"zh":"明天天气怎么样？","p":"Míngtiān tiānqì zěnmeyàng?","uz":"Ertaga ob-havo qanday bo'ladi?","ru":"Какая будет погода завтра?","tj":"Фардо обу ҳаво чӣ хел мешавад?"},"pattern":"怎么样"},{"l":12,"t":{"uz":"Haddan tashqari: 太……了","ru":"Конструкция 太……了 (слишком, очень)","tj":"Сохтори 太……了 (хеле зиёд)"},"f":{"uz":"太(tài) + Sifat + 了 — 'juda, haddan tashqari'\nInkor: 不太 + Sifat (了 ishlatilmaydi)\n\n天气太热了。— Ob-havo juda issiq.\n太冷了！— Juda sovuq!\n我身体不太好。— Sog'ligim unchalik yaxshi emas.","ru":"太(tài) + Прилагательное + 了 — 'слишком, очень'\nОтрицание: 不太 + Прилагательное (без 了)\n\n天气太热了。— Погода слишком жаркая.\n太冷了！— Слишком холодно!\n我身体不太好。— Здоровье не очень хорошее.","tj":"太(tài) + Сифат + 了 — 'хеле зиёд, аз ҳад зиёд'\nИнкор: 不太 + Сифат (بدуни 了)\n\n天气太热了。— Обу ҳаво хеле гарм аст.\n太冷了！— Хеле сард аст!\n我身体不太好。— Саломатиям зияд хуб нест."},"e":{"zh":"太热了！","p":"Tài rè le!","uz":"Juda issiq!","ru":"Слишком жарко!","tj":"Хеле гарм аст!"},"pattern":"太……了"},{"l":12,"t":{"uz":"Modal fe'l 会 — ehtimollik bildiradi","ru":"Модальный глагол 会 (2) — вероятность","tj":"Феъли модалии 会 (2) — эҳтимол"},"f":{"uz":"会 — kelajakda biror narsa sodir bo'lish ehtimolini bildiradi.\n\n今天会下雨吗？— Bugun yomg'ir yog'adimi?\n她会来吗？— U keladimi?\n不会 — bo'lmaydi, sodir bo'lmaydi","ru":"会 — указывает на вероятность наступления события в будущем.\n\n今天会下雨吗？— Сегодня будет дождь?\n她会来吗？— Она придёт?\n不会 — не произойдёт, не будет","tj":"会 — эҳтимоли рӯй додани чизеро дар оянда нишон медиҳад.\n\n今天会下雨吗？— Имрӯз борон меборад?\n她会来吗？— Ӯ меояд?\n不会 — намешавад, рӯй намедиҳад"},"e":{"zh":"今天会下雨吗？","p":"Jīntiān huì xià yǔ ma?","uz":"Bugun yomg'ir yog'adimi?","ru":"Сегодня будет дождь?","tj":"Имрӯз борон меборад?"},"pattern":"能愿动词 会 (2)"},{"l":13,"t":{"uz":"Hozirgi davom harakat 在……呢","ru":"Продолжающееся действие 在……呢","tj":"Амали идомаёбандаи ҳозира 在……呢"},"f":{"uz":"Hozir davom etayotgan harakat uchun:\n1-tuzilish: 在 + Fe'l (+ To'ldiruvchi)\n2-tuzilish: Fe'l + To'ldiruvchi + 呢\n3-tuzilish: 在 + Fe'l + 呢 (ta'kidlash uchun)\n\nMisol:\n我在看书呢。— Men hozir kitob o'qiyapman.\n他在学做中国菜呢。— U hozir xitoy taomi pishirishni o'rganayapti.\n\nInkor: 没(在) + Fe'l, 呢 ishlatilmaydi\n他没看书。— U kitob o'qiyotgani yo'q.\n他们没在工作。— Ular ishlamayapti.","ru":"Для действия, происходящего прямо сейчас:\nСтруктура 1: 在 + Глагол (+ Дополнение)\nСтруктура 2: Глагол + Дополнение + 呢\nСтруктура 3: 在 + Глагол + 呢 (усиленная)\n\nПример:\n我在看书呢。— Я сейчас читаю книгу.\n他在学做中国菜呢。— Он сейчас учится готовить китайскую еду.\n\nОтрицание: 没(在) + Глагол, без 呢\n他没看书。— Он не читает.\n他们没在工作。— Они не работают.","tj":"Барои амали ҳоло ҷоришуда:\nСохтори 1: 在 + Феъл (+ Пуркунанда)\nСохтори 2: Феъл + Пуркунанда + 呢\nСохтори 3: 在 + Феъл + 呢 (таъкидӣ)\n\nНамуна:\n我在看书呢。— Ман ҳоло китоб мехонам.\n他在学做中国菜呢。— Ӯ ҳоло тарзи пухтани хӯроки чинӣро меомӯзад.\n\nИнкор: 没(在) + Феъл, бе 呢\n他没看书。— Ӯ китоб намехонад.\n他们没在工作。— Онҳо кор намекунанд."},"e":{"zh":"我在看书呢。","p":"Wǒ zài kàn shū ne.","uz":"Men hozir kitob o'qiyapman.","ru":"Я сейчас читаю книгу.","tj":"Ман ҳоло китоб мехонам."},"pattern":"在……呢"},{"l":13,"t":{"uz":"也 ravishi — ham","ru":"Наречие 也 — тоже","tj":"Зарфи 也 — ҳам"},"f":{"uz":"也(yě) — 'ham, shuningdek' ma'nosini bildiradi.\nHar doim fe'l yoki modal fe'ldan oldin keladi.\n\nMisol:\n大卫也在看书吗？— Devid ham kitob o'qiyaptimi?\n我也喜欢看电影。— Men ham kino ko'rishni yaxshi ko'raman.\n她也是老师。— U ham o'qituvchi.","ru":"也(yě) — означает 'тоже, также'.\nВсегда стоит перед глаголом или модальным глаголом.\n\nПример:\n大卫也在看书吗？— Дэвид тоже читает?\n我也喜欢看电影。— Мне тоже нравится кино.\n她也是老师。— Она тоже учитель.","tj":"也(yě) — маънои 'ҳам, инчунин' дорад.\nҲамеша пеш аз феъл ё феъли модалӣ меояд.\n\nНамуна:\n大卫也在看书吗？— Дэвид ҳам китоб мехонад?\n我也喜欢看电影。— Ман ҳам кино тамошо карданро дӯст дорам.\n她也是老师。— Ӯ ҳам омӯзгор аст."},"e":{"zh":"大卫也在看书吗？","p":"Dàwèi yě zài kàn shū ma?","uz":"Devid ham kitob o'qiyaptimi?","ru":"Дэвид тоже читает?","tj":"Дэвид ҳам китоб мехонад?"},"pattern":"也"},{"l":13,"t":{"uz":"吧 — yumshatuvchi yukla","ru":"Частица 吧 — смягчение","tj":"Зарраи 吧 — мулоимкунӣ"},"f":{"uz":"吧(ba) — taklif, maslahat yoki yumshatilgan buyruqni bildiradi.\nGapning oxirida keladi.\n\nMisol:\n你下午打吧。— Tushdan keyin qo'ng'iroq qiling.\n今天我们在家吃饭吧。— Bugun uyda ovqatlanaylik.\n请坐吧。— Marhamat, o'tiring.","ru":"吧(ba) — выражает предложение, совет или мягкую команду.\nСтоит в конце предложения.\n\nПример:\n你下午打吧。— Позвоните после обеда.\n今天我们在家吃饭吧。— Давайте сегодня поедим дома.\n请坐吧。— Пожалуйста, садитесь.","tj":"吧(ba) — пешниҳод, маслиҳат ё амри мулоимро баён мекунад.\nДар охири ҷумла меояд.\n\nНамуна:\n你下午打吧。— Баъдазнисфирӯзӣ занг бизанед.\n今天我们在家吃饭吧。— Имрӯз дар хона хӯрок хӯрем.\n请坐吧。— Хоҳиш мекунам, биниш."},"e":{"zh":"你下午打吧。","p":"Nǐ xiàwǔ dǎ ba.","uz":"Tushdan keyin qo'ng'iroq qiling.","ru":"Позвоните после обеда.","tj":"Баъдазнисфирӯзӣ занг бизанед."},"pattern":"吧"},{"l":14,"t":{"uz":"了 — tugallangan harakat","ru":"了 — завершённое действие","tj":"了 — амали анҷомшуда"},"f":{"uz":"了(le) gapning oxirida — harakatning sodir bo'lganligi yoki tugallanganligini bildiradi.\n\nTuzilish:\nEga + Fe'l + 了 (gapning oxiri)\nEga + Fe'l + 了 + Son/Sifat + Ot\n\nMisol:\n我去商店了。— Men do'konga bordim.\n她买了不少衣服。— U juda ko'p kiyim sotib oldi.\n\nInkor: 没 + Fe'l (了 tushirib qoldiriladi)\n我没买。— Men hech narsa sotib olmadim.\n她没去商店。— U do'konga bormadi.","ru":"了(le) в конце предложения — указывает, что действие произошло или завершилось.\n\nСтруктура:\nПодлежащее + Глагол + 了 (конец предложения)\nПодлежащее + Глагол + 了 + Число/Прилагательное + Существительное\n\nПример:\n我去商店了。— Я ходил в магазин.\n她买了不少衣服。— Она купила немало одежды.\n\nОтрицание: 没 + Глагол (了 опускается)\n我没买。— Я ничего не купил.\n她没去商店。— Она не ходила в магазин.","tj":"了(le) дар охири ҷумла — нишон медиҳад, ки амал рӯй додааст ё анҷом ёфтааст.\n\nСохтор:\nМуб. + Феъл + 了 (охири ҷумла)\nМуб. + Феъл + 了 + Адад/Сифат + Исм\n\nНамуна:\n我去商店了。— Ман ба дӯкон рафтам.\n她买了不少衣服。— Ӯ хеле зиёд либос харид.\n\nИнкор: 没 + Феъл (了 меафтад)\n我没买。— Ман ҳеҷ чиз нахаридам.\n她没去商店。— Ӯ ба дӯкон нарафт."},"e":{"zh":"我去商店了。","p":"Wǒ qù shāngdiàn le.","uz":"Men do'konga bordim.","ru":"Я ходил в магазин.","tj":"Ман ба дӯкон рафтам."},"pattern":"了 — harakat tugallangani"},{"l":14,"t":{"uz":"后 vaqt belgisi","ru":"后 — временной маркер","tj":"后 — нишонаи вақт"},"f":{"uz":"后(hòu) — muayyan voqeadan keyingi vaqtni bildiradi.\n\n40分钟后 — 40 daqiqadan keyin\n三天后 — uch kundan keyin\n一个星期后 — bir haftadan keyin\n五点后 — soat beshdan keyin\n\nMisol:\n40分钟后回来。— 40 daqiqadan keyin qaytadi.\n三天后我去北京。— Uch kundan keyin Pekinga boraman.","ru":"后(hòu) — указывает на момент времени после определённого события.\n\n40分钟后 — через 40 минут\n三天后 — через три дня\n一个星期后 — через одну неделю\n五点后 — после пяти часов\n\nПример:\n40分钟后回来。— Вернётся через 40 минут.\n三天后我去北京。— Я поеду в Пекин через три дня.","tj":"后(hòu) — лаҳзаи вақтро баъд аз рӯйдоди муайян нишон медиҳад.\n\n40分钟后 — баъд аз 40 дақиқа\n三天后 — баъд аз се рӯз\n一个星期后 — баъд аз як ҳафта\n五点后 — баъд аз соати панҷ\n\nНамуна:\n40分钟后回来。— Баъд аз 40 дақиқа бармегардад.\n三天后我去北京。— Баъд аз се рӯз ман ба Пекин меравам."},"e":{"zh":"40分钟后回来。","p":"Sìshí fēnzhōng hòu huílai.","uz":"40 daqiqadan keyin qaytadi.","ru":"Вернётся через 40 минут.","tj":"Баъд аз 40 дақиқа бармегардад."},"pattern":"名词 后"},{"l":14,"t":{"uz":"Ravish 都 — hammasi","ru":"Наречие 都 — все, всё","tj":"Зарфи 都 — ҳама"},"f":{"uz":"都(dōu) — 'hammasi, barchasi, ikkalasi' ma'nosini bildiradi.\nMuhim: sanab o'tilayotgan narsalar 都 DAN OLDIN keladi.\n\nMisol:\n这些都是王方的东西。— Bular hammasi Van Fanning narsalari.\n我们都是中国人。— Biz hammamiz xitoylarmiz.\n他们都喜欢喝茶。— Ularning hammasi choy ichishni yaxshi ko'radi.","ru":"都(dōu) — означает 'все, всё, оба'.\nВажно: перечисляемые объекты стоят ПЕРЕД 都.\n\nПример:\n这些都是王方的东西。— Всё это вещи Ван Фан.\n我们都是中国人。— Мы все китайцы.\n他们都喜欢喝茶。— Они все любят пить чай.","tj":"都(dōu) — маънои 'ҳама, тамом, ҳарду' дорад.\nМуҳим: чизҳои шуморидашуда ПЕШ АЗ 都 меоянд.\n\nНамуна:\n这些都是王方的东西。— Инҳо ҳама чизҳои Ван Фан аст.\n我们都是中国人。— Мо ҳама чинӣ ҳастем.\n他们都喜欢喝茶。— Онҳо ҳама чой нӯшиданро дӯст доранд."},"e":{"zh":"这些都是王方的东西。","p":"Zhèxiē dōu shì Wáng Fāng de dōngxi.","uz":"Bular hammasi Van Fanning narsalari.","ru":"Всё это вещи Ван Фан.","tj":"Инҳо ҳама чизҳои Ван Фан аст."},"pattern":"副词 都"},{"l":15,"t":{"uz":"是……的 konstruktsiyasi — vaqt, joy va usulni ta'kidlash","ru":"Конструкция 是……的 — выделение времени, места и способа","tj":"Сохтори 是……的 — таъкиди вақт, ҷой ва усул"},"f":{"uz":"是……的 konstruktsiyasi allaqachon sodir bo'lgan harakatning vaqti, joyi yoki usulini ta'kidlash uchun ishlatiladi.\n\nTuzilishi:\nEga + 是 + [Vaqt/Joy/Usul] + Fe'l + 的\n\nVaqtni ta'kidlash:\n我们是2011年认识的。— Biz 2011-yilda tanishdik.\n\nJoyni ta'kidlash:\n我们是在学校认识的。— Biz maktabda tanishdik.\n\nUsulni ta'kidlash:\n我是坐飞机来的。— Men samolyot bilan keldim.\n\nInkor: 不是……的\n我不是坐出租车来的。— Men taksi bilan kelmaganman.","ru":"Конструкция 是……的 используется для выделения времени, места или способа уже совершённого действия.\n\nСтруктура:\nПодлежащее + 是 + [Время/Место/Способ] + Глагол + 的\n\nВыделение времени:\n我们是2011年认识的。— Мы познакомились в 2011 году.\n\nВыделение места:\n我们是在学校认识的。— Мы познакомились в школе.\n\nВыделение способа:\n我是坐飞机来的。— Я прилетел на самолёте.\n\nОтрицание: 不是……的\n我不是坐出租车来的。— Я не приехал на такси.","tj":"Сохтори 是……的 барои таъкид кардани вақт, ҷой ё усули амали аллакай анҷомёфта истифода мешавад.\n\nСохтор:\nМубтадо + 是 + [Вақт/Ҷой/Усул] + Феъл + 的\n\nТаъкиди вақт:\n我们是2011年认识的。— Мо дар соли 2011 шинос шудем.\n\nТаъкиди ҷой:\n我们是在学校认识的。— Мо дар мактаб шинос шудем.\n\nТаъкиди усул:\n我是坐飞机来的。— Ман бо ҳавопаймо омадам.\n\nИнкор: 不是……的\n我不是坐出租车来的。— Ман бо таксӣ наомадам."},"e":{"zh":"我们是2011年认识的。","p":"Wǒmen shì èr líng yī yī nián rènshi de.","uz":"Biz 2011-yilda tanishdik.","ru":"Мы познакомились в 2011 году.","tj":"Мо дар соли 2011 шинос шудем."},"pattern":"是……的 — Vaqt, joy va usulni ta'kidlash"},{"l":15,"t":{"uz":"To'liq sana ifodalash (2)","ru":"Выражение полной даты (2)","tj":"Ифодаи санаи пурра (2)"},"f":{"uz":"Xitoy tilida to'liq sana eng kattadan eng kichigiga qadar ifodalanadi:\nYil + Oy + Kun + Haftaning kuni\n\nYilni o'qish: har bir raqam alohida o'qiladi\n2011 → 二零一一年 (èr líng yī yī nián)\n2024 → 二零二四年 (èr líng èr sì nián)\n\nTo'liq misol:\n2011年9月10号，星期三\n2011-yil, sentabr, 10-chi, chorshanba","ru":"В китайском языке полная дата выражается от большего к меньшему:\nГод + Месяц + День + День недели\n\nЧтение года: каждая цифра читается отдельно\n2011 → 二零一一年 (èr líng yī yī nián)\n2024 → 二零二四年 (èr líng èr sì nián)\n\nПолный пример:\n2011年9月10号，星期三\n2011 год, сентябрь, 10-е, среда","tj":"Дар забони чинӣ санаи пурра аз калон ба хурд ифода мешавад:\nСол + Моҳ + Рӯз + Рӯзи ҳафта\n\nХондани сол: ҳар рақам алоҳида хонда мешавад\n2011 → 二零一一年 (èr líng yī yī nián)\n2024 → 二零二四年 (èr líng èr sì nián)\n\nМисоли пурра:\n2011年9月10号，星期三\nСоли 2011, сентябр, 10-ум, чоршанбе"},"e":{"zh":"2011年9月认识的","p":"èr líng yī yī nián jiǔ yuè rènshi de","uz":"2011-yilning sentabrida tanishgan","ru":"познакомились в сентябре 2011 года","tj":"дар моҳи сентябри соли 2011 шинос шудем"},"pattern":"日期的表达(2) — To'liq sana ifodalash"}],"QUIZ":[{"l":1,"q":{"uz":"Qaysi grammatika ishlatilgan?\n妈","ru":"Какая грамматика использована?\n妈","tj":"Кадом грамматика истифода шудааст?\n妈"},"opts":["四声","变调 (3+3)","不 — inkor yuklamasi","轻声 — neytral ton"],"a":0,"explanation":{"uz":"Xitoy tilida har bir bo'g'in 4 xil tonda aytiladi:\n1-ton (—): baland va tekis — mā (ona)\n2-ton (ˊ): ko'tariluvchi — má (kanop o'simligi)\n3-ton (ˇ): tushib ko'tariluvchi — mǎ (ot)\n4-ton (ˋ): tushuvchi — mà (so'kishmoq)\n\nTon ma'noni o'zgartiradi!","ru":"В китайском языке каждый слог произносится в одном из 4 тонов:\nТон 1 (—): ровный и высокий — mā (мама)\nТон 2 (ˊ): восходящий — má (конопля)\nТон 3 (ˇ): нисходяще-восходящий — mǎ (лошадь)\nТон 4 (ˋ): нисходящий — mà (ругать)\n\nТон меняет смысл слова!","tj":"Дар забони чинӣ ҳар як ҳиҷо бо яке аз 4 садо гуфта мешавад:\nСадои 1 (—): баланд ва ҳамвор — mā (модар)\nСадои 2 (ˊ): боравандаи — má (канабис)\nСадои 3 (ˇ): поинравандаю боравандаи — mǎ (асп)\nСадои 4 (ˋ): поинравандаи — mà (дашном додан)\n\nСадо маъноро тағйир медиҳад!"}},{"l":1,"q":{"uz":"Qaysi grammatika ishlatilgan?\n你好","ru":"Какая грамматика использована?\n你好","tj":"Кадом грамматика истифода шудааст?\n你好"},"opts":["变调 (3+3)","四声","不 — inkor yuklamasi","轻声 — neytral ton"],"a":0,"explanation":{"uz":"Ketma-ket ikkita 3-ton kelganda, birinchisi 2-tonga o'zgaradi.\n3+3 → 2+3\nMisol: 你(nǐ) + 好(hǎo) → nī hǎo (lekin yoziladi: nǐ hǎo)","ru":"Когда два слога 3-го тона идут подряд, первый меняется на 2-й тон.\n3+3 → 2+3\nПример: 你(nǐ) + 好(hǎo) → nī hǎo (но пишется: nǐ hǎo)","tj":"Вақте ки ду ҳиҷои садои 3 паи ҳам меоянд, аввалӣ ба садои 2 табдил меёбад.\n3+3 → 2+3\nМисол: 你(nǐ) + 好(hǎo) → nī hǎo (аммо навишта мешавад: nǐ hǎo)"}},{"l":2,"q":{"uz":"Qaysi grammatika ishlatilgan?\n不谢","ru":"Какая грамматика использована?\n不谢","tj":"Кадом грамматика истифода шудааст?\n不谢"},"opts":["不 — inkor yuklamasi","四声","变调 (3+3)","轻声 — neytral ton"],"a":0,"explanation":{"uz":"不(bù) — inkor yuklamasi (yo'q, emas).\nDiqqat: 不 4-ton, lekin keyingi bo'g'in ham 4-ton bo'lsa, 2-tonga o'zgaradi.\nbù + 4-ton → bú + 4-ton\nMisol: 不客气 → bú kèqi\n不谢 → bú xiè","ru":"不(bù) — отрицательная частица (нет, не).\nПримечание: 不 имеет 4-й тон, но меняется на 2-й перед другим слогом 4-го тона.\nbù + 4-й тон → bú + 4-й тон\nПример: 不客气 → bú kèqi\n不谢 → bú xiè","tj":"不(bù) — ҳарфи инкорӣ (не, нест).\nДиққат: 不 садои 4-ум дорад, аммо агар ҳиҷои баъдӣ ҳам садои 4-ум бошад, ба садои 2-юм иваз мешавад.\nbù + садои 4 → bú + садои 4\nМисол: 不客气 → bú kèqi\n不谢 → bú xiè"}},{"l":2,"q":{"uz":"Qaysi grammatika ishlatilgan?\n妈妈","ru":"Какая грамматика использована?\n妈妈","tj":"Кадом грамматика истифода шудааст?\n妈妈"},"opts":["轻声 — neytral ton","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"Xitoy tilida 5-ton ham bor — neytral ton (轻声).\nU qisqa va engil, ton belgisi yo'q.\nKo'pincha qarindoshlik atamalarida uchraydi.\nMisol: 妈妈(māma), 爸爸(bàba), 爷爷(yéye), 奶奶(nǎinai)","ru":"В китайском также есть 5-й тон — нейтральный (轻声).\nОн короткий и лёгкий, без знака тона.\nЧасто встречается в терминах родства.\nПример: 妈妈(māma), 爸爸(bàba), 爷爷(yéye), 奶奶(nǎinai)","tj":"Дар забони чинӣ садои 5-ум ҳам вуҷуд дорад — садои бетараф (轻声).\nОн кӯтоҳ ва сабук аст, бе нишонаи садо.\nБештар дар истилоҳоти хешутаборӣ истифода мешавад.\nМисол: 妈妈(māma), 爸爸(bàba), 爷爷(yéye), 奶奶(nǎinai)"}},{"l":3,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我是学生。","ru":"Какая грамматика использована?\n我是学生。","tj":"Кадом грамматика истифода шудааст?\n我是学生。"},"opts":["是字句","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"是(shì) — tenglikni ifodalaydi (= bo'lmoq).\nTuzilma: Ega + 是 + Ot/Ot birikmasi\nInkor: Ega + 不是 + Ot/Ot birikmasi\n\nMisol:\n我是老师。— Men o'qituvchiman.\n我不是老师。— Men o'qituvchi emasman.\n李月是中国人。— Li Yue xitoylik.","ru":"是(shì) — выражает равенство (= являться).\nСтруктура: Подлежащее + 是 + Существительное/Именная группа\nОтрицание: Подлежащее + 不是 + Существительное/Именная группа\n\nПример:\n我是老师。— Я учитель.\n我不是老师。— Я не учитель.\n李月是中国人。— Ли Юэ китаянка.","tj":"是(shì) — баробариро ифода мекунад (= будан).\nСохтор: Мубтадо + 是 + Исм/Гурӯҳи исмӣ\nИнкор: Мубтадо + 不是 + Исм/Гурӯҳи исмӣ\n\nМисол:\n我是老师。— Ман муаллим ҳастам.\n我不是老师。— Ман муаллим нестам.\n李月是中国人。— Ли Юэ хитоӣ аст."}},{"l":3,"q":{"uz":"Qaysi grammatika ishlatilgan?\n你是学生吗？","ru":"Какая грамматика использована?\n你是学生吗？","tj":"Кадом грамматика истифода шудааст?\n你是学生吗？"},"opts":["吗 — so'roq gapi","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"吗(ma) — gap oxiriga qo'yilsa, uni ha/yo'q savoliga aylantiradi.\nTuzilma: Gap + 吗？\n\nMisol:\n你是老师。→ 你是老师吗？\nSiz o'qituvchisiz. → Siz o'qituvchimisiz?\n\nJavob: 是 (ha) yoki 不是 (yo'q)","ru":"吗(ma) — ставится в конце предложения, превращая его в вопрос «да/нет».\nСтруктура: Утверждение + 吗？\n\nПример:\n你是老师。→ 你是老师吗？\nТы учитель. → Ты учитель?\n\nОтвет: 是 (да) или 不是 (нет)","tj":"吗(ma) — дар охири ҷумла гузошта, онро ба савол «бале/не» табдил медиҳад.\nСохтор: Изҳор + 吗？\n\nМисол:\n你是老师。→ 你是老师吗？\nШумо муаллим ҳастед. → Оё шумо муаллим ҳастед?\n\nҶавоб: 是 (бале) ё 不是 (не)"}},{"l":3,"q":{"uz":"Qaysi grammatika ishlatilgan?\n你叫什么名字？","ru":"Какая грамматика использована?\n你叫什么名字？","tj":"Кадом грамматика истифода шудааст?\n你叫什么名字？"},"opts":["什么 — so'roq olmoshi","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"什么(shénme) — 'nima', 'qaysi' ma'nosini bildiradi.\nOxiriga 吗 qo'shmang — 什么 o'zi savolni ifodalaydi.\n\nMisol:\n你叫什么名字？— Ismingiz nima?\n这是什么？— Bu nima?\n你是什么人？— Siz kimsiz?","ru":"什么(shénme) — означает «что», «какой».\nНе добавляйте 吗 в конце — 什么 само делает предложение вопросительным.\n\nПример:\n你叫什么名字？— Как вас зовут?\n这是什么？— Что это?\n你是什么人？— Кто вы?","tj":"什么(shénme) — маънои «чӣ», «кадом» дорад.\n吗 -ро дар охир илова накунед — 什么 худ ҷумларо саволӣ мекунад.\n\nМисол:\n你叫什么名字？— Номи шумо чист?\n这是什么？— Ин чист?\n你是什么人？— Шумо кӣ ҳастед?"}},{"l":4,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我的汉语老师","ru":"Какая грамматика использована?\n我的汉语老师","tj":"Кадом грамматика истифода шудааст?\n我的汉语老师"},"opts":["结构助词 的","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"的(de) — egalikni yoki bog'liqlikni ifodalaydi.\nTuzilma: Ot/Olmosh + 的 + Ot\n\nMisol:\n我的老师 — mening o'qituvchim\n她的朋友 — uning do'sti\n\nEslatma: Qarindoshlik va shaxsiy otlar oldida 的 tushirilishi mumkin:\n我(的)老师 ✓ — mening o'qituvchim\n我(的)朋友 ✓ — mening do'stim","ru":"的(de) — выражает принадлежность или ассоциацию.\nСтруктура: Существительное/Местоимение + 的 + Существительное\n\nПример:\n我的老师 — мой учитель\n她的朋友 — её подруга\n\nПримечание: 的 может опускаться перед терминами родства и личными существительными:\n我(的)老师 ✓ — мой учитель\n我(的)朋友 ✓ — мой друг","tj":"的(de) — моликият ё алоқаро ифода мекунад.\nСохтор: Исм/Ҷонишин + 的 + Исм\n\nМисол:\n我的老师 — муаллими ман\n她的朋友 — дӯсти вай\n\nЭзоҳ: 的 пеш аз истилоҳоти хешутаборӣ ва исмҳои шахсӣ метавонад ҳазф шавад:\n我(的)老师 ✓ — муаллими ман\n我(的)朋友 ✓ — дӯсти ман"}},{"l":4,"q":{"uz":"Qaysi grammatika ishlatilgan?\n她是谁？","ru":"Какая грамматика использована?\n她是谁？","tj":"Кадом грамматика истифода шудааст?\n她是谁？"},"opts":["谁 — kim so'roq olmoshi","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"谁(shéi) — 'kim?' ma'nosini bildiradi.\nGap ega yoki to'ldiruvchi bo'lib kelishi mumkin.\n\nMisol:\n她是谁？— U kim?\n谁是老师？— Kim o'qituvchi?\n他是谁的朋友？— U kimning do'sti?","ru":"谁(shéi) — означает «кто?».\nМожет выступать подлежащим или дополнением.\n\nПример:\n她是谁？— Кто она?\n谁是老师？— Кто учитель?\n他是谁的朋友？— Чей он друг?","tj":"谁(shéi) — маънои «кӣ?» дорад.\nМетавонад мубтадо ё пуркунанда бошад.\n\nМисол:\n她是谁？— Вай кӣ аст?\n谁是老师？— Кӣ муаллим аст?\n他是谁的朋友？— Дӯсти кӣ аст вай?"}},{"l":4,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我是学生。你呢？","ru":"Какая грамматика использована?\n我是学生。你呢？","tj":"Кадом грамматика истифода шудааст?\n我是学生。你呢？"},"opts":["呢 — qaytarma savol yuklamasi","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"呢(ne) — oldingi gapda tilga olingan mavzu bo'yicha so'rashda ishlatiladi.\nTuzilma: ...A... B呢？ (B-chi?)\n\nMisol:\n我是美国人。你呢？\nMen amerikalikman. Siz-chi?\n\n她叫李月。他呢？\nUning ismi Li Yue. U-chi?","ru":"呢(ne) — используется для вопроса о той же теме, упомянутой в предыдущем предложении.\nСтруктура: ...A... B呢？ (А как насчёт B?)\n\nПример:\n我是美国人。你呢？\nЯ американец. А вы?\n\n她叫李月。他呢？\nЕё зовут Ли Юэ. А его?","tj":"呢(ne) — барои пурсидан дар бораи мавзӯи қаблан зикршуда истифода мешавад.\nСохтор: ...A... B呢？ (Чӣ дар бораи B?)\n\nМисол:\n我是美国人。你呢？\nМан амрикоӣ ҳастам. Шумо чӣ?\n\n她叫李月。他呢？\nНомаш Ли Юэ аст. Вай чӣ?"}},{"l":5,"q":{"uz":"Qaysi grammatika ishlatilgan?\n你家有几口人？","ru":"Какая грамматика использована?\n你家有几口人？","tj":"Кадом грамматика истифода шудааст?\n你家有几口人？"},"opts":["几 — Necha? (10 gacha)","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"几(jǐ) — 10 dan kichik sonlar uchun so'roq so'zi.\nTuzilma: Ega + 有 + 几 + O'lchov so'zi + Ot?\n\nMisol:\n你家有几口人？— Sizning oilangizda necha kishi bor?\n你有几个汉语老师？— Nechta xitoy tili o'qituvchingiz bor?\n你女儿几岁了？— Qizingiz necha yoshda?","ru":"几(jǐ) — вопросительное слово для чисел менее 10.\nСтруктура: Подлежащее + 有 + 几 + Счётное слово + Существительное?\n\nПример:\n你家有几口人？— Сколько человек в вашей семье?\n你有几个汉语老师？— Сколько у вас преподавателей китайского?\n你女儿几岁了？— Сколько лет вашей дочери?","tj":"几(jǐ) — калимаи саволӣ барои рақамҳои камтар аз 10.\nСохтор: Мубтадо + 有 + 几 + Калимаи шуморавӣ + Исм?\n\nМисол:\n你家有几口人？— Дар оилаи шумо чанд нафар аст?\n你有几个汉语老师？— Шумо чанд муаллими забони чинӣ доред?\n你女儿几岁了？— Духтаратон чанд сол дорад?"}},{"l":5,"q":{"uz":"Qaysi grammatika ishlatilgan?\n二十","ru":"Какая грамматика использована?\n二十","tj":"Кадом грамматика истифода шудааст?\n二十"},"opts":["100 gacha raqamlar","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"1-10: 一yī 二èr 三sān 四sì 五wǔ 六liù 七qī 八bā 九jiǔ 十shí\n\nO'nliklar:\n20 = 二十 (èrshí)\n30 = 三十 (sānshí)\n50 = 五十 (wǔshí)\n99 = 九十九 (jiǔshíjiǔ)\n\nAralash:\n23 = 二十三 (èrshísān)\n56 = 五十六 (wǔshíliù)\n88 = 八十八 (bāshíbā)","ru":"1-10: 一yī 二èr 三sān 四sì 五wǔ 六liù 七qī 八bā 九jiǔ 十shí\n\nДесятки:\n20 = 二十 (èrshí)\n30 = 三十 (sānshí)\n50 = 五十 (wǔshí)\n99 = 九十九 (jiǔshíjiǔ)\n\nСоставные:\n23 = 二十三 (èrshísān)\n56 = 五十六 (wǔshíliù)\n88 = 八十八 (bāshíbā)","tj":"1-10: 一yī 二èr 三sān 四sì 五wǔ 六liù 七qī 八bā 九jiǔ 十shí\n\nДаҳгонаҳо:\n20 = 二十 (èrshí)\n30 = 三十 (sānshí)\n50 = 五十 (wǔshí)\n99 = 九十九 (jiǔshíjiǔ)\n\nОмехта:\n23 = 二十三 (èrshísān)\n56 = 五十六 (wǔshíliù)\n88 = 八十八 (bāshíbā)"}},{"l":5,"q":{"uz":"Qaysi grammatika ishlatilgan?\n她今年二十岁了。","ru":"Какая грамматика использована?\n她今年二十岁了。","tj":"Кадом грамматика истифода шудааст?\n她今年二十岁了。"},"opts":["了 — holat o'zgarishi yuklamasi","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"了(le) — gap oxiriga qo'yilsa, yangi holat yoki o'zgarishni bildiradi.\n\nMisol:\n她今年五十岁了。— U bu yil ellik yoshga kirdi (yangi holat).\n我女儿四岁了。— Qizim to'rt yoshga to'ldi.\n\n多大了？— Necha yoshga kirdingiz? (yosh so'rash)","ru":"了(le) — ставится в конце предложения, указывая на новое состояние или изменение.\n\nПример:\n她今年五十岁了。— В этом году ей исполнилось пятьдесят (новое состояние).\n我女儿四岁了。— Моей дочери исполнилось четыре.\n\n多大了？— Сколько вам лет? (спрашиваем возраст)","tj":"了(le) — дар охири ҷумла ҳолати нав ё тағйирро нишон медиҳад.\n\nМисол:\n她今年五十岁了。— Вай имсол панҷоҳ сол шуд (ҳолати нав).\n我女儿四岁了。— Духтарам чор сол шуд.\n\n多大了？— Шумо чанд сол шудед? (пурсидани синну сол)"}},{"l":5,"q":{"uz":"Qaysi grammatika ishlatilgan?\n你多大了？","ru":"Какая грамматика использована?\n你多大了？","tj":"Кадом грамматика истифода шудааст?\n你多大了？"},"opts":["多大 vs 几岁 — yosh so'rash","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"多大(duō dà) — kattalar yoshini so'rash uchun.\n几岁(jǐ suì) — bolalar yoshini so'rash uchun (10 gacha).\n\nKattalar: 你多大了？— Siz necha yoshdasiz?\nBolalar: 你女儿几岁了？— Qizingiz necha yoshda?","ru":"多大(duō dà) — спрашиваем возраст взрослых.\n几岁(jǐ suì) — спрашиваем возраст детей (до 10).\n\nВзрослые: 你多大了？— Сколько вам лет?\nДети: 你女儿几岁了？— Сколько лет вашей дочери?","tj":"多大(duō dà) — пурсидани синну соли калонсолон.\n几岁(jǐ suì) — пурсидани синну соли кӯдакон (то 10).\n\nКалонсолон: 你多大了？— Шумо чанд сол доред?\nКӯдакон: 你女儿几岁了？— Духтаратон чанд сол дорад?"}},{"l":6,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我会说汉语。","ru":"Какая грамматика использована?\n我会说汉语。","tj":"Кадом грамматика истифода шудааст?\n我会说汉语。"},"opts":["能愿动词 会","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"会(huì) — o'rganish orqali erishilgan qobiliyatni ifodalaydi.\nTuzilma: Ega + (不)会 + Fe'l\n\nTasdiq: 我会说汉语。— Men xitoycha gapira olaman.\nInkor: 我不会做中国菜。— Men xitoy taomini tayyorlay olmayman.\nSavol: 你会写汉字吗？— Siz xitoy ierogliflarini yoza olasizmi?\n\nEslatma: Inkorda 不会, ha/yo'q savolda 吗 ishlatiladi.","ru":"会(huì) — выражает способность, приобретённую через обучение.\nСтруктура: Подлежащее + (不)会 + Глагол\n\nУтверждение: 我会说汉语。— Я умею говорить по-китайски.\nОтрицание: 我不会做中国菜。— Я не умею готовить китайскую еду.\nВопрос: 你会写汉字吗？— Вы умеете писать иероглифы?\n\nПримечание: для отрицания 不会, для вопроса — 吗.","tj":"会(huì) — қобилияти аз тариқи омӯзиш ба даст овардашударо ифода мекунад.\nСохтор: Мубтадо + (不)会 + Феъл\n\nТасдиқ: 我会说汉语。— Ман метавонам ба забони чинӣ гап бизанам.\nИнкор: 我不会做中国菜。— Ман наметавонам хӯроки чинӣ тайёр кунам.\nСавол: 你会写汉字吗？— Оё шумо метавонед иероглифҳо нависед?\n\nЭзоҳ: Барои инкор 不会, барои савол — 吗 истифода мешавад."}},{"l":6,"q":{"uz":"Qaysi grammatika ishlatilgan?\n中国菜很好吃。","ru":"Какая грамматика использована?\n中国菜很好吃。","tj":"Кадом грамматика истифода шудааст?\n中国菜很好吃。"},"opts":["形容词谓语句","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"Sifat kesimli gap: Ega + 很/不 + Sifat\n\nXitoy tilida sifat gap kesimi bo'la oladi.\nTasdiq gaplarda odatda 很(hěn) ishlatiladi:\n中国菜很好吃。— Xitoy taomlari juda mazali.\n\nInkor gaplarda 不 ishlatiladi (很 shart emas):\n我妈妈的汉语不好。— Onamning xitoy tili yaxshi emas.\n\nEslatma: 很 ko'pincha grammatik talab sifatida ishlatiladi.","ru":"Предложение с прилагательным: Подлежащее + 很/不 + Прилагательное\n\nВ китайском языке прилагательное может быть сказуемым.\nВ утвердительных предложениях обычно используется 很(hěn):\n中国菜很好吃。— Китайская еда очень вкусная.\n\nВ отрицательных предложениях используется 不 (很 не нужен):\n我妈妈的汉语不好。— Китайский мамы нехороший.\n\nПримечание: 很 часто семантически слабый, нужен по грамматике.","tj":"Ҷумла бо сифати хабарӣ: Мубтадо + 很/不 + Сифат\n\nДар забони чинӣ сифат метавонад хабар бошад.\nДар ҷумлаҳои тасдиқӣ одатан 很(hěn) истифода мешавад:\n中国菜很好吃。— Хӯроки чинӣ хеле болаззат аст.\n\nДар ҷумлаҳои инкорӣ 不 истифода мешавад (很 лозим нест):\n我妈妈的汉语不好。— Забони чинии модарам хуб нест.\n\nЭзоҳ: 很 аксар аз рӯи талаботи грамматикӣ истифода мешавад."}},{"l":6,"q":{"uz":"Qaysi grammatika ishlatilgan?\n这个字怎么写？","ru":"Какая грамматика использована?\n这个字怎么写？","tj":"Кадом грамматика истифода шудааст?\n这个字怎么写？"},"opts":["怎么 — qanday so'roq olmoshi","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"怎么(zěnme) — fe'l oldiga qo'yilib, harakat usulini so'raydi.\nTuzilma: Ega + 怎么 + Fe'l?\n\nMisol:\n这个字怎么写？— Bu ieroglif qanday yoziladi?\n这个字怎么读？— Bu ieroglif qanday o'qiladi?\n中国菜怎么做？— Xitoy taomini qanday tayyorlash kerak?","ru":"怎么(zěnme) — ставится перед глаголом, спрашивает о способе действия.\nСтруктура: Подлежащее + 怎么 + Глагол?\n\nПример:\n这个字怎么写？— Как пишется этот иероглиф?\n这个字怎么读？— Как читается этот иероглиф?\n中国菜怎么做？— Как готовить китайскую еду?","tj":"怎么(zěnme) — пеш аз феъл гузошта, тарзи амалро мепурсад.\nСохтор: Мубтадо + 怎么 + Феъл?\n\nМисол:\n这个字怎么写？— Ин иероглиф чӣ тавр навишта мешавад?\n这个字怎么读？— Ин иероглиф чӣ тавр хонда мешавад?\n中国菜怎么做？— Хӯроки чинӣ чӣ тавр тайёр карда мешавад?"}},{"l":7,"q":{"uz":"Qaysi grammatika ishlatilgan?\n今天9月1号，星期三。","ru":"Какая грамматика использована?\n今天9月1号，星期三。","tj":"Кадом грамматика истифода шудааст?\n今天9月1号，星期三。"},"opts":["日期的表达 — Sana ifodalash","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"Xitoy tilida sanalar eng kattadan eng kichigiga qadar ifodalanadi:\nYil → Oy → Kun → Haftaning kuni\n\nOy: 一月 (yanvar) ~ 十二月 (dekabr)\nKun: 1号 (1-chi) ~ 31号 (31-chi)\n\nHaftaning kunlari:\n星期一 Dushanba\n星期二 Seshanba\n星期三 Chorshanba\n星期四 Payshanba\n星期五 Juma\n星期六 Shanba\n星期日/星期天 Yakshanba\n\nMisol: 9月1号，星期三 — 1-sentabr, chorshanba","ru":"В китайском языке даты выражаются от большего к меньшему:\nГод → Месяц → День → День недели\n\nМесяц: 一月 (январь) ~ 十二月 (декабрь)\nДень: 1号 (1-е) ~ 31号 (31-е)\n\nДни недели:\n星期一 Понедельник\n星期二 Вторник\n星期三 Среда\n星期四 Четверг\n星期五 Пятница\n星期六 Суббота\n星期日/星期天 Воскресенье\n\nПример: 9月1号，星期三 — 1 сентября, среда","tj":"Дар забони чинӣ санаҳо аз калон ба хурд ифода мешаванд:\nСол → Моҳ → Рӯз → Рӯзи ҳафта\n\nМоҳ: 一月 (январ) ~ 十二月 (декабр)\nРӯз: 1号 (1-ум) ~ 31号 (31-ум)\n\nРӯзҳои ҳафта:\n星期一 Душанбе\n星期二 Сешанбе\n星期三 Чоршанбе\n星期四 Панҷшанбе\n星期五 Ҷумъа\n星期六 Шанбе\n星期日/星期天 Якшанбе\n\nМисол: 9月1号，星期三 — 1-уми сентябр, чоршанбе"}},{"l":7,"q":{"uz":"Qaysi grammatika ishlatilgan?\n今天9月1号。","ru":"Какая грамматика использована?\n今天9月1号。","tj":"Кадом грамматика истифода шудааст?\n今天9月1号。"},"opts":["名词谓语句 — Ot kesimli gap","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"Ot yoki raqam kesim bo'lib kela oladi (是 talab etilmaydi).\nKo'pincha yosh, sana va vaqtni ifodalashda ishlatiladi.\n\nMisol:\n今天9月1号。— Bugun 1-sentabr. (9月1号 — ot kesim)\n明天星期三。— Ertaga chorshanba.\n我的汉语老师33岁。— Mening xitoy tili o'qituvchim 33 yoshda.","ru":"Существительное или числительное может выступать сказуемым (是 не требуется).\nЧасто используется для выражения возраста, дат и времени.\n\nПример:\n今天9月1号。— Сегодня 1 сентября. (9月1号 — именное сказуемое)\n明天星期三。— Завтра среда.\n我的汉语老师33岁。— Моему учителю китайского 33 года.","tj":"Исм ё рақам метавонад хабар бошад (是 лозим нест).\nАксар вақт барои ифодаи синну сол, сана ва вақт истифода мешавад.\n\nМисол:\n今天9月1号。— Имрӯз 1-уми сентябр аст. (9月1号 — хабари исмӣ)\n明天星期三。— Фардо чоршанбе аст.\n我的汉语老师33岁。— Устоди забони чинии ман 33 сола аст."}},{"l":7,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我去学校看书。","ru":"Какая грамматика использована?\n我去学校看书。","tj":"Кадом грамматика истифода шудааст?\n我去学校看书。"},"opts":["连动句 — 去+joy+nima qilish","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"Ketma-ket fe'l gap: birinchi harakat ikkinchisining maqsadini bildiradi.\nTuzilishi: Ega + 去 + Joy + Fe'l + To'ldiruvchi\n\nMisol:\n我去学校看书。— Men maktabga kitob o'qigani boraman.\n我去中国学习汉语。— Men Xitoyga xitoy tili o'rganishga boraman.\n\nSavol: 你去哪儿做什么？— Qayerga va nima qilgani borasan?","ru":"Последовательный глагольный оборот: первое действие выражает цель второго.\nСтруктура: Подлежащее + 去 + Место + Глагол + Дополнение\n\nПример:\n我去学校看书。— Я иду в школу читать.\n我去中国学习汉语。— Я еду в Китай учить китайский.\n\nВопрос: 你去哪儿做什么？— Куда ты идёшь и что будешь делать?","tj":"Ҷумлаи пайдарпайи феълӣ: амали аввал мақсади дуввумро ифода мекунад.\nСохтор: Мубтадо + 去 + Ҷой + Феъл + Пуркунанда\n\nМисол:\n我去学校看书。— Ман ба мактаб рафта китоб мехонам.\n我去中国学习汉语。— Ман ба Чин рафта забони чинӣ меомӯзам.\n\nСавол: 你去哪儿做什么？— Ту ба куҷо рафта чӣ мекунӣ?"}},{"l":8,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我想喝茶。","ru":"Какая грамматика использована?\n我想喝茶。","tj":"Кадом грамматика истифода шудааст?\n我想喝茶。"},"opts":["能愿动词 想 — Modal fe'l 想","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"想 (xiǎng) — istak yoki niyatni bildiradi.\nTuzilishi: Ega + 想 + Fe'l + To'ldiruvchi\n\nTasdiq: 我想喝茶。— Men choy ichmoqchiman.\nSavol: 你想做什么？— Nima qilmoqchisiz?\n\n想 va 会:\n我想说汉语。— Men xitoycha gapirmoqchiman (istak).\n我会说汉语。— Men xitoycha gapira olaman (qobiliyat).","ru":"想 (xiǎng) — выражает желание или намерение.\nСтруктура: Подлежащее + 想 + Глагол + Дополнение\n\nУтверждение: 我想喝茶。— Я хочу выпить чай.\nВопрос: 你想做什么？— Что вы хотите делать?\n\n想 и 会:\n我想说汉语。— Я хочу говорить по-китайски (желание).\n我会说汉语。— Я умею говорить по-китайски (способность).","tj":"想 (xiǎng) — орзу ё ниятро ифода мекунад.\nСохтор: Мубтадо + 想 + Феъл + Пуркунанда\n\nТасдиқ: 我想喝茶。— Ман чой нӯшидан мехоҳам.\nСавол: 你想做什么？— Шумо чӣ кардан мехоҳед?\n\n想 ва 会:\n我想说汉语。— Ман забони чинӣ гап задан мехоҳам (орзу).\n我会说汉语。— Ман забони чинӣ гап зада метавонам (тавоноӣ)."}},{"l":8,"q":{"uz":"Qaysi grammatika ishlatilgan?\n这个杯子多少钱？","ru":"Какая грамматика использована?\n这个杯子多少钱？","tj":"Кадом грамматика истифода шудааст?\n这个杯子多少钱？"},"opts":["多少 — Qancha so'rog'i (10+)","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"多少 (duōshao) — 10 dan ortiq sonlar uchun savol so'zi.\nEslatma: 几 (jǐ) 10 gacha, 多少 (duōshao) 10 dan ortiq.\n\nNarx so'rash: ……多少钱？\n这个杯子多少钱？— Bu piyola qancha turadi?\n\nMiqdor so'rash:\n你们学校有多少学生？— Maktabingizda nechta o'quvchi bor?\n你有多少钱？— Sizda qancha pul bor?","ru":"多少 (duōshao) — вопросительное слово для чисел больше 10.\nПримечание: 几 (jǐ) для чисел до 10; 多少 (duōshao) для чисел больше 10.\n\nСпросить цену: ……多少钱？\n这个杯子多少钱？— Сколько стоит этот стакан?\n\nСпросить количество:\n你们学校有多少学生？— Сколько учеников в вашей школе?\n你有多少钱？— Сколько у вас денег?","tj":"多少 (duōshao) — калимаи саволии барои ададҳои аз 10 зиёд.\nҚайд: 几 (jǐ) барои ададҳо то 10; 多少 (duōshao) барои аз 10 зиёд.\n\nПурсидани нарх: ……多少钱？\n这个杯子多少钱？— Ин пиёла чанд пул аст?\n\nПурсидани миқдор:\n你们学校有多少学生？— Дар мактаби шумо чанд нафар шогирд аст?\n你有多少钱？— Шумо чанд пул доред?"}},{"l":8,"q":{"uz":"Qaysi grammatika ishlatilgan?\n一个杯子","ru":"Какая грамматика использована?\n一个杯子","tj":"Кадом грамматика истифода шудааст?\n一个杯子"},"opts":["量词 个/口 — O'lchov so'zlar","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"Xitoy tilida son va otning orasida o'lchov so'z kerak.\n\n个 (gè) — eng umumiy o'lchov so'z:\n一个杯子 — bir piyola\n三个学生 — uch o'quvchi\n两个老师 — ikki o'qituvchi\n\n口 (kǒu) — oila a'zolari uchun:\n三口人 — uch kishilik oila\n六口人 — olti kishilik oila","ru":"В китайском языке между числом и существительным необходимо счётное слово.\n\n个 (gè) — наиболее общее счётное слово:\n一个杯子 — один стакан\n三个学生 — три ученика\n两个老师 — два учителя\n\n口 (kǒu) — для членов семьи:\n三口人 — семья из трёх человек\n六口人 — семья из шести человек","tj":"Дар забони чинӣ байни адад ва исм калимаи шуморавӣ лозим аст.\n\n个 (gè) — умумитарин калимаи шуморавӣ:\n一个杯子 — як дона пиёла\n三个学生 — се нафар шогирд\n两个老师 — ду нафар устод\n\n口 (kǒu) — барои аъзоёни оила:\n三口人 — оилаи се нафара\n六口人 — оилаи шаш нафара"}},{"l":8,"q":{"uz":"Qaysi grammatika ishlatilgan?\n这个多少钱？","ru":"Какая грамматика использована?\n这个多少钱？","tj":"Кадом грамматика истифода шудааст?\n这个多少钱？"},"opts":["钱数的表达 — Pul miqdori","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"Xitoy valyutasi: 人民币 (Renminbi, RMB)\nRasmiy: 元 (yuán)\nSo'zlashuv: 块 (kuài)\n\nMisol:\n28块 = 28元 — 28 yuan\n18块钱 — 18 yuan (so'zlashuv shakli)\n\n这个杯子多少钱？— Bu piyola qancha turadi?\n28块。— 28 yuan.","ru":"Китайская валюта: 人民币 (Жэньминьби, RMB)\nОфициально: 元 (yuán)\nРазговорно: 块 (kuài)\n\nПример:\n28块 = 28元 — 28 юаней\n18块钱 — 18 юаней (разговорная форма)\n\n这个杯子多少钱？— Сколько стоит этот стакан?\n28块。— 28 юаней.","tj":"Асъори чинӣ: 人民币 (Жэньминьби, RMB)\nРасмӣ: 元 (yuán)\nГуфтугӯӣ: 块 (kuài)\n\nМисол:\n28块 = 28元 — 28 юан\n18块钱 — 18 юан (шакли гуфтугӯӣ)\n\n这个杯子多少钱？— Ин пиёла чанд пул аст?\n28块。— 28 юан."}},{"l":9,"q":{"uz":"Qaysi grammatika ishlatilgan?\n小猫在那儿。","ru":"Какая грамматика использована?\n小猫在那儿。","tj":"Кадом грамматика истифода шудааст?\n小猫在那儿。"},"opts":["动词 在","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"在(zài) — fe'l sifatida biror narsa yoki kishining qayerda ekanligini bildiradi.\nTuzilish: Ega + 在 + Joy\n\nInkor: Ega + 不在 + Joy\n爸爸不在家。— Ota uyda emas.","ru":"在(zài) — как глагол указывает, где находится кто-то или что-то.\nСтруктура: Подлежащее + 在 + Место\n\nОтрицание: Подлежащее + 不在 + Место\n爸爸不在家。— Папа не дома.","tj":"在(zài) — ҳамчун феъл нишон медиҳад, ки чизе ё касе дар куҷо аст.\nСохтор: Муб. + 在 + Ҷой\n\nИнкор: Муб. + 不在 + Ҷой\n爸爸不在家。— Падар дар хона нест."}},{"l":9,"q":{"uz":"Qaysi grammatika ishlatilgan?\n你在哪儿工作？","ru":"Какая грамматика использована?\n你在哪儿工作？","tj":"Кадом грамматика истифода шудааст?\n你在哪儿工作？"},"opts":["哪儿 — jo'ylashuv so'roq olmoshi","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"哪儿(nǎr) — joylashuvni so'rash uchun ishlatiladigan so'roq so'zi.\nTuzilish: Ega + 在 + 哪儿?\n\nMisol:\n小猫在哪儿？— Mushuk qayerda?\n你在哪儿工作？— Siz qaerda ishlaysiz?\n他在哪儿呢？— Xo'sh, u qayerda?","ru":"哪儿(nǎr) — вопросительное слово для уточнения места.\nСтруктура: Подлежащее + 在 + 哪儿?\n\nПример:\n小猫在哪儿？— Где кошка?\n你在哪儿工作？— Где вы работаете?\n他在哪儿呢？— Где же он?","tj":"哪儿(nǎr) — калимаи суол барои пурсидани ҷой.\nСохтор: Муб. + 在 + 哪儿?\n\nНамуна:\n小猫在哪儿？— Гурба куҷост?\n你在哪儿工作？— Шумо дар куҷо кор мекунед?\n他在哪儿呢？— Пас ӯ куҷост?"}},{"l":9,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我儿子在医院工作。","ru":"Какая грамматика использована?\n我儿子在医院工作。","tj":"Кадом грамматика истифода шудааст?\n我儿子在医院工作。"},"opts":["介词 在","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"在(zài) — predlog sifatida fe'ldan oldin kelib, harakatning qayerda sodir bo'lishini bildiradi.\nTuzilish: Ega + 在 + Joy + Fe'l\n\nFarq:\n她在医院。(Fe'l 在) — U kasalxonada.\n她在医院工作。(Predlog 在) — U kasalxonada ishlaydi.","ru":"在(zài) — как предлог стоит перед глаголом и указывает место действия.\nСтруктура: Подлежащее + 在 + Место + Глагол\n\nРазница:\n她在医院。(Глагол 在) — Она в больнице.\n她在医院工作。(Предлог 在) — Она работает в больнице.","tj":"在(zài) — ҳамчун пешоянд пеш аз феъл меояд ва ҷойи амалро нишон медиҳад.\nСохтор: Муб. + 在 + Ҷой + Феъл\n\nФарқ:\n她在医院。(Феъли 在) — Ӯ дар беморхона аст.\n她在医院工作。(Пешоянди 在) — Ӯ дар беморхона кор мекунад."}},{"l":10,"q":{"uz":"Qaysi grammatika ishlatilgan?\n桌子上有一个电脑。","ru":"Какая грамматика использована?\n桌子上有一个电脑。","tj":"Кадом грамматика истифода шудааст?\n桌子上有一个电脑。"},"opts":["有字句","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"有(yǒu) — biror joyda narsa yoki kishining borligini bildiradi.\nTuzilish: Joy + 有 + Narsa/Kishi\n\nInkor: 没有 (méiyǒu)\n椅子下面没有小狗。— Stul ostida it yo'q.\n这儿有人吗？ — 没有。— Bu yerda kimdir bormi? — Yo'q.","ru":"有(yǒu) — указывает на существование чего-то/кого-то в определённом месте.\nСтруктура: Место + 有 + Предмет/Человек\n\nОтрицание: 没有 (méiyǒu)\n椅子下面没有小狗。— Под стулом нет собаки.\n这儿有人吗？ — 没有。— Здесь кто-то есть? — Нет.","tj":"有(yǒu) — мавҷудияти чизе ё касеро дар ҷои муайян нишон медиҳад.\nСохтор: Ҷой + 有 + Чиз/Кас\n\nИнкор: 没有 (méiyǒu)\n椅子下面没有小狗。— Зери курсӣ саг нест.\n这儿有人吗？ — 没有。— Ин ҷо кас ҳаст? — Не."}},{"l":10,"q":{"uz":"Qaysi grammatika ishlatilgan?\n电脑和书","ru":"Какая грамматика использована?\n电脑和书","tj":"Кадом грамматика истифода шудааст?\n电脑和书"},"opts":["连词 和","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"和(hé) — ikki ot yoki olmoshni birlashtiradi ('va', 'bilan').\nTuzilish: Ot1 + 和 + Ot2\n\nEslatma: 和 faqat ot va olmoshlarni bog'laydi —\nfe'l va gaplarni bog'lay olmaydi.","ru":"和(hé) — соединяет два существительных или местоимения ('и', 'с').\nСтруктура: Сущ1 + 和 + Сущ2\n\nПримечание: 和 соединяет только существительные и местоимения —\nглаголы и предложения оно не соединяет.","tj":"和(hé) — ду исм ё ҷонишинро мепайвандад ('ва', 'бо').\nСохтор: Исм1 + 和 + Исм2\n\nЭзоҳ: 和 танҳо исмҳо ва ҷонишинҳоро мепайвандад —\nфеълҳо ва ҷумлаҳоро пайвандакӣ карда наметавонад."}},{"l":10,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我能坐这儿吗？","ru":"Какая грамматика использована?\n我能坐这儿吗？","tj":"Кадом грамматика истифода шудааст?\n我能坐这儿吗？"},"opts":["能愿动词 能","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"能(néng) — imkoniyat yoki ruxsatni bildiradi.\nTuzilish: Ega + 能 + Fe'l\n\n能 va 会 farqi:\n会 — o'rganib orttirgan mahorat (biladi)\n能 — sharoitga asoslangan imkoniyat/ruxsat (qila oladi/mumkin)","ru":"能(néng) — выражает способность или разрешение.\nСтруктура: Подлежащее + 能 + Глагол\n\nРазница 能 и 会:\n会 — умение, приобретённое в результате обучения\n能 — возможность/разрешение в зависимости от обстоятельств","tj":"能(néng) — қобилият ё иҷозатро баён мекунад.\nСохтор: Муб. + 能 + Феъл\n\nФарқи 能 ва 会:\n会 — маҳорати аз омӯзиш ба даст омада\n能 — имконият/иҷозат вобаста ба шароит"}},{"l":11,"q":{"uz":"Qaysi grammatika ishlatilgan?\n现在九点。","ru":"Какая грамматика использована?\n现在九点。","tj":"Кадом грамматика истифода шудааст?\n现在九点。"},"opts":["时间的表达","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"Soat: 点(diǎn)\nDaqiqa: 分(fēn)\nTuzilish: N点 yoki N点M分\n\n9:00 → 九点\n10:10 → 十点十分\n5:30 → 五点三十分\n2:05 → 两点零五分\n\nKun qismlari:\n上午 shàngwǔ — ertalab (AM)\n中午 zhōngwǔ — tush\n下午 xiàwǔ — tushdan keyin (PM)\n\nEslatma: 2:00 → 两点 (liǎng diǎn), 二点 emas!","ru":"Час: 点(diǎn)\nМинута: 分(fēn)\nСтруктура: N点 или N点M分\n\n9:00 → 九点\n10:10 → 十点十分\n5:30 → 五点三十分\n2:05 → 两点零五分\n\nЧасти суток:\n上午 shàngwǔ — утро (AM)\n中午 zhōngwǔ — полдень\n下午 xiàwǔ — послеполудень (PM)\n\nВнимание: 2:00 → 两点 (liǎng diǎn), не 二点!","tj":"Соат: 点(diǎn)\nДақиқа: 分(fēn)\nСохтор: N点 ё N点M分\n\n9:00 → 九点\n10:10 → 十点十分\n5:30 → 五点三十分\n2:05 → 两点零五分\n\nҚисмҳои шабонарӯз:\n上午 shàngwǔ — субҳ (AM)\n中午 zhōngwǔ — нисфирӯзӣ\n下午 xiàwǔ — баъдазнисфирӯзӣ (PM)\n\nЭзоҳ: 2:00 → 两点 (liǎng diǎn), на 二点!"}},{"l":11,"q":{"uz":"Qaysi grammatika ishlatilgan?\n他们六点吃饭。","ru":"Какая грамматика использована?\n他们六点吃饭。","tj":"Кадом грамматика истифода шудааст?\n他们六点吃饭。"},"opts":["时间词做状语","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"Vaqt so'zi gapda ravish vazifasini bajarishi mumkin.\nU odatda egadan keyin yoki egadan oldin keladi.\n\n1-tuzilish: Ega + Vaqt + Fe'l\n妈妈六点做饭。— Onam soat oltida ovqat pishiradi.\n\n2-tuzilish: Vaqt + Ega + Fe'l\n中午十二点我们吃饭。— Biz tushda soat o'n ikkida ovqatlanamiz.\n\nSavol: 什么时候 — qachon?","ru":"Слово времени может служить наречием в предложении.\nОбычно стоит после подлежащего или перед ним.\n\nСтруктура 1: Подлежащее + Время + Глагол\n妈妈六点做饭。— Мама готовит в шесть.\n\nСтруктура 2: Время + Подлежащее + Глагол\n中午十二点我们吃饭。— В полдень в двенадцать мы обедаем.\n\nВопрос: 什么时候 — когда?","tj":"Калимаи вақт дар ҷумла метавонад зарф бошад.\nОдатан баъд аз мубтадо ё пеш аз он меояд.\n\nСохтори 1: Муб. + Вақт + Феъл\n妈妈六点做饭。— Модар соати шаш хӯрок мепазад.\n\nСохтори 2: Вақт + Муб. + Феъл\n中午十二点我们吃饭。— Мо нисфирӯзӣ соати дувоздаҳ хӯрок мехӯрем.\n\nСавол: 什么时候 — кай?"}},{"l":11,"q":{"uz":"Qaysi grammatika ishlatilgan?\n星期五前能回家吗？","ru":"Какая грамматика использована?\n星期五前能回家吗？","tj":"Кадом грамматика истифода шудааст?\n星期五前能回家吗？"},"opts":["名词 前","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"前(qián) — muayyan voqeadan oldingi vaqtni bildiradi.\n\n三天前 — uch kun oldin\n一个星期前 — bir hafta oldin\n四点前 — soat to'rtdan oldin\n星期五前 — juma kunidan oldin\n\nMisol:\n星期五前能回家吗？— Juma kunidan oldin uyga qayta olasizmi?\n八点前去学校。— Soat sakkizdan oldin maktabga boring.","ru":"前(qián) — указывает на момент времени до определённого события.\n\n三天前 — три дня назад\n一个星期前 — одну неделю назад\n四点前 — до четырёх часов\n星期五前 — до пятницы\n\nПример:\n星期五前能回家吗？— Вы сможете вернуться домой до пятницы?\n八点前去学校。— Идите в школу до восьми.","tj":"前(qián) — лаҳзаи вақтро пеш аз рӯйдоди муайян нишон медиҳад.\n\n三天前 — се рӯз пеш\n一个星期前 — як ҳафта пеш\n四点前 — пеш аз соати чор\n星期五前 — пеш аз ҷумъа\n\nНамуна:\n星期五前能回家吗？— Шумо метавонед пеш аз ҷумъа ба хона баргардед?\n八点前去学校。— Пеш аз соати ҳашт ба мактаб равед."}},{"l":12,"q":{"uz":"Qaysi grammatika ishlatilgan?\n明天天气怎么样？","ru":"Какая грамматика использована?\n明天天气怎么样？","tj":
