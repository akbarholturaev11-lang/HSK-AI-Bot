сми боқии ҷумла. Дар аввали ҷумла ё баъди мубтадо омада метавонад. Ба 'about / regarding'-и инглисӣ монанд аст."},"e":{"zh":"关于这次活动，你有什么想法？","p":"Guānyú zhè cì huódòng, nǐ yǒu shénme xiǎngfǎ?","uz":"Bu tadbir haqida qanday fikrlaringiz bor?","ru":"Насчёт этого мероприятия, какие у тебя мысли?","tj":"Дар бораи ин тадбир, чӣ фикр доред?"},"pattern":"介词\"关于\"（关于 + N + ……）"},{"l":18,"t":{"uz":"Nafaqat……balki ham……","ru":"Не только……но и……","tj":"На танҳо……балки ҳам……"},"f":{"uz":"'不但…而且…' tuzilmasi ikkita ijobiy holatni kuchaytirib bog'laydi. '不但' = nafaqat, '而且' = balki ham. Birinchi jumladan ikkinchisi yanada kuchli yoki qo'shimcha ma'no qo'shadi.","ru":"Конструкция '不但…而且…' усиленно соединяет два положительных факта. '不但' = не только, '而且' = но и. Второе предложение добавляет ещё более сильный или дополнительный смысл.","tj":"Сохтори '不但…而且…' ду ҳолати мусбатро бо таъкид мепайвандад. '不但' = на танҳо, '而且' = балки ҳам. Ҷумлаи дуввум маъноеро ҳам қавитар ё иловагӣ илова мекунад."},"e":{"zh":"这门课不但有用，而且很有意思！","p":"Zhè mén kè búdàn yǒuyòng, érqiě hěn yǒu yìsi!","uz":"Bu kurs nafaqat foydali, balki juda qiziqarli ham!","ru":"Этот курс не только полезный, но и очень интересный!","tj":"Ин курс на танҳо муфид, балки хеле ҷолиб ҳам аст!"},"pattern":"不但……而且……"},{"l":19,"t":{"uz":"Yo'nalish to'ldiruvchilarining ko'chma ma'nolari: 出来/起来/下去","ru":"Переносное значение направленных дополнений: 出来/起来/下去","tj":"Маъноҳои маҷозии пуркунандаҳои самтӣ: 出来/起来/下去"},"f":{"uz":"出来 = nimadir oshkor bo'lmoq/paydo bo'lmoq (看出来 = sezib olmoq); 起来 = harakat yoki holat boshlanmoq (笑起来 = kulib yubormoq); 下去 = harakat davom etmoq (坚持下去 = davom ettirmoq). Bular ko'chma/majoziy ma'nolar.","ru":"出来 = что-то обнаруживается/появляется (看出来 = заметить); 起来 = действие или состояние начинается (笑起来 = засмеяться); 下去 = действие продолжается (坚持下去 = продолжать держаться). Это переносные значения.","tj":"出来 = чизе ошкор мешавад/пайдо мешавад (看出来 = пай бурдан); 起来 = амал ё ҳолат оғоз меёбад (笑起来 = хандидан гирифтан); 下去 = амал идома меёбад (坚持下去 = идома додан). Инҳо маъноҳои маҷозӣ ҳастанд."},"e":{"zh":"你没看出来她变了吗？","p":"Nǐ méi kàn chū lái tā biàn le ma?","uz":"Siz uning o'zgarganini sezmadingizmi?","ru":"Ты разве не заметил, что она изменилась?","tj":"Шумо пай набурдед, ки вай тағйир ёфт?"},"pattern":"趋向补语引申义：出来/起来/下去"},{"l":19,"t":{"uz":"使/叫/让 kauzativ fe'llari taqqoslash","ru":"Сравнение каузативных глаголов 使/叫/让","tj":"Муқоисаи феълҳои каузативии 使/叫/让"},"f":{"uz":"Uchtasi ham 'biror kishini biror narsa qilishga majbur qilmoq' ma'nosida. Farq: '使' = rasmiy, yozma uslub (bu holat meni majbur qildi); '叫' = buyurish, ko'proq og'zaki, kichiklarga; '让' = ruxsat berish YOKI majbur qilish — eng ko'p ishlatiladigan.","ru":"Все три означают 'заставить/позволить кому-то сделать что-то'. Разница: '使' = официальный, письменный стиль (это обстоятельство меня заставило); '叫' = приказать, больше устный, к подчинённым; '让' = позволить ИЛИ заставить — наиболее употребительный.","tj":"Ҳарсе маъноеро доранд, ки 'ба касе иҷозат додан ё маҷбур кардан'. Фарқ: '使' = расмӣ, услуби хаттӣ (ин ҳолат маро маҷбур кард); '叫' = фармондан, бештар шифоҳӣ, ба зердастон; '让' = иҷозат додан ЁД маҷбур кардан — бештар истифодашаванда."},"e":{"zh":"这使我很受鼓励！","p":"Zhè shǐ wǒ hěn shòu gǔlì!","uz":"Bu meni juda ilhomlantirdi! (rasmiy)","ru":"Это очень меня воодушевляет! (официальный)","tj":"Ин маро хеле илҳом бахшид! (расмӣ)"},"pattern":"使/叫/让（使役）的比较"},{"l":19,"t":{"uz":"经过 + joy (orqali o'tmoq / tajribadan o'tmoq)","ru":"经过 + место (проходить через / через опыт)","tj":"经过 + ҷой (гузаштан аз / тавассути таҷриба)"},"f":{"uz":"'经过' ikki ma'noda: (1) joy bo'ylab o'tmoq (经过公园 = parkdan o'tmoq); (2) biror jarayon/tajribadan o'tmoq (经过努力 = harakat orqali). Predlog sifatida joy yoki jarayondan oldin keladi.","ru":"'经过' имеет два значения: (1) проходить через место (经过公园 = проходить через парк); (2) проходить через процесс/опыт (经过努力 = через усилия). В качестве предлога стоит перед местом или процессом.","tj":"'经过' ду маъно дорад: (1) аз ҷое гузаштан (经过公园 = аз боғ гузаштан); (2) аз раванде/таҷрибае гузаштан (经过努力 = тавассути кӯшиш). Ҳамчун пешоянд пеш аз ҷой ё раванд меояд."},"e":{"zh":"我经过那条街道来的。","p":"Wǒ jīngguò nà tiáo jiēdào lái de.","uz":"Men u ko'cha orqali keldim.","ru":"Я пришёл через ту улицу.","tj":"Ман аз он кӯча гузашта омадам."},"pattern":"经过 + 地点（路过/经历）"},{"l":20,"t":{"uz":"被-konstruktsiya: 被 + harakat bajaruvchi + fe'l (passiv gap)","ru":"Конструкция 被: 被 + деятель + глагол (пассивный залог)","tj":"Сохтори 被: 被 + иҷрогар + феъл (замони маҷҳул)"},"f":{"uz":"'被'-konstruktsiya passiv gaplarni ifodalaydi. Tuzilma: sub'ekt (ob'ekt) + 被 + harakat bajaruvchi + fe'l. Ko'pincha noxush hodisalarda ishlatiladi, lekin ijobiy hodisalar uchun ham mumkin. Harakat bajaruvchi tushirilishi mumkin.","ru":"Конструкция '被' выражает пассивный залог. Структура: субъект (объект) + 被 + деятель + глагол. Часто используется при неприятных событиях, но возможна и для позитивных. Деятель может быть опущен.","tj":"Сохтори '被' замони маҷҳулро ифода мекунад. Сохтор: мубтадо (объект) + 被 + иҷрогар + феъл. Зиёдтар дар ҳодисаҳои нохуш истифода мешавад, аммо барои мусбат ҳам мумкин. Иҷрогар партофта шавад мешавад."},"e":{"zh":"我被他影响了！","p":"Wǒ bèi tā yǐngxiǎng le!","uz":"U meni ta'sirlantirdi!","ru":"Он повлиял на меня!","tj":"Вай ба ман таъсир кард!"},"pattern":"被字句：被 + 施事者 + 动词（被动句）"},{"l":20,"t":{"uz":"Faqat……bo'lgandagina……mumkin","ru":"Только……тогда только……","tj":"Танҳо……вақте ки……мумкин аст"},"f":{"uz":"'只有…才…' = biror shart faqat shu tarzda bajarilsa, natijaga erishish mumkin. '只要…就…' dan farqi: '只有' kuchliroq shart, bitta to'g'ri yo'l bor; '只要' = yetarli shart, boshqa yo'llar ham mumkin.","ru":"'只有…才…' = результат возможен только при выполнении именно этого условия. Отличие от '只要…就…': '只有' — более строгое условие, только один правильный путь; '只要' — достаточное условие, другие пути тоже возможны.","tj":"'只有…才…' = натиҷа танҳо ҳангоми иҷрои маҳз ин шарт имконпазир аст. Фарқ аз '只要…就…': '只有' — шарти қатъитар, танҳо як роҳи дуруст; '只要' — шарти кофӣ, роҳҳои дигар ҳам мумкин."},"e":{"zh":"只有经历失败，才能变得更强！","p":"Zhǐyǒu jīnglì shībài, cái néng biàn de gèng qiáng!","uz":"Faqat mag'lubiyatni boshdan kechirganingizda, kuchliroq bo'la olasiz!","ru":"Только пережив поражение, можно стать сильнее!","tj":"Танҳо вақте шикастро аз сар гузаронед, метавонед қавитар шавед!"},"pattern":"只有……才……"},{"l":20,"t":{"uz":"Qanchalik……! (hayrat undalmasi)","ru":"Как……! (восклицательное предложение)","tj":"Чӣ қадар……! (ҷумлаи тааҷубӣ)"},"f":{"uz":"'多么…啊！' tuzilmasi kuchli his-tuyg'u, hayrat yoki quvonchni ifodalaydi. Tuzilma: 多么 + sifat/holat + 啊！ Ingilizcha 'How …!' ga o'xshaydi. Og'zaki nutqda '啊' o'rniga '呀' ishlatilishi mumkin.","ru":"Конструкция '多么…啊！' выражает сильные эмоции, восхищение или радость. Структура: 多么 + прилагательное/состояние + 啊！ Похоже на английское 'How …!'. В разговорной речи '啊' может заменяться на '呀'.","tj":"Сохтори '多么…啊！' эҳсосоти қавӣ, тааҷуб ё шодиро ифода мекунад. Сохтор: 多么 + сифат/ҳол + 啊！ Ба 'How …!'-и инглисӣ монанд. Дар забони гуфторӣ '啊' ба '呀' иваз шуда метавонад."},"e":{"zh":"多么美好的未来在等着你啊！","p":"Duōme měihǎo de wèilái zài děngzhe nǐ a!","uz":"Qanchalik ajoyib kelajak sizi kutmoqda!","ru":"Как прекрасное будущее тебя ждёт!","tj":"Чӣ қадар ояндаи зебо шуморо интизор аст!"},"pattern":"多么……啊！（感叹句）"}],"QUIZ":[{"l":1,"q":{"uz":"Qaysi grammatika ishlatilgan?\n作业都做好了！","ru":"Какая грамматика использована?\n作业都做好了！","tj":"Кадом грамматика истифода шудааст?\n作业都做好了！"},"opts":["结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\"","简单趋向补语"],"a":0,"explanation":{"uz":"Fe'ldan keyin '好' keltirib, harakat muvaffaqiyatli yoki to'liq bajarilganligini bildiradi.\nQolip: Fe'l + 好 + 了\nMasalan: 做好了 (bajardi/tamom qildi), 准备好了 (tayyorladi), 写好了 (yozib bo'ldi).\nInkor shakli: 没+做好 (bajarmadi/tugallamadi).","ru":"Частица '好' после глагола означает, что действие выполнено успешно или полностью.\nСтруктура: Глагол + 好 + 了\nНапример: 做好了 (сделал/закончил), 准备好了 (приготовил), 写好了 (написал).\nОтрицание: 没+做好 (не сделал/не завершил).","tj":"Зарраи '好' пас аз феъл нишон медиҳад, ки амал бомуваффақият ё пурра иҷро шудааст.\nСохтор: Феъл + 好 + 了\nМасалан: 做好了 (иҷро кард), 准备好了 (тайёр кард), 写好了 (навишт).\nИнкор: 没+做好 (иҷро накард/тамом накард)."}},{"l":1,"q":{"uz":"Qaysi grammatika ishlatilgan?\n他一个电话也没打，我很着急。","ru":"Какая грамматика использована?\n他一个电话也没打，我很着急。","tj":"Кадом грамматика истифода шудааст?\n他一个电话也没打，我很着急。"},"opts":["\"一……也/都+不/没……\"表示否定","结果补语\"好\"","连词\"那\"","简单趋向补语"],"a":0,"explanation":{"uz":"Bu qolip 'hech bir...ham yo'q/emas' ma'nosini beradi — mutlaq inkorni ifodalaydi.\nQolip: 一 + miqdor+ot + 也/都 + 不/没 + fe'l\nMasalan: 一个人也没来 (bitta kishi ham kelmadi)\n         一点儿都不想去 (zarra ham bormoqchi emasman)\n         一个电话也没打 (bitta qo'ng'iroq ham qilmadi)","ru":"Конструкция выражает абсолютное отрицание: 'ни одного...даже нет'.\nСтруктура: 一 + числит.+сущ. + 也/都 + 不/没 + глагол\nНапример: 一个人也没来 (никто не пришёл)\n          一点儿都不想去 (совсем не хочу идти)\n          一个电话也没打 (не позвонил ни разу)","tj":"Ин сохтор инкори мутлақро ифода мекунад: 'ҳатто як...ҳам нест'.\nСохтор: 一 + шумор+исм + 也/都 + 不/没 + феъл\nМасалан: 一个人也没来 (ҳатто як нафар ҳам наомад)\n         一点儿都不想去 (каме ҳам рафтан намехоҳам)\n         一个电话也没打 (ҳатто як занг ҳам назад)"}},{"l":1,"q":{"uz":"Qaysi grammatika ishlatilgan?\n那你星期六有没有时间？我们一起去公园吧。","ru":"Какая грамматика использована?\n那你星期六有没有时间？我们一起去公园吧。","tj":"Кадом грамматика истифода шудааст?\n那你星期六有没有时间？我们一起去公园吧。"},"opts":["连词\"那\"","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","简单趋向补语"],"a":0,"explanation":{"uz":"'那' bog'lovchisi oldingi gapdan kelib chiquvchi xulosani yoki qarorni kiritadi.\nMa'nosi: 'unday bo'lsa, unda, bo'lmasa'\nKo'pincha 那 + gap shaklida keladi, gapning boshida turadi.\nMasalan: 那我们明天去吧。(Unday bo'lsa ertaga boraylik.)\n         那你去吧。(Unda sen bor.)","ru":"Союз '那' вводит вывод или решение, вытекающее из предыдущей реплики.\nЗначение: 'тогда, в таком случае'\nОбычно стоит в начале предложения: 那 + предложение.\nНапример: 那我们明天去吧。(Тогда пойдём завтра.)\n          那你去吧。(Тогда ты иди.)","tj":"Пайвандаки '那' хулоса ё қарореро, ки аз гапи қаблӣ бармеояд, ворид мекунад.\nМаъно: 'пас, дар он сурат'\nОдатан дар аввали ҷумла меояд: 那 + ҷумла.\nМасалан: 那我们明天去吧。(Пас фардо равем.)\n         那你去吧。(Пас ту рав.)"}},{"l":2,"q":{"uz":"Qaysi grammatika ishlatilgan?\n他先去三楼拿文件，马上就回来。","ru":"Какая грамматика использована?\n他先去三楼拿文件，马上就回来。","tj":"Кадом грамматика истифода шудааст?\n他先去三楼拿文件，马上就回来。"},"opts":["简单趋向补语","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"Yo'nalish to'ldiruvchilari fe'lga qo'shilgan 来 yoki 去 dan iborat.\n来 — harakat so'zlovchi tomonga yoki ma'lum nuqtaga qarab;\n去 — harakat so'zlovchidan yoki ma'lum nuqtadan uzoqlashipti.\nQolip: V + 来/去\nMasalan: 回来 (qaytib kelmoq), 进去 (kirib ketmoq), 上来 (yuqoriga chiqib kelmoq),\n         拿回来 (olib qaytmoq), 跑进去 (yugurib kirib ketmoq).","ru":"Направленные дополнения состоят из 来 или 去, присоединённых к глаголу.\n来 — движение к говорящему или к определённой точке;\n去 — движение от говорящего или от точки.\nСтруктура: Глагол + 来/去\nНапример: 回来 (вернуться), 进去 (войти), 上来 (подняться),\n          拿回来 (принести обратно), 跑进去 (забежать).","tj":"Иловаҳои самтнок аз 来 ё 去, ки ба феъл ҳамроҳ мешаванд, иборатанд.\n来 — ҳаракат ба сӯи гӯянда ё нуқтаи муайян;\n去 — ҳаракат аз гӯянда ё аз нуқта.\nСохтор: Феъл + 来/去\nМасалан: 回来 (баргаштан), 进去 (дохил шудан), 上来 (боло омадан),\n         拿回来 (бо худ оварадан), 跑进去 (давида дохил шудан)."}},{"l":2,"q":{"uz":"Qaysi grammatika ishlatilgan?\n他先去三楼办公室拿文件，然后马上回来。","ru":"Какая грамматика использована?\n他先去三楼办公室拿文件，然后马上回来。","tj":"Кадом грамматика истифода шудааст?\n他先去三楼办公室拿文件，然后马上回来。"},"opts":["两个动作连续发生","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"Ikki harakat ketma-ket sodir bo'lganda, quyidagi so'zlar ishlatiladi:\n先……然后……  — avval...keyin...\n先……再……  — avval...so'ngra...\n……完……就…… — ...tamomlagandan keyin...\nMasalan: 他先去办公室拿文件，然后回来。\n         我先复习，再出去玩儿。","ru":"Для выражения двух последовательных действий используются:\n先……然后…… — сначала...потом...\n先……再…… — сначала...затем...\n……完……就…… — после того как закончил...\nНапример: 他先去办公室拿文件，然后回来。\n          我先复习，再出去玩儿。","tj":"Барои ифодаи ду амали пайдарпай истифода мешавад:\n先……然后…… — аввал...баъд...\n先……再…… — аввал...сипас...\n……完……就…… — пас аз тамом кардан...\nМасалан: 他先去办公室拿文件，然后回来。\n         我先复习，再出去玩儿。"}},{"l":2,"q":{"uz":"Qaysi grammatika ishlatilgan?\n这些东西这么多，你一个人能拿得了吗？","ru":"Какая грамматика использована?\n这些东西这么多，你一个人能拿得了吗？","tj":"Кадом грамматика истифода шудааст?\n这些东西这么多，你一个人能拿得了吗？"},"opts":["反问句\"能……吗？\"","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'能……吗？' — ko'pincha hayrat yoki shubha bildiruvchi ritorik so'roq.\nMa'nosi: 'bunga qodirsanmi? (qodir emas)', 'bu mumkinmi? (mumkin emas)'\nJavob ko'pincha inkor bo'ladi yoki so'roq o'zi inkor ma'nosi beradi.\nMasalan: 这么多东西，你一个人能拿得了吗？\n         (Bu qadar narsani yolg'iz olib keta olasanmi? — yaqqol olib keta olmaysan)","ru":"'能……吗？' — риторический вопрос, выражающий удивление или сомнение.\nЗначение: 'разве ты сможешь?', 'разве это возможно?'\nОтвет обычно отрицательный, или вопрос сам несёт отрицательный смысл.\nНапример: 这么多东西，你一个人能拿得了吗？\n          (Столько вещей, ты один сможешь всё унести? — явно не сможешь)","tj":"'能……吗？' — саволи риторикӣ, ки шигифт ё шубҳаро ифода мекунад.\nМаъно: 'оё метавонӣ?', 'оё ин имконпазир аст?'\nҶавоб одатан инкорӣ аст ё худи савол маънои инкориро дорад.\nМасалан: 这么多东西，你一个人能拿得了吗？\n         (Ин қадар чизҳо, оё ту танҳо ҳама гирифта метавонӣ? — аён аст ки не)"}},{"l":3,"q":{"uz":"Qaysi grammatika ishlatilgan?\n你想喝茶还是果汁？","ru":"Какая грамматика использована?\n你想喝茶还是果汁？","tj":"Кадом грамматика истифода шудааст?\n你想喝茶还是果汁？"},"opts":["\"还是\"和\"或者\"的比较","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"Ikkalasi ham 'yoki' ma'nosini beradi, lekin qo'llanishi farqli:\n还是 — so'roq gaplarda: 你要A还是B？\n或者 — darak gaplarda: 你可以A或者B。\nMasalan:\n  你想喝茶还是果汁？(So'roq — choy yoki sharbat?)\n  你可以坐地铁或者打车。(Darak — metro yoki taksi.)","ru":"Оба означают 'или', но употребляются по-разному:\n还是 — в вопросах: 你要A还是B？\n或者 — в утверждениях: 你可以A或者B。\nНапример:\n  你想喝茶还是果汁？(Вопрос — чай или сок?)\n  你可以坐地铁或者打车。(Утверждение — на метро или такси.)","tj":"Ҳарду маънои 'ё'-ро доранд, аммо истифодаашон фарқ мекунад:\n还是 — дар саволҳо: 你要A还是B？\n或者 — дар изҳор: 你可以A或者B。\nМасалан:\n  你想喝茶还是果汁？(Савол — чой ё шарбат?)\n  你可以坐地铁或者打车。(Изҳор — бо метро ё такси.)"}},{"l":3,"q":{"uz":"Qaysi grammatika ishlatilgan?\n桌子上放着很多饮料，还有新鲜水果。","ru":"Какая грамматика использована?\n桌子上放着很多饮料，还有新鲜水果。","tj":"Кадом грамматика истифода шудааст?\n桌子上放着很多饮料，还有新鲜水果。"},"opts":["存在句：处所+V着+数量+N","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"Bu qolip biror joyda nima borligini tasvirlaydi.\nQolip: Joy + V + 着 + son + ot\n着 — holatning davomiyligini bildiradi (qo'yilgan, turgan, osilib turgan).\nMasalan:\n  桌子上放着很多饮料。(Stol ustida ko'p ichimlik turadi.)\n  床上躺着一个人。(Ko'rpada bir kishi yotibdi.)\n  墙上挂着一幅画。(Devorga bir rasm osilgan.)","ru":"Конструкция описывает наличие чего-либо в каком-то месте.\nСтруктура: Место + V + 着 + числит. + сущ.\n着 — состояние, в котором находится объект (лежит, висит, стоит).\nНапример:\n  桌子上放着很多饮料。(На столе стоит много напитков.)\n  床上躺着一个人。(На кровати лежит человек.)\n  墙上挂着一幅画。(На стене висит картина.)","tj":"Ин сохтор мавҷудияти чизеро дар ҷое тасвир мекунад.\nСохтор: Ҷой + V + 着 + шумор + исм\n着 — ҳолати давомандаро нишон медиҳад (гузошта, хобида, овехта).\nМасалан:\n  桌子上放着很多饮料。(Рӯйи миз нӯшокиҳои зиёд гузошта шудааст.)\n  床上躺着一个人。(Рӯйи кат як одам хобида аст.)\n  墙上挂着一幅画。(Ба девор як расм овехта шудааст.)"}},{"l":3,"q":{"uz":"Qaysi grammatika ishlatilgan?\n你会爬山吗？今天我们打算去爬山。","ru":"Какая грамматика использована?\n你会爬山吗？今天我们打算去爬山。","tj":"Кадом грамматика истифода шудааст?\n你会爬山吗？今天我们打算去爬山。"},"opts":["\"会\"表示可能性","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'会' so'zi ikki asosiy ma'noda ishlatiladi:\n1) Mahorat: V qila olaman (o'rganib olingan qobiliyat)\n   Masalan: 我会游泳。(Men suza olaman.)\n2) Ehtimol: ...bo'lsa kerak, ...bo'lishi mumkin\n   Masalan: 明天会下雨吧。(Ertaga yomg'ir yog'sa kerak.)\nKontekst orqali qaysi ma'noda ekanligini bilsa bo'ladi.","ru":"Слово '会' имеет два основных значения:\n1) Умение: умею V (приобретённый навык)\n   Например: 我会游泳。(Я умею плавать.)\n2) Вероятность: наверное..., скорее всего...\n   Например: 明天会下雨吧。(Завтра, наверное, будет дождь.)\nЗначение определяется по контексту.","tj":"Калимаи '会' ду маъноии асосӣ дорад:\n1) Тавонистан: V карда метавонам (малакаи омӯхтагӣ)\n   Масалан: 我会游泳。(Ман шино карда метавонам.)\n2) Эҳтимол: шояд..., эҳтимол...\n   Масалан: 明天会下雨吧。(Фардо шояд борон борад.)\nМаъно аз рӯи контекст муайян карда мешавад."}},{"l":4,"q":{"uz":"Qaysi grammatika ishlatilgan?\n小丽又聪明又认真，总是第一个回答问题。","ru":"Какая грамматика использована?\n小丽又聪明又认真，总是第一个回答问题。","tj":"Кадом грамматика истифода шудааст?\n小丽又聪明又认真，总是第一个回答问题。"},"opts":["\"又……又……\"","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'又……又……' qolipi biror narsa yoki odamda bir vaqtda ikki sifat yoki holat borligini bildiradi.\nQolip: 又 + Sifat/fe'l + 又 + Sifat/fe'l\nMasalan:\n  又聪明又努力 (ham aqlli ham g'ayratli)\n  又新鲜又甜 (ham yangi ham shirin)\n  又便宜又好看 (ham arzon ham chiroyli)","ru":"Конструкция '又……又……' выражает наличие двух качеств или состояний одновременно.\nСтруктура: 又 + Прил./Гл. + 又 + Прил./Гл.\nНапример:\n  又聪明又努力 (и умный, и старательный)\n  又新鲜又甜 (и свежий, и сладкий)\n  又便宜又好看 (и дешёвый, и красивый)","tj":"Сохтори '又……又……' мавҷудияти ду сифат ё ҳолатро дар як вақт ифода мекунад.\nСохтор: 又 + Сифат/Феъл + 又 + Сифат/Феъл\nМасалан:\n  又聪明又努力 (ҳам зирак ҳам кӯшишкор)\n  又新鲜又甜 (ҳам тоза ҳам ширин)\n  又便宜又好看 (ҳам арзон ҳам зебо)"}},{"l":4,"q":{"uz":"Qaysi grammatika ishlatilgan?\n她总是笑着跟客人说话。","ru":"Какая грамматика использована?\n她总是笑着跟客人说话。","tj":"Кадом грамматика истифода шудааст?\n她总是笑着跟客人说话。"},"opts":["动作的伴随：V₁着(O₁) + V₂(O₂)","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"Bu qolip V₂ ni V₁ bilan bir vaqtda bajarishni ifodalaydi — V₁ asosiy harakatning shaklini beradi.\nQolip: V₁ + 着 + (O₁) + V₂ + (O₂)\n着 — birinchi harakatning davomiy holatini bildiradi.\nMasalan:\n  笑着说话 (kulib gaplashmoq)\n  站着工作 (tik turib ishlash)\n  听着音乐学习 (musiqa tinglab o'rganish)","ru":"Конструкция выражает выполнение V₂ одновременно с V₁ — V₁ задаёт способ действия.\nСтруктура: V₁ + 着 + (O₁) + V₂ + (O₂)\n着 — обозначает длящееся состояние первого действия.\nНапример:\n  笑着说话 (разговаривать с улыбкой)\n  站着工作 (работать стоя)\n  听着音乐学习 (учиться под музыку)","tj":"Ин сохтор иҷрои V₂-ро дар як вақт бо V₁ ифода мекунад — V₁ тарзи амалро медиҳад.\nСохтор: V₁ + 着 + (O₁) + V₂ + (O₂)\n着 — ҳолати давомандаи амали аввалро нишон медиҳад.\nМасалан:\n  笑着说话 (бо табассум сӯҳбат кардан)\n  站着工作 (истода кор кардан)\n  听着音乐学习 (бо мусиқа омӯхтан)"}},{"l":4,"q":{"uz":"Qaysi grammatika ishlatilgan?\n她总是笑着跟客人说话，客人都很喜欢她。","ru":"Какая грамматика использована?\n她总是笑着跟客人说话，客人都很喜欢她。","tj":"Кадом грамматика истифода шудааст?\n她总是笑着跟客人说话，客人都很喜欢她。"},"opts":["\"总是\"+V 表示习惯性动作","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'总是' ravishi fe'l oldidan keladi va harakatning doim yoki ko'p marta takrorlanishini bildiradi.\nMa'nosi: doim, hamisha, ko'pincha\nQolip: 主语 + 总是 + V + (O)\nMasalan:\n  她总是第一个回答问题。(U doim birinchi bo'lib javob beradi.)\n  他总是迟到。(U doim kechikadi.)\n  我总是喝热茶。(Men doim issiq choy ichaman.)","ru":"Наречие '总是' стоит перед глаголом и означает постоянное или повторяющееся действие.\nЗначение: всегда, постоянно\nСтруктура: Подлеж. + 总是 + Гл. + (Доп.)\nНапример:\n  她总是第一个回答问题。(Она всегда первой отвечает.)\n  他总是迟到。(Он всегда опаздывает.)\n  我总是喝热茶。(Я всегда пью горячий чай.)","tj":"Қайди '总是' пеш аз феъл меояд ва амали доимӣ ё такроршавандаро ифода мекунад.\nМаъно: ҳамеша, доимо\nСохтор: Мубтадо + 总是 + Феъл + (Иловаи феълӣ)\nМасалан:\n  她总是第一个回答问题。(Вай ҳамеша аввалин ҷавоб медиҳад.)\n  他总是迟到。(Вай ҳамеша дер меояд.)\n  我总是喝热茶。(Ман ҳамеша чои гарм менӯшам.)"}},{"l":5,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我最近体重越来越重了，不知道怎么办。","ru":"Какая грамматика использована?\n我最近体重越来越重了，不知道怎么办。","tj":"Кадом грамматика истифода шудааст?\n我最近体重越来越重了，不知道怎么办。"},"opts":["\"了\"表示变化","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"Gap oxiridagi '了' holat yoki vaziyat o'zganiga ishora qiladi.\nMasalan: 天热了。(Havo isidi — avval sovuq edi.)\n         他来了。(U keldi — avval yo'q edi.)\n         我胖了。(Men semir bo'ldim — avval shunday emas edim.)\nBu '了' va harakatning yakunlanishini bildiruvchi '了' dan farq qiladi.\nO'zgarish 了 ko'pincha holat fe'llari (形容词) bilan keladi.","ru":"Частица '了' в конце предложения указывает на изменение состояния или ситуации.\nНапример: 天热了。(Стало жарко — раньше было не так.)\n          他来了。(Он пришёл — раньше его не было.)\n          我胖了。(Я поправился — раньше было иначе.)\nЭто 了 отличается от 了, обозначающего завершение действия.\nОбычно сочетается с прилагательными-состояниями.","tj":"Зарраи '了' дар охири ҷумла тағйироти ҳол ё вазъиятро нишон медиҳад.\nМасалан: 天热了。(Гарм шуд — пеш чунин набуд.)\n         他来了。(Вай омад — пеш набуд.)\n         我胖了。(Ман фарбеҳ шудам — пеш чунин набудам.)\nИн 了 аз 了-е, ки анҷоми амалро нишон медиҳад, фарқ дорад.\nОдатан бо феълҳои ҳолатӣ (сифатҳо) якҷоя меояд."}},{"l":5,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我最近越来越胖了，不知道怎么办。","ru":"Какая грамматика использована?\n我最近越来越胖了，不知道怎么办。","tj":"Кадом грамматика истифода шудааст?\n我最近越来越胖了，不知道怎么办。"},"opts":["\"越来越\"+Adj/V","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'越来越' + sifat yoki fe'l: vaqt o'tishi bilan bir narsa tobora ortib yoki kamayib borishini bildiradi.\nQolip: 越来越 + Sifat/fe'l\nMasalan:\n  越来越胖 (tobora semirmoq)\n  越来越热 (tobora issiq bo'lmoq)\n  越来越喜欢 (tobora yaxshi ko'rmoq)\nInkor: 越来越不+Sifat (越来越不舒服 — tobora yomonlashmoq)","ru":"'越来越' + прилагательное или глагол: с течением времени что-то всё больше нарастает.\nСтруктура: 越来越 + Прил./Гл.\nНапример:\n  越来越胖 (всё толстеть)\n  越来越热 (всё жарче)\n  越来越喜欢 (нравиться всё больше)\nОтрицание: 越来越不+Прил. (越来越不舒服 — всё хуже самочувствие)","tj":"'越来越' + сифат ё феъл: бо гузашти вақт чизе рӯ ба рӯ зиёд ё кам мешавад.\nСохтор: 越来越 + Сифат/Феъл\nМасалан:\n  越来越胖 (рӯ ба рӯ фарбеҳ шудан)\n  越来越热 (рӯ ба рӯ гармтар шудан)\n  越来越喜欢 (рӯ ба рӯ дӯст доштан)\nИнкор: 越来越不+Сифат (越来越不舒服 — рӯ ба рӯ бадтар шудан)"}},{"l":5,"q":{"uz":"Qaysi grammatika ishlatilgan?\n为了健康，你应该多锻炼！","ru":"Какая грамматика использована?\n为了健康，你应该多锻炼！","tj":"Кадом грамматика истифода шудааст?\n为了健康，你应该多锻炼！"},"opts":["\"为(了)\"+目的","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'为' yoki '为了' + maqsad jumlasi: biror ishning nima uchun bajarilishini bildiradi.\nQolip: 为(了) + Maqsad + Asosiy gap\nMasalan:\n  为了健康，我每天锻炼。(Sog'liq uchun har kuni mashq qilaman.)\n  为了减肥，我来这里跑步。(Ozish uchun bu yerga yugurgani kelaman.)\n  为了快点儿好，我要多喝水。(Tezroq tuzalish uchun ko'proq suv ichaman.)","ru":"'为' или '为了' + целевое предложение: объясняет, ради чего совершается действие.\nСтруктура: 为(了) + Цель + Основное предложение\nНапример:\n  为了健康，我每天锻炼。(Ради здоровья тренируюсь каждый день.)\n  为了减肥，我来这里跑步。(Чтобы похудеть, прихожу сюда бегать.)\n  为了快点儿好，我要多喝水。(Чтобы быстрее выздороветь, буду пить воду.)","tj":"'为' ё '为了' + ҷумлаи мақсад: шарҳ медиҳад, ки амал барои чӣ иҷро мешавад.\nСохтор: 为(了) + Мақсад + Ҷумлаи асосӣ\nМасалан:\n  为了健康，我每天锻炼。(Барои саломатӣ ҳар рӯз машқ мекунам.)\n  为了减肥，我来这里跑步。(Барои лоғар шудан инҷо меоям медавам.)\n  为了快点儿好，我要多喝水。(Барои зудтар хуб шудан бештар об менӯшам.)"}},{"l":6,"q":{"uz":"Qaysi grammatika ishlatilgan?\n眼镜找不到了，你帮我找得到吗？","ru":"Какая грамматика использована?\n眼镜找不到了，你帮我找得到吗？","tj":"Кадом грамматика истифода шудааст?\n眼镜找不到了，你帮我找得到吗？"},"opts":["可能补语：V得/不+结果补语","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"Bu qolip biror harakatni bajarish mumkin yoki mumkin emasligini bildiradi.\nIjobiy: V + 得 + Natija (qila olaman)\nInkor: V + 不 + Natija (qila olmayman)\nMasalan:\n  找得到 (topib olsa bo'ladi) / 找不到 (topib bo'lmaydi)\n  听得懂 (tushunib olsa bo'ladi) / 听不懂 (tushunib bo'lmaydi)\n  看得清楚 (aniq ko'ra oladi) / 看不清楚 (aniq ko'ra olmaydi)","ru":"Эта конструкция выражает возможность или невозможность совершить действие.\nУтверждение: V + 得 + Результат (можно сделать)\nОтрицание: V + 不 + Результат (нельзя сделать)\nНапример:\n  找得到 (можно найти) / 找不到 (нельзя найти)\n  听得懂 (можно понять) / 听不懂 (нельзя понять)\n  看得清楚 (можно разглядеть) / 看不清楚 (нельзя разглядеть)","tj":"Ин сохтор имкониятро ё набудани имконияти иҷрои амалро ифода мекунад.\nТасдиқ: V + 得 + Натиҷа (метавон кард)\nИнкор: V + 不 + Натиҷа (наметавон кард)\nМасалан:\n  找得到 (ёфта мешавад) / 找不到 (ёфта намешавад)\n  听得懂 (фаҳмида мешавад) / 听不懂 (фаҳмида намешавад)\n  看得清楚 (равшан дида мешавад) / 看不清楚 (равшан дида намешавад)"}},{"l":6,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我的眼镜呢？刚才还在桌子上。","ru":"Какая грамматика использована?\n我的眼镜呢？刚才还在桌子上。","tj":"Кадом грамматика истифода шудааст?\n我的眼镜呢？刚才还在桌子上。"},"opts":["\"N+呢？\"询问处所","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'N+呢？' — juda qisqa so'roq qolipи. Biror narsa yoki odamning qayerda ekanligini so'raydi.\nMa'nosi: '...qani? ...qayerda?'\nMasalan:\n  你的眼镜呢？(Ko'zoynaging qani?)\n  他呢？(U qani?)\n  书呢？(Kitob qani?)\nSuhbat kontekstida yaxshi ma'lum narsaning joylashuvini so'raganda ishlatiladi.","ru":"'N+呢？' — очень краткая вопросительная конструкция, спрашивает о местонахождении.\nЗначение: 'а...? где...?'\nНапример:\n  你的眼镜呢？(А твои очки?)\n  他呢？(А где он?)\n  书呢？(А книга где?)\nИспользуется, когда местонахождение уже известного предмета неизвестно.","tj":"'N+呢？' — сохтори саволии хеле кӯтоҳ, дар бораи ҷой мепурсад.\nМаъно: '...куҷост? ...чист?'\nМасалан:\n  你的眼镜呢？(Айнакат куҷост?)\n  他呢？(Вай куҷост?)\n  书呢？(Китоб куҷост?)\nВақте истифода мешавад, ки ҷои чизи аллакай маълум номаълум аст."}},{"l":6,"q":{"uz":"Qaysi grammatika ishlatilgan?\n经理刚拿走了一个文件，会不会是你的？","ru":"Какая грамматика использована?\n经理刚拿走了一个文件，会不会是你的？","tj":"Кадом грамматика истифода шудааст?\n经理刚拿走了一个文件，会不会是你的？"},"opts":["\"刚\"和\"刚才\"的比较","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"Ikkalasi ham 'hozirgina, bir oz avval' ma'nosida, lekin farqli:\n刚才 — payt so'zi (time word): gap boshida yoki mavzu sifatida turadi\n       Masalan: 刚才他在这里。(U hozirgina bu yerda edi.)\n刚 — ravish: fe'l oldidan keladi va to'g'ridan-to'g'ri harakatni ta'riflaydi\n     Masalan: 他刚到。(U hozirgina keldi.)\n              经理刚拿走了文件。(Menejer hozirgina hujjatni olib ketdi.)","ru":"Оба означают 'только что', но различаются по употреблению:\n刚才 — слово времени: стоит в начале предложения или как подлежащее темы\n       Например: 刚才他在这里。(Только что он был здесь.)\n刚 — наречие: стоит перед глаголом, описывает действие напрямую\n     Например: 他刚到。(Он только что пришёл.)\n              经理刚拿走了文件。(Менеджер только что унёс документ.)","tj":"Ҳарду маънои 'як лаҳза пеш, ҳозир' доранд, аммо фарқ мекунанд:\n刚才 — калимаи вақт: дар аввали ҷумла ё ҳамчун мавзӯ меояд\n       Масалан: 刚才他在这里。(Як лаҳза пеш вай инҷо буд.)\n刚 — қайд: пеш аз феъл меояд ва амалро бевосита тасвир мекунад\n     Масалан: 他刚到。(Вай ҳозир расид.)\n              经理刚拿走了文件。(Мудир ҳозир ҳуҷҷатро бурд.)"}},{"l":7,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我们认识五年了。","ru":"Какая грамматика использована?\n我们认识五年了。","tj":"Кадом грамматика истифода шудааст?\n我们认识五年了。"},"opts":["时段的表达：V + 了 + 时段 + 了","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"Biror harakat qancha davom etganini bildirishda 'V + 了 + vaqt davomiyligi + 了' tuzilmasi ishlatiladi. Birinchi 了 harakatning tugaganini, ikkinchisi hozirgi holatni bildiradi.","ru":"Для выражения продолжительности действия используется конструкция 'Гл + 了 + период времени + 了'. Первое 了 обозначает завершённость действия, второе — текущее состояние.","tj":"Барои ифодаи давомнокии амал сохтори 'Ф + 了 + муддати вақт + 了' истифода мешавад. Аввалин 了 тамомшавии амалро, дуввумаш ҳолати кунуниро нишон медиҳад."}},{"l":7,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我对音乐很感兴趣。","ru":"Какая грамматика использована?\n我对音乐很感兴趣。","tj":"Кадом грамматика истифода шудааст?\n我对音乐很感兴趣。"},"opts":["对……感兴趣","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'对……感兴趣' - biror narsaga qiziqishni ifodalash uchun ishlatiladi. '对' + ob'ekt + '感兴趣' tuzilmasi mavjud. '特别感兴趣' esa 'ayniqsa qiziqish' ma'nosini beradi.","ru":"'对……感兴趣' используется для выражения интереса к чему-либо. Структура: '对' + объект + '感兴趣'. '特别感兴趣' означает 'особенно интересоваться'.","tj":"'对……感兴趣' барои ифодаи шавқ ба чизе истифода мешавад. Сохтор: '对' + объект + '感兴趣'. '特别感兴趣' маънои 'хусусан шавқ доштан'-ро дорад."}},{"l":7,"q":{"uz":"Qaysi grammatika ishlatilgan?\n现在差一刻八点。","ru":"Какая грамматика использована?\n现在差一刻八点。","tj":"Кадом грамматика истифода шудааст?\n现在差一刻八点。"},"opts":["\"半\"\"刻\"\"差\"表示时间","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"Soat vaqtini ifodalashda: '半' = soat va yarim (masalan: 两点半 = 2:30), '刻' = 15 daqiqa (一刻 = :15, 三刻 = :45), '差' = vaqtdan oldin 'kam' (差五分八点 = 7:55).","ru":"Для обозначения времени: '半' = полчаса (两点半 = 2:30), '刻' = 15 минут (一刻 = :15, 三刻 = :45), '差' = без (差五分八点 = без пяти восемь = 7:55).","tj":"Барои таъйин кардани вақт: '半' = ним соат (两点半 = 2:30), '刻' = 15 дақиқа (一刻 = :15, 三刻 = :45), '差' = кам (差五分八点 = панҷ дақиқа ба ҳашт = 7:55)."}},{"l":8,"q":{"uz":"Qaysi grammatika ishlatilgan?\n他又迟到了！","ru":"Какая грамматика использована?\n他又迟到了！","tj":"Кадом грамматика истифода шудааст?\n他又迟到了！"},"opts":["\"又\"和\"再\"的区别","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'又' o'tgan vaqtdagi takroran bajarilgan harakatni bildiradi (u yana kechikdi — o'tgan zamonda). '再' kelajakdagi takroran bajariladigan harakatni bildiradi (keyingi safar yana borayman).","ru":"'又' обозначает повторное действие в прошлом (он снова опоздал). '再' обозначает повторное действие в будущем (в следующий раз поеду ещё раз).","tj":"'又' амали такроршавандаи гузаштаро ифода мекунад (вай боз дер омад). '再' амали такроршавандаи оянда мебошад (дафъаи дигар боз меравам)."}},{"l":8,"q":{"uz":"Qaysi grammatika ishlatilgan?\n谁都知道这件事。","ru":"Какая грамматика использована?\n谁都知道这件事。","tj":"Кадом грамматика истифода шудааст?\n谁都知道这件事。"},"opts":["疑问代词活用①：谁/什么+都/也+V","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"So'roq olmoshlari (谁、什么、哪儿) umumlashtiruvchi ma'noda ishlatilganda '都' yoki '也' bilan keladi va 'hamma / hech kim emas' ma'nosini bildiradi.","ru":"Вопросительные местоимения (谁、什么、哪儿) в обобщающем значении используются с '都' или '也' и означают 'все / никто'.","tj":"Зомирҳои саволӣ (谁、什么、哪儿) дар маънои умумикунанда бо '都' ё '也' меоянд ва маънои 'ҳама / ҳеҷ кас нест'-ро доранд."}},{"l":8,"q":{"uz":"Qaysi grammatika ishlatilgan?\n你去哪儿我就去哪儿。","ru":"Какая грамматика использована?\n你去哪儿我就去哪儿。","tj":"Кадом грамматика истифода шудааст?\n你去哪儿我就去哪儿。"},"opts":["条件句：……就……","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'……就……' tuzilmasi shartni bildiradi: shartli qism + 就 + natija. Shartli qismda ko'pincha '如果'、'要是'、'只要' kabi so'zlar ishlatiladi, lekin ba'zan qo'yilmaydi.","ru":"Конструкция '……就……' выражает условие: условная часть + 就 + результат. В условной части часто используются '如果'、'要是'、'只要', но они могут опускаться.","tj":"Сохтори '……就……' шартро ифода мекунад: қисми шартӣ + 就 + натиҷа. Дар қисми шартӣ '如果'、'要是'、'只要' зиёд истифода мешаванд, аммо гоҳо ҳазф мешаванд."}},{"l":9,"q":{"uz":"Qaysi grammatika ishlatilgan?\n她越学越觉得有意思。","ru":"Какая грамматика использована?\n她越学越觉得有意思。","tj":"Кадом грамматика истифода шудааст?\n她越学越觉得有意思。"},"opts":["越A越B","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'越A越B' tuzilmasi ikki hodisaning bir vaqtda o'sishini bildiradi. A - shart, B - natija. Masalan: 越学越好 = o'rganган sari yaxshilashadi.","ru":"Конструкция '越A越B' выражает параллельное усиление двух явлений. A — условие, B — результат. Например: 越学越好 = чем больше учишь, тем лучше.","tj":"Сохтори '越A越B' афзоиши якҷояи ду ҳодисаро ифода мекунад. A — шарт, B — натиҷа. Масалан: 越学越好 = ҳар чӣ бештар омӯзӣ, беҳтар мешавад."}},{"l":9,"q":{"uz":"Qaysi grammatika ishlatilgan?\n她的汉语说得跟中国人一样好。","ru":"Какая грамматика использована?\n她的汉语说得跟中国人一样好。","tj":"Кадом грамматика истифода шудааст?\n她的汉语说得跟中国人一样好。"},"opts":["A跟B一样 + 形容词","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'A跟B一样+Adj' tuzilmasi A va B ning bir xil xususiyatga ega ekanini bildiradi. Inkor shaklida: 'A跟B不一样'. Sifat oldida 'ba'zan' 那么 qo'yiladi.","ru":"Конструкция 'A跟B一样+Adj' означает, что A и B имеют одинаковое свойство. Отрицательная форма: 'A跟B不一样'. Перед прилагательным иногда ставится 那么.","tj":"Сохтори 'A跟B一样+Adj' маъно медиҳад, ки A ва B хусусияти якхела доранд. Шакли манфӣ: 'A跟B不一样'. Пеш аз сифат гоҳо 那么 мегузорад."}},{"l":9,"q":{"uz":"Qaysi grammatika ishlatilgan?\n他的进步没有她那么快。","ru":"Какая грамматика использована?\n他的进步没有她那么快。","tj":"Кадом грамматика истифода шудааст?\n他的进步没有她那么快。"},"opts":["A没有B那么 + 形容词","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'A没有B那么+Adj' tuzilmasi A ning B darajasida emasligi yoki pastroq ekanini bildiradi. 'A不如B' bilan sinonim bo'lishi mumkin.","ru":"Конструкция 'A没有B那么+Adj' означает, что A не достигает степени B. Может быть синонимом 'A不如B'.","tj":"Сохтори 'A没有B那么+Adj' маъно медиҳад, ки A ба дараҷаи B нарасидааст. Бо 'A不如B' ҳаммаъно буда метавонад."}},{"l":10,"q":{"uz":"Qaysi grammatika ishlatilgan?\n数学比历史难多了！","ru":"Какая грамматика использована?\n数学比历史难多了！","tj":"Кадом грамматика истифода шудааст?\n数学比历史难多了！"},"opts":["比较句②：A比B + 形容词 + 多了","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'A比B+Adj+多了' — A ning B dan ancha farqli ekanini ta'kidlaydi. '多了' yoki '得多' = ancha, juda ko'p. Oddiy 'A比B+Adj' dan kuchliroq ifoda.","ru":"'A比B+Adj+多了' подчёркивает, что разница между A и B очень велика. '多了' или '得多' = намного. Это более сильное выражение, чем обычное 'A比B+Adj'.","tj":"'A比B+Adj+多了' таъкид мекунад, ки фарқи байни A ва B хеле бузург аст. '多了' ё '得多' = хеле. Ин аз 'A比B+Adj'-и оддӣ ифодаи қавитар аст."}},{"l":10,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我考了九十多分。","ru":"Какая грамматика использована?\n我考了九十多分。","tj":"Кадом грамматика истифода шудааст?\n我考了九十多分。"},"opts":["概数①：数词 + 多 / 几","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'数词+多' = shu sondan ko'proq (masalan: 三十多 = 30 dan ortiq). '几+量词' = bir necha (masalan: 几天 = bir necha kun, 几百 = bir necha yuz). Ikkalasi ham aniq bo'lmagan miqdorni bildiradi.","ru":"'数词+多' = больше указанного числа (например: 三十多 = больше тридцати). '几+счётное слово' = несколько (например: 几天 = несколько дней, 几百 = несколько сотен). Оба выражают неточное количество.","tj":"'数词+多' = аз рақами зикршуда бештар (масалан: 三十多 = аз сӣ бештар). '几+ададӣ' = чанд (масалан: 几天 = чанд рӯз, 几百 = чанд сад). Ҳарду миқдори ғайридақиқро ифода мекунанд."}},{"l":10,"q":{"uz":"Qaysi grammatika ishlatilgan?\n物理不如化学难。","ru":"Какая грамматика использована?\n物理不如化学难。","tj":"Кадом грамматика истифода шудааст?\n物理不如化学难。"},"opts":["A不如B（+ 形容词）","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'A不如B' = A B kadar yaxshi emas, A B dan yomonroq. Sifat bilan: 'A不如B+Adj'. 'A没有B那么+Adj' bilan sinonim.","ru":"'A不如B' = A не так хорош, как B, A хуже B. С прилагательным: 'A不如B+Adj'. Синоним 'A没有B那么+Adj'.","tj":"'A不如B' = A ба монанди B хуб нест, A аз B камтар. Бо сифат: 'A不如B+Adj'. Ҳаммаъно бо 'A没有B那么+Adj'."}},{"l":11,"q":{"uz":"Qaysi grammatika ishlatilgan?\n把空调关了！","ru":"Какая грамматика использована?\n把空调关了！","tj":"Кадом грамматика истифода шудааст?\n把空调关了！"},"opts":["把字句①：把 + O + V + 结果/趋向补语","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'把'-konstruktsiyasi ob'ektga nisbatan harakatning natijasini ta'kidlaydi. Tuzilma: Subekt + 把 + ob'ekt + fe'l + natija. Fe'l yolg'iz kelmaydi, oldida yoki keyin qo'shimcha element bo'lishi kerak.","ru":"Конструкция '把' подчёркивает результат действия над объектом. Структура: Подлежащее + 把 + объект + глагол + результат. Глагол не стоит один, нужен дополнительный элемент.","tj":"Сохтори '把' натиҷаи амал нисбат ба объектро таъкид мекунад. Сохтор: Мубтадо + 把 + объект + феъл + натиҷа. Феъл танҳо намеояд, унсури иловагӣ лозим аст."}},{"l":11,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我大概需要一个小时左右。","ru":"Какая грамматика использована?\n我大概需要一个小时左右。","tj":"Кадом грамматика истифода шудааст?\n我大概需要一个小时左右。"},"opts":["概数②：数词 + 左右","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'左右' so'z ma'nosi 'chap-o'ng' bo'lib, taxminiy miqdorni bildiradi. Son yoki vaqt so'zidan keyin qo'shiladi: 三十分钟左右 = taxminan 30 daqiqa. 'cha' so'ziga o'xshaydi.","ru":"'左右' буквально означает 'лево-право' и выражает приблизительное количество. Ставится после числа или слова времени: 三十分钟左右 = около 30 минут. Аналог русского 'примерно'.","tj":"'左右' аслан маънои 'чап-рост'-ро дорад ва миқдори тахминиро ифода мекунад. Баъди рақам ё вожаи вақт мегузорад: 三十分钟左右 = тахминан 30 дақиқа. Ба 'тахминан' монанд аст."}},{"l":11,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我把空调关了。","ru":"Какая грамматика использована?\n我把空调关了。","tj":"Кадом грамматика истифода шудааст?\n我把空调关了。"},"opts":["动词 + 了 + 宾语 + 了","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"Bu tuzilma harakatning allaqachon tugallanganini yoki o'zgarish yuz berganini bildiradi. Birinchi 了 fe'ldan keyin, ikkinchisi gap oxirida keladi. Masalan: 关了门了 = eshikni allaqachon yopdim.","ru":"Эта конструкция указывает на то, что действие уже завершено или произошло изменение. Первое 了 ставится после глагола, второе — в конце предложения. Например: 关了门了 = уже закрыл дверь.","tj":"Ин сохтор нишон медиҳад, ки амал аллакай тамом шудааст ё тағйироте рух додааст. Аввалин 了 баъди феъл, дуввум — охири ҷумла меояд. Масалан: 关了门了 = аллакай дарро бастам."}},{"l":12,"q":{"uz":"Qaysi grammatika ishlatilgan?\n他八点就来了，真早！","ru":"Какая грамматика использована?\n他八点就来了，真早！","tj":"Кадом грамматика истифода шудааст?\n他八点就来了，真早！"},"opts":["\"才\"和\"就\"的区别","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'就' kutilganidan erta yoki tez bo'lganini bildiradi (erta keldi = soat to'qqizda keldi). '才' kutilganidan kech yoki qiyin bo'lganini bildiradi (soat o'n birda keldi). Ikkalasi ham taqqoslash asosida baholanadi.","ru":"'就' выражает, что что-то произошло раньше или быстрее ожидаемого (рано пришёл = в девять). '才' выражает, что что-то произошло позже или сложнее ожидаемого (пришёл только в одиннадцать). Оба оцениваются на основе сравнения.","tj":"'就' ифода мекунад, ки чизе зудтар ё барвақттар аз интизорӣ рух дод (барвақт омад = соати нӯҳ). '才' ифода мекунад, ки чизе дертар ё мушкилтар аз интизорӣ рух дод (фақат соати ёздаҳ омад). Ҳарду дар асоси муқоиса арзёбӣ мешаванд."}},{"l":12,"q":{"uz":"Qaysi grammatika ishlatilgan?\n把钥匙交给你。","ru":"Какая грамматика использована?\n把钥匙交给你。","tj":"Кадом грамматика истифода шудааст?\n把钥匙交给你。"},"opts":["把字句②：把 + O + V + 在/到/给","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'把'-konstruktsiyasida fe'ldan keyin '在' (joyda), '到' (joyga) yoki '给' (kimgadir) qo'shilishi mumkin. Bu ob'ektning qayerda, qayerga yoki kimga taalluqli ekanini bildiradi.","ru":"В конструкции '把' после глагола может следовать '在' (на/в месте), '到' (к месту) или '给' (кому-то). Это указывает на место, пункт назначения или получателя объекта.","tj":"Дар сохтори '把' баъди феъл '在' (дар ҷое), '到' (ба ҷое) ё '给' (ба касе) омада метавонад. Ин ҷойгоҳ, мақсади ҳаракат ё гирандаи объектро нишон медиҳад."}},{"l":12,"q":{"uz":"Qaysi grammatika ishlatilgan?\n你让我放心多了。","ru":"Какая грамматика использована?\n你让我放心多了。","tj":"Кадом грамматика истифода шудааст?\n你让我放心多了。"},"opts":["让 + 人 + 动词（使役句）","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'让' = biror kishini biror narsa qilishiga ruxsat bermoq yoki uni shunday qilishga majbur qilmoq. Tuzilma: subekt + 让 + odam + fe'l. Salbiy: 让……别……","ru":"'让' = позволять кому-то сделать что-то или заставлять кого-то это делать. Структура: подлежащее + 让 + человек + глагол. Отрицание: 让……别……","tj":"'让' = иҷозат додан ба касе барои кардани чизе ё маҷбур кардани вай ба ин амал. Сохтор: мубтадо + 让 + одам + феъл. Манфӣ: 让……别……"}},{"l":13,"q":{"uz":"Qaysi grammatika ishlatilgan?\n他走进来了。","ru":"Какая грамматика использована?\n他走进来了。","tj":"Кадом грамматика истифода шудааст?\n他走进来了。"},"opts":["复合趋向补语","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"Murakkab yo'nalish to'ldiruvchisi ikki qismdan iborat: yo'nalish fe'li (上、下、进、出、回、过、起) + 来 yoki 去. Masalan: 回来 = qaytib kelmoq, 进去 = kirib ketmoq, 出来 = chiqib kelmoq.","ru":"Сложное направленное дополнение состоит из двух частей: глагол направления (上、下、进、出、回、过、起) + 来 или 去. Например: 回来 = вернуться (сюда), 进去 = войти (туда), 出来 = выйти (сюда).","tj":"Пуркунандаи мураккаби самтӣ аз ду қисм иборат аст: феъли самт (上、下、进、出、回、过、起) + 来 ё 去. Масалан: 回来 = баргаштан (ин ҷо), 进去 = даромадан (он ҷо), 出来 = баромадан (ин ҷо)."}},{"l":13,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我喜欢一边听音乐一边做作业。","ru":"Какая грамматика использована?\n我喜欢一边听音乐一边做作业。","tj":"Кадом грамматика истифода шудааст?\n我喜欢一边听音乐一边做作业。"},"opts":["一边……一边……","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'一边…一边…' tuzilmasi ikki harakatning bir vaqtda bajarilishini bildiradi. Ikki fe'l ham bir xil sub'ektga tegishli bo'lishi kerak. Masalan: 一边听音乐一边看书 = musiqa tinglab kitob o'qimoq.","ru":"Конструкция '一边…一边…' выражает два действия, выполняемых одновременно. Оба глагола относятся к одному подлежащему. Например: 一边听音乐一边看书 = слушать музыку и читать книгу одновременно.","tj":"Сохтори '一边…一边…' ду амали ҳамзаманро ифода мекунад. Ҳарду феъл ба як мубтадо тааллуқ доранд. Масалан: 一边听音乐一边看书 = ҳамзамон мусиқӣ гӯш кардан ва китоб хондан."}},{"l":13,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我是走回来的。","ru":"Какая грамматика использована?\n我是走回来的。","tj":"Кадом грамматика истифода шудааст?\n我是走回来的。"},"opts":["是……的（强调过去动作的方式/时间/地点）","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'是……的' tuzilmasi o'tgan vaqtda yuz bergan harakatning QANday (usul), QACHON (vaqt) yoki QAERDA (joy) bo'lganini ta'kidlash uchun ishlatiladi. Ob'ekt ko'pincha 的 bilan 是 o'rtasida keladi.","ru":"Конструкция '是……的' используется для акцентирования КАК (способ), КОГДА (время) или ГДЕ (место) произошло прошлое действие. Объект часто стоит между 的 и 是.","tj":"Сохтори '是……的' барои таъкид бар ЧӢ ТАВРа (усул), КАЙ (вақт) ё ДАР КУҶо (ҷой) рух додани амали гузашта истифода мешавад. Объект аксаран байни 的 ва 是 меояд."}},{"l":14,"q":{"uz":"Qaysi grammatika ishlatilgan?\n把苹果洗干净了！","ru":"Какая грамматика использована?\n把苹果洗干净了！","tj":"Кадом грамматика истифода шудааст?\n把苹果洗干净了！"},"opts":["把字句③：把 + O + V + 结果补语/趋向补语","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'把'-konstruktsiyasida fe'ldan keyin natija to'ldiruvchisi (好、完、干净、成 kabi) yoki yo'nalish to'ldiruvchisi (过来、过去、进来 kabi) keladi. Bu harakatning natijasini yoki yo'nalishini ta'kidlaydi.","ru":"В конструкции '把' после глагола следует результатное дополнение (好、完、干净、成 и т.д.) или направленное дополнение (过来、过去、进来 и т.д.). Это акцентирует результат или направление действия.","tj":"Дар сохтори '把' баъди феъл пуркунандаи натиҷа (好、完、干净、成 ва ғайра) ё пуркунандаи самт (过来、过去、进来 ва ғайра) меояд. Ин натиҷа ё самти амалро таъкид мекунад."}},{"l":14,"q":{"uz":"Qaysi grammatika ishlatilgan?\n先把肉切了，再放油，然后加蔬菜。","ru":"Какая грамматика использована?\n先把肉切了，再放油，然后加蔬菜。","tj":"Кадом грамматика истифода шудааст?\n先把肉切了，再放油，然后加蔬菜。"},"opts":["先……再/又……然后……","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'先…再…然后…' tuzilmasi bir nechta harakatning ketma-ketligini bildiradi. '先' = avval, '再' = keyin (shu sub'ekt bajaradi), '然后' = so'ng, keyingi qadam. '先…再…' = A dan keyin B.","ru":"Конструкция '先…再…然后…' выражает последовательность нескольких действий. '先' = сначала, '再' = потом (тот же субъект), '然后' = затем, следующий шаг. '先…再…' = A, потом B.","tj":"Сохтори '先…再…然后…' пайдарпаии чанд амалро ифода мекунад. '先' = аввал, '再' = баъд (ҳамон мубтадо), '然后' = сипас, қадами навбатӣ. '先…再…' = A, баъд B."}},{"l":14,"q":{"uz":"Qaysi grammatika ishlatilgan?\n像你这样做，肯定很好吃！","ru":"Какая грамматика использована?\n像你这样做，肯定很好吃！","tj":"Кадом грамматика истифода шудааст?\n像你这样做，肯定很好吃！"},"opts":["像……一样（比较/描述）","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'像…一样' tuzilmasi ikki narsani taqqoslash yoki o'xshatish uchun ishlatiladi. '像+narsA+一样+sifat/fe'l'. 'A跟B一样' bilan o'xshash, lekin ko'proq tasvir uchun ishlatiladi.","ru":"Конструкция '像…一样' используется для сравнения двух вещей или описания. '像+предметA+一样+прилагательное/глагол'. Похоже на 'A跟B一样', но чаще используется для описания.","tj":"Сохтори '像…一样' барои муқоисаи ду чиз ё тавсиф истифода мешавад. '像+чизиА+一样+сифат/феъл'. Ба 'A跟B一样' монанд аст, аммо бештар барои тавсиф истифода мешавад."}},{"l":15,"q":{"uz":"Qaysi grammatika ishlatilgan?\n除了血压以外，其他都没问题。","ru":"Какая грамматика использована?\n除了血压以外，其他都没问题。","tj":"Кадом грамматика истифода шудааст?\n除了血压以外，其他都没问题。"},"opts":["除了……以外，都/还/也……","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'除了A以外，都/还/也+B' tuzilmasi ikki ma'noda ishlatiladi: (1) A dan tashqari hamma narsa B (都) — istisno; (2) A dan tashqari B ham (还/也) — qo'shimcha. Farqni '都' va '还/也' orqali tushunish kerak.","ru":"Конструкция '除了A以外，都/还/也+B' имеет два значения: (1) Кроме A всё является B (都) — исключение; (2) Кроме A, B тоже (还/也) — добавление. Разницу нужно понять через '都' и '还/也'.","tj":"Сохтори '除了A以外，都/还/也+B' ду маъно дорад: (1) Ба ғайр аз A ҳама B аст (都) — истисно; (2) Ба ғайр аз A, B ҳам (还/也) — илова. Фарқро тавассути '都' ва '还/也' фаҳмидан лозим аст."}},{"l":15,"q":{"uz":"Qaysi grammatika ishlatilgan?\n什么都不如健康重要！","ru":"Какая грамматика использована?\n什么都不如健康重要！","tj":"Кадом грамматика истифода шудааст?\n什么都不如健康重要！"},"opts":["疑问代词活用②：哪儿都/什么都（否定）","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"So'roq olmoshlari + 都 + inkor fe'l = mutlaq inkor. Masalan: 什么都不 = hech narsani emas; 哪儿都不 = hech qayerda emas; 谁都不 = hech kim emas. Bular kuchli umumlashtiruvchi inkorlar.","ru":"Вопросительное местоимение + 都 + отрицательный глагол = абсолютное отрицание. Например: 什么都不 = ничего не; 哪儿都不 = нигде не; 谁都不 = никто не. Это сильные обобщающие отрицания.","tj":"Зомири саволӣ + 都 + феъли манфӣ = инкори мутлақ. Масалан: 什么都不 = ҳеҷ чизро не; 哪儿都不 = ҳеҷ куҷо не; 谁都不 = ҳеҷ кас не. Инҳо инкорҳои умумикунандаи қавӣ ҳастанд."}},{"l":15,"q":{"uz":"Qaysi grammatika ishlatilgan?\n好极了！就这样做！","ru":"Какая грамматика использована?\n好极了！就这样做！","tj":"Кадом грамматика истифода шудааст?\n好极了！就这样做！"},"opts":["形容词/动词 + 极了","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'极了' sifat yoki fe'ldan keyin kelib, eng yuqori darajani bildiradi. '非常' dan kuchliroq. Masalan: 好极了 = zo'r (juda ajoyib), 满意极了 = nihoyatda mamnun.","ru":"'极了' следует за прилагательным или глаголом и выражает высшую степень. Сильнее, чем '非常'. Например: 好极了 = отлично (очень здорово), 满意极了 = чрезвычайно доволен.","tj":"'极了' баъди сифат ё феъл омада, дараҷаи олиро ифода мекунад. Аз '非常' қавитар. Масалан: 好极了 = олӣ (хеле аҷоиб), 满意极了 = ниҳоят қаноатманд."}},{"l":16,"q":{"uz":"Qaysi grammatika ishlatilgan?\n如果你每天锻炼，就会很健康！","ru":"Какая грамматика использована?\n如果你每天锻炼，就会很健康！","tj":"Кадом грамматика истифода шудааст?\n如果你每天锻炼，就会很健康！"},"opts":["如果……就……（条件句）","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'如果…就…' tuzilmasi agar-u holda shartli gaplarni ifodalaydi. '如果' = agar, '就' = u holda/shunda. '如果' ko'pincha gapning avvalida, '就' esa natijaning avvalida keladi.","ru":"Конструкция '如果…就…' выражает условные предложения 'если-то'. '如果' = если, '就' = то. '如果' обычно стоит в начале предложения, '就' — перед следствием.","tj":"Сохтори '如果…就…' ҷумлаҳои шартии 'агар-пас'-ро ифода мекунад. '如果' = агар, '就' = пас. '如果' одатан аввали ҷумла, '就' — пеш аз натиҷа меояд."}},{"l":16,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我累得下了班就想睡觉。","ru":"Какая грамматика использована?\n我累得下了班就想睡觉。","tj":"Кадом грамматика истифода шудааст?\n我累得下了班就想睡觉。"},"opts":["复杂状态补语：累得……（极端状态）","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'F+得+gap/murakkab ifoda' tuzilmasi harakatning natijasidagi holatni ifodalaydi. Oddiy holatdan farqli ravishda, bu yerda bir butun gap kelishi mumkin. Masalan: 累得睡不着 = charchashdan uxlolmayman.","ru":"Конструкция 'Гл+得+предложение/сложное выражение' описывает состояние в результате действия. В отличие от простого дополнения, здесь может быть целое предложение. Например: 累得睡不着 = так устал, что не могу спать.","tj":"Сохтори 'Ф+得+ҷумла/ибораи мураккаб' ҳолати натиҷаи амалро тасвир мекунад. Баръакси пуркунандаи оддӣ, ин ҷо ҷумлаи пурра омада метавонад. Масалан: 累得睡不着 = ончунон хастаам, ки хобам намебарад."}},{"l":16,"q":{"uz":"Qaysi grammatika ishlatilgan?\n你要好好休息！","ru":"Какая грамматика использована?\n你要好好休息！","tj":"Кадом грамматика истифода шудааст?\n你要好好休息！"},"opts":["单音节形容词重叠：AA式（好好、慢慢……）","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"Bir bo'g'inli sifat takrorlanib ravish sifatida ishlatilsa, kuchaytiruvchi ma'no beradi: 好好 = yaxshilab, 慢慢 = sekin-sekin, 早早 = ertaroq, 快快 = tezroq. Bu shakl ko'pincha fe'ldan oldin keladi.","ru":"Если односложное прилагательное удваивается и используется как наречие, оно приобретает усилительное значение: 好好 = хорошенько, 慢慢 = медленно-медленно, 早早 = пораньше, 快快 = побыстрее. Эта форма обычно стоит перед глаголом.","tj":"Агар сифати яктаяко такрор шуда ба сифати зарф истифода шавад, маънои тақвияткунанда пайдо мекунад: 好好 = хуб-хуб, 慢慢 = оҳиста-оҳиста, 早早 = барвақт-барвақт, 快快 = зуд-зуд. Ин шакл одатан пеш аз феъл меояд."}},{"l":17,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我们来讨论讨论这个问题吧。","ru":"Какая грамматика использована?\n我们来讨论讨论这个问题吧。","tj":"Кадом грамматика истифода шудааст?\n我们来讨论讨论这个问题吧。"},"opts":["双音节动词重叠：ABAB式","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"Ikki bo'g'inli fe'llar (AB) ABAB shaklida takrorlanadi: 讨论讨论 (muho-muho qilmoq), 研究研究, 介绍介绍. Bu shakl harakatni biroz sinab ko'rish yoki engil bajarish ma'nosini bildiradi.","ru":"Двусложные глаголы (AB) удваиваются по форме ABAB: 讨论讨论 (немного обсудить), 研究研究, 介绍介绍. Эта форма означает попробовать сделать что-то или сделать это немного.","tj":"Феълҳои дутаяко (AB) ба шакли ABAB такрор мешаванд: 讨论讨论 (каме муҳокима кардан), 研究研究, 介绍介绍. Ин шакл маъно медиҳад, ки чизеро каме санҷед ё каме анҷом диҳед."}},{"l":17,"q":{"uz":"Qaysi grammatika ishlatilgan?\n什么时候都可以来找我！","ru":"Какая грамматика использована?\n什么时候都可以来找我！","tj":"Кадом грамматика истифода шудааст?\n什么时候都可以来找我！"},"opts":["疑问代词活用③：什么时候都/谁都/哪儿都（肯定）","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"So'roq olmoshlari + 都 + tasdiq fe'l = mutlaq umumlashtirish (tasdiq). Masalan: 什么时候都可以 = har doim mumkin; 谁都可以来 = har kim kela oladi; 哪儿都有 = hamma joyda bor.","ru":"Вопросительное местоимение + 都 + утвердительный глагол = абсолютное обобщение (утверждение). Например: 什么时候都可以 = всегда можно; 谁都可以来 = каждый может прийти; 哪儿都有 = везде есть.","tj":"Зомири саволӣ + 都 + феъли тасдиқӣ = умумикунонии мутлақ (тасдиқ). Масалан: 什么时候都可以 = ҳар вақт мумкин; 谁都可以来 = ҳар кас омада метавонад; 哪儿都有 = ҳама ҷо ҳаст."}},{"l":17,"q":{"uz":"Qaysi grammatika ishlatilgan?\n根据你的情况，建议你多休息。","ru":"Какая грамматика использована?\n根据你的情况，建议你多休息。","tj":"Кадом грамматика истифода шудааст?\n根据你的情况，建议你多休息。"},"opts":["根据 + N（根据情况/结果/建议……）","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'根据' predlogi = asosida, ko'ra, muvofiq. Tuzilma: 根据 + ot/gap + predikativ. Ingilizcha 'based on / according to' ga o'xshaydi. Ko'pincha tavsiya, qaror yoki tahlilda ishlatiladi.","ru":"Предлог '根据' = на основании, согласно, исходя из. Структура: 根据 + существительное/предложение + предикат. Похоже на английское 'based on / according to'. Часто используется при советах, решениях или анализе.","tj":"Пешоянди '根据' = дар асоси, мувофиқ, аз рӯи. Сохтор: 根据 + исм/ҷумла + хабар. Ба 'based on / according to'-и инглисӣ монанд аст. Зиёдтар дар тавсия, қарор ё таҳлил истифода мешавад."}},{"l":18,"q":{"uz":"Qaysi grammatika ishlatilgan?\n只要你努力，就能成功！","ru":"Какая грамматика использована?\n只要你努力，就能成功！","tj":"Кадом грамматика истифода шудааст?\n只要你努力，就能成功！"},"opts":["只要……就……","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'只要…就…' tuzilmasi shartni ifodalaydi, lekin '如果' dan farqli ravishda '只要' = 'faqat shu shart bajarilsa bo'ladi, boshqa narsa kerak emas' ma'nosini bildiradi. Yengilroq va optimistik shart.","ru":"Конструкция '只要…就…' выражает условие, но в отличие от '如果', '只要' = 'достаточно выполнить только это условие, ничего другого не нужно'. Более лёгкое и оптимистичное условие.","tj":"Сохтори '只要…就…' шартро ифода мекунад, аммо баръакси '如果', '只要' = 'танҳо ин шарт иҷро шавад, дигар ҳеҷ чиз лозим нест' маъно медиҳад. Шарти осонтар ва хушбинонатар."}},{"l":18,"q":{"uz":"Qaysi grammatika ishlatilgan?\n关于这次活动，你有什么想法？","ru":"Какая грамматика использована?\n关于这次活动，你有什么想法？","tj":"Кадом грамматика истифода шудааст?\n关于这次活动，你有什么想法？"},"opts":["介词\"关于\"（关于 + N + ……）","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'关于' = haqida, to'g'risida. Tuzilma: 关于 + mavzu + gapning qolgan qismi. Gap boshida yoki sub'ektdan keyin kelishi mumkin. Ingilizcha 'about / regarding' ga o'xshaydi.","ru":"'关于' = о, насчёт, относительно. Структура: 关于 + тема + остаток предложения. Может стоять в начале предложения или после подлежащего. Похоже на английское 'about / regarding'.","tj":"'关于' = дар бораи, оид ба. Сохтор: 关于 + мавзӯ + қисми боқии ҷумла. Дар аввали ҷумла ё баъди мубтадо омада метавонад. Ба 'about / regarding'-и инглисӣ монанд аст."}},{"l":18,"q":{"uz":"Qaysi grammatika ishlatilgan?\n这门课不但有用，而且很有意思！","ru":"Какая грамматика использована?\n这门课不但有用，而且很有意思！","tj":"Кадом грамматика истифода шудааст?\n这门课不但有用，而且很有意思！"},"opts":["不但……而且……","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'不但…而且…' tuzilmasi ikkita ijobiy holatni kuchaytirib bog'laydi. '不但' = nafaqat, '而且' = balki ham. Birinchi jumladan ikkinchisi yanada kuchli yoki qo'shimcha ma'no qo'shadi.","ru":"Конструкция '不但…而且…' усиленно соединяет два положительных факта. '不但' = не только, '而且' = но и. Второе предложение добавляет ещё более сильный или дополнительный смысл.","tj":"Сохтори '不但…而且…' ду ҳолати мусбатро бо таъкид мепайвандад. '不但' = на танҳо, '而且' = балки ҳам. Ҷумлаи дуввум маъноеро ҳам қавитар ё иловагӣ илова мекунад."}},{"l":19,"q":{"uz":"Qaysi grammatika ishlatilgan?\n你没看出来她变了吗？","ru":"Какая грамматика использована?\n你没看出来她变了吗？","tj":"Кадом грамматика истифода шудааст?\n你没看出来她变了吗？"},"opts":["趋向补语引申义：出来/起来/下去","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"出来 = nimadir oshkor bo'lmoq/paydo bo'lmoq (看出来 = sezib olmoq); 起来 = harakat yoki holat boshlanmoq (笑起来 = kulib yubormoq); 下去 = harakat davom etmoq (坚持下去 = davom ettirmoq). Bular ko'chma/majoziy ma'nolar.","ru":"出来 = что-то обнаруживается/появляется (看出来 = заметить); 起来 = действие или состояние начинается (笑起来 = засмеяться); 下去 = действие продолжается (坚持下去 = продолжать держаться). Это переносные значения.","tj":"出来 = чизе ошкор мешавад/пайдо мешавад (看出来 = пай бурдан); 起来 = амал ё ҳолат оғоз меёбад (笑起来 = хандидан гирифтан); 下去 = амал идома меёбад (坚持下去 = идома додан). Инҳо маъноҳои маҷозӣ ҳастанд."}},{"l":19,"q":{"uz":"Qaysi grammatika ishlatilgan?\n这使我很受鼓励！","ru":"Какая грамматика использована?\n这使我很受鼓励！","tj":"Кадом грамматика истифода шудааст?\n这使我很受鼓励！"},"opts":["使/叫/让（使役）的比较","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"Uchtasi ham 'biror kishini biror narsa qilishga majbur qilmoq' ma'nosida. Farq: '使' = rasmiy, yozma uslub (bu holat meni majbur qildi); '叫' = buyurish, ko'proq og'zaki, kichiklarga; '让' = ruxsat berish YOKI majbur qilish — eng ko'p ishlatiladigan.","ru":"Все три означают 'заставить/позволить кому-то сделать что-то'. Разница: '使' = официальный, письменный стиль (это обстоятельство меня заставило); '叫' = приказать, больше устный, к подчинённым; '让' = позволить ИЛИ заставить — наиболее употребительный.","tj":"Ҳарсе маъноеро доранд, ки 'ба касе иҷозат додан ё маҷбур кардан'. Фарқ: '使' = расмӣ, услуби хаттӣ (ин ҳолат маро маҷбур кард); '叫' = фармондан, бештар шифоҳӣ, ба зердастон; '让' = иҷозат додан ЁД маҷбур кардан — бештар истифодашаванда."}},{"l":19,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我经过那条街道来的。","ru":"Какая грамматика использована?\n我经过那条街道来的。","tj":"Кадом грамматика истифода шудааст?\n我经过那条街道来的。"},"opts":["经过 + 地点（路过/经历）","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'经过' ikki ma'noda: (1) joy bo'ylab o'tmoq (经过公园 = parkdan o'tmoq); (2) biror jarayon/tajribadan o'tmoq (经过努力 = harakat orqali). Predlog sifatida joy yoki jarayondan oldin keladi.","ru":"'经过' имеет два значения: (1) проходить через место (经过公园 = проходить через парк); (2) проходить через процесс/опыт (经过努力 = через усилия). В качестве предлога стоит перед местом или процессом.","tj":"'经过' ду маъно дорад: (1) аз ҷое гузаштан (经过公园 = аз боғ гузаштан); (2) аз раванде/таҷрибае гузаштан (经过努力 = тавассути кӯшиш). Ҳамчун пешоянд пеш аз ҷой ё раванд меояд."}},{"l":20,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我被他影响了！","ru":"Какая грамматика использована?\n我被他影响了！","tj":"Кадом грамматика истифода шудааст?\n我被他影响了！"},"opts":["被字句：被 + 施事者 + 动词（被动句）","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'被'-konstruktsiya passiv gaplarni ifodalaydi. Tuzilma: sub'ekt (ob'ekt) + 被 + harakat bajaruvchi + fe'l. Ko'pincha noxush hodisalarda ishlatiladi, lekin ijobiy hodisalar uchun ham mumkin. Harakat bajaruvchi tushirilishi mumkin.","ru":"Конструкция '被' выражает пассивный залог. Структура: субъект (объект) + 被 + деятель + глагол. Часто используется при неприятных событиях, но возможна и для позитивных. Деятель может быть опущен.","tj":"Сохтори '被' замони маҷҳулро ифода мекунад. Сохтор: мубтадо (объект) + 被 + иҷрогар + феъл. Зиёдтар дар ҳодисаҳои нохуш истифода мешавад, аммо барои мусбат ҳам мумкин. Иҷрогар партофта шавад мешавад."}},{"l":20,"q":{"uz":"Qaysi grammatika ishlatilgan?\n只有经历失败，才能变得更强！","ru":"Какая грамматика использована?\n只有经历失败，才能变得更强！","tj":"Кадом грамматика истифода шудааст?\n只有经历失败，才能变得更强！"},"opts":["只有……才……","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'只有…才…' = biror shart faqat shu tarzda bajarilsa, natijaga erishish mumkin. '只要…就…' dan farqi: '只有' kuchliroq shart, bitta to'g'ri yo'l bor; '只要' = yetarli shart, boshqa yo'llar ham mumkin.","ru":"'只有…才…' = результат возможен только при выполнении именно этого условия. Отличие от '只要…就…': '只有' — более строгое условие, только один правильный путь; '只要' — достаточное условие, другие пути тоже возможны.","tj":"'只有…才…' = натиҷа танҳо ҳангоми иҷрои маҳз ин шарт имконпазир аст. Фарқ аз '只要…就…': '只有' — шарти қатъитар, танҳо як роҳи дуруст; '只要' — шарти кофӣ, роҳҳои дигар ҳам мумкин."}},{"l":20,"q":{"uz":"Qaysi grammatika ishlatilgan?\n多么美好的未来在等着你啊！","ru":"Какая грамматика использована?\n多么美好的未来在等着你啊！","tj":"Кадом грамматика истифода шудааст?\n多么美好的未来在等着你啊！"},"opts":["多么……啊！（感叹句）","结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""],"a":0,"explanation":{"uz":"'多么…啊！' tuzilmasi kuchli his-tuyg'u, hayrat yoki quvonchni ifodalaydi. Tuzilma: 多么 + sifat/holat + 啊！ Ingilizcha 'How …!' ga o'xshaydi. Og'zaki nutqda '啊' o'rniga '呀' ishlatilishi mumkin.","ru":"Конструкция '多么…啊！' выражает сильные эмоции, восхищение или радость. Структура: 多么 + прилагательное/состояние + 啊！ Похоже на английское 'How …!'. В разговорной речи '啊' может заменяться на '呀'.","tj":"Сохтори '多么…啊！' эҳсосоти қавӣ, тааҷуб ё шодиро ифода мекунад. Сохтор: 多么 + сифат/ҳол + 啊！ Ба 'How …!'-и инглисӣ монанд. Дар забони гуфторӣ '啊' ба '呀' иваз шуда метавонад."}}]},"hsk4a":{"key":"hsk4a","label":"HSK 4 上","LESSONS":[{"n":1,"t":{"uz":"简单的爱情","ru":"简单的爱情","tj":"简单的爱情"},"sub":{"uz":"sevgi va munosabatlar haqida gapirish; 不仅, 从来, 刚, 即使 va (在)...上 grammatikalarini ishlatish","ru":"говорить о любви и отношениях; использовать 不仅, 从来, 刚, 即使 и (在)...上","tj":"дар бораи муҳаббат ва муносибатҳо гуфтугӯ кардан; истифодаи 不仅, 从来, 刚, 即使 ва (在)...上"},"g":["不仅……也/还/而且……","从来","刚","即使……也……","（在）……上"]},{"n":2,"t":{"uz":"真正的朋友","ru":"真正的朋友","tj":"真正的朋友"},"sub":{"uz":"do'stlik, aloqa va haqiqiy do'st haqida gapirish; 正好, 差不多, 尽管, 却, 而 grammatikalarini ishlatish","ru":"говорить о дружбе, связи и настоящих друзьях; использовать 正好, 差不多, 尽管, 却, 而","tj":"дар бораи дӯстӣ, иртибот ва дӯсти ҳақиқӣ гуфтугӯ кардан; истифодаи 正好, 差不多, 尽管, 却, 而"},"g":["正好","差不多","尽管","却","而"]},{"n":3,"t":{"uz":"经理对我印象不错","ru":"经理对我印象不错","tj":"经理对我印象不错"},"sub":{"uz":"intervyu, ishga qabul qilish va birinchi taassurot haqida gapirish; 挺, 本来, 另外, 首先, 不管 grammatikalarini ishlatish","ru":"говорить о собеседовании, найме и первом впечатлении; использовать 挺, 本来, 另外, 首先, 不管","tj":"дар бораи мусоҳиба, қабул ба кор ва таассуроти аввал гуфтугӯ кардан; истифодаи 挺, 本来, 另外, 首先, 不管"},"g":["挺","本来","另外","首先","不管……都……"]},{"n":4,"t":{"uz":"不要太着急赚钱","ru":"不要太着急赚钱","tj":"不要太着急赚钱"},"sub":{"uz":"ish, daromad va tajriba haqida gapirish; 以为, 原来, 并, 按照 va 甚至 grammatikalarini ishlatish","ru":"говорить о работе, доходе и опыте; использовать 以为, 原来, 并, 按照 и 甚至","tj":"дар бораи кор, даромад ва таҷриба гуфтугӯ кардан; истифодаи 以为, 原来, 并, 按照 ва 甚至"},"g":["以为","原来","并","按照","甚至"]},{"n":5,"t":{"uz":"只买对的，不买贵的","ru":"只买对的，不买贵的","tj":"只买对的，不买贵的"},"sub":{"uz":"xarid, narx, sifat va onlayn savdo haqida gapirish; 肯定, 再说, 实际, 对……来说 va 尤其 grammatikalarini ishlatish","ru":"говорить о покупках, цене, качестве и онлайн-покупках; использовать 肯定, 再说, 实际, 对……来说 и 尤其","tj":"дар бораи харид, нарх, сифат ва хариди онлайн гуфтугӯ кардан; истифодаи 肯定, 再说, 实际, 对……来说 ва 尤其"},"g":["肯定","再说","实际","对……来说","尤其"]},{"n":6,"t":{"uz":"一分钱一分货","ru":"一分钱一分货","tj":"一分钱一分货"},"sub":{"uz":"narx va sifat, chegirma, xizmat va savdo aksiyalari haqida gapirish; 竟然, 倍, 值得, 其中 va （在）……下 grammatikalarini ishlatish","ru":"говорить о цене и качестве, скидках, сервисе и торговых акциях; использовать 竟然, 倍, 值得, 其中 и （在）……下","tj":"дар бораи нарх ва сифат, тахфиф, хизмат ва чорабиниҳои савдо гуфтугӯ кардан; истифодаи 竟然, 倍, 值得, 其中 ва （在）……下"},"g":["竟然","倍","值得","其中","（在）……下"]},{"n":7,"t":{"uz":"最好的医生是自己","ru":"最好的医生是自己","tj":"最好的医生是自己"},"sub":{"uz":"sog'liq, odatlar va sport haqida gapirish; 估计, 来不及, 离合词重叠, 要是 va 既...又 grammatikalarini ishlatish","ru":"говорить о здоровье, привычках и спорте; использовать 估计, 来不及, удвоение разделяемых слов, 要是 и 既...又","tj":"дар бораи саломатӣ, одатҳо ва варзиш гуфтугӯ кардан; истифодаи 估计, 来不及, такрори калимаҳои ҷудошаванда, 要是 ва 既...又"},"g":["估计","来不及","离合词重叠","要是","既……又/也/还……"]},{"n":8,"t":{"uz":"生活中不缺少美","ru":"生活中不缺少美","tj":"生活中不缺少美"},"sub":{"uz":"kayfiyat, go'zallik va hayotga munosabat haqida gapirish; 使, 只要, 可不是, 因此 va 往往 grammatikalarini ishlatish","ru":"говорить о настроении, красоте и отношении к жизни; использовать 使, 只要, 可不是, 因此 и 往往","tj":"дар бораи кайфият, зебоӣ ва муносибат ба зиндагӣ гуфтугӯ кардан; истифодаи 使, 只要, 可不是, 因此 ва 往往"},"g":["使","只要……就……","可不是","因此","往往"]},{"n":9,"t":{"uz":"阳光总在风雨后","ru":"阳光总在风雨后","tj":"阳光总在风雨后"},"sub":{"uz":"urinish, muvaffaqiyat va qiyinchiliklarga munosabat haqida gapirish; 难道, 通过, 可是, 结果 va 上 grammatikalarini ishlatish","ru":"говорить об усилиях, успехе и отношении к трудностям; использовать 难道, 通过, 可是, 结果 и 上","tj":"дар бораи кӯшиш, муваффақият ва муносибат ба мушкилӣ гуфтугӯ кардан; истифодаи 难道, 通过, 可是, 结果 ва 上"},"g":["难道","通过","可是","结果","上"]},{"n":10,"t":{"uz":"幸福的标准","ru":"幸福的标准","tj":"幸福的标准"},"sub":{"uz":"baxt, oila, ish tanlovi va hayot sharoiti haqida gapirish; 不过, 确实,
