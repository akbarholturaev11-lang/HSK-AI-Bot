арактер у него хороший.","tj":"Ӯ на танҳо футболро хуб бозӣ мекунад, хислаташ ҳам хуб аст."},"pattern":"不仅……也/还/而且……"},{"l":1,"t":{"uz":"doim; hech qachon (inkor bilan)","ru":"从来 — всегда; никогда (с отрицанием)","tj":"从来 — ҳамеша; ҳеч вақт (бо инкор)"},"f":{"uz":"Odatda inkor bilan kelib, 'hech qachon bunday bo'lmagan' ma'nosini beradi.","ru":"Чаще всего стоит с отрицанием 不 или 没 и подчеркивает, что такого никогда не было.","tj":"Одатан бо 不 ё 没 меояд ва таъкид мекунад, ки чунин ҳолат ҳеҷ вақт набудааст."},"e":{"zh":"我从来没这么快乐过。","p":"Wǒ cónglái méi zhème kuàilè guo.","uz":"Men hech qachon bunchalik xursand bo'lmaganman.","ru":"Я никогда не была такой счастливой.","tj":"Ман ҳеч вақт ин қадар хушбахт набудам."},"pattern":"从来"},{"l":1,"t":{"uz":"endi, hozirgina","ru":"刚 — только что, недавно","tj":"刚 — ҳозир, нав"},"f":{"uz":"Harakat yaqinda yoki endi bo'lganini bildiradi.","ru":"Показывает, что действие произошло совсем недавно или только началось.","tj":"Нишон медиҳад, ки амал нав рӯй додааст ё нав оғоз шудааст."},"e":{"zh":"我和丈夫刚结婚的时候，每天都觉得很新鲜。","p":"Wǒ hé zhàngfu gāng jiéhūn de shíhou, měi tiān dōu juéde hěn xīnxiān.","uz":"Erim bilan endi turmush qurgan paytimda har kuni hamma narsa yangi tuyulardi.","ru":"Когда мы с мужем только поженились, каждый день казался новым.","tj":"Вақте ману шавҳарам нав издивоҷ карда будем, ҳар рӯз ҳама чиз нав менамуд."},"pattern":"刚"},{"l":1,"t":{"uz":"hatto ... bo'lsa ham","ru":"即使...也... — даже если..., все равно...","tj":"即使...也... — ҳатто агар..., боз ҳам..."},"f":{"uz":"Shart kuchli bo'lsa ham natija o'zgarmasligini bildiradi.","ru":"Показывает, что результат не меняется даже при сильном условии.","tj":"Нишон медиҳад, ки натиҷа ҳатто бо шарти қавӣ ҳам тағйир намеёбад."},"e":{"zh":"即使晚上加班到零点，到家时，自己家里也还亮着灯。","p":"Jíshǐ wǎnshang jiābān dào língdiǎn, dào jiā shí, zìjǐ jiā lǐ yě hái liàngzhe dēng.","uz":"Hatto kechasi yarimgacha ishlasa ham, uyga kelganda uyida chiroq yonib turadi.","ru":"Даже если работаешь сверхурочно до полуночи, дома все равно горит свет.","tj":"Ҳатто агар шаб то нисфи шаб изофакорӣ кунӣ, ҳангоми ба хона расидан чароғи хона ҳанӯз фурӯзон аст."},"pattern":"即使……也……"},{"l":1,"t":{"uz":"... jihatdan, ... borasida","ru":"（在）...上 — в плане..., с точки зрения...","tj":"（在）...上 — аз ҷиҳати..., дар масъалаи..."},"f":{"uz":"Mavzu yoki sohani ko'rsatadi: xarakter jihatidan, ish borasida kabi.","ru":"Указывает область или аспект: в характере, в работе, в учебе и т.д.","tj":"Соҳа ё ҷиҳатро нишон медиҳад: аз ҷиҳати хислат, кор, таҳсил ва ғайра."},"e":{"zh":"更需要性格上互相吸引。","p":"Gèng xūyào xìnggé shang hùxiāng xīyǐn.","uz":"Xarakter jihatidan bir-birini jalb qilish yanada kerak.","ru":"Еще важнее взаимное притяжение характеров.","tj":"Ҷалби ҳамдигар аз ҷиҳати хислат боз ҳам муҳимтар аст."},"pattern":"（在）……上"},{"l":2,"t":{"uz":"aynan, juda mos paytda","ru":"正好 — как раз, вовремя","tj":"正好 — маҳз, ба вақти муносиб"},"f":{"uz":"Vaqt, holat yoki imkoniyat juda mos tushganini bildiradi.","ru":"Говорит, что время, ситуация или возможность подошли очень удачно.","tj":"Мефаҳмонад, ки вақт, ҳолат ё имконият хеле мувофиқ омад."},"e":{"zh":"我们下午要去踢足球，正好一起去吧。","p":"Wǒmen xiàwǔ yào qù tī zúqiú, zhènghǎo yìqǐ qù ba.","uz":"Biz tushdan keyin futbol o'ynashga boramiz, aynan birga boraylik.","ru":"Мы днем собираемся играть в футбол, как раз пойдем вместе.","tj":"Мо баъд аз нисфирӯзӣ футбол бозӣ карданӣ ҳастем, маҳз якҷо меравем."},"pattern":"正好"},{"l":2,"t":{"uz":"deyarli, taxminan","ru":"差不多 — почти, примерно","tj":"差不多 — қариб, тақрибан"},"f":{"uz":"Raqam yoki holat to'liq aniq emas, taxminan shunga yaqinligini bildiradi.","ru":"Используется, когда число или состояние не точное, а приблизительное.","tj":"Вақте истифода мешавад, ки шумора ё ҳолат дақиқ не, балки тақрибӣ аст."},"e":{"zh":"差不多一半儿吧。","p":"Chàbuduō yíbànr ba.","uz":"Taxminan yarmi bo'lsa kerak.","ru":"Наверное, примерно половина.","tj":"Тақрибан нисфаш бошад."},"pattern":"差不多"},{"l":2,"t":{"uz":"garchi ... bo'lsa ham","ru":"尽管 — хотя, несмотря на","tj":"尽管 — гарчанде, ҳарчанд"},"f":{"uz":"Qarama-qarshi vaziyatni tan olib, asosiy natijani keyin beradi.","ru":"Признает противоположное условие, после чего идет основной результат.","tj":"Ҳолати муқобилро эътироф мекунад ва баъд натиҷаи асосиро медиҳад."},"e":{"zh":"尽管已经毕业这么多年，我们还是经常联系的。","p":"Jǐnguǎn yǐjīng bìyè zhème duō nián, wǒmen háishì jīngcháng liánxì de.","uz":"Garchi bitirganimizga shuncha yil bo'lgan bo'lsa ham, biz baribir tez-tez aloqada bo'lamiz.","ru":"Хотя после выпуска прошло столько лет, мы все еще часто общаемся.","tj":"Гарчанде аз хатм ин қадар сол гузаштааст, мо ҳанӯз бисёр вақт дар тамосем."},"pattern":"尽管"},{"l":2,"t":{"uz":"lekin, ammo","ru":"却 — однако, но","tj":"却 — аммо, вале"},"f":{"uz":"Kutilgan natijaga teskari holatni ko'rsatadi.","ru":"Подчеркивает результат, противоположный ожиданию.","tj":"Натиҷаеро нишон медиҳад, ки ба интизорӣ баръакс аст."},"e":{"zh":"一个脾气不好的人虽然不一定让人讨厌，但是却很难跟人交朋友。","p":"Yí ge píqi bù hǎo de rén suīrán bù yídìng ràng rén tǎoyàn, dànshì què hěn nán gēn rén jiāo péngyou.","uz":"Fe'li yomon odam odamlarni albatta bezdirmasligi mumkin, lekin u bilan do'stlashish qiyin.","ru":"Человек с плохим характером не обязательно всем неприятен, но с ним трудно дружить.","tj":"Одами бадхулқ ҳатман нафратовар нест, аммо бо ӯ дӯст шудан душвор аст."},"pattern":"却"},{"l":2,"t":{"uz":"esa, ammo","ru":"而 — а, но; сопоставление","tj":"而 — бошад, аммо; муқоиса"},"f":{"uz":"Ikki qarash yoki holatni taqqoslab bog'laydi.","ru":"Связывает два взгляда или состояния и часто показывает сопоставление.","tj":"Ду назар ё ҳолатро мепайвандад ва аксар вақт муқоисаро нишон медиҳад."},"e":{"zh":"而我的理解是：当你遇到困难的时候，真正的朋友会站出来。","p":"Ér wǒ de lǐjiě shì: dāng nǐ yùdào kùnnan de shíhou, zhēnzhèng de péngyou huì zhàn chūlai.","uz":"Mening tushuncham esa shuki: qiyinchilikka duch kelganingda haqiqiy do'st oldinga chiqadi.","ru":"А мое понимание такое: когда ты сталкиваешься с трудностями, настоящий друг выходит вперед.","tj":"Фаҳмиши ман бошад чунин аст: вақте ба мушкилӣ дучор мешавӣ, дӯсти ҳақиқӣ пеш мебарояд."},"pattern":"而"},{"l":3,"t":{"uz":"ancha, juda","ru":"挺 — довольно, весьма","tj":"挺 — хеле, анча"},"f":{"uz":"Og'zaki tilda sifat yoki holat darajasini yumshoq kuchaytiradi.","ru":"Разговорно усиливает степень качества или состояния.","tj":"Дар гуфтугӯ дараҷаи сифат ё ҳолатро мулоим қавитар мекунад."},"e":{"zh":"他们问的问题都挺容易的。","p":"Tāmen wèn de wèntí dōu tǐng róngyì de.","uz":"Ular so'ragan savollar ancha oson edi.","ru":"Вопросы, которые они задавали, были довольно легкими.","tj":"Саволҳое ки онҳо доданд, хеле осон буданд."},"pattern":"挺"},{"l":3,"t":{"uz":"aslida, boshida","ru":"本来 — изначально, вообще-то","tj":"本来 — аслан, дар аввал"},"f":{"uz":"Dastlabki reja yoki oldingi holatni bildiradi; keyin ko'pincha o'zgarish keladi.","ru":"Показывает первоначальный план или прежнее состояние; после него часто идет изменение.","tj":"Нақшаи аввал ё ҳолати пешинаро нишон медиҳад; баъд одатан тағйир меояд."},"e":{"zh":"本来是小李负责的，但是他突然生病住院了。","p":"Běnlái shì Xiǎo Lǐ fùzé de, dànshì tā tūrán shēngbìng zhùyuàn le.","uz":"Aslida Xiao Li mas'ul edi, lekin u to'satdan kasal bo'lib kasalxonaga yotdi.","ru":"Изначально отвечал Сяо Ли, но он внезапно заболел и лег в больницу.","tj":"Аслан Сяо Ли масъул буд, аммо ӯ ногаҳон бемор шуда ба беморхона хобид."},"pattern":"本来"},{"l":3,"t":{"uz":"bundan tashqari","ru":"另外 — кроме того","tj":"另外 — ғайр аз ин"},"f":{"uz":"Oldingi fikrga qo'shimcha sabab yoki ma'lumot qo'shadi.","ru":"Добавляет еще одну причину или информацию к предыдущей мысли.","tj":"Ба фикри пешин сабаб ё маълумоти иловагӣ илова мекунад."},"e":{"zh":"另外，收入也不错。","p":"Lìngwài, shōurù yě búcuò.","uz":"Bundan tashqari, daromadi ham yaxshi.","ru":"Кроме того, доход тоже неплохой.","tj":"Ғайр аз ин, даромад ҳам хуб аст."},"pattern":"另外"},{"l":3,"t":{"uz":"avvalo, birinchi navbatda","ru":"首先 — прежде всего, во-первых","tj":"首先 — пеш аз ҳама, аввалан"},"f":{"uz":"Bir nechta maslahat yoki qadamning birinchisini ko'rsatadi.","ru":"Отмечает первый пункт среди нескольких советов или шагов.","tj":"Нуқтаи аввалро дар байни чанд маслиҳат ё қадам нишон медиҳад."},"e":{"zh":"首先，要穿正式的衣服。","p":"Shǒuxiān, yào chuān zhèngshì de yīfu.","uz":"Avvalo, rasmiy kiyim kiyish kerak.","ru":"Прежде всего, нужно надеть официальную одежду.","tj":"Аввалан, либоси расмӣ пӯшидан лозим."},"pattern":"首先"},{"l":3,"t":{"uz":"nima bo'lishidan qat'i nazar","ru":"不管...都... — что бы ни..., все равно...","tj":"不管...都... — новобаста аз он ки..., ҳамеша..."},"f":{"uz":"Shart qanday bo'lishidan qat'i nazar natija bir xil qolishini bildiradi.","ru":"Показывает, что при любом условии результат остается одинаковым.","tj":"Нишон медиҳад, ки дар ҳар гуна шарт натиҷа як хел мемонад."},"e":{"zh":"不管是上课、上班，还是与别人约会，准时都非常重要。","p":"Bùguǎn shì shàngkè, shàngbān, háishì yǔ biéren yuēhuì, zhǔnshí dōu fēicháng zhòngyào.","uz":"Dars bo'ladimi, ish bo'ladimi yoki boshqalar bilan uchrashuv bo'ladimi, vaqtida borish juda muhim.","ru":"Будь то учеба, работа или встреча с другими людьми, пунктуальность очень важна.","tj":"Хоҳ дарс бошад, хоҳ кор, хоҳ мулоқот бо дигарон, сари вақт будан хеле муҳим аст."},"pattern":"不管……都……"},{"l":4,"t":{"uz":"deb o'ylamoq, lekin fakt boshqacha","ru":"думать, но факт другой","tj":"фикр кардан, вале воқеият дигар аст"},"f":{"uz":"Gapiruvchi avval bir narsani to'g'ri deb o'ylagan, keyin fakt boshqacha ekani bilinadi.","ru":"Говорящий сначала считал что-то верным, но потом выяснилось, что факт другой.","tj":"Гӯянда аввал чизеро дуруст пиндошт, баъд маълум шуд, ки воқеият дигар аст."},"e":{"zh":"我以为新工作比以前的好，没想到还没有以前好呢。","p":"Wǒ yǐwéi xīn gōngzuò bǐ yǐqián de hǎo, méi xiǎngdào hái méiyǒu yǐqián hǎo ne.","uz":"Men yangi ish oldingisidan yaxshi deb o'ylagandim, kutilmaganda oldingisidan ham yaxshi emas ekan.","ru":"Я думал, новая работа лучше прежней, но оказалось, что она даже не лучше прежней.","tj":"Ман фикр мекардам кори нав аз пешина беҳтар аст, вале маълум шуд, ки ҳатто аз пешина беҳтар нест."},"pattern":"以为"},{"l":4,"t":{"uz":"oldingi, asl","ru":"прежний, первоначальный","tj":"пешина, аввала"},"f":{"uz":"Ot oldida kelib oldingi yoki dastlabki holatni bildiradi; ko'pincha 的 bilan otni aniqlaydi.","ru":"Перед существительным показывает прежнее или первоначальное состояние; часто оформляется через 的.","tj":"Пеш аз исм ҳолати пешина ё аввалаеро нишон медиҳад; аксаран бо 的 меояд."},"e":{"zh":"按原来的计划应该是两周，但是我们可以提前完成。","p":"Àn yuánlái de jìhuà yīnggāi shì liǎng zhōu, dànshì wǒmen kěyǐ tíqián wánchéng.","uz":"Oldingi rejaga ko'ra ikki hafta bo'lishi kerak edi, lekin biz oldinroq tugata olamiz.","ru":"По первоначальному плану должно быть две недели, но мы можем завершить раньше.","tj":"Мувофиқи нақшаи аввал бояд ду ҳафта мешуд, вале мо метавонем пеш аз муҳлат анҷом диҳем."},"pattern":"原来"},{"l":4,"t":{"uz":"inkorni kuchaytirish","ru":"усиление отрицания","tj":"таъкиди инкор"},"f":{"uz":"并 odatda 不 yoki 没 oldida kelib, 'aslida unday emas' ma'nosida inkorni kuchaytiradi.","ru":"并 обычно стоит перед 不 или 没 и усиливает отрицание: 'вовсе не'.","tj":"并 одатан пеш аз 不 ё 没 омада, маънои 'умуман не'-ро таъкид мекунад."},"e":{"zh":"后来才发现其实并不容易。","p":"Hòulái cái fāxiàn qíshí bìng bù róngyì.","uz":"Keyin bildimki, aslida bu umuman oson emas ekan.","ru":"Потом я понял, что на самом деле это вовсе не легко.","tj":"Баъд фаҳмидам, ки дар асл ин умуман осон нест."},"pattern":"并"},{"l":4,"t":{"uz":"bo'yicha, muvofiq","ru":"согласно, по","tj":"мувофиқи, тибқи"},"f":{"uz":"按照 + reja/qoidaga ko'ra harakat bajarilishini bildiradi.","ru":"按照 + план/правило показывает, что действие выполняется согласно этому.","tj":"按照 + нақша/қоида нишон медиҳад, ки амал тибқи он иҷро мешавад."},"e":{"zh":"我们今年的工作都已经按照计划完成了。","p":"Wǒmen jīnnián de gōngzuò dōu yǐjīng ànzhào jìhuà wánchéng le.","uz":"Bu yilgi ishlarimizning hammasi reja bo'yicha yakunlandi.","ru":"Наша работа за этот год уже завершена согласно плану.","tj":"Корҳои имсолаи мо ҳама мувофиқи нақша анҷом ёфтанд."},"pattern":"按照"},{"l":4,"t":{"uz":"hatto, hattoki","ru":"даже","tj":"ҳатто"},"f":{"uz":"Kuchaytirib sanashda oxirgi, kutilmagan yoki kuchliroq holatni kiritadi.","ru":"В перечислении усиливает последний, более неожиданный или сильный пункт.","tj":"Дар шумориш ҳолати охирин, ногаҳонтар ё қавитарро таъкид мекунад."},"e":{"zh":"我们不得不去做一些自己不愿意做甚至是非常不喜欢的工作。","p":"Wǒmen bùdébù qù zuò yìxiē zìjǐ bú yuànyì zuò shènzhì shì fēicháng bù xǐhuan de gōngzuò.","uz":"Biz o'zimiz xohlamaydigan, hatto juda yoqtirmaydigan ishlarni ham qilishga majbur bo'lamiz.","ru":"Нам приходится делать работу, которую мы не хотим делать, даже очень не любим.","tj":"Мо маҷбур мешавем корҳоеро кунем, ки намехоҳем, ҳатто хеле дӯст намедорем."},"pattern":"甚至"},{"l":5,"t":{"uz":"albatta, aniq","ru":"точно, обязательно","tj":"ҳатман, аниқ"},"f":{"uz":"Fe'l yoki sifat oldida gapiruvchining ishonchini bildiradi.","ru":"Перед глаголом или прилагательным выражает уверенность говорящего.","tj":"Пеш аз феъл ё сифат боварии гӯяндаро нишон медиҳад."},"e":{"zh":"质量肯定不“打折”。","p":"Zhìliàng kěndìng bù “dǎ zhé”.","uz":"Sifat albatta 'chegirmaga tushmaydi'.","ru":"Качество точно не 'со скидкой'.","tj":"Сифат ҳатман 'тахфиф' намешавад."},"pattern":"肯定"},{"l":5,"t":{"uz":"qolaversa, bundan tashqari","ru":"к тому же, кроме того","tj":"ғайр аз ин, гузашта аз ин"},"f":{"uz":"Oldingi fikrga yana bir sabab qo'shadi.","ru":"Добавляет ещё одну причину к предыдущей мысли.","tj":"Ба фикри пешина боз як сабаб илова мекунад."},"e":{"zh":"再说，这个月家里已经花了五千多了。","p":"Zàishuō, zhège yuè jiā li yǐjīng huāle wǔqiān duō le.","uz":"Qolaversa, bu oy uyda allaqachon besh mingdan ko'p sarfladik.","ru":"К тому же в этом месяце дома уже потратили больше пяти тысяч.","tj":"Гузашта аз ин, ин моҳ дар хона аллакай беш аз панҷ ҳазор сарф шуд."},"pattern":"再说"},{"l":5,"t":{"uz":"haqiqiy, amaliy; aslida","ru":"реальный, практический; на деле","tj":"воқеӣ, амалӣ; дар асл"},"f":{"uz":"实际 narsa yoki holatning haqiqiy tomonini bildiradi; 实际上 shakli 'aslida' ma'nosida keladi.","ru":"实际 показывает реальную сторону вещи или ситуации; 实际上 значит 'на самом деле'.","tj":"实际 ҷониби воқеии чиз ё ҳолатро нишон медиҳад; 实际上 маънои 'дар асл'-ро дорад."},"e":{"zh":"实际上，很多东西并不像广告上说的那么好。","p":"Shíjì shang, hěn duō dōngxi bìng bú xiàng guǎnggào shang shuō de nàme hǎo.","uz":"Aslida ko'p narsalar reklamada aytilgandek yaxshi emas.","ru":"На самом деле многие вещи вовсе не так хороши, как говорится в рекламе.","tj":"Дар асл бисёр чизҳо мисли реклама гуфтагиашон хуб нестанд."},"pattern":"实际"},{"l":5,"t":{"uz":"... uchun, ... nuqtai nazaridan","ru":"для..., с точки зрения...","tj":"барои..., аз нуқтаи назари..."},"f":{"uz":"Biror shaxs yoki narsa nuqtai nazaridan baho berishni bildiradi.","ru":"Показывает оценку с точки зрения человека или предмета.","tj":"Арзёбиро аз нуқтаи назари шахс ё чиз нишон медиҳад."},"e":{"zh":"对我来说，衣服的样子流行不流行并不是很重要。","p":"Duì wǒ lái shuō, yīfu de yàngzi liúxíng bu liúxíng bìng bú shì hěn zhòngyào.","uz":"Men uchun kiyimning ko'rinishi moda yoki moda emasligi juda muhim emas.","ru":"Для меня не так важно, модный ли фасон одежды.","tj":"Барои ман мӯд будан ё набудани намуди либос он қадар муҳим нест."},"pattern":"对……来说"},{"l":5,"t":{"uz":"ayniqsa","ru":"особенно","tj":"хусусан"},"f":{"uz":"Umumiy gapdan keyin eng ajralib turadigan guruh yoki holatni ko'rsatadi.","ru":"После общей мысли выделяет особенно заметную группу или ситуацию.","tj":"Баъди фикри умумӣ гурӯҳ ё ҳолати махсусро нишон медиҳад."},"e":{"zh":"年轻人尤其喜欢在网上买东西。","p":"Niánqīng rén yóuqí xǐhuan zài wǎng shang mǎi dōngxi.","uz":"Yoshlar ayniqsa internetda xarid qilishni yoqtiradi.","ru":"Молодые люди особенно любят покупать вещи в интернете.","tj":"Ҷавонон хусусан дар интернет харид карданро дӯст медоранд."},"pattern":"尤其"},{"l":6,"t":{"uz":"kutilmaganda","ru":"неожиданно","tj":"ногаҳон"},"f":{"uz":"Kutilmagan, hayratli natijani bildiradi.","ru":"Показывает неожиданный, удивительный результат.","tj":"Натиҷаи ногаҳонӣ ё тааҷҷубоварро нишон медиҳад."},"e":{"zh":"竟然忘了去商场的超市买果汁！","p":"Jìngrán wàngle qù shāngchǎng de chāoshì mǎi guǒzhī!","uz":"Kutilmaganda savdo markazidagi supermarketga sharbat olishga borishni unutibman!","ru":"Неожиданно я забыл пойти в супермаркет торгового центра купить сок!","tj":"Ногаҳон фаромӯш кардаам, ки ба супермаркети маркази савдо барои шарбат равам!"},"pattern":"竟然"},{"l":6,"t":{"uz":"marta, baravar","ru":"раз, крат","tj":"маротиба, баробар"},"f":{"uz":"A 是 B 的 N 倍 shakli A ning B dan necha baravar ekanini bildiradi.","ru":"Конструкция A 是 B 的 N 倍 показывает, во сколько раз A больше B.","tj":"Қолиби A 是 B 的 N 倍 нишон медиҳад, ки A аз B чанд баробар аст."},"e":{"zh":"今天的价格是昨天的两倍。","p":"Jīntiān de jiàgé shì zuótiān de liǎng bèi.","uz":"Bugungi narx kechagining ikki baravari.","ru":"Сегодняшняя цена в два раза выше вчерашней.","tj":"Нархи имрӯз ду баробари дирӯза аст."},"pattern":"倍"},{"l":6,"t":{"uz":"arziydi","ru":"стоит","tj":"меарзад"},"f":{"uz":"值得 + fe'l/narsa bir ishni qilishga arziydiganini bildiradi.","ru":"值得 + глагол/предмет означает, что что-то стоит сделать или рассмотреть.","tj":"值得 + феъл/чиз маънои арзанда будани иҷро ё баррасиро медиҳад."},"e":{"zh":"都是值得考虑的。","p":"Dōu shì zhíde kǎolǜ de.","uz":"Hammasi ko'rib chiqishga arziydi.","ru":"Всё это стоит рассмотреть.","tj":"Ҳамааш ба баррасӣ меарзад."},"pattern":"值得"},{"l":6,"t":{"uz":"ular ichida","ru":"среди них","tj":"дар байни онҳо"},"f":{"uz":"Oldin aytilgan guruh ichidagi bir qismini ajratib ko'rsatadi.","ru":"Выделяет часть внутри уже названной группы.","tj":"Як қисмро аз гурӯҳи пеш гуфташуда ҷудо нишон медиҳад."},"e":{"zh":"其中，小说7.5折，地图8折，留学考试用书6折。","p":"Qízhōng, xiǎoshuō qīwǔ zhé, dìtú bā zhé, liúxué kǎoshì yòngshū liù zhé.","uz":"Ular ichida romanlar 25% chegirma, xaritalar 20% chegirma, chet elda o'qish imtihoni kitoblari 40% chegirma.","ru":"Среди них романы со скидкой 25%, карты со скидкой 20%, книги для экзаменов на обучение за рубежом со скидкой 40%.","tj":"Дар байни онҳо романҳо 25% тахфиф, харитаҳо 20% тахфиф, китобҳои имтиҳони таҳсил дар хориҷ 40% тахфиф доранд."},"pattern":"其中"},{"l":6,"t":{"uz":"... sharoitida","ru":"в условиях...","tj":"дар шароити..."},"f":{"uz":"O'rtadagi qism odatda ikki bo'g'inli ot yoki fe'l bo'lib, shart yoki vaziyatni bildiradi.","ru":"Средняя часть обычно двусложное существительное или глагол и обозначает условие или ситуацию.","tj":"Қисми миёна одатан исм ё феъли дуҳиҷоӣ буда, шарт ё вазъиятро нишон медиҳад."},"e":{"zh":"一般情况下，你花的钱越多，买的东西也就越好。","p":"Yìbān qíngkuàng xià, nǐ huā de qián yuè duō, mǎi de dōngxi yě jiù yuè hǎo.","uz":"Odatdagi holatda qancha ko'p pul sarflasang, olgan narsang shuncha yaxshi bo'ladi.","ru":"В обычных условиях чем больше денег ты тратишь, тем лучше вещь покупаешь.","tj":"Дар ҳолати одӣ ҳар қадар пули бештар сарф кунӣ, чизе ки мехарӣ ҳамон қадар беҳтар мешавад."},"pattern":"（在）……下"},{"l":7,"t":{"uz":"taxmin qilish","ru":"предполагать","tj":"тахмин кардан"},"f":{"uz":"Aniq dalil bo'lmaganda sabab yoki natijani ehtimol sifatida aytadi.","ru":"Используется, когда причина или результат называются как предположение.","tj":"Вақте сабаб ё натиҷа тахминӣ гуфта мешавад, истифода мешавад."},"e":{"zh":"我还不习惯北方的气候，估计是天气太干。","p":"Wǒ hái bù xíguàn běifāng de qìhòu, gūjì shì tiānqì tài gān.","uz":"Men hali shimol iqlimiga ko'nikmadim, taxminan havo juda quruq.","ru":"Я ещё не привык к северному климату, наверное, воздух слишком сухой.","tj":"Ман ҳанӯз ба иқлими шимол одат накардаам, шояд ҳаво хеле хушк аст."},"pattern":"估计"},{"l":7,"t":{"uz":"ulgurmaslik, kech bo'lish","ru":"не успеть, быть слишком поздно","tj":"вақт нарасидан, дер шудан"},"f":{"uz":"Biror ishni qilishga vaqt yetmasligini yoki keyin pushaymon bo'lish kech bo'lishini bildiradi.","ru":"Показывает, что времени на действие не хватит или сожалеть будет уже поздно.","tj":"Нишон медиҳад, ки барои амал вақт намерасад ё баъд пушаймон шудан дер мешавад."},"e":{"zh":"等你身体出现问题了，后悔就来不及了。","p":"Děng nǐ shēntǐ chūxiàn wèntí le, hòuhuǐ jiù láibují le.","uz":"Tanangda muammo paydo bo'lgandan keyin pushaymon bo'lish kech bo'ladi.","ru":"Когда со здоровьем появятся проблемы, сожалеть будет уже поздно.","tj":"Вақте дар саломатият мушкил пайдо шавад, пушаймон шудан дер мешавад."},"pattern":"来不及"},{"l":7,"t":{"uz":"ajraladigan fe'lni takrorlash","ru":"удвоение разделяемых глаголов","tj":"такрори феълҳои ҷудошаванда"},"f":{"uz":"散步 kabi ajraladigan fe'llarda birinchi bo'g'in takrorlanib, harakatni yengil va qisqa ko'rsatadi.","ru":"В разделяемых глаголах вроде 散步 первый компонент повторяется, показывая лёгкое короткое действие.","tj":"Дар феълҳои ҷудошаванда мисли 散步 қисми аввал такрор шуда, амали сабук ва кӯтоҳро нишон медиҳад."},"e":{"zh":"咱们午饭后就去附近的公园散散步吧。","p":"Zánmen wǔfàn hòu jiù qù fùjìn de gōngyuán sàn san bù ba.","uz":"Tushlikdan keyin yaqin bog'ga biroz sayr qilgani boraylik.","ru":"После обеда давай немного прогуляемся в ближайшем парке.","tj":"Баъди хӯроки нисфирӯзӣ ба боғи наздик каме сайр кунем."},"pattern":"离合词重叠"},{"l":7,"t":{"uz":"agar, mabodo","ru":"если","tj":"агар"},"f":{"uz":"Shart kiritadi; ko'pincha natija keyingi qismda keladi.","ru":"Вводит условие; результат обычно стоит во второй части.","tj":"Шартро меорад; натиҷа одатан дар қисми дуюм меояд."},"e":{"zh":"要是健康是1，其他都是1后面的0。","p":"Yàoshi jiànkāng shì yī, qítā dōu shì yī hòumian de líng.","uz":"Agar sog'liq 1 bo'lsa, qolgan narsalar 1 ortidagi nollar.","ru":"Если здоровье это 1, всё остальное - нули после единицы.","tj":"Агар саломатӣ 1 бошад, чизҳои дигар сифрҳои баъди онанд."},"pattern":"要是"},{"l":7,"t":{"uz":"ham..., ham...","ru":"и..., и...","tj":"ҳам..., ҳам..."},"f":{"uz":"Bir narsaning ikki ijobiy tomoni borligini bog'lab ko'rsatadi.","ru":"Соединяет два положительных качества или результата одного действия.","tj":"Ду тарафи мусбати як чизро пайваст нишон медиҳад."},"e":{"zh":"散步是生活中最简单的锻炼方法，既可以活动身体，又可以减肥。","p":"Sànbù shì shēnghuó zhōng zuì jiǎndān de duànliàn fāngfǎ, jì kěyǐ huódòng shēntǐ, yòu kěyǐ jiǎnféi.","uz":"Sayr qilish eng oddiy mashq usuli: ham tanani harakatlantiradi, ham ozishga yordam beradi.","ru":"Прогулка - самый простой способ тренировки: и тело двигается, и худеть помогает.","tj":"Сайр содатарин усули машқ аст: ҳам баданро ҳаракат медиҳад, ҳам ба кам кардани вазн ёрӣ мекунад."},"pattern":"既……又/也/还……"},{"l":8,"t":{"uz":"sabab bo'lmoq","ru":"делать, вызывать","tj":"сабаб шудан"},"f":{"uz":"A 使 B + sifat/fe'l shaklida A ning B holatini o'zgartirishini bildiradi.","ru":"В конструкции A 使 B + прилагательное/глагол A вызывает изменение состояния B.","tj":"Дар қолиби A 使 B + сифат/феъл A ҳолати B-ро тағйир медиҳад."},"e":{"zh":"听说伤心难过的时候吃块儿巧克力，还能使人的心情变得愉快。","p":"Tīngshuō shāngxīn nánguò de shíhou chī kuàir qiǎokèlì, hái néng shǐ rén de xīnqíng biàn de yúkuài.","uz":"Eshitishimcha, xafa paytda shokolad yeyish odam kayfiyatini yaxshilashi mumkin.","ru":"Говорят, когда грустно, кусочек шоколада может сделать настроение лучше.","tj":"Мегӯянд, вақте ғамгин ҳастӣ, як порча шоколад метавонад кайфиятро хуш кунад."},"pattern":"使"},{"l":8,"t":{"uz":"faqat ... bo'lsa, ...","ru":"если только..., то...","tj":"то даме ки..., пас..."},"f":{"uz":"Yetarli shartni bildiradi: shart bajarilsa, natija paydo bo'ladi.","ru":"Выражает достаточное условие: если условие выполняется, появляется результат.","tj":"Шарти кофиро нишон медиҳад: агар шарт иҷро шавад, натиҷа пайдо мешавад."},"e":{"zh":"只要这次你好好儿准备，一定能把比赛踢好。","p":"Zhǐyào zhè cì nǐ hǎohāor zhǔnbèi, yídìng néng bǎ bǐsài tī hǎo.","uz":"Bu safar yaxshi tayyorlansang, albatta musobaqani yaxshi o'ynaysan.","ru":"Если в этот раз хорошо подготовишься, обязательно хорошо сыграешь матч.","tj":"Агар ин дафъа хуб тайёр шавӣ, ҳатман бозиро хуб мегузаронӣ."},"pattern":"只要……就……"},{"l":8,"t":{"uz":"ha, aynan shunday","ru":"ещё бы, именно так","tj":"ҳа, айнан ҳамин"},"f":{"uz":"Suhbatdosh fikriga kuchli rozilik bildiradi.","ru":"Выражает сильное согласие с собеседником.","tj":"Розигии қавӣ ба фикри ҳамсуҳбатро нишон медиҳад."},"e":{"zh":"可不是！上班堵车怕迟到，下班堵车怕回家晚。","p":"Kěbúshì! Shàngbān dǔchē pà chídào, xiàbān dǔchē pà huí jiā wǎn.","uz":"Ha, aynan shunday! Ishga ketishda tirbandlikdan kech qolishdan, qaytishda uyga kech borishdan qo'rqasan.","ru":"Ещё бы! По дороге на работу боишься опоздать, после работы - поздно вернуться домой.","tj":"Ҳа, айнан ҳамин! Ба кор рафтанда аз дер мондан, аз кор баргаштанда аз дер расидан метарсӣ."},"pattern":"可不是"},{"l":8,"t":{"uz":"shuning uchun","ru":"поэтому","tj":"бинобар ин"},"f":{"uz":"Oldingi sababdan kelib chiqqan natijani bog'laydi.","ru":"Связывает результат с предыдущей причиной.","tj":"Натиҷаро бо сабаби пешина мепайвандад."},"e":{"zh":"生活的态度要自己选择，因此，遇到烦恼时，你应该想一些办法让自己从不高兴的心情中走出来。","p":"Shēnghuó de tàidu yào zìjǐ xuǎnzé, yīncǐ, yùdào fánnǎo shí, nǐ yīnggāi xiǎng yìxiē bànfǎ.","uz":"Hayotga munosabatni o'zing tanlaysan, shuning uchun tashvishga duch kelsang, kayfiyatni chiqarish yo'lini topish kerak.","ru":"Отношение к жизни выбираешь сам, поэтому при тревогах нужно найти способ выйти из плохого настроения.","tj":"Муносибат ба зиндагиро худ интихоб мекунӣ, бинобар ин ҳангоми ташвиш бояд роҳи баромадан аз кайфияти бадро ёфт."},"pattern":"因此"},{"l":8,"t":{"uz":"ko'pincha","ru":"часто, как правило","tj":"аксар вақт"},"f":{"uz":"Odatda takrorlanadigan yoki umumiy kuzatiladigan holatni bildiradi.","ru":"Показывает обычно повторяющееся или типичное явление.","tj":"Ҳолати такроршаванда ё маъмулро нишон медиҳад."},"e":{"zh":"女孩子对衣服颜色的选择往往与她们的性格有关。","p":"Nǚháizi duì yīfu yánsè de xuǎnzé wǎngwǎng yǔ tāmen de xìnggé yǒuguān.","uz":"Qizlarning kiyim rangi tanlovi ko'pincha ularning xarakteri bilan bog'liq.","ru":"Выбор цвета одежды у девушек часто связан с их характером.","tj":"Интихоби ранги либос дар духтарон аксаран бо характери онҳо вобаста аст."},"pattern":"往往"},{"l":9,"t":{"uz":"nahotki","ru":"неужели","tj":"магар"},"f":{"uz":"Ritorik savolda gapiruvchi hayrat yoki qarshi fikrni kuchli bildiradi.","ru":"В риторическом вопросе выражает удивление или несогласие.","tj":"Дар саволи риторикӣ ҳайрат ё норозигиро қавӣ нишон медиҳад."},"e":{"zh":"怎么又买了这么多饼干和巧克力？难道你不减肥了？","p":"Zěnme yòu mǎi le zhème duō bǐnggān hé qiǎokèlì? Nándào nǐ bù jiǎnféi le?","uz":"Yana shuncha pechenye va shokolad oldingmi? Nahotki ozishni tashlading?","ru":"Ты опять купила столько печенья и шоколада? Неужели больше не худеешь?","tj":"Боз ин қадар печенье ва шоколад харидӣ? Магар дигар вазн кам намекунӣ?"},"pattern":"难道"},{"l":9,"t":{"uz":"orqali","ru":"через, благодаря","tj":"тавассути"},"f":{"uz":"Biror natijaga qaysi yo'l yoki vosita bilan erishilishini bildiradi.","ru":"Показывает способ или средство, с помощью которого достигается результат.","tj":"Роҳ ё воситаеро нишон медиҳад, ки тавассути он натиҷа ба даст меояд."},"e":{"zh":"任何成功都要通过努力才能得到。","p":"Rènhé chénggōng dōu yào tōngguò nǔlì cái néng dédào.","uz":"Har qanday muvaffaqiyatga faqat mehnat orqali erishiladi.","ru":"Любой успех можно получить только через усилия.","tj":"Ҳар гуна муваффақият танҳо тавассути кӯшиш ба даст меояд."},"pattern":"通过"},{"l":9,"t":{"uz":"lekin, ammo","ru":"но, однако","tj":"аммо, вале"},"f":{"uz":"Oldingi fikrga qarama-qarshi yoki kutilmagan holatni bog'laydi.","ru":"Соединяет с предыдущей мыслью противоположную или неожиданную ситуацию.","tj":"Ҳолати муқобил ё ногаҳониро ба фикри пешина мепайвандад."},"e":{"zh":"当时她的父母和亲戚都不支持她，可是她坚持自己的选择。","p":"Dāngshí tā de fùmǔ hé qīnqi dōu bù zhīchí tā, kěshì tā jiānchí zìjǐ de xuǎnzé.","uz":"O'sha payt ota-onasi va qarindoshlari uni qo'llamagan, lekin u o'z tanlovida turib olgan.","ru":"Тогда родители и родственники её не поддерживали, но она настояла на своём выборе.","tj":"Он вақт падару модар ва хешовандонаш ӯро дастгирӣ накарданд, вале ӯ интихоби худро нигоҳ дошт."},"pattern":"可是"},{"l":9,"t":{"uz":"natija","ru":"результат","tj":"натиҷа"},"f":{"uz":"Ishning yakuniy natijasini bildiradi; darsda natijadan qo'rqmay jarayonga e'tibor berish aytiladi.","ru":"Обозначает итог; в уроке подчёркивается внимание к процессу, а не страх перед результатом.","tj":"Натиҷаи ниҳоиро нишон медиҳад; дар дарс таъкид мешавад, ки аз натиҷа натарсида ба раванд диққат диҳем."},"e":{"zh":"如果你想做什么事情，那就勇敢地去做，不要担心结果。","p":"Rúguǒ nǐ xiǎng zuò shénme shìqing, nà jiù yǒnggǎn de qù zuò, búyào dānxīn jiéguǒ.","uz":"Biror ish qilmoqchi bo'lsang, jasorat bilan qil, natijadan xavotir olma.","ru":"Если хочешь что-то сделать, смело делай и не переживай о результате.","tj":"Агар мехоҳӣ коре кунӣ, ҷасурона кун ва аз натиҷа хавотир нашав."},"pattern":"结果"},{"l":9,"t":{"uz":"sondan oldin: undan ortiq","ru":"перед числом: свыше","tj":"пеш аз шумора: беш аз"},"f":{"uz":"上 + son taxminan 'undan ortiq' ma'nosini beradi.","ru":"上 + число означает приблизительно 'свыше, больше чем'.","tj":"上 + шумора маънои тахминан 'беш аз'-ро медиҳад."},"e":{"zh":"爱迪生就是在找了上千种材料后才找到了能点亮电灯的材料。","p":"Àidíshēng jiùshì zài zhǎo le shàng qiān zhǒng cáiliào hòu cái zhǎodào le néng diǎnliàng diàndēng de cáiliào.","uz":"Edison mingdan ortiq materialni qidirgandan keyingina elektr chiroqni yoqa oladigan materialni topgan.","ru":"Эдисон нашёл материал для электрической лампы только после поиска более тысячи материалов.","tj":"Эдисон танҳо баъди ҷустуҷӯи беш аз ҳазор навъ мавод маводи чароғро ёфт."},"pattern":"上"},{"l":10,"t":{"uz":"lekin, biroq","ru":"однако, но","tj":"аммо, вале"},"f":{"uz":"Oldingi fikrdan keyin yumshoq burilish yoki qarama-qarshi fikr beradi.","ru":"После предыдущей мысли вводит мягкое противопоставление.","tj":"Баъди фикри пешина муқобили мулоим меорад."},"e":{"zh":"不过现在我很幸福。","p":"Búguò xiànzài wǒ hěn xìngfú.","uz":"Lekin hozir men juda baxtliman.","ru":"Однако сейчас я очень счастлива.","tj":"Аммо ҳоло ман хеле хушбахтам."},"pattern":"不过"},{"l":10,"t":{"uz":"haqiqatan","ru":"действительно","tj":"воқеан"},"f":{"uz":"Fikrni tasdiqlab, gapiruvchi rostdan shunday deb bilishini bildiradi.","ru":"Подтверждает мысль и показывает, что говорящий действительно так считает.","tj":"Фикрро тасдиқ карда нишон медиҳад, ки гӯянда воқеан ҳамин тавр мешуморад."},"e":{"zh":"我女儿确实不错。","p":"Wǒ nǚ'ér quèshí búcuò.","uz":"Qizim haqiqatan ham yaxshi.","ru":"Моя дочь действительно хорошая.","tj":"Духтарам воқеан хуб аст."},"pattern":"确实"},{"l":10,"t":{"uz":"... nazarida","ru":"с точки зрения...","tj":"аз назари..."},"f":{"uz":"Kimningdir shaxsiy qarashi yoki bahosini kiritadi.","ru":"Вводит личную точку зрения или оценку.","tj":"Нуқтаи назар ё баҳодиҳии шахсиро меорад."},"e":{"zh":"在我看来，赚钱多少不是最重要的，兴趣才是关键。","p":"Zài wǒ kànlai, zhuànqián duōshǎo bú shì zuì zhòngyào de, xìngqù cái shì guānjiàn.","uz":"Mening nazarimda, qancha pul topish eng muhimi emas, qiziqish asosiy.","ru":"На мой взгляд, сколько зарабатывать - не самое важное, ключевое - интерес.","tj":"Аз назари ман, чӣ қадар пул ёфтан муҳимтарин нест, шавқ асосӣ аст."},"pattern":"在……看来"},{"l":10,"t":{"uz":"sababli","ru":"из-за, вследствие","tj":"аз сабаби"},"f":{"uz":"Sababni rasmiyroq uslubda beradi; keyin natija keladi.","ru":"В более официальном стиле указывает причину, после которой идёт результат.","tj":"Сабабро бо услуби расмитар медиҳад; баъд натиҷа меояд."},"e":{"zh":"如果由于缺钱而不能及时去看医生，你的健康都很难得到保证。","p":"Rúguǒ yóuyú quē qián ér bù néng jíshí qù kàn yīshēng, nǐ de jiànkāng dōu hěn nán dédào bǎozhèng.","uz":"Agar pul yetishmasligi sababli vaqtida shifokorga borolmasang, sog'lig'ingni kafolatlash qiyin.","ru":"Если из-за нехватки денег нельзя вовремя обратиться к врачу, здоровье трудно гарантировать.","tj":"Агар аз сабаби камии пул сари вақт ба духтур рафта натавонӣ, кафолати саломатӣ душвор мешавад."},"pattern":"由于"},{"l":10,"t":{"uz":"masalan","ru":"например","tj":"масалан"},"f":{"uz":"Oldingi umumiy fikrga aniq misol beradi.","ru":"Даёт конкретный пример к предыдущей общей мысли.","tj":"Ба фикри умумии пешина мисоли мушаххас медиҳад."},"e":{"zh":"比如一块橡皮、一块糖，得到了就很幸福。","p":"Bǐrú yí kuài xiàngpí, yí kuài táng, dédào le jiù hěn xìngfú.","uz":"Masalan, bir dona o'chirg'ich yoki konfetni olsang, juda baxtli bo'lasan.","ru":"Например, получишь ластик или конфету - и уже счастлив.","tj":"Масалан, як хатпоккунак ё як қанд гирӣ, хеле хушбахт мешавӣ."},"pattern":"比如"}],"QUIZ":[{"l":1,"q":{"uz":"Qaysi grammatika ishlatilgan?\n他不仅足球踢得好，性格也不错。","ru":"Какая грамматика использована?\n他不仅足球踢得好，性格也不错。","tj":"Кадом грамматика истифода шудааст?\n他不仅足球踢得好，性格也不错。"},"opts":["不仅……也/还/而且……","从来","刚","即使……也……"],"a":0,"explanation":{"uz":"Ikki ijobiy xususiyatni bog'lab, ikkinchi qismni kuchaytiradi.","ru":"Связывает два положительных признака: первая часть вводится 不仅, вторая усиливается 也, 还 или 而且.","tj":"Ду хусусияти мусбатро мепайвандад: қисми аввал бо 不仅, қисми дуюм бо 也, 还 ё 而且 қавитар мешавад."}},{"l":1,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我从来没这么快乐过。","ru":"Какая грамматика использована?\n我从来没这么快乐过。","tj":"Кадом грамматика истифода шудааст?\n我从来没这么快乐过。"},"opts":["从来","不仅……也/还/而且……","刚","即使……也……"],"a":0,"explanation":{"uz":"Odatda inkor bilan kelib, 'hech qachon bunday bo'lmagan' ma'nosini beradi.","ru":"Чаще всего стоит с отрицанием 不 или 没 и подчеркивает, что такого никогда не было.","tj":"Одатан бо 不 ё 没 меояд ва таъкид мекунад, ки чунин ҳолат ҳеҷ вақт набудааст."}},{"l":1,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我和丈夫刚结婚的时候，每天都觉得很新鲜。","ru":"Какая грамматика использована?\n我和丈夫刚结婚的时候，每天都觉得很新鲜。","tj":"Кадом грамматика истифода шудааст?\n我和丈夫刚结婚的时候，每天都觉得很新鲜。"},"opts":["刚","不仅……也/还/而且……","从来","即使……也……"],"a":0,"explanation":{"uz":"Harakat yaqinda yoki endi bo'lganini bildiradi.","ru":"Показывает, что действие произошло совсем недавно или только началось.","tj":"Нишон медиҳад, ки амал нав рӯй додааст ё нав оғоз шудааст."}},{"l":1,"q":{"uz":"Qaysi grammatika ishlatilgan?\n即使晚上加班到零点，到家时，自己家里也还亮着灯。","ru":"Какая грамматика использована?\n即使晚上加班到零点，到家时，自己家里也还亮着灯。","tj":"Кадом грамматика истифода шудааст?\n即使晚上加班到零点，到家时，自己家里也还亮着灯。"},"opts":["即使……也……","不仅……也/还/而且……","从来","刚"],"a":0,"explanation":{"uz":"Shart kuchli bo'lsa ham natija o'zgarmasligini bildiradi.","ru":"Показывает, что результат не меняется даже при сильном условии.","tj":"Нишон медиҳад, ки натиҷа ҳатто бо шарти қавӣ ҳам тағйир намеёбад."}},{"l":1,"q":{"uz":"Qaysi grammatika ishlatilgan?\n更需要性格上互相吸引。","ru":"Какая грамматика использована?\n更需要性格上互相吸引。","tj":"Кадом грамматика истифода шудааст?\n更需要性格上互相吸引。"},"opts":["（在）……上","不仅……也/还/而且……","从来","刚"],"a":0,"explanation":{"uz":"Mavzu yoki sohani ko'rsatadi: xarakter jihatidan, ish borasida kabi.","ru":"Указывает область или аспект: в характере, в работе, в учебе и т.д.","tj":"Соҳа ё ҷиҳатро нишон медиҳад: аз ҷиҳати хислат, кор, таҳсил ва ғайра."}},{"l":2,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我们下午要去踢足球，正好一起去吧。","ru":"Какая грамматика использована?\n我们下午要去踢足球，正好一起去吧。","tj":"Кадом грамматика истифода шудааст?\n我们下午要去踢足球，正好一起去吧。"},"opts":["正好","不仅……也/还/而且……","从来","刚"],"a":0,"explanation":{"uz":"Vaqt, holat yoki imkoniyat juda mos tushganini bildiradi.","ru":"Говорит, что время, ситуация или возможность подошли очень удачно.","tj":"Мефаҳмонад, ки вақт, ҳолат ё имконият хеле мувофиқ омад."}},{"l":2,"q":{"uz":"Qaysi grammatika ishlatilgan?\n差不多一半儿吧。","ru":"Какая грамматика использована?\n差不多一半儿吧。","tj":"Кадом грамматика истифода шудааст?\n差不多一半儿吧。"},"opts":["差不多","不仅……也/还/而且……","从来","刚"],"a":0,"explanation":{"uz":"Raqam yoki holat to'liq aniq emas, taxminan shunga yaqinligini bildiradi.","ru":"Используется, когда число или состояние не точное, а приблизительное.","tj":"Вақте истифода мешавад, ки шумора ё ҳолат дақиқ не, балки тақрибӣ аст."}},{"l":2,"q":{"uz":"Qaysi grammatika ishlatilgan?\n尽管已经毕业这么多年，我们还是经常联系的。","ru":"Какая грамматика использована?\n尽管已经毕业这么多年，我们还是经常联系的。","tj":"Кадом грамматика истифода шудааст?\n尽管已经毕业这么多年，我们还是经常联系的。"},"opts":["尽管","不仅……也/还/而且……","从来","刚"],"a":0,"explanation":{"uz":"Qarama-qarshi vaziyatni tan olib, asosiy natijani keyin beradi.","ru":"Признает противоположное условие, после чего идет основной результат.","tj":"Ҳолати муқобилро эътироф мекунад ва баъд натиҷаи асосиро медиҳад."}},{"l":2,"q":{"uz":"Qaysi grammatika ishlatilgan?\n一个脾气不好的人虽然不一定让人讨厌，但是却很难跟人交朋友。","ru":"Какая грамматика использована?\n一个脾气不好的人虽然不一定让人讨厌，但是却很难跟人交朋友。","tj":"Кадом грамматика истифода шудааст?\n一个脾气不好的人虽然不一定让人讨厌，但是却很难跟 ., тогда...","tj":"танҳо агар..., он гоҳ..."},"f":{"uz":"Zarur shartni bildiradi: shart bajarilsa, natija bo'ladi.","ru":"Выражает необходимое условие: результат возможен только при нём.","tj":"Шарти заруриро нишон медиҳад: натиҷа танҳо бо иҷрои он мешавад."},"e":{"zh":"只有大家共同努力，减少污染，保护环境，才能使我们的家变得更美丽。","p":"Zhǐyǒu dàjiā gòngtóng nǔlì, jiǎnshǎo wūrǎn, bǎohù huánjìng, cái néng shǐ wǒmen de jiā biàn de gèng měilì.","uz":"Faqat hamma birga harakat qilib, ifloslanishni kamaytirsa va muhitni himoya qilsagina uyimiz yanada go'zal bo'ladi.","ru":"Только если все вместе будут стараться, уменьшать загрязнение и защищать среду, наш дом станет красивее.","tj":"Танҳо агар ҳама якҷо кӯшиш карда, ифлосиро кам ва муҳитро ҳифз кунанд, хонаи мо зеботар мешавад."},"pattern":"只有……才……"},{"l":15,"t":{"uz":"esga tushmoq","ru":"вспомнить","tj":"ба ёд омадан"},"f":{"uz":"想 dan keyin kelib, xotiradan odam yoki voqeani topishni bildiradi.","ru":"После 想 означает вспомнить человека или событие.","tj":"Баъд аз 想 омаданаш ба ёд овардани одам ё воқеаро мефаҳмонад."},"e":{"zh":"我想起来了，这孩子又聪明又可爱。","p":"Wǒ xiǎng qilai le, zhè háizi yòu cōngming yòu kě'ài.","uz":"Esimga tushdi, bu bola ham aqlli, ham yoqimtoy.","ru":"Я вспомнила, этот ребёнок и умный, и милый.","tj":"Ба ёдам омад, ин кӯдак ҳам доно, ҳам ширин аст."},"pattern":"想起来"},{"l":15,"t":{"uz":"qilmoq, holatga keltirmoq","ru":"делать, приводить к состоянию","tj":"кардан, ба ҳолат овардан"},"f":{"uz":"Og'zaki tilda ko'p fe'llar o'rnida kelib, natijaviy holatni bildiradi.","ru":"В разговорной речи заменяет разные глаголы и показывает результат.","tj":"Дар гуфтори рӯзмарра ба ҷои феълҳои гуногун омада, натиҷаро нишон медиҳад."},"e":{"zh":"每天因为这些小事批评她，弄得我俩心情都不好。","p":"Měi tiān yīnwèi zhèxiē xiǎo shì pīpíng tā, nòng de wǒ liǎ xīnqíng dōu bù hǎo.","uz":"Har kuni shu mayda ishlar uchun uni tanqid qilib, ikkalamizning kayfiyatimiz ham yomon bo'ladi.","ru":"Каждый день критикую её из-за мелочей, и настроение у нас обеих портится.","tj":"Ҳар рӯз барои и i o'rganishni misol qilsak, avvalo darsdan oldin tayyorlanishga e'tibor berish kerak.","ru":"Если взять изучение китайского как пример, сначала нужно готовиться перед уроком.","tj":"Агар омӯзиши чиниро мисол гирем, аввал ба омодагии пеш аз дарс диққат додан лозим."},"pattern":"拿……来说"},{"l":16,"t":{"uz":"jur'at qilmoq","ru":"сметь, решаться","tj":"ҷуръат кардан"},"f":{"uz":"Fe'l oldida kelib, bir ishni qilishga jur'at yoki ishonch borligini bildiradi.","ru":"Перед глаголом показывает смелость или уверенность сделать что-то.","tj":"Пеш аз феъл омада, ҷуръат ё боварӣ ба иҷрои амалро нишон медиҳад."},"e":{"zh":"如果你敢诚实地说出自己对哪方面不了解，并不说明自己比别人差。","p":"Rúguǒ nǐ gǎn chéngshí de shuōchū zìjǐ duì nǎ fāngmiàn bù liǎojiě, bìng bù shuōmíng zìjǐ bǐ biérén chà.","uz":"Agar bilmagan tomoningni rost aytishga jur'at qilsang, bu boshqalardan yomonligingni anglatmaydi.","ru":"Если ты осмелишься честно сказать, чего не понимаешь, это не значит, что ты хуже других.","tj":"Агар ҷуръат карда рост гӯӣ, ки кадом чизро намефаҳмӣ, ин маънои аз дигарон бад буданатро надорад."},"pattern":"敢"},{"l":17,"t":{"uz":"kutilganiga qarshi ohang","ru":"наоборот; вопреки ожиданию","tj":"баръакс; хилофи интизор"},"f":{"uz":"Fe'l bo'lsa 'quymoq', ravish bo'lsa kutilganiga qarama-qarshi, tanbeh yoki yon berish ohangini beradi.","ru":"Как глагол значит 'наливать', как наречие показывает противоположность ожиданию, упрёк или уступку.","tj":"Ҳамчун феъл 'рехтан', ҳамчун зарф хилофи интизор, танбеҳ ё гузаштро медиҳад."},"e":{"zh":"去长城倒是一个好主意。","p":"Qù Chángchéng dào shì yí ge hǎo zhǔyi.","uz":"Buyuk devorga borish esa yaxshi fikr.","ru":"Съездить на Великую стену - наоборот, хорошая идея.","tj":"Ба Девори бузург рафтан бошад, фикри хуб аст."},"pattern":"倒"},{"l":17,"t":{"uz":"ish qilmoq","ru":"заниматься делом","tj":"кор кардан"},"f":{"uz":"Biror ish, kasb yoki faoliyat bilan shug'ullanishni bildiradi.","ru":"Означает заниматься делом, работой или деятельностью.","tj":"Ба иҷрои кор, касб ё фаъолият ишора мекунад."},"e":{"zh":"每次你让它干什么，它就像能听懂你的话一样去做。","p":"Měi cì nǐ ràng tā gàn shénme, tā jiù xiàng néng tīngdǒng nǐ de huà yíyàng qù zuò.","uz":"Har safar undan nima qilishni so'rasang, gapni tushungandek bajaradi.","ru":"Каждый раз, когда ты просишь его что-то сделать, он делает так, будто понимает тебя.","tj":"Ҳар дафъа аз ӯ чизе хоста шавад, гӯё суханатро фаҳмида бошад, иҷро мекунад."},"pattern":"干"},{"l":17,"t":{"uz":"borib-kelish marta","ru":"поездка туда-обратно","tj":"рафтуомади якмаротиба"},"f":{"uz":"Kelish-ketish bilan bog'liq harakatlarning marta sonini bildiradi.","ru":"Показывает количество поездок туда и обратно.","tj":"Шумораи ҳаракатҳои рафтуомадро нишон медиҳад."},"e":{"zh":"上个月我去了趟北京动物园。","p":"Shàng ge yuè wǒ qù le tàng Běijīng Dòngwùyuán.","uz":"O'tgan oy Pekin hayvonot bog'iga bir borib keldim.","ru":"В прошлом месяце я съездил в Пекинский зоопарк.","tj":"Моҳи гузашта як бор ба боғи ҳайвоноти Пекин рафтам."},"pattern":"趟"},{"l":17,"t":{"uz":"maqsad uchun","ru":"ради цели","tj":"барои мақсад"},"f":{"uz":"Oldingi qism keyingi harakatning maqsadini bildiradi.","ru":"Первая часть указывает цель действия во второй части.","tj":"Қисми аввал мақсади амали қисми дуюмро нишон медиҳад."},"e":{"zh":"植物会为了阳光、空气和水而竞争。","p":"Zhíwù huì wèile yángguāng, kōngqì hé shuǐ ér jìngzhēng.","uz":"O'simliklar quyosh nuri, havo va suv uchun raqobatlashadi.","ru":"Растения конкурируют за солнечный свет, воздух и воду.","tj":"Растаниҳо барои нури офтоб, ҳаво ва об рақобат мекунанд."},"pattern":"为了……而……"},{"l":17,"t":{"uz":"hanuz, baribir","ru":"по-прежнему, всё ещё","tj":"ҳанӯз, ҳамоно"},"f":{"uz":"Vaziyat avvalgidek o'zgarmaganini bildiradi.","ru":"Показывает, что ситуация остаётся такой же, как раньше.","tj":"Нишон медиҳад, ки вазъият мисли пеш тағйир наёфтааст."},"e":{"zh":"就算在几公里深的海底也仍然能看到东西。","p":"Jiùsuàn zài jǐ gōnglǐ shēn de hǎidǐ yě réngrán néng kàndào dōngxi.","uz":"Hatto bir necha kilometr chuqur dengiz tubida ham baribir narsalarni ko'rish mumkin.","ru":"Даже на глубине нескольких километров всё ещё можно что-то видеть.","tj":"Ҳатто дар қаъри чанд километрии баҳр ҳам чизҳоро дидан мумкин аст."},"pattern":"仍然"},{"l":18,"t":{"uz":"yoki yo'qligi","ru":"ли, является ли","tj":"оё, ё не"},"f":{"uz":"书面语da '是不是' ma'nosini beradi.","ru":"В письменной речи означает 'является ли / ли'.","tj":"Дар забони хаттӣ маънои 'оё ... ё не'-ро медиҳад."},"e":{"zh":"不过她这么小，这本书我不知道她是否能读懂。","p":"Búguò tā zhème xiǎo, zhè běn shū wǒ bù zhīdào tā shìfǒu néng dú dǒng.","uz":"Lekin u hali juda kichkina, bu kitobni tushunib o'qiy oladimi-yo'qmi bilmayman.","ru":"Но она ещё маленькая, я не знаю, сможет ли она понять эту книгу.","tj":"Аммо ӯ ҳанӯз хурд аст, намедонам ин китобро фаҳмида мехонад ё не."},"pattern":"是否"},{"l":18,"t":{"uz":"chiday olmaslik","ru":"не выдерживать","tj":"тоб оварда натавонистан"},"f":{"uz":"Og'riq, bosim, munosabat yoki holatga chiday olmaslikni bildiradi.","ru":"Означает неспособность выдержать боль, давление, отношение или ситуацию.","tj":"Натавонистани тоқат ба дард, фишор, муносибат ё вазъиятро нишон медиҳад."},"e":{"zh":"不过天天对着电脑看，眼睛实在受不了。","p":"Búguò tiāntiān duì zhe diànnǎo kàn, yǎnjing shízài shòubuliǎo.","uz":"Lekin har kuni kompyuterga tikilib o'tirishga ko'zlar chiday olmaydi.","ru":"Но если каждый день смотреть в компьютер, глаза действительно не выдерживают.","tj":"Аммо ҳар рӯз ба компютер нигоҳ карданро чашмҳо тоқат карда наметавонанд."},"pattern":"受不了"},{"l":18,"t":{"uz":"darhol keyin","ru":"сразу затем","tj":"дарҳол баъд"},"f":{"uz":"Oldingi voqeadan keyin yana bir voqea darhol davom etishini bildiradi.","ru":"Показывает, что одно событие сразу следует за другим.","tj":"Нишон медиҳад, ки як воқеа дарҳол баъди воқеаи дигар меояд."},"e":{"zh":"接着又梦见我跳到车上，跟警察一起抓住了一个坏人。","p":"Jiēzhe yòu mèngjiàn wǒ tiàodào chē shang, gēn jǐngchá yìqǐ zhuāzhù le yí ge huàirén.","uz":"Keyin yana mashinaga sakrab, politsiya bilan birga yomon odamni ushlaganimni tush ko'rdim.","ru":"Затем мне снова приснилось, что я запрыгнул в машину и вместе с полицейским поймал преступника.","tj":"Баъд боз хоб дидам, ки ба мошин ҷаҳида, бо полис як одами бадро дастгир кардам."},"pattern":"接着"},{"l":18,"t":{"uz":"bundan tashqari","ru":"кроме этого","tj":"ғайр аз ин"},"f":{"uz":"Oldin aytilgan narsadan tashqari qo'shimcha fikr kiritadi.","ru":"Вводит дополнительную мысль помимо сказанного.","tj":"Ба ғайр аз фикри гуфташуда маълумоти иловагӣ меорад."},"e":{"zh":"除此以外，你还可以用它来听音乐、看电影、阅读、玩儿游戏、付款购物等。","p":"Chúcǐ yǐwài, nǐ hái kěyǐ yòng tā lái tīng yīnyuè, kàn diànyǐng, yuèdú, wánr yóuxì, fù kuǎn gòuwù děng.","uz":"Bundan tashqari, undan musiqa eshitish, kino ko'rish, o'qish, o'yin o'ynash va to'lov qilish uchun ham foydalansa bo'ladi.","ru":"Кроме этого, его можно использовать для музыки, фильмов, чтения, игр и оплаты покупок.","tj":"Ғайр аз ин, онро барои мусиқӣ, филм, хондан, бозӣ ва пардохти харид истифода бурдан мумкин аст."},"pattern":"除此以外"},{"l":18,"t":{"uz":"... deb atamoq","ru":"называть ...","tj":"... номидан"},"f":{"uz":"把 dan keyingi narsa keyingi nom bilan atalishini bildiradi.","ru":"Показывает, что объект после 把 называется последующим именем.","tj":"Нишон медиҳад, ки объекти пас аз 把 бо номи баъдӣ номида мешавад."},"e":{"zh":"所以现在人们都把地球叫作“地球村”。","p":"Suǒyǐ xiànzài rénmen dōu bǎ dìqiú jiàozuò “dìqiú cūn”.","uz":"Shuning uchun hozir odamlar Yerni “global qishloq” deb ataydi.","ru":"Поэтому сейчас люди называют Землю «глобальной деревней».","tj":"Аз ин рӯ ҳоло одамон Заминро «деҳаи ҷаҳонӣ» меноманд."},"pattern":"把……叫作……"},{"l":19,"t":{"uz":"so'roq olmoshining umumiy ma'nosi","ru":"вопросительные местоимения в обобщённом значении","tj":"ҷонишинҳои саволӣ бо маънои умумӣ"},"f":{"uz":"什么, 谁, 哪, 哪儿, 怎么 kabi so'roq olmoshlari 都/也 bilan 'har qanday/hamma' ma'nosini bera oladi.","ru":"什么, 谁, 哪, 哪儿, 怎么 с 都/也 могут значить 'любой/все'.","tj":"什么, 谁, 哪, 哪儿, 怎么 бо 都/也 маънои 'ҳар чиз/ҳама'-ро дода метавонанд."},"e":{"zh":"谁都有粗心填错的时候。","p":"Shéi dōu yǒu cūxīn tián cuò de shíhou.","uz":"Har kim beparvolik qilib noto'g'ri to'ldiradigan payti bo'ladi.","ru":"У любого бывает момент, когда он по невнимательности заполняет неправильно.","tj":"Ҳар кас гоҳе аз беэътиноӣ нодуруст пур мекунад."},"pattern":"疑问代词活用"},{"l":19,"t":{"uz":"natijaga yetish","ru":"достигнуть результата","tj":"ба натиҷа расидан"},"f":{"uz":"Fe'ldan keyin kelib maqsadga yetgan yoki yetolmaganini bildiradi.","ru":"После глагола показывает, достигнута ли цель действия.","tj":"Пас аз феъл омада, расидан ё нарасидан ба мақсадро нишон медиҳад."},"e":{"zh":"看来今天吃不上羊肉饺子了。","p":"Kànlái jīntiān chī bu shàng yángròu jiǎozi le.","uz":"Ko'rinishidan, bugun qo'y go'shtli chuchvara yeyolmaymiz.","ru":"Похоже, сегодня не удастся поесть пельмени с бараниной.","tj":"Маълум мешавад, имрӯз самбӯсаи гӯсфандиро хӯрда наметавонем."},"pattern":"上"},{"l":19,"t":{"uz":"yashiringan narsani ko'rsatish","ru":"выявить, проявиться","tj":"ошкор шудан"},"f":{"uz":"Fe'ldan keyin kelib, narsa yo'qdan bor bo'lishi yoki yashiringan holatdan ko'rinishi ma'nosini beradi.","ru":"После глагола показывает, что нечто появилось или стало видимым.","tj":"Пас аз феъл омаданаш пайдо ё ошкор шудани чизро мефаҳмонад."},"e":{"zh":"没看出来你跳得这么好！","p":"Méi kàn chūlai nǐ tiào de zhème hǎo!","uz":"Bunchalik yaxshi raqs tushishingni bilmagan ekanman!","ru":"Не было видно, что ты так хорошо танцуешь!","tj":"Маълум набуд, ки ту ин қадар хуб мерақсӣ!"},"pattern":"出来"},{"l":19,"t":{"uz":"umuman olganda","ru":"в целом","tj":"умуман"},"f":{"uz":"Umumiy baho yoki asosiy xulosani kiritadi.","ru":"Вводит общую оценку или главный вывод.","tj":"Баҳодиҳии умумӣ ё хулосаи асосиро меорад."},"e":{"zh":"总的来说，这套房子他很满意。","p":"Zǒng de lái shuō, zhè tào fángzi tā hěn mǎnyì.","uz":"Umuman olganda, u bu uydan juda mamnun.","ru":"В целом он очень доволен этой квартирой.","tj":"Умуман, ӯ аз ин хона хеле розӣ аст."},"pattern":"总的来说"},{"l":19,"t":{"uz":"mohiyati ...da","ru":"суть заключается в","tj":"моҳият дар ... аст"},"f":{"uz":"Narsaning asosiy sababi yoki mohiyatini ko'rsatadi, ko'proq yozma tilda ishlati atilgan?\n上海话听起来就像外语一样。","ru":"Какая грамматика использована?\n上海话听起来就像外语一样。","tj":"Кадом грамматика истифода шудааст?\n上海话听起来就像外语一样。"},"opts":["起来","连……也/都……","否则","无论……都/也……"],"a":0,"explanation":{"uz":"Fe'ldan keyin kelib harakat boshlanishi, yuqoriga yo'nalish yoki biror narsa qanday eshitilishi/ko'rinishini bildiradi.","ru":"После глагола показывает начало действия, движение вверх или впечатление: как что-то звучит/выглядит.","tj":"Пас аз феъл омада оғоз, самти боло ё чӣ гуна шунида/дида шудани чизро медиҳад."}},{"l":20,"q":{"uz":"Qaysi grammatika ishlatilgan?\n说起吃的东西，给我印象最深的是湖南菜。","ru":"Какая грамматика использована?\n说起吃的东西，给我印象最深的是湖南菜。","tj":"Кадом грамматика истифода шудааст?\n说起吃的东西，给我印象最深的是湖南菜。"},"opts":["V+起","连……也/都……","否则","无论……都/也……"],"a":0,"explanation":{"uz":"说, 谈, 讲, 问 kabi fe'llar bilan kelib, gap qaysi mavzudan boshlanayotganini bildiradi.","ru":"С глаголами 说, 谈, 讲, 问 и подобными вводит тему разговора.","tj":"Бо феълҳои 说, 谈, 讲, 问 ва монанд мавзуи гуфторро мекушояд."}}]}}</script>

<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<style>
:root{color-scheme:dark;--bg:#090b10;--bg2:#111722;--bg3:#182131;--card:#121923;--card2:#172031;--border:rgba(148,163,184,.16);--border2:rgba(148,163,184,.28);--text:#f4f7fb;--text2:#aab4c5;--text3:#6f7a91;--accent:#5b8cff;--accent-dim:rgba(91,140,255,.16);--green:#35d07f;--green-dim:rgba(53,208,127,.14);--amber:#f2b84b;--amber-dim:rgba(242,184,75,.15);--red:#ff6b6b;--red-dim:rgba(255,107,107,.14);--purple:#b58cff;--purple-dim:rgba(181,140,255,.15);--shadow:0 16px 44px rgba(0,0,0,.26);--nav:64px;--r:14px;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--mono:"SF Mono","Fira Code",monospace}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:radial-gradient(circle at 14% -10%,rgba(91,140,255,.18),transparent 34%),linear-gradient(180deg,#0b0e15 0%,var(--bg) 48%,#07090d 100%);color:var(--text);font-family:var(--font);overscroll-behavior:none}
body{overflow:hidden}
button,input{font:inherit}
button{touch-action:manipulation;transition:all .18s ease}
button:active{transform:scale(.97)}
.page{position:fixed;inset:0 0 calc(var(--nav) + env(safe-area-inset-bottom,0px));overflow-y:auto;display:none;background:transparent;animation:fadeSlide .18s ease}
.page.active{display:block}
.page-header{padding:20px 16px 12px;background:linear-gradient(180deg,rgba(17,23,34,.96),rgba(9,11,16,.86));position:sticky;top:0;z-index:5;backdrop-filter:blur(18px);border-bottom:1px solid rgba(148,163,184,.08)}
.eyebrow{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:1px;text-transform:uppercase}
.page-title{font-size:24px;font-weight:800;letter-spacing:0;margin-top:4px}
.page-sub{font-size:12px;color:var(--text3);line-height:1.5;margin-top:4px}
.nav{position:fixed;left:0;right:0;bottom:0;height:calc(var(--nav) + env(safe-area-inset-bottom,0px));padding-bottom:env(safe-area-inset-bottom,0px);display:grid;grid-template-columns:repeat(5,1fr);background:rgba(9,11,16,.92);border-top:1px solid var(--border);backdrop-filter:blur(22px);z-index:20}
.nav button{border:0;background:none;color:var(--text3);font-size:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;min-width:0}
.nav button.active{color:var(--accent);background:linear-gradient(180deg,rgba(91,140,255,.12),transparent)}
.nav b{font-size:19px;font-weight:500;line-height:1}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px 16px 10px}
.kpi{background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--border);border-radius:var(--r);padding:12px;box-shadow:0 12px 34px rgba(0,0,0,.18)}
.kpi strong{display:block;font-family:var(--mono);font-size:22px}
.kpi span{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.progress{height:4px;background:var(--bg3);border-radius:4px;margin-top:9px;overflow:hidden}
.progress i{height:100%;display:block;border-radius:4px;background:var(--accent);transition:width .22s ease}
.toolbar,.filters{display:flex;gap:7px;padding:8px 16px 10px;overflow:auto;scrollbar-width:none}

function renderVoiceFrame(force=false){const frame=document.getElementById("voice-frame");if(!frame)return;let base="/voice-practice.html";try{base=new URL("/voice-practice.html",parent.location.origin).toString()}catch(e){}const url=new URL(base,window.location.href);url.searchParams.set("embedded","1");url.searchParams.set("level",LEVEL_KEY);url.searchParams.set("lang",lang);url.searchParams.set("v","20260623-v2");const src=url.toString();if(force||frame.dataset.src!==src){frame.dataset.src=src;frame.src=src}}
function applyLaunchRoute(){const target=normalizeLaunchTab(LAUNCH.tab),hasLesson=LESSONS.some(item=>item.n===launchLesson);if(hasLesson&&target==="flashcards")fcFilter=launchLesson;if(hasLesson&&target==="grammar")grammarFilter=launchLesson;if(hasLesson&&target==="quiz")quizLesson=launchLesson;if(LAUNCH.mode==="quiz"&&hasLesson){quizLesson=launchLesson;showPage("quiz");startQuiz();return}if(target)showPage(target)}
function renderKPIs(){const done=state.done.filter(n=>LESSONS.some(l=>l.n===n)).length,pct=Math.round(done/Math.max(LESSONS.length,1)*100);document.getElementById("kpis").innerHTML=[["done",done,I18N[lang].done,pct],["left",LESSONS.length-done,I18N[lang].left,100-pct],["stars",stars.length,I18N[lang].saved,Math.min(stars.length/Math.max(limit("starred_limit",3),1)*100,100)]].map(([key,value,label,width])=>`<div class="kpi"><strong>${value}</strong><span>${esc(label)}</span><div class="progress"><i style="width:${width}%"></i></div></div>`).join("")}

function hash(text){let value=0;for(let i=0;i<text.length;i++)value=(value*31+text.charCodeAt(i))>>>0;return value}
function shuffled(items,seed){const list=[...items];for(let i=list.length-1;i>0;i--){const j=hash(`${seed}:${i}`)%(i+1);[list[i],list[j]]=[list[j],list[i]]}return list}
function pickDistractors(word,field){const same=VOCAB.filter(item=>item.h!==word.h&&item.l===word.l),near=VOCAB.filter(item=>item.h!==word.h&&Math.abs(item.l-word.l)<=2),all=VOCAB.filter(item=>item.h!==word.h),pool=[...same,...near,...all];const values=[];for(const item of pool){const value=field==="m"?tr(item.m):item[field];if(value&&!values.includes(value))values.push(value);if(values.length===3)break}return values}
function vocabQuestion(word,type){let q,answer,opts;if(type==="meaning"){q={uz:`“${word.h}” nimani anglatadi?`,ru:`Что означает “${word.h}”?`,tj:`“${word.h}” чӣ маъно дорад?`};answer=tr(word.m);opts=[answer,...pickDistractors(word,"m")]}else if(type==="hanzi"){q={uz:`“${tr(word.m)}” qaysi so‘z?`,ru:`Какое слово означает “${tr(word.m)}”?`,tj:`Кадом калима маънои “${tr(word.m)}”-ро дорад?`};answer=word.h;opts=[answer,...pickDistractors(word,"h")]}else{q={uz:`“${word.h}” pinyin qaysi?`,ru:`Какой pinyin у “${word.h}”?`,tj:`Pinyin-и “${word.h}” кадом аст?`};answer=word.p;opts=[answer,...pickDistractors(word,"p")]}opts=shuffled([...new Set(opts)].slice(0,4),`${LEVEL_KEY}:${word.l}:${word.h}:${type}:${lang}`);return{l:word.l,q,opts,a:opts.indexOf(answer),explanation:{uz:`To‘g‘ri javob: ${answer}`,ru:`Правильный ответ: ${answer}`,tj:`Ҷавоби дуруст: ${answer}`}}}
function grammarQuestion(lesson){const item=QUIZ.find(q=>q.l===lesson);if(!item)return null;const opts=shuffled(item.opts,`${LEVEL_KEY}:${lesson}:grammar:${lang}`),answer=item.opts[item.a];return{...item,opts,a:opts.indexOf(answer)}}
function buildLessonQuiz(lesson){const words=VOCAB.filter(word=>word.l===lesson),types=["meaning","hanzi","pinyin","meaning"];const selected=words.slice(0,4).map((word,index)=>vocabQuestion(word,types[index]));const grammar=grammarQuestion(lesson);if(grammar)selected.push(grammar);for(let index=4;selected.length<5&&index<words.length;index++)selected.push(vocabQuestion(words[index],types[index%types.length]));return selected}
function attempts(){return safeJSON(ATTEMPT_KEY,{})}

function canStartQuiz(lesson){if(limit("quiz_per_lesson_24h",1)>1)return true;const last=attempts()[quizKey(lesson)]?.last_attempt_at;if(!last)return true;return Date.now()-new Date(last).getTime()>=86400000}
function saveQuizAttempt(lesson,score,total,percent){if(limit("quiz_per_lesson_24h",1)>1)return;const all=attempts();all[quizKey(lesson)]={last_attempt_at:new Date().toISOString(),score,total,percent};saveJSON(ATTEMPT_KEY,all)}

function renderQuizStart(){document.getElementById("score-box").style.display="none";const box=document.getElementById("quiz-box");box.style.display="block";box.innerHTML=`<div class="lesson-no">${esc(I18N[lang].lesson)} ${quizLesson}</div><div class="lesson-title">${esc(tr(LESSONS.find(l=>l.n===quizLesson)?.t))}</div><button class="btn primary" onclick="startQuiz()">${esc(I18N[lang].startQuiz)}</button>`}

function startQuizReady(){if(!canStartQuiz(quizLesson)){showLimitModal("quiz_24h",{lesson:quizLesson});return}questions=buildLessonQuiz(quizLesson);answers=Array(questions.length).fill(null);qIndex=0;document.getElementById("score-box").style.display="none";document.getElementById("quiz-box").style.display="block";renderQuizQuestion()}

function finishQuiz(){const wrong=[];let score=0;questions.forEach((q,index)=>{if(answers[index]===q.a)score+=1;else wrong.push({question:tr(q.q),user_answer:q.opts[answers[index]]||"—",correct_answer:q.opts[q.a],explanation:tr(q.explanation)||`${I18N[lang].correctAnswer}: ${q.opts[q.a]}`})});const total=questions.length,percent=Math.round(score/Math.max(total,1)*100);lastWrongItems=wrong;lastQuizScore=score;lastQuizTotal=total;lastQuizPercent=percent;saveQuizAttempt(quizLesson,score,total,percent);state.quizScores[quizLesson]={score,total,percent};saveState();reportEvent("study_quiz_completed",{lesson_id:quizLesson,score,total,percent,answers,wrong_items:wrong});document.getElementById("quiz-box").style.display="none";const box=document.getElementById("score-box");box.style.display="block";const status=percent>=90?I18N[lang].excellent:percent>=60?I18N[lang].good:I18N[lang].repeat;box.innerHTML=`<div class="score-main"><div class="lesson-no">${esc(I18N[lang].score)}</div><strong>${percent}%</strong><span>${score} / ${total} · ${esc(status)}</span></div>${analysisHTML(wrong)}${discussionHTML(wrong)}<button class="btn primary" onclick="startQuiz()">${esc(I18N[lang].restart)}</button>`;renderLessons()}
function analysisHTML(wrong){if(ACCESS.limits?.wrong_analysis===true){return`<div class="analysis">${wrong.length?wrong.map(item=>`<div class="wrong"><b>${esc(item.question)}</b><p class="bad">✕ ${esc(I18N[lang].userAnswer)}: ${esc(item.user_answer)}</p><p class="good">✓ ${esc(I18N[lang].correctAnswer)}: ${esc(item.correct_answer)}</p><p>${esc(item.explanation)}</p></div>`).join(""):`<div class="wrong good">✓ ${esc(I18N[lang].noErrors)}</div>`}</div>`}const item=(LIMIT_TEXT[lang]||LIMIT_TEXT.uz).wrong_analysis;return`<div class="analysis"><div class="locked"><b>${esc(item[0])}</b><p>${esc(item[1])}</p><button class="btn primary" onclick="showLimitModal('wrong_analysis')">${esc(I18N[lang].subscribe)}</button></div></div>`}

<script>
const tg=window.Telegram?.WebApp;

const LEVEL_KEY="hsk_all_current_level_v3",LANG_KEY="hsk_all_current_lang_v3",ACCESS_CACHE_KEY="hsk_all_access_cache_v1",ACCESS_CACHE_TTL=600000;

let ACCESS=ACCESS_FALLBACK,accessReady=false,accessPromise=null,currentLevel="hsk1",currentLang="ru";
function safeJSON(key,fallback){try{return JSON.parse(localStorage.getItem(key)||JSON.stringify(fallback))}catch(e){return fallback}}

window.MiniAppBridge={getAccess:()=>ACCESS,ensureAccess,getLevel:()=>currentLevel,getLanguage:()=>currentLang,getLaunchParams:()=>Object.fromEntries(params()),reportEvent,openSubscribe:openSubscribeFromMiniApp,discussQuiz:discussQuizFromMiniApp,openRoute};

function resolveInitial(useAccess=false){const query=params(),backendLevel=useAccess?ACCESS.level:"",backendLang=useAccess?ACCESS.language:"";currentLevel=normalizeLevel(query.get("level")||backendLevel||localStorage.getItem(LEVEL_KEY)||"hsk1",query.get("lesson"));currentLang=query.get("lang")||backendLang||localStorage.getItem(LANG_KEY)||"ru";if(!COURSE_DATA[currentLevel])currentLevel="hsk1";if(!["uz","ru","tj"].includes(currentLang))currentLang="ru";localStorage.setItem(LEVEL_KEY,currentLevel);localStorage.setItem(LANG_KEY,currentLang)}

</script>
