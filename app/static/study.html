"Кадом грамматика истифода шудааст?\n明天天气怎么样？"},"opts":["怎么样","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"怎么样(zěnmeyàng) — holat, sifat yoki fikrni so'rash uchun ishlatiladi.\nTuzilish: Ega + 怎么样?\n\n天气怎么样？— Ob-havo qanday?\n你身体怎么样？— Sog'ligingiz qanday?\n你的汉语怎么样？— Xitoy tilingiz qanday?","ru":"怎么样(zěnmeyàng) — используется для спроса о состоянии, качестве или мнении.\nСтруктура: Подлежащее + 怎么样?\n\n天气怎么样？— Какая погода?\n你身体怎么样？— Как ваше здоровье?\n你的汉语怎么样？— Как ваш китайский?","tj":"怎么样(zěnmeyàng) — барои пурсидани ҳол, сифат ё андеша истифода мешавад.\nСохтор: Муб. + 怎么样?\n\n天气怎么样？— Обу ҳаво чӣ хел аст?\n你身体怎么样？— Саломатии шумо чӣ хел аст?\n你的汉语怎么样？— Забони чинии шумо чӣ хел аст?"}},{"l":12,"q":{"uz":"Qaysi grammatika ishlatilgan?\n太热了！","ru":"Какая грамматика использована?\n太热了！","tj":"Кадом грамматика истифода шудааст?\n太热了！"},"opts":["太……了","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"太(tài) + Sifat + 了 — 'juda, haddan tashqari'\nInkor: 不太 + Sifat (了 ishlatilmaydi)\n\n天气太热了。— Ob-havo juda issiq.\n太冷了！— Juda sovuq!\n我身体不太好。— Sog'ligim unchalik yaxshi emas.","ru":"太(tài) + Прилагательное + 了 — 'слишком, очень'\nОтрицание: 不太 + Прилагательное (без 了)\n\n天气太热了。— Погода слишком жаркая.\n太冷了！— Слишком холодно!\n我身体不太好。— Здоровье не очень хорошее.","tj":"太(tài) + Сифат + 了 — 'хеле зиёд, аз ҳад зиёд'\nИнкор: 不太 + Сифат (بدуни 了)\n\n天气太热了。— Обу ҳаво хеле гарм аст.\n太冷了！— Хеле сард аст!\n我身体不太好。— Саломатиям зияд хуб нест."}},{"l":12,"q":{"uz":"Qaysi grammatika ishlatilgan?\n今天会下雨吗？","ru":"Какая грамматика использована?\n今天会下雨吗？","tj":"Кадом грамматика истифода шудааст?\n今天会下雨吗？"},"opts":["能愿动词 会 (2)","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"会 — kelajakda biror narsa sodir bo'lish ehtimolini bildiradi.\n\n今天会下雨吗？— Bugun yomg'ir yog'adimi?\n她会来吗？— U keladimi?\n不会 — bo'lmaydi, sodir bo'lmaydi","ru":"会 — указывает на вероятность наступления события в будущем.\n\n今天会下雨吗？— Сегодня будет дождь?\n她会来吗？— Она придёт?\n不会 — не произойдёт, не будет","tj":"会 — эҳтимоли рӯй додани чизеро дар оянда нишон медиҳад.\n\n今天会下雨吗？— Имрӯз борон меборад?\n她会来吗？— Ӯ меояд?\n不会 — намешавад, рӯй намедиҳад"}},{"l":13,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我在看书呢。","ru":"Какая грамматика использована?\n我在看书呢。","tj":"Кадом грамматика истифода шудааст?\n我在看书呢。"},"opts":["在……呢","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"Hozir davom etayotgan harakat uchun:\n1-tuzilish: 在 + Fe'l (+ To'ldiruvchi)\n2-tuzilish: Fe'l + To'ldiruvchi + 呢\n3-tuzilish: 在 + Fe'l + 呢 (ta'kidlash uchun)\n\nMisol:\n我在看书呢。— Men hozir kitob o'qiyapman.\n他在学做中国菜呢。— U hozir xitoy taomi pishirishni o'rganayapti.\n\nInkor: 没(在) + Fe'l, 呢 ishlatilmaydi\n他没看书。— U kitob o'qiyotgani yo'q.\n他们没在工作。— Ular ishlamayapti.","ru":"Для действия, происходящего прямо сейчас:\nСтруктура 1: 在 + Глагол (+ Дополнение)\nСтруктура 2: Глагол + Дополнение + 呢\nСтруктура 3: 在 + Глагол + 呢 (усиленная)\n\nПример:\n我在看书呢。— Я сейчас читаю книгу.\n他在学做中国菜呢。— Он сейчас учится готовить китайскую еду.\n\nОтрицание: 没(在) + Глагол, без 呢\n他没看书。— Он не читает.\n他们没在工作。— Они не работают.","tj":"Барои амали ҳоло ҷоришуда:\nСохтори 1: 在 + Феъл (+ Пуркунанда)\nСохтори 2: Феъл + Пуркунанда + 呢\nСохтори 3: 在 + Феъл + 呢 (таъкидӣ)\n\nНамуна:\n我在看书呢。— Ман ҳоло китоб мехонам.\n他在学做中国菜呢。— Ӯ ҳоло тарзи пухтани хӯроки чинӣро меомӯзад.\n\nИнкор: 没(在) + Феъл, бе 呢\n他没看书。— Ӯ китоб намехонад.\n他们没在工作。— Онҳо кор намекунанд."}},{"l":13,"q":{"uz":"Qaysi grammatika ishlatilgan?\n大卫也在看书吗？","ru":"Какая грамматика использована?\n大卫也在看书吗？","tj":"Кадом грамматика истифода шудааст?\n大卫也在看书吗？"},"opts":["也","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"也(yě) — 'ham, shuningdek' ma'nosini bildiradi.\nHar doim fe'l yoki modal fe'ldan oldin keladi.\n\nMisol:\n大卫也在看书吗？— Devid ham kitob o'qiyaptimi?\n我也喜欢看电影。— Men ham kino ko'rishni yaxshi ko'raman.\n她也是老师。— U ham o'qituvchi.","ru":"也(yě) — означает 'тоже, также'.\nВсегда стоит перед глаголом или модальным глаголом.\n\nПример:\n大卫也在看书吗？— Дэвид тоже читает?\n我也喜欢看电影。— Мне тоже нравится кино.\n她也是老师。— Она тоже учитель.","tj":"也(yě) — маънои 'ҳам, инчунин' дорад.\nҲамеша пеш аз феъл ё феъли модалӣ меояд.\n\nНамуна:\n大卫也在看书吗？— Дэвид ҳам китоб мехонад?\n我也喜欢看电影。— Ман ҳам кино тамошо карданро дӯст дорам.\n她也是老师。— Ӯ ҳам омӯзгор аст."}},{"l":13,"q":{"uz":"Qaysi grammatika ishlatilgan?\n你下午打吧。","ru":"Какая грамматика использована?\n你下午打吧。","tj":"Кадом грамматика истифода шудааст?\n你下午打吧。"},"opts":["吧","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"吧(ba) — taklif, maslahat yoki yumshatilgan buyruqni bildiradi.\nGapning oxirida keladi.\n\nMisol:\n你下午打吧。— Tushdan keyin qo'ng'iroq qiling.\n今天我们在家吃饭吧。— Bugun uyda ovqatlanaylik.\n请坐吧。— Marhamat, o'tiring.","ru":"吧(ba) — выражает предложение, совет или мягкую команду.\nСтоит в конце предложения.\n\nПример:\n你下午打吧。— Позвоните после обеда.\n今天我们在家吃饭吧。— Давайте сегодня поедим дома.\n请坐吧。— Пожалуйста, садитесь.","tj":"吧(ba) — пешниҳод, маслиҳат ё амри мулоимро баён мекунад.\nДар охири ҷумла меояд.\n\nНамуна:\n你下午打吧。— Баъдазнисфирӯзӣ занг бизанед.\n今天我们在家吃饭吧。— Имрӯз дар хона хӯрок хӯрем.\n请坐吧。— Хоҳиш мекунам, биниш."}},{"l":14,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我去商店了。","ru":"Какая грамматика использована?\n我去商店了。","tj":"Кадом грамматика истифода шудааст?\n我去商店了。"},"opts":["了 — harakat tugallangani","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"了(le) gapning oxirida — harakatning sodir bo'lganligi yoki tugallanganligini bildiradi.\n\nTuzilish:\nEga + Fe'l + 了 (gapning oxiri)\nEga + Fe'l + 了 + Son/Sifat + Ot\n\nMisol:\n我去商店了。— Men do'konga bordim.\n她买了不少衣服。— U juda ko'p kiyim sotib oldi.\n\nInkor: 没 + Fe'l (了 tushirib qoldiriladi)\n我没买。— Men hech narsa sotib olmadim.\n她没去商店。— U do'konga bormadi.","ru":"了(le) в конце предложения — указывает, что действие произошло или завершилось.\n\nСтруктура:\nПодлежащее + Глагол + 了 (конец предложения)\nПодлежащее + Глагол + 了 + Число/Прилагательное + Существительное\n\nПример:\n我去商店了。— Я ходил в магазин.\n她买了不少衣服。— Она купила немало одежды.\n\nОтрицание: 没 + Глагол (了 опускается)\n我没买。— Я ничего не купил.\n她没去商店。— Она не ходила в магазин.","tj":"了(le) дар охири ҷумла — нишон медиҳад, ки амал рӯй додааст ё анҷом ёфтааст.\n\nСохтор:\nМуб. + Феъл + 了 (охири ҷумла)\nМуб. + Феъл + 了 + Адад/Сифат + Исм\n\nНамуна:\n我去商店了。— Ман ба дӯкон рафтам.\n她买了不少衣服。— Ӯ хеле зиёд либос харид.\n\nИнкор: 没 + Феъл (了 меафтад)\n我没买。— Ман ҳеҷ чиз нахаридам.\n她没去商店。— Ӯ ба дӯкон нарафт."}},{"l":14,"q":{"uz":"Qaysi grammatika ishlatilgan?\n40分钟后回来。","ru":"Какая грамматика использована?\n40分钟后回来。","tj":"Кадом грамматика истифода шудааст?\n40分钟后回来。"},"opts":["名词 后","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"后(hòu) — muayyan voqeadan keyingi vaqtni bildiradi.\n\n40分钟后 — 40 daqiqadan keyin\n三天后 — uch kundan keyin\n一个星期后 — bir haftadan keyin\n五点后 — soat beshdan keyin\n\nMisol:\n40分钟后回来。— 40 daqiqadan keyin qaytadi.\n三天后我去北京。— Uch kundan keyin Pekinga boraman.","ru":"后(hòu) — указывает на момент времени после определённого события.\n\n40分钟后 — через 40 минут\n三天后 — через три дня\n一个星期后 — через одну неделю\n五点后 — после пяти часов\n\nПример:\n40分钟后回来。— Вернётся через 40 минут.\n三天后我去北京。— Я поеду в Пекин через три дня.","tj":"后(hòu) — лаҳзаи вақтро баъд аз рӯйдоди муайян нишон медиҳад.\n\n40分钟后 — баъд аз 40 дақиқа\n三天后 — баъд аз се рӯз\n一个星期后 — баъд аз як ҳафта\n五点后 — баъд аз соати панҷ\n\nНамуна:\n40分钟后回来。— Баъд аз 40 дақиқа бармегардад.\n三天后我去北京。— Баъд аз се рӯз ман ба Пекин меравам."}},{"l":14,"q":{"uz":"Qaysi grammatika ishlatilgan?\n这些都是王方的东西。","ru":"Какая грамматика использована?\n这些都是王方的东西。","tj":"Кадом грамматика истифода шудааст?\n这些都是王方的东西。"},"opts":["副词 都","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"都(dōu) — 'hammasi, barchasi, ikkalasi' ma'nosini bildiradi.\nMuhim: sanab o'tilayotgan narsalar 都 DAN OLDIN keladi.\n\nMisol:\n这些都是王方的东西。— Bular hammasi Van Fanning narsalari.\n我们都是中国人。— Biz hammamiz xitoylarmiz.\n他们都喜欢喝茶。— Ularning hammasi choy ichishni yaxshi ko'radi.","ru":"都(dōu) — означает 'все, всё, оба'.\nВажно: перечисляемые объекты стоят ПЕРЕД 都.\n\nПример:\n这些都是王方的东西。— Всё это вещи Ван Фан.\n我们都是中国人。— Мы все китайцы.\n他们都喜欢喝茶。— Они все любят пить чай.","tj":"都(dōu) — маънои 'ҳама, тамом, ҳарду' дорад.\nМуҳим: чизҳои шуморидашуда ПЕШ АЗ 都 меоянд.\n\nНамуна:\n这些都是王方的东西。— Инҳо ҳама чизҳои Ван Фан аст.\n我们都是中国人。— Мо ҳама чинӣ ҳастем.\n他们都喜欢喝茶。— Онҳо ҳама чой нӯшиданро дӯст доранд."}},{"l":15,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我们是2011年认识的。","ru":"Какая грамматика использована?\n我们是2011年认识的。","tj":"Кадом грамматика истифода шудааст?\n我们是2011年认识的。"},"opts":["是……的 — Vaqt, joy va usulni ta'kidlash","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"是……的 konstruktsiyasi allaqachon sodir bo'lgan harakatning vaqti, joyi yoki usulini ta'kidlash uchun ishlatiladi.\n\nTuzilishi:\nEga + 是 + [Vaqt/Joy/Usul] + Fe'l + 的\n\nVaqtni ta'kidlash:\n我们是2011年认识的。— Biz 2011-yilda tanishdik.\n\nJoyni ta'kidlash:\n我们是在学校认识的。— Biz maktabda tanishdik.\n\nUsulni ta'kidlash:\n我是坐飞机来的。— Men samolyot bilan keldim.\n\nInkor: 不是……的\n我不是坐出租车来的。— Men taksi bilan kelmaganman.","ru":"Конструкция 是……的 используется для выделения времени, места или способа уже совершённого действия.\n\nСтруктура:\nПодлежащее + 是 + [Время/Место/Способ] + Глагол + 的\n\nВыделение времени:\n我们是2011年认识的。— Мы познакомились в 2011 году.\n\nВыделение места:\n我们是在学校认识的。— Мы познакомились в школе.\n\nВыделение способа:\n我是坐飞机来的。— Я прилетел на самолёте.\n\nОтрицание: 不是……的\n我不是坐出租车来的。— Я не приехал на такси.","tj":"Сохтори 是……的 барои таъкид кардани вақт, ҷой ё усули амали аллакай анҷомёфта истифода мешавад.\n\nСохтор:\nМубтадо + 是 + [Вақт/Ҷой/Усул] + Феъл + 的\n\nТаъкиди вақт:\n我们是2011年认识的。— Мо дар соли 2011 шинос шудем.\n\nТаъкиди ҷой:\n我们是在学校认识的。— Мо дар мактаб шинос шудем.\n\nТаъкиди усул:\n我是坐飞机来的。— Ман бо ҳавопаймо омадам.\n\nИнкор: 不是……的\n我不是坐出租车来的。— Ман бо таксӣ наомадам."}},{"l":15,"q":{"uz":"Qaysi grammatika ishlatilgan?\n2011年9月认识的","ru":"Какая грамматика использована?\n2011年9月认识的","tj":"Кадом грамматика истифода шудааст?\n2011年9月认识的"},"opts":["日期的表达(2) — To'liq sana ifodalash","四声","变调 (3+3)","不 — inkor yuklamasi"],"a":0,"explanation":{"uz":"Xitoy tilida to'liq sana eng kattadan eng kichigiga qadar ifodalanadi:\nYil + Oy + Kun + Haftaning kuni\n\nYilni o'qish: har bir raqam alohida o'qiladi\n2011 → 二零一一年 (èr líng yī yī nián)\n2024 → 二零二四年 (èr líng èr sì nián)\n\nTo'liq misol:\n2011年9月10号，星期三\n2011-yil, sentabr, 10-chi, chorshanba","ru":"В китайском языке полная дата выражается от большего к меньшему:\nГод + Месяц + День + День недели\n\nЧтение года: каждая цифра читается отдельно\n2011 → 二零一一年 (èr líng yī yī nián)\n2024 → 二零二四年 (èr líng èr sì nián)\n\nПолный пример:\n2011年9月10号，星期三\n2011 год, сентябрь, 10-е, среда","tj":"Дар забони чинӣ санаи пурра аз калон ба хурд ифода мешавад:\nСол + Моҳ + Рӯз + Рӯзи ҳафта\n\nХондани сол: ҳар рақам алоҳида хонда мешавад\n2011 → 二零一一年 (èr líng yī yī nián)\n2024 → 二零二四年 (èr líng èr sì nián)\n\nМисоли пурра:\n2011年9月10号，星期三\nСоли 2011, сентябр, 10-ум, чоршанбе"}}]},"hsk2":{"key":"hsk2","label":"HSK 2","LESSONS":[{"n":1,"t":{"uz":"九月去北京旅游最好","ru":"九月去北京旅游最好","tj":"九月去北京旅游最好"},"sub":{"uz":"Sayohat, sport va kundalik hayot mavzularida suhbat qurish; 要, 最 va taxminiy sonlarni ishlatishni o'rganish.","ru":"Научиться вести беседу о путешествиях, спорте и повседневной жизни; освоить вспомогательный глагол 要, наречие степени 最 и приблизительные числа.","tj":"Гуфтугӯ дар мавзӯи сафар, варзиш ва ҳаёти рӯзмарра; омӯхтани феъли ёрдамии 要, зарфи дараҷаи 最 ва рақамҳои тахминӣ."},"g":["助动词：要","程度副词：最","概数的表达：几、多"]},{"n":2,"t":{"uz":"我每天六点起床","ru":"我每天六点起床","tj":"我每天六点起床"},"sub":{"uz":"Kundalik hayot tartibi, sog'liq va jismoniy faoliyat haqida gapira olish; 是不是 savol qolipini, 每 olmoshini va 多 so'roq olmoshini o'zlashtirish.","ru":"Научиться говорить о распорядке дня, здоровье и физической активности; освоить вопросный шаблон 是不是, местоимение 每 и вопросительное местоимение 多.","tj":"Гуфтугӯ дар бораи тартиби рӯзона, саломатӣ ва фаъолияти ҷисмонӣ; азхудкунии шакли саволии 是不是, ҷонишини 每 ва ҷонишини саволии 多."},"g":["用“是不是”的问句","代词“每”","疑问代词“多”"]},{"n":3,"t":{"uz":"左边那个红色的是我的","ru":"左边那个红色的是我的","tj":"左边那个红色的是我的"},"sub":{"uz":"Narsalarning egasini, rangini va joylashuvini tasvirlash; '的' qo'shimchasi bilan ot-so'z birikmalarini, 一下 miqdorini va 真 kuchaytiruvchi ravishini o'zlashtirish.","ru":"Научиться описывать владельца, цвет и местоположение предметов; освоить именные словосочетания с 的, количественное слово 一下 и усилительное наречие 真.","tj":"Тасвири соҳиб, ранг ва ҷойгиршавии ашё; азхудкунии ибораҳои исмӣ бо 的, воҳиди 一下 ва зарфи тақвиятии 真."},"g":["“的”字短语","量词“一下”","语气副词“真”"]},{"n":4,"t":{"uz":"这个工作是他帮我介绍的","ru":"这个工作是他帮我介绍的","tj":"这个工作是他帮我介绍的"},"sub":{"uz":"O'tgan hodisalarning vaqti, joyi va usulini ta'kidlab gapira olish; '是……的' qolipini, 给 old ko'makchisini va 已经 ravishini o'zlashtirish.","ru":"Научиться делать акцент на времени, месте и способе совершения прошедшего действия; освоить конструкцию 是……的, предлог 给 и наречие 已经.","tj":"Таъкид кардан ба вақт, ҷой ва усули амали гузашта; азхудкунии конструксияи 是……的, пешоянди 给 ва зарфи 已经."},"g":["“是……的”句：强调施事","表示时间：……的时候","时间副词“已经”"]},{"n":5,"t":{"uz":"就买这件吧","ru":"就买这件吧","tj":"就买这件吧"},"sub":{"uz":"Xarid qilish, ovqatlanish va dam olish haqidagi suhbatlarda o'z fikrini bildira olish; 就 ravishi, 还 ravishi va 有点儿 miqdor birikmasini o'zlashtirish.","ru":"Научиться выражать своё мнение в разговорах о покупках, еде и отдыхе; освоить наречие 就, наречие 还 и конструкцию 有点儿.","tj":"Баён кардани фикр дар сӯҳбатҳо дар бораи харидорӣ, хӯрок ва истироҳат; азхудкунии зарфи 就, зарфи 还 ва ибораи 有点儿."},"g":["副词“就”","语气副词“还”（1）","程度副词“有点儿”"]},{"n":6,"t":{"uz":"你怎么不吃了","ru":"你怎么不吃了","tj":"你怎么不吃了"},"sub":{"uz":"Sabab va oqibat haqida gapira olish, 怎么 so'roq olmoshi, miqdor ko'makchilarining takrorlanishi va 因为……所以…… bog'lovchi qolipini o'zlashtirish.","ru":"Научиться говорить о причине и следствии, вопросительное местоимение 怎么, удвоение счётных слов и союзная конструкция 因为……所以……","tj":"Омӯзиши гуфтан дар бораи сабаб ва натиҷа, исми саволии 怎么, такрори калимаҳои шуморавӣ ва сохтори пайвандакии 因为……所以……"},"g":["疑问代词“怎么”","量词的重叠","关联词“因为……，所以……”"]},{"n":7,"t":{"uz":"你家离公司远吗","ru":"你家离公司远吗","tj":"你家离公司远吗"},"sub":{"uz":"Masofa, yo'l vaqti va joylashuv haqida gapira olish; 还 ravishining ikkinchi ma'nosini, 就 vaqt ravishinini, 离 old ko'makchisini va 呢 yuklamasini o'zlashtirish.","ru":"Научиться говорить о расстоянии, времени в пути и местонахождении; освоить второе значение 还, наречие времени 就, предлог 离 и частицу 呢.","tj":"Омӯзиши гуфтан дар бораи масофа, вақти роҳ ва ҷойгиршавӣ; аз бар кардани маъноии дуввуми 还, зарфи вақтии 就, пешояндии 离 ва ҷузъаи 呢."},"g":["语气副词“还”（2）","时间副词“就”","离","语气助词“呢”"]},{"n":8,"t":{"uz":"让我想想再告诉你","ru":"让我想想再告诉你","tj":"让我想想再告诉你"},"sub":{"uz":"Taklif so'rash, ruxsat berish va harakatni keyinga qoldirish haqida gapira olish; '……好吗' savol qolipini, 再 ravishin, 让 pivotal fe'lni va fe'llarning takrorlanishini o'zlashtirish.","ru":"Научиться просить разрешения, откладывать действие; освоить вопросную конструкцию '……好吗', наречие 再, глагол-пивот 让 и удвоение глаголов.","tj":"Омӯзиши хостани иҷозат, ба баъд гузоштани амал; аз бар кардани сохтори саволии '……好吗', зарфи 再, феъли пивотии 让 ва такрори феълҳо."},"g":["疑问句“……，好吗”","副词“再”","兼语句","动词的重叠"]},{"n":9,"t":{"uz":"题太多，我没做完","ru":"题太多，我没做完","tj":"题太多，我没做完"},"sub":{"uz":"Natija fe'llari, 'cóng' old ko'makchisi va 'dì' tartib ko'rsatkichi yordamida gaplar tuzishni o'rganish.","ru":"Научиться строить предложения с результативными глаголами, предлогом 'cóng' и порядковым показателем 'dì'.","tj":"Омӯзиши тартиб додани ҷумлаҳо бо феълҳои натиҷавӣ, пешоянди 'cóng' ва нишондиҳандаи тартиби 'dì'."},"g":["结果补语","介词\"从\"","\"第\"表示顺序"]},{"n":10,"t":{"uz":"别找了，手机在桌子上呢","ru":"别找了，手机在桌子上呢","tj":"别找了，手机在桌子上呢"},"sub":{"uz":"Buyruq gaplarini ('别……了'), 'duì' old ko'makchisini va 'zhèngzài' davom ko'rsatkichini ishlatishni o'rganish.","ru":"Научиться использовать побудительные предложения ('别……了'), предлог 'duì' и показатель продолжения 'zhèngzài'.","tj":"Омӯзиши истифодаи ҷумлаҳои фармоишӣ ('别……了'), пешоянди 'duì' ва нишондиҳандаи давомнокии 'zhèngzài'."},"g":["祈使句：不要……了；别……了","介词\"对\"","副词\"正在\"和语气助词\"呢\""]},{"n":11,"t":{"uz":"他比我大三岁","ru":"他比我大三岁","tj":"他比我大三岁"},"sub":{"uz":"'Bǐ' qiyoslash konstruktsiyasini, fe'l sifatdoshini aniqlovchi sifatida ishlatishni va 'kěnéng' yordamchi fe'lini o'rganish.","ru":"Изучение конструкции сравнения 'bǐ', использования глагольных конструкций в роли определения и модального глагола 'kěnéng'.","tj":"Омӯзиши конструксияи муқоисавии 'bǐ', истифодаи сохторҳои феълӣ ҳамчун муайянкунанда ва феъли ёрирасони 'kěnéng'."},"g":["动词结构做定语","“比”字句（1）","助动词“可能”"]},{"n":12,"t":{"uz":"你穿得太少了","ru":"你穿得太少了","tj":"你穿得太少了"},"sub":{"uz":"Holat to'ldiruvchisi ('de' yuklamasi bilan) va 'bǐ' qiyoslash gapining kengaytirilgan shaklini o'rganish.","ru":"Изучение дополнения состояния (с частицей 'de') и расширенной формы конструкции сравнения 'bǐ'.","tj":"Омӯзиши илова ба ҳолат (бо зарраи 'de') ва шакли васеъшудаи конструксияи муқоисавии 'bǐ'."},"g":["状态补语","“比”字句（2）","趋向补语（进、出、上、下）"]},{"n":13,"t":{"uz":"门开着呢","ru":"门开着呢","tj":"门开着呢"},"sub":{"uz":"Davom etayotgan holatni bildiruvchi '着' yuklamasini, 'wǎng' yo'nalish ko'makchisini va '不是……吗' ritorik savol shaklini o'rganish.","ru":"Изучение частицы '着', обозначающей продолжающееся состояние, предлога направления 'wǎng' и риторической конструкции '不是……吗'.","tj":"Омӯзиши зарраи '着' ифодакунандаи ҳолати давомдор, пешоянди самт 'wǎng' ва шакли пурсиши риторикии '不是……吗'."},"g":["动态助词“着”","反问句“不是……吗”","介词“往”"]},{"n":14,"t":{"uz":"你看过那个电影吗","ru":"你看过那个电影吗","tj":"你看过那个电影吗"},"sub":{"uz":"O'tgan tajribani bildiruvchi '过' yuklamasini, 'suīrán……dànshì' bog'lovchi juftligini va '次' harakat miqdori to'ldiruvchisini o'rganish.","ru":"Изучение частицы '过', обозначающей прошлый опыт, сою amchi fe'l: 要","ru":"Вспомогательный глагол: 要","tj":"Феъли ёрдамӣ: 要"},"f":{"uz":"'要' (yào) - istak yoki zaruriyatni bildiruvchi yordamchi fe'l. Fe'ldan oldin kelib, 'xohlamoq / bormoqchi / kerak' ma'nolarini beradi. Inkor shakli: 不要 (buyruq) yoki 不想 (istamaslik).","ru":"'要' (yào) — вспомогательный глагол, выражающий желание или необходимость. Ставится перед основным глаголом, означает «хотеть / собираться / нужно». Отрицание: 不要 (запрет) или 不想 (нежелание).","tj":"'要' (yào) — феъли ёрдамии ифодакунандаи хоҳиш ё зарурат. Пеш аз феъли асосӣ меояд ва маънои 'хостан / қасд доштан / лозим' дорад. Шакли инкорӣ: 不要 (манъ) ё 不想 (нахостан)."},"e":{"zh":"我要去北京旅游。","p":"Wǒ yào qù Běijīng lǚyóu.","uz":"Men Pekinga sayohat qilmoqchiman.","ru":"Я собираюсь поехать в Пекин.","tj":"Ман мехоҳам ба Пекин сафар кунам."},"pattern":"助动词：要"},{"l":1,"t":{"uz":"Daraja ravishi: 最","ru":"Наречие степени: 最","tj":"Зарфи дараҷа: 最"},"f":{"uz":"'最' (zuì) - 'eng' ma'nosini beruvchi daraja ravishi. Sifat yoki fe'ldan oldin kelib, eng yuqori darajani bildiradi.","ru":"'最' (zuì) — наречие степени, означающее «самый, наиболее». Ставится перед прилагательным или глаголом и обозначает наивысшую степень.","tj":"'最' (zuì) — зарфи дараҷа бо маънои 'аз ҳама, бештар'. Пеш аз сифат ё феъл меояд ва дараҷаи аълоро ифода мекунад."},"e":{"zh":"九月去北京旅游最好。","p":"Jiǔ yuè qù Běijīng lǚyóu zuì hǎo.","uz":"Pekinga sent'abrda borish eng yaxshi.","ru":"Лучше всего ехать в Пекин в сентябре.","tj":"Дар моҳи сентябр сафар ба Пекин аз ҳама беҳтар аст."},"pattern":"程度副词：最"},{"l":1,"t":{"uz":"Taxminiy sonlar: 几、多","ru":"Приблизительные числа: 几、多","tj":"Рақамҳои тахминӣ: 几、多"},"f":{"uz":"Taxminiy sonni ifodalash usullari:\n• 几 (jǐ) — 'bir nechta' (odatda 10 gacha), noaniq miqdor.\n• 多 (duō) — son + ölçü + 多 shaklida 'dan ko'proq, ziyod' ma'nosini beradi.","ru":"Способы выражения приблизительного числа:\n• 几 (jǐ) — «несколько» (обычно до 10), неопределённое количество.\n• 多 (duō) — после числа + счётного слова означает «с лишним, больше».","tj":"Усулҳои ифодаи рақамҳои тахминӣ:\n• 几 (jǐ) — 'чанд' (одатан то 10), миқдори номуайян.\n• 多 (duō) — баъд аз рақам + воҳид маънои 'зиёда аз, бештар' дорад."},"e":{"zh":"这里有几个杯子。","p":"Zhèlǐ yǒu jǐ ge bēizi.","uz":"Bu yerda bir nechta qadah bor.","ru":"Здесь есть несколько стаканов.","tj":"Инҷо чанд косача вуҷуд дорад."},"pattern":"概数的表达：几、多"},{"l":2,"t":{"uz":"'是不是' bilan savol gaplari","ru":"Вопросы с 是不是","tj":"Саволҳо бо 是不是"},"f":{"uz":"'是不是' bilan tuzilgan savol gaplari. Bu qolip orqali biror narsa haqida taxmin qilib so'raladi. '是不是' gap boshida yoki o'rtasida kelishi mumkin. Javob 'shunday' yoki 'yo'q' shaklida bo'ladi.","ru":"Вопросы, построенные с 是不是. С помощью этого шаблона задаётся вопрос-предположение. 是不是 может стоять в начале или середине предложения. Ответ — «да» или «нет».","tj":"Саволҳое, ки бо 是不是 сохта мешаванд. Тавассути ин қолиб гумонии чизе пурсида мешавад. 是不是 метавонад дар аввал ё миёнаи ҷумла биояд. Ҷавоб бо 'бале' ё 'не' дода мешавад."},"e":{"zh":"你是不是喜欢运动？","p":"Nǐ shì bú shì xǐhuan yùndòng?","uz":"Sen sportni yaxshi ko'rasanmi?","ru":"Ты любишь спорт?","tj":"Оё ту варзишро дӯст медорӣ?"},"pattern":"用“是不是”的问句"},{"l":2,"t":{"uz":"'每' olmoshi","ru":"Местоимение 每","tj":"Ҷонишини 每"},"f":{"uz":"'每' olmoshi 'har, har qaysi' ma'nosini beradi. U otdan oldin qo'llaniladi va ko'pincha 都 bilan birga ishlatiladi.","ru":"Местоимение 每 означает «каждый». Ставится перед существительным и часто используется в связке с 都.","tj":"Ҷонишини 每 маънои 'ҳар' дорад. Пеш аз исм меояд ва аксар бо 都 дар якҷоягӣ истифода мешавад."},"e":{"zh":"我每天早上都要跑步。","p":"Wǒ měitiān zǎoshang dōu yào pǎobù.","uz":"Men har kuni ertalab yuguraman.","ru":"Я каждое утро бегаю.","tj":"Ман ҳар субҳ медавам."},"pattern":"代词“每”"},{"l":2,"t":{"uz":"'多' so'roq olmoshi","ru":"Вопросительное местоимение 多","tj":"Ҷонишини саволии 多"},"f":{"uz":"'多' so'roq olmoshi sifat oldidan kelib 'qancha, nechog'liq' ma'nosini beradi. Odatda o'lchov yoki miqdor so'rashda ishlatiladi.","ru":"Вопросительное местоимение 多 ставится перед прилагательным и означает «насколько, какой». Используется для вопросов об измерениях или величинах.","tj":"Ҷонишини саволии 多 пеш аз сифат меояд ва маънои 'чӣ қадар, чанд' дорад. Барои пурсидан дар бораи андоза ё миқдор истифода мешавад."},"e":{"zh":"你多高？","p":"Nǐ duō gāo?","uz":"Sening bo'ying qancha?","ru":"Какой у тебя рост?","tj":"Қади ту чанд аст?"},"pattern":"疑问代词“多”"},{"l":3,"t":{"uz":"'的' qo'shimchasi bilan ibora","ru":"Именное словосочетание с 的","tj":"Ибора бо 的"},"f":{"uz":"'的' qo'shimchasi ot o'rnida ishlatilganda '的' bilan tugagan birikma ot vazifasini bajaradi. Masalan, '红色的' = 'qizil rangli narsa', '送报纸的' = 'gazeta olib keladigan odam'. Bu usul takrorni oldini olish uchun ishlatiladi.","ru":"Когда частица 的 используется вместо существительного, словосочетание, заканчивающееся на 的, выполняет функцию существительного. Например, '红色的' = 'красная вещь', '送报纸的' = 'человек, доставляющий газеты'. Используется для избегания повторений.","tj":"Вақте ки 的 ба ҷои исм истифода мешавад, ибораи хотимаёфта бо 的 нақши исмро мебозад. Масалан, '红色的' = 'чизи сурх', '送报纸的' = 'одами рӯзнома оваранда'. Барои пешгирии такрор истифода мешавад."},"e":{"zh":"左边那个红色的是我的。","p":"Zuǒbian nàge hóngsè de shì wǒ de.","uz":"Chap tomondagi qizili meniki.","ru":"Вон та красная слева — моя.","tj":"Он сурхе, ки тарафи чап аст, аз они ман аст."},"pattern":"“的”字短语"},{"l":3,"t":{"uz":"Miqdor ko'makchisi '一下'","ru":"Счётное слово 一下","tj":"Воҳиди 一下"},"f":{"uz":"'一下' fe'ldan keyin kelib harakatning qisqa yoki engil bajarilishini bildiradi. U fe'lni muloyim yoki noaniq qiladi. O'zbek tilidagi 'bir oz, bir qarayin' kabi.","ru":"一下 ставится после глагола и указывает на краткое или лёгкое выполнение действия. Смягчает глагол или делает его неопределённым. Аналог русского «разок, немного».","tj":"一下 баъд аз феъл меояд ва ифодаи кӯтоҳ ё сабуки амалро нишон медиҳад. Феълро нарм ё номуайян мекунад. Ба монанди 'як дафъа, каме' дар забони ӯзбекӣ."},"e":{"zh":"我看一下。","p":"Wǒ kàn yíxià.","uz":"Bir qarayayin.","ru":"Посмотрю.","tj":"Як нигоҳ мекунам."},"pattern":"量词“一下”"},{"l":3,"t":{"uz":"Modal ravish '真'","ru":"Модальное наречие 真","tj":"Зарфи модалии 真"},"f":{"uz":"'真' ravishi sifat yoki fe'l oldidan kelib 'haqiqatan, juda' ma'nosida kuchaytirish bildiradi. Ko'pincha hayrat yoki ta'sir bildiruvchi gaplarda ishlatiladi.","ru":"Наречие 真 ставится перед прилагательным или глаголом и означает усиление «действительно, очень». Часто используется в восклицательных предложениях.","tj":"Зарфи 真 пеш аз сифат ё феъл меояд ва тақвиятро ба маънии 'воқеан, хеле' ифода мекунад. Аксар дар ҷумлаҳои ҳайратии ифодакунанда истифода мешавад."},"e":{"zh":"你女儿的房间真漂亮啊！","p":"Nǐ nǚ'ér de fángjiān zhēn piàoliang a!","uz":"Qizingizning xonasi haqiqatan chiroyli!","ru":"Комната вашей дочки действительно красивая!","tj":"Хонаи духтаратон воқеан зебо аст!"},"pattern":"语气副词“真”"},{"l":4,"t":{"uz":"'是……的' qolipi: ta'kidlash","ru":"Конструкция 是……的: выделение","tj":"Конструксияи 是……的: таъкид"},"f":{"uz":"'是……的' qolipida o'tgan hodisaning vaqti, joyi yoki usuli ta'kidlanadi. Gap tuzilishi: 是 + ta'kidlanadigan ma'lumot + fe'l + 的. Bu qolip hodisaning o'zi emas, balki uning qanday, qachon yoki kim tomonidan bajarilgani muhim bo'lganda ishlatiladi.","ru":"Конструкция 是……的 подчёркивает время, место или способ совершения прошедшего действия. Структура: 是 + выделяемая информация + глагол + 的. Используется, когда важен не сам факт действия, а то как, когда или кем оно было выполнено.","tj":"Конструксияи 是……的 вақт, ҷой ё усули амали гузаштаро таъкид мекунад. Сохтор: 是 + маълумоти таъкидшаванда + феъл + 的. Вақте истифода мешавад, ки на худи амал, балки чӣ тавр, кай ё аз ҷониби кӣ иҷро шудани он муҳим аст."},"e":{"zh":"这个工作是他帮我介绍的。","p":"Zhège gōngzuò shì tā bāng wǒ jièshào de.","uz":"Bu ishni u menga tavsiya qilgan edi.","ru":"Именно он порекомендовал мне эту работу.","tj":"Ин корро ӯ ба ман тавсия кард."},"pattern":"“是……的”句：强调施事"},{"l":4,"t":{"uz":"Vaqtni ifodalash: ……的时候","ru":"Выражение времени: ……的时候","tj":"Ифодаи вақт: ……的时候"},"f":{"uz":"'……的时候' qolipida biror ish yuz bergan vaqt ko'rsatiladi. O'zbek tilidagi '……paytida, ……vaqtida' iborasiga to'g'ri keladi.","ru":"Конструкция ……的时候 указывает на момент, когда произошло действие. Соответствует русскому «когда…, в то время как…».","tj":"Конструксияи ……的时候 вақти вуқӯи амалро нишон медиҳад. Ба ибораи тоҷикии '……вақте ки, дар вақти……' мувофиқ аст."},"e":{"zh":"我十一岁的时候开始踢足球。","p":"Wǒ shíyī suì de shíhou kāishǐ tī zúqiú.","uz":"Men o'n bir yoshimda futbol o'ynashni boshladim.","ru":"Я начал играть в футбол, когда мне было одиннадцать лет.","tj":"Ман дар синни ёздаҳсолагӣ футбол бозӣ карданро оғоз кардам."},"pattern":"表示时间：……的时候"},{"l":4,"t":{"uz":"Vaqt ravishi '已经'","ru":"Наречие времени 已经","tj":"Зарфи вақт 已经"},"f":{"uz":"'已经' ravishi 'allaqachon' ma'nosini beradi. U fe'ldan oldin keladi va ko'pincha '了' bilan birga ishlatiladi. Biror harakatning avvalroq bajarilganini ta'kidlaydi.","ru":"Наречие 已经 означает «уже». Ставится перед глаголом и часто используется в связке с 了. Подчёркивает, что действие совершилось ранее.","tj":"Зарфи 已经 маънои 'аллакай' дорад. Пеш аз феъл меояд ва аксар бо 了 дар якҷоягӣ истифода мешавад. Таъкид мекунад, ки амал пешак иҷро шудааст."},"e":{"zh":"已经踢了十年了。","p":"Yǐjīng tī le shí nián le.","uz":"Allaqachon o'n yil bo'ldi.","ru":"Уже прошло десять лет.","tj":"Аллакай даҳ сол шудааст."},"pattern":"时间副词“已经”"},{"l":5,"t":{"uz":"Ravish '就'","ru":"Наречие 就","tj":"Зарфи 就"},"f":{"uz":"'就' ravishi bir nechta ma'noda ishlatiladi: 1) Biror narsa haqida yakun qilib aytilganda ('aynan shu, xuddi shunday'); 2) Tez yoki darhol biror narsa bo'lishini bildiradi; 3) Tasdiq uchun ishlatiladi. Ko'pincha fe'ldan oldin keladi.","ru":"Наречие 就 имеет несколько значений: 1) Подведение итога ('именно вот это'); 2) Скорость или немедленность действия; 3) Подтверждение. Обычно ставится перед глаголом.","tj":"Зарфи 就 якчанд маъно дорад: 1) Хулосабандӣ ('маҳз ин'); 2) Зудии амал ё фавриятро ифода мекунад; 3) Барои тасдиқ. Одатан пеш аз феъл меояд."},"e":{"zh":"就买这件吧。","p":"Jiù mǎi zhè jiàn ba.","uz":"Mana shuni olavering.","ru":"Вот это и покупай.","tj":"Маҳз ҳамин харед."},"pattern":"副词“就”"},{"l":5,"t":{"uz":"Modal ravish '还' (1)","ru":"Модальное наречие 还 (1)","tj":"Зарфи модалии 还 (1)"},"f":{"uz":"'还' ravishi bu darsda 'qabul qilarli, yaxshi' ma'nosida ishlatiladi. Biror narsa kutilgandan yaxshiroq yoki o'rtacha yaxshi ekanligini bildiradi. '还可以', '还好' kabi birikmalar odatda 'yomon emas' ma'nosini beradi.","ru":"В этом уроке наречие 还 используется в значении «приемлемо, неплохо». Обозначает, что что-то лучше ожидаемого или на среднем уровне. Сочетания 还可以, 还好 обычно означают «неплохо».","tj":"Дар ин дарс зарфи 还 бо маънои 'қабул аст, бад нест' истифода мешавад. Нишон медиҳад, ки чизе беҳтар аз он чи интизор буданд ё дар сатҳи миёна аст. Ибораҳои 还可以, 还好 одатан маънои 'бад нест' доранд."},"e":{"zh":"颜色还可以，就是有点儿大。","p":"Yánsè hái kěyǐ, jiùshì yǒudiǎnr dà.","uz":"Rangi qabul qilarli, faqat biroz katta.","ru":"Цвет ничего, только немного велик.","tj":"Ранг қабул аст, фақат каме калон аст."},"pattern":"语气副词“还”（1）"},{"l":5,"t":{"uz":"Daraja ravishi '有点儿'","ru":"Наречие степени 有点儿","tj":"Зарфи дараҷа 有点儿"},"f":{"uz":"'有点儿' sifat yoki fe'l oldidan kelib 'biroz, sal, ozgina' ma'nosini beradi. Ko'pincha salbiy yoki noqulay holatlarda ishlatiladi. O'zbek tilidagi 'biroz, sal ko'p, ozgina' ifodasiga to'g'ri keladi.","ru":"有点儿 ставится перед прилагательным или глаголом и означает «немного, чуть-чуть». Чаще используется в отрицательных или некомфортных ситуациях. Аналог русского «немного, слегка».","tj":"有点儿 пеш аз сифат ё феъл меояд ва маънои 'каме, андак' дорад. Аксар дар вазъиятҳои манфӣ ё номатлуб истифода мешавад."},"e":{"zh":"这件衣服有点儿大。","p":"Zhè jiàn yīfu yǒudiǎnr dà.","uz":"Bu kiyim biroz katta.","ru":"Эта одежда немного велика.","tj":"Ин либос каме калон аст."},"pattern":"程度副词“有点儿”"},{"l":6,"t":{"uz":"So'roq olmoshi 怎么","ru":"Вопросительное местоимение 怎么","tj":"Исми саволии 怎么"},"f":{"uz":"'怎么' so'roq olmoshi ikki xil ma'noda ishlatiladi:\n1) 'Qanday qilib? Qanday yo'l bilan?' — usul yoki harakat tarzini so'rashda;\n2) 'Nega? Nima uchun?' — hayrat yoki tushunmovchilik bildiruvchi savolda.\nIkkinchi ma'noda ko'pincha salbiy gaplarda uchraydi.","ru":"Вопросительное местоимение '怎么' используется в двух значениях:\n1) 'Как? Каким образом?' — для вопроса о способе или методе действия;\n2) 'Почему? Как так?' — для выражения удивления или непонимания.\nВо втором значении часто встречается в отрицательных предложениях.","tj":"Исми саволии '怎么' дар ду маъно истифода мешавад:\n1) 'Чӣ тавр? Бо кадом роҳ?' — барои пурсидани усул ё тарзи амал;\n2) 'Чаро? Чи хел?' — барои ифодаи шигифт ё нофаҳмӣ.\nДар маъноии дуввум аксар вақт дар ҷумлаҳои инкорӣ истифода мешавад."},"e":{"zh":"你怎么知道他来了？","p":"Nǐ zěnme zhīdào tā lái le?","uz":"U kelganini qanday bilding?","ru":"Как ты узнал, что он пришёл?","tj":"Ту чӣ тавр донистӣ, ки вай омад?"},"pattern":"疑问代词“怎么”"},{"l":6,"t":{"uz":"Miqdor ko'makchilarining takrorlanishi","ru":"Удвоение счётных слов","tj":"Такрори калимаҳои шуморавӣ"},"f":{"uz":"Miqdor ko'makchilarini takrorlash orqali 'har bir, har qaysi' ma'nosi hosil qilinadi.\nMasalan, 天天 = har kuni, 年年 = har yili.\nBu qolip davomiylik va takrorlanuvchilikni ta'kidlaydi.","ru":"Удвоение счётных слов образует значение 'каждый, любой'.\nНапример, 天天 = каждый день, 年年 = каждый год.\nЭта конструкция подчёркивает постоянство и повторяемость.","tj":"Такрори калимаҳои шуморавӣ маъноии 'ҳар, ҳар як'-ро месозад.\nМасалан, 天天 = ҳар рӯз, 年年 = ҳар сол.\nИн сохтор давомнокӣ ва такрорпазириро таъкид мекунад."},"e":{"zh":"这个星期我天天都吃羊肉。","p":"Zhège xīngqī wǒ tiāntiān dōu chī yángròu.","uz":"Bu hafta har kuni qo'y go'shti edim.","ru":"На этой неделе я ел баранину каждый день.","tj":"Ин ҳафта ман ҳар рӯз гӯшти гӯсфанд хӯрдам."},"pattern":"量词的重叠"},{"l":6,"t":{"uz":"Bog'lovchi 因为……所以…… (chunki...shuning uchun...)","ru":"Союзная конструкция 因为……所以…… (потому что...поэтому...)","tj":"Пайвандаки 因为……所以…… (зеро...аз ин сабаб...)"},"f":{"uz":"'因为……所以……' qolipida sabab va oqibat ko'rsatiladi.\n因为 sabab gapini, 所以 esa oqibat gapini boshlab keladi.\nO'zbek tilidagi 'chunki…, shuning uchun…' iborasiga to'g'ri keladi.\nIkkala qism ham birgalikda yoki alohida ishlatilishi mumkin.","ru":"Конструкция '因为……所以……' выражает причину и следствие.\n因为 вводит предложение с причиной, 所以 — со следствием.\nСоответствует русскому 'потому что…, поэтому…'.\nОбе части могут использоваться вместе или по отдельности.","tj":"Дар сохтори '因为……所以……' сабаб ва натиҷа нишон дода мешавад.\n因为 ҷумлаи сабабро, 所以 ҷумлаи натиҷаро мебарад.\nБа форсии тоҷикӣ 'зеро…, аз ин сабаб…' мувофиқат мекунад.\nҲар ду қисм метавонанд якҷоя ё алоҳида истифода шаванд."},"e":{"zh":"因为昨天下雨，所以我们都没去。","p":"Yīnwèi zuótiān xiàyǔ, suǒyǐ wǒmen dōu méi qù.","uz":"Chunki kecha yomg'ir yog'di, shuning uchun barchimiz bormadik.","ru":"Потому что вчера шёл дождь, поэтому мы все не пошли.","tj":"Зеро дирӯз борон меборид, аз ин сабаб мо ҳама наравон."},"pattern":"关联词“因为……，所以……”"},{"l":7,"t":{"uz":"Ravish 还 — ikkinchi ma'nosi (hali, hanuz)","ru":"Наречие 还 — второе значение (ещё, по-прежнему)","tj":"Зарф 还 — маъноии дуввум (ҳанӯз, то ҳол)"},"f":{"uz":"'还' ravishining ikkinchi ma'nosi — 'hali, hanuz'.\nBiror holat davom etayotganini yoki biror narsa hali sodir bo'lmaganini bildiradi.\nKo'pincha 呢 yuklama bilan birga keladi.","ru":"Второе значение наречия '还' — 'ещё, по-прежнему'.\nОбозначает продолжение какого-либо состояния или то, что что-то ещё не произошло.\nЧасто используется вместе с частицей 呢.","tj":"Маъноии дуввуми зарфи '还' — 'ҳанӯз, то ҳол'.\nНишон медиҳад, ки ягон ҳолат идома дорад ё ягон чиз ҳанӯз рӯй надодааст.\nАксар вақт бо ҷузъаи 呢 якҷоя истифода мешавад."},"e":{"zh":"他还在教室学习呢。","p":"Tā hái zài jiàoshì xuéxí ne.","uz":"U hali darsxonada o'qiyapti.","ru":"Он ещё занимается в классе.","tj":"Вай ҳанӯз дар синфхона дарс мехонад."},"pattern":"语气副词“还”（2）"},{"l":7,"t":{"uz":"Vaqt ravishi 就 (tez, yaqinda, darhol)","ru":"Наречие времени 就 (скоро, быстро, сразу)","tj":"Зарфи вақт 就 (зуд, ба зудӣ, дарҳол)"},"f":{"uz":"'就' ravishi vaqt ifodasida 'tez, yaqinda, darhol' ma'nosini beradi.\nBiror hodisa kutilgandan tezroq yoki yaqinroq bo'lishini ta'kidlaydi.","ru":"Наречие '就' в выражении времени означает 'скоро, быстро, сразу'.\nПодчёркивает, что событие произойдёт быстрее или ближе, чем ожидалось.","tj":"Зарфи '就' дар ифодаи вақт маъноии 'зуд, ба зудӣ, дарҳол'-ро медиҳад.\nТаъкид мекунад, ки ягон ҳодиса тезтар ё наздиктар аз он ки интизор буданд рӯй медиҳад."},"e":{"zh":"二十分钟就到。","p":"Èrshí fēnzhōng jiù dào.","uz":"Yigirma daqiqada yetib boraman.","ru":"Через двадцать минут буду.","tj":"Дар бист дақиқа мерасам."},"pattern":"时间副词“就”"},{"l":7,"t":{"uz":"Old ko'makchi 离 (masofani ifodalash)","ru":"Предлог 离 (выражение расстояния)","tj":"Пешоянди 离 (ифодаи масофа)"},"f":{"uz":"'离' old ko'makchisi ikki joy yoki ikki vaqt o'rtasidagi masofani bildiradi.\nGap tuzilishi: A + 离 + B + masofa/vaqt.\nO'zbek tilidagi '...dan (qancha uzoqlikda)' iborasiga to'g'ri keladi.","ru":"Предлог '离' выражает расстояние между двумя местами или промежуток времени.\nСтруктура предложения: A + 离 + B + расстояние/время.\nСоответствует русскому 'от ... (на каком расстоянии)'.","tj":"Пешоянди '离' масофаро байни ду ҷой ё фосилаи вақтиро нишон медиҳад.\nСохтори ҷумла: A + 离 + B + масофа/вақт.\nБа тоҷикӣ 'аз ... (дар чанд масофа)' мувофиқат мекунад."},"e":{"zh":"你家离公司远吗？","p":"Nǐ jiā lí gōngsī yuǎn ma?","uz":"Uying kompaniyadan uzoqmi?","ru":"Ваш дом далеко от компании?","tj":"Хонаи ту аз ширкат дур аст?"},"pattern":"离"},{"l":7,"t":{"uz":"Modal yuklamasi 呢 (davomiylik, ta'kid, -chi?)","ru":"Модальная частица 呢 (продолжение, усиление, -а?)","tj":"Ҷузъаи оҳангии 呢 (давомнокӣ, таъкид, -чӣ?)"},"f":{"uz":"'呢' yuklama gap oxirida kelib davomiylik yoki ta'kidlash bildiradigan ohang hosil qiladi.\nKo'pincha hayrat yoki ta'kid ifodalaydi.\nSavol gapida esa qisqa 'a, -chi?' ma'nosini beradi.","ru":"Частица '呢' в конце предложения создаёт интонацию продолжения или усиления.\nЧасто выражает удивление или подчёркивание.\nВ вопросительном предложении имеет значение 'а?, ну?'.","tj":"Ҷузъаи '呢' дар охири ҷумла оҳанги давомнокӣ ё таъкидро ба вуҷуд меорад.\nАксар вақт шигифт ё таъкидро ифода мекунад.\nДар ҷумлаи саволӣ маъноии '-чӣ? -а?' дорад."},"e":{"zh":"坐公共汽车要一个多小时呢！","p":"Zuò gōnggòng qìchē yào yí ge duō xiǎoshí ne!","uz":"Avtobus bilan bir soatdan ko'proq vaqt ketadi!","ru":"На автобусе больше часа!","tj":"Бо автобус аз як соат зиёд лозим!"},"pattern":"语气助词“呢”"},{"l":8,"t":{"uz":"Savol qolipi '……，好吗' (bo'ladimi?, xopmi?)","ru":"Вопросная конструкция '……，好吗' (хорошо?, ладно?)","tj":"Сохтори саволии '……，好吗' (хуб аст?, розӣ?)"},"f":{"uz":"'……，好吗？' qolipida biror taklif yoki iltimos yumshoq tarzda bildiriladi.\nGap oxirida '好吗？' qo'shiladi va 'bo'ladimi?, xopmi?' ma'nosini beradi.\nO'zbek tilidagi 'qilamizmi?, bo'ladimi?' iborasiga to'g'ri keladi.","ru":"Конструкция '……，好吗？' используется для мягкого предложения или просьбы.\nВ конце предложения добавляется '好吗？' со значением 'хорошо?, ладно?'.\nСоответствует русскому 'сделаем?, ладно?'.","tj":"Сохтори '……，好吗？' барои ба таври нарм пешниҳод ё илтимос кардан истифода мешавад.\nДар охири ҷумла '好吗？' илова мешавад бо маъноии 'хуб аст?, розӣ?'.\nБа тоҷикӣ 'мекунем?, розӣ?' мувофиқат мекунад."},"e":{"zh":"我们下午去看电影，好吗？","p":"Wǒmen xiàwǔ qù kàn diànyǐng, hǎo ma?","uz":"Tushdan keyin kino ko'rgani boramizmi?","ru":"Давай сходим в кино после полудня, хорошо?","tj":"Баъд аз нисфирӯзӣ ба кино равем, хуб аст?"},"pattern":"疑问句“……，好吗”"},{"l":8,"t":{"uz":"Ravish 再 (yana, keyin, qayta — kelajak uchun)","ru":"Наречие 再 (снова, потом, опять — о будущем)","tj":"Зарфи 再 (боз, баъд, дубора — барои оянда)"},"f":{"uz":"'再' ravishi 'yana, keyin, qayta' ma'nosini beradi.\nKelajakda takrorlanadigan yoki keyinga qoldirilgan harakatni bildiradi.\n又 dan farqi shundaki, 再 kelajak uchun, 又 esa o'tgan uchun ishlatiladi.","ru":"Наречие '再' означает 'снова, потом, опять'.\nОбозначает действие, которое будет повторяться или откладывается на потом.\nОтличие от 又: 再 — для будущего, 又 — для прошедшего.","tj":"Зарфи '再' маъноии 'боз, баъд, дубора'-ро медиҳад.\nАмалеро нишон медиҳад, ки дар оянда такрор мешавад ё ба баъд гузошта мешавад.\nФарқ аз 又: 再 — барои оянда, 又 — барои гузашта."},"e":{"zh":"明天下午再去吧。","p":"Míngtiān xiàwǔ zài qù ba.","uz":"Ertaga tushdan keyin boramiz.","ru":"Пойдём завтра после полудня.","tj":"Фардо баъд аз нисфирӯзӣ равем."},"pattern":"副词“再”"},{"l":8,"t":{"uz":"Pivotal gap (让/叫 + kishi + fe'l)","ru":"Пивотальное предложение (让/叫 + человек + глагол)","tj":"Ҷумлаи пивотӣ (让/叫 + шахс + феъл)"},"f":{"uz":"Pivotal gapda birinchi fe'lning to'ldiruvchisi ikkinchi fe'lning egaligini bajaradi.\nMasalan, '让 + kishi + fe'l' qolipida: 让 — ruxsat bermoq/buyurmoq,\nkeyin boshqa kishi va uning harakati keladi.\n'叫 + kishi + fe'l' ham shu qolipga kiradi.","ru":"В пивотальном предложении дополнение первого глагола является подлежащим второго.\nВ конструкции '让 + человек + глагол': 让 — позволять/приказывать,\nзатем следует другой человек и его действие.\n'叫 + человек + глагол' тоже относится к этому типу.","tj":"Дар ҷумлаи пивотӣ пуркунандаи феъли аввал мубтадои феъли дуввум мегардад.\nДар сохтори '让 + шахс + феъл': 让 — иҷозат додан/дастур додан,\nбаъд шахси дигар ва амали ӯ меояд.\n'叫 + шахс + феъл' ҳам ба ҳамин намуд дохил мешавад."},"e":{"zh":"王老师让我给大卫打个电话。","p":"Wáng lǎoshī ràng wǒ gěi Dàwèi dǎ ge diànhuà.","uz":"Vang o'qituvchi menga Devidga qo'ng'iroq qilishimni so'radi.","ru":"Учитель Ван попросил меня позвонить Дэвиду.","tj":"Устод Ван аз ман хост, ки ба Дэвид занг занам."},"pattern":"兼语句"},{"l":8,"t":{"uz":"Fe'lning takrorlanishi (kamaytirish ma'nosi)","ru":"Удвоение глагола (смягчение действия)","tj":"Такрори феъл (сабуктарини амал)"},"f":{"uz":"Fe'lni takrorlash harakatning qisqa yoki engil bajarilishini bildiradi.\nBir bo'g'inli fe'l AB shaklida (看看, 想想),\nikki bo'g'inli fe'l ABAB shaklida (运动运动) takrorlanadi.\nBu usul muloyim yoki noaniq ifodalar uchun ishlatiladi.","ru":"Удвоение глагола означает краткое или лёгкое выполнение действия.\nОдносложный глагол удваивается по схеме AB (看看, 想想),\nдвусложный — по схеме ABAB (运动运动).\nИспользуется для смягчённых или неопределённых выражений.","tj":"Такрори феъл нишон медиҳад, ки амал кӯтоҳ ё сабук иҷро мешавад.\nФеъли яктаҳарфа бо схемаи AB такрор мешавад (看看, 想想),\nфеъли дутаҳарфа бо схемаи ABAB (运动运动).\nБарои ифодаҳои нарм ё ноаниқ истифода мешавад."},"e":{"zh":"让我想想再告诉你。","p":"Ràng wǒ xiǎngxiang zài gàosu nǐ.","uz":"Bir o'ylab, keyin aytaman.","ru":"Дай подумаю и потом скажу.","tj":"Бигзор андеша кунам, баъд мегӯям."},"pattern":"动词的重叠"},{"l":9,"t":{"uz":"Natija to'ldiruvchisi (结果补语)","ru":"Результативное дополнение (结果补语)","tj":"Пуркунандаи натиҷавӣ (结果补语)"},"f":{"uz":"Natija to'ldiruvchisi (结果补语) fe'ldan keyin qo'shilib, harakatning natijasini bildiradi.\nMasalan: 听懂 (eshitib tushunmoq), 做完 (tamomlamoq), 找到 (topmoq).\nInkor shaklida 没 yoki 没有 ishlatiladi: 没做完 (tamomlaolmadim).","ru":"Результативное дополнение (结果补语) добавляется после глагола и выражает результат действия.\nНапример: 听懂 (услышать и понять), 做完 (закончить), 找到 (найти).\nВ отрицании используется 没 или 没有: 没做完 (не успел закончить).","tj":"Пуркунандаи натиҷавӣ (结果补语) баъд аз феъл илова мешавад ва натиҷаи амалро нишон медиҳад.\nМасалан: 听懂 (шунида фаҳмидан), 做完 (тамом кардан), 找到 (ёфтан).\nДар инкор 没 ё 没有 истифода мешавад: 没做完 (нарасидам тамом кунам)."},"e":{"zh":"我听懂了。","p":"Wǒ tīngdǒng le.","uz":"Men eshitib tushundim.","ru":"Я понял на слух.","tj":"Ман шунида фаҳмидам."},"pattern":"结果补语"},{"l":9,"t":{"uz":"Old ko'makchi 从 (dan, boshlab)","ru":"Предлог 从 (от, с, начиная с)","tj":"Пешоянди 从 (аз, аз ибтидои)"},"f":{"uz":"'从' old ko'makchisi joy yoki vaqtni bildiradi va 'dan/boshlab' ma'nosini beradi.\nOdatda 'cóng … kāishǐ' (…dan boshlab) yoki 'cóng … dào …' (…dan …gacha) ko'rinishida ishlatiladi.","ru":"Предлог '从' обозначает место или время и означает 'от/с/начиная с'.\nОбычно используется в форме 'cóng … kāishǐ' (начиная с …) или 'cóng … dào …' (от … до …).","tj":"Пешоянди '从' ҷой ё вақтро нишон медиҳад ва маъноии 'аз/аз ибтидои'-ро медиҳад.\nОдатан дар шакли 'cóng … kāishǐ' (аз … оғоз) ё 'cóng … dào …' (аз … то …) истифода мешавад."},"e":{"zh":"他从下个星期一开始上班。","p":"Tā cóng xià ge xīngqīyī kāishǐ shàngbān.","uz":"U kelasi dushanba kundan boshlab ishga chiqadi.","ru":"Он начнёт работать с ближайшего понедельника.","tj":"Вай аз душанбаи оянда кор мекунад."},"pattern":"介词\"从\""},{"l":9,"t":{"uz":"Tartib ko'rsatkichi 第 (birinchi, ikkinchi...)","ru":"Порядковый показатель 第 (первый, второй...)","tj":"Нишондиҳандаи тартиби 第 (аввалин, дуввум...)"},"f":{"uz":"'第' prefiksi raqamlardan oldin qo'yilib tartib sonlarini hosil qiladi:\n第一 (birinchi), 第二 (ikkinchi) va h.k.\nBu inglizcha '-th' qo'shimchasiga o'xshaydi.\nOdiy sanoq sonlardan farqli ravishda narsa-predmetning tartibini bildiradi.","ru":"Префикс '第' перед числами образует порядковые числительные:\n第一 (первый), 第二 (второй) и т.д.\nАналог английского суффикса '-th'.\nВ отличие от количественных числительных, обозначает порядок предметов.","tj":"Пешванди '第' пеш аз ададҳо ададҳои тартибиро месозад:\n第一 (якум/аввалин), 第二 (дуввум) ва ғ.\nБа суффикси '-um' дар тоҷикӣ монанд аст.\nДар фарқ аз ададҳои шуморавӣ, тартиби ашёро нишон медиҳад."},"e":{"zh":"这是他的第一个工作。","p":"Zhè shì tā de dì yī ge gōngzuò.","uz":"Bu uning birinchi ishi.","ru":"Это его первая работа.","tj":"Ин кори аввалинаш аст."},"pattern":"\"第\"表示顺序"},{"l":10,"t":{"uz":"Buyruq gapi: 不要……了; 别……了 (endi …qilma)","ru":"Побудительное предложение: 不要……了; 别……了 (хватит, не делай)","tj":"Ҷумлаи фармоишӣ: 不要……了; 别……了 (дигар накун)"},"f":{"uz":"Biror harakatni to'xtatishni buyurish uchun 'bié……le' yoki 'búyào……le' ishlatiladi.\nBu ikkalasi ham 'endi …qilma' ma'nosini beradi.\n'Bié' so'zlashuv tilida ko'proq qo'llanadi.\nGap oxiridagi 'le' holatning o'zgarganligini yoki da'vatni kuchaytiradi.","ru":"Для приказания прекратить действие используется 'bié……le' или 'búyào……le'.\nОба означают 'больше не делай, хватит'.\n'Bié' чаще используется в разговорной речи.\nЧастица 'le' в конце предложения усиливает призыв или сигнализирует об изменении ситуации.","tj":"Барои дастур додан ба қатъи амал 'bié……le' ё 'búyào……le' истифода мешавад.\nҲар ду маъноии 'дигар накун' доранд.\n'Bié' дар забони гуфтугӯӣ бештар истифода мешавад.\nҶузъаи 'le' дар охири ҷумла даъватро тақвият медиҳад ё тағйири вазъиятро нишон медиҳад."},"e":{"zh":"别看电视了，去睡觉吧。","p":"Bié kàn diànshì le, qù shuìjiào ba.","uz":"Endi televizor ko'rma, uxlash vaqti.","ru":"Хватит смотреть телевизор, иди спать.","tj":"Дигар телевизор нагард, барав бихоб."},"pattern":"祈使句：不要……了；别……了"},{"l":10,"t":{"uz":"Old ko'makchi 对 (uchun, bo'yicha, nisbatan)","ru":"Предлог 对 (для, по отношению к, относительно)","tj":"Пешоянди 对 (барои, нисбат ба)"},"f":{"uz":"'Duì' old ko'makchisi 'uchun, bo'yicha, nisbatan' ma'nolarini beradi.\n'A duì B (yǒu) C' ko'rinishida: A B uchun C (ta'sirga ega/yaxshi/yomon).\nMasalan: 看电视对眼睛不好 (televizor ko'rish ko'z uchun yaxshi emas).","ru":"Предлог '对' означает 'для, по отношению к, относительно'.\nВ конструкции 'A 对 B (有) C': A для B (имеет влияние/хорошо/плохо).\nНапример: 看电视对眼睛不好 (смотреть телевизор вредно для глаз).","tj":"Пешоянди '对' маъноии 'барои, нисбат ба'-ро медиҳад.\nДар сохтори 'A 对 B (有) C': A барои B (таъсир дорад/хуб аст/бад аст).\nМасалан: 看电视对眼睛不好 (тамошои телевизор барои чашм зиёновар аст)."},"e":{"zh":"看电视对学汉语有帮助。","p":"Kàn diànshì duì xué Hànyǔ yǒu bāngzhù.","uz":"Televizor ko'rish xitoy tili o'rganishga yordam beradi.","ru":"Просмотр телевизора помогает в изучении китайского.","tj":"Тамошои телевизор дар омӯхтани чинӣ кӯмак мекунад."},"pattern":"介词\"对\""},{"l":10,"t":{"uz":"'Zhèngzài' ravishi va 'ne' yuklama (davom etayotgan harakat)","ru":"Наречие 'zhèngzài' и частица 'ne' (продолжающееся действие)","tj":"Зарфи 'zhèngzài' ва зарраи 'ne' (амали ҷорӣ)"},"f":{"uz":"'正在' ravishi fe'l oldidan kelib, harakatning aynan hozir davom etayotganini bildiradi.\nIngliz tilidagi 'am/is/are …-ing' ga o'xshaydi.\nGap oxiriga '呢' yuklama qo'shilsa, davom etayotgan holat yanada ta'kidlanadi.\nTuzilish: 正在 + fe'l (+呢). Shuningdek, faqat '在 + fe'l' yoki 'fe'l + 着 + 呢' ham ishlatiladi.","ru":"Наречие '正在' стоит перед глаголом и указывает, что действие происходит прямо сейчас.\nАналог английского 'am/is/are …-ing'.\nЕсли в конце добавляется частица '呢', продолжение состояния подчёркивается.\nСтруктура: 正在 + глагол (+呢). Также используется: 在 + глагол или глагол + 着 + 呢.","tj":"Зарфи '正在' пеш аз феъл меояд ва нишон медиҳад амал айни ҳол ҷараён дорад.\nБа 'am/is/are …-ing' дар забони англисӣ монанд аст.\nАгар дар охири ҷумла зарраи '呢' илова шавад, ҷараёни ҳолат бештар таъкид мешавад.\nСохтор: 正在 + феъл (+呢). Инчунин: 在 + феъл ё феъл + 着 + 呢 истифода мешавад."},"e":{"zh":"妈妈正在准备午饭呢！","p":"Māma zhèngzài zhǔnbèi wǔfàn ne!","uz":"Ona hozir tushlikni tayyorlayapti!","ru":"Мама сейчас готовит обед!","tj":"Модар ҳоло нисфирӯзиро тайёр мекунад!"},"pattern":"副词\"正在\"和语气助词\"呢\""},{"l":11,"t":{"uz":"Fe'l birikmasi aniqlovchi sifatida","ru":"Глагольная конструкция в роли определения","tj":"Сохтори феълӣ ҳамчун муайянкунанда"},"f":{"uz":"Xitoy tilida fe'l birikmasi yoki gap bo'lagi ot oldidan aniqlovchi bo'lib kelishi mumkin. Bu holda aniqlovchi bilan ot orasiga '的' yuklamasi qo'yiladi. Masalan: '看报纸的女孩子' (gazeta o'qiyotgan qiz).","ru":"В китайском языке глагольная конструкция или часть предложения может выступать определением перед существительным. В этом случае между определением и существительным ставится частица '的'. Например: '看报纸的女孩子' (девушка, читающая газету).","tj":"Дар забони чинӣ сохтори феълӣ ё бахши ҷумла метавонад пеш аз исм ҳамчун муайянкунанда бояд. Дар ин ҳол байни муайянкунанда ва исм зарраи '的' гузошта мешавад. Масалан: '看报纸的女孩子' (духтаре ки рӯзнома мехонад)."},"e":{"zh":"左边看报纸的女孩子是我姐姐。","p":"Zuǒbian kàn bàozhǐ de nǚ háizi shì wǒ jiějie.","uz":"Chap tomondagi gazeta o'qiyotgan qiz mening opam.","ru":"Девушка слева, читающая газету, — моя старшая сестра.","tj":"Духтаре ки тарафи чап рӯзнома мехонад хоҳари калонии ман аст."},"pattern":"动词结构做定语"},{"l":11,"t":{"uz":"'Bǐ' qiyoslash gapi (1)","ru":"Предложения сравнения с 'bǐ' (1)","tj":"Ҷумлаи муқоисавӣ бо 'bǐ' (1)"},"f":{"uz":"'Bǐ' qiyoslash gapi quyidagi tuzilishga ega: A + 比 + B + sifat (+ miqdor farqi). Bu 'A, B dan ko'proq/katta/yaxshi' ma'nosini beradi. Inkor shaklida '没有' ishlatiladi: A + 没有 + B + sifat.","ru":"Конструкция сравнения с 'bǐ' имеет структуру: A + 比 + B + прилагательное (+ разница в количестве). Означает 'A больше/старше/лучше, чем B'. В отрицательной форме используется '没有': A + 没有 + B + прилагательное.","tj":"Ҷумлаи муқоисавӣ бо 'bǐ' сохтори зеринро дорад: A + 比 + B + сифат (+ фарқи миқдорӣ). Маъниаш 'A аз B бештар/калонтар/беҳтар аст'. Дар шакли инкорӣ '没有' истифода мешавад: A + 没有 + B + сифат."},"e":{"zh":"他比我大三岁。","p":"Tā bǐ wǒ dà sān suì.","uz":"U mendan uch yosh katta.","ru":"Он старше меня на три года.","tj":"Ӯ аз ман се сол калонтар аст."},"pattern":"“比”字句（1）"},{"l":11,"t":{"uz":"'Kěnéng' yordamchi fe'li","ru":"Модальный глагол 'kěnéng'","tj":"Феъли ёрирасони 'kěnéng'"},"f":{"uz":"'Kěnéng' yordamchi fe'li 'ehtimol, mumkin' ma'nosini beradi va fe'l oldidan qo'yiladi. U ma'lum bo'lmagan holatlar haqida taxmin bildiradi. Inkor shakli: '不可能' (mumkin emas, aslo).","ru":"Модальный глагол 'kěnéng' означает 'возможно, может быть' и ставится перед глаголом. Выражает предположение о неизвестных ситуациях. Отрицательная форма: '不可能' (невозможно).","tj":"Феъли ёрирасони 'kěnéng' маъниаш 'эҳтимол, мумкин аст' буда пеш аз феъл меояд. Вай тахминро дар бораи вазъиятҳои номаълум ифода мекунад. Шакли инкорӣ: '不可能' (ғайриимкон аст)."},"e":{"zh":"你可能不认识她。","p":"Nǐ kěnéng bù rènshi tā.","uz":"Siz uni tanimas ehtimol.","ru":"Возможно, ты её не знаешь.","tj":"Эҳтимол шумо ӯро намешиносед."},"pattern":"助动词“可能”"},{"l":12,"t":{"uz":"Holat to'ldiruvchisi","ru":"Дополнение состояния","tj":"Иловаи ҳолат"},"f":{"uz":"Holat to'ldiruvchisi fe'ldan keyin '得(de)' yuklamasi qo'shilib, harakatning qanday bajarilganligini yoki natijani bildiradi. Tuzilish: Fe'l + 得 + sifat/holat. Agar fe'lning to'ldiruvchisi bo'lsa, fe'l takrorlanadi: 做饭做得好. Inkor: 得 dan keyin '不' qo'yiladi: 做得不好.","ru":"Дополнение состояния образуется после глагола с частицей '得(de)' и описывает, как выполняется действие или каков его результат. Структура: Глагол + 得 + прилагательное/состояние. Если у глагола есть дополнение, глагол повторяется: 做饭做得好. Отрицание: после '得' ставится '不': 做得不好.","tj":"Иловаи ҳолат баъд аз феъл бо зарраи '得(de)' омада, тавсиф мекунад амал чӣ тавр иҷро мешавад ё натиҷааш чист. Сохтор: Феъл + 得 + сифат/ҳолат. Агар феъл иловаи хос дошта бошад, феъл такрор мешавад: 做饭做得好. Инкор: баъд аз '得' '不' гузошта мешавад: 做得不好."},"e":{"zh":"你穿得太少了。","p":"Nǐ chuān de tài shǎo le.","uz":"Siz juda kam kiyingiz.","ru":"Ты надел(а) слишком мало.","tj":"Шумо хеле кам пӯшидед."},"pattern":"状态补语"},{"l":12,"t":{"uz":"'Bǐ' qiyoslash gapi (2)","ru":"Предложения сравнения с 'bǐ' (2)","tj":"Ҷумлаи муқоисавӣ бо 'bǐ' (2)"},"f":{"uz":"Fe'l birikmalarini qiyoslashda '比' quyidagicha ishlatiladi: A + 比 + B + fe'l + 得 + sifat. Yoki fe'l takrorlanadi: A + 比 + B + fe'l + fe'l + 得 + sifat. Masalan: 我妻子比我做饭做得好. Miqdor farqini qo'shish mumkin: 比我早起一个小时.","ru":"При сравнении глагольных конструкций '比' используется так: A + 比 + B + глагол + 得 + прилагательное. Или глагол повторяется: A + 比 + B + глагол + глагол + 得 + прилагательное. Например: 我妻子比我做饭做得好. Можно добавить разницу: 比我早起一个小时.","tj":"Ҳангоми муқоисаи сохторҳои феълӣ 'bǐ' чунин истифода мешавад: A + 比 + B + феъл + 得 + сифат. Ё феъл такрор мешавад: A + 比 + B + феъл + феъл + 得 + сифат. Масалан: 我妻子比我做饭做得好. Метавон фарқро ҳам зиёд кард: 比我早起一个小时."},"e":{"zh":"我妻子比我做饭做得好。","p":"Wǒ qīzi bǐ wǒ zuò fàn zuò de hǎo.","uz":"Xotinim mendan yaxshiroq ovqat pishiradi.","ru":"Моя жена готовит лучше меня.","tj":"Занам аз ман беҳтар хӯрок мепазад."},"pattern":"“比”字句（2）"},{"l":12,"t":{"uz":"Yo'nalish to'ldiruvchisi (进, 出, 上, 下)","ru":"Направленное дополнение (进, 出, 上, 下)","tj":"Иловаи самт (进, 出, 上, 下)"},"f":{"uz":"Yo'nalish to'ldiruvchisi fe'ldan keyin kelib, harakatning yo'nalishini bildiradi.\nOddiy shakl: fe'l + 进/出/上/下 (va h.k.)\nMurakkab shakl: fe'l + 进/出 + 来/去 (yaqin yoki uzoqlashuv uchun).\nMasalan: 进来 (kiring — yaqin), 进去 (kiring — uzoq), 出来/出去 (chiqing).","ru":"Направленное дополнение ставится после глагола и указывает направление действия.\nПростая форма: глагол + 进/出/上/下 и т.д.\nСоставная форма: глагол + 进/出 + 来/去 (для приближения или удаления).\nНапример: 进来 (войдите — приближение), 进去 (войдите — удаление), 出来/出去 (выйдите).","tj":"Иловаи самт баъд аз феъл меояд ва самти амалро нишон медиҳад.\nШакли оддӣ: феъл + 进/出/上/下 ва ғ.\nШакли мураккаб: феъл + 进/出 + 来/去 (барои наздик шудан ё дур шудан).\nМасалан: 进来 (дароед — наздик), 进去 (дароед — дур), 出来/出去 (берун шавед)."},"e":{"zh":"外边冷，我们进房间吧。","p":"Wàibian lěng, wǒmen jìn fángjiān ba.","uz":"Tashqari sovuq, xonaga kiraylik.","ru":"На улице холодно, давай зайдём в комнату.","tj":"Берун сард аст, биёем ба хона дарем."},"pattern":"趋向补语（进、出、上、下）"},{"l":13,"t":{"uz":"'Zhe' harakat yuklamasi","ru":"Динамическая частица '着'","tj":"Зарраи динамикии '着'"},"f":{"uz":"'Zhe' yuklamasi fe'ldan keyin kelib, holatning davom etayotganligini bildiradi (statik holat). Bu ingliz tilidagi '-ing' bilan hosil qilingan sifatdoshga o'xshaydi, lekin harakat emas, balki holat davomiyligini ifodalaydi. Masalan: 门开着 (eshik ochiq turibdi), 手里拿着铅笔 (qo'lida qalam ushlab turibdi). Inkor: 没 + fe'l + 着.","ru":"Частица '着' ставится после глагола и обозначает продолжение состояния (статическое состояние). Похоже на причастие с '-ing' в английском, но выражает не действие, а его длительность. Например: 门开着 (дверь открыта), 手里拿着铅笔 (держит в руке карандаш). Отрицание: 没 + глагол + 着.","tj":"Зарраи '着' баъд аз феъл меояд ва давомнокии ҳолатро нишон медиҳад (ҳолати статикӣ). Ба феъли иштиракии '-ing' дар забони англисӣ монанд аст, аммо на амал балки давомнокии ҳолатро ифода мекунад. Масалан: 门开着 (дар кушода истодааст), 手里拿着铅笔 (дар дасташ қалам дорад). Инкор: 没 + феъл + 着."},"e":{"zh":"门开着呢，请进。","p":"Mén kāi zhe ne, qǐng jìn.","uz":"Eshik ochiq turibdi, kiring.","ru":"Дверь открыта, заходите.","tj":"Дар кушода истодааст, дарояд."},"pattern":"动态助词“着”"},{"l":13,"t":{"uz":"Ritorik savol '不是……吗'","ru":"Риторический вопрос '不是……吗'","tj":"Пурсиши риторикии '不是……吗'"},"f":{"uz":"'Bú shì……ma' konstruktsiyasi ritorik savol hosil qiladi: siz allaqachon bilib turib, tasdiqlash uchun savol qo'yasiz. O'zbek tilidagi '…-ku?' yoki '…emasmi?' ma'nosini beradi. Bu ma'lumotni eslatish yoki hayrat bildirish uchun ishlatiladi.","ru":"Конструкция '不是……吗' образует риторический вопрос: вы уже знаете ответ и задаёте вопрос для подтверждения. Аналог русского '…же?' или '…разве нет?'. Используется для напоминания информации или выражения удивления.","tj":"Конструксияи '不是……吗' пурсиши риторикӣ месозад: шумо аллакай медонед ва барои тасдиқ мепурсед. Ба '…-ку?' ё '…нест?' дар забони тоҷикӣ монанд аст. Барои ёдоварии маълумот ё ифодаи ҳайрат истифода мешавад."},"e":{"zh":"她不是有男朋友了吗？","p":"Tā bú shì yǒu nánpéngyou le ma?","uz":"Uning yigit do'sti bor-ku?","ru":"У неё же был парень?","tj":"Магар ӯ дӯстписар надошт?"},"pattern":"反问句“不是……吗”"},{"l":13,"t":{"uz":"'Wǎng' old ko'makchisi","ru":"Предлог 'wǎng'","tj":"Пешоянди 'wǎng'"},"f":{"uz":"'Wǎng' old ko'makchisi harakat yo'nalishini bildiradi: 'tomon, tomonga'. Fe'l oldidan keladi. Asosiy yo'nalishlar: 往前 (oldinga), 往后 (orqaga), 往左 (chapga), 往右 (o'ngga).","ru":"Предлог 'wǎng' обозначает направление движения: 'в сторону, к'. Ставится перед глаголом. Основные направления: 往前 (вперёд), 往后 (назад), 往左 (налево), 往右 (направо).","tj":"Пешоянди 'wǎng' самти ҳаракатро нишон медиҳад: 'ба тараф, ба самти'. Пеш аз феъл меояд. Самтҳои асосӣ: 往前 (пеш), 往后 (ақиб), 往左 (чап), 往右 (рост)."},"e":{"zh":"一直往前走。","p":"Yìzhí wǎng qián zǒu.","uz":"To'g'ri oldinga yuring.","ru":"Идите прямо вперёд.","tj":"Рост пеш равед."},"pattern":"介词“往”"},{"l":14,"t":{"uz":"'Guo' harakat yuklamasi","ru":"Динамическая частица '过'","tj":"Зарраи динамикии '过'"},"f":{"uz":"'Guo' yuklamasi fe'ldan keyin kelib, hayotiy tajribani bildiradi: 'bir vaqtlar …qilganman'. Bu faqat shaxsiy o'tmish tajribasini ifodalaydi. Inkor: '没' + fe'l + '过' (hech qachon …qilmaganman). Savol: fe'l + '过' + '没有?'","ru":"Частица '过' ставится после глагола и обозначает жизненный опыт: 'когда-то делал(а)'. Выражает только личный прошлый опыт. Отрицание: '没' + глагол + '过' (никогда не делал(а)). Вопрос: глагол + '过' + '没有?'","tj":"Зарраи '过' баъд аз феъл меояд ва таҷрибаи зиндагиро ифода мекунад: 'вақте кардаам'. Танҳо таҷрибаи шахсии гузаштаро ифода мекунад. Инкор: '没' + феъл + '过' (ҳеҷгоҳ накардаам). Пурсиш: феъл + '过' + '没有?'"},"e":{"zh":"你看过那个电影吗？","p":"Nǐ kànguo nàge diànyǐng ma?","uz":"Siz o'sha filmni ko'rganmisiz?","ru":"Ты смотрел(а) тот фильм?","tj":"Оё шумо он филмро дидаед?"},"pattern":"动态助词“过”"},{"l":14,"t":{"uz":"'Suīrán……dànshì……' bog'lovchi juftligi","ru":"Союзная пара 'suīrán……dànshì……'","tj":"Ҷуфти пайвандии 'suīrán……dànshì……'"},"f":{"uz":"'Suīrán……dànshì……' bog'lovchi juftligi 'garchi……bo'lsa ham, lekin……' ma'nosini beradi. Birinchi qismda tan olingan holat, ikkinchi qismda unga qarama-qarshi fikr ifodalanadi. 'Suīrán' ko'pincha gap boshida yoki ot/sifatdan oldin keladi.","ru":"Союзная пара 'suīrán……dànshì……' означает 'хотя……но……'. В первой части признаётся некоторый факт, во второй выражается противоположная мысль. 'Suīrán' обычно стоит в начале предложения или перед существительным/прилагательным.","tj":"Ҷуфти пайвандии 'suīrán……dànshì……' маъниаш 'гарчи……бошад ҳам, аммо……' аст. Дар қисми аввал ҳолате эътироф мешавад, дар қисми дуввум фикри муқобил ифода мешавад. 'Suīrán' одатан дар аввали ҷумла ё пеш аз исм/сифат меояд."},"e":{"zh":"虽然是晴天，但是很冷。","p":"Suīrán shì qíngtiān, dànshì hěn lěng.","uz":"Garchi quyoshli kun bo'lsa ham, lekin juda sovuq.","ru":"Хотя солнечно, но очень холодно.","tj":"Гарчи рӯзи офтобӣ бошад ҳам, аммо хеле сард аст."},"pattern":"关联词“虽然……，但是……”"},{"l":14,"t":{"uz":"'Cì' harakat miqdori to'ldiruvchisi","ru":"Счётное дополнение '次'","tj":"Иловаи миқдории '次'"},"f":{"uz":"'Cì' (marta, safar) harakat miqdori to'ldiruvchisi bo'lib, fe'ldan keyin keladi va harakatning necha marta bajarilganligini bildiradi. Tuzilish: fe'l + '过' + sanoq + '次'. Masalan: 去过两次 (ikki marta borgan).","ru":"'Cì' (раз) является счётным дополнением, стоит после глагола и указывает, сколько раз выполнено действие. Структура: глагол + '过' + число + '次'. Например: 去过两次 (бывал(а) два раза).","tj":"'Cì' (маротиба, бор) иловаи миқдорӣ аст, баъд аз феъл меояд ва нишон медиҳад амал чанд маротиба иҷро шудааст. Сохтор: феъл + '过' + рақам + '次'. Масалан: 去过两次 (ду маротиба рафтаам)."},"e":{"zh":"我去过中国好几次。","p":"Wǒ qùguo Zhōngguó hǎo jǐ cì.","uz":"Men Xitoyga bir necha marta borgan.","ru":"Я бывал(а) в Китае несколько раз.","tj":"Ман ба Чин чанд маротиба рафтаам."},"pattern":"动量补语“次”"},{"l":15,"t":{"uz":"'Yào……le' yaqin kelajak konstruktsiyasi","ru":"Конструкция '要……了' ближайшего будущего","tj":"Конструксияи '要……了' ояндаи наздик"},"f":{"uz":"'Yào……le' yoki 'jiù yào……le' yoki 'kuài yào……le' konstruktsiyasi yaqin kelajakda bo'ladigan voqeani bildiradi: 'tez orada …bo'ladi / …qilmoqchi'. 'Jiù yào' aniqroq vaqt bilan, 'kuài yào' esa umumiy 'tez orada' ma'nosida ishlatiladi. Gap oxiridagi 'le' o'zgarish yoki yangi holat yaqinligini ko'rsatadi.","ru":"Конструкции '要……了', '就要……了' или '快要……了' обозначают события ближайшего будущего: 'вот-вот произойдёт'. '就要' используется с более конкретным временем, '快要' — в общем смысле 'скоро'. Частица 'le' в конце указывает на близость изменения или нового состояния.","tj":"Конструксияҳои '要……了', '就要……了' ё '快要……了' рӯйдодҳои оянда наздикро нишон медиҳанд: 'зуд мешавад / қариб'. '就要' бо вақти мушаххастар, '快要' дар маъноии умумии 'зуд' истифода мешавад. Зарраи 'le' дар охири ҷумла наздикии тағйирот ё ҳолати навро нишон медиҳад."},"e":{"zh":"新年就要到了。","p":"Xīnnián jiù yào dào le.","uz":"Yangi yil yaqinlashib qoldi.","ru":"Новый год уже совсем близко.","tj":"Соли нав наздик шуд."},"pattern":"动作的状态\"要……了\""},{"l":15,"t":{"uz":"'Dōu……le' ta'kid konstruktsiyasi","ru":"Конструкция '都……了' для выражения удивления","tj":"Конструксияи '都……了' барои таъкид"},"f":{"uz":"'Dōu……le' konstruktsiyasi ta'kid bildiradi: vaqt yoki miqdor allaqachon ancha ko'p yoki kutilgandan ortiq bo'lib qoldi. O'zbek tilidagi '…bo'lib ketdi!' yoki '…bo'lib qoldi-ku!' iborasiga o'xshaydi. Ko'pincha hayrat yoki norozilik ifodalamoqda qo'llanadi.","ru":"Конструкция '都……了' выражает акцент: время или количество уже достигло неожиданного или чрезмерного уровня. Аналог русского 'уже … же!' или 'ну и…!'. Часто выражает удивление или недовольство.","tj":"Конструксияи '都……了' таъкид мекунад: вақт ё миқдор аллакай ба сатҳи ғайричашмдошт ё аз ҳад зиёд расидааст. Ба ибораҳои '…шуду рафт!' ё '…шуд-ку!' дар тоҷикӣ монанд аст. Аксар вақт ҳайрат ё норозигиро ифода мекунад."},"e":{"zh":"都八点四十了！","p":"Dōu bā diǎn sìshí le!","uz":"Soat sakkiz qirq bo'lib qoldi!","ru":"Уже восемь сорок!","tj":"Дигар соати ҳашту чил шуд!"},"pattern":"\"都……了\""},{"l":15,"t":{"uz":"'Gèng' (yanada, bundan ham ko'proq) ravishining ishlatilishi","ru":"Использование наречия '更' (ещё более, ещё больше)","tj":"Истифодаи зарфи '更' (ҳатто бештар, боз ҳам зиёдтар)"},"f":{"uz":"'更' ravishi sifat yoki ravish oldidan kelib, qiyoslashni kuchaytiradi: 'yanada, bundan ham ko'proq'.\nTuzilish: A 比 B 更 + sifat (A dan B dan yanada …).\n'更' mustaqil ham qo'llanadi: '我希望明年更好' (Umid qilamanki keyingi yil yanada yaxshi bo'lsin).\n'还' (hái) bilan almashtirib ham ishlatilishi mumkin.","ru":"Наречие '更' стоит перед прилагательным или наречием и усиливает сравнение: 'ещё более, ещё больше'.\nСтруктура: A 比 B 更 + прилагательное (A ещё более … чем B).\n'更' употребляется и самостоятельно: '我希望明年更好' (Надеюсь, в следующем году будет ещё лучше).\nМожет взаимозаменяться с '还' (hái) в некоторых контекстах.","tj":"Зарфи '更' пеш аз сифат ё зарф меояд ва муқоисаро тақвият медиҳад: 'ҳатто бештар, боз ҳам зиёдтар'.\nСохтор: A 比 B 更 + сифат (A аз B ҳатто … бештар).\n'更' мустақилона ҳам истифода мешавад: '我希望明年更好' (Умедворам соли оянда боз ҳам беҳтар шавад).\nДар баъзе контекстҳо бо '还' (hái) иваз шуда метавонад."},"e":{"zh":"希望我们的公司明年更好！","p":"Xīwàng wǒmen de gōngsī míngnián gèng hǎo!","uz":"Umid qilamanki kompaniyamiz kelasi yil yanada yaxshilansin!","ru":"Надеюсь, в следующем году наша компания будет ещё лучше!","tj":"Умедворам ширкати мо соли оянда боз ҳам беҳтар шавад!"},"pattern":"副词\"更\"的用法"}],"QUIZ":[{"l":1,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我要去北京旅游。","ru":"Какая грамматика использована?\n我要去北京旅游。","tj":"Кадом грамматика истифода шудааст?\n我要去北京旅游。"},"opts":["助动词：要","程度副词：最","概数的表达：几、多","用“是不是”的问句"],"a":0,"explanation":{"uz":"'要' (yào) - istak yoki zaruriyatni bildiruvchi yordamchi fe'l. Fe'ldan oldin kelib, 'xohlamoq / bormoqchi / kerak' ma'nolarini beradi. Inkor shakli: 不要 (buyruq) yoki 不想 (istamaslik).","ru":"'要' (yào) — вспомогательный глагол, выражающий желание или необходимость. Ставится перед основным глаголом, означает «хотеть / собираться / нужно». Отрицание: 不要 (запрет) или 不想 (нежелание).","tj":"'要' (yào) — феъли ёрдамии ифодакунандаи хоҳиш ё зарурат. Пеш аз феъли асосӣ меояд ва маънои 'хостан / қасд доштан / лозим' дорад. Шакли инкорӣ: 不要 (манъ) ё 不想 (нахостан)."}},{"l":1,"q":{"uz":"Qaysi grammatika ishlatilgan?\n九月去北京旅游最好。","ru":"Какая грамматика использована?\n九月去北京旅游最好。","tj":"Кадом грамматика истифода шудааст?\n九月去北京旅游最好。"},"opts":["程度副词：最","助动词：要","概数的表达：几、多","用“是不是”的问句"],"a":0,"explanation":{"uz":"'最' (zuì) - 'eng' ma'nosini beruvchi daraja ravishi. Sifat yoki fe'ldan oldin kelib, eng yuqori darajani bildiradi.","ru":"'最' (zuì) — наречие степени, означающее «самый, наиболее». Ставится перед прилагательным или глаголом и обозначает наивысшую степень.","tj":"'最' (zuì) — зарфи дараҷа бо маънои 'аз ҳама, бештар'. Пеш аз сифат ё феъл меояд ва дараҷаи аълоро ифода мекунад."}},{"l":1,"q":{"uz":"Qaysi grammatika ishlatilgan?\n这里有几个杯子。","ru":"Какая грамматика использована?\n这里有几个杯子。","tj":"Кадом грамматика истифода шудааст?\n这里有几个杯子。"},"opts":["概数的表达：几、多","助动词：要","程度副词：最","用“是不是”的问句"],"a":0,"explanation":{"uz":"Taxminiy sonni ifodalash usullari:\n• 几 (jǐ) — 'bir nechta' (odatda 10 gacha), noaniq miqdor.\n• 多 (duō) — son + ölçü + 多 shaklida 'dan ko'proq, ziyod' ma'nosini beradi.","ru":"Способы выражения приблизительного числа:\n• 几 (jǐ) — «несколько» (обычно до 10), неопределённое количество.\n• 多 (duō) — после числа + счётного слова означает «с лишним, больше».","tj":"Усулҳои ифодаи рақамҳои тахминӣ:\n• 几 (jǐ) — 'чанд' (одатан то 10), миқдори номуайян.\n• 多 (duō) — баъд аз рақам + воҳид маънои 'зиёда аз, бештар' дорад."}},{"l":2,"q":{"uz":"Qaysi grammatika ishlatilgan?\n你是不是喜欢运动？","ru":"Какая грамматика использована?\n你是不是喜欢运动？","tj":"Кадом грамматика истифода шудааст?\n你是不是喜欢运动？"},"opts":["用“是不是”的问句","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'是不是' bilan tuzilgan savol gaplari. Bu qolip orqali biror narsa haqida taxmin qilib so'raladi. '是不是' gap boshida yoki o'rtasida kelishi mumkin. Javob 'shunday' yoki 'yo'q' shaklida bo'ladi.","ru":"Вопросы, построенные с 是不是. С помощью этого шаблона задаётся вопрос-предположение. 是不是 может стоять в начале или середине предложения. Ответ — «да» или «нет».","tj":"Саволҳое, ки бо 是不是 сохта мешаванд. Тавассути ин қолиб гумонии чизе пурсида мешавад. 是不是 метавонад дар аввал ё миёнаи ҷумла биояд. Ҷавоб бо 'бале' ё 'не' дода мешавад."}},{"l":2,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我每天早上都要跑步。","ru":"Какая грамматика использована?\n我每天早上都要跑步。","tj":"Кадом грамматика истифода шудааст?\n我每天早上都要跑步。"},"opts":["代词“每”","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'每' olmoshi 'har, har qaysi' ma'nosini beradi. U otdan oldin qo'llaniladi va ko'pincha 都 bilan birga ishlatiladi.","ru":"Местоимение 每 означает «каждый». Ставится перед существительным и часто используется в связке с 都.","tj":"Ҷонишини 每 маънои 'ҳар' дорад. Пеш аз исм меояд ва аксар бо 都 дар якҷоягӣ истифода мешавад."}},{"l":2,"q":{"uz":"Qaysi grammatika ishlatilgan?\n你多高？","ru":"Какая грамматика использована?\n你多高？","tj":"Кадом грамматика истифода шудааст?\n你多高？"},"opts":["疑问代词“多”","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'多' so'roq olmoshi sifat oldidan kelib 'qancha, nechog'liq' ma'nosini beradi. Odatda o'lchov yoki miqdor so'rashda ishlatiladi.","ru":"Вопросительное местоимение 多 ставится перед прилагательным и означает «насколько, какой». Используется для вопросов об измерениях или величинах.","tj":"Ҷонишини саволии 多 пеш аз сифат меояд ва маънои 'чӣ қадар, чанд' дорад. Барои пурсидан дар бораи андоза ё миқдор истифода мешавад."}},{"l":3,"q":{"uz":"Qaysi grammatika ishlatilgan?\n左边那个红色的是我的。","ru":"Какая грамматика использована?\n左边那个红色的是我的。","tj":"Кадом грамматика истифода шудааст?\n左边那个红色的是我的。"},"opts":["“的”字短语","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'的' qo'shimchasi ot o'rnida ishlatilganda '的' bilan tugagan birikma ot vazifasini bajaradi. Masalan, '红色的' = 'qizil rangli narsa', '送报纸的' = 'gazeta olib keladigan odam'. Bu usul takrorni oldini olish uchun ishlatiladi.","ru":"Когда частица 的 используется вместо существительного, словосочетание, заканчивающееся на 的, выполняет функцию существительного. Например, '红色的' = 'красная вещь', '送报纸的' = 'человек, доставляющий газеты'. Используется для избегания повторений.","tj":"Вақте ки 的 ба ҷои исм истифода мешавад, ибораи хотимаёфта бо 的 нақши исмро мебозад. Масалан, '红色的' = 'чизи сурх', '送报纸的' = 'одами рӯзнома оваранда'. Барои пешгирии такрор истифода мешавад."}},{"l":3,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我看一下。","ru":"Какая грамматика использована?\n我看一下。","tj":"Кадом грамматика истифода шудааст?\n我看一下。"},"opts":["量词“一下”","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'一下' fe'ldan keyin kelib harakatning qisqa yoki engil bajarilishini bildiradi. U fe'lni muloyim yoki noaniq qiladi. O'zbek tilidagi 'bir oz, bir qarayin' kabi.","ru":"一下 ставится после глагола и указывает на краткое или лёгкое выполнение действия. Смягчает глагол или делает его неопределённым. Аналог русского «разок, немного».","tj":"一下 баъд аз феъл меояд ва ифодаи кӯтоҳ ё сабуки амалро нишон медиҳад. Феълро нарм ё номуайян мекунад. Ба монанди 'як дафъа, каме' дар забони ӯзбекӣ."}},{"l":3,"q":{"uz":"Qaysi grammatika ishlatilgan?\n你女儿的房间真漂亮啊！","ru":"Какая грамматика использована?\n你女儿的房间真漂亮啊！","tj":"Кадом грамматика истифода шудааст?\n你女儿的房间真漂亮啊！"},"opts":["语气副词“真”","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'真' ravishi sifat yoki fe'l oldidan kelib 'haqiqatan, juda' ma'nosida kuchaytirish bildiradi. Ko'pincha hayrat yoki ta'sir bildiruvchi gaplarda ishlatiladi.","ru":"Наречие 真 ставится перед прилагательным или глаголом и означает усиление «действительно, очень». Часто используется в восклицательных предложениях.","tj":"Зарфи 真 пеш аз сифат ё феъл меояд ва тақвиятро ба маънии 'воқеан, хеле' ифода мекунад. Аксар дар ҷумлаҳои ҳайратии ифодакунанда истифода мешавад."}},{"l":4,"q":{"uz":"Qaysi grammatika ishlatilgan?\n这个工作是他帮我介绍的。","ru":"Какая грамматика использована?\n这个工作是他帮我介绍的。","tj":"Кадом грамматика истифода шудааст?\n这个工作是他帮我介绍的。"},"opts":["“是……的”句：强调施事","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'是……的' qolipida o'tgan hodisaning vaqti, joyi yoki usuli ta'kidlanadi. Gap tuzilishi: 是 + ta'kidlanadigan ma'lumot + fe'l + 的. Bu qolip hodisaning o'zi emas, balki uning qanday, qachon yoki kim tomonidan bajarilgani muhim bo'lganda ishlatiladi.","ru":"Конструкция 是……的 подчёркивает время, место или способ совершения прошедшего действия. Структура: 是 + выделяемая информация + глагол + 的. Используется, когда важен не сам факт действия, а то как, когда или кем оно было выполнено.","tj":"Конструксияи 是……的 вақт, ҷой ё усули амали гузаштаро таъкид мекунад. Сохтор: 是 + маълумоти таъкидшаванда + феъл + 的. Вақте истифода мешавад, ки на худи амал, балки чӣ тавр, кай ё аз ҷониби кӣ иҷро шудани он муҳим аст."}},{"l":4,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我十一岁的时候开始踢足球。","ru":"Какая грамматика использована?\n我十一岁的时候开始踢足球。","tj":"Кадом грамматика истифода шудааст?\n我十一岁的时候开始踢足球。"},"opts":["表示时间：……的时候","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'……的时候' qolipida biror ish yuz bergan vaqt ko'rsatiladi. O'zbek tilidagi '……paytida, ……vaqtida' iborasiga to'g'ri keladi.","ru":"Конструкция ……的时候 указывает на момент, когда произошло действие. Соответствует русскому «когда…, в то время как…».","tj":"Конструксияи ……的时候 вақти вуқӯи амалро нишон медиҳад. Ба ибораи тоҷикии '……вақте ки, дар вақти……' мувофиқ аст."}},{"l":4,"q":{"uz":"Qaysi grammatika ishlatilgan?\n已经踢了十年了。","ru":"Какая грамматика использована?\n已经踢了十年了。","tj":"Кадом грамматика истифода шудааст?\n已经踢了十年了。"},"opts":["时间副词“已经”","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'已经' ravishi 'allaqachon' ma'nosini beradi. U fe'ldan oldin keladi va ko'pincha '了' bilan birga ishlatiladi. Biror harakatning avvalroq bajarilganini ta'kidlaydi.","ru":"Наречие 已经 означает «уже». Ставится перед глаголом и часто используется в связке с 了. Подчёркивает, что действие совершилось ранее.","tj":"Зарфи 已经 маънои 'аллакай' дорад. Пеш аз феъл меояд ва аксар бо 了 дар якҷоягӣ истифода мешавад. Таъкид мекунад, ки амал пешак иҷро шудааст."}},{"l":5,"q":{"uz":"Qaysi grammatika ishlatilgan?\n就买这件吧。","ru":"Какая грамматика использована?\n就买这件吧。","tj":"Кадом грамматика истифода шудааст?\n就买这件吧。"},"opts":["副词“就”","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'就' ravishi bir nechta ma'noda ishlatiladi: 1) Biror narsa haqida yakun qilib aytilganda ('aynan shu, xuddi shunday'); 2) Tez yoki darhol biror narsa bo'lishini bildiradi; 3) Tasdiq uchun ishlatiladi. Ko'pincha fe'ldan oldin keladi.","ru":"Наречие 就 имеет несколько значений: 1) Подведение итога ('именно вот это'); 2) Скорость или немедленность действия; 3) Подтверждение. Обычно ставится перед глаголом.","tj":"Зарфи 就 якчанд маъно дорад: 1) Хулосабандӣ ('маҳз ин'); 2) Зудии амал ё фавриятро ифода мекунад; 3) Барои тасдиқ. Одатан пеш аз феъл меояд."}},{"l":5,"q":{"uz":"Qaysi grammatika ishlatilgan?\n颜色还可以，就是有点儿大。","ru":"Какая грамматика использована?\n颜色还可以，就是有点儿大。","tj":"Кадом грамматика истифода шудааст?\n颜色还可以，就是有点儿大。"},"opts":["语气副词“还”（1）","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'还' ravishi bu darsda 'qabul qilarli, yaxshi' ma'nosida ishlatiladi. Biror narsa kutilgandan yaxshiroq yoki o'rtacha yaxshi ekanligini bildiradi. '还可以', '还好' kabi birikmalar odatda 'yomon emas' ma'nosini beradi.","ru":"В этом уроке наречие 还 используется в значении «приемлемо, неплохо». Обозначает, что что-то лучше ожидаемого или на среднем уровне. Сочетания 还可以, 还好 обычно означают «неплохо».","tj":"Дар ин дарс зарфи 还 бо маънои 'қабул аст, бад нест' истифода мешавад. Нишон медиҳад, ки чизе беҳтар аз он чи интизор буданд ё дар сатҳи миёна аст. Ибораҳои 还可以, 还好 одатан маънои 'бад нест' доранд."}},{"l":5,"q":{"uz":"Qaysi grammatika ishlatilgan?\n这件衣服有点儿大。","ru":"Какая грамматика использована?\n这件衣服有点儿大。","tj":"Кадом грамматика истифода шудааст?\n这件衣服有点儿大。"},"opts":["程度副词“有点儿”","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'有点儿' sifat yoki fe'l oldidan kelib 'biroz, sal, ozgina' ma'nosini beradi. Ko'pincha salbiy yoki noqulay holatlarda ishlatiladi. O'zbek tilidagi 'biroz, sal ko'p, ozgina' ifodasiga to'g'ri keladi.","ru":"有点儿 ставится перед прилагательным или глаголом и означает «немного, чуть-чуть». Чаще используется в отрицательных или некомфортных ситуациях. Аналог русского «немного, слегка».","tj":"有点儿 пеш аз сифат ё феъл меояд ва маънои 'каме, андак' дорад. Аксар дар вазъиятҳои манфӣ ё номатлуб истифода мешавад."}},{"l":6,"q":{"uz":"Qaysi grammatika ishlatilgan?\n你怎么知道他来了？","ru":"Какая грамматика использована?\n你怎么知道他来了？","tj":"Кадом грамматика истифода шудааст?\n你怎么知道他来了？"},"opts":["疑问代词“怎么”","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'怎么' so'roq olmoshi ikki xil ma'noda ishlatiladi:\n1) 'Qanday qilib? Qanday yo'l bilan?' — usul yoki harakat tarzini so'rashda;\n2) 'Nega? Nima uchun?' — hayrat yoki tushunmovchilik bildiruvchi savolda.\nIkkinchi ma'noda ko'pincha salbiy gaplarda uchraydi.","ru":"Вопросительное местоимение '怎么' используется в двух значениях:\n1) 'Как? Каким образом?' — для вопроса о способе или методе действия;\n2) 'Почему? Как так?' — для выражения удивления или непонимания.\nВо втором значении часто встречается в отрицательных предложениях.","tj":"Исми саволии '怎么' дар ду маъно истифода мешавад:\n1) 'Чӣ тавр? Бо кадом роҳ?' — барои пурсидани усул ё тарзи амал;\n2) 'Чаро? Чи хел?' — барои ифодаи шигифт ё нофаҳмӣ.\nДар маъноии дуввум аксар вақт дар ҷумлаҳои инкорӣ истифода мешавад."}},{"l":6,"q":{"uz":"Qaysi grammatika ishlatilgan?\n这个星期我天天都吃羊肉。","ru":"Какая грамматика использована?\n这个星期我天天都吃羊肉。","tj":"Кадом грамматика истифода шудааст?\n这个星期我天天都吃羊肉。"},"opts":["量词的重叠","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"Miqdor ko'makchilarini takrorlash orqali 'har bir, har qaysi' ma'nosi hosil qilinadi.\nMasalan, 天天 = har kuni, 年年 = har yili.\nBu qolip davomiylik va takrorlanuvchilikni ta'kidlaydi.","ru":"Удвоение счётных слов образует значение 'каждый, любой'.\nНапример, 天天 = каждый день, 年年 = каждый год.\nЭта конструкция подчёркивает постоянство и повторяемость.","tj":"Такрори калимаҳои шуморавӣ маъноии 'ҳар, ҳар як'-ро месозад.\nМасалан, 天天 = ҳар рӯз, 年年 = ҳар сол.\nИн сохтор давомнокӣ ва такрорпазириро таъкид мекунад."}},{"l":6,"q":{"uz":"Qaysi grammatika ishlatilgan?\n因为昨天下雨，所以我们都没去。","ru":"Какая грамматика использована?\n因为昨天下雨，所以我们都没去。","tj":"Кадом грамматика истифода шудааст?\n因为昨天下雨，所以我们都没去。"},"opts":["关联词“因为……，所以……”","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'因为……所以……' qolipida sabab va oqibat ko'rsatiladi.\n因为 sabab gapini, 所以 esa oqibat gapini boshlab keladi.\nO'zbek tilidagi 'chunki…, shuning uchun…' iborasiga to'g'ri keladi.\nIkkala qism ham birgalikda yoki alohida ishlatilishi mumkin.","ru":"Конструкция '因为……所以……' выражает причину и следствие.\n因为 вводит предложение с причиной, 所以 — со следствием.\nСоответствует русскому 'потому что…, поэтому…'.\nОбе части могут использоваться вместе или по отдельности.","tj":"Дар сохтори '因为……所以……' сабаб ва натиҷа нишон дода мешавад.\n因为 ҷумлаи сабабро, 所以 ҷумлаи натиҷаро мебарад.\nБа форсии тоҷикӣ 'зеро…, аз ин сабаб…' мувофиқат мекунад.\nҲар ду қисм метавонанд якҷоя ё алоҳида истифода шаванд."}},{"l":7,"q":{"uz":"Qaysi grammatika ishlatilgan?\n他还在教室学习呢。","ru":"Какая грамматика использована?\n他还在教室学习呢。","tj":"Кадом грамматика истифода шудааст?\n他还在教室学习呢。"},"opts":["语气副词“还”（2）","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'还' ravishining ikkinchi ma'nosi — 'hali, hanuz'.\nBiror holat davom etayotganini yoki biror narsa hali sodir bo'lmaganini bildiradi.\nKo'pincha 呢 yuklama bilan birga keladi.","ru":"Второе значение наречия '还' — 'ещё, по-прежнему'.\nОбозначает продолжение какого-либо состояния или то, что что-то ещё не произошло.\nЧасто используется вместе с частицей 呢.","tj":"Маъноии дуввуми зарфи '还' — 'ҳанӯз, то ҳол'.\nНишон медиҳад, ки ягон ҳолат идома дорад ё ягон чиз ҳанӯз рӯй надодааст.\nАксар вақт бо ҷузъаи 呢 якҷоя истифода мешавад."}},{"l":7,"q":{"uz":"Qaysi grammatika ishlatilgan?\n二十分钟就到。","ru":"Какая грамматика использована?\n二十分钟就到。","tj":"Кадом грамматика истифода шудааст?\n二十分钟就到。"},"opts":["时间副词“就”","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'就' ravishi vaqt ifodasida 'tez, yaqinda, darhol' ma'nosini beradi.\nBiror hodisa kutilgandan tezroq yoki yaqinroq bo'lishini ta'kidlaydi.","ru":"Наречие '就' в выражении времени означает 'скоро, быстро, сразу'.\nПодчёркивает, что событие произойдёт быстрее или ближе, чем ожидалось.","tj":"Зарфи '就' дар ифодаи вақт маъноии 'зуд, ба зудӣ, дарҳол'-ро медиҳад.\nТаъкид мекунад, ки ягон ҳодиса тезтар ё наздиктар аз он ки интизор буданд рӯй медиҳад."}},{"l":7,"q":{"uz":"Qaysi grammatika ishlatilgan?\n你家离公司远吗？","ru":"Какая грамматика использована?\n你家离公司远吗？","tj":"Кадом грамматика истифода шудааст?\n你家离公司远吗？"},"opts":["离","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'离' old ko'makchisi ikki joy yoki ikki vaqt o'rtasidagi masofani bildiradi.\nGap tuzilishi: A + 离 + B + masofa/vaqt.\nO'zbek tilidagi '...dan (qancha uzoqlikda)' iborasiga to'g'ri keladi.","ru":"Предлог '离' выражает расстояние между двумя местами или промежуток времени.\nСтруктура предложения: A + 离 + B + расстояние/время.\nСоответствует русскому 'от ... (на каком расстоянии)'.","tj":"Пешоянди '离' масофаро байни ду ҷой ё фосилаи вақтиро нишон медиҳад.\nСохтори ҷумла: A + 离 + B + масофа/вақт.\nБа тоҷикӣ 'аз ... (дар чанд масофа)' мувофиқат мекунад."}},{"l":7,"q":{"uz":"Qaysi grammatika ishlatilgan?\n坐公共汽车要一个多小时呢！","ru":"Какая грамматика использована?\n坐公共汽车要一个多小时呢！","tj":"Кадом грамматика истифода шудааст?\n坐公共汽车要一个多小时呢！"},"opts":["语气助词“呢”","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'呢' yuklama gap oxirida kelib davomiylik yoki ta'kidlash bildiradigan ohang hosil qiladi.\nKo'pincha hayrat yoki ta'kid ifodalaydi.\nSavol gapida esa qisqa 'a, -chi?' ma'nosini beradi.","ru":"Частица '呢' в конце предложения создаёт интонацию продолжения или усиления.\nЧасто выражает удивление или подчёркивание.\nВ вопросительном предложении имеет значение 'а?, ну?'.","tj":"Ҷузъаи '呢' дар охири ҷумла оҳанги давомнокӣ ё таъкидро ба вуҷуд меорад.\nАксар вақт шигифт ё таъкидро ифода мекунад.\nДар ҷумлаи саволӣ маъноии '-чӣ? -а?' дорад."}},{"l":8,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我们下午去看电影，好吗？","ru":"Какая грамматика использована?\n我们下午去看电影，好吗？","tj":"Кадом грамматика истифода шудааст?\n我们下午去看电影，好吗？"},"opts":["疑问句“……，好吗”","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'……，好吗？' qolipida biror taklif yoki iltimos yumshoq tarzda bildiriladi.\nGap oxirida '好吗？' qo'shiladi va 'bo'ladimi?, xopmi?' ma'nosini beradi.\nO'zbek tilidagi 'qilamizmi?, bo'lad
