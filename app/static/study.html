imi?' iborasiga to'g'ri keladi.","ru":"Конструкция '……，好吗？' используется для мягкого предложения или просьбы.\nВ конце предложения добавляется '好吗？' со значением 'хорошо?, ладно?'.\nСоответствует русскому 'сделаем?, ладно?'.","tj":"Сохтори '……，好吗？' барои ба таври нарм пешниҳод ё илтимос кардан истифода мешавад.\nДар охири ҷумла '好吗？' илова мешавад бо маъноии 'хуб аст?, розӣ?'.\nБа тоҷикӣ 'мекунем?, розӣ?' мувофиқат мекунад."}},{"l":8,"q":{"uz":"Qaysi grammatika ishlatilgan?\n明天下午再去吧。","ru":"Какая грамматика использована?\n明天下午再去吧。","tj":"Кадом грамматика истифода шудааст?\n明天下午再去吧。"},"opts":["副词“再”","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'再' ravishi 'yana, keyin, qayta' ma'nosini beradi.\nKelajakda takrorlanadigan yoki keyinga qoldirilgan harakatni bildiradi.\n又 dan farqi shundaki, 再 kelajak uchun, 又 esa o'tgan uchun ishlatiladi.","ru":"Наречие '再' означает 'снова, потом, опять'.\nОбозначает действие, которое будет повторяться или откладывается на потом.\nОтличие от 又: 再 — для будущего, 又 — для прошедшего.","tj":"Зарфи '再' маъноии 'боз, баъд, дубора'-ро медиҳад.\nАмалеро нишон медиҳад, ки дар оянда такрор мешавад ё ба баъд гузошта мешавад.\nФарқ аз 又: 再 — барои оянда, 又 — барои гузашта."}},{"l":8,"q":{"uz":"Qaysi grammatika ishlatilgan?\n王老师让我给大卫打个电话。","ru":"Какая грамматика использована?\n王老师让我给大卫打个电话。","tj":"Кадом грамматика истифода шудааст?\n王老师让我给大卫打个电话。"},"opts":["兼语句","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"Pivotal gapda birinchi fe'lning to'ldiruvchisi ikkinchi fe'lning egaligini bajaradi.\nMasalan, '让 + kishi + fe'l' qolipida: 让 — ruxsat bermoq/buyurmoq,\nkeyin boshqa kishi va uning harakati keladi.\n'叫 + kishi + fe'l' ham shu qolipga kiradi.","ru":"В пивотальном предложении дополнение первого глагола является подлежащим второго.\nВ конструкции '让 + человек + глагол': 让 — позволять/приказывать,\nзатем следует другой человек и его действие.\n'叫 + человек + глагол' тоже относится к этому типу.","tj":"Дар ҷумлаи пивотӣ пуркунандаи феъли аввал мубтадои феъли дуввум мегардад.\nДар сохтори '让 + шахс + феъл': 让 — иҷозат додан/дастур додан,\nбаъд шахси дигар ва амали ӯ меояд.\n'叫 + шахс + феъл' ҳам ба ҳамин намуд дохил мешавад."}},{"l":8,"q":{"uz":"Qaysi grammatika ishlatilgan?\n让我想想再告诉你。","ru":"Какая грамматика использована?\n让我想想再告诉你。","tj":"Кадом грамматика истифода шудааст?\n让我想想再告诉你。"},"opts":["动词的重叠","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"Fe'lni takrorlash harakatning qisqa yoki engil bajarilishini bildiradi.\nBir bo'g'inli fe'l AB shaklida (看看, 想想),\nikki bo'g'inli fe'l ABAB shaklida (运动运动) takrorlanadi.\nBu usul muloyim yoki noaniq ifodalar uchun ishlatiladi.","ru":"Удвоение глагола означает краткое или лёгкое выполнение действия.\nОдносложный глагол удваивается по схеме AB (看看, 想想),\nдвусложный — по схеме ABAB (运动运动).\nИспользуется для смягчённых или неопределённых выражений.","tj":"Такрори феъл нишон медиҳад, ки амал кӯтоҳ ё сабук иҷро мешавад.\nФеъли яктаҳарфа бо схемаи AB такрор мешавад (看看, 想想),\nфеъли дутаҳарфа бо схемаи ABAB (运动运动).\nБарои ифодаҳои нарм ё ноаниқ истифода мешавад."}},{"l":9,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我听懂了。","ru":"Какая грамматика использована?\n我听懂了。","tj":"Кадом грамматика истифода шудааст?\n我听懂了。"},"opts":["结果补语","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"Natija to'ldiruvchisi (结果补语) fe'ldan keyin qo'shilib, harakatning natijasini bildiradi.\nMasalan: 听懂 (eshitib tushunmoq), 做完 (tamomlamoq), 找到 (topmoq).\nInkor shaklida 没 yoki 没有 ishlatiladi: 没做完 (tamomlaolmadim).","ru":"Результативное дополнение (结果补语) добавляется после глагола и выражает результат действия.\nНапример: 听懂 (услышать и понять), 做完 (закончить), 找到 (найти).\nВ отрицании используется 没 или 没有: 没做完 (не успел закончить).","tj":"Пуркунандаи натиҷавӣ (结果补语) баъд аз феъл илова мешавад ва натиҷаи амалро нишон медиҳад.\nМасалан: 听懂 (шунида фаҳмидан), 做完 (тамом кардан), 找到 (ёфтан).\nДар инкор 没 ё 没有 истифода мешавад: 没做完 (нарасидам тамом кунам)."}},{"l":9,"q":{"uz":"Qaysi grammatika ishlatilgan?\n他从下个星期一开始上班。","ru":"Какая грамматика использована?\n他从下个星期一开始上班。","tj":"Кадом грамматика истифода шудааст?\n他从下个星期一开始上班。"},"opts":["介词\"从\"","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'从' old ko'makchisi joy yoki vaqtni bildiradi va 'dan/boshlab' ma'nosini beradi.\nOdatda 'cóng … kāishǐ' (…dan boshlab) yoki 'cóng … dào …' (…dan …gacha) ko'rinishida ishlatiladi.","ru":"Предлог '从' обозначает место или время и означает 'от/с/начиная с'.\nОбычно используется в форме 'cóng … kāishǐ' (начиная с …) или 'cóng … dào …' (от … до …).","tj":"Пешоянди '从' ҷой ё вақтро нишон медиҳад ва маъноии 'аз/аз ибтидои'-ро медиҳад.\nОдатан дар шакли 'cóng … kāishǐ' (аз … оғоз) ё 'cóng … dào …' (аз … то …) истифода мешавад."}},{"l":9,"q":{"uz":"Qaysi grammatika ishlatilgan?\n这是他的第一个工作。","ru":"Какая грамматика использована?\n这是他的第一个工作。","tj":"Кадом грамматика истифода шудааст?\n这是他的第一个工作。"},"opts":["\"第\"表示顺序","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'第' prefiksi raqamlardan oldin qo'yilib tartib sonlarini hosil qiladi:\n第一 (birinchi), 第二 (ikkinchi) va h.k.\nBu inglizcha '-th' qo'shimchasiga o'xshaydi.\nOdiy sanoq sonlardan farqli ravishda narsa-predmetning tartibini bildiradi.","ru":"Префикс '第' перед числами образует порядковые числительные:\n第一 (первый), 第二 (второй) и т.д.\nАналог английского суффикса '-th'.\nВ отличие от количественных числительных, обозначает порядок предметов.","tj":"Пешванди '第' пеш аз ададҳо ададҳои тартибиро месозад:\n第一 (якум/аввалин), 第二 (дуввум) ва ғ.\nБа суффикси '-um' дар тоҷикӣ монанд аст.\nДар фарқ аз ададҳои шуморавӣ, тартиби ашёро нишон медиҳад."}},{"l":10,"q":{"uz":"Qaysi grammatika ishlatilgan?\n别看电视了，去睡觉吧。","ru":"Какая грамматика использована?\n别看电视了，去睡觉吧。","tj":"Кадом грамматика истифода шудааст?\n别看电视了，去睡觉吧。"},"opts":["祈使句：不要……了；别……了","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"Biror harakatni to'xtatishni buyurish uchun 'bié……le' yoki 'búyào……le' ishlatiladi.\nBu ikkalasi ham 'endi …qilma' ma'nosini beradi.\n'Bié' so'zlashuv tilida ko'proq qo'llanadi.\nGap oxiridagi 'le' holatning o'zgarganligini yoki da'vatni kuchaytiradi.","ru":"Для приказания прекратить действие используется 'bié……le' или 'búyào……le'.\nОба означают 'больше не делай, хватит'.\n'Bié' чаще используется в разговорной речи.\nЧастица 'le' в конце предложения усиливает призыв или сигнализирует об изменении ситуации.","tj":"Барои дастур додан ба қатъи амал 'bié……le' ё 'búyào……le' истифода мешавад.\nҲар ду маъноии 'дигар накун' доранд.\n'Bié' дар забони гуфтугӯӣ бештар истифода мешавад.\nҶузъаи 'le' дар охири ҷумла даъватро тақвият медиҳад ё тағйири вазъиятро нишон медиҳад."}},{"l":10,"q":{"uz":"Qaysi grammatika ishlatilgan?\n看电视对学汉语有帮助。","ru":"Какая грамматика использована?\n看电视对学汉语有帮助。","tj":"Кадом грамматика истифода шудааст?\n看电视对学汉语有帮助。"},"opts":["介词\"对\"","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'Duì' old ko'makchisi 'uchun, bo'yicha, nisbatan' ma'nolarini beradi.\n'A duì B (yǒu) C' ko'rinishida: A B uchun C (ta'sirga ega/yaxshi/yomon).\nMasalan: 看电视对眼睛不好 (televizor ko'rish ko'z uchun yaxshi emas).","ru":"Предлог '对' означает 'для, по отношению к, относительно'.\nВ конструкции 'A 对 B (有) C': A для B (имеет влияние/хорошо/плохо).\nНапример: 看电视对眼睛不好 (смотреть телевизор вредно для глаз).","tj":"Пешоянди '对' маъноии 'барои, нисбат ба'-ро медиҳад.\nДар сохтори 'A 对 B (有) C': A барои B (таъсир дорад/хуб аст/бад аст).\nМасалан: 看电视对眼睛不好 (тамошои телевизор барои чашм зиёновар аст)."}},{"l":10,"q":{"uz":"Qaysi grammatika ishlatilgan?\n妈妈正在准备午饭呢！","ru":"Какая грамматика использована?\n妈妈正在准备午饭呢！","tj":"Кадом грамматика истифода шудааст?\n妈妈正在准备午饭呢！"},"opts":["副词\"正在\"和语气助词\"呢\"","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'正在' ravishi fe'l oldidan kelib, harakatning aynan hozir davom etayotganini bildiradi.\nIngliz tilidagi 'am/is/are …-ing' ga o'xshaydi.\nGap oxiriga '呢' yuklama qo'shilsa, davom etayotgan holat yanada ta'kidlanadi.\nTuzilish: 正在 + fe'l (+呢). Shuningdek, faqat '在 + fe'l' yoki 'fe'l + 着 + 呢' ham ishlatiladi.","ru":"Наречие '正在' стоит перед глаголом и указывает, что действие происходит прямо сейчас.\nАналог английского 'am/is/are …-ing'.\nЕсли в конце добавляется частица '呢', продолжение состояния подчёркивается.\nСтруктура: 正在 + глагол (+呢). Также используется: 在 + глагол или глагол + 着 + 呢.","tj":"Зарфи '正在' пеш аз феъл меояд ва нишон медиҳад амал айни ҳол ҷараён дорад.\nБа 'am/is/are …-ing' дар забони англисӣ монанд аст.\nАгар дар охири ҷумла зарраи '呢' илова шавад, ҷараёни ҳолат бештар таъкид мешавад.\nСохтор: 正在 + феъл (+呢). Инчунин: 在 + феъл ё феъл + 着 + 呢 истифода мешавад."}},{"l":11,"q":{"uz":"Qaysi grammatika ishlatilgan?\n左边看报纸的女孩子是我姐姐。","ru":"Какая грамматика использована?\n左边看报纸的女孩子是我姐姐。","tj":"Кадом грамматика истифода шудааст?\n左边看报纸的女孩子是我姐姐。"},"opts":["动词结构做定语","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"Xitoy tilida fe'l birikmasi yoki gap bo'lagi ot oldidan aniqlovchi bo'lib kelishi mumkin. Bu holda aniqlovchi bilan ot orasiga '的' yuklamasi qo'yiladi. Masalan: '看报纸的女孩子' (gazeta o'qiyotgan qiz).","ru":"В китайском языке глагольная конструкция или часть предложения может выступать определением перед существительным. В этом случае между определением и существительным ставится частица '的'. Например: '看报纸的女孩子' (девушка, читающая газету).","tj":"Дар забони чинӣ сохтори феълӣ ё бахши ҷумла метавонад пеш аз исм ҳамчун муайянкунанда бояд. Дар ин ҳол байни муайянкунанда ва исм зарраи '的' гузошта мешавад. Масалан: '看报纸的女孩子' (духтаре ки рӯзнома мехонад)."}},{"l":11,"q":{"uz":"Qaysi grammatika ishlatilgan?\n他比我大三岁。","ru":"Какая грамматика использована?\n他比我大三岁。","tj":"Кадом грамматика истифода шудааст?\n他比我大三岁。"},"opts":["“比”字句（1）","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'Bǐ' qiyoslash gapi quyidagi tuzilishga ega: A + 比 + B + sifat (+ miqdor farqi). Bu 'A, B dan ko'proq/katta/yaxshi' ma'nosini beradi. Inkor shaklida '没有' ishlatiladi: A + 没有 + B + sifat.","ru":"Конструкция сравнения с 'bǐ' имеет структуру: A + 比 + B + прилагательное (+ разница в количестве). Означает 'A больше/старше/лучше, чем B'. В отрицательной форме используется '没有': A + 没有 + B + прилагательное.","tj":"Ҷумлаи муқоисавӣ бо 'bǐ' сохтори зеринро дорад: A + 比 + B + сифат (+ фарқи миқдорӣ). Маъниаш 'A аз B бештар/калонтар/беҳтар аст'. Дар шакли инкорӣ '没有' истифода мешавад: A + 没有 + B + сифат."}},{"l":11,"q":{"uz":"Qaysi grammatika ishlatilgan?\n你可能不认识她。","ru":"Какая грамматика использована?\n你可能不认识她。","tj":"Кадом грамматика истифода шудааст?\n你可能不认识她。"},"opts":["助动词“可能”","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'Kěnéng' yordamchi fe'li 'ehtimol, mumkin' ma'nosini beradi va fe'l oldidan qo'yiladi. U ma'lum bo'lmagan holatlar haqida taxmin bildiradi. Inkor shakli: '不可能' (mumkin emas, aslo).","ru":"Модальный глагол 'kěnéng' означает 'возможно, может быть' и ставится перед глаголом. Выражает предположение о неизвестных ситуациях. Отрицательная форма: '不可能' (невозможно).","tj":"Феъли ёрирасони 'kěnéng' маъниаш 'эҳтимол, мумкин аст' буда пеш аз феъл меояд. Вай тахминро дар бораи вазъиятҳои номаълум ифода мекунад. Шакли инкорӣ: '不可能' (ғайриимкон аст)."}},{"l":12,"q":{"uz":"Qaysi grammatika ishlatilgan?\n你穿得太少了。","ru":"Какая грамматика использована?\n你穿得太少了。","tj":"Кадом грамматика истифода шудааст?\n你穿得太少了。"},"opts":["状态补语","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"Holat to'ldiruvchisi fe'ldan keyin '得(de)' yuklamasi qo'shilib, harakatning qanday bajarilganligini yoki natijani bildiradi. Tuzilish: Fe'l + 得 + sifat/holat. Agar fe'lning to'ldiruvchisi bo'lsa, fe'l takrorlanadi: 做饭做得好. Inkor: 得 dan keyin '不' qo'yiladi: 做得不好.","ru":"Дополнение состояния образуется после глагола с частицей '得(de)' и описывает, как выполняется действие или каков его результат. Структура: Глагол + 得 + прилагательное/состояние. Если у глагола есть дополнение, глагол повторяется: 做饭做得好. Отрицание: после '得' ставится '不': 做得不好.","tj":"Иловаи ҳолат баъд аз феъл бо зарраи '得(de)' омада, тавсиф мекунад амал чӣ тавр иҷро мешавад ё натиҷааш чист. Сохтор: Феъл + 得 + сифат/ҳолат. Агар феъл иловаи хос дошта бошад, феъл такрор мешавад: 做饭做得好. Инкор: баъд аз '得' '不' гузошта мешавад: 做得不好."}},{"l":12,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我妻子比我做饭做得好。","ru":"Какая грамматика использована?\n我妻子比我做饭做得好。","tj":"Кадом грамматика истифода шудааст?\n我妻子比我做饭做得好。"},"opts":["“比”字句（2）","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"Fe'l birikmalarini qiyoslashda '比' quyidagicha ishlatiladi: A + 比 + B + fe'l + 得 + sifat. Yoki fe'l takrorlanadi: A + 比 + B + fe'l + fe'l + 得 + sifat. Masalan: 我妻子比我做饭做得好. Miqdor farqini qo'shish mumkin: 比我早起一个小时.","ru":"При сравнении глагольных конструкций '比' используется так: A + 比 + B + глагол + 得 + прилагательное. Или глагол повторяется: A + 比 + B + глагол + глагол + 得 + прилагательное. Например: 我妻子比我做饭做得好. Можно добавить разницу: 比我早起一个小时.","tj":"Ҳангоми муқоисаи сохторҳои феълӣ 'bǐ' чунин истифода мешавад: A + 比 + B + феъл + 得 + сифат. Ё феъл такрор мешавад: A + 比 + B + феъл + феъл + 得 + сифат. Масалан: 我妻子比我做饭做得好. Метавон фарқро ҳам зиёд кард: 比我早起一个小时."}},{"l":12,"q":{"uz":"Qaysi grammatika ishlatilgan?\n外边冷，我们进房间吧。","ru":"Какая грамматика использована?\n外边冷，我们进房间吧。","tj":"Кадом грамматика истифода шудааст?\n外边冷，我们进房间吧。"},"opts":["趋向补语（进、出、上、下）","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"Yo'nalish to'ldiruvchisi fe'ldan keyin kelib, harakatning yo'nalishini bildiradi.\nOddiy shakl: fe'l + 进/出/上/下 (va h.k.)\nMurakkab shakl: fe'l + 进/出 + 来/去 (yaqin yoki uzoqlashuv uchun).\nMasalan: 进来 (kiring — yaqin), 进去 (kiring — uzoq), 出来/出去 (chiqing).","ru":"Направленное дополнение ставится после глагола и указывает направление действия.\nПростая форма: глагол + 进/出/上/下 и т.д.\nСоставная форма: глагол + 进/出 + 来/去 (для приближения или удаления).\nНапример: 进来 (войдите — приближение), 进去 (войдите — удаление), 出来/出去 (выйдите).","tj":"Иловаи самт баъд аз феъл меояд ва самти амалро нишон медиҳад.\nШакли оддӣ: феъл + 进/出/上/下 ва ғ.\nШакли мураккаб: феъл + 进/出 + 来/去 (барои наздик шудан ё дур шудан).\nМасалан: 进来 (дароед — наздик), 进去 (дароед — дур), 出来/出去 (берун шавед)."}},{"l":13,"q":{"uz":"Qaysi grammatika ishlatilgan?\n门开着呢，请进。","ru":"Какая грамматика использована?\n门开着呢，请进。","tj":"Кадом грамматика истифода шудааст?\n门开着呢，请进。"},"opts":["动态助词“着”","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'Zhe' yuklamasi fe'ldan keyin kelib, holatning davom etayotganligini bildiradi (statik holat). Bu ingliz tilidagi '-ing' bilan hosil qilingan sifatdoshga o'xshaydi, lekin harakat emas, balki holat davomiyligini ifodalaydi. Masalan: 门开着 (eshik ochiq turibdi), 手里拿着铅笔 (qo'lida qalam ushlab turibdi). Inkor: 没 + fe'l + 着.","ru":"Частица '着' ставится после глагола и обозначает продолжение состояния (статическое состояние). Похоже на причастие с '-ing' в английском, но выражает не действие, а его длительность. Например: 门开着 (дверь открыта), 手里拿着铅笔 (держит в руке карандаш). Отрицание: 没 + глагол + 着.","tj":"Зарраи '着' баъд аз феъл меояд ва давомнокии ҳолатро нишон медиҳад (ҳолати статикӣ). Ба феъли иштиракии '-ing' дар забони англисӣ монанд аст, аммо на амал балки давомнокии ҳолатро ифода мекунад. Масалан: 门开着 (дар кушода истодааст), 手里拿着铅笔 (дар дасташ қалам дорад). Инкор: 没 + феъл + 着."}},{"l":13,"q":{"uz":"Qaysi grammatika ishlatilgan?\n她不是有男朋友了吗？","ru":"Какая грамматика использована?\n她不是有男朋友了吗？","tj":"Кадом грамматика истифода шудааст?\n她不是有男朋友了吗？"},"opts":["反问句“不是……吗”","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'Bú shì……ma' konstruktsiyasi ritorik savol hosil qiladi: siz allaqachon bilib turib, tasdiqlash uchun savol qo'yasiz. O'zbek tilidagi '…-ku?' yoki '…emasmi?' ma'nosini beradi. Bu ma'lumotni eslatish yoki hayrat bildirish uchun ishlatiladi.","ru":"Конструкция '不是……吗' образует риторический вопрос: вы уже знаете ответ и задаёте вопрос для подтверждения. Аналог русского '…же?' или '…разве нет?'. Используется для напоминания информации или выражения удивления.","tj":"Конструксияи '不是……吗' пурсиши риторикӣ месозад: шумо аллакай медонед ва барои тасдиқ мепурсед. Ба '…-ку?' ё '…нест?' дар забони тоҷикӣ монанд аст. Барои ёдоварии маълумот ё ифодаи ҳайрат истифода мешавад."}},{"l":13,"q":{"uz":"Qaysi grammatika ishlatilgan?\n一直往前走。","ru":"Какая грамматика использована?\n一直往前走。","tj":"Кадом грамматика истифода шудааст?\n一直往前走。"},"opts":["介词“往”","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'Wǎng' old ko'makchisi harakat yo'nalishini bildiradi: 'tomon, tomonga'. Fe'l oldidan keladi. Asosiy yo'nalishlar: 往前 (oldinga), 往后 (orqaga), 往左 (chapga), 往右 (o'ngga).","ru":"Предлог 'wǎng' обозначает направление движения: 'в сторону, к'. Ставится перед глаголом. Основные направления: 往前 (вперёд), 往后 (назад), 往左 (налево), 往右 (направо).","tj":"Пешоянди 'wǎng' самти ҳаракатро нишон медиҳад: 'ба тараф, ба самти'. Пеш аз феъл меояд. Самтҳои асосӣ: 往前 (пеш), 往后 (ақиб), 往左 (чап), 往右 (рост)."}},{"l":14,"q":{"uz":"Qaysi grammatika ishlatilgan?\n你看过那个电影吗？","ru":"Какая грамматика использована?\n你看过那个电影吗？","tj":"Кадом грамматика истифода шудааст?\n你看过那个电影吗？"},"opts":["动态助词“过”","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'Guo' yuklamasi fe'ldan keyin kelib, hayotiy tajribani bildiradi: 'bir vaqtlar …qilganman'. Bu faqat shaxsiy o'tmish tajribasini ifodalaydi. Inkor: '没' + fe'l + '过' (hech qachon …qilmaganman). Savol: fe'l + '过' + '没有?'","ru":"Частица '过' ставится после глагола и обозначает жизненный опыт: 'когда-то делал(а)'. Выражает только личный прошлый опыт. Отрицание: '没' + глагол + '过' (никогда не делал(а)). Вопрос: глагол + '过' + '没有?'","tj":"Зарраи '过' баъд аз феъл меояд ва таҷрибаи зиндагиро ифода мекунад: 'вақте кардаам'. Танҳо таҷрибаи шахсии гузаштаро ифода мекунад. Инкор: '没' + феъл + '过' (ҳеҷгоҳ накардаам). Пурсиш: феъл + '过' + '没有?'"}},{"l":14,"q":{"uz":"Qaysi grammatika ishlatilgan?\n虽然是晴天，但是很冷。","ru":"Какая грамматика использована?\n虽然是晴天，但是很冷。","tj":"Кадом грамматика истифода шудааст?\n虽然是晴天，但是很冷。"},"opts":["关联词“虽然……，但是……”","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'Suīrán……dànshì……' bog'lovchi juftligi 'garchi……bo'lsa ham, lekin……' ma'nosini beradi. Birinchi qismda tan olingan holat, ikkinchi qismda unga qarama-qarshi fikr ifodalanadi. 'Suīrán' ko'pincha gap boshida yoki ot/sifatdan oldin keladi.","ru":"Союзная пара 'suīrán……dànshì……' означает 'хотя……но……'. В первой части признаётся некоторый факт, во второй выражается противоположная мысль. 'Suīrán' обычно стоит в начале предложения или перед существительным/прилагательным.","tj":"Ҷуфти пайвандии 'suīrán……dànshì……' маъниаш 'гарчи……бошад ҳам, аммо……' аст. Дар қисми аввал ҳолате эътироф мешавад, дар қисми дуввум фикри муқобил ифода мешавад. 'Suīrán' одатан дар аввали ҷумла ё пеш аз исм/сифат меояд."}},{"l":14,"q":{"uz":"Qaysi grammatika ishlatilgan?\n我去过中国好几次。","ru":"Какая грамматика использована?\n我去过中国好几次。","tj":"Кадом грамматика истифода шудааст?\n我去过中国好几次。"},"opts":["动量补语“次”","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'Cì' (marta, safar) harakat miqdori to'ldiruvchisi bo'lib, fe'ldan keyin keladi va harakatning necha marta bajarilganligini bildiradi. Tuzilish: fe'l + '过' + sanoq + '次'. Masalan: 去过两次 (ikki marta borgan).","ru":"'Cì' (раз) является счётным дополнением, стоит после глагола и указывает, сколько раз выполнено действие. Структура: глагол + '过' + число + '次'. Например: 去过两次 (бывал(а) два раза).","tj":"'Cì' (маротиба, бор) иловаи миқдорӣ аст, баъд аз феъл меояд ва нишон медиҳад амал чанд маротиба иҷро шудааст. Сохтор: феъл + '过' + рақам + '次'. Масалан: 去过两次 (ду маротиба рафтаам)."}},{"l":15,"q":{"uz":"Qaysi grammatika ishlatilgan?\n新年就要到了。","ru":"Какая грамматика использована?\n新年就要到了。","tj":"Кадом грамматика истифода шудааст?\n新年就要到了。"},"opts":["动作的状态\"要……了\"","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'Yào……le' yoki 'jiù yào……le' yoki 'kuài yào……le' konstruktsiyasi yaqin kelajakda bo'ladigan voqeani bildiradi: 'tez orada …bo'ladi / …qilmoqchi'. 'Jiù yào' aniqroq vaqt bilan, 'kuài yào' esa umumiy 'tez orada' ma'nosida ishlatiladi. Gap oxiridagi 'le' o'zgarish yoki yangi holat yaqinligini ko'rsatadi.","ru":"Конструкции '要……了', '就要……了' или '快要……了' обозначают события ближайшего будущего: 'вот-вот произойдёт'. '就要' используется с более конкретным временем, '快要' — в общем смысле 'скоро'. Частица 'le' в конце указывает на близость изменения или нового состояния.","tj":"Конструксияҳои '要……了', '就要……了' ё '快要……了' рӯйдодҳои оянда наздикро нишон медиҳанд: 'зуд мешавад / қариб'. '就要' бо вақти мушаххастар, '快要' дар маъноии умумии 'зуд' истифода мешавад. Зарраи 'le' дар охири ҷумла наздикии тағйирот ё ҳолати навро нишон медиҳад."}},{"l":15,"q":{"uz":"Qaysi grammatika ishlatilgan?\n都八点四十了！","ru":"Какая грамматика использована?\n都八点四十了！","tj":"Кадом грамматика истифода шудааст?\n都八点四十了！"},"opts":["\"都……了\"","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'Dōu……le' konstruktsiyasi ta'kid bildiradi: vaqt yoki miqdor allaqachon ancha ko'p yoki kutilgandan ortiq bo'lib qoldi. O'zbek tilidagi '…bo'lib ketdi!' yoki '…bo'lib qoldi-ku!' iborasiga o'xshaydi. Ko'pincha hayrat yoki norozilik ifodalamoqda qo'llanadi.","ru":"Конструкция '都……了' выражает акцент: время или количество уже достигло неожиданного или чрезмерного уровня. Аналог русского 'уже … же!' или 'ну и…!'. Часто выражает удивление или недовольство.","tj":"Конструксияи '都……了' таъкид мекунад: вақт ё миқдор аллакай ба сатҳи ғайричашмдошт ё аз ҳад зиёд расидааст. Ба ибораҳои '…шуду рафт!' ё '…шуд-ку!' дар тоҷикӣ монанд аст. Аксар вақт ҳайрат ё норозигиро ифода мекунад."}},{"l":15,"q":{"uz":"Qaysi grammatika ishlatilgan?\n希望我们的公司明年更好！","ru":"Какая грамматика использована?\n希望我们的公司明年更好！","tj":"Кадом грамматика истифода шудааст?\n希望我们的公司明年更好！"},"opts":["副词\"更\"的用法","助动词：要","程度副词：最","概数的表达：几、多"],"a":0,"explanation":{"uz":"'更' ravishi sifat yoki ravish oldidan kelib, qiyoslashni kuchaytiradi: 'yanada, bundan ham ko'proq'.\nTuzilish: A 比 B 更 + sifat (A dan B dan yanada …).\n'更' mustaqil ham qo'llanadi: '我希望明年更好' (Umid qilamanki keyingi yil yanada yaxshi bo'lsin).\n'还' (hái) bilan almashtirib ham ishlatilishi mumkin.","ru":"Наречие '更' стоит перед прилагательным или наречием и усиливает сравнение: 'ещё более, ещё больше'.\nСтруктура: A 比 B 更 + прилагательное (A ещё более … чем B).\n'更' употребляется и самостоятельно: '我希望明年更好' (Надеюсь, в следующем году будет ещё лучше).\nМожет взаимозаменяться с '还' (hái) в некоторых контекстах.","tj":"Зарфи '更' пеш аз сифат ё зарф меояд ва муқоисаро тақвият медиҳад: 'ҳатто бештар, боз ҳам зиёдтар'.\nСохтор: A 比 B 更 + сифат (A аз B ҳатто … бештар).\n'更' мустақилона ҳам истифода мешавад: '我希望明年更好' (Умедворам соли оянда боз ҳам беҳтар шавад).\nДар баъзе контекстҳо бо '还' (hái) иваз шуда метавонад."}}]},"hsk3":{"key":"hsk3","label":"HSK 3","LESSONS":[{"n":1,"t":{"uz":"周末你有什么打算","ru":"周末你有什么打算","tj":"周末你有什么打算"},"sub":{"uz":"Dam olish kunlari rejalari haqida gaplashish; 结果补语'好', '一……也/都+不/没……' va 那 bog'lovchisini o'zlashtirish.","ru":"Говорить о планах на выходные; освоить результативное дополнение '好', конструкцию '一……也/都+不/没……' и союз 那.","tj":"Сӯҳбат дар бораи нақшаҳои охири ҳафта; азхудкунии иловаи натиҷавии '好', сохтори '一……也/都+不/没……' ва пайвандаки 那."},"g":["结果补语\"好\"","\"一……也/都+不/没……\"表示否定","连词\"那\""]},{"n":2,"t":{"uz":"他什么时候回来","ru":"他什么时候回来","tj":"他什么时候回来"},"sub":{"uz":"Yo'nalish to'ldiruvchilari, ketma-ket harakatlar va ritorik so'roqlarni o'zlashtirish.","ru":"Освоить направленные дополнения, последовательные действия и риторические вопросы.","tj":"Азхудкунии иловаҳои самтнок, амалҳои пайдарпай ва саволҳои риторикӣ."},"g":["简单趋向补语","两个动作连续发生","反问句\"能……吗？\""]},{"n":3,"t":{"uz":"桌子上放着很多饮料","ru":"桌子上放着很多饮料","tj":"桌子上放着很多饮料"},"sub":{"uz":"'还是' va '或者' farqini, mavjudlik gapini va '会' ehtimol ma'nosini o'zlashtirish.","ru":"Освоить разницу 还是/或者, предложение существования и значение вероятности 会.","tj":"Азхудкунии фарқи 还是/或者, ҷумлаи мавҷудият ва маънои эҳтимолии 会."},"g":["\"还是\"和\"或者\"的比较","存在句：处所+V着+数量+N","\"会\"表示可能性"]},{"n":4,"t":{"uz":"她总是笑着跟客人说话","ru":"她总是笑着跟客人说话","tj":"她总是笑着跟客人说话"},"sub":{"uz":"'又……又……', V₁着+V₂ hamroh harakat qolipini va '总是' ravishi bilan doim takrorlanadigan harakatlarni o'zlashtirish.","ru":"Освоить конструкцию 又……又……, сопутствующее действие V₁着+V₂ и привычные действия с наречием 总是.","tj":"Азхудкунии сохтори 又……又……, амали ҳамроҳ V₁着+V₂ ва амалҳои одатии бо қайди 总是."},"g":["\"又……又……\"","动作的伴随：V₁着(O₁) + V₂(O₂)","\"总是\"+V 表示习惯性动作"]},{"n":5,"t":{"uz":"我最近越来越胖了","ru":"我最近越来越胖了","tj":"我最近越来越胖了"},"sub":{"uz":"'了' o'zgarishni bildirishi, '越来越+Adj' va 'для (了)' maqsad qolipini o'zlashtirish.","ru":"Освоить 了 как изменение состояния, 越来越+Adj и конструкцию 为(了) для цели.","tj":"Азхудкунии 了 ҳамчун ифодаи тағйирот, 越来越+Adj ва сохтори мақсади 为(了)."},"g":["\"了\"表示变化","\"越来越\"+Adj/V","\"为(了)\"+目的"]},{"n":6,"t":{"uz":"怎么突然找不到了","ru":"怎么突然找不到了","tj":"怎么突然找不到了"},"sub":{"uz":"Mumkinlik to'ldiruvchisi V得/不+natija, '呢' so'roqchi so'zi va 'just now' ma'nosidagi 刚/刚才 farqini o'zlashtirish.","ru":"Освоить потенциальное дополнение V得/不+результат, вопросительную частицу 呢 и разницу 刚/刚才.","tj":"Азхудкунии иловаи потенсиалии V得/不+натиҷа, зарраи саволии 呢 ва фарқи 刚/刚才."},"g":["可能补语：V得/不+结果补语","\"N+呢？\"询问处所","\"刚\"和\"刚才\"的比较"]},{"n":7,"t":{"uz":"Men u bilan tanishganimga besh yil bo'ldi","ru":"Мы знакомы уже пять лет","tj":"Ман бо вай панҷ сол боз ошно ҳастам"},"sub":{"uz":"Vaqt davomiyligini ifodalash, qiziqishni bildirish va soat vaqtlarini o'rganish","ru":"Выражать продолжительность времени, интерес и обозначение времени","tj":"Ифода кардани давомнокии вақт, изҳор кардани шавқ ва таъйин кардани вақт"},"g":["时段的表达：V + 了 + 时段 + 了","对……感兴趣","\"半\"\"刻\"\"差\"表示时间"]},{"n":8,"t":{"uz":"Siz qayerga borsangiz, men ham boraman","ru":"Куда ты, туда и я","tj":"Шумо ба куҷо равед, ман ҳам меравам"},"sub":{"uz":"Shartli bog'lovchi jumlalar, qayta bajarish va umumlashtirish iboralarini o'rganish","ru":"Изучить условные предложения, повторное действие и обобщение","tj":"Омӯ :"ҳал кардан"}},{"l":20,"h":"试","p":"shì","m":{"uz":"sinab ko'rmoq","ru":"пробовать","tj":"санҷидан"}},{"l":20,"h":"真正","p":"zhēnzhèng","m":{"uz":"haqiqatan, chinakam","ru":"действительно, по-настоящему","tj":"воқеан, ҳақиқатан"}},{"l":20,"h":"多么","p":"duōme","m":{"uz":"naqadar, qanchalik","ru":"как, насколько","tj":"чӣ қадар, то чӣ андоза"}}],"GRAMMAR":[{"l":1,"t":{"uz":"Natija to'ldiruvchisi '好'","ru":"Результативное дополнение «好»","tj":"Иловаи натиҷавии «好»"},"f":{"uz":"Fe'ldan keyin '好' keltirib, harakat muvaffaqiyatli yoki to'liq bajarilganligini bildiradi.\nQolip: Fe'l + 好 + 了\nMasalan: 做好了 (bajardi/tamom qildi), 准备好了 (tayyorladi), 写好了 (yozib bo'ldi).\nInkor shakli: 没+做好 (bajarmadi/tugallamadi).","ru":"Частица '好' после глагола означает, что действие выполнено успешно или полностью.\nСтруктура: Глагол + 好 + 了\nНапример: 做好了 (сделал/закончил), 准备好了 (приготовил), 写好了 (написал).\nОтрицание: 没+做好 (не сделал/не завершил).","tj":"Зарраи '好' пас аз феъл нишон медиҳад, ки амал бомуваффақият ё пурра иҷро шудааст.\nСохтор: Феъл + 好 + 了\nМасалан: 做好了 (иҷро кард), 准备好了 (тайёр кард), 写好了 (навишт).\nИнкор: 没+做好 (иҷро накард/тамом накард)."},"e":{"zh":"作业都做好了！","p":"Zuòyè dōu zuò hǎo le!","uz":"Barcha uy vazifalari bajarildi!","ru":"Все домашние задания сделаны!","tj":"Ҳамаи вазифаҳои хонагӣ иҷро шуд!"},"pattern":"结果补语\"好\""},{"l":1,"t":{"uz":"'一……也/都+不/没……' — kuchli inkor","ru":"Конструкция '一……也/都+不/没……' — усиленное отрицание","tj":"Сохтори '一……也/都+不/没……' — инкори қавӣ"},"f":{"uz":"Bu qolip 'hech bir...ham yo'q/emas' ma'nosini beradi — mutlaq inkorni ifodalaydi.\nQolip: 一 + miqdor+ot + 也/都 + 不/没 + fe'l\nMasalan: 一个人也没来 (bitta kishi ham kelmadi)\n         一点儿都不想去 (zarra ham bormoqchi emasman)\n         一个电话也没打 (bitta qo'ng'iroq ham qilmadi)","ru":"Конструкция выражает абсолютное отрицание: 'ни одного...даже нет'.\nСтруктура: 一 + числит.+сущ. + 也/都 + 不/没 + глагол\nНапример: 一个人也没来 (никто не пришёл)\n          一点儿都不想去 (совсем не хочу идти)\n          一个电话也没打 (не позвонил ни разу)","tj":"Ин сохтор инкори мутлақро ифода мекунад: 'ҳатто як...ҳам нест'.\nСохтор: 一 + шумор+исм + 也/都 + 不/没 + феъл\nМасалан: 一个人也没来 (ҳатто як нафар ҳам наомад)\n         一点儿都不想去 (каме ҳам рафтан намехоҳам)\n         一个电话也没打 (ҳатто як занг ҳам назад)"},"e":{"zh":"他一个电话也没打，我很着急。","p":"Tā yī ge diànhuà yě méi dǎ, wǒ hěn zháojí.","uz":"U bitta ham qo'ng'iroq qilmadi, men juda tashvishlandim.","ru":"Он ни разу не позвонил, я очень переживал.","tj":"Вай ҳатто як занг ҳам назад, ман хеле нигарон шудам."},"pattern":"\"一……也/都+不/没……\"表示否定"},{"l":1,"t":{"uz":"Bog'lovchi '那' (unday bo'lsa, unda)","ru":"Союз «那» (тогда, в таком случае)","tj":"Пайвандаки «那» (пас, дар он сурат)"},"f":{"uz":"'那' bog'lovchisi oldingi gapdan kelib chiquvchi xulosani yoki qarorni kiritadi.\nMa'nosi: 'unday bo'lsa, unda, bo'lmasa'\nKo'pincha 那 + gap shaklida keladi, gapning boshida turadi.\nMasalan: 那我们明天去吧。(Unday bo'lsa ertaga boraylik.)\n         那你去吧。(Unda sen bor.)","ru":"Союз '那' вводит вывод или решение, вытекающее из предыдущей реплики.\nЗначение: 'тогда, в таком случае'\nОбычно стоит в начале предложения: 那 + предложение.\nНапример: 那我们明天去吧。(Тогда пойдём завтра.)\n          那你去吧。(Тогда ты иди.)","tj":"Пайвандаки '那' хулоса ё қарореро, ки аз гапи қаблӣ бармеояд, ворид мекунад.\nМаъно: 'пас, дар он сурат'\nОдатан дар аввали ҷумла меояд: 那 + ҷумла.\nМасалан: 那我们明天去吧。(Пас фардо равем.)\n         那你去吧。(Пас ту рав.)"},"e":{"zh":"那你星期六有没有时间？我们一起去公园吧。","p":"Nà nǐ xīngqīliù yǒu méiyǒu shíjiān? Wǒmen yīqǐ qù gōngyuán ba.","uz":"Unday bo'lsa shanba kuni vaqting bormi? Birgalikda parka boraylik.","ru":"Тогда есть ли у тебя время в субботу? Пойдём вместе в парк.","tj":"Пас шанбе вақт дорӣ? Биёед якҷоя ба боғ равем."},"pattern":"连词\"那\""},{"l":2,"t":{"uz":"Oddiy yo'nalish to'ldiruvchisi","ru":"Простые направленные дополнения","tj":"Иловаҳои самтноки содда"},"f":{"uz":"Yo'nalish to'ldiruvchilari fe'lga qo'shilgan 来 yoki 去 dan iborat.\n来 — harakat so'zlovchi tomonga yoki ma'lum nuqtaga qarab;\n去 — harakat so'zlovchidan yoki ma'lum nuqtadan uzoqlashipti.\nQolip: V + 来/去\nMasalan: 回来 (qaytib kelmoq), 进去 (kirib ketmoq), 上来 (yuqoriga chiqib kelmoq),\n         拿回来 (olib qaytmoq), 跑进去 (yugurib kirib ketmoq).","ru":"Направленные дополнения состоят из 来 или 去, присоединённых к глаголу.\n来 — движение к говорящему или к определённой точке;\n去 — движение от говорящего или от точки.\nСтруктура: Глагол + 来/去\nНапример: 回来 (вернуться), 进去 (войти), 上来 (подняться),\n          拿回来 (принести обратно), 跑进去 (забежать).","tj":"Иловаҳои самтнок аз 来 ё 去, ки ба феъл ҳамроҳ мешаванд, иборатанд.\n来 — ҳаракат ба сӯи гӯянда ё нуқтаи муайян;\n去 — ҳаракат аз гӯянда ё аз нуқта.\nСохтор: Феъл + 来/去\nМасалан: 回来 (баргаштан), 进去 (дохил шудан), 上来 (боло омадан),\n         拿回来 (бо худ оварадан), 跑进去 (давида дохил шудан)."},"e":{"zh":"他先去三楼拿文件，马上就回来。","p":"Tā xiān qù sān lóu ná wénjiàn, mǎshàng jiù huílai.","uz":"U avval uchinchi qavatga hujjat olishga ketdi, hoziroq qaytadi.","ru":"Он сначала пошёл на третий этаж за документами, сейчас вернётся.","tj":"Вай аввал ба ошёнаи сеюм барои ҳуҷҷат рафт, ҳозир бармегардад."},"pattern":"简单趋向补语"},{"l":2,"t":{"uz":"Ikki ketma-ket harakat","ru":"Два последовательных действия","tj":"Ду амали пайдарпай"},"f":{"uz":"Ikki harakat ketma-ket sodir bo'lganda, quyidagi so'zlar ishlatiladi:\n先……然后……  — avval...keyin...\n先……再……  — avval...so'ngra...\n……完……就…… — ...tamomlagandan keyin...\nMasalan: 他先去办公室拿文件，然后回来。\n         我先复习，再出去玩儿。","ru":"Для выражения двух последовательных действий используются:\n先……然后…… — сначала...потом...\n先……再…… — сначала...затем...\n……完……就…… — после того как закончил...\nНапример: 他先去办公室拿文件，然后回来。\n          我先复习，再出去玩儿。","tj":"Барои ифодаи ду амали пайдарпай истифода мешавад:\n先……然后…… — аввал...баъд...\n先……再…… — аввал...сипас...\n……完……就…… — пас аз тамом кардан...\nМасалан: 他先去办公室拿文件，然后回来。\n         我先复习，再出去玩儿。"},"e":{"zh":"他先去三楼办公室拿文件，然后马上回来。","p":"Tā xiān qù sān lóu bàngōngshì ná wénjiàn, ránhòu mǎshàng huílai.","uz":"U avval uchinchi qavatdagi idoraga hujjat olishga ketdi, keyin hoziroq qaytadi.","ru":"Он сначала пошёл в кабинет на третьем этаже за документами, потом сразу вернётся.","tj":"Вай аввал ба кабинети ошёнаи сеюм барои ҳуҷҷат рафт, баъд ҳозир бармегардад."},"pattern":"两个动作连续发生"},{"l":2,"t":{"uz":"Ritorik so'roq '能……吗？'","ru":"Риторический вопрос «能……吗？»","tj":"Саволи риторикӣ «能……吗？»"},"f":{"uz":"'能……吗？' — ko'pincha hayrat yoki shubha bildiruvchi ritorik so'roq.\nMa'nosi: 'bunga qodirsanmi? (qodir emas)', 'bu mumkinmi? (mumkin emas)'\nJavob ko'pincha inkor bo'ladi yoki so'roq o'zi inkor ma'nosi beradi.\nMasalan: 这么多东西，你一个人能拿得了吗？\n         (Bu qadar narsani yolg'iz olib keta olasanmi? — yaqqol olib keta olmaysan)","ru":"'能……吗？' — риторический вопрос, выражающий удивление или сомнение.\nЗначение: 'разве ты сможешь?', 'разве это возможно?'\nОтвет обычно отрицательный, или вопрос сам несёт отрицательный смысл.\nНапример: 这么多东西，你一个人能拿得了吗？\n          (Столько вещей, ты один сможешь всё унести? — явно не сможешь)","tj":"'能……吗？' — саволи риторикӣ, ки шигифт ё шубҳаро ифода мекунад.\nМаъно: 'оё метавонӣ?', 'оё ин имконпазир аст?'\nҶавоб одатан инкорӣ аст ё худи савол маънои инкориро дорад.\nМасалан: 这么多东西，你一个人能拿得了吗？\n         (Ин қадар чизҳо, оё ту танҳо ҳама гирифта метавонӣ? — аён аст ки не)"},"e":{"zh":"这些东西这么多，你一个人能拿得了吗？","p":"Zhèxiē dōngxi zhème duō, nǐ yī ge rén néng ná de liǎo ma?","uz":"Bu narsalar shu qadar ko'p, sen yolg'iz olib keta olasanmi?","ru":"Столько вещей, ты один сможешь всё унести?","tj":"Ин қадар чизҳо, оё ту танҳо ҳама гирифта метавонӣ?"},"pattern":"反问句\"能……吗？\""},{"l":3,"t":{"uz":"'还是' va '或者' farqi","ru":"Сравнение 还是 и 或者","tj":"Муқоисаи 还是 ва 或者"},"f":{"uz":"Ikkalasi ham 'yoki' ma'nosini beradi, lekin qo'llanishi farqli:\n还是 — so'roq gaplarda: 你要A还是B？\n或者 — darak gaplarda: 你可以A或者B。\nMasalan:\n  你想喝茶还是果汁？(So'roq — choy yoki sharbat?)\n  你可以坐地铁或者打车。(Darak — metro yoki taksi.)","ru":"Оба означают 'или', но употребляются по-разному:\n还是 — в вопросах: 你要A还是B？\n或者 — в утверждениях: 你可以A或者B。\nНапример:\n  你想喝茶还是果汁？(Вопрос — чай или сок?)\n  你可以坐地铁或者打车。(Утверждение — на метро или такси.)","tj":"Ҳарду маънои 'ё'-ро доранд, аммо истифодаашон фарқ мекунад:\n还是 — дар саволҳо: 你要A还是B？\n或者 — дар изҳор: 你可以A或者B。\nМасалан:\n  你想喝茶还是果汁？(Савол — чой ё шарбат?)\n  你可以坐地铁或者打车。(Изҳор — бо метро ё такси.)"},"e":{"zh":"你想喝茶还是果汁？","p":"Nǐ xiǎng hē chá háishi guǒzhī?","uz":"Choy ichmoqchimisiz yoki mevali sharbat?","ru":"Ты хочешь чай или сок?","tj":"Шумо чой мехоҳед ё шарбати мева?"},"pattern":"\"还是\"和\"或者\"的比较"},{"l":3,"t":{"uz":"Mavjudlik gapi: joy+V着+son+ot","ru":"Предложение существования: место+V着+числ.+сущ.","tj":"Ҷумлаи мавҷудият: ҷой+V着+шумор+исм"},"f":{"uz":"Bu qolip biror joyda nima borligini tasvirlaydi.\nQolip: Joy + V + 着 + son + ot\n着 — holatning davomiyligini bildiradi (qo'yilgan, turgan, osilib turgan).\nMasalan:\n  桌子上放着很多饮料。(Stol ustida ko'p ichimlik turadi.)\n  床上躺着一个人。(Ko'rpada bir kishi yotibdi.)\n  墙上挂着一幅画。(Devorga bir rasm osilgan.)","ru":"Конструкция описывает наличие чего-либо в каком-то месте.\nСтруктура: Место + V + 着 + числит. + сущ.\n着 — состояние, в котором находится объект (лежит, висит, стоит).\nНапример:\n  桌子上放着很多饮料。(На столе стоит много напитков.)\n  床上躺着一个人。(На кровати лежит человек.)\n  墙上挂着一幅画。(На стене висит картина.)","tj":"Ин сохтор мавҷудияти чизеро дар ҷое тасвир мекунад.\nСохтор: Ҷой + V + 着 + шумор + исм\n着 — ҳолати давомандаро нишон медиҳад (гузошта, хобида, овехта).\nМасалан:\n  桌子上放着很多饮料。(Рӯйи миз нӯшокиҳои зиёд гузошта шудааст.)\n  床上躺着一个人。(Рӯйи кат як одам хобида аст.)\n  墙上挂着一幅画。(Ба девор як расм овехта шудааст.)"},"e":{"zh":"桌子上放着很多饮料，还有新鲜水果。","p":"Zhuōzi shàng fàng zhe hěn duō yǐnliào, hái yǒu xīnxiān shuǐguǒ.","uz":"Stol ustida ko'p ichimlik va yangi mevalar turibdi.","ru":"На столе стоит много напитков и свежих фруктов.","tj":"Рӯйи миз нӯшокиҳои зиёд ва меваҳои тоза гузошта шудааст."},"pattern":"存在句：处所+V着+数量+N"},{"l":3,"t":{"uz":"'会' ehtimol ma'nosida","ru":"«会» в значении вероятности","tj":"«会» дар маънои эҳтимол"},"f":{"uz":"'会' so'zi ikki asosiy ma'noda ishlatiladi:\n1) Mahorat: V qila olaman (o'rganib olingan qobiliyat)\n   Masalan: 我会游泳。(Men suza olaman.)\n2) Ehtimol: ...bo'lsa kerak, ...bo'lishi mumkin\n   Masalan: 明天会下雨吧。(Ertaga yomg'ir yog'sa kerak.)\nKontekst orqali qaysi ma'noda ekanligini bilsa bo'ladi.","ru":"Слово '会' имеет два основных значения:\n1) Умение: умею V (приобретённый навык)\n   Например: 我会游泳。(Я умею плавать.)\n2) Вероятность: наверное..., скорее всего...\n   Например: 明天会下雨吧。(Завтра, наверное, будет дождь.)\nЗначение определяется по контексту.","tj":"Калимаи '会' ду маъноии асосӣ дорад:\n1) Тавонистан: V карда метавонам (малакаи омӯхтагӣ)\n   Масалан: 我会游泳。(Ман шино карда метавонам.)\n2) Эҳтимол: шояд..., эҳтимол...\n   Масалан: 明天会下雨吧。(Фардо шояд борон борад.)\nМаъно аз рӯи контекст муайян карда мешавад."},"e":{"zh":"你会爬山吗？今天我们打算去爬山。","p":"Nǐ huì páshān ma? Jīntiān wǒmen dǎsuàn qù páshān.","uz":"Tog' tirmasha olasizmi? Bugun tog'ga chiqmoqchi edik.","ru":"Умеешь лазать в горы? Сегодня планируем сходить.","tj":"Оё ба кӯҳ баромада метавонӣ? Имрӯз нақша дорем ба кӯҳ равем."},"pattern":"\"会\"表示可能性"},{"l":4,"t":{"uz":"'又……又……' — ham...ham... (ikki xususiyat)","ru":"Конструкция «又……又……» — и...и... (два качества)","tj":"Сохтори «又……又……» — ҳам...ҳам... (ду сифат)"},"f":{"uz":"'又……又……' qolipi biror narsa yoki odamda bir vaqtda ikki sifat yoki holat borligini bildiradi.\nQolip: 又 + Sifat/fe'l + 又 + Sifat/fe'l\nMasalan:\n  又聪明又努力 (ham aqlli ham g'ayratli)\n  又新鲜又甜 (ham yangi ham shirin)\n  又便宜又好看 (ham arzon ham chiroyli)","ru":"Конструкция '又……又……' выражает наличие двух качеств или состояний одновременно.\nСтруктура: 又 + Прил./Гл. + 又 + Прил./Гл.\nНапример:\n  又聪明又努力 (и умный, и старательный)\n  又新鲜又甜 (и свежий, и сладкий)\n  又便宜又好看 (и дешёвый, и красивый)","tj":"Сохтори '又……又……' мавҷудияти ду сифат ё ҳолатро дар як вақт ифода мекунад.\nСохтор: 又 + Сифат/Феъл + 又 + Сифат/Феъл\nМасалан:\n  又聪明又努力 (ҳам зирак ҳам кӯшишкор)\n  又新鲜又甜 (ҳам тоза ҳам ширин)\n  又便宜又好看 (ҳам арзон ҳам зебо)"},"e":{"zh":"小丽又聪明又认真，总是第一个回答问题。","p":"Xiǎo Lì yòu cōngmíng yòu rènzhēn, zǒngshì dì yī ge huídá wèntí.","uz":"Kichik Li ham aqlli ham mas'uliyatli, doim birinchi bo'lib savollarga javob beradi.","ru":"Маленькая Ли и умная, и ответственная — всегда первой отвечает на вопросы.","tj":"Сяо Ли ҳам зирак ҳам масъулиятшинос аст, ҳамеша аввалин ҷавоб медиҳад."},"pattern":"\"又……又……\""},{"l":4,"t":{"uz":"Hamroh harakat: V₁着 + V₂","ru":"Сопутствующее действие: V₁着 + V₂","tj":"Амали ҳамроҳ: V₁着 + V₂"},"f":{"uz":"Bu qolip V₂ ni V₁ bilan bir vaqtda bajarishni ifodalaydi — V₁ asosiy harakatning shaklini beradi.\nQolip: V₁ + 着 + (O₁) + V₂ + (O₂)\n着 — birinchi harakatning davomiy holatini bildiradi.\nMasalan:\n  笑着说话 (kulib gaplashmoq)\n  站着工作 (tik turib ishlash)\n  听着音乐学习 (musiqa tinglab o'rganish)","ru":"Конструкция выражает выполнение V₂ одновременно с V₁ — V₁ задаёт способ действия.\nСтруктура: V₁ + 着 + (O₁) + V₂ + (O₂)\n着 — обозначает длящееся состояние первого действия.\nНапример:\n  笑着说话 (разговаривать с улыбкой)\n  站着工作 (работать стоя)\n  听着音乐学习 (учиться под музыку)","tj":"Ин сохтор иҷрои V₂-ро дар як вақт бо V₁ ифода мекунад — V₁ тарзи амалро медиҳад.\nСохтор: V₁ + 着 + (O₁) + V₂ + (O₂)\n着 — ҳолати давомандаи амали аввалро нишон медиҳад.\nМасалан:\n  笑着说话 (бо табассум сӯҳбат кардан)\n  站着工作 (истода кор кардан)\n  听着音乐学习 (бо мусиқа омӯхтан)"},"e":{"zh":"她总是笑着跟客人说话。","p":"Tā zǒngshì xiào zhe gēn kèrén shuōhuà.","uz":"U doim kulib mehmonlar bilan gaplashadi.","ru":"Она всегда разговаривает с покупателями с улыбкой.","tj":"Вай ҳамеша бо табассум бо харидорон сӯҳбат мекунад."},"pattern":"动作的伴随：V₁着(O₁) + V₂(O₂)"},{"l":4,"t":{"uz":"'总是'+V — doim takrorlanadigan harakat","ru":"«总是»+V — привычное, повторяющееся действие","tj":"«总是»+V — амали одатии такроршаванда"},"f":{"uz":"'总是' ravishi fe'l oldidan keladi va harakatning doim yoki ko'p marta takrorlanishini bildiradi.\nMa'nosi: doim, hamisha, ko'pincha\nQolip: 主语 + 总是 + V + (O)\nMasalan:\n  她总是第一个回答问题。(U doim birinchi bo'lib javob beradi.)\n  他总是迟到。(U doim kechikadi.)\n  我总是喝热茶。(Men doim issiq choy ichaman.)","ru":"Наречие '总是' стоит перед глаголом и означает постоянное или повторяющееся действие.\nЗначение: всегда, постоянно\nСтруктура: Подлеж. + 总是 + Гл. + (Доп.)\nНапример:\n  她总是第一个回答问题。(Она всегда первой отвечает.)\n  他总是迟到。(Он всегда опаздывает.)\n  我总是喝热茶。(Я всегда пью горячий чай.)","tj":"Қайди '总是' пеш аз феъл меояд ва амали доимӣ ё такроршавандаро ифода мекунад.\nМаъно: ҳамеша, доимо\nСохтор: Мубтадо + 总是 + Феъл + (Иловаи феълӣ)\nМасалан:\n  她总是第一个回答问题。(Вай ҳамеша аввалин ҷавоб медиҳад.)\n  他总是迟到。(Вай ҳамеша дер меояд.)\n  我总是喝热茶。(Ман ҳамеша чои гарм менӯшам.)"},"e":{"zh":"她总是笑着跟客人说话，客人都很喜欢她。","p":"Tā zǒngshì xiào zhe gēn kèrén shuōhuà, kèrén dōu hěn xǐhuan tā.","uz":"U doim kulib mehmonlar bilan gaplashadi, barcha mehmonlar uni yaxshi ko'rishadi.","ru":"Она всегда разговаривает с покупателями с улыбкой — все её любят.","tj":"Вай ҳамеша бо табассум бо харидорон сӯҳбат мекунад, ҳама харидорон ӯро дӯст медоранд."},"pattern":"\"总是\"+V 表示习惯性动作"},{"l":5,"t":{"uz":"'了' holat o'zgarishini bildiradi","ru":"«了» указывает на изменение состояния","tj":"«了» тағйироти ҳолро нишон медиҳад"},"f":{"uz":"Gap oxiridagi '了' holat yoki vaziyat o'zganiga ishora qiladi.\nMasalan: 天热了。(Havo isidi — avval sovuq edi.)\n         他来了。(U keldi — avval yo'q edi.)\n         我胖了。(Men semir bo'ldim — avval shunday emas edim.)\nBu '了' va harakatning yakunlanishini bildiruvchi '了' dan farq qiladi.\nO'zgarish 了 ko'pincha holat fe'llari (形容词) bilan keladi.","ru":"Частица '了' в конце предложения указывает на изменение состояния или ситуации.\nНапример: 天热了。(Стало жарко — раньше было не так.)\n          他来了。(Он пришёл — раньше его не было.)\n          我胖了。(Я поправился — раньше было иначе.)\nЭто 了 отличается от 了, обозначающего завершение действия.\nОбычно сочетается с прилагательными-состояниями.","tj":"Зарраи '了' дар охири ҷумла тағйироти ҳол ё вазъиятро нишон медиҳад.\nМасалан: 天热了。(Гарм шуд — пеш чунин набуд.)\n         他来了。(Вай омад — пеш набуд.)\n         我胖了。(Ман фарбеҳ шудам — пеш чунин набудам.)\nИн 了 аз 了-е, ки анҷоми амалро нишон медиҳад, фарқ дорад.\nОдатан бо феълҳои ҳолатӣ (сифатҳо) якҷоя меояд."},"e":{"zh":"我最近体重越来越重了，不知道怎么办。","p":"Wǒ zuìjìn tǐzhòng yuèláiyuè zhòng le, bù zhīdào zěnme bàn.","uz":"So'nggi paytlarda vaznm tobora og'irlashyapti, nima qilishni bilmayapman.","ru":"В последнее время мой вес всё растёт — не знаю, что делать.","tj":"Охирон вазнам рӯ ба рӯ вазнинтар мешавад, намедонам чӣ кунам."},"pattern":"\"了\"表示变化"},{"l":5,"t":{"uz":"'越来越'+Sifat/fe'l — tobora..., borgan sari...","ru":"«越来越»+Прил./Гл. — всё больше, чем дальше тем...","tj":"«越来越»+Сифат/Феъл — рӯ ба рӯ..., ҳар бор бештар..."},"f":{"uz":"'越来越' + sifat yoki fe'l: vaqt o'tishi bilan bir narsa tobora ortib yoki kamayib borishini bildiradi.\nQolip: 越来越 + Sifat/fe'l\nMasalan:\n  越来越胖 (tobora semirmoq)\n  越来越热 (tobora issiq bo'lmoq)\n  越来越喜欢 (tobora yaxshi ko'rmoq)\nInkor: 越来越不+Sifat (越来越不舒服 — tobora yomonlashmoq)","ru":"'越来越' + прилагательное или глагол: с течением времени что-то всё больше нарастает.\nСтруктура: 越来越 + Прил./Гл.\nНапример:\n  越来越胖 (всё толстеть)\n  越来越热 (всё жарче)\n  越来越喜欢 (нравиться всё больше)\nОтрицание: 越来越不+Прил. (越来越不舒服 — всё хуже самочувствие)","tj":"'越来越' + сифат ё феъл: бо гузашти вақт чизе рӯ ба рӯ зиёд ё кам мешавад.\nСохтор: 越来越 + Сифат/Феъл\nМасалан:\n  越来越胖 (рӯ ба рӯ фарбеҳ шудан)\n  越来越热 (рӯ ба рӯ гармтар шудан)\n  越来越喜欢 (рӯ ба рӯ дӯст доштан)\nИнкор: 越来越不+Сифат (越来越不舒服 — рӯ ба рӯ бадтар шудан)"},"e":{"zh":"我最近越来越胖了，不知道怎么办。","p":"Wǒ zuìjìn yuèláiyuè pàng le, bù zhīdào zěnme bàn.","uz":"So'nggi paytlarda tobora semirmoqdaman, nima qilishni bilmayapman.","ru":"В последнее время я всё толстею — не знаю, что делать.","tj":"Охирон ман рӯ ба рӯ фарбеҳ мешавам, намедонам чӣ кунам."},"pattern":"\"越来越\"+Adj/V"},{"l":5,"t":{"uz":"'为(了)' + maqsad — ...uchun, ...maqsadida","ru":"«为(了)» + цель — ради..., для того чтобы...","tj":"«为(了)» + мақсад — барои..., бо мақсади..."},"f":{"uz":"'为' yoki '为了' + maqsad jumlasi: biror ishning nima uchun bajarilishini bildiradi.\nQolip: 为(了) + Maqsad + Asosiy gap\nMasalan:\n  为了健康，我每天锻炼。(Sog'liq uchun har kuni mashq qilaman.)\n  为了减肥，我来这里跑步。(Ozish uchun bu yerga yugurgani kelaman.)\n  为了快点儿好，我要多喝水。(Tezroq tuzalish uchun ko'proq suv ichaman.)","ru":"'为' или '为了' + целевое предложение: объясняет, ради чего совершается действие.\nСтруктура: 为(了) + Цель + Основное предложение\nНапример:\n  为了健康，我每天锻炼。(Ради здоровья тренируюсь каждый день.)\n  为了减肥，我来这里跑步。(Чтобы похудеть, прихожу сюда бегать.)\n  为了快点儿好，我要多喝水。(Чтобы быстрее выздороветь, буду пить воду.)","tj":"'为' ё '为了' + ҷумлаи мақсад: шарҳ медиҳад, ки амал барои чӣ иҷро мешавад.\nСохтор: 为(了) + Мақсад + Ҷумлаи асосӣ\nМасалан:\n  为了健康，我每天锻炼。(Барои саломатӣ ҳар рӯз машқ мекунам.)\n  为了减肥，我来这里跑步。(Барои лоғар шудан инҷо меоям медавам.)\n  为了快点儿好，我要多喝水。(Барои зудтар хуб шудан бештар об менӯшам.)"},"e":{"zh":"为了健康，你应该多锻炼！","p":"Wèile jiànkāng, nǐ yīnggāi duō duànliàn!","uz":"Sog'liq uchun ko'proq mashq qilish kerak!","ru":"Ради здоровья нужно больше тренироваться!","tj":"Барои саломатӣ бояд бештар машқ кард!"},"pattern":"\"为(了)\"+目的"},{"l":6,"t":{"uz":"Mumkinlik to'ldiruvchisi: V得/不+natija","ru":"Потенциальное дополнение: V得/不+результат","tj":"Иловаи потенсиалӣ: V得/不+натиҷа"},"f":{"uz":"Bu qolip biror harakatni bajarish mumkin yoki mumkin emasligini bildiradi.\nIjobiy: V + 得 + Natija (qila olaman)\nInkor: V + 不 + Natija (qila olmayman)\nMasalan:\n  找得到 (topib olsa bo'ladi) / 找不到 (topib bo'lmaydi)\n  听得懂 (tushunib olsa bo'ladi) / 听不懂 (tushunib bo'lmaydi)\n  看得清楚 (aniq ko'ra oladi) / 看不清楚 (aniq ko'ra olmaydi)","ru":"Эта конструкция выражает возможность или невозможность совершить действие.\nУтверждение: V + 得 + Результат (можно сделать)\nОтрицание: V + 不 + Результат (нельзя сделать)\nНапример:\n  找得到 (можно найти) / 找不到 (нельзя найти)\n  听得懂 (можно понять) / 听不懂 (нельзя понять)\n  看得清楚 (можно разглядеть) / 看不清楚 (нельзя разглядеть)","tj":"Ин сохтор имкониятро ё набудани имконияти иҷрои амалро ифода мекунад.\nТасдиқ: V + 得 + Натиҷа (метавон кард)\nИнкор: V + 不 + Натиҷа (наметавон кард)\nМасалан:\n  找得到 (ёфта мешавад) / 找不到 (ёфта намешавад)\n  听得懂 (фаҳмида мешавад) / 听不懂 (фаҳмида намешавад)\n  看得清楚 (равшан дида мешавад) / 看不清楚 (равшан дида намешавад)"},"e":{"zh":"眼镜找不到了，你帮我找得到吗？","p":"Yǎnjìng zhǎo bu dào le, nǐ bāng wǒ zhǎo de dào ma?","uz":"Ko'zoynak topilmayapti, siz topib bera olasizmi?","ru":"Очки не нахожу — ты можешь помочь найти?","tj":"Айнак ёфта намешавад, оё шумо ёрӣ расонда ёфта метавонед?"},"pattern":"可能补语：V得/不+结果补语"},{"l":6,"t":{"uz":"'N+呢？' — joylashuvni so'rash","ru":"«N+呢？» — вопрос о местонахождении","tj":"«N+呢？» — пурсидани ҷой"},"f":{"uz":"'N+呢？' — juda qisqa so'roq qolipи. Biror narsa yoki odamning qayerda ekanligini so'raydi.\nMa'nosi: '...qani? ...qayerda?'\nMasalan:\n  你的眼镜呢？(Ko'zoynaging qani?)\n  他呢？(U qani?)\n  书呢？(Kitob qani?)\nSuhbat kontekstida yaxshi ma'lum narsaning joylashuvini so'raganda ishlatiladi.","ru":"'N+呢？' — очень краткая вопросительная конструкция, спрашивает о местонахождении.\nЗначение: 'а...? где...?'\nНапример:\n  你的眼镜呢？(А твои очки?)\n  他呢？(А где он?)\n  书呢？(А книга где?)\nИспользуется, когда местонахождение уже известного предмета неизвестно.","tj":"'N+呢？' — сохтори саволии хеле кӯтоҳ, дар бораи ҷой мепурсад.\nМаъно: '...куҷост? ...чист?'\nМасалан:\n  你的眼镜呢？(Айнакат куҷост?)\n  他呢？(Вай куҷост?)\n  书呢？(Китоб куҷост?)\nВақте истифода мешавад, ки ҷои чизи аллакай маълум номаълум аст."},"e":{"zh":"我的眼镜呢？刚才还在桌子上。","p":"Wǒ de yǎnjìng ne? Gāngcái hái zài zhuōzi shàng.","uz":"Ko'zoynagim qani? Hozirgina stol ustida edi.","ru":"Где мои очки? Только что были на столе.","tj":"Айнакам куҷост? Як лаҳза пеш рӯйи миз буд."},"pattern":"\"N+呢？\"询问处所"},{"l":6,"t":{"uz":"'刚' va '刚才' farqi","ru":"Сравнение 刚 и 刚才","tj":"Муқоисаи 刚 ва 刚才"},"f":{"uz":"Ikkalasi ham 'hozirgina, bir oz avval' ma'nosida, lekin farqli:\n刚才 — payt so'zi (time word): gap boshida yoki mavzu sifatida turadi\n       Masalan: 刚才他在这里。(U hozirgina bu yerda edi.)\n刚 — ravish: fe'l oldidan keladi va to'g'ridan-to'g'ri harakatni ta'riflaydi\n     Masalan: 他刚到。(U hozirgina keldi.)\n              经理刚拿走了文件。(Menejer hozirgina hujjatni olib ketdi.)","ru":"Оба означают 'только что', но различаются по употреблению:\n刚才 — слово времени: стоит в начале предложения или как подлежащее темы\n       Например: 刚才他在这里。(Только что он был здесь.)\n刚 — наречие: стоит перед глаголом, описывает действие напрямую\n     Например: 他刚到。(Он только что пришёл.)\n              经理刚拿走了文件。(Менеджер только что унёс документ.)","tj":"Ҳарду маънои 'як лаҳза пеш, ҳозир' доранд, аммо фарқ мекунанд:\n刚才 — калимаи вақт: дар аввали ҷумла ё ҳамчун мавзӯ меояд\n       Масалан: 刚才他在这里。(Як лаҳза пеш вай инҷо буд.)\n刚 — қайд: пеш аз феъл меояд ва амалро бевосита тасвир мекунад\n     Масалан: 他刚到。(Вай ҳозир расид.)\n              经理刚拿走了文件。(Мудир ҳозир ҳуҷҷатро бурд.)"},"e":{"zh":"经理刚拿走了一个文件，会不会是你的？","p":"Jīnglǐ gāng ná zǒu le yī ge wénjiàn, huì bu huì shì nǐ de?","uz":"Menejer hozirgina bir hujjat olib ketdi, siznikimas?","ru":"Менеджер только что унёс документ — не твой ли?","tj":"Мудир ҳозир як ҳуҷҷат бурд, оё ин ҳуҷҷати шумо нест?"},"pattern":"\"刚\"和\"刚才\"的比较"},{"l":7,"t":{"uz":"Vaqt davomiyligini ifodalash: F + le + muddat + le","ru":"Выражение продолжительности: Гл + 了 + период + 了","tj":"Ифодаи давомнокии вақт: Ф + 了 + муддат + 了"},"f":{"uz":"Biror harakat qancha davom etganini bildirishda 'V + 了 + vaqt davomiyligi + 了' tuzilmasi ishlatiladi. Birinchi 了 harakatning tugaganini, ikkinchisi hozirgi holatni bildiradi.","ru":"Для выражения продолжительности действия используется конструкция 'Гл + 了 + период времени + 了'. Первое 了 обозначает завершённость действия, второе — текущее состояние.","tj":"Барои ифодаи давомнокии амал сохтори 'Ф + 了 + муддати вақт + 了' истифода мешавад. Аввалин 了 тамомшавии амалро, дуввумаш ҳолати кунуниро нишон медиҳад."},"e":{"zh":"我们认识五年了。","p":"Wǒmen rènshi wǔ nián le.","uz":"Biz tanishganimizga besh yil bo'ldi.","ru":"Мы знакомы уже пять лет.","tj":"Мо панҷ сол боз ошно ҳастем."},"pattern":"时段的表达：V + 了 + 时段 + 了"},{"l":7,"t":{"uz":"…ga qiziqish his qilmoq","ru":"Интересоваться …","tj":"Ба … шавқ доштан"},"f":{"uz":"'对……感兴趣' - biror narsaga qiziqishni ifodalash uchun ishlatiladi. '对' + ob'ekt + '感兴趣' tuzilmasi mavjud. '特别感兴趣' esa 'ayniqsa qiziqish' ma'nosini beradi.","ru":"'对……感兴趣' используется для выражения интереса к чему-либо. Структура: '对' + объект + '感兴趣'. '特别感兴趣' означает 'особенно интересоваться'.","tj":"'对……感兴趣' барои ифодаи шавқ ба чизе истифода мешавад. Сохтор: '对' + объект + '感兴趣'. '特别感兴趣' маънои 'хусусан шавқ доштан'-ро дорад."},"e":{"zh":"我对音乐很感兴趣。","p":"Wǒ duì yīnyuè hěn gǎn xìngqù.","uz":"Men musiqaga juda qiziqaman.","ru":"Мне очень интересна музыка.","tj":"Ман ба мусиқӣ хеле шавқ дорам."},"pattern":"对……感兴趣"},{"l":7,"t":{"uz":"\"Yarim\", \"chorak\" va \"kam\" vaqt ifodalovchi so'zlar","ru":"\"Половина\", \"четверть\" и \"без\" для обозначения времени","tj":"\"Ним\", \"чорак\" ва \"кам\" барои ифодаи вақт"},"f":{"uz":"Soat vaqtini ifodalashda: '半' = soat va yarim (masalan: 两点半 = 2:30), '刻' = 15 daqiqa (一刻 = :15, 三刻 = :45), '差' = vaqtdan oldin 'kam' (差五分八点 = 7:55).","ru":"Для обозначения времени: '半' = полчаса (两点半 = 2:30), '刻' = 15 минут (一刻 = :15, 三刻 = :45), '差' = без (差五分八点 = без пяти восемь = 7:55).","tj":"Барои таъйин кардани вақт: '半' = ним соат (两点半 = 2:30), '刻' = 15 дақиқа (一刻 = :15, 三刻 = :45), '差' = кам (差五分八点 = панҷ дақиқа ба ҳашт = 7:55)."},"e":{"zh":"现在差一刻八点。","p":"Xiànzài chà yī kè bā diǎn.","uz":"Hozir soat sakkizga chorak qoldi (7:45).","ru":"Сейчас без четверти восемь (7:45).","tj":"Ҳоло чорак ба ҳашт монда (7:45)."},"pattern":"\"半\"\"刻\"\"差\"表示时间"},{"l":8,"t":{"uz":"\"又\" va \"再\" farqi","ru":"Разница между \"又\" и \"再\"","tj":"Фарқи \"又\" ва \"再\""},"f":{"uz":"'又' o'tgan vaqtdagi takroran bajarilgan harakatni bildiradi (u yana kechikdi — o'tgan zamonda). '再' kelajakdagi takroran bajariladigan harakatni bildiradi (keyingi safar yana borayman).","ru":"'又' обозначает повторное действие в прошлом (он снова опоздал). '再' обозначает повторное действие в будущем (в следующий раз поеду ещё раз).","tj":"'又' амали такроршавандаи гузаштаро ифода мекунад (вай боз дер омад). '再' амали такроршавандаи оянда мебошад (дафъаи дигар боз меравам)."},"e":{"zh":"他又迟到了！","p":"Tā yòu chídào le!","uz":"U yana kechikdi! (o'tgan)","ru":"Он снова опоздал! (прошлое)","tj":"Вай боз дер омад! (гузашта)"},"pattern":"\"又\"和\"再\"的区别"},{"l":8,"t":{"uz":"So'roq olmoshlarining maxsus qo'llanishi: kim/nima + ham + F","ru":"Особое употребление вопросительных местоимений: кто/что + тоже/все + Гл","tj":"Истифодаи хоси зомирҳои саволӣ: кӣ/чӣ + ҳам + Ф"},"f":{"uz":"So'roq olmoshlari (谁、什么、哪儿) umumlashtiruvchi ma'noda ishlatilganda '都' yoki '也' bilan keladi va 'hamma / hech kim emas' ma'nosini bildiradi.","ru":"Вопросительные местоимения (谁、什么、哪儿) в обобщающем значении используются с '都' или '也' и означают 'все / никто'.","tj":"Зомирҳои саволӣ (谁、什么、哪儿) дар маънои умумикунанда бо '都' ё '也' меоянд ва маънои 'ҳама / ҳеҷ кас нест'-ро доранд."},"e":{"zh":"谁都知道这件事。","p":"Shéi dōu zhīdào zhè jiàn shì.","uz":"Bu hodisani hamma biladi.","ru":"Все знают об этом.","tj":"Ҳама ин корро медонад."},"pattern":"疑问代词活用①：谁/什么+都/也+V"},{"l":8,"t":{"uz":"Shartli gap: …… bo'lsa …… bo'ladi","ru":"Условное предложение: если …, то …","tj":"Ҷумлаи шартӣ: агар … пас …"},"f":{"uz":"'……就……' tuzilmasi shartni bildiradi: shartli qism + 就 + natija. Shartli qismda ko'pincha '如果'、'要是'、'只要' kabi so'zlar ishlatiladi, lekin ba'zan qo'yilmaydi.","ru":"Конструкция '……就……' выражает условие: условная часть + 就 + результат. В условной части часто используются '如果'、'要是'、'只要', но они могут опускаться.","tj":"Сохтори '……就……' шартро ифода мекунад: қисми шартӣ + 就 + натиҷа. Дар қисми шартӣ '如果'、'要是'、'只要' зиёд истифода мешаванд, аммо гоҳо ҳазф мешаванд."},"e":{"zh":"你去哪儿我就去哪儿。","p":"Nǐ qù nǎr wǒ jiù qù nǎr.","uz":"Siz qayerga borsangiz, men ham boraman.","ru":"Куда ты, туда и я.","tj":"Шумо ба куҷо равед, ман ҳам меравам."},"pattern":"条件句：……就……"},{"l":9,"t":{"uz":"Qanchalik A bo'lsa, shunchalik B bo'ladi","ru":"Чем больше A, тем больше B","tj":"Ҳар чӣ бештар A, ҳамон қадар B"},"f":{"uz":"'越A越B' tuzilmasi ikki hodisaning bir vaqtda o'sishini bildiradi. A - shart, B - natija. Masalan: 越学越好 = o'rganган sari yaxshilashadi.","ru":"Конструкция '越A越B' выражает параллельное усиление двух явлений. A — условие, B — результат. Например: 越学越好 = чем больше учишь, тем лучше.","tj":"Сохтори '越A越B' афзоиши якҷояи ду ҳодисаро ифода мекунад. A — шарт, B — натиҷа. Масалан: 越学越好 = ҳар чӣ бештар омӯзӣ, беҳтар мешавад."},"e":{"zh":"她越学越觉得有意思。","p":"Tā yuè xué yuè juéde yǒu yìsi.","uz":"U o'rganган sari qiziqarliroq deb hisoblaydi.","ru":"Чем больше она учит, тем интереснее ей кажется.","tj":"Ҳар чӣ бештар омӯзад, ҳамон қадар ҷолибтар ба назараш мерасад."},"pattern":"越A越B"},{"l":9,"t":{"uz":"A xuddi B kabi + sifat","ru":"A такой же, как B + прилагательное","tj":"A монанди B + сифат"},"f":{"uz":"'A跟B一样+Adj' tuzilmasi A va B ning bir xil xususiyatga ega ekanini bildiradi. Inkor shaklida: 'A跟B不一样'. Sifat oldida 'ba'zan' 那么 qo'yiladi.","ru":"Конструкция 'A跟B一样+Adj' означает, что A и B имеют одинаковое свойство. Отрицательная форма: 'A跟B不一样'. Перед прилагательным иногда ставится 那么.","tj":"Сохтори 'A跟B一样+Adj' маъно медиҳад, ки A ва B хусусияти якхела доранд. Шакли манфӣ: 'A跟B不一样'. Пеш аз сифат гоҳо 那么 мегузорад."},"e":{"zh":"她的汉语说得跟中国人一样好。","p":"Tā de Hànyǔ shuō de gēn Zhōngguórén yīyàng hǎo.","uz":"Uning xitoycha gapirishi xitoyliklarnikidek yaxshi.","ru":"Она говорит по-китайски так же хорошо, как китайцы.","tj":"Вай ба монанди чиниҳо хуб чинӣ ҳарф мезанад."},"pattern":"A跟B一样 + 形容词"},{"l":9,"t":{"uz":"A, B kadar + sifat emas","ru":"A не такой, как B + прилагательное","tj":"A ба монанди B + сифат нест"},"f":{"uz":"'A没有B那么+Adj' tuzilmasi A ning B darajasida emasligi yoki pastroq ekanini bildiradi. 'A不如B' bilan sinonim bo'lishi mumkin.","ru":"Конструкция 'A没有B那么+Adj' означает, что A не достигает степени B. Может быть синонимом 'A不如B'.","tj":"Сохтори 'A没有B那么+Adj' маъно медиҳад, ки A ба дараҷаи B нарасидааст. Бо 'A不如B' ҳаммаъно буда метавонад."},"e":{"zh":"他的进步没有她那么快。","p":"Tā de jìnbù méiyǒu tā nàme kuài.","uz":"Uning rivojlanishi u qiznikidek tez emas.","ru":"Его прогресс не такой быстрый, как у неё.","tj":"Пешрафти вай ба монанди ӯ тез нест."},"pattern":"A没有B那么 + 形容词"},{"l":10,"t":{"uz":"Taqqoslash②: A B dan + sifat + ancha","ru":"Сравнение②: A намного + прилагательное + чем B","tj":"Муқоиса②: A аз B + сифат + хеле"},"f":{"uz":"'A比B+Adj+多了' — A ning B dan ancha farqli ekanini ta'kidlaydi. '多了' yoki '得多' = ancha, juda ko'p. Oddiy 'A比B+Adj' dan kuchliroq ifoda.","ru":"'A比B+Adj+多了' подчёркивает, что разница между A и B очень велика. '多了' или '得多' = намного. Это более сильное выражение, чем обычное 'A比B+Adj'.","tj":"'A比B+Adj+多了' таъкид мекунад, ки фарқи байни A ва B хеле бузург аст. '多了' ё '得多' = хеле. Ин аз 'A比B+Adj'-и оддӣ ифодаи қавитар аст."},"e":{"zh":"数学比历史难多了！","p":"Shùxué bǐ lìshǐ nán duō le!","uz":"Matematika tarixdan ancha qiyin!","ru":"Математика намного сложнее истории!","tj":"Математика аз таърих хеле душвортар аст!"},"pattern":"比较句②：A比B + 形容词 + 多了"},{"l":10,"t":{"uz":"Taxminiy sonlar①: son + 多 / 几","ru":"Приблизительные числа①: число + 多 / 几","tj":"Рақамҳои тахминӣ①: рақам + 多 / 几"},"f":{"uz":"'数词+多' = shu sondan ko'proq (masalan: 三十多 = 30 dan ortiq). '几+量词' = bir necha (masalan: 几天 = bir necha kun, 几百 = bir necha yuz). Ikkalasi ham aniq bo'lmagan miqdorni bildiradi.","ru":"'数词+多' = больше указанного числа (например: 三十多 = больше тридцати). '几+счётное слово' = несколько (например: 几天 = несколько дней, 几百 = несколько сотен). Оба выражают неточное количество.","tj":"'数词+多' = аз рақами зикршуда бештар (масалан: 三十多 = аз сӣ бештар). '几+ададӣ' = чанд (масалан: 几天 = чанд рӯз, 几百 = чанд сад). Ҳарду миқдори ғайридақиқро ифода мекунанд."},"e":{"zh":"我考了九十多分。","p":"Wǒ kǎo le jiǔshí duō fēn.","uz":"Men to'qson dan ortiq ball oldim.","ru":"Я набрал больше девяноста баллов.","tj":"Ман наваду чанд балл гирифтам."},"pattern":"概数①：数词 + 多 / 几"},{"l":10,"t":{"uz":"A B kadar + sifat emas (A B dan yomonroq)","ru":"A не так хорош, как B (A хуже B)","tj":"A ба монанди B нест (A аз B камтар)"},"f":{"uz":"'A不如B' = A B kadar yaxshi emas, A B dan yomonroq. Sifat bilan: 'A不如B+Adj'. 'A没有B那么+Adj' bilan sinonim.","ru":"'A不如B' = A не так хорош, как B, A хуже B. С прилагательным: 'A不如B+Adj'. Синоним 'A没有B那么+Adj'.","tj":"'A不如B' = A ба монанди B хуб нест, A аз B камтар. Бо сифат: 'A不如B+Adj'. Ҳаммаъно бо 'A没有B那么+Adj'."},"e":{"zh":"物理不如化学难。","p":"Wùlǐ bùrú huàxué nán.","uz":"Fizika kimyo kadar qiyin emas.","ru":"Физика не такая сложная, как химия.","tj":"Физика ба монанди химия душвор нест."},"pattern":"A不如B（+ 形容词）"},{"l":11,"t":{"uz":"把-konstruktsiyasi①: 把 + OB + F + natija/yo'nalish to'ldiruvchisi","ru":"Конструкция 把①: 把 + объект + Гл + результатное/направленное дополнение","tj":"Сохтори 把①: 把 + объект + Ф + пуркунандаи натиҷа/самт"},"f":{"uz":"'把'-konstruktsiyasi ob'ektga nisbatan harakatning natijasini ta'kidlaydi. Tuzilma: Subekt + 把 + ob'ekt + fe'l + natija. Fe'l yolg'iz kelmaydi, oldida yoki keyin qo'shimcha element bo'lishi kerak.","ru":"Конструкция '把' подчёркивает результат действия над объектом. Структура: Подлежащее + 把 + объект + глагол + результат. Глагол не стоит один, нужен дополнительный элемент.","tj":"Сохтори '把' натиҷаи амал нисбат ба объектро таъкид мекунад. Сохтор: Мубтадо + 把 + объект + феъл + натиҷа. Феъл танҳо намеояд, унсури иловагӣ лозим аст."},"e":{"zh":"把空调关了！","p":"Bǎ kōngtiáo guān le!","uz":"Konditsionerni o'chir!","ru":"Выключи кондиционер!","tj":"Кондитсионерро хомӯш кун!"},"pattern":"把字句①：把 + O + V + 结果/趋向补语"},{"l":11,"t":{"uz":"Taxminiy sonlar②: son + 左右","ru":"Приблизительные числа②: число + 左右","tj":"Рақамҳои тахминӣ②: рақам + 左右"},"f":{"uz":"'左右' so'z ma'nosi 'chap-o'ng' bo'lib, taxminiy miqdorni bildiradi. Son yoki vaqt so'zidan keyin qo'shiladi: 三十分钟左右 = taxminan 30 daqiqa. 'cha' so'ziga o'xshaydi.","ru":"'左右' буквально означает 'лево-право' и выражает приблизительное количество. Ставится после числа или слова времени: 三十分钟左右 = около 30 минут. Аналог русского 'примерно'.","tj":"'左右' аслан маънои 'чап-рост'-ро дорад ва миқдори тахминиро ифода мекунад. Баъди рақам ё вожаи вақт мегузорад: 三十分钟左右 = тахминан 30 дақиқа. Ба 'тахминан' монанд аст."},"e":{"zh":"我大概需要一个小时左右。","p":"Wǒ dàgài xūyào yī gè xiǎoshí zuǒyòu.","uz":"Menga taxminan bir soat kerak bo'ladi.","ru":"Мне нужно примерно около часа.","tj":"Ба ман тахминан як соат лозим мешавад."},"pattern":"概数②：数词 + 左右"},{"l":11,"t":{"uz":"Fe'l + le + ob'ekt + le (harakat tugallangan)","ru":"Глагол + 了 + объект + 了 (действие завершено)","tj":"Феъл + 了 + объект + 了 (амал тамом шудааст)"},"f":{"uz":"Bu tuzilma harakatning allaqachon tugallanganini yoki o'zgarish yuz berganini bildiradi. Birinchi 了 fe'ldan keyin, ikkinchisi gap oxirida keladi. Masalan: 关了门了 = eshikni allaqachon yopdim.","ru":"Эта конструкция указывает на то, что действие уже завершено или произошло изменение. Первое 了 ставится после глагола, второе — в конце предложения. Например: 关了门了 = уже закрыл дверь.","tj":"Ин сохтор нишон медиҳад, ки амал аллакай тамом шудааст ё тағйироте рух додааст. Аввалин 了 баъди феъл, дуввум — охири ҷумла меояд. Масалан: 关了门了 = аллакай дарро бастам."},"e":{"zh":"我把空调关了。","p":"Wǒ bǎ kōngtiáo guān le.","uz":"Men konditsionerni o'chirdim.","ru":"Я выключил кондиционер.","tj":"Ман кондитсионерро хомӯш кардам."},"pattern":"动词 + 了 + 宾语 + 了"},{"l":12,"t":{"uz":"\"才\" va \"就\" farqi","ru":"Разница между \"才\" и \"就\"","tj":"Фарқи \"才\" ва \"就\""},"f":{"uz":"'就' kutilganidan erta yoki tez bo'lganini bildiradi (erta keldi = soat to'qqizda keldi). '才' kutilganidan kech yoki qiyin bo'lganini bildiradi (soat o'n birda keldi). Ikkalasi ham taqqoslash asosida baholanadi.","ru":"'就' выражает, что что-то произошло раньше или быстрее ожидаемого (рано пришёл = в девять). '才' выражает, что что-то произошло позже или сложнее ожидаемого (пришёл только в одиннадцать). Оба оцениваются на основе сравнения.","tj":"'就' ифода мекунад, ки чизе зудтар ё барвақттар аз интизорӣ рух дод (барвақт омад = соати нӯҳ). '才' ифода мекунад, ки чизе дертар ё мушкилтар аз интизорӣ рух дод (фақат соати ёздаҳ омад). Ҳарду дар асоси муқоиса арзёбӣ мешаванд."},"e":{"zh":"他八点就来了，真早！","p":"Tā bā diǎn jiù lái le, zhēn zǎo!","uz":"U soat sakkizda keldi, juda erta!","ru":"Он пришёл уже в восемь, так рано!","tj":"Вай соати ҳашт омад, хеле барвақт!"},"pattern":"\"才\"和\"就\"的区别"},{"l":12,"t":{"uz":"把-konstruktsiyasi②: 把 + OB + F + 在/到/给","ru":"Конструкция 把②: 把 + объект + Гл + 在/到/给","tj":"Сохтори 把②: 把 + объект + Ф + 在/到/给"},"f":{"uz":"'把'-konstruktsiyasida fe'ldan keyin '在' (joyda), '到' (joyga) yoki '给' (kimgadir) qo'shilishi mumkin. Bu ob'ektning qayerda, qayerga yoki kimga taalluqli ekanini bildiradi.","ru":"В конструкции '把' после глагола может следовать '在' (на/в месте), '到' (к месту) или '给' (кому-то). Это указывает на место, пункт назначения или получателя объекта.","tj":"Дар сохтори '把' баъди феъл '在' (дар ҷое), '到' (ба ҷое) ё '给' (ба касе) омада метавонад. Ин ҷойгоҳ, мақсади ҳаракат ё гирандаи объектро нишон медиҳад."},"e":{"zh":"把钥匙交给你。","p":"Bǎ yàoshi jiāo gěi nǐ.","uz":"Kalitni sizga topshiraman.","ru":"Отдаю ключ тебе.","tj":"Калидро ба шумо медиҳам."},"pattern":"把字句②：把 + O + V + 在/到/给"},{"l":12,"t":{"uz":"让 + odam + fe'l (majbur qilmoq)","ru":"让 + человек + глагол (каузатив)","tj":"让 + одам + феъл (маҷбур кардан)"},"f":{"uz":"'让' = biror kishini biror narsa qilishiga ruxsat bermoq yoki uni shunday qilishga majbur qilmoq. Tuzilma: subekt + 让 + odam + fe'l. Salbiy: 让……别……","ru":"'让' = позволять кому-то сделать что-то или заставлять кого-то это делать. Структура: подлежащее + 让 + человек + глагол. Отрицание: 让……别……","tj":"'让' = иҷозат додан ба касе барои кардани чизе ё маҷбур кардани вай ба ин амал. Сохтор: мубтадо + 让 + одам + феъл. Манфӣ: 让……别……"},"e":{"zh":"你让我放心多了。","p":"Nǐ ràng wǒ fàngxīn duō le.","uz":"Siz meni ancha xotirjam qildingiz.","ru":"Ты меня очень успокоил.","tj":"Шумо маро хеле хотирҷамъ кардед."},"pattern":"让 + 人 + 动词（使役句）"},{"l":13,"t":{"uz":"Murakkab yo'nalish to'ldiruvchisi","ru":"Сложное направленное дополнение","tj":"Пуркунандаи мураккаби самтӣ"},"f":{"uz":"Murakkab yo'nalish to'ldiruvchisi ikki qismdan iborat: yo'nalish fe'li (上、下、进、出、回、过、起) + 来 yoki 去. Masalan: 回来 = qaytib kelmoq, 进去 = kirib ketmoq, 出来 = chiqib kelmoq.","ru":"Сложное направленное дополнение состоит из двух частей: глагол направления (上、下、进、出、回、过、起) + 来 или 去. Например: 回来 = вернуться (сюда), 进去 = войти (туда), 出来 = выйти (сюда).","tj":"Пуркунандаи мураккаби самтӣ аз ду қисм иборат аст: феъли самт (上、下、进、出、回、过、起) + 来 ё 去. Масалан: 回来 = баргаштан (ин ҷо), 进去 = даромадан (он ҷо), 出来 = баромадан (ин ҷо)."},"e":{"zh":"他走进来了。","p":"Tā zǒu jìn lái le.","uz":"U yurib kirib keldi.","ru":"Он вошёл пешком.","tj":"Вай пиёда даромад."},"pattern":"复合趋向补语"},{"l":13,"t":{"uz":"Bir vaqtda A qila turib B qilmoq","ru":"Одновременно делать A и B","tj":"Ҳамзамон A ва B кардан"},"f":{"uz":"'一边…一边…' tuzilmasi ikki harakatning bir vaqtda bajarilishini bildiradi. Ikki fe'l ham bir xil sub'ektga tegishli bo'lishi kerak. Masalan: 一边听音乐一边看书 = musiqa tinglab kitob o'qimoq.","ru":"Конструкция '一边…一边…' выражает два действия, выполняемых одновременно. Оба глагола относятся к одному подлежащему. Например: 一边听音乐一边看书 = слушать музыку и читать книгу одновременно.","tj":"Сохтори '一边…一边…' ду амали ҳамзаманро ифода мекунад. Ҳарду феъл ба як мубтадо тааллуқ доранд. Масалан: 一边听音乐一边看书 = ҳамзамон мусиқӣ гӯш кардан ва китоб хондан."},"e":{"zh":"我喜欢一边听音乐一边做作业。","p":"Wǒ xǐhuān yībiān tīng yīnyuè yībiān zuò zuòyè.","uz":"Men musiqa tinglab uy vazifasini yaxshi ko'raman.","ru":"Мне нравится слушать музыку и одновременно делать домашнее задание.","tj":"Ман дӯст медорам ҳамзамон мусиқӣ гӯш кунам ва вазифаи хонагиро анҷом диҳам."},"pattern":"一边……一边……"},{"l":13,"t":{"uz":"是……的 (o'tgan harakat usuli/vaqti/joyini ta'kidlash)","ru":"是……的 (акцент на способ/время/место прошлого действия)","tj":"是……的 (таъкид бар усул/вақт/ҷойи амали гузашта)"},"f":{"uz":"'是……的' tuzilmasi o'tgan vaqtda yuz bergan harakatning QANday (usul), QACHON (vaqt) yoki QAERDA (joy) bo'lganini ta'kidlash uchun ishlatiladi. Ob'ekt ko'pincha 的 bilan 是 o'rtasida keladi.","ru":"Конструкция '是……的' используется для акцентирования КАК (способ), КОГДА (время) или ГДЕ (место) произошло прошлое действие. Объект часто стоит между 的 и 是.","tj":"Сохтори '是……的' барои таъкид бар ЧӢ ТАВРа (усул), КАЙ (вақт) ё ДАР КУҶо (ҷой) рух додани амали гузашта истифода мешавад. Объект аксаран байни 的 ва 是 меояд."},"e":{"zh":"我是走回来的。","p":"Wǒ shì zǒu huílái de.","uz":"Men piyoda qaytib keldim. (usul ta'kidlangan)","ru":"Я вернулся пешком. (акцент на способ)","tj":"Ман пиёда баргаштам. (таъкид бар усул)"},"pattern":"是……的（强调过去动作的方式/时间/地点）"},{"l":14,"t":{"uz":"把-konstruktsiyasi③: 把 + OB + F + natija/yo'nalish to'ldiruvchisi","ru":"Конструкция 把③: 把 + объект + Гл + результатное/направленное дополнение","tj":"Сохтори 把③: 把 + объект + Ф + пуркунандаи натиҷа/самт"},"f":{"uz":"'把'-konstruktsiyasida fe'ldan keyin natija to'ldiruvchisi (好、完、干净、成 kabi) yoki yo'nalish to'ldiruvchisi (过来、过去、进来 kabi) keladi. Bu harakatning natijasini yoki yo'nalishini ta'kidlaydi.","ru":"В конструкции '把' после глагола следует результатное дополнение (好、完、干净、成 и т.д.) или направленное дополнение (过来、过去、进来 и т.д.). Это акцентирует результат или направление действия.","tj":"Дар сохтори '把' баъди феъл пуркунандаи натиҷа (好、完、干净、成 ва ғайра) ё пуркунандаи самт (过来、过去、进来 ва ғайра) меояд. Ин натиҷа ё самти амалро таъкид мекунад."},"e":{"zh":"把苹果洗干净了！","p":"Bǎ píngguǒ xǐ gānjìng le!","uz":"Olmani yaxshilab yuvib!","ru":"Тщательно помой яблоки!","tj":"Себро хуб бишӯй!"},"pattern":"把字句③：把 + O + V + 结果补语/趋向补语"},{"l":14,"t":{"uz":"Avval……keyin/yana……so'ng……","ru":"Сначала……потом/снова……затем……","tj":"Аввал……баъд/боз……сипас……"},"f":{"uz":"'先…再…然后…' tuzilmasi bir nechta harakatning ketma-ketligini bildiradi. '先' = avval, '再' = keyin (shu sub'ekt bajaradi), '然后' = so'ng, keyingi qadam. '先…再…' = A dan keyin B.","ru":"Конструкция '先…再…然后…' выражает последовательность нескольких действий. '先' = сначала, '再' = потом (тот же субъект), '然后' = затем, следующий шаг. '先…再…' = A, потом B.","tj":"Сохтори '先…再…然后…' пайдарпаии чанд амалро ифода мекунад. '先' = аввал, '再' = баъд (ҳамон мубтадо), '然后' = сипас, қадами навбатӣ. '先…再…' = A, баъд B."},"e":{"zh":"先把肉切了，再放油，然后加蔬菜。","p":"Xiān bǎ ròu qiē le, zài fàng yóu, ránhòu jiā shūcài.","uz":"Avval go'shtni kesing, keyin yog' soling, so'ng sabzavot qo'shing.","ru":"Сначала нарежьте мясо, потом добавьте масло, затем положите овощи.","tj":"Аввал гӯштро буред, баъд равған рехта, сипас сабзавот илова кунед."},"pattern":"先……再/又……然后……"},{"l":14,"t":{"uz":"Xuddi……kabi (taqqoslash/tavsif)","ru":"Как/Словно……（сравнение/описание）","tj":"Ба монанди……（муқоиса/тавсиф）"},"f":{"uz":"'像…一样' tuzilmasi ikki narsani taqqoslash yoki o'xshatish uchun ishlatiladi. '像+narsA+一样+sifat/fe'l'. 'A跟B一样' bilan o'xshash, lekin ko'proq tasvir uchun ishlatiladi.","ru":"Конструкция '像…一样' используется для сравнения двух вещей или описания. '像+предметA+一样+прилагательное/глагол'. Похоже на 'A跟B一样', но чаще используется для описания.","tj":"Сохтори '像…一样' барои муқоисаи ду чиз ё тавсиф истифода мешавад. '像+чизиА+一样+сифат/феъл'. Ба 'A跟B一样' монанд аст, аммо бештар барои тавсиф истифода мешавад."},"e":{"zh":"像你这样做，肯定很好吃！","p":"Xiàng nǐ zhèyàng zuò, kěndìng hěn hǎochī!","uz":"Sizning usulda pishirsam, albatta juda mazali bo'ladi!","ru":"Если готовить так, как ты, обязательно будет вкусно!","tj":"Агар ба монанди шумо пазем, албатта хеле хушмаза мешавад!"},"pattern":"像……一样（比较/描述）"},{"l":15,"t":{"uz":"……dan tashqari, hammasi/ham/yana……","ru":"Кроме……, всё/тоже/ещё……","tj":"Ба ғайр аз……, ҳама/ҳам/боз……"},"f":{"uz":"'除了A以外，都/还/也+B' tuzilmasi ikki ma'noda ishlatiladi: (1) A dan tashqari hamma narsa B (都) — istisno; (2) A dan tashqari B ham (还/也) — qo'shimcha. Farqni '都' va '还/也' orqali tushunish kerak.","ru":"Конструкция '除了A以外，都/还/也+B' имеет два значения: (1) Кроме A всё является B (都) — исключение; (2) Кроме A, B тоже (还/也) — добавление. Разницу нужно понять через '都' и '还/也'.","tj":"Сохтори '除了A以外，都/还/也+B' ду маъно дорад: (1) Ба ғайр аз A ҳама B аст (都) — истисно; (2) Ба ғайр аз A, B ҳам (还/也) — илова. Фарқро тавассути '都' ва '还/也' фаҳмидан лозим аст."},"e":{"zh":"除了血压以外，其他都没问题。","p":"Chúle xuèyā yǐwài, qítā dōu méi wèntí.","uz":"Qon bosimdan tashqari, boshqa hamma narsa muammosiz.","ru":"Кроме давления, всё остальное без проблем.","tj":"Ба ғайр аз фишори хун, ҳама чизи дигар мушкиле нест."},"pattern":"除了……以外，都/还/也……"},{"l":15,"t":{"uz":"So'roq olmoshlarining maxsus qo'llanishi②: hech qayerda/hech narsa (inkor)","ru":"Особое употребление вопросительных местоимений②: нигде/ничего (отрицание)","tj":"Истифодаи хоси зомирҳои саволӣ②: ҳеҷ куҷо/ҳеҷ чиз (манфӣ)"},"f":{"uz":"So'roq olmoshlari + 都 + inkor fe'l = mutlaq inkor. Masalan: 什么都不 = hech narsani emas; 哪儿都不 = hech qayerda emas; 谁都不 = hech kim emas. Bular kuchli umumlashtiruvchi inkorlar.","ru":"Вопросительное местоимение + 都 + отрицательный глагол = абсолютное отрицание. Например: 什么都不 = ничего не; 哪儿都不 = нигде не; 谁都不 = никто не. Это сильные обобщающие отрицания.","tj":"Зомири саволӣ + 都 + феъли манфӣ = инкори мутлақ. Масалан: 什么都不 = ҳеҷ чизро не; 哪儿都不 = ҳеҷ куҷо не; 谁都不 = ҳеҷ кас не. Инҳо инкорҳои умумикунандаи қавӣ ҳастанд."},"e":{"zh":"什么都不如健康重要！","p":"Shénme dōu bùrú jiànkāng zhòngyào!","uz":"Hech narsa sog'liqdan muhim emas!","ru":"Ничто не важнее здоровья!","tj":"Ҳеҷ чиз аз саломатӣ муҳимтар нест!"},"pattern":"疑问代词活用②：哪儿都/什么都（否定）"},{"l":15,"t":{"uz":"Sifat/Fe'l + 极了 (juda, nihoyatda)","ru":"Прилагательное/Глагол + 极了 (очень, крайне)","tj":"Сифат/Феъл + 极了 (хеле, ниҳоят)"},"f":{"uz":"'极了' sifat yoki fe'ldan keyin kelib, eng yuqori darajani bildiradi. '非常' dan kuchliroq. Masalan: 好极了 = zo'r (juda ajoyib), 满意极了 = nihoyatda mamnun.","ru":"'极了' следует за прилагательным или глаголом и выражает высшую степень. Сильнее, чем '非常'. Например: 好极了 = отлично (очень здорово), 满意极了 = чрезвычайно доволен.","tj":"'极了' баъди сифат ё феъл омада, дараҷаи олиро ифода мекунад. Аз '非常' қавитар. Масалан: 好极了 = олӣ (хеле аҷоиб), 满意极了 = ниҳоят қаноатманд."},"e":{"zh":"好极了！就这样做！","p":"Hǎo jí le! Jiù zhèyàng zuò!","uz":"Zo'r! Xuddi shunday qiling!","ru":"Отлично! Именно так и делайте!","tj":"Олӣ! Маҳз ҳамин тавр кунед!"},"pattern":"形容词/动词 + 极了"},{"l":16,"t":{"uz":"Agar……u holda/bo'lsa……（shartli gap）","ru":"Если……то……（условное предложение）","tj":"Агар……пас……（ҷумлаи шартӣ）"},"f":{"uz":"'如果…就…' tuzilmasi agar-u holda shartli gaplarni ifodalaydi. '如果' = agar, '就' = u holda/shunda. '如果' ko'pincha gapning avvalida, '就' esa natijaning avvalida keladi.","ru":"Конструкция '如果…就…' выражает условные предложения 'если-то'. '如果' = если, '就' = то. '如果' обычно стоит в начале предложения, '就' — перед следствием.","tj":"Сохтори '如果…就…' ҷумлаҳои шартии 'агар-пас'-ро ифода мекунад. '如果' = агар, '就' = пас. '如果' одатан аввали ҷумла, '就' — пеш аз натиҷа меояд."},"e":{"zh":"如果你每天锻炼，就会很健康！","p":"Rúguǒ nǐ měitiān duànliàn, jiù huì hěn jiànkāng!","uz":"Agar har kuni mashq qilsangiz, juda sog'lom bo'lasiz!","ru":"Если будешь заниматься каждый день, будешь очень здоровым!","tj":"Агар ҳар рӯз варзиш кунед, хеле солим мешавед!"},"pattern":"如果……就……（条件句）"},{"l":16,"t":{"uz":"Murakkab holat to'ldiruvchisi: charchashdan……","ru":"Сложное дополнение состояния: устал настолько, что……","tj":"Пуркунандаи мураккаби ҳол: хаста аз……"},"f":{"uz":"'F+得+gap/murakkab ifoda' tuzilmasi harakatning natijasidagi holatni ifodalaydi. Oddiy holatdan farqli ravishda, bu yerda bir butun gap kelishi mumkin. Masalan: 累得睡不着 = charchashdan uxlolmayman.","ru":"Конструкция 'Гл+得+предложение/сложное выражение' описывает состояние в результате действия. В отличие от простого дополнения, здесь может быть целое предложение. Например: 累得睡不着 = так устал, что не могу спать.","tj":"Сохтори 'Ф+得+ҷумла/ибораи мураккаб' ҳолати натиҷаи амалро тасвир мекунад. Баръакси пуркунандаи оддӣ, ин ҷо ҷумлаи пурра омада метавонад. Масалан: 累得睡不着 = ончунон хастаам, ки хобам намебарад."},"e":{"zh":"我累得下了班就想睡觉。","p":"Wǒ lèi de xià le bān jiù xiǎng shuìjiào.","uz":"Shu qadar charchaganmanki, ishdan chiqqanimdan so'ng uxlashni xohlayman.","ru":"Я так устал, что после работы сразу хочу спать.","tj":"Ман ончунон хастаам, ки баъд аз кор фавран хоб кардан мехоҳам."},"pattern":"复杂状态补语：累得……（极端状态）"},{"l":16,"t":{"uz":"Bir bo'g'inli sifat takrori: AA shakli (yaxshi-yaxshi, sekin-sekin...)","ru":"Удвоение односложных прилагательных: форма AA (хорошенько, медленно-медленно...)","tj":"Такрори сифатҳои яктаяко: шакли AA (хуб-хуб, оҳиста-оҳиста...)"},"f":{"uz":"Bir bo'g'inli sifat takrorlanib ravish sifatida ishlatilsa, kuchaytiruvchi ma'no beradi: 好好 = yaxshilab, 慢慢 = sekin-sekin, 早早 = ertaroq, 快快 = tezroq. Bu shakl ko'pincha fe'ldan oldin keladi.","ru":"Если односложное прилагательное удваивается и используется как наречие, оно приобретает усилительное значение: 好好 = хорошенько, 慢慢 = медленно-медленно, 早早 = пораньше, 快快 = побыстрее. Эта форма обычно стоит перед глаголом.","tj":"Агар сифати яктаяко такрор шуда ба сифати зарф истифода шавад, маънои тақвияткунанда пайдо мекунад: 好好 = хуб-хуб, 慢慢 = оҳиста-оҳиста, 早早 = барвақт-барвақт, 快快 = зуд-зуд. Ин шакл одатан пеш аз феъл меояд."},"e":{"zh":"你要好好休息！","p":"Nǐ yào hǎohǎo xiūxi!","uz":"Yaxshilab dam oling!","ru":"Вам нужно хорошенько отдохнуть!","tj":"Шумо бояд хуб-хуб истироҳат кунед!"},"pattern":"单音节形容词重叠：AA式（好好、慢慢……）"},{"l":17,"t":{"uz":"Ikki bo'g'inli fe'l takrori: ABAB shakli","ru":"Удвоение двусложных глаголов: форма ABAB","tj":"Такрори феълҳои дутаяко: шакли ABAB"},"f":{"uz":"Ikki bo'g'inli fe'llar (AB) ABAB shaklida takrorlanadi: 讨论讨论 (muho-muho qilmoq), 研究研究, 介绍介绍. Bu shakl harakatni biroz sinab ko'rish yoki engil bajarish ma'nosini bildiradi.","ru":"Двусложные глаголы (AB) удваиваются по форме ABAB: 讨论讨论 (немного обсудить), 研究研究, 介绍介绍. Эта форма означает попробовать сделать что-то или сделать это немного.","tj":"Феълҳои дутаяко (AB) ба шакли ABAB такрор мешаванд: 讨论讨论 (каме муҳокима кардан), 研究研究, 介绍介绍. Ин шакл маъно медиҳад, ки чизеро каме санҷед ё каме анҷом диҳед."},"e":{"zh":"我们来讨论讨论这个问题吧。","p":"Wǒmen lái tǎolùn tǎolùn zhège wèntí ba.","uz":"Keling, bu muammoni bir oz muhokama qilaylik.","ru":"Давайте немного обсудим эту проблему.","tj":"Биё ин масъаларо каме муҳокима кунем."},"pattern":"双音节动词重叠：ABAB式"},{"l":17,"t":{"uz":"So'roq olmoshlarining maxsus qo'llanishi③: har qachon/har kim/hamma joyda (tasdiq)","ru":"Особое употребление вопросительных местоимений③: всегда/каждый/везде (утверждение)","tj":"Истифодаи хоси зомирҳои саволӣ③: ҳар вақт/ҳар кас/ҳама ҷо (тасдиқ)"},"f":{"uz":"So'roq olmoshlari + 都 + tasdiq fe'l = mutlaq umumlashtirish (tasdiq). Masalan: 什么时候都可以 = har doim mumkin; 谁都可以来 = har kim kela oladi; 哪儿都有 = hamma joyda bor.","ru":"Вопросительное местоимение + 都 + утвердительный глагол = абсолютное обобщение (утверждение). Например: 什么时候都可以 = всегда можно; 谁都可以来 = каждый может прийти; 哪儿都有 = везде есть.","tj":"Зомири саволӣ + 都 + феъли тасдиқӣ = умумикунонии мутлақ (тасдиқ). Масалан: 什么时候都可以 = ҳар вақт мумкин; 谁都可以来 = ҳар кас омада метавонад; 哪儿都有 = ҳама ҷо ҳаст."},"e":{"zh":"什么时候都可以来找我！","p":"Shénme shíhou dōu kěyǐ lái zhǎo wǒ!","uz":"Har doim menga murojaat qilish mumkin!","ru":"В любое время можно приходить ко мне!","tj":"Ҳар вақт ба ман муроҷиат кардан мумкин!"},"pattern":"疑问代词活用③：什么时候都/谁都/哪儿都（肯定）"},{"l":17,"t":{"uz":"根据 + ot (holat/natija/taklif asosida)","ru":"根据 + существительное (на основании ситуации/результата/предложения)","tj":"根据 + исм (дар асоси ҳолат/натиҷа/пешниҳод)"},"f":{"uz":"'根据' predlogi = asosida, ko'ra, muvofiq. Tuzilma: 根据 + ot/gap + predikativ. Ingilizcha 'based on / according to' ga o'xshaydi. Ko'pincha tavsiya, qaror yoki tahlilda ishlatiladi.","ru":"Предлог '根据' = на основании, согласно, исходя из. Структура: 根据 + существительное/предложение + предикат. Похоже на английское 'based on / according to'. Часто используется при советах, решениях или анализе.","tj":"Пешоянди '根据' = дар асоси, мувофиқ, аз рӯи. Сохтор: 根据 + исм/ҷумла + хабар. Ба 'based on / according to'-и инглисӣ монанд аст. Зиёдтар дар тавсия, қарор ё таҳлил истифода мешавад."},"e":{"zh":"根据你的情况，建议你多休息。","p":"Gēnjù nǐ de qíngkuàng, jiànyì nǐ duō xiūxi.","uz":"Holatingizga ko'ra, ko'proq dam olishingizni tavsiya qilaman.","ru":"Исходя из вашей ситуации, рекомендую больше отдыхать.","tj":"Мувофиқи ҳолататон, тавсия медиҳам бештар истироҳат кунед."},"pattern":"根据 + N（根据情况/结果/建议……）"},{"l":18,"t":{"uz":"Faqat……bo'lsa/qilsa……","ru":"Только если……то……","tj":"Танҳо агар……пас……"},"f":{"uz":"'只要…就…' tuzilmasi shartni ifodalaydi, lekin '如果' dan farqli ravishda '只要' = 'faqat shu shart bajarilsa bo'ladi, boshqa narsa kerak emas' ma'nosini bildiradi. Yengilroq va optimistik shart.","ru":"Конструкция '只要…就…' выражает условие, но в отличие от '如果', '只要' = 'достаточно выполнить только это условие, ничего другого не нужно'. Более лёгкое и оптимистичное условие.","tj":"Сохтори '只要…就…' шартро ифода мекунад, аммо баръакси '如果', '只要' = 'танҳо ин шарт иҷро шавад, дигар ҳеҷ чиз лозим нест' маъно медиҳад. Шарти осонтар ва хушбинонатар."},"e":{"zh":"只要你努力，就能成功！","p":"Zhǐyào nǐ nǔlì, jiù néng chénggōng!","uz":"Faqat harakat qilsangiz, muvaffaqiyat qozonasiz!","ru":"Только старайся, и добьёшься успеха!","tj":"Танҳо кӯшиш кунед, муваффақ мешавед!"},"pattern":"只要……就……"},{"l":18,"t":{"uz":"'关于' predlogi (关于 + ot + ...)","ru":"Предлог '关于' (关于 + сущ. + ...)","tj":"Пешоянди '关于' (关于 + исм + ...)"},"f":{"uz":"'关于' = haqida, to'g'risida. Tuzilma: 关于 + mavzu + gapning qolgan qismi. Gap boshida yoki sub'ektdan keyin kelishi mumkin. Ingilizcha 'about / regarding' ga o'xshaydi.","ru":"'关于' = о, насчёт, относительно. Структура: 关于 + тема + остаток предложения. Может стоять в начале предложения или после подлежащего. Похоже на английское 'about / regarding'.","tj":"'关于' = дар бораи, оид ба. Сохтор: 关于 + мавзӯ + қи
