<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>HSK Lug'at · Yangi so'zlar</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  color-scheme:dark;
  --bg:#0a0d14;--bg2:#121826;--bg3:#1a2333;
  --border:rgba(148,163,184,.14);--border2:rgba(148,163,184,.26);
  --text:#f2f5f9;--text2:#8b97ab;
  --accent:#5b8cff;--accent-dim:rgba(91,140,255,.14);
  --ink:#d6453a;--ink-dim:rgba(214,69,58,.16);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --cjk:"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}
button{font:inherit;border:none;background:none;color:inherit;touch-action:manipulation}
button:active{transform:scale(.96)}
#app{max-width:480px;margin:0 auto;height:100vh;position:relative;overflow:hidden;
  background:radial-gradient(circle at 18% -6%,rgba(91,140,255,.16),transparent 38%),linear-gradient(180deg,#0c0f17 0%,var(--bg) 50%,#070910 100%);}
.view{position:absolute;inset:0;display:flex;flex-direction:column;transition:opacity .16s ease;}
.view.hidden{display:none}

/* ---- list view ---- */
.hero{padding:16px 16px 14px;flex-shrink:0}
.hero-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.hero-copy{min-width:0;flex:1}
.eyebrow{font-size:12px;letter-spacing:1.6px;color:var(--text2);font-weight:700;text-transform:uppercase}
.hero-title{font-size:20px;font-weight:800;margin-top:4px;line-height:1.15}
.list-back-btn{width:38px;height:38px;border-radius:12px;background:var(--bg2);border:1px solid var(--border);font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lang-switch{display:flex;gap:7px;margin-bottom:12px}
.lang-btn{min-height:32px;padding:7px 11px;border-radius:999px;background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-size:11px;font-weight:800}
.lang-btn.active{border-color:rgba(91,140,255,.62);background:var(--accent-dim);color:var(--accent)}
.search-wrap{position:relative}
#search{width:100%;padding:13px 16px;font-size:14px;font-weight:600;border-radius:16px;
  background:var(--bg2);border:1.5px solid var(--border2);color:var(--text);outline:none;
  transition:border-color .15s ease, box-shadow .15s ease}
#search::placeholder{color:var(--text2);font-weight:500}
#search:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-dim)}
.count{margin-top:10px;font-size:12px;color:var(--text2);font-weight:600}
.list{flex:1;overflow-y:auto;padding-bottom:20px;-webkit-overflow-scrolling:touch}
.row{display:flex;align-items:center;gap:13px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.row:active{background:var(--bg2)}
.row .h{font-family:var(--cjk);font-size:23px;font-weight:700;min-width:58px}
.row .info{flex:1;min-width:0}
.row .p{font-size:12px;color:var(--accent);font-weight:700;margin-bottom:2px}
.row .m{font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .lv{font-size:9px;color:var(--text2);background:var(--bg3);padding:3px 7px;border-radius:7px;font-weight:700;letter-spacing:.3px;flex-shrink:0}
.empty{padding:40px 20px;text-align:center;color:var(--text2);font-size:14px;line-height:1.6}

/* ---- detail view ---- */
.detail-header{display:flex;align-items:center;justify-content:space-between;padding:16px;flex-shrink:0}
.back-btn{width:38px;height:38px;border-radius:12px;background:var(--bg2);border:1px solid var(--border);font-size:18px;display:flex;align-items:center;justify-content:center}
.detail-level{font-size:10px;color:var(--text2);background:var(--bg3);padding:5px 10px;border-radius:8px;font-weight:700;letter-spacing:.3px}
.detail-body{flex:1;overflow-y:auto;padding:6px 16px 30px;display:flex;flex-direction:column;align-items:center}

.writer-card{margin-top:4px;width:100%;max-width:300px;display:flex;flex-direction:column;align-items:center}
.writer-toolbar{display:flex;align-items:center;justify-content:space-between;width:100%}
.nav-arrow{width:34px;height:34px;border-radius:11px;background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-arrow:disabled{opacity:.25}
.nav-arrow.hidden{visibility:hidden}
.writer-info{text-align:center;min-width:90px}
.writer-pos{font-size:11px;color:var(--text2);font-weight:700;letter-spacing:.2px}
.writer-pos.hidden{display:none}
.writer-strokes{font-size:12.5px;color:var(--ink);font-weight:800;letter-spacing:.2px;margin-top:1px}
.char-box-lg{position:relative;width:248px;height:248px;margin-top:10px;border-radius:20px;background:var(--bg2);border:1px solid var(--border);overflow:hidden;flex-shrink:0}
.char-box-lg .grid-bg{position:absolute;inset:0;width:100%;height:100%}
.char-box-lg .grid-bg line{stroke:rgba(255,255,255,.09);stroke-width:1}
.char-box-lg .writer-target{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.char-box-lg .plain-char{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--cjk);font-size:64px;font-weight:600;color:var(--text2)}
.writer-controls{display:flex;align-items:center;gap:16px;margin-top:16px}
.ctrl-btn{width:48px;height:48px;border-radius:50%;background:var(--ink-dim);color:var(--ink);font-size:17px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(214,69,58,.34)}
.ctrl-btn.ctrl-main{width:60px;height:60px;font-size:20px;background:var(--ink);color:#fff;border-color:var(--ink)}
.ctrl-btn:active{transform:scale(.94)}
.next-word-btn{margin-top:14px;display:flex;align-items:center;gap:8px;padding:8px 16px 8px 12px;border-radius:14px;background:var(--bg2);border:1px solid var(--border2);cursor:pointer;transition:background .14s}
.next-word-btn:active{background:var(--bg3)}
.next-word-btn .nw-char{font-family:var(--cjk);font-size:26px;font-weight:700;color:var(--text);line-height:1}
.next-word-btn .nw-info{display:flex;flex-direction:column;gap:1px}
.next-word-btn .nw-pin{font-size:11px;color:var(--accent);font-weight:700}
.next-word-btn .nw-lbl{font-size:10px;color:var(--text2);font-weight:600}
.next-word-btn .nw-arr{font-size:16px;color:var(--text2);margin-left:2px}
.practice-block{margin-top:26px;width:100%;max-width:360px}
.practice-block .pb-head{font-size:11px;letter-spacing:.4px;text-transform:uppercase;color:var(--text2);font-weight:800;margin:0 4px 10px}
.practice-btn{width:100%;display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:14px;background:var(--bg2);border:1px solid var(--border);cursor:pointer;transition:background .14s;margin-bottom:10px;text-align:left}
.practice-btn:last-child{margin-bottom:0}
.practice-btn:active{background:var(--bg3)}
.practice-btn .pb-ic{width:40px;height:40px;border-radius:11px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.practice-btn .pb-tx{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0}
.practice-btn .pb-t{font-size:14px;font-weight:700;color:var(--text)}
.practice-btn .pb-s{font-size:11px;color:var(--text2);font-weight:600}
.practice-btn .pb-arr{font-size:18px;color:var(--text2);flex-shrink:0}

.pinyin-row{display:flex;align-items:center;gap:10px;margin-top:22px}
.pinyin{font-size:22px;font-weight:700;color:var(--accent)}
.audio-btn{width:36px;height:36px;border-radius:50%;background:var(--accent-dim);color:var(--accent);font-size:15px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(91,140,255,.3);flex-shrink:0}
.audio-btn:active{background:rgba(91,140,255,.26)}
.audio-btn.small{width:26px;height:26px;font-size:12px}
.meaning{margin-top:8px;font-size:15px;color:var(--text);text-align:center;line-height:1.5;padding:0 8px;max-width:360px}
.example{margin-top:22px;width:100%;max-width:360px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 16px}
.example.hidden{display:none}
.example-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.example-zh{font-family:var(--cjk);font-size:16px;font-weight:600;color:var(--text);line-height:1.4}
.example-uz{margin-top:6px;font-size:12.5px;color:var(--text2);line-height:1.5}
.usage-pos{display:inline-block;font-size:10.5px;font-weight:800;letter-spacing:.3px;text-transform:uppercase;color:var(--accent);background:var(--accent-dim);padding:4px 10px;border-radius:8px;margin-bottom:10px}
.usage-pos.hidden{display:none}
.grammar-card{margin-top:12px;width:100%;max-width:360px;background:rgba(91,140,255,.08);border:1px solid rgba(91,140,255,.22);border-radius:14px;padding:14px 16px}
.grammar-card.hidden{display:none}
.grammar-title{font-family:var(--cjk);font-size:16px;font-weight:800;color:var(--text);line-height:1.4}
.grammar-formula{margin-top:7px;font-size:12.5px;color:var(--accent);font-weight:700;line-height:1.45}
.grammar-rule{margin-top:8px;font-size:12.5px;color:var(--text2);line-height:1.55}
.grammar-example{margin-top:10px;border-top:1px solid rgba(148,163,184,.16);padding-top:10px}
/* ---- memo structured sections (data-driven, optional) ---- */
.memo-wrap{width:100%;max-width:360px;margin-top:14px;display:flex;flex-direction:column;gap:10px}
.memo-wrap:empty{display:none}
.memo-sec{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 16px}
.memo-sec .ms-h{font-size:10.5px;letter-spacing:.4px;text-transform:uppercase;color:var(--text2);font-weight:800;margin-bottom:10px}
.memo-parts{display:flex;gap:8px;flex-wrap:wrap}
.memo-part{flex:1;min-width:92px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:10px 8px;text-align:center}
.memo-part .mp-h{font-family:var(--cjk);font-size:26px;font-weight:700;color:var(--text);line-height:1}
.memo-part .mp-p{font-size:11px;color:var(--accent);font-weight:700;margin-top:5px}
.memo-part .mp-m{font-size:11px;color:var(--text2);margin-top:3px;line-height:1.35}
.memo-roles{display:flex;flex-direction:column;gap:8px}
.memo-role{display:flex;gap:9px;align-items:flex-start}
.memo-role .mr-k{font-size:9.5px;font-weight:800;letter-spacing:.3px;text-transform:uppercase;color:var(--accent);background:var(--accent-dim);padding:5px 8px;border-radius:8px;flex-shrink:0;min-width:84px;text-align:center}
.memo-role .mr-v{font-size:13px;color:var(--text);line-height:1.45;padding-top:1px}
.memo-role .mr-v b{font-family:var(--cjk);font-weight:700}
.memo-signal{font-size:12px;color:var(--text2);line-height:1.5;margin-top:9px}
.memo-disc{font-size:11px;color:var(--text2);opacity:.82;font-style:italic;line-height:1.45;margin-top:8px}
.memo-hooks{display:flex;flex-direction:column;gap:7px}
.memo-hook{display:flex;gap:8px;align-items:flex-start;font-size:13px;color:var(--text);line-height:1.45}
.memo-hook .mh-d{color:var(--accent);flex-shrink:0;font-weight:800}
.memo-conf{display:flex;flex-direction:column;gap:9px}
.memo-conf-row{display:flex;gap:11px;align-items:flex-start}
.memo-conf-row .mc-h{font-family:var(--cjk);font-size:24px;font-weight:700;color:var(--text);line-height:1;min-width:28px;text-align:center}
.memo-conf-row .mc-tx{flex:1;min-width:0}
.memo-conf-row .mc-p{font-size:11px;color:var(--accent);font-weight:700}
.memo-conf-row .mc-d{font-size:12px;color:var(--text2);line-height:1.42;margin-top:2px}
.memo-words{display:flex;flex-direction:column;gap:8px}
.memo-word{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.memo-word .mw-w{font-family:var(--cjk);font-size:16px;font-weight:700;color:var(--text)}
.memo-word .mw-p{font-size:11px;color:var(--accent);font-weight:700}
.memo-word .mw-m{font-size:12px;color:var(--text2)}
/* ---- light theme (course-v3 ink-cinnabar) — opt-in via ?theme=light ---- */
html.theme-light{color-scheme:light;
  --bg:#FBF7EF;--bg2:#FFFFFF;--bg3:#F1ECE0;
  --border:rgba(33,29,23,.10);--border2:rgba(33,29,23,.18);
  --text:#211D17;--text2:#6E665B;
  --accent:#C2403A;--accent-dim:rgba(194,64,58,.10);
  --ink:#C2403A;--ink-dim:rgba(194,64,58,.12);
  --cjk:"Songti SC","STSong","Noto Serif SC",serif;}
html.theme-light #app{background:#FBF7EF;}
html.theme-light .char-box-lg .grid-bg line{stroke:rgba(33,29,23,.08);}
html.theme-light #search:focus{box-shadow:0 0 0 4px rgba(194,64,58,.12);}
html.theme-light .lang-btn.active{border-color:rgba(194,64,58,.55);}
html.theme-light .lang-switch{display:none;}
html.theme-light .hero-copy{display:none;}
html.theme-light .hero{padding-bottom:10px;}
/* ---- dars ichidan ochiladigan yozilish ekrani (?fast=1) ---- */
.fw-card{max-width:340px}
.fw-box{width:min(330px,86vw);height:min(330px,86vw);touch-action:pan-y}
.fw-info{margin-top:18px;width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:14px 16px;text-align:center}
.fw-py{font-size:23px;font-weight:700;color:var(--accent);line-height:1.25}
.fw-mn{margin-top:9px;padding-top:10px;border-top:1px solid var(--border);font-size:14.5px;color:var(--text);line-height:1.5}
.fw-info.no-py .fw-py{display:none}
.fw-info.no-mn .fw-mn{display:none}
.fw-info.no-py .fw-mn{margin-top:0;padding-top:0;border-top:none}
.fw-hint{margin-top:12px;font-size:11.5px;color:var(--text2);text-align:center;line-height:1.4}
.fw-back{margin-top:14px;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:14px;background:var(--ink);color:#fff;border:none;font-family:inherit;font-size:15px;font-weight:700}
.fw-back:active{opacity:.88}
</style>
</head>
<body>
<div id="app">

  <div class="view" id="view-list">
    <div class="hero">
      <div class="hero-top">
        <button class="list-back-btn" id="list-back-btn" aria-label="Orqaga">←</button>
        <div class="hero-copy">
          <div class="eyebrow" id="hero-eyebrow">汉字 · HSK 1–4</div>
          <div class="hero-title" id="hero-title">Yangi so'zlar lug'ati</div>
        </div>
      </div>
      <div class="lang-switch" id="lang-switch"></div>
      <div class="search-wrap">
        <input id="search" type="text" placeholder="Mano, pinyin yoki ieroglif bo'yicha qidiring…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      </div>
      <div class="count" id="count"></div>
    </div>
    <div class="list" id="list"></div>
  </div>

  <div class="view hidden" id="view-detail">
    <div class="detail-header">
      <button class="back-btn" id="back-btn" aria-label="Orqaga">←</button>
      <span class="detail-level" id="detail-level"></span>
    </div>
    <div class="detail-body">
      <div class="writer-card">
        <div class="writer-toolbar">
          <button class="nav-arrow" id="char-prev" aria-label="Oldingi belgi">‹</button>
          <div class="writer-info">
            <div class="writer-pos hidden" id="writer-pos"></div>
            <div class="writer-strokes" id="writer-strokes"></div>
          </div>
          <button class="nav-arrow" id="char-next" aria-label="Keyingi belgi">›</button>
        </div>
        <div class="char-box-lg" id="char-box-lg"></div>
        <div class="writer-controls">
          <button class="ctrl-btn" id="ctrl-restart" aria-label="Bir chiziq orqaga">«</button>
          <button class="ctrl-btn ctrl-main" id="ctrl-playpause" aria-label="Pauza / Davom">▶</button>
          <button class="ctrl-btn" id="ctrl-skip" aria-label="Bir chiziq oldinga">»</button>
        </div>
        <div class="next-word-btn hidden" id="next-word-btn"></div>
      </div>
      <div class="pinyin-row">
        <div class="pinyin" id="detail-pinyin"></div>
        <button class="audio-btn" id="audio-btn" aria-label="Tinglash">🔊</button>
      </div>
      <div class="meaning" id="detail-meaning"></div>
      <div class="memo-wrap" id="memo-block"></div>
      <div class="example hidden" id="example-block">
        <div class="usage-pos" id="usage-pos"></div>
        <div class="example-row">
          <span class="example-zh" id="example-zh"></span>
          <button class="audio-btn small" id="example-audio-btn" aria-label="Tinglash">🔊</button>
        </div>
        <div class="example-uz" id="example-uz"></div>
      </div>
      <div class="grammar-card hidden" id="grammar-block">
        <div class="usage-pos" id="grammar-label"></div>
        <div class="grammar-title" id="grammar-title"></div>
        <div class="grammar-formula" id="grammar-formula"></div>
        <div class="grammar-rule" id="grammar-rule"></div>
        <div class="grammar-example hidden" id="grammar-example">
          <div class="example-row">
            <span class="example-zh" id="grammar-example-zh"></span>
            <button class="audio-btn small" id="grammar-audio-btn" aria-label="Tinglash">🔊</button>
          </div>
          <div class="example-uz" id="grammar-example-text"></div>
        </div>
      </div>
      <div class="practice-block" id="practice-block">
        <div class="pb-head" id="practice-head">Mashqlar</div>
        <button class="practice-btn" id="pr-pron" type="button">
          <span class="pb-ic">🎙️</span>
          <span class="pb-tx"><span class="pb-t" id="pr-pron-t"></span><span class="pb-s" id="pr-pron-s"></span></span>
          <span class="pb-arr">›</span>
        </button>
        <button class="practice-btn" id="pr-recog" type="button">
          <span class="pb-ic">🔍</span>
          <span class="pb-tx"><span class="pb-t" id="pr-recog-t"></span><span class="pb-s" id="pr-recog-s"></span></span>
          <span class="pb-arr">›</span>
        </button>
        <button class="practice-btn" id="pr-mem" type="button">
          <span class="pb-ic">⚡</span>
          <span class="pb-tx"><span class="pb-t" id="pr-mem-t"></span><span class="pb-s" id="pr-mem-s"></span></span>
          <span class="pb-arr">›</span>
        </button>
      </div>
    </div>
  </div>

</div><script>
/**

<script>
(function(){

  var UI = {

      emptyTitle: "Чизе ёфт нашуд.",
      emptySub: "Калимаи дигар санҷед.",
      grammar: "Грамматика",
      grammarExample: "Мисол"
    }
  };
  var levelLabels = {
    all: 'HSK 1-4',
    hsk1: 'HSK 1',
    hsk2: 'HSK 2',
    hsk3: 'HSK 3',
    hsk4: 'HSK 4',
    hsk4a: 'HSK 4 上',
    hsk4b: 'HSK 4 下'
  };

  var practiceLabels = {
    uz:{head:'Mashqlar', pronT:'Talaffuzni tekshirish', pronS:'Bot bilan ayting', recogT:"O'xshashlardan ajrating", recogS:'Ieroglifni taning', memT:'Tez eslab qolish', memS:'Yodlash mashqi'},
    ru:{head:'Упражнения', pronT:'Проверка произношения', pronS:'Скажите боту', recogT:'Найдите среди похожих', recogS:'Распознавание', memT:'Быстрое запоминание', memS:'Тренировка памяти'},
    tj:{head:'Машқҳо', pronT:'Санҷиши талаффуз', pronS:'Ба бот гӯед', recogT:'Аз байни монандҳо ёбед', recogS:'Шинохти иероглиф', memT:'Зуд ёд гирифтан', memS:'Машқи ҳофиза'}
  };

  var memoLabels = {
    uz:{tarkibi:'Tarkibi', belgi:"Ma'no va tovush belgisi", mano:"Ma'no belgisi", tovush:'Tovush qismi', eslab:'Eslab qolish', oxshash:"O'xshash iyerogliflar", misol:'Misol'},
    ru:{tarkibi:'Состав', belgi:'Ключ значения и звука', mano:'Ключ значения', tovush:'Фонетик', eslab:'Как запомнить', oxshash:'Похожие иероглифы', misol:'Пример'},
    tj:{tarkibi:'Таркиб', belgi:'Калиди маъно ва овоз', mano:'Калиди маъно', tovush:'Қисми овозӣ', eslab:'Чӣ тавр дар хотир монед', oxshash:'Иероглифҳои монанд', misol:'Мисол'}
  };

  function normalizeLang(value){
    value = String(value || '').toLowerCase();
    return validLangs.indexOf(value) !== -1 ? value : '';
  }
  function detectLang(){
    var nl = ((navigator.language || navigator.userLanguage || 'uz') + '').toLowerCase();
    if(nl.indexOf('ru') === 0) return 'ru';
    if(nl.indexOf('tg') === 0 || nl.indexOf('tj') === 0) return 'tj';
    return 'uz';
  }
  function normalizeLevel(value){
    var key = String(value || '').toLowerCase().replace(/[^a-z0-9]/g, '');
    return ['hsk1','hsk2','hsk3','hsk4','hsk4a','hsk4b'].indexOf(key) !== -1 ? key : 'all';
  }
  var currentLang = normalizeLang(params.get('lang')) || normalizeLang(localStorage.getItem('hsk_all_current_lang_v3')) || detectLang();
  var currentLevel = normalizeLevel(params.get('level'));
  var isLight = params.get('theme') === 'light';
  if(isLight) document.documentElement.classList.add('theme-light');
  var activeWords = [];
  var currentWord = null;

  function text(value){
    if(value && typeof value === 'object') return value[currentLang] || value.uz || value.ru || value.tj || '';
    return value || '';
  }
  function allText(value){
    if(value && typeof value === 'object') return [value.uz, value.ru, value.tj].filter(Boolean).join(' ');
    return value || '';
  }
  function stripTones(s){
    return String(s || '').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
  }
  function normPinyin(s){
    return stripTones(s).replace(/[\s()（）]/g,'');
  }
  function initFastWriter(fastParams){
    var lang = normalizeLang(fastParams.get('lang')) || detectLang();
    var isFastLight = fastParams.get('theme') === 'light';
    if(isFastLight) document.documentElement.classList.add('theme-light');
    var labels = {
      uz:{close:'Yopish',play:'Ko\'rsatish',replay:'Qayta',dict:'Lug\'atda ochish',strokes:function(n){return n + ' chiziq';},fallback:'Yozilish animatsiyasi yuklanmadi',back:'Darsga qaytish',swipe:'Keyingi ieroglif uchun yon tomonga suring'},
      ru:{close:'Закрыть',play:'Показать',replay:'Повторить',dict:'Открыть в словаре',strokes:function(n){return n + ' черт';},fallback:'Анимация написания не загрузилась',back:'Вернуться к уроку',swipe:'Проведите в сторону — следующий иероглиф'},
      tj:{close:'Пӯшидан',play:'Нишон додан',replay:'Такрор',dict:'Дар луғат кушодан',strokes:function(n){return n + ' хат';},fallback:'Аниматсияи навишт бор нашуд',back:'Бозгашт ба дарс',swipe:'Барои иероглифи навбатӣ ба паҳлӯ кашед'}
    }[lang] || {};
    var raw = fastParams.get('char') || '字';
    var chars = Array.from(raw).filter(function(c){return c.trim();});
    if(!chars.length) chars = ['字'];
    var pinyin = fastParams.get('pinyin') || '';
    var meaning = fastParams.get('meaning') || '';
    var app = document.getElementById('app');
    function e(s){return String(s || '').replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
    function closeFast(){
      try{if(window.parent && window.parent !== window && window.parent.App){window.parent.App.closeWriter();return;}}catch(err){}
      try{history.back()}catch(err){}
    }
    function grid(){
      return '<svg class="grid-bg" viewBox="0 0 100 100">'+
        '<line x1="50" y1="0" x2="50" y2="100"></line>'+
        '<line x1="0" y1="50" x2="100" y2="50"></line>'+
        '<line x1="0" y1="0" x2="100" y2="100"></line>'+
        '<line x1="100" y1="0" x2="0" y2="100"></line>'+
      '</svg><div class="writer-target" id="fast-target"></div>';
    }
    app.innerHTML =
      '<div class="view" style="display:flex">'+
        '<div class="detail-header"><button class="back-btn" id="fast-close">×</button><div class="detail-level">HSK AI</div></div>'+
        '<div class="detail-body">'+
          '<div class="writer-card fw-card">'+
            '<div class="writer-toolbar">'+
              '<button class="nav-arrow" id="fast-prev">‹</button>'+
              '<div class="writer-info"><div class="writer-pos" id="fast-pos"></div><div class="writer-strokes" id="fast-strokes"></div></div>'+
              '<button class="nav-arrow" id="fast-next">›</button>'+
            '</div>'+
            '<div class="char-box-lg fw-box" id="fast-box"></div>'+
            '<div class="writer-controls">'+
              '<button class="ctrl-btn ctrl-main" id="fast-play">⏸</button>'+
              '<button class="ctrl-btn" id="fast-replay">↻</button>'+
            '</div>'+
            (chars.length > 1 ? '<div class="fw-hint">'+e(labels.swipe)+'</div>' : '')+
            '<div class="fw-info" id="fast-info">'+
              '<div class="fw-py" id="fast-pinyin"></div>'+
              '<div class="fw-mn" id="fast-meaning"></div>'+
            '</div>'+
            '<button class="next-word-btn" id="fast-dict" style="margin-top:14px"><span>字</span><b>'+e(labels.dict)+'</b></button>'+
            '<button class="fw-back" id="fast-back">'+e(labels.back)+'</button>'+
          '</div>'+
        '</div>'+
      '</div>';
    var idx = 0, writer = null, paused = false;
    var box = document.getElementById('fast-box');
    var pos = document.getElementById('fast-pos');
    var strokes = document.getElementById('fast-strokes');
    var prev = document.getElementById('fast-prev');
    var next = document.getElementById('fast-next');
    var play = document.getElementById('fast-play');
    var replay = document.getElementById('fast-replay');
    document.getElementById('fast-close').onclick = closeFast;
    document.getElementById('fast-back').onclick = closeFast;
    document.getElementById('fast-dict').onclick = function(){
      location.href = '/hsk-lugat.html?theme=light&char=' + encodeURIComponent(raw) + '&lang=' + encodeURIComponent(lang);
    };
    function drawPlain(ch){box.innerHTML = '<div class="plain-char">'+e(ch)+'</div>';strokes.textContent = labels.fallback;}
    function setPlayIcon(){play.textContent = paused ? '▶' : '⏸';}
    function render(){
      var ch = chars[idx];
      writer = null;
      paused = false;
      setPlayIcon();
      pos.textContent = chars.length > 1 ? (idx + 1) + ' / ' + chars.length : '';
      pos.classList.toggle('hidden', chars.length <= 1);
      prev.disabled = idx === 0;
      next.disabled = idx === chars.length - 1;
      var info = document.getElementById('fast-info');
      document.getElementById('fast-pinyin').textContent = pinyin;
      document.getElementById('fast-meaning').textContent = meaning;
      info.classList.toggle('no-py', !pinyin);
      info.classList.toggle('no-mn', !meaning);
      info.style.display = (pinyin || meaning) ? '' : 'none';
      strokes.textContent = '';
      box.innerHTML = grid();
      var size = Math.max(200, box.clientWidth || 300);
      try{
        writer = HanziWriter.create(document.getElementById('fast-target'), ch, {
          width:size,height:size,padding:14,showOutline:true,showCharacter:false,
          outlineColor:isFastLight?'rgba(33,29,23,.14)':'rgba(255,255,255,.16)',
          /* Ekran ochilishi bilan yozilish tartibi o'zi aylanib turadi:
             sekinroq chiziqlar, chiziqlar orasida pauza yo'q. */
          strokeColor:'#d6453a',strokeAnimationSpeed:0.65,delayBetweenStrokes:40,delayBetweenLoops:900,
          charDataLoader:function(c,onComplete,onError){
            var xhr = new XMLHttpRequest();
            xhr.overrideMimeType && xhr.overrideMimeType('application/json');
            xhr.open('GET','https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0.1/'+encodeURIComponent(c)+'.json',true);
            xhr.timeout = 2500;
            xhr.onreadystatechange = function(){
              if(xhr.readyState !== 4) return;
              if(xhr.status === 200) onComplete(JSON.parse(xhr.responseText));
              else if(onError) onError(xhr);
            };
            xhr.onerror = xhr.ontimeout = function(){ if(onError) onError(xhr); };
            xhr.send(null);
          },
          onLoadCharDataError:function(){drawPlain(ch)}
        });
        writer.getCharacterData().then(function(data){
          if(chars[idx] !== ch) return;
          strokes.textContent = labels.strokes((data.strokes || []).length);
          try{writer.loopCharacterAnimation()}catch(err){}
        }).catch(function(){drawPlain(ch)});
      }catch(err){drawPlain(ch)}
    }
    function go(step){
      var n = idx + step;
      if(n < 0 || n > chars.length - 1) return;
      idx = n; render();
    }
    prev.onclick = function(){go(-1)};
    next.onclick = function(){go(1)};
    play.onclick = function(){
      if(!writer) return;
      paused = !paused;
      try{paused ? writer.pauseAnimation() : writer.resumeAnimation()}catch(err){}
      setPlayIcon();
    };
    replay.onclick = function(){render()};
    /* Keyingi/oldingi ieroglifga qo'l bilan yon tomonga surib ham o'tish */
    (function(){
      var x0 = null, y0 = null;
      box.addEventListener('touchstart', function(ev){
        var t = ev.touches && ev.touches[0]; if(!t) return;
        x0 = t.clientX; y0 = t.clientY;
      }, {passive:true});
      box.addEventListener('touchend', function(ev){
        if(x0 === null) return;
        var t = ev.changedTouches && ev.changedTouches[0];
        if(t){
          var dx = t.clientX - x0, dy = t.clientY - y0;
          if(Math.abs(dx) > 44 && Math.abs(dx) > Math.abs(dy) * 1.5) go(dx < 0 ? 1 : -1);
        }
        x0 = y0 = null;
      }, {passive:true});
    })();
    try{
      var tg = window.Telegram && window.Telegram.WebApp;
      if(tg && tg.ready) tg.ready();
      if(tg && tg.BackButton && tg.BackButton.show) tg.BackButton.show();
      if(tg && tg.BackButton && tg.BackButton.onClick) tg.BackButton.onClick(closeFast);
    }catch(err){}
    render();
  }
  function escapeHtml(s){
    return String(s == null ? '' : s).replace(/[&<>"]/g, function(c){
      return c === '&' ? '&amp;' : c === '<' ? '&lt;' : c === '>' ? '&gt;' : '&quot;';
    });
  }
  function wordMatchesLevel(word){
    var lv = String(word.lv || '').toLowerCase();
    if(currentLevel === 'all') return true;
    if(currentLevel === 'hsk4') return lv.indexOf('hsk4') === 0;
    if(currentLevel === 'hsk4a') return lv.indexOf('hsk4') === 0 && lv.indexOf('1-qism') !== -1;
    if(currentLevel === 'hsk4b') return lv.indexOf('hsk4') === 0 && lv.indexOf('2-qism') !== -1;
    return lv.replace(/\s/g, '').indexOf(currentLevel) === 0;
  }
  function localizedExample(ex){
    if(!ex) return '';
    if(ex.m && typeof ex.m === 'object') return ex.m[currentLang] || ex.m.uz || ex.uz || '';
    return ex[currentLang] || ex.uz || '';
  }
  function grammarFor(word){
    if(!String(word.lv || '').toLowerCase().startsWith('hsk4')) return null;
    if(typeof HSK4_GRAMMAR === 'undefined' || !Array.isArray(HSK4_GRAMMAR)) return null;
    var h = String(word.h || '');
    return HSK4_GRAMMAR.find(function(g){ return g.t === h; }) ||
      HSK4_GRAMMAR.find(function(g){ return h.length > 1 && String(g.t || '').indexOf(h) !== -1; }) ||
      HSK4_GRAMMAR.find(function(g){ return h.length === 1 && String(g.t || '') === h; });
  }

  WORDS.forEach(function(w,i){
    w.id = i;
    w._p = normPinyin(w.p);
    w._m = allText(w.m).toLowerCase();
  });

  if(currentLevel === 'all'){
    activeWords = WORDS.slice();
  } else {
    var _inLevel = [], _others = [];
    WORDS.forEach(function(w){ (wordMatchesLevel(w) ? _inLevel : _others).push(w); });
    activeWords = _inLevel.concat(_others);
  }

  var searchEl = document.getElementById('search');
  var listEl = document.getElementById('list');
  var countEl = document.getElementById('count');
  var heroTitle = document.getElementById('hero-title');
  var heroEyebrow = document.getElementById('hero-eyebrow');
  var langSwitch = document.getElementById('lang-switch');
  var listBackBtn = document.getElementById('list-back-btn');
  var viewList = document.getElementById('view-list');
  var viewDetail = document.getElementById('view-detail');
  var detailPinyin = document.getElementById('detail-pinyin');
  var detailMeaning = document.getElementById('detail-meaning');
  var detailLevel = document.getElementById('detail-level');
  var backBtn = document.getElementById('back-btn');
  var audioBtn = document.getElementById('audio-btn');
  var exampleBlock = document.getElementById('example-block');
  var usagePos = document.getElementById('usage-pos');
  var exampleZh = document.getElementById('example-zh');
  var exampleUz = document.getElementById('example-uz');
  var exampleAudioBtn = document.getElementById('example-audio-btn');
  var grammarBlock = document.getElementById('grammar-block');
  var grammarLabel = document.getElementById('grammar-label');
  var grammarTitle = document.getElementById('grammar-title');
  var grammarFormula = document.getElementById('grammar-formula');
  var grammarRule = document.getElementById('grammar-rule');
  var grammarExample = document.getElementById('grammar-example');
  var grammarExampleZh = document.getElementById('grammar-example-zh');
  var grammarExampleText = document.getElementById('grammar-example-text');
  var grammarAudioBtn = document.getElementById('grammar-audio-btn');

  var charPrevBtn = document.getElementById('char-prev');
  var charNextBtn = document.getElementById('char-next');
  var writerPos = document.getElementById('writer-pos');
  var writerStrokes = document.getElementById('writer-strokes');
  var charBoxLg = document.getElementById('char-box-lg');
  var ctrlRestart = document.getElementById('ctrl-restart');
  var ctrlPlayPause = document.getElementById('ctrl-playpause');
  var ctrlSkip = document.getElementById('ctrl-skip');

  var scrollPos = 0;
  var currentChars = [];
  var currentCharIdx = 0;
  var currentWriter = null;
  var isPlaying = false;
  var isFinished = false;
  var currentStrokeShown = 0;
  var totalStrokes = 0;
  var isReshowing = false;

  var nextWordBtn = document.getElementById('next-word-btn');

  function getNextWord(){
    if(!currentWord) return null;
    var idx = -1;
    for(var i=0;i<activeWords.length;i++){ if(activeWords[i].id===currentWord.id){idx=i;break;} }
    return (idx !== -1 && idx < activeWords.length-1) ? activeWords[idx+1] : null;
  }

  function showNextWordBtn(){
    var nw = getNextWord();
    if(!nw){ nextWordBtn.classList.add('hidden'); return; }
    var lbl = {'uz':'Keyingi so\'z','ru':'Следующее слово','tj':'Калимаи навбатӣ'};
    nextWordBtn.innerHTML =
      '<div class="nw-char">'+escapeHtml(nw.h)+'</div>'+
      '<div class="nw-info"><div class="nw-pin">'+escapeHtml(nw.p)+'</div>'+
      '<div class="nw-lbl">'+(lbl[currentLang]||lbl.uz)+'</div></div>'+
      '<div class="nw-arr">›</div>';
    nextWordBtn.classList.remove('hidden');
    nextWordBtn.onclick = function(){ openDetail(nw); };
  }

  function hideNextWordBtn(){
    nextWordBtn.classList.add('hidden');
    nextWordBtn.onclick = null;
  }

  function updateStepBtns(){
    document.getElementById('ctrl-restart').disabled = (!currentWriter || currentStrokeShown <= 0 || isReshowing);
    document.getElementById('ctrl-skip').disabled = (!currentWriter || currentStrokeShown >= totalStrokes || isPlaying || isReshowing);
  }

  function stepForward(){
    if(!currentWriter || currentStrokeShown >= totalStrokes || isPlaying || isReshowing) return;
    isPlaying = true; isFinished = false; setPlayIcon();
    var n = currentStrokeShown;
    currentWriter.animateStroke(n, {onComplete: function(){
      currentStrokeShown++;
      isPlaying = false; setPlayIcon();
      if(currentStrokeShown >= totalStrokes){ isFinished = true; showNextWordBtn(); }
      updateStepBtns();
    }});
  }

  function stepBack(){
    if(!currentWriter || currentStrokeShown <= 0 || isPlaying || isReshowing) return;
    currentStrokeShown--;
    hideNextWordBtn();
    isFinished = false;
    var target = currentStrokeShown;
    currentWriter.hideCharacter({duration:0});
    if(target === 0){ updateStepBtns(); return; }
    isReshowing = true;
    updateStepBtns();
    var origSpeed = currentWriter._options.strokeAnimationSpeed;
    currentWriter._options.strokeAnimationSpeed = 60;
    function showNext(i){
      if(i >= target){
        currentWriter._options.strokeAnimationSpeed = origSpeed;
        isReshowing = false; updateStepBtns(); return;
      }
      currentWriter.animateStroke(i, {onComplete: function(){ showNext(i+1); }});
    }
    showNext(0);
  }

  var _ttsAudio = null, _ttsTok = 0, _ttsCache = {}, _ttsPend = {};
  function _ttsPrefetch(x){
    x = (x||'').trim();
    if(!x || x.length>240 || _ttsCache[x] || _ttsPend[x] || !/[一-鿿]/.test(x)) return;
    _ttsPend[x] = fetch('/api/v3/tts?text=' + encodeURIComponent(x))
      .then(function(r){ if(!r.ok) throw 0; return r.blob(); })
      .then(function(b){ delete _ttsPend[x]; if(b && b.size) _ttsCache[x] = URL.createObjectURL(b); })
      .catch(function(){ delete _ttsPend[x]; });
  }
  function _ttsFallback(textValue){
    if(!('speechSynthesis' in window) || !textValue) return;
    try{
      window.speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(textValue);
      u.lang = 'zh-CN';
      u.rate = 0.82;
      window.speechSynthesis.speak(u);
    }catch(e){}
  }
  function speak(textValue){
    if(!textValue) return;
    _ttsTok++;
    try{ if(_ttsAudio){ _ttsAudio.onplaying=null; _ttsAudio.onerror=null; _ttsAudio.pause(); _ttsAudio = null; } }catch(e){}
    try{ window.speechSynthesis.cancel(); }catch(e){}
    var tok = _ttsTok, st = 0;
    try{
      var a = new Audio(_ttsCache[textValue] || ('/api/v3/tts?text=' + encodeURIComponent(textValue)));
      if(!_ttsCache[textValue]) _ttsPrefetch(textValue);
      _ttsAudio = a;
      a.onplaying = function(){ if(tok!==_ttsTok){ try{a.pause();}catch(e){} return; } st=1; };
      a.onerror = function(){ if(tok!==_ttsTok || st!==0) return; st=2; _ttsFallback(textValue); };
      var p = a.play();
      if(p && p.catch) p.catch(function(){});
    }catch(e){ if(tok===_ttsTok && st===0){ st=2; _ttsFallback(textValue); } }
  }

  function applyStaticText(){
    var t = UI[currentLang] || UI.uz;
    var label = levelLabels.all;
    document.documentElement.lang = currentLang;
    document.title = t.title;
    heroTitle.textContent = t.title;
    heroEyebrow.textContent = '汉字 · ' + label;
    searchEl.placeholder = t.placeholder;
    grammarLabel.textContent = t.grammar;
    langSwitch.innerHTML = validLangs.map(function(value){
      return '<button class="lang-btn '+(value === currentLang ? 'active' : '')+'" data-lang="'+value+'">'+value.toUpperCase()+'</button>';
    }).join('');
    var pl = practiceLabels[currentLang] || practiceLabels.uz;
    document.getElementById('practice-head').textContent = pl.head;
    document.getElementById('pr-pron-t').textContent = pl.pronT;
    document.getElementById('pr-pron-s').textContent = pl.pronS;
    document.getElementById('pr-recog-t').textContent = pl.recogT;
    document.getElementById('pr-recog-s').textContent = pl.recogS;
    document.getElementById('pr-mem-t').textContent = pl.memT;
    document.getElementById('pr-mem-s').textContent = pl.memS;
  }

  function goPractice(page){
    if(!currentWord) return;
    var url = '/' + page + '.html?lang=' + currentLang + '&char=' + encodeURIComponent(currentWord.h) + '&from=lugat';
    if(isLight) url += '&theme=light';
    if(currentLevel !== 'all') url += '&level=' + currentLevel;
    location.href = url;
  }
  document.getElementById('pr-pron').onclick = function(){ goPractice('course_v3_pronunciation'); };
  document.getElementById('pr-recog').onclick = function(){ goPractice('course_v3_recognition'); };
  document.getElementById('pr-mem').onclick = function(){ goPractice('course_v3_memorize'); };

  function goBackToStudy(){
    if(isLight){ location.href = '/course-v3.html?lang=' + currentLang + '&tab=mashq'; return; }
    var url = new URL('/course-v3.html', location.origin);
    if(currentLevel !== 'all') url.searchParams.set('level', currentLevel);
    url.searchParams.set('lang', currentLang);
    url.searchParams.set('tab', 'mashq');
    location.href = url.toString();
  }

  /* ---------- list / search ---------- */

  function renderList(query){
    var t = UI[currentLang] || UI.uz;
    var q = String(query || '').trim();
    var qPinyin = normPinyin(q);
    var qLower = q.toLowerCase();
    var results;
    if(!q){
      results = activeWords;
    } else {
      results = activeWords.filter(function(w){
        return w.h.indexOf(q) !== -1 || w._p.indexOf(qPinyin) !== -1 ||
          w._m.indexOf(qLower) !== -1 || text(w.m).toLowerCase().indexOf(qLower) !== -1;
      });
    }
    countEl.textContent = q ? t.countResults(results.length) : t.countAll(activeWords.length, levelLabels.all);
    if(results.length === 0){
      listEl.innerHTML = '<div class="empty">'+escapeHtml(t.emptyTitle)+'<br>'+escapeHtml(t.emptySub)+'</div>';
      return;
    }
    var html = '';
    for(var i=0;i<results.length;i++){
      var w = results[i];
      html += '<div class="row" data-idx="'+w.id+'"><div class="h">'+escapeHtml(w.h)+'</div>'+
        '<div class="info"><div class="p">'+escapeHtml(w.p)+'</div><div class="m">'+escapeHtml(text(w.m))+'</div></div>'+
        '<div class="lv">'+escapeHtml(w.lv)+'</div></div>';
    }
    listEl.innerHTML = html;
  }

  /* ---------- stroke-order writer (focused, one char at a time) ---------- */

  function setPlayIcon(){
    ctrlPlayPause.textContent = isPlaying ? '⏸' : '▶';
  }

  function gridSvg(){
    return '<svg class="grid-bg" viewBox="0 0 100 100">'+
        '<line x1="50" y1="0" x2="50" y2="100"></line>'+
        '<line x1="0" y1="50" x2="100" y2="50"></line>'+
        '<line x1="0" y1="0" x2="100" y2="100"></line>'+
        '<line x1="100" y1="0" x2="0" y2="100"></line>'+
      '</svg><div class="writer-target"></div>';
  }

  function playCurrent(){
    if(!currentWriter) return;
    currentStrokeShown = 0;
    isPlaying = true; isFinished = false;
    hideNextWordBtn();
    setPlayIcon(); updateStepBtns();
    currentWriter.animateCharacter({
      onComplete: function(){
        isPlaying = false; isFinished = true;
        currentStrokeShown = totalStrokes;
        setPlayIcon(); updateStepBtns();
        showNextWordBtn();
      }
    });
  }

  function loadChar(idx){
    currentCharIdx = idx;
    var ch = currentChars[idx];
    currentWriter = null;
    isPlaying = false; isFinished = false; isReshowing = false;
    currentStrokeShown = 0; totalStrokes = 0;
    hideNextWordBtn();
    setPlayIcon();

    var multi = currentChars.length > 1;
    writerPos.classList.toggle('hidden', !multi);
    charPrevBtn.classList.toggle('hidden', !multi);
    charNextBtn.classList.toggle('hidden', !multi);
    if(multi) writerPos.textContent = (idx + 1) + ' / ' + currentChars.length;
    charPrevBtn.disabled = (idx === 0);
    charNextBtn.disabled = (idx === currentChars.length - 1);

    var data = STROKES[ch];
    if(data){
      totalStrokes = data.strokes.length;
      currentStrokeShown = 0;
      writerStrokes.textContent = (UI[currentLang] || UI.uz).strokes(totalStrokes);
      charBoxLg.innerHTML = gridSvg();
      var target = charBoxLg.querySelector('.writer-target');
      currentWriter = HanziWriter.create(target, ch, {
        width: 236, height: 236, padding: 12,
        showOutline: true,
        showCharacter: false,
        outlineColor: isLight ? 'rgba(33,29,23,.14)' : 'rgba(255,255,255,.16)',
        strokeColor: '#d6453a',
        strokeAnimationSpeed: 1,
        delayBetweenStrokes: 280,
        charDataLoader: function(c, onComplete){
          if(STROKES[c]) onComplete(STROKES[c]);
        }
      });
      updateStepBtns();
    } else {
      writerStrokes.textContent = '';
      charBoxLg.innerHTML = '<div class="plain-char">'+ch+'</div>';
    }
    // Show "next word" right away (it self-hides when there is no next word) so the
    // button does not depend on finishing the stroke animation first.
    showNextWordBtn();
  }

  ctrlPlayPause.addEventListener('click', function(){
    if(!currentWriter) return;
    if(isPlaying){
      currentWriter.pauseAnimation();
      isPlaying = false; setPlayIcon(); updateStepBtns();
    } else {
      playCurrent();
    }
  });

  ctrlRestart.addEventListener('click', function(){ stepBack(); });
  ctrlSkip.addEventListener('click', function(){ stepForward(); });

  charPrevBtn.addEventListener('click', function(){
    if(currentCharIdx > 0) loadChar(currentCharIdx - 1);
  });
  charNextBtn.addEventListener('click', function(){
    if(currentCharIdx < currentChars.length - 1) loadChar(currentCharIdx + 1);
  });

  /* ---------- detail view ---------- */

  function memoText(value){
    if(value && typeof value === 'object') return value[currentLang] || value.uz || value.ru || value.tj || '';
    return value || '';
  }
  var memoLoadPromise = null;
  function loadMemoData(){
    if(window.MEMO_DATA) return Promise.resolve();
    if(memoLoadPromise) return memoLoadPromise;
    memoLoadPromise = new Promise(function(resolve){
      var s = document.createElement('script');
      s.src = 'course_v3_data/memo.js?v=20260628';
      s.onload = function(){ resolve(); };
      s.onerror = function(){ resolve(); };
      document.head.appendChild(s);
    });
    return memoLoadPromise;
  }
  // Structured "fast memorization" sections — optional, only when memo data exists for the char.
  function renderMemo(word){
    var memoBlock = document.getElementById('memo-block');
    var D = (window.MEMO_DATA && word) ? window.MEMO_DATA[word.h] : null;
    if(!window.MEMO_DATA){
      memoBlock.innerHTML = '';
      loadMemoData().then(function(){ if(currentWord === word) renderMemo(word); });
      return;
    }
    if(!D){ memoBlock.innerHTML = ''; return; }
    var L = memoLabels[currentLang] || memoLabels.uz;
    var html = '';
    // 4 — Tarkibi (component breakdown)
    if(Array.isArray(D.breakdown) && D.breakdown.length){
      html += '<div class="memo-sec"><div class="ms-h">'+escapeHtml(L.tarkibi)+'</div><div class="memo-parts">'+
        D.breakdown.map(function(p){
          return '<div class="memo-part"><div class="mp-h">'+escapeHtml(p.part)+'</div><div class="mp-p">'+escapeHtml(p.p||'')+'</div><div class="mp-m">'+escapeHtml(memoText(p.m))+'</div></div>';
        }).join('')+'</div></div>';
    }
    // 5 — Ma'no/tovush belgisi (phonetic-semantic roles + signal)
    var radParts = Array.isArray(D.breakdown) ? D.breakdown.filter(function(p){return p.role==='radical';}) : [];
    var hookParts = Array.isArray(D.breakdown) ? D.breakdown.filter(function(p){return p.role==='hook';}) : [];
    var rows = '';
    if(radParts.length){
      rows += '<div class="memo-role"><span class="mr-k">'+escapeHtml(L.mano)+'</span><span class="mr-v"><b>'+escapeHtml(radParts.map(function(p){return p.part;}).join(''))+'</b> — '+escapeHtml(memoText(radParts[0].m))+'</span></div>';
    } else if(D.radical && D.radical.r){
      rows += '<div class="memo-role"><span class="mr-k">'+escapeHtml(L.mano)+'</span><span class="mr-v"><b>'+escapeHtml(D.radical.r)+'</b> — '+escapeHtml(memoText(D.radical.m))+'</span></div>';
    }
    if(hookParts.length){
      rows += '<div class="memo-role"><span class="mr-k">'+escapeHtml(L.tovush)+'</span><span class="mr-v"><b>'+escapeHtml(hookParts.map(function(p){return p.part;}).join(''))+'</b> — '+escapeHtml(memoText(hookParts[0].m))+'</span></div>';
    }
    if(rows){
      var signal = (D.radical && D.radical.signal) ? '<div class="memo-signal">'+escapeHtml(memoText(D.radical.signal))+'</div>' : '';
      var disc = (D.etymology_honest === false && window.MEMO_UI && window.MEMO_UI.disclaimer) ? '<div class="memo-disc">'+escapeHtml(memoText(window.MEMO_UI.disclaimer))+'</div>' : '';
      html += '<div class="memo-sec"><div class="ms-h">'+escapeHtml(L.belgi)+'</div><div class="memo-roles">'+rows+'</div>'+signal+disc+'</div>';
    }
    // 6 — Eslab qolish (mnemonic hooks)
    if(Array.isArray(D.hooks) && D.hooks.length){
      html += '<div class="memo-sec"><div class="ms-h">'+escapeHtml(L.eslab)+'</div><div class="memo-hooks">'+
        D.hooks.map(function(hk){ return '<div class="memo-hook"><span class="mh-d">•</span><span>'+escapeHtml(memoText(hk.t))+'</span></div>'; }).join('')+'</div></div>';
    }
    // 7 — O'xshash iyerogliflar (confusables)
    if(Array.isArray(D.confusables) && D.confusables.length){
      html += '<div class="memo-sec"><div class="ms-h">'+escapeHtml(L.oxshash)+'</div><div class="memo-conf">'+
        D.confusables.map(function(c){
          return '<div class="memo-conf-row"><div class="mc-h">'+escapeHtml(c.h)+'</div><div class="mc-tx"><div class="mc-p">'+escapeHtml(c.p||'')+' · '+escapeHtml(memoText(c.m))+'</div><div class="mc-d">'+escapeHtml(memoText(c.diff))+'</div></div></div>';
        }).join('')+'</div></div>';
    }
    // 8 — Misol (example words)
    if(Array.isArray(D.words) && D.words.length){
      html += '<div class="memo-sec"><div class="ms-h">'+escapeHtml(L.misol)+'</div><div class="memo-words">'+
        D.words.map(function(w){ return '<div class="memo-word"><span class="mw-w">'+escapeHtml(w.w)+'</span><span class="mw-p">'+escapeHtml(w.p||'')+'</span><span class="mw-m">'+escapeHtml(memoText(w.m))+'</span></div>'; }).join('')+'</div></div>';
    }
    memoBlock.innerHTML = html;
  }

  function renderExample(word){
    var ex = (typeof EXAMPLES !== 'undefined') ? EXAMPLES[word.h] : null;
    if(ex && ex.zh){
      exampleBlock.classList.remove('hidden');
      usagePos.textContent = ex.pos || '';
      usagePos.classList.toggle('hidden', !ex.pos);
      exampleZh.textContent = ex.zh || '';
      exampleUz.textContent = localizedExample(ex);
      exampleAudioBtn.onclick = function(){ speak(ex.zh); };
    } else {
      exampleBlock.classList.add('hidden');
    }
  }

  function renderGrammar(word){
    var g = grammarFor(word);
    var t = UI[currentLang] || UI.uz;
    if(!g){
      grammarBlock.classList.add('hidden');
      return;
    }
    grammarBlock.classList.remove('hidden');
    grammarLabel.textContent = t.grammar;
    grammarTitle.textContent = g.t || '';
    grammarFormula.textContent = text(g.f);
    grammarRule.textContent = text(g.r);
    var ex = g.ex && g.ex[0];
    if(ex && ex.z){
      grammarExample.classList.remove('hidden');
      grammarExampleZh.textContent = ex.z;
      grammarExampleText.textContent = t.grammarExample + ': ' + text(ex.u);
      grammarAudioBtn.onclick = function(){ speak(ex.z); };
    } else {
      grammarExample.classList.add('hidden');
    }
  }

  function refreshDetailText(){
    if(!currentWord) return;
    detailMeaning.textContent = text(currentWord.m);
    renderMemo(currentWord);
    renderExample(currentWord);
    renderGrammar(currentWord);
  }

  function openDetail(word){
    scrollPos = listEl.scrollTop;
    currentWord = word;
    detailLevel.textContent = word.lv;
    detailPinyin.textContent = word.p;
    detailMeaning.textContent = text(word.m);

    currentChars = Array.from(word.h);
    loadChar(0);

    renderMemo(word);
    renderExample(word);
    renderGrammar(word);
    audioBtn.onclick = function(){ speak(word.h); };

    viewList.classList.add('hidden');
    viewDetail.classList.remove('hidden');
    speak(word.h);
  }

  // Deep-link (?char=...) opened from a lesson. The requested value may be a full
  // word ("学生"), a single character, or something not present as an exact dictionary
  // entry. Always open a detail for it instead of silently falling back to the list.
  function openDeepChar(deep){
    deep = (deep || '').trim();
    if(!deep) return;
    var i;
    // 1) exact word match
    for(i=0;i<WORDS.length;i++){ if(WORDS[i].h===deep){ openDetail(WORDS[i]); return; } }
    // 2) a word that contains the requested text (e.g. char inside a known word)
    for(i=0;i<WORDS.length;i++){ if(WORDS[i].h.indexOf(deep)>=0){ openDetail(WORDS[i]); return; } }
    // 3) a word containing the first character of the request
    var fc = Array.from(deep)[0];
    if(fc){ for(i=0;i<WORDS.length;i++){ if(WORDS[i].h.indexOf(fc)>=0){ openDetail(WORDS[i]); return; } } }
    // 4) nothing in the dictionary — still show stroke writing for exactly what was asked
    openDetail({ id:'deep:'+deep, h:deep, p:'', m:'', lv:'' });
  }

  listEl.addEventListener('click', function(e){
    var row = e.target.closest('.row');
    if(!row) return;
    var idx = parseInt(row.dataset.idx, 10);
    openDetail(WORDS[idx]);
  });

  backBtn.addEventListener('click', function(){
    currentWord = null;
    viewDetail.classList.add('hidden');
    viewList.classList.remove('hidden');
    listEl.scrollTop = scrollPos;
  });

  listBackBtn.addEventListener('click', goBackToStudy);
  langSwitch.addEventListener('click', function(e){
    var button = e.target.closest('[data-lang]');
    if(!button) return;
    var next = normalizeLang(button.dataset.lang);
    if(!next || next === currentLang) return;
    currentLang = next;
    localStorage.setItem('hsk_all_current_lang_v3', currentLang);
    params.set('lang', currentLang);
    history.replaceState(null, '', location.pathname + '?' + params.toString());
    applyStaticText();
    renderList(searchEl.value);
    refreshDetailText();
  });
  searchEl.addEventListener('input', function(e){ renderList(e.target.value); });

  function init(){
    applyStaticText();
    renderList('');
    var deepChar = params.get('char');
    if(deepChar){ openDeepChar(deepChar); }
    try{
      var tg = window.Telegram && window.Telegram.WebApp;
      if(tg && tg.ready) tg.ready();
      if(tg && tg.BackButton && tg.BackButton.show) tg.BackButton.show();
      if(tg && tg.BackButton && tg.BackButton.onClick) {
        tg.BackButton.onClick(function(){
          if(!viewDetail.classList.contains('hidden')) {
            currentWord = null;
            viewDetail.classList.add('hidden');
            viewList.classList.remove('hidden');
            listEl.scrollTop = scrollPos;
          } else {
            goBackToStudy();
          }
        });
      }
    }catch(e){}
  }
  init();
})();

</script>
