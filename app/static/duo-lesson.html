<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Duo Lesson — Telegram Mini App</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg:#131f24;
    --panel:#1c2b32;
    --panel-2:#1a282f;
    --border:#37464f;
    --border-light:#4b5b67;
    --text:#ffffff;
    --text-dim:#8fa1ab;
    --blue:#1cb0f6;
    --blue-dark:#1899d6;
    --purple:#ce82ff;
    --purple-bg:#2a2240;
    --green:#58cc02;
    --green-dark:#3c8f00;
    --green-panel:#1e2e15;
    --red:#ff4b4b;
    --red-dark:#c43838;
    --red-panel:#382024;
    --pink:#ff5fa8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%; background:#0d1418;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; color:var(--text);}

  .app{
    max-width:480px; margin:0 auto; background:var(--bg);
    min-height:100vh; min-height:var(--tg-viewport-stable-height,100vh);
    display:flex; flex-direction:column; padding:14px 20px 0; position:relative;
  }

  /* ---------- HEADER ---------- */
  .streak-banner{
    text-align:center; color:var(--green); font-weight:800; font-size:12px;
    letter-spacing:.5px; text-transform:uppercase; height:0; overflow:hidden; opacity:0;
    transition:.2s;
  }
  .streak-banner.show{height:20px; opacity:1; margin-bottom:4px;}
  .topbar{display:flex; align-items:center; gap:14px;}
  .icon-btn{background:none; border:none; padding:4px; display:flex; cursor:pointer;}
  .progress-track{flex:1; height:16px; background:var(--border); border-radius:10px; overflow:hidden;}
  .progress-fill{height:100%; width:0%; border-radius:10px; background:linear-gradient(180deg,#7be33d,var(--green) 60%); transition:width .5s ease;}
  .energy{display:flex; align-items:center; gap:5px; font-weight:800; color:var(--pink); font-size:16px; white-space:nowrap;}
  .energy .bolt{width:26px; height:26px; border-radius:8px; background:#3a223a; display:flex; align-items:center; justify-content:center;}

  .new-word-tag{display:flex; align-items:center; gap:8px; margin:20px 0 12px;}
  .new-word-tag .badge{width:30px; height:30px; border-radius:9px; background:var(--purple-bg); display:flex; align-items:center; justify-content:center;}
  .new-word-tag span{color:var(--purple); font-weight:800; font-size:13px; letter-spacing:.3px; text-transform:uppercase;}

  h1.question{font-size:20px; font-weight:800; margin:6px 0 22px; line-height:1.25;}

  /* ---------- MAIN AREA ---------- */
  .main{flex:1; display:flex; flex-direction:column; min-height:0;}
  .exercise-row{display:flex; align-items:flex-end; gap:14px; margin-bottom:24px;}
  .exercise-row.center{flex-direction:column; align-items:center; gap:16px; margin-bottom:0;}
  .character{flex-shrink:0;}

  .bubble{
    position:relative; flex:1; background:var(--panel); border:2px solid var(--border);
    border-radius:18px; padding:16px 18px; display:flex; align-items:center; gap:10px; cursor:pointer; user-select:none;
  }
  .bubble.full{flex:none; width:100%;}
  .bubble:active{transform:translateY(1px);}
  .bubble.tail-left::after{
    content:""; position:absolute; left:-11px; bottom:14px; width:18px; height:18px;
    background:var(--panel); border-left:2px solid var(--border); border-bottom:2px solid var(--border);
    transform:rotate(45deg); border-radius:0 0 0 4px;
  }
  .speaker{color:var(--blue); flex-shrink:0; transition:transform .15s;}
  .speaker.playing{transform:scale(1.15);}
  .hanzi{font-size:22px; font-weight:700; color:var(--purple); border-bottom:3px dashed var(--purple); padding-bottom:2px; line-height:1.45;}

  .waveform{display:flex; align-items:center; gap:3px; height:24px;}
  .waveform span{width:3px; border-radius:2px; background:var(--blue); display:block;}
  .slow-btn{margin-top:6px; color:var(--blue); font-weight:800; font-size:12px; letter-spacing:.5px; text-transform:uppercase; cursor:pointer; user-select:none;}
  .slow-btn.active{color:var(--text);}

  /* answer box / word bank (translate + listen types) */
  .answer-box{border-top:2px solid var(--border); border-bottom:2px solid var(--border); min-height:60px; padding:12px 2px; margin-bottom:8px; display:flex; flex-wrap:wrap; gap:10px; align-content:flex-start;}
  .spacer{flex:1;}
  .word-bank{display:flex; flex-wrap:wrap; gap:10px; justify-content:center; padding:18px 0;}
  .chip{border:2px solid var(--border); border-bottom-width:4px; background:var(--panel-2); border-radius:13px; padding:10px 16px; font-weight:700; font-size:14px; color:var(--text); cursor:pointer; user-select:none; transition:transform .08s,opacity .15s; animation:pop .15s ease;}
  .chip.hanzi-chip{font-size:17px;}
  .chip:active{transform:translateY(2px); border-bottom-width:2px;}
  .chip.in-answer{border-color:#2d7fa6; background:#16313d; color:#8fd6ff;}
  .chip.in-answer.wrong{border-color:var(--red); background:#3a2228; color:#ff9b9b;}
  .chip.in-answer.right{border-color:var(--green); background:#203a14; color:#b8f08a;}
  .chip.hidden{display:none;}
  @keyframes pop{from{transform:scale(.85); opacity:0;} to{transform:scale(1); opacity:1;}}

  /* speak type */
  .speak-area{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; padding-bottom:10px;}
  .mic-btn{width:84px; height:84px; border-radius:22px; border:none; background:var(--blue); box-shadow:0 4px 0 var(--blue-dark); display:flex; align-items:center; justify-content:center; cursor:pointer;}
  .mic-btn:active{transform:translateY(3px); box-shadow:0 1px 0 var(--blue-dark);}
  .mic-btn.recording{animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 4px 0 var(--blue-dark);} 50%{box-shadow:0 4px 0 var(--blue-dark),0 0 0 10px rgba(28,176,246,.25);}}
  .dots{display:flex; gap:5px;}
  .dots span{width:7px; height:7px; border-radius:50%; background:#fff; animation:blink 1.2s infinite ease-in-out;}
  .dots span:nth-child(2){animation-delay:.15s;} .dots span:nth-child(3){animation-delay:.3s;}
  .dots span:nth-child(4){animation-delay:.45s;} .dots span:nth-child(5){animation-delay:.6s;}
  .dots span:nth-child(6){animation-delay:.75s;} .dots span:nth-child(7){animation-delay:.9s;}
  .dots span:nth-child(8){animation-delay:1.05s;}
  @keyframes blink{0%,100%{opacity:.3; transform:scale(.8);} 50%{opacity:1; transform:scale(1);}}

  /* dialogue type */
  .reply-bubble{position:relative; align-self:flex-end; max-width:88%; min-width:140px; background:transparent; border:2px solid var(--border-light); border-radius:18px; padding:16px 18px; margin-bottom:20px; color:var(--text); font-weight:700; font-size:15px;}
  .reply-bubble .placeholder-line{height:2px; background:var(--border-light); width:100%; border-radius:2px;}
  .reply-bubble::after{content:""; position:absolute; right:-11px; bottom:14px; width:18px; height:18px; border-right:2px solid var(--border-light); border-bottom:2px solid var(--border-light); transform:rotate(-45deg); border-radius:0 0 4px 0;}
  .option-box{width:100%; text-align:center; background:var(--panel-2); border:2px solid var(--border); border-radius:14px; padding:16px 14px; margin-bottom:12px; font-size:17px; font-weight:600; color:var(--text); cursor:pointer;}
  .option-box.selected{border-color:var(--blue); background:#16313d; color:#8fd6ff;}

  .skip-link{text-align:center; color:var(--text-dim); font-weight:800; font-size:12px; letter-spacing:.4px; text-transform:uppercase; padding:8px 0; cursor:pointer;}

  /* ---------- FOOTER ---------- */
  .footer{margin-top:auto; padding:12px 0 calc(14px + env(safe-area-inset-bottom)); position:sticky; bottom:0; background:var(--bg);}
  .btn-check{width:100%; padding:16px; border-radius:16px; border:none; font-weight:800; font-size:15px; letter-spacing:.5px; text-transform:uppercase; color:#5b6a72; background:#2a3940; cursor:not-allowed; transition:.15s;}
  .btn-check.active{color:#0e1f00; background:var(--green); cursor:pointer; box-shadow:0 4px 0 var(--green-dark);}
  .btn-check.active:active{transform:translateY(3px); box-shadow:0 1px 0 var(--green-dark);}

  /* ---------- FEEDBACK PANEL ---------- */
  .feedback{position:fixed; left:0; right:0; bottom:0; width:100%; max-width:480px; margin:0 auto; padding:18px 20px calc(18px + env(safe-area-inset-bottom)); transform:translateY(120%); transition:transform .28s ease; z-index:5;}
  .feedback.show{transform:translateY(0);}
  .feedback.correct{background:var(--green-panel);}
  .feedback.incorrect{background:var(--red-panel);}
  .fb-row{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;}
  .fb-left{display:flex; align-items:center; gap:12px;}
  .fb-icon{width:32px; height:32px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; color:#fff;}
  .correct .fb-icon{background:var(--green);}
  .incorrect .fb-icon{background:var(--red);}
  .fb-title{font-weight:800; font-size:16px;}
  .correct .fb-title{color:var(--green);}
  .incorrect .fb-title{color:var(--red);}
  .fb-icons-right{display:flex; gap:14px; color:inherit; opacity:.7;}
  .fb-text{font-size:13px; margin:0 0 6px 44px;}
  .correct .fb-text{color:var(--text-dim);}
  .incorrect .fb-text{color:#ffb3b3;}
  .fb-text b{color:inherit;}
  .fb-link-btn{width:100%; padding:14px; border-radius:14px; background:transparent; font-weight:800; font-size:13px; letter-spacing:.4px; text-transform:uppercase; cursor:pointer; margin:10px 0; text-align:center;}
  .correct .fb-link-btn{border:2px solid #3c5a2e; color:var(--green);}
  .incorrect .fb-link-btn{border:2px solid #6a3030; color:var(--red);}
  .btn-continue{width:100%; padding:16px; border-radius:16px; border:none; font-weight:800; font-size:15px; letter-spacing:.5px; text-transform:uppercase; cursor:pointer;}
  .correct .btn-continue{background:var(--green); color:#0e1f00; box-shadow:0 4px 0 var(--green-dark);}
  .incorrect .btn-continue{background:var(--red); color:#fff; box-shadow:0 4px 0 var(--red-dark);}
  .btn-continue:active{transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.3);}

  @keyframes shake{10%,90%{transform:translateX(-2px);} 20%,80%{transform:translateX(4px);} 30%,50%,70%{transform:translateX(-8px);} 40%,60%{transform:translateX(8px);}}
  .shake{animation:shake .5s;}

  /* ---------- EXPLANATION OVERLAY ---------- */
  .explanation-overlay{position:fixed; inset:0; width:100%; max-width:480px; margin:0 auto; background:var(--bg); z-index:10; display:flex; flex-direction:column; padding:14px 20px calc(14px + env(safe-area-inset-bottom)); opacity:0; visibility:hidden; pointer-events:none; transition:opacity .2s ease, transform .2s ease; transform:translateY(8px);}
  .explanation-overlay.show{opacity:1; visibility:visible; pointer-events:auto; transform:translateY(0);}
  .exp-header{display:flex; align-items:center; gap:18px; margin-bottom:24px;}
  .exp-header h2{font-size:17px; font-weight:800; margin:0;}
  .exp-chips{display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap;}
  .exp-chip{padding:10px 16px; border-radius:13px; border:2px solid var(--border); font-size:18px; font-weight:700;}
  .exp-chip.hl{border-color:var(--blue); color:var(--blue); background:#142a33;}
  .exp-card{flex:1; background:var(--panel); border:2px solid var(--border); border-radius:16px; padding:20px; font-size:15px; line-height:1.7; color:var(--text-dim); overflow-y:auto;}
  .exp-card p{margin:0 0 16px;}
  .exp-card b{color:var(--blue); font-weight:700;}
  .exp-card ul{margin:0; padding-left:0; list-style:none;}
  .exp-card li{color:var(--blue); font-weight:700; font-size:16px; margin-bottom:8px;}
  .exp-rate{display:flex; justify-content:flex-end; gap:16px; margin-top:14px; color:var(--text-dim);}
  .btn-exp-continue{margin-top:16px; width:100%; padding:16px; border-radius:16px; border:none; background:var(--blue); color:#fff; font-weight:800; font-size:13px; letter-spacing:.5px; text-transform:uppercase; cursor:pointer; box-shadow:0 4px 0 var(--blue-dark);}
  .btn-exp-continue:active{transform:translateY(3px); box-shadow:0 1px 0 var(--blue-dark);}

  /* ---------- COMPLETE SCREEN ---------- */
  .complete{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:10px; padding-bottom:40px;}
  .complete .ring{width:90px; height:90px; border-radius:50%; background:var(--green); display:flex; align-items:center; justify-content:center; margin-bottom:10px;}
  .complete h2{font-size:21px; font-weight:800; margin:0;}
  .complete p{color:var(--text-dim); margin:0 0 18px; font-size:14px;}
  .stat-row{display:flex; gap:14px; margin-bottom:24px;}
  .stat{background:var(--panel); border:2px solid var(--border); border-radius:14px; padding:14px 22px; text-align:center;}
  .stat .num{font-size:20px; font-weight:800; color:var(--green);}
  .stat .lbl{font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.4px;}
  .btn-restart{width:100%; padding:16px; border-radius:16px; border:none; background:var(--green); color:#0e1f00; font-weight:800; font-size:15px; letter-spacing:.5px; text-transform:uppercase; cursor:pointer; box-shadow:0 4px 0 var(--green-dark);}
</style>
</head>
<body>

<div class="app" id="app">
  <div class="streak-banner" id="streakBanner"></div>
  <div class="topbar">
    <button class="icon-btn" data-action="noop" aria-label="Settings">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#5b6a72" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 13a7.97 7.97 0 000-2l2-1.5-2-3.46-2.36.7a8 8 0 00-1.73-1L15 3h-4l-.31 2.74a8 8 0 00-1.73 1l-2.36-.7-2 3.46L6.6 11a7.97 7.97 0 000 2l-2 1.5 2 3.46 2.36-.7a8 8 0 001.73 1L11 21h4l.31-2.74a8 8 0 001.73-1l2.36.7 2-3.46-2-1.5z"/>
      </svg>
    </button>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="energy">
      <span class="bolt"><svg width="15" height="15" viewBox="0 0 24 24" fill="var(--pink)"><path d="M13 2L3 14h7l-1 8 11-12h-7l1-8z"/></svg></span>
      <span id="energyVal">21</span>
    </div>
  </div>

  <div id="mainContent"></div>
  <div class="footer" id="footerArea"></div>
</div>

<div class="feedback" id="feedback">
  <div class="fb-row">
    <div class="fb-left">
      <div class="fb-icon" id="fbIcon"></div>
      <div class="fb-title" id="fbTitle"></div>
    </div>
  </div>
  <div class="fb-text" id="fbText" style="display:none;"></div>
  <button class="fb-link-btn" id="fbExplainBtn" style="display:none;" data-action="open-explanation"></button>
  <button class="btn-continue" id="fbContinueBtn" data-action="continue"></button>
</div>

<div class="explanation-overlay" id="explanationOverlay">
  <div class="exp-header">
    <span data-action="close-explanation" style="cursor:pointer;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </span>
    <h2 id="expTitle">Объяснение</h2>
  </div>
  <div class="exp-chips" id="expChips"></div>
  <div class="exp-card" id="expBody"></div>
  <button class="btn-exp-continue" data-action="continue-from-explanation">Продолжить урок</button>
</div>

<script>
  const tg = window.Telegram && window.Telegram.WebApp;
  if (tg) { tg.ready(); tg.expand(); }
  function haptic(t){ try{ tg && tg.HapticFeedback && tg.HapticFeedback.impactOccurred(t); }catch(e){} }
  function notify(t){ try{ tg && tg.HapticFeedback && tg.HapticFeedback.notificationOccurred(t); }catch(e){} }
  function speak(text, rate){
    try{
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'zh-CN'; u.rate = rate || 1;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(u);
    }catch(e){ /* TTS not available — fail silently */ }
  }

  // ---------------- LESSON DATA ----------------
  let LESSON = [
    { type:'wordbank', newWord:true, instruction:'Переведите предложение', character:'capguy',
      textZh:'行李', audio:'行李', bank:['багаж','мой','Ой'], correct:['багаж'], correctTitle:'Отлично!' },

    { type:'wordbank', instruction:'Переведите предложение', character:'capguy',
      textZh:'洗手间不在这里。', audio:'洗手间不在这里。',
      bank:['здесь','не','поезд','Туалет','яй'], correct:['Туалет','не','здесь'], correctTitle:'Отлично!' },

    { type:'wordbank', instruction:'Переведите предложение', character:'capguy',
      textZh:'他的行李在哪里？', audio:'他的行李在哪里？',
      bank:['продавать','сегодня вечером','багаж','Где','его'], correct:['Где','его','багаж'], correctTitle:'Отлично!',
      explanation:{
        chips:['他的行李','在哪里？'],
        body:['<b>他的</b> означает «его» и показывает принадлежность.',
              '<b>行李</b> означает «багаж» или «дорожные сумки». Вместе <b>他的行李</b> значит «его багаж».'],
        examples:['他的书','他的包']
      } },

    { type:'speak', instruction:'Повторите за Оскаром', character:'oscar',
      audio:'哎呀，我的手机在哪里？', meaning:'Ой, где мой телефон?', correctTitle:'Отлично!' },

    { type:'speak', instruction:'Повторите за Би', character:'bi',
      audio:'哎呀，这不是洗手间！', meaning:'Ай-яй, это не туалет!', correctTitle:'Замечательно!' },

    { type:'wordbank', mode:'listen', instruction:'Что вы услышали?', character:'oscar',
      audio:'他的车票', bank:['日本','的','他','车票','吃'], correct:['他','的','车票'],
      meaning:'его билет', correctTitle:'Здорово!',
      explanation:{
        chips:['他的车票'],
        body:['<b>他</b> означает «он», а <b>他的</b> — «его», показывая принадлежность.',
              '<b>车票</b> означает «билет» — обычно на поезд или автобус.'],
        examples:['我的车票','她的车票']
      } },

    { type:'dialogue', instruction:'Завершите диалог', character:'oscar',
      audio:'哎呀，我的车票在哪里？', options:['这不是我的绿茶。','你的车票在这里！'],
      correctIndex:1, meaning:'Твой билет здесь!', correctTitle:'Отлично!' }
  ];

  const AVATARS = {
    capguy:`<svg width="104" height="130" viewBox="0 0 120 150"><ellipse cx="60" cy="143" rx="48" ry="6" fill="#000" opacity=".25"/>
      <path d="M20 64 Q20 42 46 37 L74 37 Q100 42 100 64 L95 122 Q95 134 80 134 L40 134 Q25 134 25 122 Z" fill="#f0a93b"/>
      <path d="M48 40 L72 40 L66 70 L54 70 Z" fill="#f5f0e6"/>
      <circle cx="60" cy="32" r="23" fill="#e3b58a"/>
      <ellipse cx="37" cy="33" rx="4" ry="6" fill="#e3b58a"/>
      <path d="M34 20 Q34 4 60 4 Q86 4 86 20 L84 30 Q84 14 60 14 Q36 14 36 30 Z" fill="#7d8a92"/>
      <circle cx="60" cy="7" r="6" fill="#7d8a92"/>
      <path d="M46 26 q5 -4 10 0" stroke="#3a3a3a" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M64 26 q5 -4 10 0" stroke="#3a3a3a" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M44 30 q6 6 12 0" stroke="#3a3a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M62 30 q6 6 12 0" stroke="#3a3a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <circle cx="49" cy="34" r="1.6" fill="#3a3a3a"/><circle cx="69" cy="34" r="1.6" fill="#3a3a3a"/>
      <path d="M50 42 q10 5 18 0" stroke="#8a5a2b" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M24 75 Q14 92 26 104" stroke="#f0a93b" stroke-width="15" fill="none" stroke-linecap="round"/>
      <circle cx="22" cy="100" r="5" fill="#fff" opacity=".9"/><circle cx="30" cy="108" r="4" fill="#fff" opacity=".9"/><circle cx="20" cy="110" r="3" fill="#fff" opacity=".8"/></svg>`,

    oscar:`<svg width="100" height="125" viewBox="0 0 120 150"><ellipse cx="60" cy="143" rx="46" ry="6" fill="#000" opacity=".25"/>
      <path d="M30 78 Q30 58 60 58 Q90 58 90 78 L86 128 Q86 138 74 138 L46 138 Q34 138 34 128 Z" fill="#3aa0e0"/>
      <path d="M26 70 Q26 50 60 48 Q94 50 94 70 L90 96 Q90 104 80 102 L72 70 L48 70 L40 102 Q30 104 30 96 Z" fill="#f6a7c4"/>
      <circle cx="60" cy="40" r="25" fill="#a9784f"/>
      <ellipse cx="35" cy="41" rx="4" ry="6" fill="#a9784f"/>
      <path d="M34 28 Q36 8 60 8 Q86 8 86 30 Q78 16 60 18 Q40 18 34 28 Z" fill="#241c14"/>
      <path d="M40 32 q10 -8 20 -1" stroke="#241c14" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M62 31 q10 -7 20 0" stroke="#241c14" stroke-width="2.5" fill="none" stroke-linecap="round"/>

        correctTitle:labels().great,

        _kind:'stroke'

    if (type === 'match_pairs') {

        bank,
        correct: answer,
        correctTitle:labels().great,
        explanation,
        _kind:'order'

    const options = (raw.opts || raw.options || []).map(compact).filter(Boolean);

  async function loadServerLesson(){

    const response = await fetch(url, { headers:{ 'X-Telegram-Init-Data': tg?.initData || '' } });
    const data = await response.json().catch(() => ({}));
    if (!response.ok || data.ok === false || !data.lesson) throw new Error(data.error || 'lesson_load_failed');
    LESSON_META = data.lesson;
    RAW_TASKS = APP.mode === 'homework'
      ? (Array.isArray(data.lesson.reinforcement_tasks) ? data.lesson.reinforcement_tasks : [])
      : (Array.isArray(data.lesson.quiz_questions) ? data.lesson.quiz_questions : []);
    LESSON = RAW_TASKS.map((task, index) => taskFromRaw(task, index, APP.mode)).filter(Boolean);

  function currentResultPayload(){

      lang: APP.lang,
      mode: APP.mode,
      block_no: APP.blockNo

        method:'POST',
        headers:{

      return true;

      notify('success');
    } else {
      fbIcon.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
      fbTitle.textContent = labels().wrong;
      const correctText = s.type==='dialogue' ? s.options[s.correctIndex] : (s.type==='speak' ? s.audio : s.correct.join(' '));
      fbText.innerHTML = correctText; fbText.style.display='block';
      if (s.explanation) { fbExplainBtn.style.display='block'; fbExplainBtn.textContent=labels().explainMistake; } else fbExplainBtn.style.display='none';
      fbContinueBtn.textContent = labels().next;
      notify('error');
      document.getElementById('app').classList.add('shake');
      setTimeout(()=>document.getElementById('app').classList.remove('shake'), 500);
    }
    feedback.classList.add('show');
  }

  function continueLesson(){
    haptic('light');
    feedback.classList.remove('show');
    step++; selected=[]; optionIndex=null; answered=false; slow=false;
    renderHeader(); renderMain();
  }

  // Real speech recognition (Chrome/Android Chromium WebView only — needs HTTPS or localhost).
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;

  function normalizeZh(t){
    return (t||'').replace(/[，。！？、；：""''「」（）\s,.!?;:()'"]/g,'');
  }
  function levenshtein(a,b){
    const m=a.length, n=b.length;
    const dp = [];
    for (let i=0;i<=m;i++){ dp.push(new Array(n+1).fill(0)); dp[i][0]=i; }
    for (let j=0;j<=n;j++) dp[0][j]=j;
    for (let i=1;i<=m;i++){
      for (let j=1;j<=n;j++){
        dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
      }
    }
    return dp[m][n];
  }
  function similarity(a,b){
    if (!a.length && !b.length) return 1;
    return 1 - levenshtein(a,b) / Math.max(a.length, b.length, 1);
  }

  function micTap(){
    if (recording || answered) return;
    const micBtn = document.getElementById('micBtn');

    if (!SpeechRec) {
      if (!document.getElementById('micUnsupportedMsg')) {
        micBtn.insertAdjacentHTML('beforebegin', '<div id="micUnsupportedMsg" class="skip-link" style="color:var(--red);">Голосовой ввод не поддерживается этим браузером — нажмите «я сейчас не могу говорить»</div>');
      }
      return;
    }

    recording = true;
    micBtn.classList.add('recording');
    micBtn.innerHTML = '<div class="dots">'+'<span></span>'.repeat(8)+'</div>';

    const rec = new SpeechRec();
    rec.lang = 'zh-CN';
    rec.maxAlternatives = 1;
    rec.interimResults = false;
    let handled = false;

    rec.onresult = (e) => {
      handled = true;
      const transcript = e.results[0][0].transcript;
      resolveSpeak(transcript);
    };
    rec.onerror = (e) => {
      handled = true;
      recording = false;
      const msg = e.error === 'not-allowed' ? 'Доступ к микрофону запрещён' :
                  e.error === 'no-speech' ? 'Речь не распознана, попробуйте ещё раз' :
                  'Ошибка распознавания, попробуйте ещё раз';
      renderMain();
      const skipEl = document.querySelector('.skip-link');
      if (skipEl && !document.getElementById('micErrorMsg')) {
        skipEl.insertAdjacentHTML('beforebegin', `<div id="micErrorMsg" class="skip-link" style="color:var(--red);">${msg}</div>`);
      }
    };
    rec.onend = () => {
      if (!handled) { recording = false; renderMain(); }
    };

    try { rec.start(); } catch(e){ recording = false; renderMain(); }
  }

  function resolveSpeak(transcript){
    const s = cur();
    const a = normalizeZh(transcript), b = normalizeZh(s.audio);
    const sim = similarity(a, b);
    isCorrect = sim >= 0.7;
    answered = true; recording = false;
    if (isCorrect) { streak++; energy = Math.max(0, energy-1); xp += 10; }
    else { streak = 0; energy = Math.max(0, energy-2); }
    selected = [transcript];
    recordCurrentResult();
    renderHeader();
    showFeedback();
  }

  function skip(){
    haptic('light');
    if (rawCur()) {
      isCorrect = false;
      answered = true;
      recordCurrentResult();
    }
    step++; selected=[]; optionIndex=null; answered=false; slow=false;
    renderHeader(); renderMain();
  }

  function toggleSlow(){ slow = !slow; speak(cur().audio, 0.55); renderMain_keepSlow(); }
  function renderMain_keepSlow(){ const btn = document.querySelector('.slow-btn'); if(btn) btn.classList.toggle('active', slow); }

  function playAudio(){
    const icon = document.getElementById('speakerIcon');
    if (icon){ icon.classList.add('playing'); setTimeout(()=>icon.classList.remove('playing'),200); }
    speak(cur().audio, slow?0.55:1);
  }

  // ---------------- EXPLANATION OVERLAY ----------------
  function openExplanation(){
    const s = cur(); if (!s.explanation) return;
    document.getElementById('expTitle').textContent = isCorrect ? labels().explainAnswer : labels().explainMistake;
    document.getElementById('expChips').innerHTML = s.explanation.chips.map((c,i)=>`<span class="exp-chip${i===0?' hl':''}">${c}</span>`).join('');
    document.getElementById('expBody').innerHTML = s.explanation.body.map(p=>`<p>${p}</p>`).join('') +
      `<ul>${s.explanation.examples.map(e=>`<li>${e}</li>`).join('')}</ul>` +
      `<div class="exp-rate"><span data-action="noop">👎</span><span data-action="noop">👍</span></div>`;
    explanationOpen = true;
    document.getElementById('explanationOverlay').classList.add('show');
  }
  function closeExplanation(){ explanationOpen = false; document.getElementById('explanationOverlay').classList.remove('show'); }
  function continueFromExplanation(){ closeExplanation(); continueLesson(); }

  // ---------------- COMPLETE SCREEN ----------------
  function renderComplete(){
    progressFill.style.width = '100%';
    submitLessonResult();
    mainEl.innerHTML = `<div class="complete">
        <div class="ring"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#0e1f00" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
        <h2>${labels().complete}</h2>
        <p>${labels().completeText}</p>
        <div class="stat-row">
          <div class="stat"><div class="num">${xp}</div><div class="lbl">XP</div></div>
          <div class="stat"><div class="num">${energy}</div><div class="lbl">Энергия</div></div>
        </div>
        <button class="btn-restart" data-action="${loadedFromApi ? 'close-to-bot' : 'restart'}">${loadedFromApi ? labels().returnBot : labels().next}</button>
      </div>`;
    footerEl.innerHTML = '';
  }

  function restart(){
    step=0; selected=[]; optionIndex=null; answered=false; isCorrect=false;
    streak=0; energy=21; xp=0; recording=false; slow=false;
    renderHeader(); renderMain();
  }
  async function closeToBot(){
    await reportEvent('bot_return_clicked', { lesson_id: APP.lessonId, block_no: APP.blockNo });
    try { tg && tg.close && tg.close(); } catch(e) {}
  }

  // ---------------- EVENT DELEGATION ----------------
  document.body.addEventListener('click', (e) => {
    const el = e.target.closest('[data-action]');
    if (!el) return;
    const action = el.dataset.action, arg = el.dataset.arg;
    switch(action){
      case 'select-word': selectWord(arg); break;
      case 'remove-word': removeWord(arg); break;
      case 'select-option': selectOption(Number(arg)); break;
      case 'check': check(); break;
      case 'continue': continueLesson(); break;
      case 'mic-tap': micTap(); break;
      case 'skip': skip(); break;
      case 'toggle-slow': toggleSlow(); break;
      case 'play-audio': playAudio(); break;
      case 'open-explanation': openExplanation(); break;
      case 'close-explanation': closeExplanation(); break;
      case 'continue-from-explanation': continueFromExplanation(); break;
      case 'restart': restart(); break;
      case 'close-to-bot': closeToBot(); break;
      case 'noop': default: break;
    }
  });

  async function init(){
    mainEl.innerHTML = `<div class="complete"><h2>${labels().loading}</h2></div>`;
    footerEl.innerHTML = '';
    try {
      await loadServerLesson();
    } catch(e) {
      if (tg?.initData) {
        mainEl.innerHTML = `<div class="complete"><h2>${labels().loadError}</h2></div>`;
        return;
      }
    }
    renderHeader();
    renderMain();
  }

  init();
</script>
</body>
</html>
