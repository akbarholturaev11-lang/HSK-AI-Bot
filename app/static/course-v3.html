<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>HSK AI</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --ink:#211D17;--ink2:#6E665B;--ink3:#A89E8E;--paper:#FBF7EF;--card:#FFFFFF;--line:#EAE2D4;
  --cin:#C2403A;--cin2:#9A2F2B;--cinbg:#FBEDEA;--gold:#C2962F;--goldbg:#F8F0DA;--jade:#2F7D5E;--jadebg:#E7F1EA;
  --safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:-apple-system,"SF Pro Text","Segoe UI",Roboto,sans-serif}
.han{font-family:"Songti SC","STSong","Noto Serif SC",serif;font-weight:600;letter-spacing:1px}
.wrap{max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-top:var(--safe-t)}
.scr{display:none;padding-bottom:calc(82px + var(--safe-b))}
.scr.on{display:block}
button{cursor:pointer}
/* top */
.htop{display:flex;align-items:center;gap:8px;padding:14px 16px 10px;position:sticky;top:var(--safe-t);background:var(--paper);z-index:4}
.lvpill{display:flex;align-items:center;gap:6px;background:var(--cin);color:#fff;font-size:13px;font-weight:500;padding:7px 13px;border-radius:20px;border:none;font-family:inherit}
.chip{display:flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:6px 12px;font-size:13px;font-weight:500}
.langsw{margin-left:auto;display:flex;background:var(--card);border:1px solid var(--line);border-radius:20px;overflow:hidden}
.langsw button{background:none;border:none;font:inherit;font-size:12px;padding:6px 9px;color:var(--ink2)}
.langsw button.on{background:var(--cin);color:#fff;font-weight:500}
.pwrap{display:flex;align-items:center;gap:10px;padding:0 16px 6px}
.pbar{flex:1;height:8px;background:var(--line);border-radius:6px;overflow:hidden}
.pbar>i{display:block;height:100%;background:var(--cin);border-radius:6px;transition:width .4s}
.pwrap small{font-size:12px;color:var(--ink2);font-weight:500}
/* unit + path */
.uban{display:flex;align-items:center;gap:10px;margin:8px 16px 0;background:var(--ink);color:#fff;border-radius:14px;padding:11px 14px}
.uban.lock{background:var(--card);border:1px solid var(--line);color:var(--ink2)}
.uban .un{font-size:11px;letter-spacing:1.5px;opacity:.7;text-transform:uppercase}
.uban .utt{font-size:14px;font-weight:500}.uban .ic{margin-left:auto;font-size:18px;opacity:.85}
.path{position:relative;padding:8px 0 2px}
.prow{position:relative;height:84px;display:flex;justify-content:center}
.nodewrap{position:absolute;display:flex;flex-direction:column;align-items:center;gap:4px}
.node{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:23px;border:none;position:relative;font-family:inherit;color:#fff}
.node .ring{position:absolute;inset:-6px;border-radius:50%;border:3px solid transparent}
.node.done{background:var(--jade);box-shadow:0 4px 0 #245f47}
.node.current{background:var(--cin);box-shadow:0 4px 0 var(--cin2)}
.node.current .ring{border-color:var(--cin);animation:pl 1.6s ease-out infinite}
@keyframes pl{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.25);opacity:0}}
.node.locked{background:var(--line);color:var(--ink3);box-shadow:0 4px 0 #d8d2c4}
.node.chest{background:var(--goldbg);color:var(--gold);box-shadow:0 4px 0 #d8c79a;border:2px solid var(--gold)}
.node.boss{background:var(--cinbg);color:var(--cin);box-shadow:0 4px 0 #e8cfc9;border:2px solid var(--cin)}
.nlabel{font-size:12px;font-weight:500;color:var(--ink2)}.nlabel.mut{color:var(--ink3)}
.nnum{display:block;font-size:10px;font-weight:600;color:var(--ink3);letter-spacing:.02em;margin-top:1px}
.bubble{position:absolute;top:-42px;left:50%;transform:translateX(-50%);background:#fff;border:1px solid var(--cin);color:var(--cin2);font-size:12px;font-weight:600;padding:7px 14px;border-radius:20px;white-space:nowrap}
.bubble:after{content:"";position:absolute;bottom:-6px;left:50%;transform:translateX(-50%) rotate(45deg);width:10px;height:10px;background:#fff;border-right:1px solid var(--cin);border-bottom:1px solid var(--cin)}
.pmasc{position:absolute;top:50%;width:50px;height:50px;margin-top:-25px;pointer-events:none;animation:pmascBob 3.4s ease-in-out infinite;z-index:1;opacity:.9}
.pmasc svg{width:100%;height:100%;display:block;opacity:.8;animation:pmascNod 4.6s ease-in-out infinite;transform-origin:50% 90%}
.pmasc:after{content:"";position:absolute;left:50%;bottom:-7px;width:34px;height:8px;margin-left:-17px;background:radial-gradient(closest-side,rgba(33,29,23,.16),rgba(33,29,23,0));border-radius:50%;animation:pmascShadow 3.4s ease-in-out infinite}
@keyframes pmascBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pmascNod{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
@keyframes pmascShadow{0%,100%{transform:scaleX(1);opacity:.16}50%{transform:scaleX(.78);opacity:.09}}
.pmasc-bub{position:absolute;top:-28px;background:#fff;border:1px solid var(--line);color:var(--ink);font-size:11px;font-weight:500;line-height:1;padding:6px 11px;border-radius:14px;white-space:nowrap;box-shadow:0 3px 8px rgba(33,29,23,.12)}
.pmasc.l .pmasc-bub{left:0}.pmasc.r .pmasc-bub{right:0}
.pmasc-bub:after{content:"";position:absolute;bottom:-5px;width:8px;height:8px;background:#fff;border-right:1px solid var(--line);border-bottom:1px solid var(--line);transform:rotate(45deg)}
.pmasc.l .pmasc-bub:after{left:20px}.pmasc.r .pmasc-bub:after{right:20px}
.pd-breathe{animation:pdBreathe 2.6s ease-in-out infinite;transform-origin:50% 100%}
.pd-bounce{animation:pdBounce .7s ease-in-out infinite;transform-origin:50% 100%}
@keyframes pdBreathe{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.02) translateY(-1px)}}
@keyframes pdBounce{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-6px) scale(1.03)}}
.pd-blink{animation:pdBlink 4.2s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
@keyframes pdBlink{0%,90%,100%{transform:scaleY(0)}94%{transform:scaleY(1)}}
.pd-twinkle{animation:pdTwinkle 1.1s ease-in-out infinite}
@keyframes pdTwinkle{0%,100%{opacity:.25;transform:scale(.7)}50%{opacity:1;transform:scale(1.1)}}
.pd-mouth.pd-talk{animation:pdTalk .42s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
@keyframes pdTalk{0%,100%{transform:scaleY(.35)}50%{transform:scaleY(1)}}
/* nav */
.nav{position:fixed;left:0;right:0;bottom:0;height:calc(70px + var(--safe-b));padding-bottom:var(--safe-b);background:var(--card);border-top:1px solid var(--line);display:flex;align-items:flex-start;padding-top:8px;max-width:480px;margin:0 auto;z-index:8}
.nav button{flex:1;background:none;border:none;font-family:inherit;color:var(--ink3);font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav button.on{color:var(--cin)}
.nav button i{font-size:21px}
.nav .center{position:relative;top:-20px}
.nav .center .fab{width:58px;height:58px;border-radius:50%;background:var(--cin);border:4px solid var(--card);color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px}
.nav .center .lbl{margin-top:4px;color:var(--cin);font-weight:500}
/* sheet */
.sheet{position:fixed;inset:0;background:rgba(20,17,13,.5);display:none;align-items:flex-end;z-index:50;max-width:480px;margin:0 auto}
.sheet.on{display:flex}
.si{background:var(--paper);border-radius:24px 24px 0 0;padding:8px 18px calc(22px + var(--safe-b));width:100%;position:relative;max-height:88vh;overflow-y:auto}
.grip{width:40px;height:4px;border-radius:3px;background:var(--line);margin:8px auto 14px}
.sx{position:absolute;right:14px;top:14px;background:none;border:none;color:var(--ink2);font-size:22px}
.shead{text-align:center;margin-bottom:14px}
.shead .zh{font-size:34px;line-height:1}
.shead .py{font-size:15px;color:var(--cin2);font-weight:500;margin-top:5px}
.shead .tr{font-size:13px;color:var(--ink2);margin-top:2px}
.shead .stars{color:var(--gold);font-size:15px;margin-top:6px;letter-spacing:2px}
.pmeta{font-size:12px;color:var(--ink2);font-weight:500;margin:0 2px 8px;display:flex;justify-content:space-between}
.secs{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.sec{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-size:14px}
.sec .si2{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sec.done .si2{background:var(--jadebg);color:var(--jade)}
.sec.cur{border-color:var(--cin);background:var(--cinbg)}.sec.cur .si2{background:var(--cin);color:#fff}
.sec.lock{color:var(--ink3)}.sec.lock .si2{background:var(--paper);color:var(--ink3)}
.sec b{flex:1;font-weight:400}.sec.cur b{font-weight:500;color:var(--cin2)}
.scta{width:100%;background:var(--cin);color:#fff;border:none;border-radius:14px;padding:15px;font-family:inherit;font-size:16px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:8px}
.scta.ghost{background:var(--card);border:1px solid var(--line);color:var(--ink)}
/* lesson overlay flow */
.flow{position:fixed;inset:0;background:var(--paper);z-index:30;display:none;flex-direction:column;max-width:480px;margin:0 auto}
.flow.on{display:flex}
.adov{position:fixed;inset:0;z-index:82;background:#15120f;display:none;max-width:480px;margin:0 auto;color:#fff}
.adov.on{display:flex;flex-direction:column}
.adbox{min-height:100%;display:grid;grid-template-rows:auto minmax(0,1fr) auto;padding:calc(14px + var(--safe-t)) 14px calc(16px + var(--safe-b));gap:12px}
.adtop{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:12px;color:rgba(255,255,255,.78);font-weight:600}
.adcount{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:7px 10px;white-space:nowrap}
.advideo-wrap{position:relative;min-height:0;height:100%;display:block}
.advideo{width:100%;height:100%;min-height:320px;max-height:none;object-fit:contain;background:#000;border-radius:16px;border:1px solid rgba(255,255,255,.12)}
.advisit{position:absolute;left:10px;bottom:10px;display:inline-flex;align-items:center;gap:6px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.24);color:#fff;border-radius:20px;padding:7px 12px;font-size:12px;font-weight:600;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
.adstatus{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px;border-radius:16px;background:rgba(0,0,0,.58);color:#fff;font-size:14px;font-weight:600;line-height:1.35}
.adstatus[hidden]{display:none!important}
.admeta{display:grid;gap:8px}
.admeta b{font-size:15px;font-weight:600}.admeta small{font-size:12px;color:rgba(255,255,255,.68);line-height:1.4}
.adcta{width:100%;border:none;border-radius:14px;padding:15px;font-family:inherit;font-size:15px;font-weight:600;background:#fff;color:#211D17;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .12s ease,box-shadow .2s ease,background .2s ease}
.adcta:disabled{background:rgba(255,255,255,.14);color:rgba(255,255,255,.62)}
.adcta:active:not(:disabled){transform:translateY(1px)}
.adsub{display:grid;gap:11px;background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.035));border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:18px 16px;box-shadow:0 12px 34px rgba(0,0,0,.38),inset 0 1px 0 rgba(255,255,255,.08)}
.adsub[hidden]{display:none!important}
.adsub-t{margin:2px 0 4px;font-size:15px;line-height:1.42;color:#fff;text-align:center;font-weight:700;letter-spacing:-.01em}
.adsub-benefits{display:grid;gap:10px;margin:0 0 4px;padding:13px 13px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);border-radius:15px}
.adben{display:flex;align-items:center;gap:11px;font-size:14px;line-height:1.35;color:rgba(255,255,255,.95);text-align:left}
.adben i{color:#7BE0B3;font-size:20px;flex-shrink:0}
.adsub-pay{background:linear-gradient(180deg,#ffffff,#f1eee9);color:#211D17;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.28),0 0 0 1px rgba(255,255,255,.5) inset}
.adcta.ghost{background:rgba(255,255,255,.08);color:rgba(255,255,255,.9);border:1px solid rgba(255,255,255,.16);font-weight:600}
/* reklamalar tugagach: toza promo ekran (reklama blok qoldiqlarisiz) */
#adov.done .adtop{display:none}
#adov.done .adbox{grid-template-rows:minmax(0,1fr) auto}
#adov.done #ad-video-wrap{display:none!important}
#adov.done .admeta>b,#adov.done .admeta>small,#adov.done #ad-cta{display:none}
#adov.done .adsub-benefits{display:none}
#adov.done .adsub{gap:8px;padding:14px}
#adov.done .adsub-t{font-size:14px;margin:0 0 2px}
#adov.done .adsub-pay,#adov.done .adcta.ghost{padding:12px;font-size:14px;border-radius:12px}
.adpromo{position:relative;height:100%;min-height:0;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px 20px;background:radial-gradient(120% 90% at 50% 0,rgba(194,64,58,.22),transparent 62%),rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.10);border-radius:18px;overflow:hidden}
#adov.done .adpromo{display:flex}
.adpromo-slide{display:flex;flex-direction:column;align-items:center;animation:promoIn .5s ease}
@keyframes promoIn{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:none}}
.adpromo-ic{width:78px;height:78px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:35px;color:#fff;background:linear-gradient(160deg,#D6493C,#9A2F2B);box-shadow:0 14px 34px rgba(194,64,58,.42);margin-bottom:20px}
.adpromo-t{font-size:20px;font-weight:800;letter-spacing:-.02em;color:#fff;margin:0 0 9px;max-width:300px;line-height:1.25}
.adpromo-s{font-size:14px;line-height:1.5;color:rgba(255,255,255,.74);max-width:290px;margin:0}
.adpromo-dots{position:absolute;left:0;right:0;bottom:14px;display:flex;justify-content:center;gap:6px}
.adpromo-dots i{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.22);transition:width .3s,background .3s}
.adpromo-dots i.on{width:18px;border-radius:6px;background:#D6493C}
/* sheet/paywall ichidagi promo (och fon) */
.spromo{position:relative;text-align:center;background:var(--cinbg);border:1px solid var(--line);border-radius:16px;padding:20px 16px 30px;margin-bottom:10px;overflow:hidden}
.spromo-slide{display:flex;flex-direction:column;align-items:center;animation:promoIn .5s ease}
.spromo-ic{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:27px;color:#fff;background:linear-gradient(160deg,var(--cin),var(--cin2));box-shadow:0 10px 24px rgba(194,64,58,.30);margin-bottom:14px}
.spromo-t{font-size:16px;font-weight:800;letter-spacing:-.01em;color:var(--ink);margin:0 0 6px;line-height:1.25;max-width:280px}
.spromo-s{font-size:13px;line-height:1.45;color:var(--ink2);max-width:280px;margin:0}
.spromo-dots{position:absolute;left:0;right:0;bottom:12px;display:flex;justify-content:center;gap:5px}
.spromo-dots i{width:5px;height:5px;border-radius:50%;background:var(--line);transition:width .3s,background .3s}
.spromo-dots i.on{width:16px;border-radius:6px;background:var(--cin)}
.ftop{display:flex;align-items:center;gap:11px;padding:calc(14px + var(--safe-t)) 16px 8px}
.fx{width:30px;height:30px;border-radius:50%;border:1px solid var(--line);background:var(--card);color:var(--ink2);font-size:17px;line-height:1}
.fpbar{flex:1;height:9px;background:var(--line);border-radius:6px;overflow:hidden}
.fpbar>i{display:block;height:100%;width:0;background:var(--cin);border-radius:6px;transition:width .3s}
.fheart{display:flex;align-items:center;gap:3px;color:var(--cin);font-size:15px;font-weight:500}
.fstage{padding:4px 18px 0;font-size:11px;color:var(--cin2);font-weight:600;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;gap:8px}
.fstage b{font-size:12px;color:var(--ink);font-weight:600;text-transform:none;letter-spacing:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fbody{flex:1;min-height:0;overflow-y:auto;padding:10px 18px 20px}
.kicker{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:500;padding:5px 11px;border-radius:12px;margin:4px 0 14px}
.k-word{background:var(--cinbg);color:var(--cin2)}.k-gram{background:#E7F0F8;color:#2F6F9E}.k-dia{background:var(--jadebg);color:var(--jade)}.k-check{background:var(--goldbg);color:var(--gold)}
.qq{font-size:14px;color:var(--ink2);font-weight:500;margin:6px 2px 12px}
.qcard{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:24px 18px;text-align:center;margin-bottom:16px;box-shadow:0 6px 0 rgba(194,64,58,.08)}
.qcard .qh{font-size:50px;line-height:1}
.qcard .qh.qask{font-size:29px;line-height:1.32}
.qcard .qpy{font-size:17px;color:var(--cin2);font-weight:500;margin-top:8px}
.qcard .gap{font-size:30px;line-height:1.4}.qcard .gap u{text-decoration:none;color:var(--cin);border-bottom:3px solid var(--cin);padding:0 16px}
.cloze-gap{color:var(--cin);font-weight:700;border-bottom:3px solid var(--cin);display:inline-block;min-width:48px;text-align:center}
.audio{margin:14px auto 0;width:48px;height:48px;border-radius:50%;background:var(--cinbg);color:var(--cin);border:none;font-size:22px;display:flex;align-items:center;justify-content:center}
.opt{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:var(--card);border:2px solid var(--line);border-radius:13px;padding:14px 15px;margin-bottom:10px;font-family:inherit;font-size:15px;color:var(--ink);box-shadow:0 4px 0 #E6DDCF;transition:transform .12s,box-shadow .12s}
.opt:active{transform:translateY(2px);box-shadow:0 2px 0 #E6DDCF}
.opt .k{width:23px;height:23px;border-radius:7px;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--ink3)}
.opt.sel{border-color:var(--jade);background:var(--jadebg);color:var(--jade)}
.opt.bad{border-color:var(--cin);background:var(--cinbg);color:var(--cin2)}
.opt small{display:block;color:var(--ink3);font-size:12px;margin-top:2px}
/* teaching word */
.wc{text-align:center;padding:8px 0}
.wc .big{font-size:92px;line-height:1}
.wc .py{font-size:26px;color:var(--cin2);font-weight:500;margin-top:8px;display:inline-flex;align-items:center;gap:10px}
.wc .pos{display:inline-block;font-size:12px;color:var(--ink2);background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:3px 11px;margin-top:12px}
.wc .mn{font-size:18px;margin-top:12px}
.duo-mini{display:grid;grid-template-columns:1fr;gap:9px;margin-top:18px}
.duo-mini span{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:10px;text-align:center;font-size:12px;color:var(--ink2)}
.duo-mini b{display:block;font-size:15px;color:var(--ink);margin-top:2px}
.gc h3{font-size:20px;margin:0 0 3px;display:flex;align-items:center;gap:9px}.gc .zh{color:var(--cin2)}
.gc .rule{font-size:14px;line-height:1.6;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;white-space:pre-line;margin:12px 0 14px}
.gc .exrow{display:grid;grid-template-columns:minmax(0,1fr) 34px;align-items:center;column-gap:12px;row-gap:3px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 13px;margin-bottom:8px}
.gc .exrow .z2{grid-column:1;grid-row:1;font-size:24px;line-height:1.35;width:auto;min-width:0;text-align:left;overflow-wrap:anywhere}
.gc .exrow .z2+div{grid-column:1;grid-row:2;min-width:0}
.gc .exrow .p2{font-size:14px;color:var(--cin2);font-weight:500;line-height:1.35}.gc .exrow .t2{font-size:12px;color:var(--ink2);line-height:1.35}

function allLessons(){var a=[];(MAP.units||[]).forEach(function(u){(u.lessons||[]).forEach(function(l){a.push(l)})});return a}
var LESSON_DATA_CACHE={},LESSON_DATA_PROMISES={},PRACTICE_PREFETCHED=false;
function cloneJson(v){return JSON.parse(JSON.stringify(v))}
function lessonDataKey(lv,n){return normalizeLevel(lv)+"-"+String(Number(n)||0)}
function lessonDataUrl(lv,n){return "/course_v3_data/"+normalizeLevel(lv)+"/lesson_"+String(Number(n)||0).padStart(2,"0")+".json"}
function loadLessonData(lv,n){
  var key=lessonDataKey(lv,n);
  if(LESSON_DATA_CACHE[key])return Promise.resolve(cloneJson(LESSON_DATA_CACHE[key]));
  if(LESSON_DATA_PROMISES[key])return LESSON_DATA_PROMISES[key].then(cloneJson);
  LESSON_DATA_PROMISES[key]=fetch(lessonDataUrl(lv,n)).then(function(r){
    if(!r.ok)throw new Error("not_found");
    return r.json();
  }).then(function(d){
    LESSON_DATA_CACHE[key]=d;
    delete LESSON_DATA_PROMISES[key];
    return d;
  }).catch(function(err){
    delete LESSON_DATA_PROMISES[key];
    throw err;
  });
  return LESSON_DATA_PROMISES[key].then(cloneJson);
}
function idleRun(fn){
  if("requestIdleCallback" in window)return requestIdleCallback(fn,{timeout:1400});
  return setTimeout(fn,450);
}
function prefetchPracticeAssets(){
  if(PRACTICE_PREFETCHED)return;
  PRACTICE_PREFETCHED=true;
  idleRun(function(){
    ["hsk-data.js?v=20260625","course_v3_data/memo.js?v=20260628"].forEach(function(href){
      try{var l=document.createElement("link");l.rel="prefetch";l.as="script";l.href=href;document.head.appendChild(l)}catch(e){}
    });
  });
}
function prefetchNearbyLessons(){
  if(!MAP)return;
  var lv=MAP.level||getSelectedLevel();
  var lessons=allLessons();
  var current=-1;
  lessons.forEach(function(l,i){if(current<0&&(l.status==="current"||l.status==="locked"&&!isPremiumLocked(l)))current=i});
  if(current<0)current=lessons.findIndex(function(l){return l.status!=="done"});
  if(current<0)current=0;
  [lessons[current],lessons[current+1]].forEach(function(l){
    if(l&&l.n)idleRun(function(){loadLessonData(lv,l.n).catch(function(){})});
  });
  prefetchPracticeAssets();
}

var AdFlow={

function showCourseAd(placement,idx){
  return new Promise(function(resolve,reject){
    var l=allLessons()[idx];if(!l){reject(new Error("lesson_not_found"));return}
    fetchCourseAds(placement,l).then(function(ads){
      var t=T();
      var btn=$("#ad-cta"),count=$("#ad-count"),video=$("#ad-video");
      var contBtn=$("#ad-sub-cont"),payBtn=$("#ad-sub-pay"),visit=$("#ad-visit");
      $("#ad-note").textContent=t.adNote;
      /* obuna bloki matnlari + aniq foydalar ro'yxati
         (faqat BARCHA reklamalar tugagach ko'rinadi) */
      $("#ad-sub-title").textContent=t.adSubTitle;
      $("#ad-sub-benefits").innerHTML=["b1","b2","b3"].map(function(k){return '<div class="adben"><i class="ti ti-circle-check"></i><span>'+esc(t[k])+'</span></div>'}).join("");
      payBtn.innerHTML='<i class="ti ti-lock-open"></i> '+t.adSubPay;
      $("#adov").classList.add("on");$("#adov").setAttribute("aria-hidden","false");
      clearInterval(AD_STATE.timer);
      /* Reklamalarni ketma-ket ko'rsatamiz: har biri o'z majburiy vaqtida.
         Oxirgisi tugagach — "Obuna ol / Reklama bilan davom etish" bloki. */
      function playAd(i){
        var ad=ads[i],duration=adDuration(ad),isLast=(i>=ads.length-1),multi=ads.length>1;
        clearInterval(AD_STATE.timer);clearTimeout(AD_STATE.loadTimer);resetAdVideo(video);
        AD_STATE={timer:null,loadTimer:null,resolve:resolve,reject:reject,ad:ad,lesson:l,placement:placement,watched:0,ready:false,busy:false};
        $("#ad-label").textContent=adPlacementTitle(placement)+(multi?" · "+(i+1)+"/"+ads.length:"");
        $("#ad-title").textContent=ad.title||adPlacementTitle(placement);
        $("#ad-note").textContent=t.adNote;
        var hasLink=!!ad.link_url;
        if(hasLink){$("#ad-visit-t").textContent=t.adVisit;visit.hidden=false}else{visit.hidden=true}
        stopAdPromo();$("#adov").classList.remove("done");
        $("#ad-video-wrap").style.display="";
        $("#ad-video-wrap").style.cursor=hasLink?"pointer":"default";
        contBtn.disabled=false;contBtn.innerHTML='<i class="ti ti-arrow-right"></i> '+t.adSubCont;
        /* Pastdagi tugma normal oqimda ko'rinmaydi — faqat xatolikda "qayta yuklash"
           bo'lib chiqadi. Sanoq faqat tepada (#ad-count) ko'rsatiladi. */
        setAdSubscribeVisible(false);btn.style.display="none";btn.disabled=true;
        count.textContent="...";
        setAdStatus(adUiText("loading"));
        var srcBase=ad.media_url,loadAttempt=0;
        var left=duration,timer=null,started=false,failed=false;
        /* Videoni o'rnatish. bust=true bo'lsa cache'ni chetlab o'tish uchun
           ?r=timestamp qo'shadi (buzilgan/yarim keshlangan javobni aylanib o'tish). */
        function setSrc(bust){
          try{video.pause()}catch(e){}
          video.removeAttribute("src");try{video.load()}catch(e){}
          video.src=bust?srcBase+(srcBase.indexOf("?")>=0?"&":"?")+"r="+Date.now():srcBase;
          video.loop=true;video.muted=true;
          try{video.load()}catch(e){}
        }
        function armGuard(ms){clearTimeout(AD_STATE.loadTimer);AD_STATE.loadTimer=setTimeout(onLoadTimeout,ms)}
        function tryPlay(){var p;try{p=video.play()}catch(e){}if(p&&p.then)p.then(startCountdown).catch(function(){if(video.readyState>=2)startCountdown()})}
        /* Guard ishga tushdi: video hali tayyor emas. Sekin tarmoq bo'lishi mumkin,
           shuning uchun DARROV xato bermaymiz — 2 martagacha jimgina (cache-bust bilan)
           qayta yuklab, uzunroq kutamiz; shundan keyingina manual "qayta yuklash". */
        function onLoadTimeout(){
          if(started||failed||AD_STATE.ad!==ad)return;
          if(video.readyState>=2){startCountdown();return}
          if(loadAttempt<2){loadAttempt++;setAdStatus(adUiText("loading"));setSrc(true);armGuard(loadAttempt>=2?16000:12000);tryPlay();return}
          mediaFailed();
        }
        /* Qattiq <video> error hodisasi — avval bir marta cache-bust bilan qayta
           urinib ko'ramiz (vaqtinchalik tarmoq uzilishi), keyin manual retry. */
        function onMediaError(){
          if(started||failed||AD_STATE.ad!==ad)return;
          if(loadAttempt<2){loadAttempt++;setAdStatus(adUiText("loading"));setSrc(true);armGuard(12000);tryPlay();return}
          mediaFailed();
        }
        function draw(){
          count.textContent=left>0?left+"s":"OK";
          if(left>0){
            /* Sanoq davom etmoqda — pastda tugma yo'q, faqat tepadagi sekund. */
            btn.style.display="none";setAdSubscribeVisible(false);
            return;
          }
          if(!isLast){
            /* bu reklama tugadi — ko'rilgani yoziladi va keyingisiga o'tiladi */
            recordCourseAdView(ad,placement,l,duration).catch(function(){});
            playAd(i+1);
          }else{
            /* BARCHA reklamalar tugadi — videoni to'xtatib yashiramiz, so'ng
               obuna (aniq foydalar bilan) / reklama bilan davom etish bloki chiqadi */
            try{video.pause()}catch(e){}
            $("#ad-video-wrap").style.display="none";
            $("#adov").classList.add("done");startAdPromo();
            AD_STATE.ready=true;btn.style.display="none";setAdSubscribeVisible(true);
          }
        }
        function startCountdown(){
          if(started||failed||AD_STATE.ad!==ad)return;
          started=true;clearTimeout(AD_STATE.loadTimer);setAdStatus("");
          draw();
          timer=setInterval(function(){
            left=Math.max(0,left-1);AD_STATE.watched=duration-left;
            if(left<=0)clearInterval(timer);
            draw();
          },1000);
          AD_STATE.timer=timer;
        }
        function failAdFlow(){
          if(AD_STATE.ad!==ad)return;
          var rej=AD_STATE.reject||reject;
          _closeAdOverlay();
          _resetAdState();
          if(rej)rej(new Error("course_ad_media_failed"));
        }
        function mediaFailed(){
          if(started||failed||AD_STATE.ad!==ad)return;
          failed=true;
          clearTimeout(AD_STATE.loadTimer);clearInterval(AD_STATE.timer);
          AD_STATE.ready=false;AD_STATE.watched=0;
          try{video.pause()}catch(e){}
          setAdStatus(adUiText("failed"));
          $("#ad-note").textContent=adUiText("failedNote");
          count.textContent="!";
          btn.style.display="";btn.disabled=false;
          btn.innerHTML='<i class="ti ti-arrow-right"></i> '+t.adReady;
          btn.onclick=function(ev){if(ev)ev.stopPropagation();failAdFlow()};
          setTimeout(failAdFlow,1600);
        }
        video.onloadedmetadata=tryPlay;
        video.onloadeddata=startCountdown;
        video.oncanplay=startCountdown;
        video.onplaying=startCountdown;
        video.ontimeupdate=startCountdown;
        video.onerror=onMediaError;
        /* stalled/waiting — bu buferlash, MEDIA xatosi EMAS: faqat guard'ni uzaytiramiz.
           Ma'lumot kelishi bilan load hodisalari sanoqni boshlaydi va guard'ni tozalaydi. */
        video.onstalled=video.onwaiting=function(){if(started||failed||AD_STATE.ad!==ad)return;armGuard(12000)};
        setSrc(false);
        /* Birinchi guard 12s (eski 8s soxta xato berardi). Tayyor bo'lmasa onLoadTimeout
           cache-bust bilan 2 marta jimgina qayta uradi (12s/16s), shundan keyin manual. */
        armGuard(12000);
        /* Cache'dan qayta ochilganda (2-3-reklama) load hodisalari qayta otilmasligi
           mumkin — agar media allaqachon tayyor bo'lsa, sanoqni darhol boshlaymiz. */
        if(video.readyState>=2)startCountdown();
        /* Muted autoplay bloklanishi (Telegram WebView'da gesture'siz) MEDIA xatosi EMAS:
           catch'da darrov xato bermaymiz, video baribir load hodisalari/guard orqali hal bo'ladi. */
        tryPlay();
      }
      playAd(0);
    }).catch(function(){reject(new Error("course_ad_not_found"))});
  });
}

function buildQueue(d){
  var q=[];
  (d.sections||[]).forEach(function(sec){
    var cards=(sec.cards||[]).slice();
    /* New lessons ship an already-interleaved intro (teach + immediate check)
       and set intro_prebuilt — use their cards as-is. Older lessons lack the
       flag and keep the legacy client-side drill (teach 4 words, 4 formats). */
    if(sec.section_purpose==="intro" && !d.intro_prebuilt){
      var words=cards.filter(function(c){return c.type==="active_word"});
      var rest=cards.filter(function(c){return c.type!=="active_word"});
      var drill=[];
      words.slice(0,4).forEach(function(c,idx){
        var w=c.word||{};
        if(idx===0)drill.push({type:"_word_flash",word:w});
        else if(idx===1)drill.push({type:"_word_listen",word:w});
        else if(idx===2)drill.push({type:"_word_pick_meaning",word:w,words:words});
        else drill.push({type:"_word_pick_hanzi",word:w,words:words});
      });
      cards=drill.concat(rest);
    }
    /* New lessons interleave the grammar teacher cards with drills inside the
       section itself (grammar_prebuilt); only prepend for older lessons. */
    if(sec.section_purpose==="grammar" && d.grammar && d.grammar.length && !d.grammar_prebuilt){
      var gc=d.grammar.map(function(g){return {type:"_grammar",g:g}});
      cards=gc.concat(cards);
    }
    /* Dialog is now fully interactive (audio/cloze/char-gap) — no passive dump. */
    var sNo=sec.section_no||0, sTitle=tr(sec.section_title)||(secNames()[(sec.section_no||1)-1]||"");
    cards.forEach(function(c){c._sNo=sNo;c._sTitle=sTitle;q.push(c)});
  });
  return q;
}

  var act=p.calDays.map(function(_,d){return (d<=today&&(today-d)<streak)?1:0;});
  var head='<div class="wk">'+p.calDays.map(function(d){return '<div style="flex:1;text-align:center;font-size:11px;color:var(--ink3)">'+d+'</div>'}).join("")+'</div>';
  var row='<div class="wk">'+act.map(function(on,d){return '<div class="cell '+(on?"on":"")+(d===today?" tod":"")+'" style="flex:1;height:42px">'+(on?'<i class="ti ti-flame" style="font-size:16px"></i>':'')+'</div>'}).join("")+'</div>';
  return head+row;}
function renderProfile(){
  var t=T(),p=pl();
  var streak=Number(MAP&&MAP.progress&&MAP.progress.streak||0),todayXp=Number(MAP&&MAP.progress&&MAP.progress.xp%50||0);
  var pct=Math.round(Math.min(todayXp/dailyGoal,1)*100),off=Math.round(157-157*Math.min(todayXp/dailyGoal,1));
  var completedLessons=Number(MAP&&MAP.progress&&MAP.progress.completed||0);
  var firstDone=completedLessons>=1;
  var lessonAchPct=Math.min(100,Math.round(completedLessons/100*100));
  var streakAchPct=Math.min(100,Math.round(streak/30*100));
  $("#s-profile").innerHTML='<div class="htop" style="padding-bottom:4px"><span class="lvpill"><i class="ti ti-user"></i> '+t.nav.profile+'</span></div>'
    +'<div class="phero"><div class="pav'+(PROF.avatar&&/[一-鿿]/.test(PROF.avatar)?"":" han")+'" onclick="App.avatarEdit()">'+(PROF.avatar||"阿")+'<span class="ed"><i class="ti ti-pencil"></i></span></div><div><div class="pname">'+(PROF.name||t.you)+'</div><div class="pun">'+(PROF.name?"@"+PROF.name.toLowerCase().replace(/\s+/g,"_"):"@hsk_ai")+'</div><span class="lvb"><i class="ti ti-bolt"></i> '+(MAP&&MAP.level?MAP.level.toUpperCase():"HSK 1")+' · '+t.league+'</span></div></div>'
    +'<div class="pgoal" onclick="App.goCurrentLesson()" style="cursor:pointer"><svg class="ring" viewBox="0 0 60 60"><circle cx="30" cy="30" r="25" fill="none" stroke="var(--line)" stroke-width="6"/><circle cx="30" cy="30" r="25" fill="none" stroke="var(--cin)" stroke-width="6" stroke-linecap="round" stroke-dasharray="157" stroke-dashoffset="'+off+'" transform="rotate(-90 30 30)"/><text x="30" y="35" text-anchor="middle" font-size="13" font-weight="600" fill="var(--ink)">'+pct+'%</text></svg><div class="gt"><b>'+p.todayGoal+'</b><small>'+todayXp+' / '+dailyGoal+' XP · '+(dailyGoal-todayXp)+' '+p.goalLeft+'</small></div><div class="fl"><b>'+streak+'</b><small>'+t.streak+'</small></div></div>'
    +'<div class="sech" style="display:flex;justify-content:space-between"><span>'+p.calTitle+'</span><span style="color:var(--cin)"><i class="ti ti-flame" style="font-size:12px"></i> '+streak+' '+t.streak+'</span></div><div class="card2"><div class="cal">'+streakCalHtml()+'</div></div>'
    +'<div class="sech">'+p.ach+'</div><div class="ach"><div class="arow"><div class="aic c3"><i class="ti ti-check"></i></div><div class="at"><div class="ah"><span>'+p.a1+'</span><small>'+(firstDone?p.a1d:"0 / 1")+'</small></div><div class="abar"><i style="width:'+(firstDone?100:0)+'%;background:var(--jade)"></i></div></div></div>'
    +'<div class="arow"><div class="aic c1"><i class="ti ti-book"></i></div><div class="at"><div class="ah"><span>'+p.a2+'</span><small>'+completedLessons+' / 100</small></div><div class="abar"><i style="width:'+lessonAchPct+'%"></i></div></div></div>'
    +'<div class="arow"><div class="aic c2"><i class="ti ti-flame"></i></div><div class="at"><div class="ah"><span>'+p.a3+'</span><small>'+streak+' / 30</small></div><div class="abar"><i style="width:'+streakAchPct+'%"></i></div></div></div></div>'
    +'<div class="pro" onclick="App.openPaywall(\'profile\')"><span class="gw han">会</span><h3>'+t.unlockTitle+'</h3><p>'+t.unlockSub+'</p><button>'+t.unlockBtn+' →</button></div>'
    +'<div class="sech">'+t.mistakes+' · '+t.friends+'</div>'
    +rowCard("t-cin",'<i class="ti ti-alert-triangle"></i>',t.mistakes,t.mistakesSub,"App.openMistakes()")
    +rowCard("t-jade",'<i class="ti ti-users"></i>',t.friends,"","App.openFriends()")
    +'<div class="sech">'+p.goalSet.split(" ")[0]+'</div>'
    +'<div class="set"><button class="srow" onclick="App.langPicker()"><i class="ti ti-language"></i> '+t.lang+'<span class="sv">'+LANG.toUpperCase()+' <i class="ti ti-chevron-right"></i></span></button>'
    +'<button class="srow" onclick="App.notifToggle()"><i class="ti ti-bell"></i> '+t.notif+'<span class="toggle '+(notifOn?"on":"")+'"></span></button>'
    +(notifOn?'<div class="srow-note">'+notifTimesHtml()+'</div>':'')
    +'<button class="srow" onclick="App.goalPicker()"><i class="ti ti-target"></i> '+p.goalSet+'<span class="sv">'+dailyGoal+' XP <i class="ti ti-chevron-right"></i></span></button>'
    +'<button class="srow" onclick="App.openHelp()"><i class="ti ti-help-circle"></i> '+t.help+'<span class="sv"><i class="ti ti-chevron-right"></i></span></button></div>'
    +'<div style="height:14px"></div>';
}

/* ---------- Paywall ---------- */
function payHintHtml(){
  var s={ru:"«Оформить подписку» откроет страницу оплаты. После подтверждения все уроки откроются прямо здесь.",
    uz:"«Obuna bo'lish» tugmasi to'lov sahifasini ochadi. To'lov tasdiqlangach, barcha darslar shu yerda ochiladi.",
    tj:"«Обуна шудан» саҳифаи пардохтро мекушояд. Пас аз тасдиқ ҳамаи дарсҳо ҳамин ҷо кушода мешаванд."}[LANG];
  return '<div class="tr" style="margin:10px 6px 0;text-align:center;color:var(--ink2);line-height:1.5;font-size:12px">'+esc(s)+'</div>';
}
function paywallHtml(ctx){
  var t=T();var ctxTitle=ctx==="lockedLesson"?t.lockedLesson:t.payTitle;
  return '<div class="shead"><div style="width:54px;height:54px;border-radius:15px;background:var(--cin);border:2px solid var(--gold);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 10px" class="han">会</div><div class="tr" style="font-size:15px;color:var(--ink)">'+esc(ctxTitle)+'</div><div class="tr">'+t.paySub+'</div></div>'
    +promoBlockHtml()
    +'<button class="scta" onclick="App.goPay()"><i class="ti ti-lock-open"></i> '+t.subscribe+'</button>'
    +payHintHtml();
}

/* ---------- boot ---------- */
function renderAll(){
  document.querySelectorAll("#nav [data-i]").forEach(function(s){s.textContent=T().nav[s.dataset.i]});
  if(MAP){renderCourse();renderMashq();renderRating();renderProfile();if(SCREEN==="voice")renderVoice()}
}
(function(){var p=new URLSearchParams(location.search);var onb=false;try{onb=!!localStorage.getItem("hsk_v3_onb")}catch(e){}if(INIT_DATA&&!onb&&!p.get("onboarded")){location.replace("/course_v3_onboarding.html?lang="+LANG);}})();
navInit();
$("#sheet").onclick=function(){App.closeSheet()};
$("#paywall").onclick=function(){App.closePaywall()};
window.openLessonSheet=openLessonSheet;window.startLesson=startLesson;window.App=App;window.Flow=Flow;window.speak=speak;
(function(){
  var bootLevel=getSelectedLevel();
  if(!INIT_DATA){showAuthGate();return;}
  var url="/api/v3/map?lang="+LANG+"&level="+bootLevel+"&tz="+encodeURIComponent(-new Date().getTimezoneOffset());
  fetch(url,{headers:{"X-Telegram-Init-Data":INIT_DATA}}).then(function(r){return r.json().then(function(d){d._status=r.status;return d})}).then(function(d){
    if(!d||d.authenticated===false||d._status===401){showAuthGate();return;}
    hideAuthGate();MAP=d;adoptServerLang(d);setSelectedLevel(MAP.level||bootLevel);if(d.user)PROF=d.user;syncNotify();
    renderAll();
    prefetchNearbyLessons();
    var sp=new URLSearchParams(location.search);
    App.show(sp.get("tab")||"course");
    var initialLesson=Number(sp.get("lesson")||0);
    if(initialLesson>0){
      var idx=-1;allLessons().forEach(function(l,i){if(Number(l.n)===initialLesson)idx=i});
      if(idx>=0)setTimeout(function(){App.show("course");openLessonSheet(idx)},80);
    }
    var challengeId=Number(sp.get("challenge_id")||0);
    if(challengeId>0)setTimeout(function(){openChallengeById(challengeId)},180);
    if(sp.get("tour")==="1"){var td=false;try{td=!!localStorage.getItem("hsk_v3_tour")}catch(e){}if(!td)setTimeout(function(){App.runTour()},500)}
  }).catch(function(){showAuthGate()});
})();
</script>
