<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>Talaffuz mashqi</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.30.0/tabler-icons.min.css" rel="stylesheet">
<style>
:root{--ink:#211D17;--ink2:#6E665B;--ink3:#A89E8E;--paper:#FBF7EF;--card:#FFFFFF;--line:#EAE2D4;--cin:#C2403A;--cin2:#9A2F2B;--cinbg:#FBEDEA;--gold:#C2962F;--jade:#2F7D5E;--jadebg:#E7F1EA;--safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--paper);color:var(--ink);font-family:-apple-system,"SF Pro Text","Segoe UI",Roboto,sans-serif}
.han{font-family:"Songti SC","STSong","Noto Serif SC",serif;font-weight:600}
.wrap{max-width:480px;margin:0 auto;height:100vh;padding-top:var(--safe-t);display:flex;flex-direction:column;position:relative;overflow:hidden}
.top{display:flex;align-items:center;gap:11px;padding:16px 16px 8px;z-index:3}
.ix{width:32px;height:32px;border-radius:50%;border:1px solid var(--line);background:var(--card);color:var(--ink2);font-size:18px;display:flex;align-items:center;justify-content:center}
.pbar{flex:1;height:9px;background:var(--line);border-radius:6px;overflow:hidden}
.pbar>i{display:block;height:100%;width:0;background:var(--jade);border-radius:6px;transition:width .4s}
.pill{font-size:12px;font-weight:500;color:var(--cin2);background:var(--cinbg);border-radius:14px;padding:5px 11px}
.stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 22px;position:relative}
.word{font-size:96px;line-height:1;text-align:center;transition:color .3s}
.word.ok{color:var(--jade)}
.word.pop{animation:pop .55s}
@keyframes pop{0%{transform:scale(1)}35%{transform:scale(1.3)}60%{transform:scale(.93)}100%{transform:scale(1)}}
.word.bad{animation:shk .4s}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-9px)}75%{transform:translateX(9px)}}
.py{font-size:24px;color:var(--cin2);font-weight:500;margin-top:10px}
.mn{font-size:15px;color:var(--ink2);margin-top:4px;text-align:center}
.fb{height:22px;margin-top:12px;font-size:14px;font-weight:500}
.fb.ok{color:var(--jade)}.fb.bad{color:var(--cin2)}
.heard{min-height:18px;margin-top:7px;font-size:12px;color:var(--ink3);text-align:center;max-width:330px;line-height:1.35}
.listen{margin-top:14px;display:inline-flex;align-items:center;gap:7px;background:var(--cinbg);color:var(--cin2);border:none;border-radius:20px;padding:9px 16px;font-family:inherit;font-size:14px;font-weight:500}
.ctrl{padding:8px 0 calc(30px + var(--safe-b));display:flex;flex-direction:column;align-items:center;gap:9px}
.micwrap{position:relative;width:84px;height:84px;display:flex;align-items:center;justify-content:center}
.mic{width:78px;height:78px;border-radius:50%;background:var(--cin);color:#fff;border:none;font-size:31px;display:flex;align-items:center;justify-content:center;z-index:2}
.mic.rec{background:var(--cin2)}
.micwrap.rec:before,.micwrap.rec:after{content:"";position:absolute;width:78px;height:78px;border-radius:50%;border:3px solid var(--cin);animation:pr 1.4s ease-out infinite}
.micwrap.rec:after{animation-delay:.7s}
@keyframes pr{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.7);opacity:0}}
.hint{font-size:13px;color:var(--ink3)}
.toast{position:absolute;top:54px;left:50%;transform:translateX(-50%) translateY(-12px);background:var(--jade);color:#fff;font-size:14px;font-weight:500;padding:7px 15px;border-radius:18px;opacity:0;transition:all .3s;z-index:6}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.conf{position:absolute;top:-14px;width:9px;height:13px;border-radius:2px;opacity:0;z-index:5}
.conf.fall{opacity:1;transition:transform 1.4s ease-in,opacity 1.4s}
.done{position:absolute;inset:0;background:var(--paper);display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;z-index:8}
.done.on{display:flex}
.done .st{width:90px;height:90px;border-radius:24px;background:var(--cin);border:3px solid var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-size:42px;margin-bottom:16px}
.done h3{font-size:23px;font-weight:500;margin:0 0 4px}.done p{font-size:14px;color:var(--ink2);margin:0 0 20px}
.done button{width:100%;max-width:280px;background:var(--cin);color:#fff;border:none;border-radius:14px;padding:15px;font-family:inherit;font-size:16px;font-weight:500}
.loading{margin:auto;color:var(--ink3)}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><button class="ix" onclick="goBack()" aria-label="Orqaga"><i class="ti ti-arrow-left"></i></button><div class="pbar"><i id="prog"></i></div><span class="pill" id="cnt">1 / 10</span></div>
  <div class="toast" id="toast">+10 XP</div>
  <div class="stage" id="stage"><div class="loading">…</div></div>
  <div class="ctrl" id="ctrl" style="display:none">
    <div class="micwrap" id="micwrap"><button class="mic" id="mic" onclick="rec()" aria-label="Gapirish"><i class="ti ti-microphone"></i></button></div>
    <div class="hint" id="hint"></div>
  </div>
  <div class="done" id="done"><div class="st han">音</div><h3 id="dh"></h3><p id="dp"></p><button onclick="replay()"><i class="ti ti-refresh"></i> <span id="db"></span></button></div>
</div>
<script src="hsk-data.js?v=20260625"></script>
<script>
var params=new URLSearchParams(location.search||"");
var LANG=(params.get("lang")||"ru");if(["uz","ru","tj"].indexOf(LANG)<0)LANG="ru";
var L={ru:{hint:"Нажмите на микрофон и произнесите слово",listen:"Прослушать",ok:"Точно произнесено!",bad:"Неточно, попробуйте снова",heard:"Я услышал:",retry:"Нажмите ещё раз",done:"правильно",doneSub:"Ваше произношение становится лучше!",again:"Ещё раз",listening:"Слушаю…",analyzing:"Проверяю…",micDeny:"Разрешите доступ к микрофону",noSupport:"Микрофон не поддерживается",netErr:"Ошибка сети, попробуйте снова",needTg:"Откройте в Telegram",limitTitle:"Бесплатная практика на сегодня исчерпана",limitSub:"В бесплатном режиме произношение доступно 1 полную сессию в день. Откройте Premium для безлимита или возвращайтесь завтра.",premiumBtn:"Открыть Premium",back:"Назад"},
  uz:{hint:"Mikrofonni bosib, so'zni ayting",listen:"Tinglash",ok:"Aniq talaffuz!",bad:"Aniq emas, yana urinib ko'ring",heard:"Men shunday eshitdim:",retry:"Qayta bosing",done:"to'g'ri",doneSub:"Talaffuzing yaxshilanyapti!",again:"Yana mashq",listening:"Eshityapman…",analyzing:"Tekshiryapman…",micDeny:"Mikrofonga ruxsat bering",noSupport:"Mikrofon qo'llab-quvvatlanmaydi",netErr:"Tarmoq xatosi, qayta urining",needTg:"Telegram'da oching",limitTitle:"Bugungi bepul mashq tugadi",limitSub:"Bepul rejimda talaffuz kuniga 1 to'liq sessiya ochiladi. Cheksiz mashq uchun Premium oching yoki ertaga qaytib keling.",premiumBtn:"Premium ochish",back:"Orqaga"},
  tj:{hint:"Микрофонро пахш карда, калимаро гӯед",listen:"Гӯш кардан",ok:"Талаффузи дақиқ!",bad:"Дақиқ нест, боз кӯшиш кунед",heard:"Ман чунин шунидам:",retry:"Боз пахш кунед",done:"дуруст",doneSub:"Талаффузи шумо беҳтар мешавад!",again:"Боз",listening:"Гӯш мекунам…",analyzing:"Месанҷам…",micDeny:"Ба микрофон иҷозат диҳед",noSupport:"Микрофон дастгирӣ намешавад",netErr:"Хатои шабака, бозкӯшӣ кунед",needTg:"Дар Telegram кушоед",limitTitle:"Машқи ройгони имрӯза тамом шуд",limitSub:"Дар ҳолати ройгон талаффуз рӯзе 1 сессияи пурра дастрас аст. Барои бепоён Premium кушоед ё фардо баргардед.",premiumBtn:"Кушодани Premium",back:"Бозгашт"}}[LANG];
var tg=window.Telegram&&window.Telegram.WebApp;if(tg){try{tg.ready();tg.expand()}catch(e){}}
function goBack(){location.href="/course-v3.html?lang="+LANG+"&tab=mashq"}
function goPremium(){location.href="/subscription.html?lang="+LANG+"&source=v3_pronunciation_limit&mode=subscription"}
/* Kunlik limit gate: bepulga kuniga 1 to'liq talaffuz sessiyasi (server tomonda). */
function gateRef(create){try{var k="hsk_gate_pronunciation";var v=sessionStorage.getItem(k);if(!v&&create){v=Date.now().toString(36)+Math.random().toString(36).slice(2,8);sessionStorage.setItem(k,v)}return v||""}catch(e){return ""}}
function runGate(ref){
  return fetch("/api/v3/practice/daily-gate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({initData:initData(),feature:"pronunciation",ref:ref})})
    .then(function(r){return r.json().then(function(j){return {ok:r.ok,status:r.status,j:j}}).catch(function(){return {ok:r.ok,status:r.status,j:{}}})});
}
function showLimit(){
  var d=document.getElementById('done');
  d.innerHTML='<div class="st han" style="background:var(--gold)"><i class="ti ti-lock"></i></div><h3>'+L.limitTitle+'</h3><p>'+L.limitSub+'</p><button onclick="goPremium()"><i class="ti ti-crown"></i> '+L.premiumBtn+'</button><button onclick="goBack()" style="background:transparent;border:1px solid var(--line);color:var(--ink2);margin-top:8px">'+L.back+'</button>';
  document.getElementById('ctrl').style.display='none';d.classList.add('on');
}
function gateStart(){
  runGate(gateRef(true)).then(function(o){if(o.status===403){showLimit();return}start()}).catch(function(){start()});
}
function replay(){
  runGate("replay:"+Date.now()).then(function(o){if(o.status===403){showLimit();return}start()}).catch(function(){start()});
}
function speak(t){try{window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);u.lang="zh-CN";u.rate=.8;window.speechSynthesis.speak(u)}catch(e){}}
function haptic(ok){try{tg&&tg.HapticFeedback&&tg.HapticFeedback.notificationOccurred(ok?"success":"error")}catch(e){}}
var ac;function beep(seq){try{ac=ac||new(window.AudioContext||window.webkitAudioContext)();var t=ac.currentTime;seq.forEach(function(f,k){var o=ac.createOscillator(),g=ac.createGain();o.frequency.value=f;o.connect(g);g.connect(ac.destination);var s=t+k*0.09;g.gain.setValueAtTime(0.0001,s);g.gain.exponentialRampToValueAtTime(0.12,s+0.02);g.gain.exponentialRampToValueAtTime(0.0001,s+0.16);o.start(s);o.stop(s+0.18)})}catch(e){}}
function tr(m){return !m?"":(typeof m==="string"?m:(m[LANG]||m.ru||m.uz||""))}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}

var TOTAL=10,list=[],i=0,okCount=0,busy=false;
function rain(){var cols=['#C2403A','#C2962F','#2F7D5E','#E8D08A','#fff'];var stage=document.getElementById('stage');for(var n=0;n<22;n++){(function(){var c=document.createElement('span');c.className='conf';c.style.left=(5+Math.random()*90)+'%';c.style.background=cols[n%5];stage.appendChild(c);var dx=Math.random()*60-30,rot=Math.random()*540-270;requestAnimationFrame(function(){c.classList.add('fall');c.style.transform='translate('+dx+'px,520px) rotate('+rot+'deg)';c.style.opacity='0'});setTimeout(function(){c.remove()},1450)})()}}
function load(){var w=list[i];
  document.getElementById('stage').innerHTML='<div class="word han" id="word">'+w.h+'</div><div class="py">'+w.p+'</div><div class="mn">'+tr(w.m)+'</div><div class="fb" id="fb"></div><div class="heard" id="heard"></div><button class="listen" onclick="speak(\''+w.h+'\')"><i class="ti ti-volume"></i> '+L.listen+'</button>';
  document.getElementById('cnt').textContent=(i+1)+' / '+list.length;document.getElementById('hint').textContent=L.hint;
}
function toast(t){var el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(function(){el.classList.remove('show')},1100)}
// Real pronunciation check: record mic -> server speech-to-text -> character-match score.
function initData(){return (tg&&tg.initData)?tg.initData:""}
var mediaStream=null,mediaRecorder=null,chunks=[],autoStop=null,MAX_REC_MS=4000,MIN_BYTES=1200;
function setRec(on){var mw=document.getElementById('micwrap');if(on){mw.classList.add('rec');document.getElementById('mic').classList.add('rec')}else{mw.classList.remove('rec');document.getElementById('mic').classList.remove('rec')}}
function setHint(t){document.getElementById('hint').textContent=t||""}
function pickMime(){var c=["audio/webm;codecs=opus","audio/webm","audio/mp4","audio/aac","audio/ogg;codecs=opus"];
  if(!window.MediaRecorder||!MediaRecorder.isTypeSupported)return"";
  for(var k=0;k<c.length;k++){if(MediaRecorder.isTypeSupported(c[k]))return c[k]}return""}
function rec(){
  if(busy)return;
  if(mediaRecorder&&mediaRecorder.state!=="inactive"){stopRec();return;}
  startRec();
}
function startRec(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia||!window.MediaRecorder){setHint(L.noSupport);return;}
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    mediaStream=stream;chunks=[];var mime=pickMime(),opts={audioBitsPerSecond:32000};if(mime)opts.mimeType=mime;
    try{mediaRecorder=new MediaRecorder(stream,opts)}catch(_){mediaRecorder=mime?new MediaRecorder(stream,{mimeType:mime}):new MediaRecorder(stream)}
    mediaRecorder.ondataavailable=function(e){if(e.data&&e.data.size>0)chunks.push(e.data)};
    mediaRecorder.onstop=onStopped;mediaRecorder.start(250);
    try{navigator.vibrate&&navigator.vibrate(20)}catch(e){}
    setRec(true);setHint(L.listening);
    clearTimeout(autoStop);autoStop=setTimeout(stopRec,MAX_REC_MS);
  }).catch(function(){setHint(L.micDeny)});
}
function stopRec(){clearTimeout(autoStop);if(mediaRecorder&&mediaRecorder.state!=="inactive"){setRec(false);setHint(L.analyzing);mediaRecorder.stop();}}
function onStopped(){
  var blob=new Blob(chunks,{type:(mediaRecorder&&mediaRecorder.mimeType)||"audio/webm"});
  try{if(mediaStream)mediaStream.getTracks().forEach(function(t){t.stop()})}catch(e){}mediaStream=null;
  if(blob.size<MIN_BYTES){setHint(L.retry);return;}
  busy=true;var w=list[i],fd=new FormData();
  fd.append("initData",initData());fd.append("target",w.h);fd.append("target_pinyin",w.p||"");fd.append("language",LANG);fd.append("level",(params.get("level")||""));fd.append("audio",blob,"voice.webm");
  fetch("/api/voice-practice/pronounce",{method:"POST",body:fd})
    .then(function(r){return r.json().then(function(j){return {ok:r.ok,j:j}})})
    .then(function(o){busy=false;if(!o.ok||!o.j||o.j.ok!==true){onErr(o);return;}applyScore(Number(o.j.score)||0,o.j.heard||"")})
    .catch(function(){busy=false;setHint(L.netErr)});
}
	function onErr(o){var code=o&&o.j&&o.j.code;if(code==="PRONOUNCE_LIMIT_EXCEEDED"){showLimit();return;}setHint(code==="INVALID_INIT_DATA"?L.needTg:(o&&o.j&&o.j.message)||L.netErr)}
function applyScore(score,heard){
  var ok=score>=60,word=document.getElementById('word'),fb=document.getElementById('fb');
  var he=document.getElementById('heard');if(he)he.textContent=heard?(L.heard+' '+heard):"";
  if(ok){okCount++;word.classList.add('ok','pop');rain();toast('+10 XP · '+score+'%');beep([523,659,784]);haptic(true);fb.className='fb ok';fb.textContent='✓ '+L.ok+' '+score+'%';
    document.getElementById('prog').style.width=Math.round((i+1)/list.length*100)+'%';
    setTimeout(function(){i++;if(i>=list.length){finish()}else{load()}},1100);
  }else{word.classList.add('bad');beep([220,180]);haptic(false);fb.className='fb bad';fb.textContent='~ '+L.bad+' '+score+'%';setHint(L.retry);
    setTimeout(function(){word.classList.remove('bad')},450);
  }
}
function finish(){document.getElementById('ctrl').style.display='none';document.getElementById('prog').style.width='100%';
  document.getElementById('dh').textContent=okCount+' / '+list.length+' '+L.done;document.getElementById('dp').textContent=L.doneSub;document.getElementById('db').textContent=L.again;
  document.getElementById('done').classList.add('on');beep([523,659,784,1046]);haptic(true);}
function start(){
  var pool=(typeof WORDS!=="undefined"?WORDS:[]).filter(function(w){return Array.from(String(w.h)).length<=3});
  if(!pool.length){document.getElementById('stage').innerHTML='<div class="loading">Ma\'lumot yuklanmadi</div>';return}
  list=shuffle(pool.slice()).slice(0,TOTAL);i=0;okCount=0;busy=false;
  document.getElementById('done').classList.remove('on');document.getElementById('ctrl').style.display='flex';document.getElementById('prog').style.width='0';
  load();
}
gateStart();
</script>
</body>
</html>
