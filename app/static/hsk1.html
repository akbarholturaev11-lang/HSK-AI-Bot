<style>
:root{
  color-scheme:dark;
  --bg:#090b10;--bg2:#111722;--bg3:#182131;--bg4:#222c3e;
  --card:#121923;--card2:#172031;
  --border:rgba(148,163,184,.16);--border2:rgba(148,163,184,.28);
  --text:#f4f7fb;--text2:#aab4c5;--text3:#6f7a91;
  --accent:#5b8cff;--accent-dim:rgba(91,140,255,.16);
  --green:#35d07f;--green-dim:rgba(53,208,127,.14);
  --amber:#f2b84b;--amber-dim:rgba(242,184,75,.15);
  --red:#ff6b6b;--red-dim:rgba(255,107,107,.14);
  --purple:#b58cff;--purple-dim:rgba(181,140,255,.15);
  --shadow:0 18px 48px rgba(0,0,0,.28);
  --r:12px;--r2:18px;
  --font:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'SF Mono','Fira Code',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:radial-gradient(circle at 12% -10%,rgba(91,140,255,.18),transparent 34%),linear-gradient(180deg,#0b0e15 0%,var(--bg) 42%,#07090d 100%);color:var(--text);font-family:var(--font);overscroll-behavior:none;}
body{overflow:hidden;}
button,input,textarea{font:inherit;}
button:disabled{cursor:default;}

.page{
  position:fixed;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
  display:none;background:transparent;
}
.page.active{display:block;}
.shell{width:100%;max-width:680px;margin:0 auto;padding-bottom:calc(24px + env(safe-area-inset-bottom,0px));}
.page-header{
  padding:calc(22px + env(safe-area-inset-top,0px)) 16px 16px;
  background:linear-gradient(180deg,rgba(17,23,34,.96) 0%,rgba(9,11,16,.88) 100%);
  position:sticky;top:0;z-index:10;
  backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(148,163,184,.08);
}
.topline{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;}
.page-title{font-size:25px;font-weight:700;letter-spacing:0;line-height:1.2;}
.page-sub{font-size:13px;color:var(--text3);margin-top:3px;line-height:1.4;}
.lesson-pill{
  font-family:var(--mono);font-size:10px;white-space:nowrap;
  color:var(--accent);background:var(--accent-dim);
  border:1px solid rgba(91,140,255,.30);border-radius:999px;padding:5px 11px;
}
.card{background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--border);border-radius:var(--r2);padding:16px;box-shadow:var(--shadow);}
.mini-note{
  margin:0 16px 12px;padding:12px 14px;border-radius:var(--r);
  border:1px solid var(--border);background:rgba(17,23,34,.72);
  color:var(--text2);font-size:12px;line-height:1.45;
}

.quiz-wrap{padding:16px 16px calc(24px + env(safe-area-inset-bottom,0px));}
.start-card{text-align:center;}
.start-kicker{
  color:var(--purple);background:var(--purple-dim);border:1px solid rgba(181,140,255,.28);
  display:inline-flex;border-radius:999px;padding:5px 11px;font-family:var(--mono);font-size:10px;margin-bottom:14px;
}
.start-title{font-size:24px;font-weight:700;margin-bottom:6px;}
.start-sub{font-size:13px;color:var(--text3);line-height:1.45;margin-bottom:16px;}
.word-preview{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:18px;}
.word-chip{
  border:1px solid var(--border);background:rgba(9,11,16,.72);border-radius:999px;
  color:var(--text2);font-size:12px;padding:5px 9px;
}
.quiz-main{display:none;}
.quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;}
.quiz-counter{font-family:var(--mono);font-size:12px;color:var(--text3);}
.quiz-cat{font-family:var(--mono);font-size:10px;padding:3px 10px;border-radius:20px;color:var(--purple);background:var(--purple-dim);white-space:nowrap;}
.quiz-dots{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px;}
.qdot{width:8px;height:8px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);}
.qdot.c{background:var(--green);border-color:var(--green);}
.qdot.w{background:var(--red);border-color:var(--red);}
.qdot.cur{border-color:var(--accent);}
.quiz-q{font-size:18px;font-weight:500;line-height:1.5;margin-bottom:6px;}
.quiz-hint{font-size:12px;color:var(--text3);font-family:var(--mono);margin-bottom:20px;line-height:1.45;}
.quiz-opts{display:flex;flex-direction:column;gap:8px;}
.qopt{
  width:100%;padding:13px 16px;border-radius:var(--r);border:1px solid var(--border);
  background:rgba(18,25,35,.9);color:var(--text2);font-size:13px;text-align:left;
  cursor:pointer;transition:transform .15s,border-color .15s,background .15s,color .15s;line-height:1.45;
}
.qopt:active{transform:scale(.99);}
.qopt:hover{border-color:var(--border2);background:var(--card2);color:var(--text);}
.qopt.c{background:var(--green-dim);border-color:var(--green);color:var(--green);}
.qopt.w{background:var(--red-dim);border-color:var(--red);color:var(--red);}
.quiz-fb{margin-top:14px;padding:12px 16px;border-radius:var(--r);font-size:13px;line-height:1.5;display:none;}
.quiz-fb.show{display:block;}
.quiz-fb.ok{background:var(--green-dim);border:1px solid rgba(43,207,114,.3);color:var(--green);}
.quiz-fb.no{background:var(--red-dim);border:1px solid rgba(232,69,69,.3);color:#f07070;}
.quiz-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.quiz-score-box{display:none;background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--border);border-radius:var(--r2);padding:20px;text-align:center;box-shadow:var(--shadow);}
.quiz-score-num{font-family:var(--mono);font-size:44px;font-weight:700;}
.quiz-score-pct{font-size:13px;color:var(--text3);margin-top:4px;}
.result-list{display:flex;flex-direction:column;gap:8px;margin-top:14px;text-align:left;}
.result-item{padding:10px 12px;border-radius:var(--r);background:var(--red-dim);border:1px solid rgba(232,69,69,.25);font-size:12px;line-height:1.45;color:#f0a0a0;}
.result-item.ok{background:var(--green-dim);border-color:rgba(43,207,114,.25);color:var(--green);}
.result-item b{color:var(--text);font-weight:600;}

.homework-wrap{padding:16px 16px calc(26px + env(safe-area-inset-bottom,0px));display:flex;flex-direction:column;gap:12px;}
.hw-card{background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;box-shadow:var(--shadow);}
.hw-title{font-size:14px;font-weight:650;margin-bottom:6px;}
.hw-help{font-size:12px;color:var(--text3);line-height:1.45;margin-bottom:10px;}
.hw-task{font-size:13px;color:var(--text2);line-height:1.55;margin-bottom:10px;}
.hw-textarea{
  width:100%;min-height:116px;resize:vertical;border-radius:var(--r);
  border:1px solid var(--border);background:rgba(9,11,16,.82);color:var(--text);
  padding:12px;font-size:14px;line-height:1.5;outline:none;
}
.hw-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim);}
.hw-status{display:none;padding:12px 14px;border-radius:var(--r);font-size:13px;line-height:1.45;}
.hw-status.show{display:block;}
.hw-status.ok{background:var(--green-dim);border:1px solid rgba(43,207,114,.3);color:var(--green);}
.hw-status.no{background:var(--amber-dim);border:1px solid rgba(245,166,35,.3);color:var(--amber);}
.inline-tags{display:flex;gap:6px;flex-wrap:wrap;}
.inline-tag{
  display:inline-flex;align-items:center;gap:5px;margin:2px 0;padding:4px 8px;
  border:1px solid var(--border);border-radius:999px;color:var(--accent);
  background:var(--accent-dim);font-size:12px;
}
.grammar-line{margin-bottom:8px;}
.grammar-line b{font-weight:650;color:var(--text);}
.grammar-formula{font-family:var(--mono);color:var(--accent);font-size:12px;}

.btn{
  min-height:44px;padding:11px 18px;border-radius:var(--r);border:1px solid var(--border);
  background:rgba(255,255,255,.03);color:var(--text2);font-size:13px;cursor:pointer;
  transition:transform .15s,border-color .15s,background .15s,color .15s;display:flex;align-items:center;gap:6px;justify-content:center;
}
.btn:active{transform:scale(.98);}
.btn:hover{border-color:var(--border2);color:var(--text);}
.btn-primary{background:linear-gradient(180deg,#6695ff,var(--accent));color:#fff;border-color:rgba(91,140,255,.82);box-shadow:0 10px 26px rgba(91,140,255,.24);}
.btn-full{width:100%;}
.btn-grow{flex:1 1 160px;}

.error-wrap{
  min-height:100%;display:flex;align-items:center;justify-content:center;
  padding:calc(24px + env(safe-area-inset-top,0px)) 16px calc(24px + env(safe-area-inset-bottom,0px));
}
.error-card{width:100%;max-width:440px;text-align:center;}
.error-code{
  display:inline-flex;align-items:center;justify-content:center;
  width:44px;height:44px;border-radius:50%;margin-bottom:12px;
  color:var(--red);background:var(--red-dim);border:1px solid rgba(232,69,69,.3);
  font-family:var(--mono);font-weight:700;
}
.error-title{font-size:20px;font-weight:700;margin-bottom:8px;}
.error-text{font-size:13px;color:var(--text3);line-height:1.45;}

@media(min-width:600px){
  .page-title{font-size:28px;}
  .quiz-actions{flex-wrap:nowrap;}
}
</style>
</head>
<body>
<section id="quiz-page" class="page">
  <div class="shell">
    <div class="page-header">
      <div class="topline">
        <div>
          <div class="page-title" id="quiz-title"></div>
          <div class="page-sub" id="quiz-sub"></div>
        </div>
        <div class="lesson-pill" id="quiz-pill"></div>
      </div>
    </div>

    <main class="quiz-wrap">
      <div id="quiz-start" class="card start-card">
        <div class="start-kicker" id="start-kicker"></div>
        <div class="start-title" id="start-title"></div>
        <div class="start-sub" id="start-sub"></div>
        <div class="word-preview" id="word-preview"></div>
        <button class="btn btn-primary btn-full" id="quiz-start-btn"></button>
      </div>

      <div id="quiz-main" class="quiz-main">
        <div class="quiz-header">
          <span class="quiz-counter" id="q-counter"></span>
          <span class="quiz-cat" id="q-cat"></span>
        </div>
        <div class="quiz-dots" id="q-dots"></div>
        <div class="quiz-q" id="q-text"></div>
        <div class="quiz-hint" id="q-hint"></div>
        <div class="quiz-opts" id="q-opts"></div>
        <div class="quiz-fb" id="q-fb"></div>
        <div class="quiz-actions">
          <button class="btn btn-primary btn-grow" id="q-next"></button>
        </div>
      </div>

      <div id="quiz-score-box" class="quiz-score-box">
        <div class="quiz-score-num" id="q-score-num"></div>
        <div class="quiz-score-pct" id="q-score-pct"></div>
        <div class="quiz-score-pct" id="q-score-detail"></div>
        <div id="wrong-items-box" class="result-list"></div>
        <div class="quiz-actions">
          <button class="btn btn-primary btn-grow" id="q-retry"></button>
          <button class="btn btn-grow" id="q-return"></button>
        </div>
      </div>
    </main>
  </div>
</section>

<section id="homework-page" class="page">
  <div class="shell">
    <div class="page-header">
      <div class="topline">
        <div>
          <div class="page-title" id="hw-page-title"></div>
          <div class="page-sub" id="hw-page-sub"></div>
        </div>
        <div class="lesson-pill" id="hw-pill"></div>
      </div>
    </div>

    <main class="homework-wrap">
      <div class="mini-note" id="hw-lesson-note"></div>

      <div class="hw-card">
        <div class="hw-title" id="hw-vocab-title"></div>
        <div class="hw-help" id="hw-vocab-help"></div>
        <div class="hw-task" id="hw-vocab-task"></div>
        <textarea class="hw-textarea" id="hw-vocab-answer" autocomplete="off"></textarea>
      </div>

      <div class="hw-card">
        <div class="hw-title" id="hw-grammar-title"></div>
        <div class="hw-help" id="hw-grammar-help"></div>
        <div class="hw-task" id="hw-grammar-task"></div>
        <textarea class="hw-textarea" id="hw-grammar-answer" autocomplete="off"></textarea>
      </div>

      <div class="hw-card">
        <div class="hw-title" id="hw-translation-title"></div>
        <div class="hw-help" id="hw-translation-help"></div>
        <div class="hw-task" id="hw-translation-task"></div>
        <textarea class="hw-textarea" id="hw-translation-answer" autocomplete="off"></textarea>
      </div>

      <div id="hw-status" class="hw-status"></div>
      <button class="btn btn-primary btn-full" id="hw-submit-btn"></button>
      <button class="btn btn-full" id="hw-return-btn" style="display:none;"></button>
    </main>
  </div>
</section>

<section id="error-page" class="page">
  <div class="error-wrap">
    <div class="card error-card">
      <div class="error-code">!</div>
      <div class="error-title" id="error-title"></div>
      <div class="error-text" id="error-text"></div>
      <div class="quiz-actions">
        <button class="btn btn-primary btn-full" id="error-return"></button>
      </div>
    </div>
  </div>
</section>

    no,

    formula,
    example,
    pinyin,
    translation: { uz, ru, tj },
    quiz

}

    homework: translations ? { translations } : null

function t(key, vars = {}) {

}

function text(value) {

function allWords() {

function uniqueBy(list, getter) {
  const seen = new Set();
  return list.filter(item => {
    const value = getter(item);
    if (!value || seen.has(value)) return false;
    seen.add(value);
    return true;
  });
}

function seededIndex(seed, max) {
  let hash = 0;
  for (let i = 0; i < seed.length; i += 1) hash = (hash * 31 + seed.charCodeAt(i)) >>> 0;
  return max ? hash % max : 0;
}

function shuffle(list, seed) {
  const arr = [...list];
  for (let i = arr.length - 1; i > 0; i -= 1) {
    const j = seededIndex(`${seed}-${i}`, i + 1);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function optionSet(correct, pool, seed) {
  const values = uniqueBy([correct, ...shuffle(pool, seed)], item => item).slice(0, 4);
  while (values.length < 4) values.push(`${correct} ${values.length}`);
  return shuffle(values, `${seed}-opts`);
}

function wordPool(exceptWord, field) {
  return allWords()
    .filter(word => word.h !== exceptWord.h)
    .map(word => field === "meaning" ? text(word.m) : word[field])
    .filter(Boolean);
}

function makeWordQuestion(word, type, index) {
  const meaning = text(word.m);
  const seed = `${lesson.id}-${word.h}-${type}-${index}`;
  let question = "";
  let category = "Vocabulary";
  let answer = "";
  let options = [];

  if (type === "hanzi_to_meaning") {
    answer = meaning;
    question = t("meaningQuestion", { hanzi: word.h });
    options = optionSet(answer, wordPool(word, "meaning"), seed);
  }
  if (type === "meaning_to_hanzi") {
    answer = word.h;
    question = t("meaningToHanziQuestion", { meaning });
    options = optionSet(answer, wordPool(word, "h"), seed);
  }
  if (type === "pinyin_to_hanzi") {
    answer = word.h;
    question = t("pinyinQuestion", { pinyin: word.p });
    options = optionSet(answer, wordPool(word, "h"), seed);
  }
  if (type === "hanzi_to_pinyin") {
    answer = word.p;
    question = t("hanziToPinyinQuestion", { hanzi: word.h });
    options = optionSet(answer, wordPool(word, "p"), seed);
  }

  return {
    type,
    word: word.h,
    category,
    question,
    hint: t("answerPrompt"),
    options,
    answer,
    explanation: t("vocabExplanation", { hanzi: word.h, meaning, pinyin: word.p })
  };
}

function makeGrammarQuestions() {
  return activeGrammar()
    .filter(item => item.quiz)
    .map((item, index) => ({
      type: "gap_fill",
      category: "Grammar",
      question: t("gapQuestion", { prompt: item.quiz.prompt }),
      hint: item.formula,
      options: shuffle(item.quiz.options, `${lesson.id}-grammar-${index}`),
      answer: item.quiz.answer,
      explanation: t("grammarExplanation", { formula: item.formula, example: item.example })
    }));
}

function buildQuiz() {
  const apiQuestions = apiQuizQuestions();
  if (apiQuestions.length) {
    return selectQuizQuestions(apiQuestions, apiQuestions.length, `hsk1-api-${lesson.id}-${activeBlock?.no || "all"}-${lang}`);
  }

  const types = ["hanzi_to_meaning", "meaning_to_hanzi", "pinyin_to_hanzi", "hanzi_to_pinyin"];
  const wordQuestions = [];
  const words = activeWords();
  const grammarQuestions = makeGrammarQuestions();
  types.forEach((_, passIndex) => {
    words.forEach((word, wordIndex) => {
      wordQuestions.push(makeWordQuestion(word, types[(wordIndex + passIndex) % types.length], wordIndex));
    });
  });

  const targetCount = activeBlock ? Math.min(6, Math.max(4, words.length * 2 + grammarQuestions.length)) : 10;
  return selectQuizQuestions(
    [...wordQuestions, ...grammarQuestions],
    targetCount,
    `hsk1-${lesson.id}-${activeBlock?.no || "all"}-${lang}`
  );
}

function quizQuestionKey(item) {
  return `${item.type || item.category || ""}:${item.question || ""}`;
}

function quizWordKey(item) {
  return item.word || "";
}

function isGrammarQuestion(item) {
  const type = String(item.type || "");
  const category = String(item.category || "").toLowerCase();
  return type.startsWith("grammar") || category.includes("grammar") || category.includes("grammatika") || category.includes("грам");
}

function selectQuizQuestions(pool, targetCount, seed) {
  const shuffled = shuffle(pool, seed);
  const selected = [];
  const seenQuestions = new Set();
  const seenWords = new Set();
  const grammarLimit = activeBlock ? 1 : 2;
  let grammarCount = 0;

  function tryPick(item, { allowSameWord = false, allowExtraGrammar = false } = {}) {
    const questionKey = quizQuestionKey(item);
    if (!questionKey || seenQuestions.has(questionKey)) return false;
    const grammar = isGrammarQuestion(item);
    if (grammar && !allowExtraGrammar && grammarCount >= grammarLimit) return false;
    const wordKey = quizWordKey(item);
    if (wordKey && !allowSameWord && seenWords.has(wordKey)) return false;

    selected.push({ ...item });
    seenQuestions.add(questionKey);
    if (wordKey) seenWords.add(wordKey);
    if (grammar) grammarCount += 1;
    return true;
  }

  shuffled.forEach(item => {
    if (selected.length < targetCount) tryPick(item);
  });
  shuffled.forEach(item => {
    if (selected.length < targetCount) tryPick(item, { allowSameWord: true });
  });
  shuffled.forEach(item => {
    if (selected.length < targetCount) tryPick(item, { allowSameWord: true, allowExtraGrammar: true });
  });
  return selected.slice(0, targetCount);
}

function renderQuestion() {
  const item = quizQuestions[quizIndex];
  if (!item) {
    showResult();
    return;
  }

  document.getElementById("q-counter").textContent = `${t("question")} ${quizIndex + 1}/${quizQuestions.length}`;
  document.getElementById("q-cat").textContent = item.category;
  document.getElementById("q-text").textContent = item.question;
  document.getElementById("q-hint").textContent = item.hint || "";
  document.getElementById("q-next").textContent = t("nextQuestion");
  document.getElementById("q-next").style.display = "none";
  document.getElementById("q-next").onclick = nextQuestion;
  document.getElementById("q-fb").className = "quiz-fb";
  document.getElementById("q-fb").textContent = "";

  document.getElementById("q-dots").innerHTML = quizQuestions.map((question, index) => {
    let klass = "qdot";
    if (index < quizIndex) klass += question.correct ? " c" : " w";
    if (index === quizIndex) klass += " cur";
    return `<div class="${klass}"></div>`;
  }).join("");

  document.getElementById("q-opts").innerHTML = item.options.map(option => (
    `<button class="qopt" type="button" data-value="${escapeAttr(option)}">${escapeHTML(option)}</button>`
  )).join("");
  document.querySelectorAll(".qopt").forEach(button => {
    button.addEventListener("click", () => answerQuestion(button.dataset.value));
  });
  answered = false;
}

function answerQuestion(value) {
  if (answered) return;
  answered = true;
  const item = quizQuestions[quizIndex];
  const ok = value === item.answer;
  item.correct = ok;
  item.selected = value;
  item.selectedIndex = item.options.indexOf(value);
  if (ok) quizScore += 1;

  document.querySelectorAll(".qopt").forEach(button => {
    button.disabled = true;
    if (button.dataset.value === item.answer) button.classList.add("c");
    if (button.dataset.value === value && !ok) button.classList.add("w");
  });

  if (!ok) {
    wrongItems.push({
      lesson_id: lesson.id,
      block_no: activeBlock?.no || null,
      type: item.type,
      question: item.question,
      selected_answer: value,
      correct_answer: item.answer,
      explanation: item.explanation
    });
  }

  const fb = document.getElementById("q-fb");
  fb.className = `quiz-fb show ${ok ? "ok" : "no"}`;
  fb.textContent = `${ok ? t("explanationPrefixCorrect") : t("explanationPrefixWrong")}${item.explanation}`;
  document.getElementById("q-next").style.display = "flex";
}

function nextQuestion() {
  quizIndex += 1;
  if (quizIndex >= quizQuestions.length) showResult();
  else renderQuestion();
}

function showResult() {
  const total = quizQuestions.length;
  const percent = total ? Math.round((quizScore / total) * 100) : 0;
  document.getElementById("quiz-main").style.display = "none";
  document.getElementById("quiz-score-box").style.display = "block";
  document.getElementById("q-score-num").textContent = t("scoreLine", { score: quizScore, total });
  document.getElementById("q-score-pct").textContent = t("percentLine", { percent });
  document.getElementById("q-score-detail").textContent = t("resultDetail", { correct: quizScore, wrong: total - quizScore });
  document.getElementById("q-retry").textContent = t("retry");
  document.getElementById("q-return").textContent = t("returnToBot");
  document.getElementById("q-retry").onclick = startQuiz;
  document.getElementById("q-return").onclick = returnToBot;
  document.getElementById("wrong-items-box").innerHTML = wrongItems.length ? wrongItems.map((item, index) => (
    `<div class="result-item">
      <b>${index + 1}. ${escapeHTML(item.question)}</b><br>
      ${t("yourAnswer")}: ${escapeHTML(item.selected_answer)}<br>
      ${t("correctAnswer")}: ${escapeHTML(item.correct_answer)}
    </div>`
  )).join("") : `<div class="result-item ok">${t("noWrong")}</div>`;

  reportEvent("quiz_completed", {
    lesson_id: lesson.id,
    block_no: activeBlock?.no || null,
    score: quizScore,
    total,
    percent,
    answers: quizQuestions.map(item => ({
      question_id: item.questionId || null,
      selected_index: item.selectedIndex,
      selected_answer: item.selected || ""
    })),
    wrong_items: wrongItems
  });
}

  document.getElementById("hw-grammar-title").textContent = t("grammarTaskTitle");
  document.getElementById("hw-grammar-help").textContent = t("grammarTaskHelp");
  document.getElementById("hw-translation-title").textContent = t("translationTaskTitle");
  document.getElementById("hw-translation-help").textContent = t("translationTaskHelp");
  document.getElementById("hw-vocab-answer").placeholder = t("writeAnswer") + "\n" + t("vocabPlaceholder");
  document.getElementById("hw-grammar-answer").placeholder = t("writeAnswer") + "\n" + t("grammarPlaceholder");
  document.getElementById("hw-translation-answer").placeholder = t("writeAnswer") + "\n" + t("translationPlaceholder");
  document.getElementById("hw-submit-btn").textContent = t("submitHomework");
  document.getElementById("hw-return-btn").textContent = t("returnToBot");
  document.getElementById("hw-submit-btn").onclick = submitHomework;
  document.getElementById("hw-return-btn").onclick = returnToBot;

  const words = activeWords();
  const grammarItems = activeGrammar();
  const translations = activeTranslations();

  document.getElementById("hw-vocab-task").innerHTML = `<div class="inline-tags">${words.slice(0, 8).map(word => (
    `<span class="inline-tag">${word.h} · ${word.p}</span>`
  )).join("")}</div>`;
  document.getElementById("hw-grammar-task").innerHTML = grammarItems.map(item => (
    `<div class="grammar-line"><b>${escapeHTML(item.title)}</b><br><span class="grammar-formula">${escapeHTML(item.formula)}</span><br>${escapeHTML(item.example)} · ${escapeHTML(item.pinyin)}</div>`
  )).join("");
  document.getElementById("hw-translation-task").innerHTML = translations.map((line, index) => (
    `<div>${index + 1}. ${escapeHTML(line)}</div>`
  )).join("");
}

async function submitHomework() {
  const vocabAnswer = document.getElementById("hw-vocab-answer").value.trim();
  const grammarAnswer = document.getElementById("hw-grammar-answer").value.trim();
  const translationAnswer = document.getElementById("hw-translation-answer").value.trim();
  const status = document.getElementById("hw-status");

  if (!vocabAnswer || !grammarAnswer || !translationAnswer) {
    status.className = "hw-status show no";
    status.textContent = t("fillAll");
    return;
  }

  const answers = {
    vocab_sentences: vocabAnswer,
    grammar_sentences: grammarAnswer,
    translations: translationAnswer
  };

  const delivered = await reportEvent("homework_submitted", {
    lesson_id: lesson.id,
    block_no: activeBlock?.no || null,
    answers,
    submitted_at: new Date().toISOString()
  });

  status.className = `hw-status show ${delivered ? "ok" : "no"}`;
  status.textContent = delivered ? t("submitted") : `${t("submitted")} ${t("internetError")}`;
  try {
    const key = "hsk1_homework_submissions";
    const old = JSON.parse(localStorage.getItem(key) || "[]");
    old.push({ lesson_id: lesson.id, block_no: activeBlock?.no || null, answers, submitted_at: new Date().toISOString() });
    localStorage.setItem(key, JSON.stringify(old));
  } catch (e) {}
  document.getElementById("hw-submit-btn").style.display = "none";
  document.getElementById("hw-return-btn").style.display = "flex";
}

async function reportEvent(eventName, payload = {}) {
  const tg = window.Telegram?.WebApp;
  const eventPayload = {
    level: "hsk1",
    event: eventName,
    ...payload,
    created_at: new Date().toISOString()
  };

  try {
    const res = await fetch("/api/miniapp/event", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-Telegram-Init-Data": tg?.initData || ""
      },
      body: JSON.stringify(eventPayload)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return true;
  } catch (e) {
    if (eventName !== "app_error") {
      reportAppError(e, { source: "report_event_failed", failed_event: eventName });
    }
    if ((eventName === "quiz_completed" || eventName === "homework_submitted") && tg?.sendData) {
      try {
        tg.sendData(JSON.stringify(eventPayload));
      } catch (_e) {}
    }
    const pending = safeJSON("hsk1_pending_events", []);
    pending.push(eventPayload);
    localStorage.setItem("hsk1_pending_events", JSON.stringify(pending));
    return false;
  }
}

function serializeError(error) {
  if (error instanceof Error) {
    return {
      name: error.name || "Error",
      message: error.message || "",
      stack: error.stack || ""
    };
  }
  if (typeof error === "object" && error !== null) {
    let message = "";
    try {
      message = error.message || JSON.stringify(error);
    } catch (e) {
      message = String(error);
    }
    return {
      name: error.name || "Error",
      message,
      stack: error.stack || ""
    };
  }
  return {
    name: "Error",
    message: String(error || "Unknown error"),
    stack: ""
  };
}

function reportAppError(error, extra = {}) {
  const details = serializeError(error);
  return reportEvent("app_error", {
    lesson_id: lesson?.id || lessonId || null,
    block_no: activeBlock?.no || blockNo || null,
    mode,
    source: extra.source || "miniapp_error",
    error_name: details.name,
    error_message: details.message,
    stack: details.stack,
    url: window.location.href,
    user_agent: navigator.userAgent,
    extra
  });
}

window.addEventListener("error", event => {
  reportAppError(event.error || event.message, {
    source: "window_error",
    filename: event.filename,
    lineno: event.lineno,
    colno: event.colno
  });
});

window.addEventListener("unhandledrejection", event => {
  reportAppError(event.reason, { source: "unhandledrejection" });
});

async function flushPendingEvents() {
  const pending = safeJSON("hsk1_pending_events", []);
  if (!pending.length) return;
  const remaining = [];
  for (const item of pending) {
    try {
      const res = await fetch("/api/miniapp/event", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-Telegram-Init-Data": tg?.initData || ""
        },
        body: JSON.stringify(item)
      });
      if (!res.ok) remaining.push(item);
    } catch (e) {
      remaining.push(item);
    }
  }
  localStorage.setItem("hsk1_pending_events", JSON.stringify(remaining));
}

function returnToBot() {
  reportEvent("bot_return_clicked", {
    lesson_id: lesson?.id || lessonId || null,
    block_no: activeBlock?.no || null,
    mode
  }).finally(() => {
    if (window.Telegram?.WebApp) {
      Telegram.WebApp.close();
    }
  });
}

function renderError() {
  document.documentElement.lang = lang;
  document.getElementById("error-title").textContent = t("lessonNotFoundTitle");
  document.getElementById("error-text").textContent = t("lessonNotFound");
  document.getElementById("error-return").textContent = t("returnToBot");
  document.getElementById("error-return").onclick = returnToBot;
  reportAppError("lesson_not_found_or_invalid_mode", {
    source: "render_error",
    raw_lesson: rawLesson,
    raw_block: rawBlock,
    mode
  });
  showPage("error-page");
}

function safeJSON(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) {
    return fallback;
  }
}

function escapeHTML(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function escapeAttr(value) {
  return escapeHTML(value).replaceAll("`", "&#096;");
}

async function init() {
  document.documentElement.lang = lang;
  await flushPendingEvents();
  if (!isValid) {
    renderError();
    return;
  }
  if (window.CourseMiniAppV2) {
    await window.CourseMiniAppV2.start({
      level: "hsk1",
      lessonId: lesson.id,
      blockNo: activeBlock?.no || null,
      mode,
      lang,
      pendingKey: "hsk1_pending_events"
    });
    return;
  }
  await loadMiniLessonData();
  renderHeader();
  if (mode === "quiz") {
    startQuiz();
    showPage("quiz-page");
  }
  if (mode === "homework") {
    renderHomework();
    showPage("homework-page");
  }
}

init();
</script>
