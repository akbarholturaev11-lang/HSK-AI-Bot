<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>HSK AI</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.30.0/tabler-icons.min.css" rel="stylesheet">
<style>
:root{--ink:#211D17;--ink2:#6E665B;--ink3:#A89E8E;--paper:#FBF7EF;--card:#FFFFFF;--line:#EAE2D4;--cin:#C2403A;--cin2:#9A2F2B;--cinbg:#FBEDEA;--gold:#C2962F;--goldbg:#F8F0DA;--jade:#2F7D5E;--safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--paper);color:var(--ink);font-family:-apple-system,"SF Pro Text","Segoe UI",Roboto,sans-serif}
.han{font-family:"Songti SC","STSong","Noto Serif SC",serif;font-weight:600}
.wrap{max-width:480px;margin:0 auto;min-height:100vh;padding-top:var(--safe-t);display:flex;flex-direction:column}
.top{display:flex;align-items:center;gap:11px;padding:16px 16px 4px}
.bk{width:30px;height:30px;border-radius:50%;border:1px solid var(--line);background:var(--card);color:var(--ink2);font-size:17px;line-height:1;flex-shrink:0}
.pbar{flex:1;height:9px;background:var(--line);border-radius:6px;overflow:hidden}
.pbar>i{display:block;height:100%;background:var(--cin);border-radius:6px;width:50%;transition:width .35s}
.guide{display:flex;align-items:flex-end;gap:10px;padding:14px 18px 2px}
.panda{width:60px;height:60px;flex-shrink:0}
.bub{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;border-bottom-left-radius:3px;padding:11px 14px;font-size:14px;line-height:1.4}
.body{flex:1;overflow-y:auto;padding:14px 16px 0}
.lv{display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:var(--card);border:2px solid var(--line);border-radius:15px;padding:14px;margin-bottom:11px;font-family:inherit;color:var(--ink)}
.lv .glyph{width:46px;height:46px;border-radius:12px;background:var(--paper);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.lv .ot{flex:1}.lv .ot .hd{font-size:15px;font-weight:500;display:flex;align-items:center;gap:7px}.lv .ot small{font-size:12px;color:var(--ink2)}
.lv .chk{width:24px;height:24px;border-radius:50%;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;flex-shrink:0}
.lv.sel{border-color:var(--cin);background:var(--cinbg)}.lv.sel .glyph{background:#fff}.lv.sel .chk{background:var(--cin);border-color:var(--cin)}
.tag{background:var(--gold);color:#3a2c08;font-size:10px;font-weight:500;padding:2px 8px;border-radius:9px}
.hint{text-align:center;font-size:12px;color:var(--ink3);margin:4px 6px 12px}.hint a{color:var(--cin);font-weight:500}
.cta{margin:10px 16px calc(12px + var(--safe-b));padding:15px;background:var(--cin);color:#fff;border:none;border-radius:15px;font-family:inherit;font-size:16px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:8px}
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px 28px}
.welcome .big{width:140px;height:140px;margin-bottom:8px}
.welcome h1{font-size:27px;margin:6px 0 6px}.welcome p{font-size:15px;color:var(--ink2);margin:0;line-height:1.5}
.recap{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px;width:100%;margin-top:12px;display:flex;align-items:center;gap:12px}
.recap .glyph{width:46px;height:46px;border-radius:12px;background:var(--cinbg);color:var(--cin);display:flex;align-items:center;justify-content:center;font-size:22px}
.recap b{font-size:16px;font-weight:500;display:block}.recap small{font-size:12px;color:var(--ink2)}
.pd-breathe{animation:pdBreathe 2.6s ease-in-out infinite;transform-origin:50% 100%}
.pd-bounce{animation:pdBounce .7s ease-in-out infinite;transform-origin:50% 100%}
@keyframes pdBreathe{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.02) translateY(-1px)}}
@keyframes pdBounce{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-6px) scale(1.03)}}
.pd-blink{animation:pdBlink 4.2s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
@keyframes pdBlink{0%,90%,100%{transform:scaleY(0)}94%{transform:scaleY(1)}}
.pd-twinkle{animation:pdTwinkle 1.1s ease-in-out infinite}
@keyframes pdTwinkle{0%,100%{opacity:.25;transform:scale(.7)}50%{opacity:1;transform:scale(1.1)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top" id="top" style="display:none"><button class="bk" onclick="back()" aria-label="orqaga"><i class="ti ti-arrow-left"></i></button><div class="pbar"><i id="prog"></i></div></div>
  <div id="stage"></div>
  <button class="cta" id="cta" onclick="nextBtn()">Boshlash</button>
</div>
<script>
var params=new URLSearchParams(location.search||"");
var LANG=(params.get("lang")||"ru");if(["uz","ru","tj"].indexOf(LANG)<0)LANG="ru";
var L={ru:{boot:"HSK 1 с нуля — учите китайский каждый день по несколько минут с пандой 阿宝.",ask:"С какого уровня начнём? Не знаешь — начни с HSK 1.",placement:"Не знаете уровень? Короткий тест",start:"Начать",cont:"Продолжить",ready:"Готово!",readySub:"Начнём с первого урока.",first:"Начать первый урок",rec:"Рекомендуем"},
  uz:{boot:"HSK 1 noldan — har kuni bir necha daqiqada panda 阿宝 bilan xitoy tilini o'rganing.",ask:"Qaysi darajadan boshlaymiz? Bilmasang — HSK 1 dan ket.",placement:"Darajangni bilmaysanmi? Qisqa test",start:"Boshlash",cont:"Davom etish",ready:"Tayyor!",readySub:"Birinchi darsdan boshlaymiz.",first:"Birinchi darsni boshlash",rec:"Tavsiya"},
  tj:{boot:"HSK 1 аз сифр — ҳар рӯз чанд дақиқа бо панда 阿宝 хитоиро омӯзед.",ask:"Аз кадом сатҳ оғоз кунем? Намедонӣ — аз HSK 1.",placement:"Сатҳро намедонед? Тести кӯтоҳ",start:"Оғоз",cont:"Идома",ready:"Тайёр!",readySub:"Аз дарси аввал оғоз мекунем.",first:"Оғози дарси аввал",rec:"Тавсия"}}[LANG];
var tg=window.Telegram&&window.Telegram.WebApp;if(tg){try{tg.ready();tg.expand()}catch(e){}}
function panda(m){
  var eyes='<circle cx="36" cy="37" r="3.3" fill="#fff"/><circle cx="54" cy="37" r="3.3" fill="#fff"/><circle cx="36" cy="37" r="1.8" fill="#211D17"/><circle cx="54" cy="37" r="1.8" fill="#211D17"/><rect class="pd-blink" x="32" y="31" width="8" height="9" rx="3" fill="#211D17"/><rect class="pd-blink" x="50" y="31" width="8" height="9" rx="3" fill="#211D17"/>';
  var mouth,armL,armR,pawL,pawR,decor="",bodyCls="pd-breathe";
  if(m==="cheer"){
    eyes='<path d="M31 37 q5 -6 10 0" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round"/><path d="M49 37 q5 -6 10 0" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round"/>';
    mouth='<path d="M38 48 q7 6 14 0" stroke="#211D17" stroke-width="2.2" fill="none" stroke-linecap="round"/>';
    armL="M30 50 q-10 -8 -14 -20";armR="M60 50 q10 -8 14 -20";pawL=[16,28];pawR=[74,28];bodyCls="pd-bounce";
    decor='<path class="pd-twinkle" style="animation-delay:0s" transform="translate(14,14)" d="M0 -4 L1 -1 L4 0 L1 1 L0 4 L-1 1 L-4 0 L-1 -1 Z" fill="#E8B84B"/><path class="pd-twinkle" style="animation-delay:.3s" transform="translate(76,10)" d="M0 -3 L.8 -.8 L3 0 L.8 .8 L0 3 L-.8 .8 L-3 0 L-.8 -.8 Z" fill="#E8B84B"/><path class="pd-twinkle" style="animation-delay:.6s" transform="translate(45,4)" d="M0 -3 L.8 -.8 L3 0 L.8 .8 L0 3 L-.8 .8 L-3 0 L-.8 -.8 Z" fill="#E8B84B"/>';
  }else{
    mouth='<path d="M39 49 q6 4 12 0" stroke="#211D17" stroke-width="2" fill="none" stroke-linecap="round"/>';
    armL="M30 52 q-8 6 -9 16";armR="M60 52 q8 6 9 16";pawL=[21,67];pawR=[69,67];
  }
  return '<svg viewBox="0 0 90 96" width="100%" height="100%"><g class="'+bodyCls+'">'
    +'<path d="'+armL+'" fill="none" stroke="#211D17" stroke-width="2"/><path d="'+armR+'" fill="none" stroke="#211D17" stroke-width="2"/>'
    +'<ellipse cx="'+pawL[0]+'" cy="'+pawL[1]+'" rx="4.5" ry="5" fill="#fff" stroke="#211D17" stroke-width="1.6"/><ellipse cx="'+pawR[0]+'" cy="'+pawR[1]+'" rx="4.5" ry="5" fill="#fff" stroke="#211D17" stroke-width="1.6"/>'
    +'<circle cx="25" cy="21" r="10" fill="#211D17"/><circle cx="65" cy="21" r="10" fill="#211D17"/>'
    +'<path d="M31 66 q-3 -22 6 -30 h16 q9 8 6 30 z" fill="#fff" stroke="#211D17" stroke-width="2"/>'
    +'<circle cx="45" cy="36" r="22" fill="#fff" stroke="#211D17" stroke-width="2"/>'
    +'<path d="M33 46 q12 7 24 0 l-2 7 q-10 5 -20 0 z" fill="#C2403A"/>'
    +'<ellipse cx="36" cy="36" rx="6.5" ry="9" fill="#211D17"/><ellipse cx="54" cy="36" rx="6.5" ry="9" fill="#211D17"/>'
    +eyes+'<ellipse cx="45" cy="44" rx="3.4" ry="2.4" fill="#211D17"/>'+mouth+decor
    +'</g></svg>';
}
var LV=[{k:"hsk1",g:"你好",hd:"HSK 1",s:{ru:"С нуля · самый лёгкий",uz:"Noldan · eng oson",tj:"Аз сифр · осонтарин"},rec:1},
  {k:"hsk2",g:"谢谢",hd:"HSK 2",s:{ru:"Базовое общение",uz:"Asosiy suhbat",tj:"Муоширати асосӣ"}},
  {k:"hsk3",g:"明白",hd:"HSK 3",s:{ru:"Повседневное общение",uz:"Kundalik muloqot",tj:"Муоширати ҳаррӯза"}},
  {k:"hsk4",g:"流利",hd:"HSK 4",s:{ru:"Свободное общение",uz:"Erkin muloqot",tj:"Муоширати озод"}}];
var step=0,sel="hsk1";
var INIT_DATA=(tg&&tg.initData)||"";
var ONB_SESSION_ID=(function(){try{var k="hsk_v3_onb_session_id",v=sessionStorage.getItem(k);if(!v){v="onb-"+Date.now()+"-"+Math.random().toString(36).slice(2,8);sessionStorage.setItem(k,v)}return v}catch(e){return"onb-"+Date.now()}})();
function apiHeaders(){return{"Content-Type":"application/json","X-Telegram-Init-Data":INIT_DATA}}
function postJson(url,body){return fetch(url,{method:"POST",headers:apiHeaders(),body:JSON.stringify(body),keepalive:true})}
function trackOnboardingEvent(event,payload){
  if(!INIT_DATA)return Promise.resolve({ok:false,skipped:true});
  payload=payload||{};
  payload.event=event;
  payload.source=payload.source||"course_v3_onboarding";
  payload.level=payload.level||sel;
  payload.session_id=ONB_SESSION_ID;
  payload.language=LANG;
  return postJson("/api/miniapp/event",payload).then(function(r){return r.json()}).catch(function(){return{ok:false}});
}
function onboardingPayload(){
  var dailyMinutes=10,startMode="lesson_1",goal="hsk_exam";
  try{
    dailyMinutes=Number(localStorage.getItem("hsk_v3_daily_minutes")||dailyMinutes)||dailyMinutes;
    startMode=localStorage.getItem("hsk_v3_start_mode")||startMode;
    goal=localStorage.getItem("hsk_v3_goal")||goal;
  }catch(e){}
  return {
    level:sel,
    goal:goal,
    daily_minutes:dailyMinutes,
    daily_time:dailyMinutes,
    start_mode:startMode,
    start_point:startMode,
    language:LANG,
    timezone_offset_minutes:-new Date().getTimezoneOffset()
  };
}
function trv(o){return typeof o==="string"?o:(o[LANG]||o.ru)}
function render(){
  var st=document.getElementById("stage"),cta=document.getElementById("cta");
  document.getElementById("top").style.display=step===0?"none":"flex";
  if(step===0){st.innerHTML='<div class="welcome"><div class="big">'+panda("cheer")+'</div><h1 class="han">HSK AI</h1><p>'+L.boot+'</p></div>';cta.textContent=L.start;return;}
  if(step===1){document.getElementById("prog").style.width="50%";
    var rows=LV.map(function(l){return '<button class="lv'+(sel===l.k?" sel":"")+'" onclick="pick(\''+l.k+'\')"><span class="glyph han">'+l.g+'</span><span class="ot"><span class="hd">'+l.hd+(l.rec?' <span class="tag">'+L.rec+'</span>':"")+'</span><small>'+trv(l.s)+'</small></span><span class="chk"><i class="ti ti-check"></i></span></button>'}).join("");
    st.innerHTML='<div class="guide"><div class="panda">'+panda("happy")+'</div><div class="bub">'+L.ask+'</div></div><div class="body">'+rows+'<div class="hint"><a>'+L.placement+'</a></div></div>';cta.textContent=L.cont;return;}
  document.getElementById("prog").style.width="100%";
  var Lvl=LV.filter(function(x){return x.k===sel})[0];
  st.innerHTML='<div class="welcome"><div class="big">'+panda("cheer")+'</div><h1>'+L.ready+'</h1><p>'+L.readySub+'</p><div class="recap"><span class="glyph han">'+Lvl.g+'</span><div><b>'+Lvl.hd+'</b><small>'+trv(Lvl.s)+'</small></div></div></div>';
  cta.innerHTML='<i class="ti ti-player-play"></i> '+L.first;
}
function pick(k){sel=k;render()}
function nextBtn(){if(step<2){step++;render()}else{finish()}}
function back(){if(step>0){step--;render()}}
function finish(){
  try{localStorage.setItem("hsk_v3_onb","1");localStorage.setItem("hsk_v3_level",sel)}catch(e){}
  var url="/course-v3.html?lang="+LANG+"&level="+sel+"&onboarded=1&tour=1";
  var moved=false;
  function go(){if(moved)return;moved=true;location.href=url}
  if(!INIT_DATA){go();return}
  postJson("/api/miniapp/onboarding",onboardingPayload()).then(function(){go()}).catch(go);
  setTimeout(go,900);
}
trackOnboardingEvent("onboarding_started",{dedupe_key:"started:"+ONB_SESSION_ID,event_id:"started:"+ONB_SESSION_ID});
render();
</script>
</body>
</html>
