<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Yangi so'zlar · Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090b10;
      --card: #121923;
      --card-strong: #172031;
      --ink: #f4f7fb;
      --muted: #aab4c5;
      --faint: #6f7a91;
      --line: rgba(148, 163, 184, .16);
      --line-strong: rgba(148, 163, 184, .28);
      --green: #35d07f;
      --green-soft: rgba(53, 208, 127, .14);
      --blue: #5b8cff;
      --blue-soft: rgba(91, 140, 255, .16);
      --amber: #f2b84b;
      --shadow: 0 18px 48px rgba(0, 0, 0, .30);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 12% -8%, rgba(91, 140, 255, .18), transparent 34%),
        linear-gradient(180deg, #0b0e15 0%, var(--bg) 48%, #07090d 100%);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button {
      font: inherit;
      touch-action: manipulation;
      transition: transform .16s ease, border-color .16s ease, background .16s ease, color .16s ease;
    }

    button:active { transform: scale(.98); }

    .app {
      width: min(100%, 560px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px 16px calc(88px + env(safe-area-inset-bottom));
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      padding-top: env(safe-area-inset-top);
    }

    .eyebrow {
      margin-bottom: 4px;
      color: var(--faint);
      font-size: 13px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: 25px;
      line-height: 1.1;
    }

    .counter {
      flex: 0 0 auto;
      padding: 7px 11px;
      border: 1px solid rgba(53, 208, 127, .30);
      border-radius: 999px;
      background: var(--green-soft);
      color: var(--green);
      font-size: 13px;
      font-weight: 800;
    }

    .word-strip {
      display: flex;
      gap: 8px;
      margin: 0 -16px 16px;
      padding: 0 16px 4px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .word-strip::-webkit-scrollbar { display: none; }

    .word-chip {
      flex: 0 0 auto;
      min-width: 46px;
      padding: 9px 11px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: linear-gradient(180deg, var(--card-strong), var(--card));
      color: var(--ink);
      font-size: 17px;
      font-weight: 700;
    }

    .word-chip.active {
      border-color: var(--green);
      background: linear-gradient(180deg, #39da88, var(--green));
      color: #07110c;
    }

    .card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: linear-gradient(180deg, var(--card-strong), var(--card));
      box-shadow: var(--shadow);
    }

    .practice {
      padding: 18px 14px 16px;
      text-align: center;
    }

    .practice-label {
      color: var(--faint);
      font-size: 13px;
      font-weight: 700;
    }

    .character-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin: 14px 0 12px;
    }

    .character-box {
      position: relative;
      width: min(39vw, 158px);
      height: min(39vw, 158px);
      overflow: hidden;
      border: 1px solid #d8e0dc;
      border-radius: 15px;
      background:
        linear-gradient(90deg, transparent calc(50% - .5px), #d5dfda 50%, transparent calc(50% + .5px)),
        linear-gradient(transparent calc(50% - .5px), #d5dfda 50%, transparent calc(50% + .5px)),
        #fbfdfb;
      transition: border-color .18s ease, box-shadow .18s ease;
    }

    .character-box.active {
      border-color: var(--amber);
      box-shadow: 0 0 0 3px rgba(217, 149, 35, .16);
    }

    .character-target {
      display: grid;
      width: 100%;
      height: 100%;
      place-items: center;
    }

    .stroke-count {
      position: absolute;
      top: 7px;
      right: 7px;
      padding: 4px 7px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .92);
      color: var(--amber);
      font-size: 11px;
      font-weight: 800;
    }

    .character-error {
      display: grid;
      width: 100%;
      height: 100%;
      place-items: center;
      color: #6f7a78;
      font-size: 42px;
      font-weight: 700;
    }

    .status {
      min-height: 20px;
      color: var(--faint);
      font-size: 13px;
    }

    .replay {
      margin-top: 9px;
      padding: 10px 14px;
      border: 1px solid rgba(53, 208, 127, .26);
      border-radius: 12px;
      background: var(--green-soft);
      color: var(--green);
      font-weight: 800;
    }

    .word-info {
      padding: 18px;
      border-top: 1px solid var(--line);
      text-align: center;
    }

    .hanzi {
      margin-bottom: 4px;
      font-size: 33px;
      font-weight: 800;
    }

    .pinyin {
      color: var(--green);
      font-size: 18px;
      font-weight: 750;
    }

    .meaning {
      margin-top: 7px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.4;
    }

    .audio {
      width: 100%;
      margin-top: 16px;
      padding: 13px 15px;
      border: 1px solid rgba(91, 140, 255, .30);
      border-radius: 14px;
      background: rgba(91, 140, 255, .10);
      color: var(--blue);
      font-weight: 800;
    }

    .message {
      padding: 44px 18px;
      color: var(--muted);
      line-height: 1.5;
      text-align: center;
    }

    .bottom-nav {
      position: fixed;
      right: 0;
      bottom: 0;
      left: 0;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--line);
      background: rgba(9, 11, 16, .92);
      backdrop-filter: blur(22px);
    }

    .bottom-inner {
      display: grid;
      width: min(100%, 528px);
      margin: 0 auto;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .nav-button {
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, .03);
      color: var(--muted);
      font-weight: 800;
    }

    .nav-button.primary {
      border-color: var(--green);
      background: linear-gradient(180deg, #39da88, var(--green));
      color: #07110c;
    }

    .nav-button:disabled {
      cursor: default;
      opacity: .42;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <div class="eyebrow" id="context"></div>
        <h1 id="title"></h1>
      </div>
      <div class="counter" id="counter">0 / 0</div>
    </header>

    <div class="word-strip" id="word-strip" aria-label="Vocabulary"></div>

    <section class="card" id="lesson-card">
      <div class="message" id="message"></div>
      <div id="content" hidden>
        <div class="practice">
          <div class="practice-label" id="practice-label"></div>
          <div class="character-grid" id="character-grid"></div>
          <div class="status" id="status"></div>
          <button class="replay" id="replay" type="button"></button>
        </div>
        <div class="word-info">
          <div class="hanzi" id="hanzi"></div>
          <div class="pinyin" id="pinyin"></div>
          <div class="meaning" id="meaning"></div>
          <button class="audio" id="audio" type="button"></button>
        </div>
      </div>
    </section>
  </div>

  <nav class="bottom-nav">
    <div class="bottom-inner">
      <button class="nav-button" id="previous" type="button"></button>
      <button class="nav-button primary" id="next" type="button"></button>
    </div>
  </nav>

  <script>
    const params = new URLSearchParams(location.search);
    const lessonNumber = Number(params.get("lesson") || 0);
    const level = String(params.get("level") || "hsk1").toLowerCase();
    const lang = ["uz", "ru", "tj"].includes(params.get("lang")) ? params.get("lang") : "uz";
    const blockNumber = Number(params.get("block") || 0);
    const vocabPage = Number(params.get("vocab_page") || 0);
    const tg = window.Telegram?.WebApp;
    const HANZI_RE = /[\u3400-\u4dbf\u4e00-\u9fff\uf900-\ufaff]/;
    const ui = {
      uz: {
        title: "Yangi so'zlar",
        lesson: "dars",
        part: "qism",
        loading: "So'zlar yuklanmoqda...",
        empty: "Bu qism uchun yangi so'z topilmadi.",
        failed: "So'zlarni yuklab bo'lmadi. Mini Appni qayta ochib ko'ring.",
        instruction: "Chiziqlarni tartib bilan kuzating",
        replay: "↻ Qayta ko'rish",
        audio: "🔊 Talaffuzni eshitish",
        previous: "← Oldingi",
        next: "Keyingi →",
        strokes: "chiziq",
        animating: "Yozilish tartibi ko'rsatilmoqda",
        done: "Animatsiya tugadi. Qayta ko'rish mumkin.",
        unavailable: "Bu ieroglif animatsiyasini yuklab bo'lmadi.",
        voiceUnavailable: "Bu qurilmada ovozli talaffuz mavjud emas.",
      },
      ru: {
        title: "Новые слова",
        lesson: "урок",
        part: "часть",
        loading: "Загружаем слова...",
        empty: "Для этой части новые слова не найдены.",
        failed: "Не удалось загрузить слова. Откройте Mini App ещё раз.",
        instruction: "Следите за порядком черт",
        replay: "↻ Посмотреть ещё раз",
        audio: "🔊 Послушать произношение",
        previous: "← Назад",
        next: "Далее →",
        strokes: "черт",
        animating: "Показываем порядок написания",
        done: "Анимация завершена. Можно повторить.",
        unavailable: "Не удалось загрузить анимацию иероглифа.",
        voiceUnavailable: "На этом устройстве озвучивание недоступно.",
      },
      tj: {
        title: "Калимаҳои нав",
        lesson: "дарс",
        part: "қисм",
        loading: "Калимаҳо бор шуда истодаанд...",
        empty: "Барои ин қисм калимаи нав ёфт нашуд.",
        failed: "Калимаҳоро бор карда натавонистем. Mini App-ро аз нав кушоед.",
        instruction: "Тартиби хатҳоро пайгирӣ кунед",
        replay: "↻ Аз нав дидан",
        audio: "🔊 Талаффузро шунидан",
        previous: "← Қаблӣ",
        next: "Баъдӣ →",
        strokes: "хат",
        animating: "Тартиби навишт нишон дода мешавад",
        done: "Аниматсия тамом шуд. Аз нав дидан мумкин.",
        unavailable: "Аниматсияи иероглиф бор нашуд.",
        voiceUnavailable: "Дар ин дастгоҳ талаффузи овозӣ дастрас нест.",
      },
    }[lang];
    const elements = {
      context: document.getElementById("context"),
      title: document.getElementById("title"),
      counter: document.getElementById("counter"),
      strip: document.getElementById("word-strip"),
      message: document.getElementById("message"),
      content: document.getElementById("content"),
      practiceLabel: document.getElementById("practice-label"),
      grid: document.getElementById("character-grid"),
      status: document.getElementById("status"),
      replay: document.getElementById("replay"),
      hanzi: document.getElementById("hanzi"),
      pinyin: document.getElementById("pinyin"),
      meaning: document.getElementById("meaning"),
      audio: document.getElementById("audio"),
      previous: document.getElementById("previous"),
      next: document.getElementById("next"),
    };
    const state = {
      words: [],
      index: 0,
      animationToken: 0,
      renderToken: 0,
      writers: [],
    };

    function setText() {
      const context = [`${level.toUpperCase()}`, `${lessonNumber}-${ui.lesson}`];
      if (blockNumber) context.push(`${blockNumber}-${ui.part}`);
      elements.context.textContent = context.join(" · ");
      elements.title.textContent = ui.title;
      elements.practiceLabel.textContent = ui.instruction;
      elements.replay.textContent = ui.replay;
      elements.audio.textContent = ui.audio;
      elements.previous.textContent = ui.previous;
      elements.next.textContent = ui.next;
      showMessage(ui.loading);
    }

    function showMessage(text) {
      elements.message.textContent = text;
      elements.message.hidden = false;
      elements.content.hidden = true;
    }

    function showContent() {
      elements.message.hidden = true;
      elements.content.hidden = false;
    }

    function activeWord() {
      return state.words[state.index] || {};
    }

    function hanziCharacters(word) {
      return Array.from(String(word.zh || "")).filter(char => HANZI_RE.test(char));
    }

    function renderStrip() {
      elements.strip.replaceChildren();
      state.words.forEach((word, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `word-chip${index === state.index ? " active" : ""}`;
        button.textContent = word.zh || "?";
        button.addEventListener("click", () => selectWord(index));
        elements.strip.appendChild(button);
      });
      const activeChip = elements.strip.children[state.index];
      activeChip?.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });
    }

    function renderControls() {
      elements.counter.textContent = `${state.index + 1} / ${state.words.length}`;
      elements.previous.disabled = state.index <= 0;
      elements.next.disabled = state.index >= state.words.length - 1;
    }

    async function createWriterCard(char, renderToken) {
      const box = document.createElement("div");
      box.className = "character-box";
      const target = document.createElement("div");
      target.className = "character-target";
      const badge = document.createElement("div");
      badge.className = "stroke-count";
      box.append(target, badge);
      elements.grid.appendChild(box);

      try {
        const charData = await HanziWriter.loadCharacterData(char);
        if (renderToken !== state.renderToken) return null;
        const size = Math.min(box.clientWidth || 148, 158);
        badge.textContent = `${charData.strokes.length} ${ui.strokes}`;
        const writer = HanziWriter.create(target, char, {
          width: size,
          height: size,
          padding: 10,
          showCharacter: false,
          showOutline: true,
          strokeColor: "#25362f",
          outlineColor: "#d7e0dc",
          radicalColor: "#15865e",
          highlightColor: "#d99523",
          strokeAnimationSpeed: 1.1,
          delayBetweenStrokes: 120,
          charDataLoader: () => charData,
        });
        return { box, writer };
      } catch (error) {
        badge.remove();
        const fallback = document.createElement("div");
        fallback.className = "character-error";
        fallback.textContent = char;
        target.replaceWith(fallback);
        return null;
      }
    }

    async function renderCharacters(word) {
      state.animationToken += 1;
      const renderToken = ++state.renderToken;
      state.writers = [];
      elements.grid.replaceChildren();

      const characters = hanziCharacters(word);
      if (!characters.length || typeof HanziWriter === "undefined") {
        elements.status.textContent = ui.unavailable;
        return;
      }

      const cards = await Promise.all(characters.map(char => createWriterCard(char, renderToken)));
      if (renderToken !== state.renderToken) return;
      state.writers = cards.filter(Boolean);
      if (!state.writers.length) {
        elements.status.textContent = ui.unavailable;
        return;
      }
      replayAnimation();
    }

    async function replayAnimation() {
      const token = ++state.animationToken;
      elements.status.textContent = ui.animating;
      state.writers.forEach(({ box }) => box.classList.remove("active"));
      for (const { writer } of state.writers) {
        try {
          await Promise.resolve(writer.hideCharacter({ duration: 0 }));
        } catch (error) {}
      }
      for (const { box, writer } of state.writers) {
        if (token !== state.animationToken) return;
        box.classList.add("active");
        try {
          await Promise.resolve(writer.animateCharacter());
        } catch (error) {}
        box.classList.remove("active");
        await new Promise(resolve => setTimeout(resolve, 180));
      }
      if (token === state.animationToken) elements.status.textContent = ui.done;
    }

    function selectWord(index) {
      if (index < 0 || index >= state.words.length) return;
      state.index = index;
      const word = activeWord();
      elements.hanzi.textContent = word.zh || "";
      elements.pinyin.textContent = word.pinyin || "";
      elements.meaning.textContent = word.meaning || "";
      renderStrip();
      renderControls();
      renderCharacters(word);
    }

    function playAudio() {
      const word = activeWord();
      if (!word.zh || !window.speechSynthesis || !window.SpeechSynthesisUtterance) {
        elements.status.textContent = ui.voiceUnavailable;
        return;
      }
      speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(word.zh);
      utterance.lang = "zh-CN";
      utterance.rate = .82;
      speechSynthesis.speak(utterance);
    }

    async function loadWords() {
      try {
        const apiParams = new URLSearchParams({
          lesson: String(lessonNumber),
          level,
          lang,
        });
        if (blockNumber) apiParams.set("block", String(blockNumber));
        apiParams.set("mode", "stroke");
        const response = await fetch(`/api/miniapp/lesson?${apiParams}`, {
          headers: { "X-Telegram-Init-Data": tg?.initData || "" },
        });
        const payload = await response.json();
        if (!response.ok || !payload.ok) throw new Error(payload.error || "lesson_load_failed");

        let words = Array.isArray(payload.lesson?.vocabulary) ? payload.lesson.vocabulary : [];
        if (!blockNumber && vocabPage === 1) words = words.slice(0, 8);
        if (!blockNumber && vocabPage === 2) words = words.slice(8);
        state.words = words.filter(word => word && word.zh);
        if (!state.words.length) {
          showMessage(ui.empty);
          elements.counter.textContent = "0 / 0";
          return;
        }
        showContent();
        selectWord(0);
      } catch (error) {
        showMessage(ui.failed);
        elements.counter.textContent = "0 / 0";
      }
    }

    elements.replay.addEventListener("click", replayAnimation);
    elements.audio.addEventListener("click", playAudio);
    elements.previous.addEventListener("click", () => selectWord(state.index - 1));
    elements.next.addEventListener("click", () => selectWord(state.index + 1));

    tg?.ready();
    tg?.expand();
    setText();
    loadWords();
  </script>
</body>
</html>
